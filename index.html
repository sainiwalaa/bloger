<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userCache = null;
        let activePostId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                userCache = snap.val() || {};
                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('app').classList.remove('hide');
                initApp();
                showPage(localStorage.getItem('saini_lastPage') || 'feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        function initApp() {
            // --- FEED LOGIC ---
            onValue(ref(db, 'posts'), s => {
                const feed = document.getElementById('v-feed');
                const myPosts = document.getElementById('my-posts-grid');
                feed.innerHTML = ""; myPosts.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    const isVid = p.url.includes('.mp4');
                    feed.innerHTML += `
                        <div class="bg-white mb-6 shadow-sm border-b">
                            <div class="p-3 flex items-center gap-3">
                                <img src="${p.uPhoto}" class="w-10 h-10 rounded-full border-2 border-orange-600">
                                <div><b class="text-xs raj-title block">${p.uName}</b><span class="text-[9px] text-gray-400 italic">${p.date}</span></div>
                            </div>
                            ${isVid ? `<video src="${p.url}" class="w-full bg-black" controls></video>` : `<img src="${p.url}" class="w-full">`}
                            <div class="p-4">
                                <div class="flex gap-4 mb-2 text-xl">
                                    <i class="fa-solid fa-heart text-gray-200" id="l-${k}" onclick="toggleLike('${k}')"></i>
                                    <i class="fa-regular fa-comment" onclick="openCommentModal('${k}')"></i>
                                </div>
                                <p class="text-xs"><b>@${p.uHandle}</b> ${p.caption}</p>
                            </div>
                        </div>`;
                    if(p.uid === auth.currentUser.uid) {
                        myPosts.innerHTML += `<div class="aspect-square border overflow-hidden rounded-lg bg-gray-100">${isVid ? '<i class="fa-solid fa-play p-2"></i>' : `<img src="${p.url}" class="w-full h-full object-cover">`}</div>`;
                    }
                });
            });

            // --- SHOP & ORDERS LOGIC ---
            onValue(ref(db, 'products'), s => {
                const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    grid.innerHTML += `
                        <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                            <img src="${p.url}" class="w-full h-40 object-cover bg-gray-50">
                            <div class="p-3">
                                <h3 class="text-[11px] font-bold uppercase truncate">${p.name}</h3>
                                <div class="text-orange-600 font-black mb-2 italic">₹${p.price}</div>
                                <button onclick="openOrderForm('${p.name}', '${p.link}')" class="w-full bg-black text-white py-2 rounded-lg text-[10px] font-black uppercase tracking-tighter">Order Now 🚩</button>
                            </div>
                        </div>`;
                });
            });

            onValue(ref(db, 'orders/' + auth.currentUser.uid), s => {
                const oGrid = document.getElementById('my-orders-grid'); oGrid.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const o = data[k];
                    oGrid.innerHTML += `
                        <div class="bg-orange-50 p-3 rounded-xl border border-orange-100 mb-2 flex justify-between items-center">
                            <div><b class="text-[10px] uppercase">${o.product}</b><br><span class="text-[9px] text-gray-400">${o.date}</span></div>
                            <span class="bg-white text-orange-600 px-2 py-1 rounded-md text-[9px] font-bold border">PROCESS</span>
                        </div>`;
                });
            });

            // Set Profile UI
            document.getElementById('u-name-profile').innerText = userCache.name;
            document.getElementById('u-prof-img').src = userCache.photo || 'https://via.placeholder.com/150';
            document.getElementById('u-banner').src = userCache.banner || 'https://images.unsplash.com/photo-1590050752117-23a9d7fc2173';
        }

        // --- ACTIONS ---
        window.showPage = (p) => {
            localStorage.setItem('saini_lastPage', p);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById('v-' + p).classList.remove('hide');
        };

        window.toggleLike = (id) => {
            const btn = document.getElementById('l-' + id);
            btn.classList.toggle('text-red-600');
            btn.classList.toggle('fa-solid');
        };

        window.sendComment = async () => {
            const input = document.getElementById('com-input');
            const val = input.value; if(!val) return;
            input.value = "";
            await push(ref(db, 'comments/' + activePostId), { uName: userCache.name, text: val });
        };

        window.submitPost = async () => {
            const url = document.getElementById('p-url').value;
            if(!url) return;
            await push(ref(db, 'posts'), {
                uid: auth.currentUser.uid, uName: userCache.name, uHandle: userCache.username,
                uPhoto: userCache.photo, url: url, caption: document.getElementById('p-cap').value,
                date: new Date().toLocaleDateString()
            });
            closeM('post-modal');
        };

        window.addProduct = async () => {
            const name = document.getElementById('prod-name').value;
            const url = document.getElementById('prod-img').value;
            if(!name || !url) return;
            await push(ref(db, 'products'), {
                name: name, price: document.getElementById('prod-price').value,
                url: url, link: document.getElementById('prod-link').value
            });
            closeM('shop-modal');
        };

        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fafafa; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; border-radius: 12px; padding: 12px; font-weight: 900; }
        .nav-icon { font-size: 1.4rem; color: #cbd5e1; cursor: pointer; transition: 0.3s; }
        .nav-icon:hover { color: #ea580c; }
        input, textarea { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; font-size: 13px; }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-24 hide bg-white shadow-xl">
        
        <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic tracking-tighter" onclick="showPage('feed')">SAINIWALAA</h1>
            <div class="flex gap-4">
                <i class="fa-solid fa-circle-plus text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store text-gray-400 text-2xl" onclick="showPage('shop')"></i>
            </div>
        </header>

        <main id="v-feed" class="p-1"></main>

        <main id="v-shop" class="hide p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black raj-title italic">MY SHOP 🚩</h2>
                <button onclick="openM('shop-modal')" class="bg-black text-white text-[9px] px-3 py-1 rounded-full">+ ADD PRODUCT</button>
            </div>
            
            <div class="mb-8">
                <h3 class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">Recent Orders</h3>
                <div id="my-orders-grid"></div>
            </div>

            <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest">Available Products</h3>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-40 bg-gray-200 relative">
                <img id="u-banner" class="w-full h-full object-cover">
                <img id="u-prof-img" class="w-24 h-24 absolute -bottom-10 left-6 border-4 border-white rounded-2xl shadow-lg object-cover">
            </div>
            <div class="mt-12 p-6">
                <h2 id="u-name-profile" class="text-2xl font-black raj-title italic"></h2>
                <div class="flex gap-3 mt-4">
                    <button onclick="openM('edit-modal')" class="flex-1 bg-gray-100 py-2 rounded-lg text-[10px] font-bold">EDIT STUDIO</button>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-[10px] font-bold">LOGOUT</button>
                </div>
            </div>
            <div class="p-1 grid grid-cols-3 gap-1 mt-4" id="my-posts-grid"></div>
        </main>

        <div id="post-modal" class="fixed inset-0 bg-black/80 z-[2000] hide flex items-center justify-center p-6">
            <div class="bg-white w-full rounded-3xl p-6">
                <h2 class="text-xl font-black raj-title mb-4 italic">CREATE POST 🚩</h2>
                <input type="text" id="p-url" placeholder="Paste Image/Video Link">
                <textarea id="p-cap" placeholder="Write caption..."></textarea>
                <button onclick="submitPost()" class="btn-royal w-full shadow-lg">POST NOW</button>
                <button onclick="closeM('post-modal')" class="w-full mt-4 text-[10px] text-gray-400 font-bold">CANCEL</button>
            </div>
        </div>

        <div id="shop-modal" class="fixed inset-0 bg-black/80 z-[2000] hide flex items-center justify-center p-6">
            <div class="bg-white w-full rounded-3xl p-6">
                <h2 class="text-xl font-black raj-title mb-4 italic">LIST PRODUCT 🚩</h2>
                <input type="text" id="prod-name" placeholder="Product Name">
                <input type="number" id="prod-price" placeholder="Price (₹)">
                <input type="text" id="prod-img" placeholder="Product Image URL">
                <input type="text" id="prod-link" placeholder="Buy Link (WhatsApp/Site)">
                <button onclick="addProduct()" class="btn-royal w-full shadow-lg">LIST IN SHOP</button>
                <button onclick="closeM('shop-modal')" class="w-full mt-4 text-[10px] text-gray-400 font-bold">CANCEL</button>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white/90 backdrop-blur-md border-t p-5 flex justify-around z-50 rounded-t-3xl shadow-2xl">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-crown nav-icon"></i>
        </nav>
    </div>

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white text-center">
        <h1 class="text-5xl font-black raj-title mb-2 italic">SainiWalaa</h1>
        <p class="text-[10px] font-bold text-gray-300 mb-10 tracking-[5px] uppercase">Royal Studio</p>
        <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
        <button onclick="signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value)" class="btn-royal shadow-2xl mt-4">ENTER STUDIO</button>
    </div>

</body>
</html>
