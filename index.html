<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Final Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(to right, #d4af37 20%, #111 40%, #111 60%, #d4af37 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .banner-container { height: 260px; width: 100%; position: relative; background: #111; border-radius: 0 0 50px 50px; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 50px 50px; }
        .profile-holder { position: absolute; bottom: -90px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; width: 100%; text-align: center; }
        .p-img { width: 135px; height: 135px; border-radius: 50%; border: 6px solid white; object-fit: cover; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .nav-btn { position: relative; transition: 0.3s; color: #999; }
        .nav-btn.active { color: #d4af37; font-weight: 800; border-bottom: 3px solid #d4af37; }
        .desc-text { color: #ff0000 !important; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        .badge-msg { position: absolute; top: -5px; right: -5px; background: #ff3b3b; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; border: 2px solid white; }
        .product-card { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #f0f0f0; transition: 0.4s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center bg-white fixed inset-0 z-[3000]">
        <h1 class="raj-font text-4xl text-[#d4af37] animate-pulse">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="min-h-screen flex items-center justify-center bg-white hidden">
        <div class="w-full max-w-sm p-10 text-center">
            <h1 class="raj-font text-6xl text-[#d4af37] mb-12">S</h1>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-5 bg-gray-50 rounded-2xl outline-none">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-3xl font-bold">LOGIN / JOIN</button>
            </div>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <div class="bg-white pt-6 pb-2 text-center border-b">
            <h1 class="raj-font text-3xl font-bold tracking-[0.3em] saini-header">SAINIWALAA</h1>
        </div>

        <nav class="sticky top-0 z-[150] bg-white/80 backdrop-blur-xl flex justify-around border-b px-4">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Trending</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Orders</button>
            <button onclick="showTab('chats')" id="tab-chats" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em] relative">Inbox <span id="msg-badge" class="badge-msg hidden">0</span></button>
            <button onclick="logout()" class="py-5 text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-shop" class="hidden">
            <div class="banner-container">
                <img id="banner-ui" src="" class="banner-img">
                <div class="profile-holder">
                    <div class="relative">
                        <img id="profile-ui" src="" class="p-img">
                        <label class="absolute bottom-1 right-2 bg-[#d4af37] text-white w-10 h-10 flex items-center justify-center rounded-full cursor-pointer owner-only hidden border-4 border-white shadow-lg">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" onchange="uploadMedia('profile', this)" class="hidden">
                        </label>
                    </div>
                    <h2 id="disp-name" class="raj-font font-bold text-gray-800 text-2xl mt-4">Creator</h2>
                </div>
                <label class="absolute top-6 right-6 bg-black/40 p-4 rounded-full cursor-pointer text-white owner-only hidden">
                    <i class="fa-solid fa-image"></i>
                    <input type="file" onchange="uploadMedia('banner', this)" class="hidden">
                </label>
            </div>

            <div class="mt-48 px-8 text-center">
                <p id="disp-bio" class="p-6 rounded-[30px] shadow-sm border bg-white max-w-sm mx-auto italic">Mhara Swagat hai!</p>
                <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="mt-4 text-[10px] bg-gray-100 px-6 py-2 rounded-full font-bold owner-only hidden">Edit Profile</button>
            </div>

            <div id="edit-box" class="hidden max-w-sm mx-auto p-8 mt-6 bg-white border rounded-[40px] space-y-4 shadow-xl">
                <input id="in-name" placeholder="Name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input id="in-bio" placeholder="Bio" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <button onclick="saveProfile()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">SAVE</button>
            </div>

            <div class="max-w-4xl mx-auto p-8 mt-10 owner-only hidden bg-white rounded-[40px] border shadow-sm">
                <h3 class="raj-font mb-4">Add New Item</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input id="p-name" placeholder="Item Name" class="p-4 bg-gray-50 rounded-xl outline-none">
                    <input id="p-price" placeholder="Price" class="p-4 bg-gray-50 rounded-xl outline-none">
                </div>
                <textarea id="p-desc" placeholder="Red Detail Text" class="w-full p-4 bg-gray-50 rounded-xl mt-4 outline-none"></textarea>
                <input type="file" id="p-file" onchange="previewProd(this)" class="mt-4 block text-xs">
                <button id="pub-btn" onclick="publish()" class="hidden w-full bg-[#d4af37] text-white p-4 rounded-xl mt-4 font-bold">PUBLISH PRODUCT</button>
            </div>

            <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 mt-10"></div>
        </section>

        <section id="sec-feed" class="hidden p-8 grid grid-cols-2 md:grid-cols-4 gap-6" id="public-grid"></section>

        <section id="sec-chats" class="hidden p-8 max-w-xl mx-auto space-y-4" id="chat-list"></section>

        <section id="sec-orders" class="hidden p-8 max-w-2xl mx-auto space-y-4" id="order-list"></section>
    </main>

    <div id="order-modal" class="hidden fixed inset-0 z-[2000] flex items-center justify-center bg-black/80 p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 text-center">
            <h3 class="raj-font text-xl">Confirm Order</h3>
            <p id="order-item-name" class="text-xs text-gray-400 mb-6"></p>
            <input id="o-name" placeholder="Your Name" class="w-full p-4 bg-gray-50 rounded-xl mb-4 outline-none">
            <input id="o-phone" placeholder="WhatsApp Number" class="w-full p-4 bg-gray-50 rounded-xl mb-6 outline-none">
            <button onclick="confirmOrder()" class="w-full bg-black text-white p-5 rounded-2xl font-bold">ORDER NOW</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-4 text-xs text-red-400">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", 
            authDomain: "social-blog-93d38.firebaseapp.com", 
            projectId: "social-blog-93d38", 
            storageBucket: "social-blog-93d38.appspot.com", 
            appId: "1:78643219054:web:dprl2lyih" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let viewId = null;

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const activeTab = localStorage.getItem('activeTab') || 'feed';
                showTab(activeTab);
                initRealtime();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        function initRealtime() {
            // Feed
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), s => render(s, 'sec-feed', false));
            
            // Inbox
            onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid), orderBy("time", "desc")), s => {
                const badge = document.getElementById('msg-badge');
                badge.innerText = s.size;
                badge.classList.toggle('hidden', s.size === 0);
                const list = document.getElementById('sec-chats');
                list.innerHTML = `<h2 class="raj-font text-2xl mb-4">Inbox</h2>`;
                s.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm">
                        <p class="text-[9px] text-gold-600 font-bold uppercase">From: ${c.from.slice(0,8)}</p>
                        <p class="my-2">"${c.msg}"</p>
                        <button onclick="replyMsg('${c.from}')" class="text-[10px] font-bold text-[#d4af37]">REPLY</button>
                    </div>`;
                });
            });

            // Order History (For Seller)
            onSnapshot(query(collection(db, "orders"), where("sellerId", "==", curU.uid), orderBy("time", "desc")), s => {
                const list = document.getElementById('sec-orders');
                list.innerHTML = `<h2 class="raj-font text-2xl mb-4">Received Orders</h2>`;
                s.forEach(d => {
                    const o = d.data();
                    const dt = o.time ? o.time.toDate().toLocaleString() : 'Processing...';
                    list.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm relative">
                        <span class="absolute top-4 right-6 text-[8px] text-gray-300">${dt}</span>
                        <h4 class="font-bold">${o.item}</h4>
                        <p class="text-sm text-gray-500">By: ${o.customer} (${o.phone})</p>
                        <button onclick="delOrder('${d.id}')" class="mt-2 text-red-300 text-xs"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        window.showTab = (t) => {
            localStorage.setItem('activeTab', t);
            ['feed','shop','chats','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            if(t === 'shop' && !viewId) viewProfile(curU.uid);
            window.scrollTo(0,0);
        };

        window.viewProfile = async (uid) => {
            viewId = uid;
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            
            const docRef = doc(db, "users", uid);
            const s = await getDoc(docRef);
            if(s.exists()){
                const d = s.data();
                document.getElementById('disp-name').innerText = d.name || "Saini User";
                document.getElementById('disp-bio').innerText = d.bio || "Mhara Swagat Hai!";
                document.getElementById('profile-ui').src = d.profile || "https://api.dicebear.com/7.x/initials/svg?seed="+uid;
                document.getElementById('banner-ui').src = d.banner || "https://images.unsplash.com/photo-1557683316-973673baf926?w=1000";
            }
            
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => render(s, 'my-shop-grid', isMe));
            showTab('shop');
        };

        function render(snapshot, cid, isMe) {
            const grid = document.getElementById(cid);
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="product-card">
                    <img src="${p.img}" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <button onclick="viewProfile('${p.creatorId}')" class="text-[9px] font-bold text-[#d4af37] uppercase">@${p.creatorName}</button>
                        <h4 class="font-bold text-sm truncate">${p.name}</h4>
                        <p class="desc-text">${p.desc || ''}</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="font-black text-lg">₹${p.price}</span>
                            <div class="flex gap-2">
                                <button onclick="sendMsg('${p.creatorId}')" class="bg-gray-100 p-2 rounded-lg text-gray-400"><i class="fa-solid fa-comment-dots"></i></button>
                                <button onclick="triggerOrder('${p.name}', '${p.creatorId}', '${p.price}')" class="bg-black text-white text-[10px] px-4 py-2 rounded-lg font-bold">BUY</button>
                                ${isMe ? `<button onclick="delProd('${d.id}')" class="bg-red-50 text-red-400 p-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }

        // Logic Functions
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };

        window.saveProfile = async () => {
            await setDoc(doc(db,"users",curU.uid),{ name:document.getElementById('in-name').value, bio:document.getElementById('in-bio').value }, {merge:true});
            location.reload();
        };

        window.uploadMedia = (type, input) => {
            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async (e) => {
                await setDoc(doc(db,"users",curU.uid),{[type]:e.target.result},{merge:true});
                viewProfile(curU.uid);
            };
        };

        window.previewProd = (input) => {
            const reader = new FileReader();
            reader.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); };
            reader.readAsDataURL(input.files[0]);
        };

        window.publish = async () => {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('p-name').value, price: document.getElementById('p-price').value,
                desc: document.getElementById('p-desc').value, img: window.tempImg,
                creatorId: curU.uid, creatorName: document.getElementById('disp-name').innerText, time: serverTimestamp()
            });
            location.reload();
        };

        window.triggerOrder = (n, sid, pr) => { 
            window.targetOrder = { n, sid, pr }; 
            document.getElementById('order-item-name').innerText = n;
            document.getElementById('order-modal').classList.remove('hidden'); 
        };

        window.confirmOrder = async () => {
            await addDoc(collection(db, "orders"), {
                item: window.targetOrder.n, sellerId: window.targetOrder.sid,
                customer: document.getElementById('o-name').value, phone: document.getElementById('o-phone').value,
                price: window.targetOrder.pr, time: serverTimestamp()
            });
            alert("Order Placed!");
            document.getElementById('order-modal').classList.add('hidden');
        };

        window.sendMsg = (toId) => {
            const m = prompt("Enter Message:");
            if(m) addDoc(collection(db, "chats"), { from: curU.uid, to: toId, msg: m, time: serverTimestamp() });
        };

        window.replyMsg = (toId) => sendMsg(toId);
        window.delProd = async (id) => confirm("Delete?") && await deleteDoc(doc(db, "products", id));
        window.delOrder = async (id) => confirm("Delete History?") && await deleteDoc(doc(db, "orders", id));
        window.logout = () => signOut(auth).then(() => location.reload());

    </script>
</body>
</html>
