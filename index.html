<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", 
        authDomain: "social-blog-93d38.firebaseapp.com", 
        projectId: "social-blog-93d38", 
        storageBucket: "social-blog-93d38.appspot.com", 
        appId: "1:78643219054:web:dprl2lyih" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    setPersistence(auth, browserLocalPersistence);
    let currentUser = null;
    let allProducts = [];
    let viewingCreatorId = null;

    onAuthStateChanged(auth, u => {
        if(u) {
            currentUser = u;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            // Share Link Checker
            const urlParams = new URLSearchParams(window.location.search);
            const shopId = urlParams.get('shop');
            
            if(shopId) {
                viewingCreatorId = shopId;
                showTab('shop');
                loadProfile(shopId);
            } else {
                viewingCreatorId = null;
                showTab(localStorage.getItem('lastTab') || 'feed');
            }
            
            syncAll();
            syncUserHistory(u.uid);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    window.loadProfile = async (uid) => {
        const isOwner = (currentUser && currentUser.uid === uid);
        
        // SECURITY: Sirf owner ko edit buttons dikhao
        document.querySelectorAll('.owner-only').forEach(el => {
            if(isOwner) el.classList.remove('hidden');
            else el.classList.add('hidden');
        });

        // Agar user share link se aaya hai toh "Back to Feed" dikhao
        const shareBtn = document.getElementById('btn-share-shop');
        if(!isOwner) {
            shareBtn.innerHTML = `<i class="fa-solid fa-house mr-2"></i>WAPAS FEED PAR`;
            shareBtn.onclick = () => { window.location.href = window.location.pathname; };
        } else {
            shareBtn.innerHTML = `<i class="fa-solid fa-share-nodes mr-2"></i>SHARE SHOP`;
            shareBtn.onclick = () => copyShopLink();
        }

        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            const d = snap.data();
            const nEl = document.getElementById('disp-name');
            const bEl = document.getElementById('disp-bio');
            nEl.innerText = d.name || "Shahi Creator";
            nEl.style.color = d.nameColor || "#000000";
            nEl.style.fontSize = (d.nameSize || 24) + "px";
            bEl.innerText = d.bio || "Bio update karein...";
            bEl.style.fontSize = (d.bioSize || 14) + "px";
            document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
            document.getElementById('banner-ui').style.backgroundImage = d.banner ? `url(${d.banner})` : "none";
            
            const sm = { 'btn-wa': d.wa ? `https://wa.me/${d.wa}` : null, 'btn-insta': d.insta, 'btn-yt': d.yt };
            Object.keys(sm).forEach(id => { 
                if(sm[id]) {
                    document.getElementById(id).href = sm[id];
                    document.getElementById(id).classList.remove('hidden');
                } else {
                    document.getElementById(id).classList.add('hidden');
                }
            });
        }
        syncMyShop(uid);
    };

    window.copyShopLink = () => {
        const link = window.location.origin + window.location.pathname + "?shop=" + currentUser.uid;
        navigator.clipboard.writeText(link).then(() => alert("Aapki Shop Link Copy Ho Gayi!"));
    };

    // --- Baki Functions (Publish, Delete, Order) as it is rahenge bas niche wala dhyan dein ---

    window.showTab = (t) => {
        // Agar koi dusre ki shop dekh raha hai aur feed pe click kare toh URL saaf ho jaye
        if(t === 'feed' && window.location.search.includes('shop')) {
            window.location.href = window.location.pathname;
            return;
        }

        localStorage.setItem('lastTab', t);
        ['feed','shop','orders'].forEach(s => {
            if(document.getElementById('sec-'+s)) document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
            if(document.getElementById('tab-'+s)) document.getElementById('tab-'+s).classList.toggle('active', s === t);
        });

        if(t === 'shop') {
            const urlParams = new URLSearchParams(window.location.search);
            const shopId = urlParams.get('shop');
            loadProfile(shopId || currentUser.uid);
        }
    };

    // ... (PublishProduct aur baki functions wahi purane wale add karle) ...
</script>
