<script type="module">
    // ... (Firebase setup aur baaki functions same rahenge)

    // --- VISIT PROFILE (FIXED WITH POSTS & SHOP TABS) ---
    window.visitProfile = async (uid) => {
        const snap = await get(ref(db, 'users/' + uid));
        const u = snap.val();
        
        // Setup Header & Info
        document.getElementById('v-v-banner').style.backgroundImage = `url(${u.banner || 'https://via.placeholder.com/800x300'})`;
        document.getElementById('v-v-img').src = u.photo || 'https://via.placeholder.com/100';
        document.getElementById('v-v-name').innerText = u.name;
        document.getElementById('v-v-bio').innerText = u.bio || "SainiWalaa Royal Member";

        // Load Posts for this User
        onValue(ref(db, 'posts'), s => {
            const posts = s.val(); let ph = "";
            if(posts) {
                Object.keys(posts).reverse().forEach(k => {
                    const p = posts[k];
                    if(p.uid === uid) {
                        ph += `<img src="${p.url}" class="aspect-square object-cover border-[0.5px] border-gray-100">`;
                    }
                });
            }
            document.getElementById('v-v-posts-grid').innerHTML = ph || "<p class='col-span-3 text-center py-10 opacity-30 text-[10px] uppercase'>No Posts Yet</p>";
        });

        // Load Shop Items for this User (With BUY Button)
        onValue(ref(db, 'products'), s => {
            const pr = s.val(); let sh = "";
            if(pr) {
                Object.keys(pr).reverse().forEach(k => {
                    const p = pr[k];
                    if(p.uid === uid) {
                        sh += `
                        <div class="bg-white rounded-xl shadow-sm border p-2">
                            <img src="${p.url}" class="w-full h-28 object-cover rounded-lg mb-2">
                            <h3 class="text-[10px] font-black uppercase truncate">${p.name}</h3>
                            <div class="text-orange-600 font-bold text-xs mb-2">₹${p.price}</div>
                            <button onclick="openOrderForm('${k}','${p.uid}','${p.name}','${p.link}')" 
                                    class="w-full bg-red-800 text-white py-2 rounded-lg text-[9px] font-black tracking-widest uppercase">
                                <i class="fa-solid fa-shopping-cart mr-1"></i> Order Now
                            </button>
                        </div>`;
                    }
                });
            }
            document.getElementById('v-v-shop-grid').innerHTML = sh || "<p class='col-span-2 text-center py-10 opacity-30 text-[10px] uppercase'>Shop is Empty</p>";
        });

        openM('visit-profile-modal');
    };

    // Tab Switcher for Visiting Profile
    window.switchVisitTab = (tab) => {
        document.getElementById('v-v-posts-grid').classList.add('hide');
        document.getElementById('v-v-shop-grid').classList.add('hide');
        document.getElementById('tab-v-posts').className = "flex-1 py-3 text-[10px] font-black text-gray-300 uppercase tracking-widest";
        document.getElementById('tab-v-shop').className = "flex-1 py-3 text-[10px] font-black text-gray-300 uppercase tracking-widest";
        
        document.getElementById('v-v-' + tab + '-grid').classList.remove('hide');
        document.getElementById('tab-v-' + tab).className = "flex-1 py-3 text-[10px] font-black text-orange-600 border-b-2 border-orange-600 uppercase tracking-widest";
    };
</script>

<div id="visit-profile-modal" class="fixed inset-0 bg-white z-[600] hide overflow-y-auto pb-10">
    <div id="v-v-banner" class="h-40 bg-cover bg-center relative">
        <div class="absolute inset-0 bg-black/20"></div>
        <i class="fa-solid fa-arrow-left absolute top-5 left-5 text-white text-xl drop-shadow-lg" onclick="closeM('visit-profile-modal')"></i>
        <img id="v-v-img" src="" class="w-24 h-24 rounded-full absolute -bottom-10 left-6 border-4 border-white object-cover bg-white shadow-xl">
    </div>

    <div class="mt-12 px-6 pb-4 border-b">
        <h2 id="v-v-name" class="text-2xl font-black uppercase raj-title tracking-tighter"></h2>
        <p id="v-v-bio" class="text-[11px] text-gray-400 mt-1 italic leading-tight"></p>
    </div>

    <div class="flex border-b sticky top-0 bg-white z-10">
        <button id="tab-v-posts" onclick="switchVisitTab('posts')" class="flex-1 py-3 text-[10px] font-black text-orange-600 border-b-2 border-orange-600 uppercase tracking-widest">
            <i class="fa-solid fa-grid-2 mr-1"></i> Posts
        </button>
        <button id="tab-v-shop" onclick="switchVisitTab('shop')" class="flex-1 py-3 text-[10px] font-black text-gray-300 uppercase tracking-widest">
            <i class="fa-solid fa-bag-shopping mr-1"></i> Bazaar
        </button>
    </div>

    <div id="v-v-posts-grid" class="grid grid-cols-3 gap-0.5 min-h-[300px]"></div>
    <div id="v-v-shop-grid" class="grid grid-cols-2 gap-4 p-4 hide min-h-[300px]"></div>
</div>
