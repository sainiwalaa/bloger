<style>
    /* Sirf Grid aur Image ko sahi karne ke liye updated CSS */
    #public-grid, #my-shop-grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(2, minmax(0, 1fr)); /* Mobile pe 2 */
    }

    @media (min-width: 768px) {
        #public-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr)); /* Tablet pe 3 */
        }
    }

    @media (min-width: 1024px) {
        #public-grid {
            grid-template-columns: repeat(4, minmax(0, 1fr)); /* Desktop pe 4 */
        }
    }

    .product-img-container {
        width: 100%;
        aspect-ratio: 1 / 1; /* Ekdum Square Frame */
        overflow: hidden;
        background: #f3f3f3;
    }

    .product-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Image ko box mein fit karega bina phate */
        transition: transform 0.5s;
    }

    .shahi-card:hover img {
        transform: scale(1.08);
    }

    /* Fixed Height for Content to keep cards aligned */
    .card-body {
        height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
</style>

<script type="module">
    // ... baki firebase config aur auth wahi rahega ...

    function syncData() {
        // Public Feed Sync
        onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
            const grid = document.getElementById('public-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `
                    <div class="shahi-card bg-white shadow-sm">
                        <div class="product-img-container">
                            <img src="${p.img}" loading="lazy">
                        </div>
                        <div class="p-4 card-body">
                            <div>
                                <span class="text-[9px] font-bold text-[#d4af37] tracking-widest uppercase">By @${p.creator}</span>
                                <h4 class="font-bold text-sm text-gray-800 line-clamp-1 mt-1">${p.name}</h4>
                                <p class="text-[10px] text-gray-400 line-clamp-2 mt-1">${p.desc}</p>
                            </div>
                            <div class="flex justify-between items-center mt-3">
                                <span class="font-black text-gray-900">₹${p.price}</span>
                                <button onclick="orderNow('${p.name}', '${p.creatorId}')" class="bg-[#d4af37] text-white text-[10px] px-4 py-2 rounded-full font-bold">ORDER</button>
                            </div>
                        </div>
                    </div>`;
            });
        });

        // My Shop Sync (Same logic for image fit)
        onSnapshot(query(collection(db, "products"), where("creatorId", "==", user.uid)), snap => {
            const myGrid = document.getElementById('my-shop-grid');
            myGrid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                myGrid.innerHTML += `
                    <div class="bg-white rounded-2xl border relative overflow-hidden shadow-sm">
                        <button onclick="delP('${d.id}')" class="absolute top-2 right-2 z-10 bg-red-500 text-white w-6 h-6 rounded-full text-[10px] shadow-lg"><i class="fa-solid fa-trash"></i></button>
                        <div class="aspect-square bg-gray-50">
                            <img src="${p.img}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-2">
                            <p class="font-bold text-[11px] truncate">${p.name}</p>
                            <p class="text-[#d4af37] text-[11px] font-bold">₹${p.price}</p>
                        </div>
                    </div>`;
            });
        });
    }

    // Direct Image Upload & Save to Database
    window.publishProduct = async () => {
        const n = document.getElementById('p-name').value;
        const p = document.getElementById('p-price').value;
        const d = document.getElementById('p-desc').value;
        
        if(!n || !p || !tempProductImg) return alert("Hukum, jankari poori bharein!");

        // Button ko disable karein taaki double click na ho
        const btn = document.getElementById('pub-btn');
        btn.innerText = "PUBLISHING...";
        btn.disabled = true;

        try {
            await addDoc(collection(db, "products"), {
                name: n,
                price: p,
                desc: d,
                img: tempProductImg, // Yahan image data fast save ho raha hai
                creator: user.email.split('@')[0],
                creatorId: user.uid,
                time: serverTimestamp()
            });
            
            // Reset Form
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-desc').value = "";
            document.getElementById('p-preview').classList.add('hidden');
            tempProductImg = "";
            alert("Maal Shahi Feed par aa gaya hai!");
        } catch (error) {
            alert("Galti hui: " + error.message);
        } finally {
            btn.innerText = "SAVE & PUBLISH";
            btn.disabled = false;
        }
    };
</script>
