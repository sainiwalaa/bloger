<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sainiwalaa Studio - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .active-tab { border-bottom: 3px solid #000; color: #000; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        video { width: 100%; border-radius: 12px; background: #000; }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-md min-h-screen bg-white shadow-xl relative">
        
        <div class="relative h-48 bg-gray-200">
            <img id="u-banner" src="" class="w-full h-full object-cover">
            <img id="u-logo" src="" class="absolute -bottom-6 left-6 w-20 h-20 rounded-2xl border-4 border-white shadow-md bg-white object-cover">
        </div>

        <div class="px-6 pt-10 pb-4">
            <div class="flex justify-between items-start">
                <div>
                    <h1 id="u-name" class="text-2xl font-black text-gray-900 leading-none">Loading...</h1>
                    <p id="u-bio" class="text-gray-500 text-sm mt-2 font-medium">Connecting to sheet...</p>
                </div>
                <button onclick="openM('modal-edit')" class="text-gray-400"><i class="fa-solid fa-gear text-xl"></i></button>
            </div>
            <a id="u-web" target="_blank" class="inline-block mt-3 text-blue-600 font-bold text-xs uppercase tracking-wider">🔗 Visit Website</a>
        </div>

        <div class="flex px-6 border-b text-gray-400 font-bold text-sm">
            <button onclick="switchTab('shop')" id="btn-shop" class="flex-1 py-3 active-tab">STORE</button>
            <button onclick="switchTab('posts')" id="btn-posts" class="flex-1 py-3">POSTS & REELS</button>
        </div>

        <div id="shop-container" class="p-4 grid grid-cols-2 gap-4">
            </div>

        <div id="posts-container" class="p-4 hidden space-y-6">
            </div>

        <button onclick="openM('modal-add')" class="fixed bottom-10 right-10 bg-black text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 transition-transform active:scale-90">
            <i class="fa-solid fa-plus"></i>
        </button>

    </div>

    <div id="modal-add" class="fixed inset-0 bg-white z-[100] hidden p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">Upload Content</h2>
            <button onclick="closeM('modal-add')" class="text-2xl">&times;</button>
        </div>
        <select id="add-type" class="w-full p-4 bg-gray-100 rounded-xl mb-4 font-bold outline-none border-none">
            <option value="shop">Add to Store (Product)</option>
            <option value="post">Add to Posts (Video/Image)</option>
        </select>
        <input type="file" id="add-file" class="w-full mb-4 p-2">
        <input type="text" id="add-title" placeholder="Title / Product Name" class="w-full p-4 bg-gray-100 rounded-xl mb-4 outline-none">
        <input type="number" id="add-price" placeholder="Price (for shop only)" class="w-full p-4 bg-gray-100 rounded-xl mb-6 outline-none">
        <button id="submit-btn" onclick="handleUpload()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black shadow-lg">FINISH UPLOAD</button>
    </div>

    <div id="modal-edit" class="fixed inset-0 bg-white z-[100] hidden p-8">
        <h2 class="text-2xl font-black mb-6">Edit Profile</h2>
        <input type="text" id="ed-bio" placeholder="Update Bio" class="w-full p-4 bg-gray-100 rounded-xl mb-4">
        <input type="text" id="ed-web" placeholder="Website Link" class="w-full p-4 bg-gray-100 rounded-xl mb-4">
        <button onclick="saveProfile()" class="w-full bg-black text-white p-4 rounded-xl font-bold">SAVE CHANGES</button>
        <button onclick="closeM('modal-edit')" class="w-full mt-4 text-gray-400 font-bold">CANCEL</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzIt34Ff5aqRECSgFJK2YkZGzARuD8s6S0rEnTMwDP5SU5ak1w8M4MY9iFxGB31fedjMA/exec";
        const CLOUD_URL = "https://api.cloudinary.com/v1_1/dprl2lyih/upload";
        const PRESET = "social_preset";
        const UID = "8829934849";

        function openM(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeM(id) { document.getElementById(id).classList.add('hidden'); }

        function switchTab(type) {
            if(type === 'shop') {
                document.getElementById('shop-container').classList.remove('hidden');
                document.getElementById('posts-container').classList.add('hidden');
                document.getElementById('btn-shop').classList.add('active-tab');
                document.getElementById('btn-posts').classList.remove('active-tab');
            } else {
                document.getElementById('shop-container').classList.add('hidden');
                document.getElementById('posts-container').classList.remove('hidden');
                document.getElementById('btn-shop').classList.remove('active-tab');
                document.getElementById('btn-posts').classList.add('active-tab');
            }
        }

        async function uploadToCloud(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", PRESET);
            const res = await fetch(CLOUD_URL, { method: "POST", body: formData });
            const data = await res.json();
            return data.secure_url;
        }

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}?action=getAppData&uid=${UID}`);
                const data = await res.json();

                // Set Profile
                document.getElementById('u-name').innerText = data.user[2];
                document.getElementById('u-logo').src = data.user[3];
                document.getElementById('u-banner').src = data.user[5];
                document.getElementById('u-bio').innerText = data.user[4];
                document.getElementById('u-web').href = data.user[6];

                // Set Store
                let shopHTML = "";
                data.shop.forEach(item => {
                    shopHTML += `
                        <div class="bg-white rounded-2xl border overflow-hidden shadow-sm">
                            <img src="${item[1]}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="text-xs font-bold truncate">${item[0]}</h4>
                                <p class="text-blue-600 font-black text-sm mt-1">₹${item[3]}</p>
                            </div>
                        </div>`;
                });
                document.getElementById('shop-container').innerHTML = shopHTML;

                // Set Posts (Video/Image check)
                let postsHTML = "";
                data.posts.forEach(post => {
                    const isVid = post[0].match(/\.(mp4|mov|webm)$/i) || post[0].includes("video/upload");
                    postsHTML += `
                        <div class="bg-white border-b pb-6">
                            ${isVid ? `<video src="${post[0]}" controls></video>` : `<img src="${post[0]}" class="rounded-xl">`}
                            <h3 class="mt-3 font-bold text-gray-800">${post[2] || "New Post"}</h3>
                        </div>`;
                });
                document.getElementById('posts-container').innerHTML = postsHTML;

            } catch (err) {
                console.error("API Error:", err);
            }
        }

        async function handleUpload() {
            const btn = document.getElementById('submit-btn');
            const file = document.getElementById('add-file').files[0];
            if(!file) return alert("Select a file first");

            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            const fileUrl = await uploadToCloud(file);
            const type = document.getElementById('add-type').value;
            
            const payload = {
                action: type === 'shop' ? 'addShop' : 'addPost',
                uid: UID,
                name: document.getElementById('add-title').value,
                price: document.getElementById('add-price').value,
                img: fileUrl, // for shop
                file: fileUrl, // for post
                text: document.getElementById('add-title').value
            };

            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            location.reload();
        }

        window.onload = loadData;
    </script>
</body>
</html>
