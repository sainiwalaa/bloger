<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Influencer Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fdfdfd; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 5s ease infinite;
            font-weight: 900;
        }
        @keyframes gradient-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .nav-btn.active { color: #d4af37; font-weight: 800; border-bottom: 3px solid #d4af37; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .p-img-container { position: relative; margin-top: -70px; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); object-fit: cover; }
        .hidden { display: none !important; }
        .stat-box { text-align: center; padding: 10px; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-screen" class="fixed inset-0 z-[3000] bg-white flex items-center justify-center">
        <h1 class="raj-font text-3xl saini-header animate-pulse">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="raj-font text-5xl mb-10 saini-header">S</h1>
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border-none outline-none">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl mb-6 border-none outline-none">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">LOG IN / REGISTER</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <header class="sticky top-0 z-[200] bg-white/90 backdrop-blur-md border-b border-gray-100 p-4 text-center">
            <h1 class="raj-font text-2xl tracking-widest saini-header">SAINIWALAA</h1>
            <p class="text-[7px] tracking-[0.4em] text-gray-400 font-bold uppercase">Influencer Blog</p>
        </header>

        <nav class="sticky top-[68px] z-[150] glass flex justify-around border-b border-gray-50">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-4 text-[10px] font-bold uppercase tracking-widest">Market</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-4 text-[10px] font-bold uppercase tracking-widest">Profile</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-4 text-[10px] font-bold uppercase tracking-widest">Inbox</button>
            <button onclick="logout()" class="py-4 text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-feed" class="p-4 grid grid-cols-2 gap-4 max-w-6xl mx-auto hidden"></section>

        <section id="sec-shop" class="hidden">
            <div class="h-48 bg-gradient-to-r from-gray-200 to-gray-300">
                <img id="banner-ui" src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=800" class="w-full h-full object-cover">
            </div>
            <div class="px-6 flex flex-col items-center">
                <div class="p-img-container">
                    <img id="profile-ui" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Saini" class="p-img">
                    <div class="absolute bottom-2 -right-2 flex gap-1">
                        <button onclick="showInboxPopup()" class="bg-black text-white w-8 h-8 rounded-full flex items-center justify-center text-xs shadow-lg"><i class="fa-solid fa-envelope"></i></button>
                        <button class="bg-[#d4af37] text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-lg">FOLLOW</button>
                    </div>
                </div>
                
                <h2 id="disp-name" class="raj-font text-xl mt-4 font-bold">Saini Creator</h2>
                <p id="disp-bio" class="text-gray-500 text-sm mt-1 mb-4">Mhara Swagat hai!</p>

                <div class="flex gap-8 border-y border-gray-100 w-full py-4 mb-6">
                    <div class="flex-1 text-center border-r"><span class="block font-black text-lg">12.5K</span><span class="text-[9px] text-gray-400 uppercase">Followers</span></div>
                    <div class="flex-1 text-center"><span class="block font-black text-lg">850+</span><span class="text-[9px] text-gray-400 uppercase">Total Sales</span></div>
                </div>

                <div class="owner-only hidden flex gap-2 mb-8 w-full">
                    <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="flex-1 bg-gray-100 py-3 rounded-xl text-[10px] font-bold uppercase">Settings</button>
                    <button onclick="document.getElementById('add-box').classList.toggle('hidden')" class="flex-1 bg-black text-white py-3 rounded-xl text-[10px] font-bold uppercase">Add Product</button>
                </div>

                <div id="edit-box" class="hidden w-full space-y-3 bg-white p-4 rounded-2xl border mb-6">
                    <input id="in-name" placeholder="New Name" class="w-full p-3 bg-gray-50 rounded-xl outline-none text-sm">
                    <input id="in-bio" placeholder="New Bio" class="w-full p-3 bg-gray-50 rounded-xl outline-none text-sm">
                    <button onclick="saveProfile()" class="w-full bg-black text-white py-3 rounded-xl text-xs font-bold">SAVE CHANGES</button>
                </div>

                <div id="add-box" class="hidden w-full space-y-3 bg-white p-4 rounded-2xl border mb-6">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="p-name" placeholder="Product Name" class="p-3 bg-gray-50 rounded-xl outline-none text-xs">
                        <input id="p-price" placeholder="Price ₹" class="p-3 bg-gray-50 rounded-xl outline-none text-xs">
                    </div>
                    <input id="p-cat" placeholder="Category (e.g. Fashion)" class="w-full p-3 bg-gray-50 rounded-xl outline-none text-xs">
                    <textarea id="p-desc" placeholder="Product Description..." class="w-full p-3 bg-gray-50 rounded-xl outline-none text-xs h-20"></textarea>
                    <input id="p-img" placeholder="Image URL" class="w-full p-3 bg-gray-50 rounded-xl outline-none text-xs">
                    <input id="p-link" placeholder="Buy Link" class="w-full p-3 bg-gray-50 rounded-xl outline-none text-xs">
                    <button onclick="addProduct()" class="w-full bg-[#d4af37] text-white py-3 rounded-xl text-xs font-bold uppercase">Post Product</button>
                </div>

                <div id="my-grid" class="grid grid-cols-2 gap-4 w-full"></div>
            </div>
        </section>

        <section id="sec-orders" class="p-4 max-w-2xl mx-auto hidden">
            <h2 class="raj-font text-2xl mb-6">Your Inbox</h2>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <div id="inbox-popup" class="hidden fixed inset-0 z-[1000] flex items-end justify-center bg-black/50">
        <div class="bg-white w-full rounded-t-[40px] p-8 max-w-md animate-slide-up">
            <h3 class="raj-font text-xl mb-4">Send Message</h3>
            <textarea id="msg-text" placeholder="Type your message here..." class="w-full h-32 p-4 bg-gray-50 rounded-2xl outline-none mb-4"></textarea>
            <button onclick="alert('Message Sent!'); document.getElementById('inbox-popup').classList.add('hidden')" class="w-full bg-black text-white py-4 rounded-2xl font-bold">SEND MESSAGE</button>
            <button onclick="document.getElementById('inbox-popup').classList.add('hidden')" class="w-full py-4 text-gray-400 text-xs uppercase font-bold">Close</button>
        </div>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[2000] glass flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h3 class="raj-font text-center text-xl mb-6">Fast Checkout</h3>
            <input id="o-name" placeholder="Your Name" class="w-full p-4 bg-gray-50 rounded-xl mb-3 outline-none">
            <input id="o-phone" placeholder="Mobile Number" class="w-full p-4 bg-gray-50 rounded-xl mb-3 outline-none">
            <input id="o-city" placeholder="City" class="w-full p-4 bg-gray-50 rounded-xl mb-6 outline-none">
            <button onclick="confirmOrder()" class="w-full bg-black text-white py-4 rounded-xl font-bold">ORDER NOW</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="w-full mt-4 text-gray-400 text-[10px] uppercase font-bold tracking-widest">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, serverTimestamp, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null;

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadData();
                const lastTab = localStorage.getItem('lastTab') || 'feed';
                showTab(lastTab);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        function loadData() {
            // Market Feed
            onSnapshot(collection(db, "products"), s => {
                const g = document.getElementById('sec-feed'); g.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `
                        <div class="bg-white rounded-3xl overflow-hidden border border-gray-50 shadow-sm">
                            <img src="${p.img}" class="w-full aspect-square object-cover">
                            <div class="p-3">
                                <span class="text-[8px] font-bold text-[#d4af37] uppercase">${p.category || 'Shop'}</span>
                                <h4 class="font-bold text-xs truncate">${p.name}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="font-black text-sm">₹${p.price}</span>
                                    <button onclick="triggerOrder('${p.name}', '${p.creatorId}', '${p.price}')" class="bg-black text-white text-[9px] px-3 py-1.5 rounded-lg">Buy</button>
                                </div>
                            </div>
                        </div>`;
                });
            });

            // Orders/Inbox (Delete button included)
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid), orderBy("time", "desc")), s => {
                const l = document.getElementById('order-list'); l.innerHTML = "";
                s.forEach(o => {
                    const d = o.data();
                    const date = d.time ? new Date(d.time.seconds * 1000).toLocaleString('en-IN') : 'Just now';
                    l.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl border border-gray-100 relative">
                            <button onclick="deleteOrder('${o.id}')" class="absolute top-4 right-4 text-gray-200 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold uppercase">${d.customer[0]}</div>
                                <div><h4 class="font-bold text-sm">${d.customer}</h4><p class="text-[10px] text-gray-400">${date}</p></div>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-2xl flex justify-between">
                                <span class="text-xs font-bold">${d.item}</span>
                                <span class="text-xs font-black text-[#d4af37]">₹${d.price}</span>
                            </div>
                            <p class="text-[10px] mt-3 text-gray-500"><i class="fa-solid fa-location-dot mr-1"></i>${d.city} | <i class="fa-solid fa-phone mr-1"></i>${d.phone}</p>
                        </div>`;
                });
            });
        }

        window.showTab = (t) => {
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            localStorage.setItem('lastTab', t);
            if(t === 'shop') viewProfile(curU.uid);
        };

        window.viewProfile = async (uid) => {
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('disp-name').innerText = d.name || "Saini Creator";
                document.getElementById('disp-bio').innerText = d.bio || "Mhara Swagat hai!";
                if(d.profile) document.getElementById('profile-ui').src = d.profile;
            }

            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                const g = document.getElementById('my-grid'); g.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `
                        <div class="bg-white rounded-2xl overflow-hidden border">
                            <img src="${p.img}" class="w-full aspect-square object-cover">
                            <div class="p-2 text-center">
                                <h4 class="font-bold text-[10px] truncate">${p.name}</h4>
                                <p class="text-[10px] font-black">₹${p.price}</p>
                                ${isMe ? `<button onclick="deleteProd('${d.id}')" class="text-red-500 text-[9px] mt-1 uppercase font-bold">Delete</button>` : `<button onclick="triggerOrder('${p.name}', '${uid}', '${p.price}')" class="bg-black text-white text-[8px] px-2 py-1 rounded mt-1">Order</button>`}
                            </div>
                        </div>`;
                });
            });
        };

        window.addProduct = async () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, c = document.getElementById('p-cat').value, d = document.getElementById('p-desc').value, i = document.getElementById('p-img').value, l = document.getElementById('p-link').value;
            if(!n || !p || !i) return alert("Check fields!");
            await addDoc(collection(db, "products"), { name: n, price: p, category: c, desc: d, img: i, link: l, creatorId: curU.uid, time: serverTimestamp() });
            alert("Live!"); document.getElementById('add-box').classList.add('hidden');
        };

        window.saveProfile = async () => {
            const n = document.getElementById('in-name').value, b = document.getElementById('in-bio').value;
            await setDoc(doc(db, "users", curU.uid), { name: n, bio: b }, { merge: true });
            alert("Updated!"); document.getElementById('edit-box').classList.add('hidden');
        };

        window.triggerOrder = (n, cid, p) => { window.targetOrder = { n, cid, p }; document.getElementById('order-modal').classList.remove('hidden'); };
        window.confirmOrder = async () => {
            const n = document.getElementById('o-name').value, ph = document.getElementById('o-phone').value, ct = document.getElementById('o-city').value;
            if(!n || ph.length < 10) return alert("Fill correctly!");
            await addDoc(collection(db, "orders"), { item: window.targetOrder.n, customer: n, phone: ph, city: ct, price: window.targetOrder.p, creatorId: window.targetOrder.cid, time: serverTimestamp() });
            document.getElementById('order-modal').classList.add('hidden'); alert("Order Placed!");
        };

        window.deleteOrder = async (id) => { if(confirm("Delete Order?")) await deleteDoc(doc(db, "orders", id)); };
        window.deleteProd = async (id) => { if(confirm("Delete Product?")) await deleteDoc(doc(db, "products", id)); };
        window.showInboxPopup = () => document.getElementById('inbox-popup').classList.remove('hidden');
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
