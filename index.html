<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahi Shop & Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; color: #1a1a1a; }
        
        /* Premium Glassmorphism & Shahi Effects */
        .shahi-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.4s ease; 
            position: relative; border: 1px solid rgba(255,255,255,0.8);
        }
        .shahi-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .img-frame { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f8f8f8; }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .shahi-card:hover .img-frame img { scale: 1.1; }

        .active-tab { color: #d4af37 !important; position: relative; }
        .active-tab::after { 
            content: ''; position: absolute; bottom: -5px; width: 20px; 
            height: 3px; background: #d4af37; border-radius: 10px; 
        }

        .shahi-btn { 
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: white; font-weight: 700; transition: 0.3s;
        }
        .shahi-btn:active { scale: 0.95; }

        #banner-ui { 
            height: 180px; background-size: cover; background-position: center; 
            background-color: #2c2c2c; border-radius: 0 0 30px 30px; 
        }
        
        .hidden { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-[#f0f2f5]">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md text-center border border-white">
            <div class="w-20 h-20 bg-black text-[#d4af37] rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl">
                <i class="fa-solid fa-crown"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">SHAHI <span class="text-[#d4af37]">SHOP</span></h1>
            <p class="text-gray-400 mb-8 text-sm font-medium">Create your premium digital store</p>
            
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-[#d4af37] outline-none">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-[#d4af37] outline-none">
                <button onclick="handleAuth()" class="w-full shahi-btn p-4 rounded-2xl shadow-lg shadow-yellow-600/20">LOG IN / SIGN UP</button>
            </div>
            <p class="mt-6 text-[11px] text-gray-400 uppercase tracking-widest font-bold">The Royal Experience</p>
        </div>
    </div>

    <div id="main-app" class="hidden pb-28">
        
        <nav class="sticky top-0 bg-white/70 backdrop-blur-xl z-50 px-6 py-5 flex justify-between items-center border-b border-gray-100">
            <h2 class="font-extrabold text-2xl tracking-tighter text-black">SHAHI<span class="text-[#d4af37]">.</span></h2>
            <div class="flex items-center gap-4">
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-xs">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </nav>

        <main class="max-w-md mx-auto">
            
            <section id="sec-feed" class="p-4 pt-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-extrabold text-xl">Explore <span class="text-[#d4af37]">Feed</span></h3>
                    <i class="fa-solid fa-sliders text-gray-400"></i>
                </div>
                <div id="main-feed-grid" class="grid grid-cols-2 gap-5">
                    </div>
            </section>

            <section id="sec-shop" class="hidden">
                <div id="banner-ui" class="relative">
                    <input type="file" id="in-banner" class="hidden" onchange="uploadProfileMedia('banner', this)">
                    <button onclick="document.getElementById('in-banner').click()" class="owner-only absolute top-4 right-4 bg-white/20 backdrop-blur-md text-white w-8 h-8 rounded-full text-xs">
                        <i class="fa-solid fa-camera"></i>
                    </button>
                </div>
                
                <div class="px-6 text-center -mt-12">
                    <div class="relative inline-block">
                        <img id="profile-ui" src="https://via.placeholder.com/150" class="w-28 h-28 rounded-[35px] border-4 border-white shadow-2xl object-cover bg-gray-200">
                        <input type="file" id="in-profile" class="hidden" onchange="uploadProfileMedia('profile', this)">
                        <button onclick="document.getElementById('in-profile').click()" class="owner-only absolute -bottom-2 -right-2 shahi-btn w-9 h-9 rounded-full border-4 border-white flex items-center justify-center text-xs">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                    </div>
                    
                    <h2 id="disp-name" class="font-extrabold text-2xl mt-4">Shahi Creator</h2>
                    <p id="disp-bio" class="text-gray-500 text-sm mt-1 px-4 leading-relaxed">Loading royal bio...</p>
                    
                    <div class="flex justify-center gap-3 mt-5">
                        <a id="btn-wa" class="hidden w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center shadow-sm border border-green-100"><i class="fa-brands fa-whatsapp"></i></a>
                        <a id="btn-insta" class="hidden w-10 h-10 rounded-full bg-pink-50 text-pink-500 flex items-center justify-center shadow-sm border border-pink-100"><i class="fa-brands fa-instagram"></i></a>
                        <button id="btn-share-shop" class="h-10 px-6 rounded-full bg-black text-white text-[11px] font-bold tracking-widest uppercase shadow-lg shadow-black/10"></button>
                    </div>
                </div>

                <div class="owner-only mt-10 mx-4 p-8 bg-white rounded-[35px] shadow-sm border border-gray-50">
                    <h3 class="font-extrabold text-lg mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-[#d4af37] rounded-full"></span> Naya Maal Add Karein
                    </h3>
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="Product Name" class="w-full p-4 rounded-2xl bg-gray-50 outline-none border-none text-sm">
                        <input type="number" id="p-price" placeholder="Price (₹)" class="w-full p-4 rounded-2xl bg-gray-50 outline-none border-none text-sm">
                        
                        <div id="p-preview-box" class="hidden relative group">
                            <img id="p-preview-img" class="w-full h-40 rounded-2xl object-cover">
                            <div class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <p class="text-white text-xs font-bold">Image Ready</p>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="document.getElementById('p-file').click()" class="flex-1 bg-gray-100 p-4 rounded-2xl font-bold text-xs uppercase tracking-wider text-gray-500">
                                <i class="fa-solid fa-image mr-2"></i> Photo
                            </button>
                            <input type="file" id="p-file" class="hidden" onchange="previewProduct(this)">
                            <button id="pub-btn" onclick="publishProduct()" class="hidden flex-[2] shahi-btn p-4 rounded-2xl text-xs uppercase tracking-widest">
                                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Publish
                            </button>
                        </div>
                    </div>
                </div>

                <div id="my-shop-grid" class="grid grid-cols-2 gap-5 p-4 mt-6">
                    </div>
            </section>

            <section id="sec-orders" class="hidden p-6">
                <h2 class="font-extrabold text-2xl mb-8 flex items-center gap-3">
                    <i class="fa-solid fa-receipt text-[#d4af37]"></i> My Orders
                </h2>
                <div id="order-list" class="space-y-4">
                    </div>
            </section>

        </main>

        <div class="fixed bottom-6 left-6 right-6 bg-black/90 backdrop-blur-xl rounded-[30px] p-4 flex justify-around items-center z-50 shadow-2xl border border-white/10">
            <button id="tab-feed" onclick="showTab('feed')" class="text-gray-500 transition-all duration-300">
                <i class="fa-solid fa-house-chimney text-lg"></i>
            </button>
            <button id="tab-shop" onclick="showTab('shop')" class="text-gray-500 transition-all duration-300">
                <i class="fa-solid fa-crown text-lg"></i>
            </button>
            <button id="tab-orders" onclick="showTab('orders')" class="text-gray-500 transition-all duration-300">
                <i class="fa-solid fa-box-open text-lg"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", 
            authDomain: "social-blog-93d38.firebaseapp.com", 
            projectId: "social-blog-93d38", 
            storageBucket: "social-blog-93d38.appspot.com", 
            appId: "1:78643219054:web:dprl2lyih" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, browserLocalPersistence);
        let currentUser = null;

        onAuthStateChanged(auth, u => {
            if(u) {
                currentUser = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                const urlParams = new URLSearchParams(window.location.search);
                const shopId = urlParams.get('shop');
                if(shopId) window.showTab('shop');
                else window.showTab(localStorage.getItem('lastTab') || 'feed');
                
                syncAll();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // GLOBAL NAVIGATION
        window.showTab = (t) => {
            if(t === 'feed' && window.location.search.includes('shop')) {
                window.location.href = window.location.origin + window.location.pathname;
                return;
            }
            localStorage.setItem('lastTab', t);
            ['feed','shop','orders'].forEach(s => {
                const sec = document.getElementById('sec-'+s);
                const tab = document.getElementById('tab-'+s);
                if(sec) sec.classList.toggle('hidden', s !== t);
                if(tab) tab.classList.toggle('active-tab', s === t);
            });
            if(t === 'shop') {
                const urlParams = new URLSearchParams(window.location.search);
                const shopId = urlParams.get('shop');
                window.loadProfile(shopId || currentUser.uid);
            }
        };

        window.loadProfile = async (uid) => {
            const isOwner = (currentUser && currentUser.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isOwner ? el.classList.remove('hidden') : el.classList.add('hidden'));

            const shareBtn = document.getElementById('btn-share-shop');
            if(!isOwner) {
                shareBtn.innerHTML = `<i class="fa-solid fa-house mr-2"></i> Feed`;
                shareBtn.onclick = () => window.showTab('feed');
            } else {
                shareBtn.innerHTML = `<i class="fa-solid fa-share-nodes mr-2"></i> Share`;
                shareBtn.onclick = () => {
                    const link = window.location.origin + window.location.pathname + "?shop=" + currentUser.uid;
                    navigator.clipboard.writeText(link).then(() => alert("Royal Shop Link Copied!"));
                }
            }

            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('disp-name').innerText = d.name || "Shahi Creator";
                document.getElementById('disp-bio').innerText = d.bio || "Welcome to my royal gallery.";
                document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
                document.getElementById('banner-ui').style.backgroundImage = d.banner ? `url(${d.banner})` : "";
                if(d.wa) { document.getElementById('btn-wa').href = "https://wa.me/"+d.wa; document.getElementById('btn-wa').classList.remove('hidden'); }
            }
            syncMyShop(uid);
        };

        function syncAll() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('main-feed-grid');
                grid.innerHTML = "";
                snap.forEach(ds => {
                    const p = ds.data();
                    grid.innerHTML += `
                        <div class="shahi-card" onclick="viewCreator('${p.creatorId}')">
                            <div class="img-frame"><img src="${p.img}"></div>
                            <div class="p-4">
                                <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">New Arrival</p>
                                <p class="text-sm font-bold truncate">${p.name}</p>
                                <p class="text-[#d4af37] font-extrabold text-lg mt-1">₹${p.price}</p>
                            </div>
                        </div>`;
                });
            });
        }

        function syncMyShop(uid) {
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), snap => {
                const grid = document.getElementById('my-shop-grid');
                grid.innerHTML = "";
                const isOwner = (currentUser && currentUser.uid === uid);
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `
                        <div class="shahi-card">
                            ${isOwner ? `<button onclick="deleteProduct('${d.id}')" class="absolute top-2 right-2 w-7 h-7 bg-red-500 text-white rounded-full text-[10px] z-10"><i class="fa-solid fa-trash"></i></button>` : ''}
                            <div class="img-frame"><img src="${p.img}"></div>
                            <div class="p-4">
                                <p class="text-sm font-bold truncate">${p.name}</p>
                                <p class="text-[#d4af37] font-extrabold">₹${p.price}</p>
                            </div>
                        </div>`;
                });
            });
        }

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return alert("Credentials please!");
            signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        };

        window.logout = () => signOut(auth).then(() => { localStorage.clear(); location.href = window.location.origin + window.location.pathname; });

        window.viewCreator = (cid) => {
            window.history.pushState({}, '', '?shop=' + cid);
            window.showTab('shop');
        };

        window.previewProduct = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                window.tempProdImg = e.target.result;
                document.getElementById('p-preview-box').classList.remove('hidden');
                document.getElementById('p-preview-img').src = e.target.result;
                document.getElementById('pub-btn').classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.publishProduct = async () => {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            if(!n || !p || !window.tempProdImg) return alert("Fill everything!");
            
            await addDoc(collection(db, "products"), {
                name: n, price: p, img: window.tempProdImg,
                creatorId: currentUser.uid, time: serverTimestamp()
            });
            location.reload();
        };

        window.uploadProfileMedia = async (type, input) => {
            const reader = new FileReader();
            reader.onload = async e => {
                await setDoc(doc(db, "users", currentUser.uid), { [type]: e.target.result }, { merge: true });
                location.reload();
            };
            reader.readAsDataURL(input.files[0]);
        };
    </script>
</body>
</html>
