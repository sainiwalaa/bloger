<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Royal Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --gold: #FFD700; --black: #050505; --zinc: #18181b; }
        body { background: var(--black); color: #fff; font-family: sans-serif; margin: 0; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .royal-card { background: var(--zinc); border: 1px solid #27272a; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .royal-btn { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; }
        .nav-bar { background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { color: #555; text-align: center; cursor: pointer; font-size: 10px; }
        .nav-item.active { color: var(--gold); }
        .hidden { display: none !important; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 10px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 pb-24">

    <div id="auth-section" class="p-8 pt-20 text-center">
        <h1 class="gold-text text-3xl font-bold tracking-[5px] mb-10">SAINIWALAA</h1>
        <div id="login-box">
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">
            <button onclick="login()" id="login-btn" class="royal-btn">PRAVESH KAREIN</button>
            <p onclick="document.getElementById('login-box').classList.add('hidden'); document.getElementById('reg-box').classList.remove('hidden')" class="text-[10px] mt-4 text-zinc-500 underline">Naya Khata Banayein</p>
        </div>
        <div id="reg-box" class="hidden">
            <input id="reg-name" type="text" placeholder="Tharo Naam (Username)">
            <input id="reg-email" type="email" placeholder="Email">
            <input id="reg-pass" type="password" placeholder="Password">
            <button onclick="register()" id="reg-btn" class="royal-btn">KHATA BANAYEIN</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-4 border-b border-yellow-900/30 text-center sticky top-0 bg-black z-50 flex justify-between items-center">
            <h1 class="gold-text font-bold text-xl tracking-[4px]">SAINIWALAA</h1>
            <button onclick="logout()" class="text-red-500 text-xs"><i class="fa-solid fa-power-off"></i></button>
        </header>

        <section id="darbar-sec" class="p-4 page">
            <div class="flex justify-between items-center mb-4">
                <h2 class="gold-text">🚩 Darbar</h2>
                <button onclick="openCloudinary('post')" class="bg-zinc-800 px-3 py-1 rounded text-[10px]">+ POST</button>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="bazaar-sec" class="p-4 page hidden">
            <h2 class="gold-text mb-4">🛍 Bazaar</h2>
            <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="profile-sec" class="p-4 page hidden">
            <div id="user-info" class="text-center mb-6">
                <div class="w-20 h-20 bg-zinc-800 rounded-full mx-auto border-2 border-yellow-600 mb-2"></div>
                <h3 id="prof-name" class="gold-text font-bold">...</h3>
                <div class="flex justify-center gap-4 text-[10px] mt-2">
                    <span><b>0</b> Followers</span>
                    <span><b>0</b> Following</span>
                </div>
                <button id="follow-btn" class="mt-3 bg-white text-black text-[10px] px-4 py-1 rounded-full hidden">Follow</button>
            </div>
            <div id="admin-orders" class="hidden">
                <h4 class="text-xs gold-text mb-2">📜 Order History (Admin Only)</h4>
                <div id="order-log" class="text-[9px] bg-zinc-900 p-2 rounded"></div>
            </div>
        </section>

        <nav class="nav-bar">
            <div onclick="show('darbar')" class="nav-item active" id="nav-darbar"><i class="fa-solid fa-crown text-xl"></i></div>
            <div onclick="show('bazaar')" class="nav-item" id="nav-bazaar"><i class="fa-solid fa-shop text-xl"></i></div>
            <div onclick="show('profile')" class="nav-item" id="nav-profile"><i class="fa-solid fa-user-circle text-xl"></i></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            messagingSenderId: "78643219054",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH & DATA ---
        window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value);
        window.register = async () => {
            const res = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
            await setDoc(doc(db, "users", res.user.uid), { name: regName.value, email: regEmail.value, followers: [], following: [] });
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, u => {
            if(u) { mainApp.classList.remove('hidden'); authSection.classList.add('hidden'); initSync(); }
            else { mainApp.classList.add('hidden'); authSection.classList.remove('hidden'); }
        });

        // --- LIKE & COMMENT LOGIC ---
        window.likePost = async (id, likes) => {
            const ref = doc(db, "posts", id);
            if(likes.includes(auth.currentUser.uid)) await updateDoc(ref, { likes: arrayRemove(auth.currentUser.uid) });
            else await updateDoc(ref, { likes: arrayUnion(auth.currentUser.uid) });
        };

        function initSync() {
            // Posts with Likes/Comments
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                feedContainer.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    feedContainer.innerHTML += `
                        <div class="royal-card">
                            <img src="${p.url}" class="w-full rounded-lg mb-3">
                            <div class="flex gap-4 mb-2">
                                <i onclick="likePost('${d.id}', ${JSON.stringify(p.likes || [])})" class="fa-heart ${p.likes?.includes(auth.currentUser.uid) ? 'fa-solid text-red-500' : 'fa-regular'} cursor-pointer"></i>
                                <span class="text-xs">${p.likes?.length || 0} Likes</span>
                            </div>
                            <p class="text-[10px] text-zinc-400">${p.caption || ''}</p>
                        </div>`;
                });
            });
            // Show Admin Orders ONLY to you (Matching your UID or Email)
            if(auth.currentUser.email === "your-admin-email@gmail.com") {
                adminOrders.classList.remove('hidden');
                onSnapshot(collection(db, "orders"), snap => {
                    orderLog.innerHTML = "";
                    snap.forEach(o => { const d = o.data(); orderLog.innerHTML += `<p>📦 ${d.product} - ${d.customer} (${d.phone})</p>`; });
                });
            }
        }

        window.show = (p) => {
            document.querySelectorAll('.page').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p + '-sec').classList.remove('hidden');
            document.getElementById('nav-' + p).classList.add('active');
        };
    </script>
</body>
</html>
