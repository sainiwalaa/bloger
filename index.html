<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let currentUserData = null;
        let activePostId = null;

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                    document.getElementById('auth-screen').classList.add('hide');
                    document.getElementById('reg-screen').classList.add('hide');
                    document.getElementById('app').classList.remove('hide');
                    initApp();
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        window.handleAuth = (mode) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(mode === 'login') signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            else createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        window.registerUser = async () => {
            const name = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-username').value.toLowerCase().trim().replace(/\s+/g, '_');
            if(!name || !username) return alert("Hukum, jankari bhariye!");
            
            const unameRef = ref(db, 'usernames/' + username);
            const snap = await get(unameRef);
            if(snap.exists()) return alert("Username pehle se maujood hai!");

            const userData = { name, username, bio: "SainiWalaa Royal Member 🚩", uid: auth.currentUser.uid, photo: "", banner: "" };
            await set(ref(db, 'users/' + auth.currentUser.uid), userData);
            await set(unameRef, auth.currentUser.uid);
            location.reload();
        };

        // --- FEED & SOCIAL ---
        function initApp() {
            onValue(ref(db, 'posts'), (snapshot) => {
                const posts = snapshot.val();
                let html = "";
                if(posts) {
                    Object.keys(posts).reverse().forEach(postId => {
                        const p = posts[postId];
                        html += `
                        <div class="bg-white mb-6 border-b post-card shadow-sm">
                            <div class="p-3 flex items-center gap-3 cursor-pointer" onclick="visitProfile('${p.uid}')">
                                <img src="${p.uPhoto || 'https://via.placeholder.com/100'}" class="w-10 h-10 rounded-full object-cover border-2 border-orange-100">
                                <div class="leading-tight">
                                    <b class="text-sm raj-title italic">${p.uName}</b><br>
                                    <span class="text-[9px] text-gray-400 font-bold uppercase">@${p.uHandle}</span>
                                </div>
                            </div>
                            <div class="bg-black flex items-center justify-center min-h-[300px]">
                                ${p.type==='video' ? `<video src="${p.url}" controls class="w-full max-h-[550px]"></video>` : `<img src="${p.url}" class="w-full max-h-[550px] object-contain">`}
                            </div>
                            <div class="p-4">
                                <div class="flex gap-6 mb-3 text-2xl">
                                    <i class="fa-regular fa-heart cursor-pointer hover:text-red-500" onclick="toggleLike('${postId}')" id="like-icon-${postId}"></i>
                                    <i class="fa-regular fa-comment cursor-pointer hover:text-orange-600" onclick="openComments('${postId}')"></i>
                                </div>
                                <p class="text-sm"><b class="text-xs">@${p.uHandle}</b> ${p.caption || ''}</p>
                            </div>
                        </div>`;
                        updateLikeStatus(postId);
                    });
                }
                document.getElementById('v-feed').innerHTML = html || "<p class='text-center py-20 opacity-30'>No Posts Yet</p>";
            });
            // Profile Update
            document.getElementById('u-prof-img').src = currentUserData.photo || 'https://via.placeholder.com/100';
            document.querySelectorAll('.u-name-display').forEach(el => el.innerText = currentUserData.name);
        }

        window.toggleLike = async (postId) => {
            const likeRef = ref(db, `likes/${postId}/${auth.currentUser.uid}`);
            const snap = await get(likeRef);
            if(snap.exists()) await remove(likeRef);
            else await set(likeRef, true);
        };

        function updateLikeStatus(postId) {
            onValue(ref(db, `likes/${postId}/${auth.currentUser.uid}`), (snap) => {
                const icon = document.getElementById(`like-icon-${postId}`);
                if(icon) {
                    if(snap.exists()) { icon.className = "fa-solid fa-heart text-red-500"; }
                    else { icon.className = "fa-regular fa-heart"; }
                }
            });
        }

        window.openComments = (postId) => {
            activePostId = postId;
            document.getElementById('comment-modal').classList.remove('hide');
            onValue(ref(db, `comments/${postId}`), (snap) => {
                let h = "";
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(k => {
                        h += `<div class="mb-3 p-2 bg-gray-50 rounded-lg text-xs">
                            <b class="text-orange-600">@${data[k].uHandle}</b>: <span>${data[k].text}</span>
                        </div>`;
                    });
                }
                document.getElementById('comment-list').innerHTML = h || "<p class='text-center py-10 opacity-40'>Be the first to comment!</p>";
            });
        };

        window.sendComment = async () => {
            const input = document.getElementById('comm-input');
            if(!input.value.trim()) return;
            await push(ref(db, `comments/${activePostId}`), {
                uHandle: currentUserData.username,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        };

        window.publish = async (mode) => {
            const file = document.getElementById(mode + '-file').files[0];
            const btn = document.getElementById('btn-' + mode);
            if(!file) return alert("Hukum, file chunye!");
            btn.disabled = true; btn.innerText = "⏳ Uploading...";
            
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:"POST", body:fd});
            const d = await res.json();
            
            const item = {
                uid: auth.currentUser.uid,
                uName: currentUserData.name,
                uHandle: currentUserData.username,
                uPhoto: currentUserData.photo,
                url: d.secure_url,
                type: file.type.includes('video') ? 'video' : 'image',
                time: Date.now(),
                caption: document.getElementById(mode + '-desc').value
            };
            await push(ref(db, 'posts'), item);
            closeM(mode + '-modal');
            btn.disabled = false; btn.innerText = "PUBLISH POST";
        };

        window.showPage = (p) => {
            ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide'));
            document.getElementById('v-'+p).classList.remove('hide');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 14px; width: 100%; }
        input, textarea { border: 1.5px solid #eee !important; padding: 12px; border-radius: 12px; margin-bottom: 8px; width: 100%; outline: none; font-size: 13px; background: #fcfcfc; }
        .nav-icon { font-size: 1.4rem; color: #d1d5db; cursor: pointer; }
    </style>
</head>
<body class="flex justify-center bg-gray-50">

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white">
        <h1 class="text-5xl font-black raj-title text-center italic tracking-tighter mb-12">SainiWalaa</h1>
        <input type="email" id="auth-email" placeholder="Email Address">
        <input type="password" id="auth-pass" placeholder="Password (Min 6)">
        <button onclick="handleAuth('login')" class="btn-royal mb-4 shadow-xl">STUDIO LOGIN</button>
        <button onclick="handleAuth('signup')" class="text-xs font-bold text-gray-400 text-center uppercase tracking-widest">Register New Account</button>
    </div>

    <div id="reg-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide text-center bg-white">
        <h2 class="text-2xl font-black raj-title mb-8 uppercase italic">Swaagat Hai Sa!</h2>
        <input type="text" id="reg-name" placeholder="Aapka Naam">
        <div class="relative"><span class="absolute left-4 top-3.5 text-orange-600 font-bold">@</span><input type="text" id="reg-username" placeholder="unique_id" class="!pl-10"></div>
        <button id="btn-reg" onclick="registerUser()" class="btn-royal mt-4 shadow-xl">START ROYAL JOURNEY 🚩</button>
    </div>

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-20 hide bg-white shadow-2xl">
        <header class="sticky top-0 bg-white/90 backdrop-blur-lg border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic tracking-tighter">SAINIWALAA</h1>
            <div class="flex gap-5">
                <i class="fa-solid fa-square-plus text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
            </div>
        </header>

        <main id="v-feed" class="pb-10"></main>

        <main id="v-shop" class="hide p-4">
            <p class="text-center py-20 opacity-40">Bazaar is coming soon...</p>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-32 bg-gray-200 bg-cover bg-center relative" id="u-banner-img">
                <img id="u-prof-img" src="" class="w-20 h-20 rounded-full absolute -bottom-10 left-6 border-4 border-white object-cover shadow-xl">
            </div>
            <div class="mt-12 p-6">
                <h2 class="text-2xl font-black u-name-display uppercase raj-title italic leading-none"></h2>
                <button onclick="signOut(auth).then(()=>location.reload())" class="mt-4 bg-red-50 text-red-600 px-6 py-2 rounded-full text-[10px] font-black uppercase">Logout</button>
            </div>
            <div id="profile-grid" class="grid grid-cols-3 gap-0.5 mt-4"></div>
        </main>

        <div id="comment-modal" class="fixed inset-0 bg-black/50 z-[1000] hide flex items-end">
            <div class="bg-white w-full max-w-[450px] h-[60vh] rounded-t-[30px] p-6 flex flex-col">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6" onclick="closeM('comment-modal')"></div>
                <h3 class="text-center font-black text-gray-400 text-[10px] uppercase tracking-widest mb-4">Royal Comments</h3>
                <div id="comment-list" class="flex-1 overflow-y-auto px-2"></div>
                <div class="mt-4 flex gap-2 border-t pt-4">
                    <input type="text" id="comm-input" placeholder="Yahan likhein sa..." class="!mb-0 !rounded-full text-xs">
                    <button onclick="sendComment()" class="bg-orange-600 text-white w-12 h-12 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[600] hide p-8 flex flex-col justify-center">
            <h2 class="text-3xl font-black raj-title mb-8 text-center italic">NEW POST</h2>
            <input type="file" id="post-file" accept="image/*,video/*">
            <textarea id="post-desc" placeholder="Caption likhein..." class="h-32"></textarea>
            <button onclick="publish('post')" id="btn-post" class="btn-royal">PUBLISH 🚩</button>
            <button onclick="closeM('post-modal')" class="mt-4 text-xs font-bold text-gray-400">Peeche Jayein</button>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-shop nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-circle-user nav-icon"></i>
        </nav>
    </div>
</body>
</html>
