<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        // Firebase Modular SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "sainiwalaa_preset";

        // --- AUTH ---
        window.userLogin = () => {
            const ph = document.getElementById('login-phone').value;
            const nm = document.getElementById('login-name').value;
            if(ph.length < 10 || !nm) return alert("Details bhariye sa!");
            localStorage.setItem('s_uid', ph);
            localStorage.setItem('s_name', nm);
            location.reload();
        };

        const uid = localStorage.getItem('s_uid');
        if(!uid) {
            document.getElementById('login-screen').classList.remove('hide');
        } else {
            document.getElementById('app').classList.remove('hide');
            // Listen for Posts
            onValue(ref(db, 'posts'), (snap) => renderFeed(snap.val()), (err) => console.error(err));
            // Listen for Products
            onValue(ref(db, 'products'), (snap) => renderShop(snap.val()), (err) => console.error(err));
            document.getElementById('u-display-name').innerText = localStorage.getItem('s_name');
        }

        // --- PUBLISH ---
        window.publish = async (mode) => {
            const file = document.getElementById(mode === 'post' ? 'post-file' : 'prod-file').files[0];
            const btn = document.getElementById(mode === 'post' ? 'btn-post' : 'btn-prod');
            if(!file) return alert("Photo zaroori hai!");

            btn.disabled = true; btn.innerText = "Royal Processing... ⏳";

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                const cRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:"POST", body:formData});
                const cData = await cRes.json();

                const data = {
                    uid: uid,
                    uName: localStorage.getItem('s_name'),
                    img: cData.secure_url,
                    time: Date.now()
                };

                if(mode === 'post') {
                    data.caption = document.getElementById('post-cap').value;
                    await push(ref(db, 'posts'), data);
                } else {
                    data.name = document.getElementById('prod-name').value;
                    data.price = document.getElementById('prod-price').value;
                    data.link = document.getElementById('prod-link').value || "#";
                    await push(ref(db, 'products'), data);
                }
                alert("Mubarak! Post ho gaya.");
                closeM(mode + '-modal');
            } catch (e) { alert("Error: " + e.message); }
            btn.disabled = false; btn.innerText = "PUBLISH";
        };

        // --- RENDER ---
        function renderFeed(data) {
            let h = "";
            let myCount = 0;
            let myProfH = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    h += `<div class="bg-white border-b-8 border-orange-50 mb-4">
                        <div class="p-3 flex justify-between items-center font-bold text-red-900 text-sm italic">
                            <span>🚩 ${p.uName}</span>
                            ${p.uid === uid ? `<i class="fa-solid fa-trash text-gray-300" onclick="del('posts','${k}')"></i>` : ''}
                        </div>
                        <img src="${p.img}" class="w-full h-80 object-cover">
                        <div class="p-4 text-sm"><b>${p.uName}</b> ${p.caption || ''}</div>
                    </div>`;
                    if(p.uid === uid) { myCount++; myProfH += `<img src="${p.img}" class="aspect-square object-cover">`; }
                });
            }
            document.getElementById('v-feed').innerHTML = h || "<p class='text-center py-20'>No posts.</p>";
            document.getElementById('profile-grid').innerHTML = myProfH;
            document.getElementById('c-posts').innerText = myCount;
        }

        function renderShop(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    h += `<div class="bg-white border rounded-xl overflow-hidden relative shadow-sm">
                        ${p.uid === uid ? `<i class="fa-solid fa-circle-xmark absolute top-1 right-1 text-red-500" onclick="del('products','${k}')"></i>` : ''}
                        <img src="${p.img}" class="w-full h-32 object-cover">
                        <div class="p-2 text-center">
                            <b class="text-[10px] block truncate">${p.name}</b>
                            <b class="text-orange-600 text-xs">₹${p.price}</b>
                            <button onclick="window.open('${p.link}','_blank')" class="w-full bg-red-800 text-white text-[9px] mt-1 py-1 rounded">BUY</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center py-10'>Shop is empty.</p>";
        }

        window.del = async (p, k) => { if(confirm("Hata dein?")) await remove(ref(db, `${p}/${k}`)); };
        window.showPage = (p) => {
            ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide'));
            ['n-feed','n-shop','n-profile'].forEach(n => document.getElementById(n).classList.replace('text-orange-600', 'text-gray-300'));
            document.getElementById('v-'+p).classList.remove('hide');
            document.getElementById('n-'+p).classList.replace('text-gray-300', 'text-orange-600');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
    <style>
        .hide { display: none !important; }
        .btn-royal { background: linear-gradient(45deg, #991b1b, #FF9933); color: white; font-weight: bold; border-radius: 10px; padding: 12px; width: 100%; }
        input, textarea { border: 1px solid #ddd !important; padding: 10px; border-radius: 10px; margin-bottom: 10px; width: 100%; outline: none; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center">

<div id="login-screen" class="w-full max-w-[450px] min-h-screen bg-white flex flex-col items-center justify-center p-8 hide">
    <h1 class="text-4xl font-black italic text-red-800 mb-6">SainiWalaa</h1>
    <input type="number" id="login-phone" placeholder="Mobile Number">
    <input type="text" id="login-name" placeholder="Aapko Naam">
    <button onclick="userLogin()" class="btn-royal">ENTER STUDIO</button>
</div>

<div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-xl relative pb-20 hide">
    <header class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-[50]">
        <h1 class="text-xl font-black italic text-red-800">SainiWalaa</h1>
        <div class="flex gap-4 text-orange-700">
            <i class="fa-solid fa-camera" onclick="openM('post-modal')"></i>
            <i class="fa-solid fa-cart-plus" onclick="openM('prod-modal')"></i>
            <i class="fa-solid fa-power-off text-red-500" onclick="logout()"></i>
        </div>
    </header>

    <main id="v-feed"></main>
    <main id="v-shop" class="p-4 hide"><div id="bazaar-grid" class="grid grid-cols-2 gap-4"></div></main>
    <main id="v-profile" class="hide">
        <div class="p-6 bg-orange-50/30 border-b">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-full bg-orange-200"></div>
                <div><b id="c-posts" class="text-xl">0</b><p class="text-[10px] font-bold text-gray-400 uppercase">Posts</p></div>
            </div>
            <h2 id="u-display-name" class="font-bold mt-2 text-red-900"></h2>
        </div>
        <div id="profile-grid" class="grid grid-cols-3 gap-0.5"></div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around shadow-inner z-[100]">
        <i onclick="showPage('feed')" id="n-feed" class="fa-solid fa-house text-2xl text-orange-600"></i>
        <i onclick="showPage('shop')" id="n-shop" class="fa-solid fa-bag-shopping text-2xl text-gray-300"></i>
        <i onclick="showPage('profile')" id="n-profile" class="fa-solid fa-circle-user text-2xl text-gray-300"></i>
    </nav>

    <div id="post-modal" class="fixed inset-0 bg-white z-[200] hide p-8">
        <div class="flex justify-between mb-4"><b class="text-xl italic">New Post</b><i class="fa-solid fa-xmark" onclick="closeM('post-modal')"></i></div>
        <input type="file" id="post-file">
        <textarea id="post-cap" placeholder="Caption..."></textarea>
        <button onclick="publish('post')" id="btn-post" class="btn-royal">POST</button>
    </div>
    <div id="prod-modal" class="fixed inset-0 bg-white z-[200] hide p-8">
        <div class="flex justify-between mb-4"><b class="text-xl italic">Add Product</b><i class="fa-solid fa-xmark" onclick="closeM('prod-modal')"></i></div>
        <input type="file" id="prod-file">
        <input type="text" id="prod-name" placeholder="Item Name">
        <input type="number" id="prod-price" placeholder="Price">
        <input type="text" id="prod-link" placeholder="Buy Link">
        <button onclick="publish('prod')" id="btn-prod" class="btn-royal">LIST</button>
    </div>
</div>

</body>
</html>
