<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Royal Darbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --black: #050505; }
        body { background: var(--black); color: #fff; font-family: sans-serif; margin: 0; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        .royal-btn { background: var(--gold); color: #000; font-weight: bold; padding: 14px; border-radius: 12px; width: 100%; border: none; cursor: pointer; }
        .royal-btn:disabled { opacity: 0.6; }
        .royal-input { width: 100%; background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 12px; color: #fff; border-radius: 10px; outline: none; }
        .nav-bar { background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { color: #555; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 pb-20">

    <header class="p-5 border-b border-yellow-800/40 text-center sticky top-0 bg-black z-50">
        <h1 class="gold-text font-bold text-2xl tracking-[8px]">SAINIWALAA</h1>
    </header>

    <section id="darbar-sec" class="p-6">
        <h2 class="gold-text italic mb-6">🚩 Shahi Darbar</h2>
        <div class="bg-zinc-900/50 p-10 rounded-3xl border border-zinc-800 text-center italic text-zinc-600">
            Darbar khali hai... Kuch post karein hukum.
        </div>
    </section>

    <section id="bazaar-sec" class="p-6 hidden">
        <h2 class="gold-text italic mb-6">🛍 Shahi Bazaar</h2>
        <div class="bg-zinc-900 p-5 rounded-2xl border border-yellow-600/20">
            <input id="p-name" placeholder="Maal ko Naam" class="royal-input">
            <input id="p-price" placeholder="Keemat ₹" class="royal-input">
            <button id="save-btn" onclick="saveToBazaar()" class="royal-btn">MAAL SAVE KARO 👑</button>
        </div>
        <div id="list-container" class="mt-8 grid grid-cols-2 gap-4"></div>
    </section>

    <nav class="nav-bar">
        <div onclick="show('darbar')" id="btn-darbar" class="nav-item active"><i class="fa-solid fa-crown text-xl"></i></div>
        <div onclick="show('bazaar')" id="btn-bazaar" class="nav-item"><i class="fa-solid fa-shop text-xl"></i></div>
    </nav>

    <script>
        function show(page) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(page + '-sec').classList.remove('hidden');
            document.getElementById('btn-' + page).classList.add('active');
        }

        function saveToBazaar() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = "Tharo hukum likhayo ja ryo hai...";
            
            setTimeout(() => {
                const name = document.getElementById('p-name').value;
                const price = document.getElementById('p-price').value;
                if(name && price) {
                    document.getElementById('list-container').innerHTML += `
                        <div class="bg-zinc-900 p-3 rounded-xl border border-zinc-800">
                            <p class="gold-text text-sm font-bold">${name}</p>
                            <p class="text-xs">₹${price}</p>
                        </div>`;
                }
                btn.disabled = false;
                btn.innerHTML = "MAAL SAVE KARO 👑";
                alert("Hukum, maal bazaar mein darj ho gayo!");
            }, 1500);
        }
    </script>
</body>
</html>
