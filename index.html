<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userCache = null;
        let activePostId = null;
        let viewingUid = null;

        // --- AUTH & REFRESH LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                userCache = snap.val() || {};
                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('app').classList.remove('hide');
                initApp();
                showPage(localStorage.getItem('saini_lastPage') || 'feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        function initApp() {
            // Feed
            onValue(ref(db, 'posts'), s => {
                const feed = document.getElementById('v-feed');
                feed.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    feed.innerHTML += `
                        <div class="bg-white mb-4 border-b">
                            <div class="p-3 flex items-center gap-2 cursor-pointer" onclick="visitUser('${p.uid}')">
                                <img src="${p.uPhoto}" class="w-10 h-10 chokor border-2 border-orange-600">
                                <b class="text-xs raj-title">${p.uName}</b>
                            </div>
                            <img src="${p.url}" class="w-full max-h-[500px] object-cover bg-black">
                            <div class="p-4 flex gap-6 text-2xl">
                                <i class="fa-solid fa-heart text-gray-200" id="l-${k}" onclick="toggleLike('${k}')"></i>
                                <i class="fa-regular fa-comment" onclick="openCommentModal('${k}')"></i>
                            </div>
                            <p class="px-4 pb-4 text-xs"><b>@${p.uHandle}</b> ${p.caption}</p>
                        </div>`;
                });
            });

            // Shop & Profile
            loadProfileData(auth.currentUser.uid);
        }

        window.loadProfileData = (uid) => {
            viewingUid = uid;
            const isMine = (uid === auth.currentUser.uid);
            document.getElementById('edit-btn-group').style.display = isMine ? 'flex' : 'none';
            document.getElementById('shop-admin-controls').style.display = isMine ? 'flex' : 'none';
            
            onValue(ref(db, 'users/' + uid), s => {
                const d = s.val();
                document.getElementById('u-name-profile').innerText = d.name;
                document.getElementById('u-id-display').innerText = "STUDIO ID: " + d.username;
                document.getElementById('u-bio-profile').innerText = d.bio || "Royal Studio 🚩";
                document.getElementById('u-prof-img').src = d.photo || 'https://via.placeholder.com/150';
                document.getElementById('u-banner').src = d.banner || 'https://images.unsplash.com/photo-1590050752117-23a9d7fc2173';
                document.getElementById('web-link-btn').href = d.website || "#";
                document.getElementById('web-link-btn').innerText = d.website ? "VISIT WEBSITE" : "NO WEBSITE";
            });

            // Load User's Posts in Grid
            onValue(ref(db, 'posts'), s => {
                const grid = document.getElementById('user-posts-grid'); grid.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    if(data[k].uid === uid) grid.innerHTML += `<img src="${data[k].url}" class="w-full h-32 chokor">`;
                });
            });
        };

        // --- SEARCH SYSTEM ---
        window.searchUser = async () => {
            const id = document.getElementById('search-input').value.toLowerCase();
            if(!id) return;
            const q = query(ref(db, 'users'), orderByChild('username'), equalTo(id));
            const snap = await get(q);
            if(snap.exists()) {
                const targetUid = Object.keys(snap.val())[0];
                visitUser(targetUid);
            } else {
                alert("Hukum, is ID ko koi milo koni!");
            }
        };

        window.visitUser = (uid) => {
            loadProfileData(uid);
            showPage('profile');
        };

        // --- RAJASTHANI RESPONSES & ACTIONS ---
        window.submitPost = async () => {
            const btn = document.getElementById('btn-post');
            btn.innerText = "SABAR RAKHO...";
            await push(ref(db, 'posts'), {
                uid: auth.currentUser.uid, uName: userCache.name, uHandle: userCache.username,
                uPhoto: userCache.photo, url: document.getElementById('p-url').value,
                caption: document.getElementById('p-cap').value, date: new Date().toLocaleDateString()
            });
            alert("Hukum, thari post lag gayi!");
            btn.innerText = "POST NOW";
            closeM('post-modal');
        };

        window.saveProfile = async () => {
            const up = {
                name: document.getElementById('ed-name').value,
                bio: document.getElementById('ed-bio').value,
                website: document.getElementById('ed-web').value,
                photo: document.getElementById('ed-photo').value,
                banner: document.getElementById('ed-banner').value
            };
            await update(ref(db, 'users/' + auth.currentUser.uid), up);
            alert("Hukum, Profile badal di hai!");
            location.reload();
        };

        window.showPage = (p) => {
            localStorage.setItem('saini_lastPage', p);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById('v-' + p).classList.remove('hide');
        };

        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; border-radius: 8px; padding: 12px; font-weight: 900; text-transform: uppercase; }
        .chokor { border-radius: 4px; object-fit: cover; }
        .web-box { border: 3px solid #000; background: #fff; padding: 15px; border-radius: 0px; font-weight: 900; color: #000; text-align: center; display: block; box-shadow: 6px 6px 0px #ea580c; text-decoration: none; font-size: 14px; }
        .nav-icon { font-size: 1.5rem; color: #d1d5db; cursor: pointer; }
        input { border: 2px solid #eee !important; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body class="flex justify-center bg-gray-100">

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-24 hide bg-white shadow-2xl">
        
        <header class="sticky top-0 bg-white/95 border-b p-4 flex justify-between items-center z-50">
            <div>
                <h1 class="text-2xl font-black raj-title italic leading-none" onclick="location.reload()">SAINIWALAA</h1>
                <p id="u-id-display" class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter"></p>
            </div>
            <div class="flex gap-4">
                <i class="fa-solid fa-magnifying-glass text-gray-400 text-xl" onclick="openM('search-modal')"></i>
                <i class="fa-solid fa-square-plus text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
            </div>
        </header>

        <div id="search-modal" class="fixed inset-0 bg-black/90 z-[3000] hide p-10">
            <input type="text" id="search-input" placeholder="Enter Studio ID..." class="text-center text-xl font-bold">
            <button onclick="searchUser()" class="btn-royal w-full">SEARCH STUDIO 🚩</button>
            <button onclick="closeM('search-modal')" class="w-full mt-4 text-white text-xs">CLOSE</button>
        </div>

        <main id="v-feed"></main>

        <main id="v-shop" class="hide p-4">
            <div id="shop-admin-controls" class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black raj-title italic">MY BAZAAR 🚩</h2>
                <button onclick="openM('shop-modal')" class="bg-black text-white text-[9px] px-3 py-1 rounded-full">+ ADD ITEM</button>
            </div>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-44 bg-gray-100 relative">
                <img id="u-banner" class="w-full h-full object-cover">
                <img id="u-prof-img" class="w-28 h-28 absolute -bottom-10 left-6 border-4 border-white shadow-xl chokor bg-white">
            </div>
            <div class="mt-14 p-6">
                <h2 id="u-name-profile" class="text-3xl font-black raj-title italic leading-none"></h2>
                <p id="u-bio-profile" class="text-gray-500 text-xs mt-4 italic"></p>
                
                <a id="web-link-btn" href="#" target="_blank" class="web-box mt-6 uppercase">VISIT WEBSITE</a>

                <div id="edit-btn-group" class="grid grid-cols-2 gap-3 mt-8">
                    <button onclick="openM('edit-modal')" class="bg-black text-white py-3 rounded-lg text-[10px] font-black uppercase tracking-widest">Edit Studio</button>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-600 py-3 rounded-lg text-[10px] font-black uppercase">Logout</button>
                </div>
            </div>
            <div class="border-t p-1 grid grid-cols-3 gap-1" id="user-posts-grid"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-5 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-crown nav-icon"></i>
        </nav>

        <div id="post-modal" class="fixed inset-0 bg-black/80 z-[2000] hide flex items-center justify-center p-6">
            <div class="bg-white w-full rounded-xl p-6">
                <h2 class="text-xl font-black raj-title mb-4">NEW POST 🚩</h2>
                <input type="text" id="p-url" placeholder="Image URL">
                <textarea id="p-cap" class="w-full border p-2 rounded-lg" placeholder="Caption..."></textarea>
                <button id="btn-post" onclick="submitPost()" class="btn-royal w-full mt-4">POST NOW</button>
                <button onclick="closeM('post-modal')" class="w-full mt-2 text-xs text-gray-400">CLOSE</button>
            </div>
        </div>

        <div id="edit-modal" class="fixed inset-0 bg-white z-[3000] hide p-10 overflow-y-auto">
            <h2 class="text-2xl font-black raj-title mb-6">EDIT STUDIO</h2>
            <input type="text" id="ed-name" placeholder="Full Name">
            <input type="text" id="ed-photo" placeholder="Profile Image URL">
            <input type="text" id="ed-banner" placeholder="Banner Image URL">
            <input type="text" id="ed-web" placeholder="Website Link">
            <textarea id="ed-bio" class="w-full border p-2 rounded-lg mb-4" placeholder="Bio..."></textarea>
            <button onclick="saveProfile()" class="btn-royal w-full">SAVE CHANGES 🚩</button>
            <button onclick="closeM('edit-modal')" class="w-full mt-4 text-xs">CANCEL</button>
        </div>

    </div>

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white text-center">
        <h1 class="text-5xl font-black raj-title mb-2 italic">SainiWalaa</h1>
        <p class="text-[10px] font-bold text-gray-300 mb-10 tracking-[5px] uppercase">Royal Studio</p>
        <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
        <button onclick="signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value)" class="btn-royal shadow-2xl mt-4">ENTER STUDIO</button>
    </div>

</body>
</html>
