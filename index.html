<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Royal Rajasthani Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
</head>
<body class="bg-black text-white overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
        <div class="royal-spinner mb-4"></div>
        <p class="gold-text font-serif italic">Ghani Khamma Hukum...</p>
    </div>

    <header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-yellow-900/30 p-4">
        <h1 class="text-center gold-text text-2xl font-serif tracking-[8px] glow-text">SAINIWALAA</h1>
    </header>

    <main class="mt-20 pb-24 px-4 max-w-[500px] mx-auto">
        
        <section id="darbar-sec" class="page-sec">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-serif gold-text">🚩 Shahi Darbar</h2>
                <button onclick="openPostModal()" class="royal-btn-sm">+ Likho</button>
            </div>
            <div id="feed-container" class="space-y-6">
                </div>
        </section>

        <section id="bazaar-sec" class="page-sec hidden">
            <h2 class="text-xl font-serif gold-text mb-6">🛍 Shahi Bazaar</h2>
            <div id="shop-container" class="grid grid-cols-2 gap-4">
                </div>
        </section>

        <section id="aap-sec" class="page-sec hidden">
            <div class="profile-header relative mb-20">
                <div class="banner h-32 w-full rounded-2xl bg-gradient-to-r from-yellow-900/40 to-black border border-yellow-900/20"></div>
                <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                    <img id="user-avatar" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-4 border-black ring-2 ring-yellow-600 object-cover shadow-2xl">
                    <div class="mb-2">
                        <h3 class="text-lg font-bold">Sunil Saini</h3>
                        <p class="text-xs text-zinc-500">@royal_studio</p>
                    </div>
                </div>
            </div>
            
            <div class="stats flex justify-around py-6 border-y border-zinc-900 my-6">
                <div class="text-center"><p class="font-bold text-lg" id="p-count">0</p><p class="text-[10px] text-zinc-500 uppercase">Post</p></div>
                <div class="text-center"><p class="font-bold text-lg" id="f-count">0</p><p class="text-[10px] text-zinc-500 uppercase">Saathi</p></div>
                <button onclick="switchTab('orders')" class="royal-btn-sm text-[10px]">Order List</button>
            </div>

            <div id="my-products" class="grid grid-cols-2 gap-4">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[500px] bg-black/95 border-t border-yellow-900/20 flex justify-around py-4 z-50">
        <button onclick="switchPage('darbar')" class="nav-btn active" id="btn-darbar">
            <i class="fa-solid fa-fort-awesome text-xl"></i>
            <span class="text-[10px] block mt-1">Darbar</span>
        </button>
        <button onclick="switchPage('bazaar')" class="nav-btn" id="btn-bazaar">
            <i class="fa-solid fa-shop text-xl"></i>
            <span class="text-[10px] block mt-1">Bazaar</span>
        </button>
        <button onclick="switchPage('aap')" class="nav-btn" id="btn-aap">
            <i class="fa-solid fa-user-crown text-xl"></i>
            <span class="text-[10px] block mt-1">Aap</span>
        </button>
    </nav>

    <div id="order-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-yellow-600/30 p-8 rounded-[2rem] w-full max-w-md">
            <h3 class="gold-text text-xl font-serif mb-6 italic">Kharidari ki Taiyari...</h3>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Tharo Naam (Name)" class="royal-input">
                <input type="number" id="cust-phone" placeholder="Mobile Number" class="royal-input">
                <textarea id="cust-address" placeholder="Pura Pata (Address)" class="royal-input h-24"></textarea>
                <button id="final-order-btn" class="royal-btn w-full py-4 mt-4">SAUDA PAKKO KARO</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
