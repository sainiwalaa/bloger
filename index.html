<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Royal Creator Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; }
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header-container { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold) !important; font-weight: 800; }
        .hidden { display: none !important; }
        .product-card { transition: 0.3s; border-radius: 24px; background: #fff; border: 1px solid #eee; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <h1 class="raj-font text-4xl animate-bounce text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <section id="auth-box" class="fixed inset-0 bg-white/95 z-[2000] flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-md bg-white p-10 rounded-[40px] shadow-2xl text-center border">
            <h2 class="raj-font text-4xl text-[#d4af37] mb-6">Access</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-50 rounded-2xl border outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl border outline-none">
            <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-2xl font-bold">Login / Sign Up</button>
            <button onclick="document.getElementById('auth-box').classList.add('hidden')" class="mt-4 text-gray-400 text-sm">Close</button>
        </div>
    </section>

    <header class="saini-header-container py-6 text-center">
        <h1 class="raj-font text-4xl font-black tracking-widest text-[#d4af37] cursor-pointer" onclick="location.reload()">SAINIWALAA</h1>
        <div class="flex justify-center gap-6 mt-4 text-[11px] font-bold uppercase text-gray-400">
            <button onclick="nav('feed')" id="n-feed">Trending</button>
            <button onclick="checkAuthAndNav('shop')" id="n-shop">My Studio</button>
            <button onclick="checkAuthAndNav('orders')" id="n-orders">Orders</button>
            <button id="logout-btn" onclick="logout()" class="text-red-400 hidden">Logout</button>
        </div>
    </header>

    <main class="mt-6 px-6 max-w-6xl mx-auto">
        <section id="sec-feed"><div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div></section>
        
        <section id="sec-shop" class="hidden">
            <div class="bg-black rounded-[40px] p-8 text-center text-white relative mb-8">
                <div class="relative inline-block">
                    <img id="p-img" class="w-28 h-28 rounded-3xl border-4 border-[#d4af37] object-cover mb-4 bg-white">
                    <label class="owner-btn hidden absolute bottom-2 right-0 bg-white text-black p-2 rounded-full cursor-pointer shadow-lg"><i class="fa-solid fa-camera"></i><input type="file" class="hidden" onchange="upMedia('profile', this)"></label>
                </div>
                <h2 id="u-name" class="raj-font text-2xl font-bold text-[#d4af37]">Creator Name</h2>
                <p id="u-bio" class="text-gray-400 text-sm italic mt-1">Welcome to my shop</p>
                <div id="u-socials" class="flex justify-center gap-4 mt-4"></div>
                <button onclick="openEditModal()" class="owner-btn hidden mt-6 border border-[#d4af37] text-[#d4af37] px-6 py-2 rounded-full text-[10px] font-bold uppercase">Settings</button>
            </div>

            <div id="add-prod-box" class="owner-btn hidden bg-white p-8 rounded-[40px] border-2 border-dashed mb-8">
                <h3 class="raj-font mb-4 font-bold">List New Item</h3>
                <input id="pn" placeholder="Item Name" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl border outline-none">
                <textarea id="pd" placeholder="Short Description..." class="w-full p-4 mb-3 bg-gray-50 rounded-2xl border h-20 outline-none"></textarea>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input id="pp" type="number" placeholder="Price (₹)" class="p-4 bg-gray-50 rounded-2xl border outline-none">
                    <input id="pl" placeholder="Action Link (Optional)" class="p-4 bg-gray-50 rounded-2xl border outline-none">
                </div>
                <div class="flex gap-3">
                    <label for="pf" id="pf-label" class="flex-1 p-4 bg-gray-100 text-center rounded-2xl cursor-pointer text-sm font-bold">Upload Image</label>
                    <input type="file" id="pf" onchange="preProd(this)" class="hidden">
                    <button onclick="pubProd()" id="pub-btn" class="hidden flex-1 bg-black text-white p-4 rounded-2xl font-bold">Publish Now</button>
                </div>
            </div>
            <div id="grid-shop" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-orders" class="hidden">
            <h2 class="raj-font text-2xl mb-6">Sales History</h2>
            <div id="list-orders" class="grid gap-4 md:grid-cols-2"></div>
        </section>
    </main>

    <div id="edit-modal" class="hidden fixed inset-0 z-[3000] bg-black/90 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 max-h-[90vh] overflow-y-auto">
            <h3 class="raj-font text-xl mb-6 text-center">Studio Settings</h3>
            <div class="space-y-4">
                <input id="en" placeholder="Display Name" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <input id="eb" placeholder="Bio Message" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <p class="text-[10px] font-bold text-gray-400 uppercase ml-2">Social Links</p>
                <div class="grid grid-cols-2 gap-3">
                    <input id="e-insta" placeholder="Insta Username" class="p-4 bg-gray-50 rounded-2xl border text-sm">
                    <input id="e-wa" placeholder="WhatsApp No." class="p-4 bg-gray-50 rounded-2xl border text-sm">
                    <input id="e-yt" placeholder="YouTube URL" class="p-4 bg-gray-50 rounded-2xl border text-sm">
                    <input id="e-fb" placeholder="Facebook URL" class="p-4 bg-gray-50 rounded-2xl border text-sm">
                </div>
                <button onclick="saveProfile()" class="w-full bg-[#d4af37] text-white p-5 rounded-3xl font-bold shadow-lg">Update Studio</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full text-gray-400 text-xs uppercase font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[3000] bg-black/95 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[50px] p-8 text-center">
            <h3 class="raj-font text-2xl mb-2 text-[#d4af37]">Finalize Order</h3>
            <p id="order-item-name" class="text-xs font-bold mb-6 text-gray-400 uppercase tracking-widest"></p>
            <div class="space-y-3">
                <input id="on" placeholder="Your Full Name" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <input id="op" type="tel" maxlength="10" placeholder="10 Digit Mobile No." class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <input id="oc" placeholder="Your City" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
            </div>
            <button onclick="confirmPurchase()" class="w-full mt-6 bg-black text-white p-5 rounded-3xl font-bold">Place Order Now</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-4 text-gray-400 text-xs font-bold uppercase">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, query, where, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.curU = null;
        let allProds = [];

        onAuthStateChanged(auth, u => {
            curU = u;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('logout-btn').classList.toggle('hidden', !u);
            initApp();
        });

        function initApp() {
            nav('feed');
            onSnapshot(collection(db, "products"), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed', false);
            });
            if(curU) {
                onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                    const list = document.getElementById('list-orders');
                    list.innerHTML = s.docs.map(d => {
                        const o = d.data();
                        return `<div class="p-6 bg-white rounded-3xl border-2 shadow-sm">
                            <h4 class="font-black">${o.item} - ₹${o.price || ''}</h4>
                            <p class="text-sm text-gray-600 mt-1">${o.customer} (${o.phone})</p>
                            <p class="text-sm text-gray-500 italic">${o.city}</p>
                            <div class="mt-3 pt-3 border-t text-[10px] text-[#d4af37] font-bold uppercase">Received: ${o.date} @ ${o.time_str}</div>
                        </div>`;
                    }).join('');
                });
            }
        }

        window.renderGrid = (data, cid, isOwner) => {
            const g = document.getElementById(cid);
            g.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="w-full aspect-square object-cover cursor-pointer" onclick="viewProfile('${p.creatorId}')">
                    <div class="p-4">
                        <p class="text-[9px] font-black text-[#d4af37] uppercase mb-1">@${p.creatorName}</p>
                        <h4 class="font-bold truncate text-sm">${p.name}</h4>
                        <p class="text-[11px] text-gray-500 line-clamp-2 my-1 leading-relaxed">${p.desc || ''}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="font-black text-sm">₹${p.price}</span>
                            <button onclick="orderForm('${p.id}')" class="bg-black text-white text-[9px] px-4 py-2 rounded-xl font-bold">GET IT</button>
                        </div>
                        ${isOwner ? `<button onclick="deleteProd('${p.id}')" class="mt-3 text-red-500 text-[10px] font-bold uppercase tracking-tighter"><i class="fa-solid fa-trash"></i> Remove Item</button>` : ''}
                    </div>
                </div>
            `).join('');
        };

        window.viewProfile = async (uid) => {
            nav('shop');
            const isMe = curU && curU.uid === uid;
            document.querySelectorAll('.owner-btn').forEach(el => el.classList.toggle('hidden', !isMe));
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('u-name').innerText = d.name || "Creator";
                document.getElementById('u-bio').innerText = d.bio || "Welcome to my shop";
                document.getElementById('p-img').src = d.profile || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
                
                const soc = document.getElementById('u-socials'); soc.innerHTML = '';
                const btnS = (link, icon) => `<a href="${link}" target="_blank" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-700"><i class="${icon}"></i></a>`;
                if(d.insta) soc.innerHTML += btnS(`https://instagram.com/${d.insta}`, 'fa-brands fa-instagram');
                if(d.wa) soc.innerHTML += btnS(`https://wa.me/${d.wa}`, 'fa-brands fa-whatsapp');
                if(d.yt) soc.innerHTML += btnS(d.yt, 'fa-brands fa-youtube');
                if(d.fb) soc.innerHTML += btnS(d.fb, 'fa-brands fa-facebook');
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                renderGrid(s.docs.map(d => ({id:d.id, ...d.data()})), 'grid-shop', isMe);
            });
        };

        window.openEditModal = async () => {
            const s = await getDoc(doc(db, "users", curU.uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('en').value = d.name || '';
                document.getElementById('eb').value = d.bio || '';
                document.getElementById('e-insta').value = d.insta || '';
                document.getElementById('e-wa').value = d.wa || '';
                document.getElementById('e-yt').value = d.yt || '';
                document.getElementById('e-fb').value = d.fb || '';
            }
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveProfile = async () => {
            const n = document.getElementById('en').value;
            if(!n) return alert("Name is required");
            await setDoc(doc(db, "users", curU.uid), {
                name: n, bio: document.getElementById('eb').value,
                insta: document.getElementById('e-insta').value,
                wa: document.getElementById('e-wa').value,
                yt: document.getElementById('e-yt').value,
                fb: document.getElementById('e-fb').value
            }, {merge: true});
            location.reload();
        };

        window.confirmPurchase = async () => {
            const n = document.getElementById('on').value, p = document.getElementById('op').value, c = document.getElementById('oc').value;
            // Strict Validation
            if(n.length < 3) return alert("Please enter valid Full Name");
            if(p.length !== 10 || isNaN(p)) return alert("Please enter a valid 10-digit Mobile Number");
            if(c.length < 2) return alert("Please enter valid City");

            const now = new Date();
            await addDoc(collection(db, "orders"), {
                item: window.activeOrder.name, price: window.activeOrder.price,
                customer: n, phone: p, city: c, creatorId: window.activeOrder.creatorId,
                date: now.toLocaleDateString(), time_str: now.toLocaleTimeString(),
                timestamp: serverTimestamp()
            });
            
            if(window.activeOrder.link) window.open(window.activeOrder.link, '_blank');
            else alert("Order Placed Successfully!");
            document.getElementById('order-modal').classList.add('hidden');
        };

        window.pubProd = async () => {
            const n = document.getElementById('pn').value, p = document.getElementById('pp').value, d = document.getElementById('pd').value;
            if(!n || !p || !window.tempImg) return alert("Name, Price and Image are required!");
            const u = await getDoc(doc(db, "users", curU.uid));
            await addDoc(collection(db, "products"), {
                name: n, price: p, desc: d, img: window.tempImg, link: document.getElementById('pl').value,
                creatorId: curU.uid, creatorName: u.data()?.name || 'Creator', time: serverTimestamp()
            });
            location.reload();
        };

        window.nav = (t) => {
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('n-'+s).classList.toggle('nav-active', s === t);
            });
        };
        window.upMedia = (t, i) => { const r = new FileReader(); r.onload = async e => { await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, {merge:true}); location.reload(); }; r.readAsDataURL(i.files[0]); };
        window.preProd = (i) => { const r = new FileReader(); r.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); document.getElementById('pf-label').innerText = "Image Selected ✅"; }; r.readAsDataURL(i.files[0]); };
        window.authAction = () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).then(()=>location.reload()).catch(() => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).then(()=>location.reload())); };
        window.checkAuthAndNav = (p) => curU ? (p === 'shop' ? viewProfile(curU.uid) : nav(p)) : document.getElementById('auth-box').classList.remove('hidden');
        window.logout = () => signOut(auth).then(()=>location.reload());
        window.orderForm = (id) => { 
            window.activeOrder = allProds.find(x => x.id === id); 
            document.getElementById('order-item-name').innerText = window.activeOrder.name;
            document.getElementById('order-modal').classList.remove('hidden'); 
        };
        window.deleteProd = async (id) => { if(confirm("Remove this item from your shop?")) await deleteDoc(doc(db, "products", id)); };
    </script>
</body>
</html>
