<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let curU = null; 
    let viewId = null; 
    let allProds = [];

    // Force persistence so it doesn't logout on refresh
    setPersistence(auth, browserLocalPersistence);

    // 1. AUTH STATE CHECK
    onAuthStateChanged(auth, u => {
        const loader = document.getElementById('loading-screen');
        const authSec = document.getElementById('auth-section');
        const mainApp = document.getElementById('main-app');

        if(u) {
            curU = u;
            authSec.classList.add('hidden');
            mainApp.classList.remove('hidden');
            loader.classList.add('hidden');
            
            loadCore();

            // Restore last state
            const lastTab = localStorage.getItem('activeTab') || 'feed';
            const lastShopView = localStorage.getItem('viewingShopId');

            if (lastTab === 'shop' && lastShopView) {
                viewProfile(lastShopView);
            } else {
                showTab(lastTab);
            }
        } else {
            authSec.classList.remove('hidden');
            mainApp.classList.add('hidden');
            loader.classList.add('hidden');
        }
    });

    // 2. SHOW TAB LOGIC (With Storage)
    window.showTab = (t) => {
        localStorage.setItem('activeTab', t);
        if (t !== 'shop') localStorage.removeItem('viewingShopId');

        ['feed','shop','chats','orders'].forEach(s => {
            const section = document.getElementById('sec-'+s);
            const btn = document.getElementById('tab-'+s);
            if(section) section.classList.toggle('hidden', s !== t);
            if(btn) btn.classList.toggle('active', s === t);
        });

        if(t === 'shop' && !viewId) viewProfile(curU.uid);
    };

    // 3. VIEW PROFILE LOGIC
    window.viewProfile = async (uid) => {
        viewId = uid;
        localStorage.setItem('viewingShopId', uid);
        localStorage.setItem('activeTab', 'shop');

        const isMe = (curU.uid === uid);
        document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
        document.getElementById('msg-btn').classList.toggle('hidden', isMe);

        const s = await getDoc(doc(db, "users", uid));
        if(s.exists()){
            const d = s.data();
            document.getElementById('disp-name').innerText = d.name || "Shahi Creator";
            const b = document.getElementById('disp-bio');
            b.innerText = d.bio || "Mhari Shop par swagat hai!";
            b.style.color = d.bioColor || '#444';
            b.style.fontSize = (d.bioSize || '14') + 'px';
            document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
            document.getElementById('banner-ui').src = d.banner || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop";
        }

        onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
            const p = []; s.forEach(d => p.push({id: d.id, ...d.data()}));
            render(p, 'my-shop-grid', isMe);
        });
        showTab('shop');
    };

    // 4. IMAGE PREVIEW FIX
    window.previewProd = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                window.tempImg = e.target.result;
                const btn = document.getElementById('pub-btn');
                btn.classList.remove('hidden');
                btn.innerHTML = "Image Ready - Click to Publish";
                alert("Photo select ho gayi!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    // 5. CORE LOADERS
    function loadCore() {
        onSnapshot(collection(db, "products"), s => {
            allProds = []; s.forEach(d => allProds.push({id: d.id, ...d.data()}));
            render(allProds.sort(() => Math.random() - 0.5), 'public-grid');
        });

        onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid)), s => {
            document.getElementById('msg-count').innerText = s.size;
            document.getElementById('msg-count').classList.toggle('hidden', s.size === 0);
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(d => {
                const c = d.data();
                l.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm flex justify-between items-center">
                    <p class="text-sm font-medium">"${c.msg}"</p>
                    <button onclick="viewProfile('${c.from}')" class="text-xs font-bold text-[#d4af37]">OPEN</button>
                </div>`;
            });
        });

        onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid), orderBy("time", "desc")), s => {
            const l = document.getElementById('order-list'); l.innerHTML = "";
            s.forEach(d => {
                const o = d.data();
                const dt = o.time ? o.time.toDate().toLocaleString('en-IN') : 'Just now';
                l.innerHTML += `<div class="bg-white p-5 rounded-[30px] border shadow-sm mb-3">
                    <div class="flex justify-between font-bold"><span>${o.item}</span><span class="text-green-500">₹${o.price}</span></div>
                    <p class="text-xs text-gray-500">Customer: ${o.customer} (${o.phone})</p>
                    <p class="text-[10px] text-gray-400 mt-2">${dt}</p>
                </div>`;
            });
        });
    }

    // AUTH & ACTIONS
    window.handleAuth = () => {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(!e || !p) return alert("Email/Pass bhariye");
        signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
    };

    window.logout = () => {
        if(confirm("Logout karein?")){
            localStorage.clear();
            signOut(auth).then(() => location.reload());
        }
    };

    window.publish = async () => {
        const name = document.getElementById('p-name').value;
        if(!name || !window.tempImg) return alert("Photo aur Name zaruri hai!");
        await addDoc(collection(db, "products"), { 
            name, price: document.getElementById('p-price').value, 
            cat: document.getElementById('p-cat').value, desc: document.getElementById('p-desc').value,
            link: document.getElementById('p-link').value, img: window.tempImg, 
            creatorId: curU.uid, creator: document.getElementById('disp-name').innerText, time: serverTimestamp() 
        });
        alert("Product upload ho gaya!");
        location.reload();
    };

    // Globalizing other functions
    window.render = (data, cid, mine = false) => {
        const g = document.getElementById(cid); g.innerHTML = "";
        data.forEach(p => {
            g.innerHTML += `<div class="product-card">
                <div class="aspect-square bg-gray-50 overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover"></div>
                <div class="p-4">
                    <button onclick="viewProfile('${p.creatorId}')" class="text-[10px] font-bold text-gray-400 mb-1">BY @${p.creator.split(' ')[0]}</button>
                    <h4 class="font-bold text-sm truncate">${p.name}</h4>
                    <p class="desc-text">${p.desc || ''}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="font-bold text-lg">₹${p.price}</span>
                        <div class="flex gap-2">
                            ${mine ? `<button onclick="delProd('${p.id}')" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>` : ''}
                            <button onclick="triggerOrder('${p.name}', '${p.creatorId}', '${p.link}', '${p.price}')" class="bg-black text-white text-[10px] px-5 py-2 rounded-full font-bold uppercase">Order</button>
                        </div>
                    </div>
                </div>
            </div>`;
        });
    };

    window.delProd = async (id) => { if(confirm("Delete Item?")) await deleteDoc(doc(db, "products", id)); };
    window.saveProfile = async () => {
        await setDoc(doc(db, "users", curU.uid), { 
            name: document.getElementById('in-name').value, bio: document.getElementById('in-bio').value,
            bioColor: document.getElementById('in-bio-color').value, bioSize: document.getElementById('in-bio-size').value
        }, { merge: true });
        location.reload();
    };
    window.triggerOrder = (n, cid, l, p) => { window.target = { n, cid, l, p }; document.getElementById('order-modal').classList.remove('hidden'); };
    window.confirmOrder = async () => {
        const cn = document.getElementById('o-name').value, ph = document.getElementById('o-phone').value;
        if(!cn || !ph) return alert("Detail bhariye");
        await addDoc(collection(db, "orders"), { item: window.target.n, customer: cn, phone: ph, creatorId: window.target.cid, price: window.target.p, time: serverTimestamp() });
        document.getElementById('order-modal').classList.add('hidden');
        if(window.target.l && window.target.l !== "undefined") window.open(window.target.l, '_blank');
    };
    window.uploadMedia = (t, i) => { const r = new FileReader(); r.readAsDataURL(i.files[0]); r.onload = async e => { await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, { merge: true }); location.reload(); } };
</script>
