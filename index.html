<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn.active { color: #d4af37; border-bottom: 4px solid #d4af37; font-weight: 800; }
        .hidden { display: none !important; }
        
        /* New Header Above Banner */
        .top-brand-bar { background: #000; color: #d4af37; padding: 10px; text-align: center; font-size: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* Banner & Square Profile */
        .banner-box { 
            height: 250px; 
            background: #222; 
            background-position: center; 
            background-size: cover; 
            border-radius: 0 0 40px 40px; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .banner-text-hub { text-align: center; z-index: 5; }
        .banner-text-hub h1 { color: white; font-size: 2.2rem; letter-spacing: 4px; text-shadow: 2px 4px 10px rgba(0,0,0,0.4); margin-bottom: 5px; }
        .sub-text-anim { color: #d4af37; font-size: 10px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; transition: 0.5s; }

        .profile-img { 
            width: 110px; height: 110px; border-radius: 20px; 
            border: 5px solid #fff; position: absolute; bottom: -40px; left: 20px; 
            object-fit: cover; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 20;
        }

        .shahi-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .img-frame { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f9f9f9; }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }
        .social-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="pb-24">

    <div class="top-brand-bar raj-font">SAINIWALAA | Influencer Shop</div>

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-sm text-center">
            <h1 class="raj-font text-4xl text-[#d4af37] mb-2">SAINIWALAA</h1>
            <p class="text-[10px] text-gray-400 mb-10 tracking-widest uppercase font-bold">Creator Darbar</p>
            <div id="auth-inputs">
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 border-b mb-4 outline-none focus:border-[#d4af37]">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border-b mb-8 outline-none focus:border-[#d4af37]">
                <button id="main-auth-btn" onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-full font-bold mb-4 shadow-xl">LOG IN</button>
                <p id="toggle-text" class="text-xs text-gray-500">Naya account? <button onclick="toggleAuthMode()" class="text-[#d4af37] font-bold underline">Register</button></p>
            </div>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md flex justify-around border-b shadow-sm">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn active p-4 text-[10px] font-bold uppercase tracking-widest">Feed</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn p-4 text-[10px] font-bold uppercase tracking-widest">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn p-4 text-[10px] font-bold uppercase tracking-widest">Orders</button>
            <button onclick="logout()" class="p-4 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-feed" class="p-4 max-w-6xl mx-auto">
            <h2 class="raj-font text-xl mb-6 text-gray-800">Duniya ka Maal</h2>
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="sec-shop" class="hidden">
            <div id="banner-ui" class="banner-box">
                <div class="banner-text-hub">
                    <h1 class="raj-font">SAINIWALAA</h1>
                    <div class="bg-black/40 backdrop-blur-md px-5 py-1.5 rounded-full border border-white/20">
                        <span id="anim-text" class="sub-text-anim">Influencer</span>
                    </div>
                </div>

                <label class="absolute top-4 right-4 bg-black/40 p-3 rounded-full cursor-pointer text-white hidden owner-only" id="banner-label">
                    <i class="fa-solid fa-camera"></i>
                    <input type="file" onchange="uploadProfileMedia('banner', this)">
                </label>

                <div class="relative">
                    <img id="profile-ui" src="https://via.placeholder.com/150" class="profile-img">
                    <label class="absolute bottom-[-45px] left-[100px] bg-[#d4af37] text-white p-2 rounded-lg border-2 border-white cursor-pointer hidden owner-only" id="profile-label">
                        <i class="fa-solid fa-pen text-[10px]"></i>
                        <input type="file" onchange="uploadProfileMedia('profile', this)">
                    </label>
                </div>
            </div>

            <div class="mt-20 text-center px-6">
                <h2 id="disp-name" class="font-black">Shahi Creator</h2>
                <div class="mt-4 px-2">
                    <div id="bio-container" class="relative inline-block px-8 py-4 rounded-2xl bg-gradient-to-r from-[#d4af37]/10 border border-[#d4af37]/20">
                        <p id="disp-bio" class="text-gray-700 italic font-medium">Bio update karein...</p>
                    </div>
                    <div class="flex justify-center gap-4 mt-3 owner-only hidden">
                        <button onclick="changeFontSize(-1)" class="text-[10px] bg-white border px-3 py-1 rounded-full shadow-sm">A-</button>
                        <button onclick="changeFontSize(1)" class="text-[10px] bg-white border px-3 py-1 rounded-full shadow-sm">A+</button>
                    </div>
                </div>

                <div class="flex justify-center gap-3 mt-6">
                    <a id="btn-wa" href="#" target="_blank" class="social-btn hidden" style="background:#25D366"><i class="fa-brands fa-whatsapp"></i></a>
                    <a id="btn-insta" href="#" target="_blank" class="social-btn hidden" style="background:linear-gradient(45deg,#f09433,#bc1888)"><i class="fa-brands fa-instagram"></i></a>
                    <a id="btn-yt" href="#" target="_blank" class="social-btn hidden" style="background:#ff0000"><i class="fa-brands fa-youtube"></i></a>
                </div>
                
                <button onclick="document.getElementById('edit-profile-box').classList.toggle('hidden')" class="mt-6 text-[9px] border px-6 py-2 rounded-full font-bold uppercase text-[#d4af37] hidden owner-only">Edit Profile</button>
            </div>

            <div id="edit-profile-box" class="hidden max-w-sm mx-auto p-6 mt-4 bg-white border rounded-[30px] shadow-lg">
                <input id="in-name" placeholder="Shop Name" class="w-full p-3 border-b mb-2 outline-none font-bold">
                <input id="in-bio" placeholder="Bio..." class="w-full p-3 border-b mb-2 outline-none">
                <input id="in-wa" placeholder="WhatsApp Number" class="w-full p-3 border-b mb-2 outline-none">
                <input id="in-insta" placeholder="Instagram URL" class="w-full p-3 border-b mb-2 outline-none">
                <input id="in-yt" placeholder="YouTube URL" class="w-full p-3 border-b mb-4 outline-none">
                <button onclick="saveProfileData()" class="w-full bg-[#d4af37] text-white p-4 rounded-2xl font-bold uppercase">Save</button>
            </div>

            <div class="max-w-4xl mx-auto p-4 mt-12 hidden owner-only" id="add-maal-box">
                <div class="bg-white border-2 border-dashed border-[#d4af37]/30 p-8 rounded-[40px] text-center">
                    <h3 class="font-bold text-[#d4af37] mb-6 text-xs uppercase">Naya Maal Jodhein</h3>
                    <input id="p-name" placeholder="Product Name" class="w-full p-3 border-b mb-2 outline-none">
                    <textarea id="p-desc" placeholder="Product Description..." class="w-full p-3 border-b mb-2 outline-none text-xs h-20"></textarea>
                    <input id="p-price" placeholder="Price ₹" class="w-full p-3 border-b mb-2 outline-none font-bold">
                    <div id="p-preview-box" class="hidden mb-6"><img id="p-preview-img" class="h-32 mx-auto rounded-2xl"></div>
                    <div class="flex gap-3">
                        <label class="flex-1 border-2 border-black p-4 rounded-2xl cursor-pointer text-[10px] font-bold">PHOTO <input type="file" onchange="previewProduct(this)"></label>
                        <button id="pub-btn" onclick="publishProduct()" class="hidden flex-1 bg-[#d4af37] text-white p-4 rounded-2xl font-bold">PUBLISH</button>
                    </div>
                </div>
            </div>

            <div class="max-w-4xl mx-auto p-4">
                <h3 class="raj-font text-lg mt-14 mb-6 text-center text-gray-800">Aapka Maal</h3>
                <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-xl mx-auto">
            <h3 class="raj-font text-xl mb-6 text-center">Orders Received</h3>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <div id="checkout-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-8">
             <h3 class="raj-font text-xl font-bold text-center mb-6">Confirm Order</h3>
             <p id="modal-item-display" class="text-center text-sm font-bold text-[#d4af37] mb-4"></p>
             <input id="order-cust-name" type="text" placeholder="Aapka Naam" class="w-full p-3 border-b mb-4 outline-none">
             <input id="order-cust-phone" type="number" placeholder="WhatsApp Number" class="w-full p-3 border-b mb-8 outline-none">
             <input type="hidden" id="order-item-name">
             <input type="hidden" id="order-creator-id">
             <div class="flex gap-3">
                <button onclick="closeCheckout()" class="flex-1 text-gray-400 font-bold">CANCEL</button>
                <button onclick="submitOrder()" class="flex-[2] bg-black text-white py-4 rounded-2xl font-bold">CONFIRM</button>
             </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, browserLocalPersistence);
        let currentUser = null;
        let currentFontSize = 14;

        // Banner Text Animation
        const words = ["Influencer", "Blog Shop", "Creator Hub"];
        let wordIdx = 0;
        setInterval(() => {
            const el = document.getElementById('anim-text');
            if(el) { el.style.opacity = '0'; setTimeout(() => { wordIdx = (wordIdx + 1) % words.length; el.innerText = words[wordIdx]; el.style.opacity = '1'; }, 500); }
        }, 3000);

        onAuthStateChanged(auth, u => {
            if(u) {
                currentUser = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                showTab(localStorage.getItem('lastTab') || 'feed');
                syncAll();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.loadProfile = async (uid) => {
            const isOwner = (currentUser && currentUser.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isOwner ? el.classList.remove('hidden') : el.classList.add('hidden'));
            
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('disp-name').innerText = d.name || "Shahi Creator";
                document.getElementById('disp-bio').innerText = d.bio || "Bio update karein...";
                document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
                document.getElementById('banner-ui').style.backgroundImage = d.banner ? `url(${d.banner})` : "none";
                
                const socialMapping = { 'btn-wa': d.wa ? `https://wa.me/${d.wa}` : null, 'btn-insta': d.insta, 'btn-yt': d.yt };
                Object.keys(socialMapping).forEach(id => {
                    const el = document.getElementById(id);
                    socialMapping[id] ? (el.href = socialMapping[id], el.classList.remove('hidden')) : el.classList.add('hidden');
                });
            }
            syncMyShop(uid);
        };

        window.saveProfileData = async () => {
            const data = {
                name: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value,
                wa: document.getElementById('in-wa').value,
                insta: document.getElementById('in-insta').value,
                yt: document.getElementById('in-yt').value
            };
            await setDoc(doc(db, "users", currentUser.uid), data, { merge: true });
            document.getElementById('edit-profile-box').classList.add('hidden');
            loadProfile(currentUser.uid);
        };

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => {
                createUserWithEmailAndPassword(auth, e, p).then(cred => {
                    setDoc(doc(db, "users", cred.user.uid), { name: e.split('@')[0], bio: "Shahi Creator" });
                }).catch(err => alert(err.message));
            });
        };

        window.logout = () => signOut(auth).then(() => location.reload());
        window.toggleAuthMode = () => {
            const btn = document.getElementById('main-auth-btn');
            btn.innerText = (btn.innerText === 'LOG IN') ? 'SIGN UP' : 'LOG IN';
        };

        const compressImg = (f) => new Promise(res => {
            const reader = new FileReader(); reader.readAsDataURL(f);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = img.height * (600 / img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    res(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
        });

        window.uploadProfileMedia = async (type, input) => {
            const compressed = await compressImg(input.files[0]);
            await setDoc(doc(db, "users", currentUser.uid), { [type]: compressed }, { merge: true });
            loadProfile(currentUser.uid);
        };

        window.previewProduct = async (input) => {
            window.tempProdImg = await compressImg(input.files[0]);
            document.getElementById('p-preview-box').classList.remove('hidden');
            document.getElementById('p-preview-img').src = window.tempProdImg;
            document.getElementById('pub-btn').classList.remove('hidden');
        };

        window.publishProduct = async () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, d = document.getElementById('p-desc').value;
            await addDoc(collection(db, "products"), { 
                name: n, 
                price: p, 
                desc: d, // Description added back
                img: window.tempProdImg, 
                creatorId: currentUser.uid, 
                creator: document.getElementById('disp-name').innerText, 
                time: serverTimestamp() 
            });
            location.reload();
        };

        window.showTab = (t) => {
            localStorage.setItem('lastTab', t);
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s)?.classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s)?.classList.toggle('active', s === t);
            });
            if(t === 'shop' && currentUser) loadProfile(currentUser.uid);
        };

        function syncAll() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('public-grid'); grid.innerHTML = "";
                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    grid.innerHTML += `<div class="shahi-card">
                        <div class="img-frame"><img src="${p.img}"></div>
                        <div class="p-3">
                            <button onclick="viewCreator('${p.creatorId}')" class="text-[8px] font-black text-[#d4af37] uppercase">@${p.creator}</button>
                            <h4 class="font-bold text-[11px] truncate">${p.name}</h4>
                            <p class="text-[9px] text-gray-500 mb-2 line-clamp-2">${p.desc || ''}</p>
                            <div class="flex justify-between items-center mt-auto">
                                <span class="font-bold text-xs">₹${p.price}</span>
                                <button onclick="orderNow('${p.name}', '${p.creatorId}')" class="bg-black text-white text-[9px] px-3 py-1.5 rounded-full font-bold">ORDER</button>
                            </div>
                        </div>
                    </div>`;
                });
            });
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", currentUser.uid)), snap => {
                const list = document.getElementById('order-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500 flex justify-between">
                        <div><h4 class="font-bold">${o.item}</h4><p class="text-xs text-gray-500">${o.customer} - ${o.phone}</p></div>
                        <button onclick="delOrder('${d.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        function syncMyShop(uid) {
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), snap => {
                const grid = document.getElementById('my-shop-grid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `<div class="shahi-card"><div class="img-frame"><img src="${p.img}"></div><div class="p-3"><p class="text-[11px] font-bold">${p.name}</p><p class="text-[#d4af37] text-xs">₹${p.price}</p></div></div>`;
                });
            });
        }
        
        window.delOrder = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "orders", id)); };
        window.viewCreator = (cid) => { showTab('shop'); loadProfile(cid); };
        window.orderNow = (item, cid) => { 
            document.getElementById('order-item-name').value = item; 
            document.getElementById('order-creator-id').value = cid; 
            document.getElementById('modal-item-display').innerText = "Item: " + item;
            document.getElementById('checkout-modal').classList.remove('hidden'); 
        };
        window.closeCheckout = () => document.getElementById('checkout-modal').classList.add('hidden');
        window.submitOrder = async () => {
            const n = document.getElementById('order-cust-name').value, ph = document.getElementById('order-cust-phone').value;
            if(!n || !ph) return alert("Details bhariye!");
            await addDoc(collection(db, "orders"), { 
                item: document.getElementById('order-item-name').value, 
                customer: n, phone: ph, 
                creatorId: document.getElementById('order-creator-id').value, 
                time: serverTimestamp() 
            });
            alert("Order Place Ho Gaya!"); closeCheckout();
        };
        window.changeFontSize = async (step) => {
            currentFontSize += step;
            document.getElementById('disp-bio').style.fontSize = currentFontSize + 'px';
            await setDoc(doc(db, "users", currentUser.uid), { bioSize: currentFontSize }, { merge: true });
        };
    </script>
</body>
</html>
