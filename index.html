<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Secure Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(to right, #d4af37 20%, #fff 40%, #fff 60%, #d4af37 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .banner-container { height: 260px; width: 100%; position: relative; background: #111; border-radius: 0 0 50px 50px; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 50px 50px; }
        .profile-holder { position: absolute; bottom: -90px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; width: 100%; text-align: center; }
        .p-img { width: 135px; height: 135px; border-radius: 50%; border: 6px solid white; object-fit: cover; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .nav-btn { position: relative; transition: 0.3s; color: #999; }
        .nav-btn.active { color: #d4af37; font-weight: 800; }
        .nav-btn.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; background: #d4af37; border-radius: 10px; }
        .hidden { display: none !important; }
        .desc-text { color: #ff0000 !important; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        .badge-msg { position: absolute; top: -5px; right: -5px; background: #ff3b3b; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; border: 2px solid white; }
        .product-card { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #f0f0f0; transition: 0.4s; }
        .inbox-card { background: white; padding: 20px; border-radius: 25px; border-left: 6px solid #d4af37; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        .reply-box { font-size: 10px; background: #f9f9f9; padding: 5px 10px; border-radius: 10px; border-left: 2px solid #ccc; margin-bottom: 5px; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center bg-white fixed inset-0 z-[3000]">
        <h1 class="raj-font text-4xl text-[#d4af37] tracking-widest animate-pulse">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="min-h-screen flex items-center justify-center bg-white hidden">
        <div class="w-full max-w-sm p-10 text-center">
            <h1 class="raj-font text-6xl text-[#d4af37] mb-4">S</h1>
            <p class="text-gray-400 text-[10px] tracking-[0.4em] mb-12 uppercase">Elite Marketplace</p>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-5 bg-gray-50 rounded-2xl outline-none">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-3xl font-bold">SIGN IN / JOIN</button>
            </div>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <div class="bg-white pt-6 pb-2 text-center border-b">
            <h1 class="raj-font text-3xl font-bold tracking-[0.3em] saini-header">SAINIWALAA</h1>
            <p class="text-[8px] tracking-[0.5em] text-gray-400 uppercase">Influencer Blog</p>
        </div>

        <nav class="sticky top-0 z-[150] bg-white/80 backdrop-blur-xl flex justify-around border-b px-4">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Trending</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Orders</button>
            <button onclick="logout()" class="py-5 text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-shop" class="hidden">
            <div class="banner-container">
                <img id="banner-ui" src="https://images.unsplash.com/photo-1557683316-973673baf926?w=1000" class="banner-img">
                <div class="profile-holder">
                    <div class="relative">
                        <img id="profile-ui" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" class="p-img">
                        <label class="absolute bottom-1 right-2 bg-[#d4af37] text-white w-10 h-10 flex items-center justify-center rounded-full cursor-pointer owner-only hidden border-4 border-white shadow-lg">
                            <i class="fa-solid fa-camera-retro"></i>
                            <input type="file" onchange="uploadMedia('profile', this)" class="hidden">
                        </label>
                    </div>
                    <div class="mt-4">
                        <h2 id="disp-name" class="raj-font font-bold text-gray-800 text-2xl">Creator</h2>
                        <div id="visitor-btns" class="flex justify-center items-center gap-4 mt-5 hidden">
                            <button id="follow-btn" onclick="toggleFollow()" class="bg-[#d4af37] text-white text-[10px] px-8 py-3.5 rounded-full font-black uppercase shadow-lg">Follow</button>
                            <button onclick="openMsg()" class="bg-black text-white text-[10px] px-8 py-3.5 rounded-full font-black uppercase shadow-lg">Message</button>
                            <button onclick="toggleBlock()" id="block-btn" class="text-red-500 text-[10px] font-bold uppercase ml-2">Block</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-48 px-8 text-center">
                <p id="disp-bio" class="p-6 rounded-[30px] shadow-sm border bg-white min-w-[320px] italic text-gray-600">Mhara Swagat hai!</p>
                <div class="mt-8 flex justify-center gap-3 owner-only hidden">
                    <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="text-[10px] bg-gray-100 px-10 py-4 rounded-full font-black uppercase">Edit Profile</button>
                    <button onclick="showTab('chats')" id="tab-chats-btn" class="text-[10px] bg-black text-white px-10 py-4 rounded-full font-black uppercase relative">
                        Inbox <span id="msg-badge" class="badge-msg hidden">0</span>
                    </button>
                </div>
            </div>

            <div id="edit-box" class="hidden max-w-sm mx-auto p-8 mt-10 bg-white border rounded-[40px] shadow-2xl space-y-5">
                <input id="in-name" placeholder="Full Name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input id="in-bio" placeholder="Bio Story" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl">
                    <input type="color" id="in-bio-color" value="#666666" class="w-10 h-10 border-none cursor-pointer">
                    <input type="number" id="in-bio-size" placeholder="Size (e.g. 15)" class="w-full bg-transparent outline-none">
                </div>
                <button onclick="saveProfile()" class="w-full bg-black text-white p-5 rounded-3xl font-bold">SAVE UPDATES</button>
            </div>

            <div class="max-w-5xl mx-auto p-8 mt-12 owner-only hidden">
                <div class="bg-white border-2 border-dashed p-12 rounded-[50px] text-center">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <input id="p-name" placeholder="Item Name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-price" placeholder="Price (INR)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-cat" placeholder="Category" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-link" placeholder="Purchase Link" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                    </div>
                    <textarea id="p-desc" placeholder="Product details..." class="w-full p-5 bg-gray-50 rounded-3xl mb-8 outline-none h-28"></textarea>
                    <input type="file" id="p-file" onchange="previewProd(this)" class="hidden">
                    <label for="p-file" id="file-label" class="bg-gray-100 p-10 block rounded-[30px] cursor-pointer font-bold text-gray-400 uppercase">SELECT PRODUCT IMAGE</label>
                    <button id="pub-btn" onclick="publish()" class="hidden w-full bg-[#d4af37] text-white p-6 rounded-[30px] font-black uppercase mt-4">Publish Product</button>
                </div>
            </div>
            <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 max-w-7xl mx-auto mt-10"></div>
        </section>

        <section id="sec-feed" class="hidden p-8 max-w-7xl mx-auto">
            <input type="text" id="search-input" oninput="filterFeed()" placeholder="Search..." class="w-full p-6 bg-white rounded-full border mb-8 outline-none">
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
        </section>

        <section id="sec-chats" class="hidden p-8 max-w-2xl mx-auto">
            <h2 class="raj-font text-3xl mb-8">Messages (Secure)</h2>
            <div id="chat-list" class="space-y-4"></div>
        </section>

        <section id="sec-orders" class="hidden p-8 max-w-3xl mx-auto">
            <h2 class="raj-font text-3xl mb-8">Order History</h2>
            <div id="order-list" class="space-y-6"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let viewId = null; let allProds = []; let tempImg = "";

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadCore();
                showTab(localStorage.getItem('activeTab') || 'feed');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // --- AUTH & CORE ---
        window.handleAuth = async () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if(!e || !p) return alert("Fill all fields");
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch(err) {
                try {
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, "users", res.user.uid), { name: "Saini User", followers: [], blockedUsers: [] });
                } catch(e2) { alert(e2.message); }
            }
        };

        window.logout = () => signOut(auth);

        function loadCore() {
            onSnapshot(collection(db, "products"), s => {
                allProds = []; s.forEach(d => allProds.push({id: d.id, ...d.data()}));
                render(allProds.sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0)), 'public-grid');
            });

            onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid), where("deletedBy", "!=", curU.uid), orderBy("time", "desc")), s => {
                document.getElementById('msg-badge').innerText = s.size;
                document.getElementById('msg-badge').classList.toggle('hidden', s.size === 0);
                const l = document.getElementById('chat-list'); l.innerHTML = "";
                s.forEach(d => {
                    const c = d.data();
                    l.innerHTML += `
                        <div class="inbox-card">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[9px] font-black text-[#d4af37] uppercase">From: ${c.fromName || 'User'}</span>
                                <button onclick="delMsg('${d.id}')" class="text-red-300"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                            ${c.replyTo ? `<div class="reply-box">Replying to: ${c.replyTo}</div>` : ''}
                            <p class="text-gray-700 font-medium">"${c.msg}"</p>
                            <div class="mt-4 flex gap-2">
                                <button onclick="replyMsg('${c.from}', '${c.msg}')" class="bg-black text-white px-4 py-2 rounded-xl text-[10px] uppercase font-bold">Reply</button>
                                <button onclick="viewProfile('${c.from}')" class="bg-gray-100 px-4 py-2 rounded-xl text-[10px] uppercase font-bold text-gray-500">Profile</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- SHOP & PROFILE ---
        window.saveProfile = async () => {
            const n = document.getElementById('in-name').value;
            const b = document.getElementById('in-bio').value;
            const c = document.getElementById('in-bio-color').value;
            const s = document.getElementById('in-bio-size').value;
            await updateDoc(doc(db, "users", curU.uid), { name: n, bio: b, bioColor: c, bioSize: s });
            document.getElementById('edit-box').classList.add('hidden');
            viewProfile(curU.uid);
        };

        window.previewProd = (el) => {
            const fr = new FileReader();
            fr.onload = (e) => { 
                tempImg = e.target.result; 
                document.getElementById('pub-btn').classList.remove('hidden');
                document.getElementById('file-label').innerText = "IMAGE READY ✅";
            };
            fr.readAsDataURL(el.files[0]);
        };

        window.publish = async () => {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const l = document.getElementById('p-link').value;
            const d = document.getElementById('p-desc').value;
            if(!n || !p || !tempImg) return alert("Required: Name, Price, Image");
            
            const userData = (await getDoc(doc(db, "users", curU.uid))).data();
            await addDoc(collection(db, "products"), {
                name: n, price: p, link: l, desc: d, img: tempImg,
                creatorId: curU.uid, creator: userData.name || "Saini", time: serverTimestamp()
            });
            alert("Published!");
            location.reload(); 
        };

        window.viewProfile = async (uid) => {
            viewId = uid;
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.getElementById('visitor-btns').classList.toggle('hidden', isMe);
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('disp-name').innerText = d.name || "Saini Creator";
                const b = document.getElementById('disp-bio');
                b.innerText = d.bio || "Mhara Swagat hai!"; 
                b.style.color = d.bioColor || '#666'; 
                b.style.fontSize = (d.bioSize || '15') + 'px';
                document.getElementById('profile-ui').src = d.profile || "https://api.dicebear.com/7.x/avataaars/svg?seed="+uid;
                if(d.banner) document.getElementById('banner-ui').src = d.banner;
                
                if(!isMe) {
                    document.getElementById('follow-btn').innerText = d.followers?.includes(curU.uid) ? "Following" : "Follow";
                }
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                const prods = []; s.forEach(d => prods.push({id: d.id, ...d.data()}));
                render(prods, 'my-shop-grid', isMe);
            });
            showTab('shop');
        };

        // --- INTERACTION ---
        window.delMsg = async (id) => { if(confirm("Delete for you?")) await updateDoc(doc(db, "chats", id), { deletedBy: curU.uid }); };
        
        window.openMsg = async () => {
            const m = prompt("Enter message:");
            if(!m) return;
            const myDoc = await getDoc(doc(db, "users", curU.uid));
            await addDoc(collection(db, "chats"), { from: curU.uid, fromName: myDoc.data()?.name || "User", to: viewId, msg: m, time: serverTimestamp(), deletedBy: "" });
            alert("Sent!");
        };

        window.replyMsg = async (toId, orig) => {
            const r = prompt(`Reply to: ${orig}`);
            if(!r) return;
            const myDoc = await getDoc(doc(db, "users", curU.uid));
            await addDoc(collection(db, "chats"), { from: curU.uid, fromName: myDoc.data()?.name || "User", to: toId, msg: r, replyTo: orig, time: serverTimestamp(), deletedBy: "" });
            alert("Replied!");
        };

        window.render = (data, cid, mine = false) => {
            const g = document.getElementById(cid); g.innerHTML = "";
            data.forEach(p => {
                g.innerHTML += `<div class="product-card">
                    <div class="aspect-square relative overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6">
                        <button onclick="viewProfile('${p.creatorId}')" class="text-[9px] font-black text-[#d4af37] mb-2 uppercase">@${p.creator}</button>
                        <h4 class="font-bold text-sm truncate text-gray-800">${p.name}</h4>
                        <p class="desc-text">${p.desc || ''}</p>
                        <div class="flex justify-between items-end mt-6">
                            <div><span class="text-[10px] block text-gray-400 font-bold">Price</span><span class="font-black text-xl">₹${p.price}</span></div>
                            <div class="flex gap-2">
                                ${mine ? `<button onclick="delProd('${p.id}')" class="bg-red-50 text-red-400 p-3 rounded-2xl"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                <a href="${p.link}" target="_blank" class="bg-black text-white text-[10px] px-6 py-3 rounded-2xl font-black uppercase">Get It</a>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        };

        window.showTab = (t) => {
            localStorage.setItem('activeTab', t);
            ['feed','shop','chats','orders'].forEach(s => {
                const sec = document.getElementById('sec-'+s);
                const btn = document.getElementById('tab-'+s);
                if(sec) sec.classList.toggle('hidden', s !== t);
                if(btn) btn.classList.toggle('active', s === t);
            });
            if(t === 'shop' && !viewId) viewProfile(curU.uid);
            window.scrollTo(0,0);
        };
        
        window.filterFeed = () => {
            const val = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProds.filter(p => p.name.toLowerCase().includes(val) || p.creator.toLowerCase().includes(val));
            render(filtered, 'public-grid');
        };
        
        window.delProd = async (id) => { if(confirm("Delete product?")) await deleteDoc(doc(db, "products", id)); };
    </script>
</body>
</html>
