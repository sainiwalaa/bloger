<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let currentUserData = null;
        let selectedProduct = null;

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                    showApp();
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- AUTH FUNCTIONS ---
        window.handleAuth = (mode) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || pass.length < 6) return alert("Email aur 6-digit password zaroori hai!");
            if(mode === 'login') signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            else createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        window.registerUser = async () => {
            const name = document.getElementById('reg-name').value;
            if(!name) return alert("Naam likhiye sa!");
            await set(ref(db, 'users/' + auth.currentUser.uid), { 
                name, bio: "SainiWalaa Royal Member 🚩", uid: auth.currentUser.uid, photo: "", banner: "" 
            });
            location.reload();
        };

        // --- PROFILE UPDATES (PHOTO & BANNER) ---
        window.updateProfile = async () => {
            const btn = document.getElementById('btn-up-prof');
            const pFile = document.getElementById('up-p-img').files[0];
            const bFile = document.getElementById('up-b-img').files[0];
            const nName = document.getElementById('edit-name').value;
            const nBio = document.getElementById('edit-bio').value;

            btn.innerText = "⏳ Updating..."; btn.disabled = true;
            let pUrl = currentUserData.photo || "";
            let bUrl = currentUserData.banner || "";

            try {
                if(pFile) pUrl = await uploadToCloud(pFile);
                if(bFile) bUrl = await uploadToCloud(bFile);
                await update(ref(db, 'users/' + auth.currentUser.uid), { name: nName, bio: nBio, photo: pUrl, banner: bUrl });
                alert("🚩 Profile Updated!"); location.reload();
            } catch(e) { alert("Error!"); btn.disabled = false; }
        };

        async function uploadToCloud(file) {
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:"POST", body:fd});
            const d = await res.json(); return d.secure_url;
        }

        // --- SHOP & ORDER LOGIC ---
        window.switchShopTab = (tab) => {
            document.getElementById('shop-list-view').classList.add('hide');
            document.getElementById('order-list-view').classList.add('hide');
            document.getElementById('tab-list').className = "flex-1 py-2 text-xs font-bold text-gray-400";
            document.getElementById('tab-orders').className = "flex-1 py-2 text-xs font-bold text-gray-400";
            document.getElementById(tab + '-view').classList.remove('hide');
            document.getElementById('tab-' + tab.split('-')[0]).className = "flex-1 py-2 text-xs font-bold text-orange-600 border-b-2 border-orange-600";
        };

        window.openOrderForm = (id, seller, name, link) => {
            selectedProduct = { prodId: id, sellerId: seller, prodName: name, link: link };
            document.getElementById('order-prod-title').innerText = name;
            openM('order-modal');
        };

        window.submitOrder = async () => {
            const oData = { ...selectedProduct, cName: document.getElementById('c-name').value, cPhone: document.getElementById('c-phone').value, cAddr: document.getElementById('c-addr').value, time: Date.now() };
            if(!oData.cName || !oData.cPhone) return alert("Puri jankari bhariye!");
            await push(ref(db, 'orders'), oData);
            alert("🚩 Order Confirmed! Directing to Store...");
            window.location.href = selectedProduct.link || "#";
        };

        // --- CORE RENDER ---
        function showApp() {
            document.getElementById('app').classList.remove('hide');
            const pImg = currentUserData.photo || 'https://via.placeholder.com/100';
            const bImg = currentUserData.banner || 'https://via.placeholder.com/800x300';
            document.getElementById('u-prof-img').src = pImg;
            document.getElementById('u-banner-img').style.backgroundImage = `url(${bImg})`;
            document.querySelectorAll('.u-name-display').forEach(el => el.innerText = currentUserData.name);
            document.getElementById('u-bio-display').innerText = currentUserData.bio;
            onValue(ref(db, 'posts'), snap => renderFeed(snap.val()));
            onValue(ref(db, 'products'), snap => renderShop(snap.val()));
            onValue(ref(db, 'orders'), snap => renderOrders(snap.val()));
        }

        function renderFeed(data) {
            let h = ""; let myGrid = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    const uImg = p.uPhoto || 'https://via.placeholder.com/50';
                    const media = p.type === 'video' ? `<video src="${p.url}" controls class="w-full max-h-[70vh] bg-black"></video>` : `<img src="${p.url}" class="w-full max-h-[70vh] object-contain">`;
                    h += `<div class="bg-white mb-4 border-b">
                        <div class="p-3 flex items-center gap-3 cursor-pointer" onclick="visitProfile('${p.uid}')">
                            <img src="${uImg}" class="w-8 h-8 rounded-full border border-orange-200 object-cover">
                            <b class="text-xs uppercase italic">${p.uName}</b>
                            ${p.uid === auth.currentUser.uid ? `<i class="fa-solid fa-trash ml-auto text-gray-200" onclick="del('posts','${k}')"></i>` : ''}
                        </div>
                        ${media}<div class="p-4 text-sm"><b>${p.uName}</b> ${p.caption || ''}</div>
                    </div>`;
                    if(p.uid === auth.currentUser.uid) myGrid += `<img src="${p.url}" class="aspect-square object-cover border">`;
                });
            }
            document.getElementById('v-feed').innerHTML = h;
            document.getElementById('profile-grid').innerHTML = myGrid;
        }

        function renderShop(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    if(p.uid === auth.currentUser.uid) {
                        h += `<div class="bg-white rounded-xl shadow border p-2 relative">
                            <i class="fa-solid fa-circle-xmark absolute top-1 right-1 text-red-500 bg-white rounded-full p-1" onclick="del('products','${k}')"></i>
                            <img src="${p.url}" class="w-full h-32 object-cover rounded-lg">
                            <h3 class="text-[10px] font-black mt-2 uppercase truncate">${p.name}</h3>
                            <div class="text-orange-600 font-bold text-xs">₹${p.price}</div>
                        </div>`;
                    }
                });
            }
            document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center text-xs opacity-50 py-10'>Apni Shop Khali Hai.</p>";
        }

        function renderOrders(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const o = data[k];
                    if(o.sellerId === auth.currentUser.uid) {
                        h += `<div class="bg-orange-50 p-3 rounded-lg border-l-4 border-red-800 mb-2 text-[10px] shadow-sm">
                            <div class="flex justify-between mb-1"><b>📦 ${o.prodName}</b><i class="fa-solid fa-trash text-red-200" onclick="del('orders','${k}')"></i></div>
                            <b>Cust:</b> ${o.cName} | <b>Mob:</b> ${o.cPhone} <br> <b>Pata:</b> ${o.cAddr}
                        </div>`;
                    }
                });
            }
            document.getElementById('order-list-data').innerHTML = h || "No Orders Yet.";
        }

        window.visitProfile = async (uid) => {
            const snap = await get(ref(db, 'users/' + uid));
            const u = snap.val();
            document.getElementById('v-v-banner').style.backgroundImage = `url(${u.banner || 'https://via.placeholder.com/800x300'})`;
            document.getElementById('v-v-img').src = u.photo || 'https://via.placeholder.com/100';
            document.getElementById('v-v-name').innerText = u.name;
            document.getElementById('v-v-bio').innerText = u.bio;
            
            onValue(ref(db, 'products'), s => {
                const pr = s.val(); let ph = "";
                if(pr) Object.keys(pr).forEach(k => { const p = pr[k]; if(p.uid === uid) ph += `<div class="bg-white rounded-xl shadow border p-2"><img src="${p.url}" class="w-full h-24 object-cover rounded-lg"><h3 class="text-[9px] font-black mt-1 uppercase truncate">${p.name}</h3><div class="text-orange-600 font-bold text-xs">₹${p.price}</div><button onclick="openOrderForm('${k}','${p.uid}','${p.name}','${p.link}')" class="w-full bg-red-800 text-white py-1 rounded mt-2 text-[8px] font-bold">ORDER NOW</button></div>`; });
                document.getElementById('visit-shop-grid').innerHTML = ph || "No items.";
            });
            openM('visit-profile-modal');
        };

        window.publish = async (mode) => {
            const file = document.getElementById(mode + '-file').files[0];
            const btn = document.getElementById('btn-' + mode);
            if(!file) return alert("Chuniye sa!");
            btn.disabled = true; btn.innerText = "⏳ Uploading...";
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            const type = file.type.includes('video') ? 'video' : 'image';
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`, {method:"POST", body:fd});
            const cD = await res.json();

            const item = { uid: auth.currentUser.uid, uName: currentUserData.name, uPhoto: currentUserData.photo, url: cD.secure_url, type, time: Date.now(), caption: document.getElementById(mode + '-desc').value };
            if(mode === 'prod') { item.name = document.getElementById('prod-name').value; item.price = document.getElementById('prod-price').value; item.link = document.getElementById('prod-link').value; await push(ref(db, 'products'), item); }
            else await push(ref(db, 'posts'), item);
            location.reload();
        };

        window.del = (p,k) => confirm("Hata dein?") && remove(ref(db, `${p}/${k}`));
        window.showPage = (p) => { ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide')); document.getElementById('v-'+p).classList.remove('hide'); };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #7c1212, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 12px; width: 100%; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2); }
        input, textarea { border: 1.5px solid #eee !important; padding: 10px; border-radius: 12px; margin-bottom: 8px; width: 100%; outline: none; font-size: 13px; }
        .nav-icon { font-size: 1.3rem; color: #d1d5db; cursor: pointer; transition: 0.2s; }
        .nav-icon:active { transform: scale(0.9); color: #ea580c; }
    </style>
</head>
<body class="flex justify-center">

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide">
        <h1 class="text-5xl font-black raj-title text-center mb-1 italic uppercase">SainiWalaa</h1>
        <p class="text-[10px] text-center font-bold tracking-[6px] text-orange-600 mb-12 uppercase">Royal Studio</p>
        <input type="email" id="auth-email" placeholder="Email Address">
        <input type="password" id="auth-pass" placeholder="Password (Min 6)">
        <button onclick="handleAuth('login')" class="btn-royal mb-3">LOGIN</button>
        <button onclick="handleAuth('signup')" class="btn-royal bg-black">SIGNUP</button>
    </div>

    <div id="reg-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide text-center">
        <h2 class="text-xl font-black raj-title mb-6">AAPKO SHUBH NAAM?</h2>
        <input type="text" id="reg-name" placeholder="Yahan apna naam likhein...">
        <button onclick="registerUser()" class="btn-royal">CREATE ROYAL ACCOUNT 🚩</button>
    </div>

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-20 hide shadow-2xl">
        <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b p-4 flex justify-between items-center z-50">
            <div>
                <h1 class="text-xl font-black raj-title italic">SAINIWALAA</h1>
                <p class="text-[9px] font-black text-orange-600 uppercase tracking-widest u-name-display"></p>
            </div>
            <div class="flex gap-4">
                <i class="fa-solid fa-plus-square nav-icon text-orange-600" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store nav-icon" onclick="openM('prod-modal')"></i>
            </div>
        </header>

        <main id="v-feed"></main>

        <main id="v-shop" class="hide p-4">
            <div class="flex border-b mb-4">
                <button id="tab-list" onclick="switchShopTab('shop-list')" class="flex-1 py-2 text-xs font-bold text-orange-600 border-b-2 border-orange-600 uppercase tracking-tighter">My Listings</button>
                <button id="tab-orders" onclick="switchShopTab('order-list')" class="flex-1 py-2 text-xs font-bold text-gray-400 uppercase tracking-tighter">My Orders</button>
            </div>
            <div id="shop-list-view" class="grid grid-cols-2 gap-4"><div id="bazaar-grid" class="contents"></div></div>
            <div id="order-list-view" class="hide"><div id="order-list-data"></div></div>
        </main>

        <main id="v-profile" class="hide">
            <div id="u-banner-img" class="h-32 bg-gray-100 bg-cover bg-center relative">
                <img id="u-prof-img" src="" class="w-20 h-20 rounded-full absolute -bottom-10 left-6 border-4 border-white object-cover bg-white">
            </div>
            <div class="mt-12 p-6">
                <h2 class="text-xl font-black u-name-display uppercase raj-title"></h2>
                <p id="u-bio-display" class="text-[10px] text-gray-400 mt-1 italic"></p>
                <div class="flex gap-2 mt-4">
                    <button onclick="openM('edit-profile-modal')" class="bg-gray-100 px-6 py-1.5 rounded-full text-[10px] font-bold">EDIT</button>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-600 px-6 py-1.5 rounded-full text-[10px] font-bold">LOGOUT</button>
                </div>
            </div>
            <div id="profile-grid" class="grid grid-cols-3 gap-0.5 mt-4"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-home nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-circle-user nav-icon"></i>
        </nav>

        <div id="edit-profile-modal" class="fixed inset-0 bg-white z-[400] hide p-8 overflow-y-auto">
            <h2 class="text-xl font-black raj-title mb-6">PROFILE UPDATE</h2>
            <label class="text-[9px] font-bold text-gray-400">PHOTO</label><input type="file" id="up-p-img">
            <label class="text-[9px] font-bold text-gray-400">BANNER</label><input type="file" id="up-b-img">
            <input type="text" id="edit-name" placeholder="Naam">
            <textarea id="edit-bio" placeholder="Bio..."></textarea>
            <button onclick="updateProfile()" id="btn-up-prof" class="btn-royal">SAVE ROYAL PROFILE</button>
            <button onclick="closeM('edit-profile-modal')" class="mt-4 w-full text-xs">Cancel</button>
        </div>

        <div id="order-modal" class="fixed inset-0 bg-white z-[500] hide p-10 flex flex-col justify-center">
            <h2 class="text-xl font-black raj-title mb-1">ORDER FORM</h2>
            <p id="order-prod-title" class="text-[10px] text-gray-400 mb-6 uppercase"></p>
            <input type="text" id="c-name" placeholder="Apna Naam">
            <input type="number" id="c-phone" placeholder="Mobile Number">
            <textarea id="c-addr" placeholder="Address..."></textarea>
            <button onclick="submitOrder()" class="btn-royal">CONFIRM & BUY</button>
            <button onclick="closeM('order-modal')" class="mt-4 text-xs font-bold opacity-30">BACK</button>
        </div>

        <div id="visit-profile-modal" class="fixed inset-0 bg-white z-[300] hide p-0 overflow-y-auto pb-20">
            <div id="v-v-banner" class="h-32 bg-cover bg-center relative">
                <i class="fa-solid fa-circle-left absolute top-4 left-4 text-white text-2xl drop-shadow-md" onclick="closeM('visit-profile-modal')"></i>
                <img id="v-v-img" src="" class="w-20 h-20 rounded-full absolute -bottom-10 left-6 border-4 border-white object-cover">
            </div>
            <div class="mt-12 p-6">
                <h2 id="v-v-name" class="text-xl font-black uppercase raj-title"></h2>
                <p id="v-v-bio" class="text-[10px] text-gray-400 mt-1 italic"></p>
            </div>
            <div class="p-4"><h3 class="text-xs font-black border-b pb-2 mb-4 uppercase tracking-widest">Creator's Shop</h3><div id="visit-shop-grid" class="grid grid-cols-2 gap-4"></div></div>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[100] hide p-8"><input type="file" id="post-file" accept="video/*,image/*"><textarea id="post-desc" placeholder="Caption..."></textarea><button onclick="publish('post')" id="btn-post" class="btn-royal">PUBLISH</button><button onclick="closeM('post-modal')" class="mt-4 w-full">Cancel</button></div>
        <div id="prod-modal" class="fixed inset-0 bg-white z-[100] hide p-8"><input type="file" id="prod-file"><input type="text" id="prod-name" placeholder="Item Name"><input type="number" id="prod-price" placeholder="Price"><textarea id="prod-desc" placeholder="Details..."></textarea><input type="text" id="prod-link" placeholder="Buy Link"><button onclick="publish('prod')" id="btn-prod" class="btn-royal">ADD PRODUCT</button><button onclick="closeM('prod-modal')" class="mt-4 w-full">Cancel</button></div>
    </div>
</body>
</html>
