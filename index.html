<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Luxury Creator Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        /* Header & Animations */
        .saini-header-container { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); overflow: hidden; }
        .header-bg-animate { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(255, 255, 255, 0) 70%); animation: pulse-bg 8s ease-in-out infinite; z-index: -1; }
        @keyframes pulse-bg { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        .saini-header { background: linear-gradient(to right, #b8860b, #d4af37, #b8860b, #d4af37); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .tagline-anim { letter-spacing: 0.3em; font-weight: 800; font-size: 9px; color: #888; position: relative; display: inline-block; }
        .tagline-anim::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: var(--gold); animation: line-grow 2s ease-out forwards; }
        @keyframes line-grow { to { width: 100%; } }

        /* UI Components */
        .banner-box { height: 280px; position: relative; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; }
        .profile-side { position: absolute; bottom: -40px; left: 30px; display: flex; align-items: flex-end; gap: 20px; z-index: 50; }
        .p-img-main { width: 140px; height: 140px; border-radius: 30px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); object-fit: cover; background: #fff; }
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold) !important; font-weight: 800; }
        .hidden { display: none !important; }
        
        /* Product Cards */
        .product-card { transition: 0.3s; border: 1px solid #eee; border-radius: 24px; background: #fff; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .prod-desc { font-style: italic; color: #b8860b; font-size: 11px; line-height: 1.2; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Social Buttons */
        .social-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 50%; color: white; font-size: 14px; transition: 0.3s; }
        .social-btn:hover { background: var(--gold); transform: translateY(-3px); }

        /* Footer Animation */
        @keyframes scrollCreators { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-scroll { display: flex; width: max-content; animation: scrollCreators 40s linear infinite; }
        .footer-creator-card { display: flex; align-items: center; gap: 10px; padding: 6px 16px; background: rgba(255,255,255,0.03); border-radius: 50px; border: 1px solid rgba(212, 175, 55, 0.15); transition: 0.3s; }
        .footer-creator-card:hover { border-color: #d4af37; background: rgba(212, 175, 55, 0.05); }
        .footer-creator-card img { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #d4af37; object-fit: cover; }
        .footer-creator-card span { font-size: 11px; font-weight: 700; color: #ddd; letter-spacing: 0.5px; }

        /* Order Highlighting */
        .order-highlight { border: 2px solid #ef4444 !important; background: linear-gradient(to bottom right, #fff, #fef2f2) !important; animation: border-pulse 2s infinite; }
        @keyframes border-pulse { 0%, 100% { border-color: #ef4444; } 50% { border-color: #fca5a5; } }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <h1 class="raj-font text-4xl animate-bounce text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <section id="auth-box" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="w-full max-md bg-white p-10 rounded-[40px] shadow-2xl border border-gray-100 text-center">
            <h2 class="raj-font text-5xl text-[#d4af37] mb-2">S</h2>
            <p class="text-[10px] tracking-[0.3em] text-gray-400 mb-10 uppercase font-bold">The Royal Marketplace</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition">GET ACCESS</button>
        </div>
    </section>

    <main id="app" class="hidden">
        <header class="saini-header-container py-6 text-center">
            <div class="header-bg-animate"></div>
            <h1 class="raj-font text-4xl saini-header font-black tracking-widest cursor-pointer" onclick="location.reload()">SAINIWALAA</h1>
            <p class="tagline-anim uppercase">Premium Influencer Marketplace</p>
            
            <div class="flex justify-center gap-8 mt-6 text-[11px] font-bold uppercase tracking-tighter text-gray-400">
                <button onclick="nav('feed')" id="n-feed" class="pb-1 transition">Trending</button>
                <button onclick="viewProfile(curU.uid)" id="n-shop" class="pb-1 transition">My Studio</button>
                <button onclick="nav('orders')" id="n-orders" class="pb-1 transition">Orders</button>
                <button onclick="logout()" class="text-red-400"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="min-h-screen">
            <section id="sec-shop" class="hidden">
                <div id="banner-container" class="banner-box bg-gray-200">
                    <img id="b-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                    <div id="b-text-container" class="relative z-10 px-10 hidden">
                        <h2 id="b-text-display" class="raj-font font-bold leading-tight"></h2>
                    </div>
                    <div class="profile-side">
                        <div class="relative group">
                            <img id="p-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" class="p-img-main">
                            <label class="absolute inset-0 flex items-center justify-center bg-black/40 text-white rounded-[30px] opacity-0 group-hover:opacity-100 cursor-pointer owner-btn hidden">
                                <i class="fa-solid fa-camera"></i>
                                <input type="file" class="hidden" onchange="upMedia('profile', this)">
                            </label>
                        </div>
                        <div class="mb-8 text-left">
                            <h2 id="u-name" class="raj-font text-2xl font-bold text-white drop-shadow-md">Creator Name</h2>
                            <div id="u-socials" class="flex gap-2 mt-1"></div>
                            <button onclick="document.getElementById('edit-modal').classList.remove('hidden')" class="mt-2 bg-black/50 backdrop-blur-md text-white px-6 py-2 rounded-full text-[10px] font-bold owner-btn hidden">EDIT PROFILE</button>
                        </div>
                    </div>
                    <label class="absolute top-4 right-4 bg-black/20 p-3 rounded-full text-white cursor-pointer owner-btn hidden">
                        <i class="fa-solid fa-panorama"></i>
                        <input type="file" class="hidden" onchange="upMedia('banner', this)">
                    </label>
                </div>

                <div class="mt-16 px-6 max-w-4xl mx-auto">
                    <div id="u-bio" class="text-center p-6 bg-white rounded-[30px] border shadow-sm italic text-gray-500">Mhara Swagat hai!</div>
                    <div id="add-prod-box" class="mt-10 hidden">
                        <div class="bg-white p-8 rounded-[40px] border-2 border-dashed border-gray-200">
                            <h3 class="raj-font text-lg mb-6">List New Creation</h3>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <input id="pn" placeholder="Item Name" class="p-4 bg-gray-50 rounded-2xl border outline-none">
                                <input id="pp" placeholder="Price (₹)" type="number" class="p-4 bg-gray-50 rounded-2xl border outline-none">
                                <input id="pl" placeholder="Link (Website/WhatsApp)" class="p-4 bg-gray-50 rounded-2xl border outline-none col-span-2">
                            </div>
                            <textarea id="pd" placeholder="Product Story..." class="w-full p-4 bg-gray-50 rounded-2xl h-24 mb-4 border outline-none"></textarea>
                            <div class="flex items-center gap-4">
                                <input type="file" id="pf" onchange="preProd(this)" class="hidden">
                                <label for="pf" id="pf-label" class="flex-1 bg-gray-100 p-4 rounded-2xl text-center cursor-pointer font-bold text-gray-400">CHOOSE PHOTO</label>
                                <button onclick="pubProd()" id="pub-btn" class="hidden flex-1 bg-black text-white p-4 rounded-2xl font-bold">PUBLISH</button>
                            </div>
                        </div>
                    </div>
                    <div id="grid-shop" class="grid grid-cols-2 gap-4 mt-10 mb-20"></div>
                </div>
            </section>

            <section id="sec-feed" class="hidden px-6 pt-6">
                <div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            </section>

            <section id="sec-orders" class="hidden p-6">
                <h2 class="raj-font text-3xl mb-4">Recent Orders</h2>
                <div id="list-orders" class="grid gap-4 md:grid-cols-2"></div>
            </section>
        </div>
        
</body>
</html>
