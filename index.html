<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- FIXED LOGIN (No Refresh Issue) ---
        setPersistence(auth, browserLocalPersistence).then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('app-box').classList.remove('hidden');
                    loadUserData(user.uid);
                } else {
                    document.getElementById('auth-box').classList.remove('hidden');
                    document.getElementById('app-box').classList.add('hidden');
                }
            });
        });

        // --- ALL-IN-ONE POST SYSTEM (Image/Video/Text) ---
        window.openPostSystem = () => {
            const caption = prompt("Kuch naya likhao hukum...");
            const type = confirm("Video post karni hai? (OK for Video, Cancel for Image)") ? "video" : "image";
            
            cloudinary.openUploadWidget({ 
                cloudName: "dvp58lgh3", 
                uploadPreset: "ml_default",
                resourceType: type 
            }, (err, res) => {
                if (!err && res.event === "success") {
                    push(ref(db, 'posts'), {
                        url: res.info.secure_url,
                        caption: caption || "",
                        type: type,
                        uid: auth.currentUser.uid,
                        time: serverTimestamp()
                    });
                    alert("Darbar me post daraj ho gayi! 🚩");
                }
            });
        };

        // --- MAHAL SAJAO (Profile Form - Image 07a Look) ---
        window.saveMahal = async () => {
            const bio = document.getElementById('mahal-bio').value;
            const name = document.getElementById('mahal-name').value;
            await update(ref(db, `users/${auth.currentUser.uid}`), { bio, name });
            alert("Mahal saj gayo! 🚩");
            document.getElementById('mahal-modal').classList.add('hidden');
        };

        async function loadUserData(uid) {
            onValue(ref(db, `users/${uid}`), s => {
                const d = s.val();
                if(d) {
                    document.getElementById('p-name').innerText = d.name || "sunil saini";
                    document.getElementById('p-bio').innerText = d.bio || "SSSSSSSSSSSSSS";
                    if(d.photo) document.getElementById('p-img').src = d.photo;
                }
            });
        }

        window.goTab = (t) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(t).classList.remove('hidden');
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&display=swap');
        body { font-family: 'Marcellus', serif; background-color: #000; color: #fff; }
        .gold-text { color: #D4AF37; }
        .gold-border { border: 1px solid #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app-box" class="max-w-[500px] mx-auto min-h-screen relative hidden pb-24">
        <div class="h-44 bg-gradient-to-b from-yellow-900/40 to-black relative border-b border-gray-900">
            <div class="absolute -bottom-10 left-6 flex items-end gap-4">
                <div class="relative">
                    <img id="p-img" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-4 border-black bg-yellow-600">
                    <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 rounded-full border-2 border-black"></div>
                </div>
                <div class="mb-2">
                    <h2 id="p-name" class="text-xl font-bold italic">sunil saini</h2>
                    <p id="p-bio" class="text-xs text-gray-500 uppercase">SSSSSSSSSSSSSS</p>
                </div>
            </div>
            <div class="absolute -bottom-6 right-4 flex gap-2">
                <button onclick="document.getElementById('mahal-modal').classList.remove('hidden')" class="gold-border px-4 py-1 rounded text-[10px] bg-black gold-text"><i class="fa-solid fa-gear mr-1"></i> Badlaav</button>
                <button class="bg-red-900/20 text-red-500 p-2 rounded border border-red-900/50" onclick="getAuth().signOut()"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>

        <div class="mt-16 px-8 flex justify-end gap-8 text-[10px] text-gray-500 uppercase">
            <div><b class="text-white text-lg block">0</b> POST</div>
            <div><b class="text-white text-lg block">0</b> SAATHI</div>
        </div>

        <div class="mt-6 flex border-y border-gray-900 sticky top-0 bg-black z-40">
            <div onclick="goTab('v-darbar')" class="flex-1 py-4 text-center border-r border-gray-900 text-xs gold-text italic"><i class="fa-solid fa-table-cells mr-2"></i> Darbar</div>
            <div onclick="goTab('v-bazaar')" class="flex-1 py-4 text-center border-r border-gray-900 text-xs text-gray-500"><i class="fa-solid fa-shop mr-2"></i> Dukaan</div>
            <div onclick="goTab('v-sauda')" class="flex-1 py-4 text-center text-xs text-gray-500"><i class="fa-solid fa-box mr-2"></i> Sauda</div>
        </div>

        <main class="p-4">
            <div id="v-darbar" class="view">
                <div class="bg-gray-900/30 border border-yellow-900/30 p-4 rounded-xl flex items-center justify-between mb-6">
                    <span class="text-gray-400 text-sm italic">Kuch naya dikhao hukum...</span>
                    <button onclick="openPostSystem()" class="gold-text gold-border px-4 py-1.5 rounded-full text-xs font-bold">+ Naya Post</button>
                </div>
                <div id="feed-list" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div id="v-bazaar" class="view hidden">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-xl gold-text font-bold">Shahi Bazaar</h3>
                        <p class="text-[10px] text-gray-500">Anmol saaman yahan milego</p>
                    </div>
                    <button class="bg-orange-600 px-4 py-2 rounded-lg text-[10px] font-bold">+ Bazaar me Rakho 🚩</button>
                </div>
                <div class="border-2 border-dashed border-gray-800 rounded-2xl p-16 text-center">
                    <i class="fa-solid fa-tag text-4xl text-gray-800 mb-2"></i>
                    <p class="text-gray-600 text-sm italic">Bazaar abhi khali hai</p>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-black border-t border-gray-900 p-4 flex justify-around text-gray-600">
            <i class="fa-solid fa-house" onclick="goTab('v-darbar')"></i>
            <i class="fa-solid fa-bag-shopping" onclick="goTab('v-bazaar')"></i>
            <i class="fa-solid fa-circle-user gold-text"></i>
        </nav>
    </div>

    <div id="mahal-modal" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-[#121212] w-full rounded-2xl p-6 border gold-border">
            <h2 class="gold-text text-lg font-bold mb-6">Mahal Sajao</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] text-gray-500 block mb-2">CHITRA (AVATAR)</label>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-bold">SS</div>
                        <button class="gold-border px-4 py-2 rounded text-[10px] gold-text">Photo Daalo 📷</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-2">AAPKO NAAM</label>
                    <input id="mahal-name" type="text" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-sm" placeholder="sunil saini">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 block mb-2">AAPKE BAARE ME (BIO)</label>
                    <textarea id="mahal-bio" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-sm h-24" placeholder="SSSSSSSSSSSSSS"></textarea>
                </div>
                <button onclick="saveMahal()" class="w-full bg-yellow-600 text-black py-3 rounded-lg font-bold tracking-widest">SAVE KARO 👑</button>
            </div>
        </div>
    </div>

    <div id="auth-box" class="h-screen flex flex-col justify-center items-center p-10 bg-black">
        <h1 class="text-4xl gold-text mb-12 tracking-[10px] italic font-bold">SAINIWALAA</h1>
        <div class="w-full max-w-xs flex flex-col gap-6">
            <input type="email" id="email" placeholder="Email" class="bg-transparent border-b border-gray-800 p-2 outline-none">
            <input type="password" id="pass" placeholder="Password" class="bg-transparent border-b border-gray-800 p-2 outline-none">
            <button onclick="signInWithEmailAndPassword(getAuth(), email.value, pass.value)" class="bg-yellow-600 text-black p-3 rounded font-bold uppercase tracking-widest shadow-lg shadow-yellow-600/30">Dakhil Ho 🚩</button>
        </div>
    </div>

</body>
</html>
