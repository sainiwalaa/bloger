<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let myData = null;

        // --- 1. LOGIN SYSTEM (REFRESH SAFE) ---
        setPersistence(auth, browserLocalPersistence).then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const snap = await get(ref(db, `users/${user.uid}`));
                    myData = snap.val() || { name: "Sunil Saini", bio: "SSSSSS", photo: "" };
                    document.getElementById('auth-box').style.display = 'none';
                    document.getElementById('app-box').style.display = 'block';
                    loadProfile();
                    loadDarbar();
                    loadBazaar();
                } else {
                    document.getElementById('auth-box').style.display = 'flex';
                    document.getElementById('app-box').style.display = 'none';
                }
            });
        });

        // --- 2. INSTANT IMAGE UPLOAD & SAVE ---
        window.openPostUpload = () => {
            cloudinary.openUploadWidget({ 
                cloudName: "dprl2lyih", 
                uploadPreset: "ml_default",
                sources: ['local', 'camera', 'url']
            }, (err, res) => {
                if (!err && res.event === "success") {
                    const postData = {
                        url: res.info.secure_url,
                        uid: auth.currentUser.uid,
                        time: serverTimestamp(),
                        uName: myData.name
                    };
                    push(ref(db, 'posts'), postData).then(() => {
                        alert("Hukum, Chitra Darbar me daraj ho gayo! 🚩");
                    });
                }
            });
        };

        // --- 3. ADVANCED BAZAAR LISTING ---
        window.openBazaarUpload = () => {
            const detail = prompt("Saaman ki jaankari (Naam - Price - Link - Desc):");
            if(!detail) return;
            const parts = detail.split("-");

            cloudinary.openUploadWidget({ cloudName: "dprl2lyih", uploadPreset: "ml_default" }, (err, res) => {
                if (!err && res.event === "success") {
                    const prodData = {
                        url: res.info.secure_url,
                        name: parts[0]?.trim() || "Royal Item",
                        price: parts[1]?.trim() || "0",
                        link: parts[2]?.trim() || "#",
                        desc: parts[3]?.trim() || "",
                        uid: auth.currentUser.uid,
                        time: serverTimestamp()
                    };
                    push(ref(db, 'products'), prodData).then(() => {
                        alert("Bazaar me saaman saj gayo! 🚩");
                    });
                }
            });
        };

        // --- 4. DATA FETCHING (LIVE) ---
        function loadDarbar() {
            onValue(ref(db, 'posts'), s => {
                const box = document.getElementById('darbar-grid');
                box.innerHTML = "";
                if(s.exists()) {
                    Object.values(s.val()).reverse().forEach(p => {
                        box.innerHTML += `<img src="${p.url}" onclick="window.open('${p.url}')" class="w-full h-36 object-cover rounded border border-gray-800 shadow-lg">`;
                    });
                } else { box.innerHTML = "<p class='col-span-2 text-center py-10 text-gray-500'>Koi post nahi di.</p>"; }
            });
        }

        function loadBazaar() {
            onValue(ref(db, 'products'), s => {
                const bazaar = document.getElementById('bazaar-list');
                bazaar.innerHTML = "";
                if(s.exists()) {
                    Object.values(s.val()).reverse().forEach(p => {
                        bazaar.innerHTML += `
                        <div class="bg-gray-900 rounded-lg p-2 border border-gray-800">
                            <img src="${p.url}" class="w-full h-32 object-cover rounded mb-2">
                            <b class="text-xs text-yellow-500 block truncate">${p.name}</b>
                            <p class="text-white font-bold text-sm">₹${p.price}</p>
                            <button onclick="window.open('${p.link}')" class="w-full bg-yellow-600 text-black text-[9px] py-1 mt-2 font-bold rounded uppercase">Kharido 🚩</button>
                        </div>`;
                    });
                }
            });
        }

        window.goTab = (tab) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
        };

        function loadProfile() {
            document.getElementById('p-name').innerText = myData.name;
            document.getElementById('p-bio').innerText = myData.bio;
        }

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&display=swap');
        body { font-family: 'Marcellus', serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .hidden { display: none; }
        .tab-btn { flex: 1; padding: 12px; font-size: 12px; border-right: 1px solid #222; text-align: center; }
    </style>
</head>
<body>

    <div id="app-box" class="max-w-[500px] mx-auto min-h-screen relative hidden pb-20">
        <div class="h-44 bg-gradient-to-b from-yellow-900 to-black relative">
            <div class="absolute -bottom-10 left-6 flex items-end gap-4">
                <div class="relative">
                    <img id="p-img" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-4 border-black bg-yellow-600">
                    <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-black"></div>
                </div>
                <div class="mb-2">
                    <h2 id="p-name" class="text-xl font-bold">Sunil Saini</h2>
                    <p id="p-bio" class="text-xs text-gray-400">SSSSSSSSSSSSSS</p>
                </div>
            </div>
            <button onclick="openPostUpload()" class="absolute bottom-4 right-4 bg-yellow-600/20 p-2 rounded-full border border-yellow-600 text-yellow-500">
                <i class="fa-solid fa-camera"></i>
            </button>
        </div>

        <div class="mt-14 px-6 flex justify-end gap-6 text-[10px] uppercase tracking-tighter text-gray-400">
            <div><b class="text-white text-lg block">0</b> Post</div>
            <div><b class="text-white text-lg block">0</b> Saathi</div>
            <button class="border border-yellow-600 px-4 py-1 rounded text-yellow-500 self-center">Badlaav</button>
        </div>

        <div class="mt-6 flex border-y border-gray-900 bg-black sticky top-0 z-40">
            <div onclick="goTab('v-darbar')" class="tab-btn"><i class="fa-solid fa-table-cells mr-2"></i> Darbar</div>
            <div onclick="goTab('v-bazaar')" class="tab-btn"><i class="fa-solid fa-shop mr-2"></i> Dukaan</div>
            <div onclick="goTab('v-sauda')" class="tab-btn border-none"><i class="fa-solid fa-box mr-2"></i> Sauda</div>
        </div>

        <main class="p-4">
            <div id="v-darbar" class="view grid grid-cols-2 gap-2">
                <div id="darbar-grid" class="contents"></div>
            </div>

            <div id="v-bazaar" class="view hidden">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl gold-text">Shahi Bazaar</h3>
                    <button onclick="openBazaarUpload()" class="bg-orange-600 text-white px-4 py-1 rounded-full text-[10px] font-bold">+ Bazaar me Rakho</button>
                </div>
                <div id="bazaar-list" class="grid grid-cols-2 gap-3"></div>
            </div>

            <div id="v-sauda" class="view hidden py-20 text-center text-gray-600">
                <i class="fa-solid fa-box-open text-4xl mb-2"></i>
                <p>Abhi koi sauda nahi hua.</p>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-black border-t border-gray-900 p-4 flex justify-around text-gray-600">
            <i class="fa-solid fa-house" onclick="goTab('v-darbar')"></i>
            <i class="fa-solid fa-bag-shopping" onclick="goTab('v-bazaar')"></i>
            <i class="fa-solid fa-circle-user text-yellow-500"></i>
        </nav>
    </div>

    <div id="auth-box" class="h-screen flex flex-col justify-center items-center p-10">
        <h1 class="text-4xl gold-text mb-10 tracking-[10px]">SAINIWALAA</h1>
        <div class="w-full max-w-xs flex flex-col gap-6">
            <input type="email" id="email" placeholder="Email daalo" class="bg-transparent border-b border-gray-800 p-2 outline-none">
            <input type="password" id="pass" placeholder="Password daalo" class="bg-transparent border-b border-gray-800 p-2 outline-none">
            <button onclick="signInWithEmailAndPassword(getAuth(), email.value, pass.value)" class="bg-yellow-600 text-black p-3 rounded font-bold uppercase tracking-widest">Kholo Studio 🚩</button>
        </div>
    </div>

</body>
</html>
