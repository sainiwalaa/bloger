<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(to right, #d4af37 20%, #000 40%, #000 60%, #d4af37 80%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .banner-container { height: 240px; width: 100%; position: relative; background: #111; border-radius: 0 0 40px 40px; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 40px 40px; }
        .profile-holder { position: absolute; bottom: -110px; left: 50%; transform: translateX(-50%); width: 100%; text-align: center; z-index: 50; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 0 auto; background: #eee; }
        .action-btn { font-size: 10px; font-weight: 800; padding: 10px 25px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-btn.active { color: #d4af37; border-bottom: 3px solid #d4af37; }
        .hidden { display: none !important; }
        .glass-card { background: white; border: 1px solid #f0f0f0; border-radius: 30px; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-screen" class="min-h-screen flex items-center justify-center bg-white fixed inset-0 z-[5000]">
        <h1 class="raj-font text-3xl text-[#d4af37] animate-pulse tracking-widest">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="min-h-screen flex items-center justify-center bg-white hidden">
        <div class="w-full max-w-sm p-8 text-center">
            <h1 class="raj-font text-6xl text-[#d4af37] mb-8">S</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl mb-6 outline-none">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">START EXPLORING</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <header class="bg-white py-4 border-b border-gray-50 text-center sticky top-0 z-[100]">
            <h1 class="raj-font text-2xl saini-header tracking-tighter">SAINIWALAA</h1>
        </header>

        <nav class="sticky top-[65px] z-[90] bg-white/90 backdrop-blur-md flex justify-around border-b border-gray-100">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-4 text-[10px] font-bold uppercase">Trending</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-4 text-[10px] font-bold uppercase">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-4 text-[10px] font-bold uppercase">Orders</button>
            <button onclick="logout()" class="py-4 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-shop" class="hidden">
            <div class="banner-container">
                <img id="banner-ui" src="https://images.unsplash.com/photo-1557683316-973673baf926?w=1000" class="banner-img">
                <div class="profile-holder">
                    <div class="relative inline-block">
                        <img id="profile-ui" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Saini" class="p-img">
                        <label class="absolute bottom-1 right-0 bg-[#d4af37] text-white p-2 rounded-full cursor-pointer owner-only hidden border-2 border-white shadow-lg">
                            <i class="fa-solid fa-camera text-[10px]"></i>
                            <input type="file" onchange="uploadMedia('profile', this)" class="hidden">
                        </label>
                    </div>
                    <h2 id="disp-name" class="raj-font text-xl mt-3 font-bold">Creator Name</h2>
                    
                    <div id="visitor-action-bar" class="flex justify-center gap-3 mt-4 hidden">
                        <button onclick="toggleFollow()" class="action-btn bg-[#d4af37] text-white shadow-lg"><i class="fa-solid fa-plus mr-2"></i>Follow</button>
                        <button onclick="openMessageDialog()" class="action-btn bg-black text-white shadow-lg"><i class="fa-solid fa-paper-plane mr-2"></i>Message</button>
                    </div>

                    <div class="owner-only hidden mt-4 flex justify-center gap-2">
                        <button onclick="showTab('chats')" class="action-btn bg-black text-white relative">
                            Inbox <span id="msg-count" class="absolute -top-2 -right-2 bg-red-500 text-white px-2 rounded-full text-[8px] hidden">0</span>
                        </button>
                        <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="action-btn bg-gray-100 text-gray-500">Edit</button>
                    </div>
                </div>
            </div>

            <div class="mt-40 px-6 max-w-md mx-auto text-center">
                <p id="disp-bio" class="italic text-gray-500 text-sm">Welcome to my world!</p>
                <div id="edit-box" class="hidden mt-6 space-y-3 glass-card p-6 shadow-xl">
                    <input id="in-name" placeholder="Update Name" class="w-full p-3 bg-gray-50 rounded-xl">
                    <textarea id="in-bio" placeholder="Update Bio" class="w-full p-3 bg-gray-50 rounded-xl"></textarea>
                    <button onclick="saveProfile()" class="w-full bg-[#d4af37] text-white p-3 rounded-xl font-bold">SAVE</button>
                </div>
            </div>

            <div class="max-w-5xl mx-auto p-6 mt-10">
                <div class="owner-only hidden mb-10 border-2 border-dashed rounded-[40px] p-8 text-center bg-white">
                    <div class="grid grid-cols-2 gap-4 mb-4 text-left">
                        <input id="p-name" placeholder="Product Name" class="p-3 bg-gray-50 rounded-xl outline-none">
                        <input id="p-price" placeholder="Price" class="p-3 bg-gray-50 rounded-xl outline-none">
                        <input id="p-link" placeholder="Amazon/Flipkart Link" class="p-3 bg-gray-50 rounded-xl outline-none">
                        <input type="file" id="p-file" onchange="previewProd(this)" class="hidden">
                        <label for="p-file" class="bg-gray-100 p-3 rounded-xl cursor-pointer text-[10px] font-bold text-gray-400">SELECT IMAGE</label>
                    </div>
                    <button id="pub-btn" onclick="publish()" class="hidden w-full bg-black text-white p-4 rounded-2xl font-black uppercase">Publish Product</button>
                </div>
                <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>
        </section>

        <section id="sec-chats" class="hidden p-6 max-w-2xl mx-auto">
            <h2 class="raj-font text-2xl mb-6">Messages Received</h2>
            <div id="chat-list" class="space-y-4"></div>
        </section>

        <section id="sec-feed" class="hidden p-6 max-w-7xl mx-auto">
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-3xl mx-auto">
            <h2 class="raj-font text-2xl mb-6">Sales & Orders</h2>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let viewId = null; let myName = "";

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initSaini();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        async function initSaini() {
            // Load My Info
            const me = await getDoc(doc(db, "users", curU.uid));
            if(me.exists()) myName = me.data().name || "User";

            // Global Feed
            onSnapshot(collection(db, "products"), s => {
                const g = document.getElementById('public-grid'); g.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `<div class="glass-card overflow-hidden">
                        <img src="${p.img}" class="w-full aspect-square object-cover">
                        <div class="p-4">
                            <button onclick="viewProfile('${p.creatorId}')" class="text-[9px] font-bold text-[#d4af37] uppercase">@${p.creator}</button>
                            <h4 class="text-xs font-bold truncate">${p.name}</h4>
                            <div class="flex justify-between items-center mt-3">
                                <span class="font-bold">₹${p.price}</span>
                                <button onclick="triggerOrder('${p.name}', '${p.creatorId}', '${p.link}', '${p.price}')" class="bg-black text-white text-[9px] px-3 py-1.5 rounded-lg">GET IT</button>
                            </div>
                        </div>
                    </div>`;
                });
            });

            // Listen for Messages
            onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid), orderBy("time", "desc")), s => {
                const l = document.getElementById('chat-list'); l.innerHTML = "";
                document.getElementById('msg-count').innerText = s.size;
                document.getElementById('msg-count').classList.toggle('hidden', s.size === 0);
                s.forEach(d => {
                    const c = d.data();
                    l.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-[#d4af37] uppercase">From: ${c.fromName || 'Someone'}</span>
                            <button onclick="deleteDoc(doc(db,'chats','${d.id}'))" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can text-[12px]"></i></button>
                        </div>
                        <p class="text-sm font-medium text-gray-700">"${c.msg}"</p>
                        <div class="mt-4 flex gap-2">
                            <button onclick="replyMsg('${c.from}', '${c.fromName}')" class="flex-1 bg-black text-white text-[9px] py-2 rounded-xl font-bold">REPLY</button>
                            <button onclick="viewProfile('${c.from}')" class="bg-gray-100 text-[9px] px-4 py-2 rounded-xl font-bold uppercase">Profile</button>
                        </div>
                    </div>`;
                });
            });
        }

        window.viewProfile = async (uid) => {
            viewId = uid;
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.getElementById('visitor-action-bar').classList.toggle('hidden', isMe);
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('disp-name').innerText = d.name || "Creator";
                document.getElementById('disp-bio').innerText = d.bio || "Welcome!";
                document.getElementById('profile-ui').src = d.profile || "https://api.dicebear.com/7.x/avataaars/svg?seed="+uid;
                document.getElementById('banner-ui').src = d.banner || "https://images.unsplash.com/photo-1557683316-973673baf926?w=1000";
            }
            
            // Render Shop for this user
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                const g = document.getElementById('my-shop-grid'); g.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `<div class="glass-card p-3">
                        <img src="${p.img}" class="w-full aspect-square object-cover rounded-2xl mb-2">
                        <h4 class="text-[10px] font-bold truncate">${p.name}</h4>
                        ${isMe ? `<button onclick="deleteDoc(doc(db,'products','${d.id}'))" class="text-red-400 text-[8px] font-bold mt-2">DELETE</button>` : ''}
                    </div>`;
                });
            });
            showTab('shop');
        };

        window.openMessageDialog = () => {
            const m = prompt("Type your message to this creator:");
            if(m) {
                addDoc(collection(db, "chats"), {
                    from: curU.uid,
                    fromName: myName,
                    to: viewId,
                    msg: m,
                    time: serverTimestamp()
                });
                alert("Message Sent!");
            }
        };

        window.replyMsg = (toId, toName) => {
            const m = prompt(`Replying to ${toName}:`);
            if(m) {
                addDoc(collection(db, "chats"), {
                    from: curU.uid,
                    fromName: myName,
                    to: toId,
                    msg: m,
                    time: serverTimestamp()
                });
                alert("Reply Sent!");
            }
        };

        window.toggleFollow = () => {
            alert("Following @ " + document.getElementById('disp-name').innerText);
            // logic for follower collection can be added here
        };

        window.showTab = (t) => {
            ['feed','shop','chats','orders'].forEach(s => {
                const el = document.getElementById('sec-'+s);
                if(el) el.classList.toggle('hidden', s !== t);
                const btn = document.getElementById('tab-'+s);
                if(btn) btn.classList.toggle('active', s === t);
            });
            if(t === 'shop' && !viewId) viewProfile(curU.uid);
        };

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };

        window.saveProfile = async () => {
            await setDoc(doc(db, "users", curU.uid), {
                name: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value
            }, {merge: true});
            location.reload();
        };

        window.publish = async () => {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                link: document.getElementById('p-link').value,
                img: window.tempImg,
                creatorId: curU.uid,
                creator: myName,
                time: serverTimestamp()
            });
            location.reload();
        };

        window.previewProd = (input) => {
            const r = new FileReader();
            r.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); };
            r.readAsDataURL(input.files[0]);
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
