<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Rajasthani Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --royal-pink: #E91E63;
            --saffron: #FF9933;
            --gold: #D4AF37;
        }
        body { background: #FFF5F5; font-family: 'Garamond', serif; }
        
        /* Rajasthani Pattern Header */
        .royal-header {
            background-color: white;
            border-bottom: 4px solid var(--saffron);
            background-image: radial-gradient(var(--saffron) 0.5px, transparent 0.5px);
            background-size: 10px 10px;
            background-opacity: 0.1;
        }

        /* Pagdi Style Add Button */
        .pagdi-btn {
            background: linear-gradient(to bottom, #FF9933, #FF4500);
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
            border: 2px solid white;
        }

        .shop-btn-active {
            color: var(--royal-pink);
            transform: scale(1.2);
        }

        /* Post Grid Style */
        .bazaar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }
        .bazaar-grid img { 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 8px;
            border: 1px solid #FFE0B2;
        }

        .hide { display: none !important; }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-24">
        
        <header class="sticky top-0 z-50 royal-header p-4 flex justify-between items-center bg-white/95 backdrop-blur-sm">
            <h1 class="text-2xl font-black italic text-[#D84315] tracking-tighter">
                <i class="fa-solid fa-gem text-xs align-middle mr-1"></i>SAINIWALAA
            </h1>
            <div class="flex gap-5 text-xl text-[#D84315]">
                <i class="fa-solid fa-bell-concierge"></i> <i class="fa-solid fa-message"></i>
            </div>
        </header>

        <main id="v-feed" class="space-y-6 pt-2">
            </main>

        <main id="v-shop" class="hide p-4">
            <h2 class="text-center font-bold text-orange-800 mb-4 border-b pb-2">🚩 RAJASTHANI BAZAAR 🚩</h2>
            <div id="shop-items" class="grid grid-cols-2 gap-4">
                </div>
        </main>

        <main id="v-profile" class="hide">
            <div class="p-6 text-center">
                <div class="mx-auto w-24 h-24 rounded-full border-4 border-orange-400 p-1 mb-3">
                    <img src="https://via.placeholder.com/150" class="rounded-full w-full h-full" id="prof-img">
                </div>
                <h2 class="font-bold text-xl text-orange-900">Padharo Mhare Des</h2>
                <p class="text-xs text-gray-500 italic">Jaipur | Art | Culture</p>
                <div class="flex gap-2 mt-4">
                    <button class="flex-1 border border-orange-200 py-1.5 rounded-full text-xs font-bold bg-orange-50">MANAGE BAZAAR</button>
                </div>
            </div>
            <div id="prof-grid" class="bazaar-grid border-t mt-4"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t-2 border-orange-100 flex justify-around items-center p-3 z-50">
            <button onclick="showPage('feed')" id="n-feed" class="text-2xl text-orange-800"><i class="fa-solid fa-house-chimney-window"></i></button>
            <button class="text-2xl text-gray-300"><i class="fa-solid fa-magnifying-glass"></i></button>
            
            <button onclick="openM()" class="pagdi-btn text-white w-14 h-14 rounded-full -mt-10 flex items-center justify-center text-2xl">
                <i class="fa-solid fa-plus"></i>
            </button>

            <button onclick="showPage('shop')" id="n-shop" class="text-2xl text-gray-300">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="block text-[8px] font-bold">BAZAAR</span>
            </button>

            <button onclick="showPage('profile')" id="n-profile" class="text-2xl text-gray-300"><i class="fa-solid fa-user-tie"></i></button>
        </nav>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-white z-[100] hide p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-orange-800">Add to Collection</h2>
            <button onclick="closeM()" class="text-3xl">&times;</button>
        </div>
        <div class="space-y-5">
            <select id="p-type" class="w-full p-4 bg-orange-50 rounded-xl border border-orange-100 outline-none font-bold">
                <option value="feed">Social Post</option>
                <option value="shop">List in Bazaar (Shop)</option>
            </select>
            <input type="text" id="p-url" placeholder="Image/Video URL" class="w-full p-4 border rounded-xl">
            <input type="text" id="p-title" placeholder="Caption/Product Name" class="w-full p-4 border rounded-xl">
            <input type="number" id="p-price" placeholder="Price (₹)" class="w-full p-4 border rounded-xl">
            <button onclick="api_post()" class="w-full bg-orange-600 text-white p-4 rounded-xl font-bold">KHAMA GHANI (POST)</button>
        </div>
    </div>

    <script>
        // System Data
        let store = JSON.parse(localStorage.getItem('RAJ_DATA')) || {
            items: [
                { id: 1, type: 'shop', url: 'https://images.unsplash.com/photo-1590050806126-5b4869811f09', title: 'Blue Pottery', price: '850' },
                { id: 2, type: 'feed', url: 'https://images.unsplash.com/photo-1524230507669-5ff97982bb5e', title: 'Amber Fort View', price: '0' }
            ]
        };

        function showPage(p) {
            ['feed', 'shop', 'profile'].forEach(id => document.getElementById('v-'+id).classList.add('hide'));
            ['feed', 'shop', 'profile'].forEach(id => document.getElementById('n-'+id).style.color = '#ccc');
            
            document.getElementById('v-'+p).classList.remove('hide');
            document.getElementById('n-'+p).style.color = '#D84315';
            
            if(p === 'shop') renderShop();
            if(p === 'profile') renderProfile();
        }

        function openM() { document.getElementById('add-modal').classList.remove('hide'); }
        function closeM() { document.getElementById('add-modal').classList.add('hide'); }

        function api_post() {
            const newItem = {
                id: Date.now(),
                type: document.getElementById('p-type').value,
                url: document.getElementById('p-url').value,
                title: document.getElementById('p-title').value,
                price: document.getElementById('p-price').value
            };
            store.items.unshift(newItem);
            localStorage.setItem('RAJ_DATA', JSON.stringify(store));
            closeM();
            renderFeed();
        }

        function renderFeed() {
            let h = "";
            store.items.forEach(i => {
                h += `
                <div class="border-b pb-4">
                    <div class="p-3 flex items-center gap-2"><div class="w-6 h-6 bg-orange-400 rounded-full"></div><b class="text-xs">SainiWalaa</b></div>
                    <img src="${i.url}" class="w-full h-96 object-cover shadow-inner">
                    <div class="p-4">
                        <div class="flex justify-between mb-2">
                            <div class="flex gap-4 text-xl text-orange-700">
                                <i class="fa-regular fa-heart"></i>
                                ${i.type === 'shop' ? `<i class="fa-solid fa-cart-shopping" onclick="alert('Price: ₹${i.price}')"></i>` : `<i class="fa-regular fa-comment"></i>`}
                            </div>
                        </div>
                        <p class="text-sm"><b>Admin</b> ${i.title}</p>
                    </div>
                </div>`;
            });
            document.getElementById('v-feed').innerHTML = h;
        }

        function renderShop() {
            let h = "";
            store.items.filter(i => i.type === 'shop').forEach(i => {
                h += `<div class="bg-white border rounded-xl overflow-hidden shadow-sm">
                    <img src="${i.url}" class="w-full h-32 object-cover">
                    <div class="p-2 text-center">
                        <b class="text-[10px] block truncate">${i.title}</b>
                        <b class="text-orange-700 text-xs">₹${i.price}</b>
                        <button class="w-full bg-orange-600 text-white text-[10px] mt-1 rounded py-1">ORDER</button>
                    </div>
                </div>`;
            });
            document.getElementById('shop-items').innerHTML = h;
        }

        function renderProfile() {
            let h = "";
            store.items.forEach(i => h += `<img src="${i.url}">`);
            document.getElementById('prof-grid').innerHTML = h;
        }

        window.onload = renderFeed;
    </script>
</body>
</html>
