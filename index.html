<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", 
        authDomain: "social-blog-93d38.firebaseapp.com", 
        projectId: "social-blog-93d38", 
        storageBucket: "social-blog-93d38.appspot.com", 
        appId: "1:78643219054:web:dprl2lyih" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let curU = null; let viewId = null; let allProds = [];

    setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, u => {
        document.getElementById('loading-screen').classList.add('hidden');
        if(u) {
            curU = u;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadCore();
            
            const lastTab = localStorage.getItem('activeTab') || 'feed';
            const lastShop = localStorage.getItem('viewingShopId');
            if(lastTab === 'shop' && lastShop) viewProfile(lastShop);
            else showTab(lastTab);
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    function loadCore() {
        // Load Feed
        onSnapshot(collection(db, "products"), s => {
            allProds = []; s.forEach(d => allProds.push({id: d.id, ...d.data()}));
            render(allProds.sort(() => Math.random() - 0.5), 'public-grid');
        });

        // Load Chats
        onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid)), s => {
            document.getElementById('msg-count').innerText = s.size;
            document.getElementById('msg-count').classList.toggle('hidden', s.size === 0);
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(d => {
                const c = d.data();
                l.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm flex justify-between items-center">
                    <p class="text-sm">"${c.msg}"</p>
                    <button onclick="viewProfile('${c.from}')" class="text-xs font-bold text-[#d4af37]">OPEN</button>
                </div>`;
            });
        });

        // --- ORDER HISTORY LOGIC UPDATE ---
        // Humne orderBy ko hataya hai temporarily taaki agar index na ho tab bhi orders dikhen
        const qOrders = query(collection(db, "orders"), where("creatorId", "==", curU.uid));
        onSnapshot(qOrders, s => {
            const l = document.getElementById('order-list'); 
            l.innerHTML = "";
            let ordersArr = [];
            
            s.forEach(d => ordersArr.push({id: d.id, ...d.data()}));
            
            // Manual Sorting (Latest First)
            ordersArr.sort((a, b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));

            ordersArr.forEach(o => {
                // Time Formatting Logic
                let timeStr = "Processing...";
                if(o.time) {
                    const date = o.time.toDate();
                    timeStr = date.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit', year: 'numeric' }) + 
                              " | " + 
                              date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                }

                l.innerHTML += `<div class="bg-white p-5 rounded-[30px] border shadow-sm mb-3">
                    <div class="flex justify-between font-bold">
                        <span class="text-gray-800">${o.item}</span>
                        <span class="text-green-600">₹${o.price || '0'}</span>
                    </div>
                    <div class="mt-2 text-sm text-gray-600">
                        <p><i class="fa-solid fa-user mr-2 text-[10px]"></i>${o.customer}</p>
                        <p><i class="fa-solid fa-phone mr-2 text-[10px]"></i>${o.phone}</p>
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-dashed">
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">${timeStr}</span>
                        <span class="text-[10px] bg-gray-100 px-3 py-1 rounded-full text-gray-500">NEW ORDER</span>
                    </div>
                </div>`;
            });

            if(ordersArr.length === 0) {
                l.innerHTML = "<p class='text-center text-gray-400 mt-10'>No orders yet.</p>";
            }
        });
    }

    // --- REMAINDER FUNCTIONS (NO CHANGES TO UI/STYLE) ---
    window.showTab = (t) => {
        localStorage.setItem('activeTab', t);
        ['feed','shop','chats','orders'].forEach(s => {
            const section = document.getElementById('sec-'+s);
            const btn = document.getElementById('tab-'+s);
            if(section) section.classList.toggle('hidden', s !== t);
            if(btn) btn.classList.toggle('active', s === t);
        });
        if(t === 'shop' && !viewId) viewProfile(curU.uid);
    };

    window.viewProfile = async (uid) => {
        viewId = uid;
        localStorage.setItem('viewingShopId', uid);
        const isMe = (curU.uid === uid);
        document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
        document.getElementById('msg-btn').classList.toggle('hidden', isMe);

        const s = await getDoc(doc(db, "users", uid));
        if(s.exists()){
            const d = s.data();
            document.getElementById('disp-name').innerText = d.name || "Shahi Creator";
            const b = document.getElementById('disp-bio');
            b.innerText = d.bio || "Welcome to my shop!";
            b.style.color = d.bioColor || '#444';
            b.style.fontSize = (d.bioSize || '14') + 'px';
            document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
            document.getElementById('banner-ui').src = d.banner || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop";
        }
        
        onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
            const p = []; s.forEach(d => p.push({id: d.id, ...d.data()}));
            render(p, 'my-shop-grid', isMe);
        });
        showTab('shop');
    };

    window.render = (data, cid, mine = false) => {
        const g = document.getElementById(cid); g.innerHTML = "";
        data.forEach(p => {
            g.innerHTML += `<div class="product-card">
                <div class="aspect-square overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover"></div>
                <div class="p-4">
                    <button onclick="viewProfile('${p.creatorId}')" class="text-[10px] font-bold text-gray-400 mb-1">BY @${p.creator ? p.creator.split(' ')[0] : 'User'}</button>
                    <h4 class="font-bold text-sm truncate">${p.name}</h4>
                    <p class="desc-text">${p.desc || ''}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="font-bold text-lg">₹${p.price}</span>
                        <div class="flex gap-2">
                            ${mine ? `<button onclick="delProd('${p.id}')" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>` : ''}
                            <button onclick="triggerOrder('${p.name.replace(/'/g, "\\'")}', '${p.creatorId}', '${p.link}', '${p.price}')" class="bg-black text-white text-[10px] px-5 py-2 rounded-full font-bold uppercase">Order</button>
                        </div>
                    </div>
                </div>
            </div>`;
        });
    };

    window.handleAuth = () => {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(!e || !p) return alert("Fill details");
        signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
    };

    window.publish = async () => {
        const name = document.getElementById('p-name').value;
        if(!name || !window.tempImg) return alert("Photo + Name required");
        await addDoc(collection(db, "products"), { 
            name, 
            price: document.getElementById('p-price').value || "0", 
            cat: document.getElementById('p-cat').value || "General", 
            desc: document.getElementById('p-desc').value || "",
            link: document.getElementById('p-link').value || "", 
            img: window.tempImg, 
            creatorId: curU.uid, 
            creator: document.getElementById('disp-name').innerText, 
            time: serverTimestamp() 
        });
        alert("Published!");
        location.reload();
    };

    window.triggerOrder = (n, cid, l, p) => { 
        window.target = { n, cid, l, p }; 
        document.getElementById('order-modal').classList.remove('hidden'); 
    };

    window.confirmOrder = async () => {
        const cn = document.getElementById('o-name').value, ph = document.getElementById('o-phone').value;
        if(!cn || !ph) return alert("Please fill Name and Phone");
        
        try {
            await addDoc(collection(db, "orders"), { 
                item: window.target.n, 
                customer: cn, 
                phone: ph, 
                creatorId: window.target.cid, 
                price: window.target.p || "0", 
                time: serverTimestamp() 
            });
            
            document.getElementById('order-modal').classList.add('hidden');
            alert("Order Placed Successfully!");
            
            if(window.target.l && window.target.l !== "undefined" && window.target.l !== "") {
                window.open(window.target.l, '_blank');
            }
        } catch(e) {
            alert("Order Error: " + e.message);
        }
    };

    window.saveProfile = async () => {
        await setDoc(doc(db, "users", curU.uid), { 
            name: document.getElementById('in-name').value, 
            bio: document.getElementById('in-bio').value,
            bioColor: document.getElementById('in-bio-color').value, 
            bioSize: document.getElementById('in-bio-size').value
        }, { merge: true });
        location.reload();
    };

    window.uploadMedia = (t, i) => { 
        const r = new FileReader(); 
        r.readAsDataURL(i.files[0]); 
        r.onload = async e => { 
            await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, { merge: true }); 
            location.reload(); 
        } 
    };

    window.logout = () => { if(confirm("Logout?")) { localStorage.clear(); signOut(auth).then(() => location.reload()); } };
    window.openMsg = () => { const m = prompt("Message:"); if(m) addDoc(collection(db, "chats"), { from: curU.uid, to: viewId, msg: m, time: serverTimestamp() }); };
    window.delProd = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "products", id)); };
    window.filterFeed = () => {
        const val = document.getElementById('search-input').value.toLowerCase();
        render(allProds.filter(p => p.name.toLowerCase().includes(val) || p.cat?.toLowerCase().includes(val)), 'public-grid');
    };
    window.previewProd = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                window.tempImg = e.target.result;
                document.getElementById('pub-btn').classList.remove('hidden');
                alert("Image Selected!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    };
</script>
