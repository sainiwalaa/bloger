<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #D4AF37; --accent: #A04000; }
        body { background-color: #000; color: #fff; font-family: 'Marcellus', serif; }
        .box-shadow-gold { shadow: 0 4px 15px rgba(212, 169, 55, 0.2); }
        .gold-border { border: 1px solid var(--primary); }
        .gold-text { color: var(--primary); }
    </style>
</head>
<body>
    <div id="root">
        <div class="h-48 w-full bg-gradient-to-r from-yellow-900/20 to-orange-900/20 relative border-b gold-border">
            <div class="absolute -bottom-16 left-6 flex items-end gap-4">
                <img id="profile-img" src="https://api.dicebear.com/7.x/initials/svg?seed=Saini" class="w-32 h-32 rounded-full border-4 border-black bg-card shadow-2xl">
                <div class="mb-4">
                    <h1 class="text-3xl font-bold gold-text">sunil saini</h1>
                    <p class="text-gray-400 italic">Royal Studio - Ghani Khamma!</p>
                </div>
            </div>
        </div>

        <div class="mt-20 px-6 flex justify-end gap-8 text-center uppercase tracking-widest text-[10px]">
            <div><b class="text-xl block gold-text">0</b> Post</div>
            <div><b class="text-xl block gold-text">0</b> Saathi</div>
        </div>

        <div class="mt-8 flex border-y border-gray-900 sticky top-0 bg-black z-50">
            <button onclick="showTab('feed')" class="flex-1 py-4 gold-text italic"><i class="fa-solid fa-grid-2 mr-2"></i> Darbar</button>
            <button onclick="showTab('bazaar')" class="flex-1 py-4 text-gray-500"><i class="fa-solid fa-store mr-2"></i> Dukaan</button>
            <button onclick="openModal('edit-modal')" class="flex-1 py-4 text-gray-500"><i class="fa-solid fa-gear mr-2"></i> Badlaav</button>
        </div>

        <main id="main-content" class="p-4 mb-24">
             <div id="feed-view" class="view-tab">
                <div class="bg-gray-900/40 p-4 rounded-2xl border gold-border mb-6 flex justify-between items-center">
                    <span class="text-gray-500 italic">Kuch naya dikhao hukum...</span>
                    <button class="bg-primary px-4 py-2 rounded-full text-black font-bold text-xs" style="background: #D4AF37;">+ Naya Post</button>
                </div>
                <div class="text-center py-20 opacity-30">
                    <p class="text-2xl font-bold">Sannata hai sa</p>
                    <p>Abhi tak koi post nahi aayo.</p>
                </div>
             </div>
        </main>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-[#121212] w-full max-w-md rounded-2xl p-6 border gold-border">
            <h2 class="gold-text text-2xl font-bold mb-6 italic">Mahal Sajao</h2>
            <div class="space-y-4">
                <label class="text-xs text-gray-500">Aapke Baare Me (Bio)</label>
                <textarea class="w-full bg-black border border-gray-800 rounded-lg p-3 text-white h-24" placeholder="Kuch likho hukum..."></textarea>
                <button onclick="closeModal('edit-modal')" class="w-full bg-yellow-600 text-black py-4 rounded-xl font-bold">SAVE KARO 👑</button>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            // Tab switching logic based on your React Code
            console.log("Switching to " + tab);
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
