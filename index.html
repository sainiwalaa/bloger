<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Pink City Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-city: #ef828a; /* Jaipur Pink */
            --pink-dark: #d66d75;
        }
        body { background: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .pink-gradient { background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); }
        .insta-border { border: 2px solid transparent; background: linear-gradient(white, white) padding-box, linear-gradient(45deg, #f093fb, #f5576c) border-box; }
        .hide { display: none !important; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .active-nav { color: var(--pink-city) !important; }
        video { width: 100%; border-radius: 8px; }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-20">
        
        <header class="sticky top-0 bg-white/90 backdrop-blur-md z-50 border-b p-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-[#ef828a]">SainiWalaa</h1>
            <div class="flex gap-5 text-xl">
                <i class="fa-regular fa-heart"></i>
                <i class="fa-brands fa-facebook-messenger"></i>
            </div>
        </header>

        <main id="v-feed" class="p-0 space-y-4">
            </main>

        <main id="v-profile" class="hide">
            <div class="p-6">
                <div class="flex items-center gap-8 mb-6">
                    <div class="w-20 h-20 rounded-full insta-border p-1">
                        <img src="https://via.placeholder.com/150" class="rounded-full w-full h-full object-cover" id="my-logo">
                    </div>
                    <div class="flex gap-4 text-center text-sm">
                        <div><b id="post-count">0</b><p class="text-gray-400">Posts</p></div>
                        <div><b>1.2k</b><p class="text-gray-400">Followers</p></div>
                        <div><b>450</b><p class="text-gray-400">Following</p></div>
                    </div>
                </div>
                <div class="mb-6">
                    <h2 class="font-bold" id="my-name">Jaipur Creator</h2>
                    <p class="text-sm text-gray-600" id="my-bio">Digital art from the Pink City 🌸</p>
                </div>
                <div class="flex gap-2 mb-8">
                    <button class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-sm">Edit Profile</button>
                    <button class="flex-1 bg-gray-100 py-2 rounded-lg font-bold text-sm">Share Profile</button>
                </div>
            </div>
            <div id="my-grid" class="post-grid"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t flex justify-around p-3 z-50">
            <button onclick="showPage('feed')" id="n-feed" class="active-nav text-2xl"><i class="fa-solid fa-house"></i></button>
            <button class="text-2xl text-gray-400"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button onclick="openModal()" class="text-3xl text-[#ef828a]"><i class="fa-solid fa-square-plus"></i></button>
            <button class="text-2xl text-gray-400"><i class="fa-solid fa-clapperboard"></i></button>
            <button onclick="showPage('profile')" id="n-profile" class="text-2xl text-gray-400"><i class="fa-solid fa-circle-user"></i></button>
        </nav>

    </div>

    <div id="upload-modal" class="fixed inset-0 bg-white z-[100] hide p-6">
        <div class="flex justify-between items-center mb-8">
            <button onclick="closeModal()"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h2 class="text-lg font-bold">New Post</h2>
            <button onclick="api_publishPost()" class="text-blue-500 font-bold">Share</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="p-img" placeholder="Paste Image/Video URL" class="w-full p-4 bg-gray-50 border rounded-xl outline-none">
            <textarea id="p-cap" placeholder="Write a caption..." class="w-full p-4 bg-gray-50 border rounded-xl h-32 outline-none"></textarea>
            <input type="number" id="p-price" placeholder="Product Price (for Shop button)" class="w-full p-4 bg-gray-50 border rounded-xl outline-none">
        </div>
    </div>

    <script>
        // --- SIMULATED API SYSTEM ---
        const API_STORAGE_KEY = "SAINI_APP_DATA";
        
        let db = JSON.parse(localStorage.getItem(API_STORAGE_KEY)) || {
            posts: [
                { id: 1, user: "Jaipur_Vibes", url: "https://images.unsplash.com/photo-1599074914978-2946b69e5a4a", cap: "Hawa Mahal ✨", price: "500" },
                { id: 2, user: "Pink_City", url: "https://images.unsplash.com/photo-1524230507669-5ff97982bb5e", cap: "Pink Architecture", price: "1200" }
            ]
        };

        function saveToDB() {
            localStorage.setItem(API_STORAGE_KEY, JSON.stringify(db));
        }

        // --- CORE FUNCTIONS ---
        function showPage(p) {
            document.getElementById('v-feed').classList.toggle('hide', p !== 'feed');
            document.getElementById('v-profile').classList.toggle('hide', p !== 'profile');
            document.getElementById('n-feed').classList.toggle('active-nav', p === 'feed');
            document.getElementById('n-profile').classList.toggle('active-nav', p === 'profile');
            if(p === 'profile') renderProfile();
        }

        function openModal() { document.getElementById('upload-modal').classList.remove('hide'); }
        function closeModal() { document.getElementById('upload-modal').classList.add('hide'); }

        function api_publishPost() {
            const url = document.getElementById('p-img').value;
            const cap = document.getElementById('p-cap').value;
            const price = document.getElementById('p-price').value;

            if(!url) return alert("Please add an image/video URL");

            const newPost = {
                id: Date.now(),
                user: "You",
                url: url,
                cap: cap,
                price: price || "N/A"
            };

            db.posts.unshift(newPost);
            saveToDB();
            closeModal();
            renderFeed();
        }

        function renderFeed() {
            let html = "";
            db.posts.forEach(post => {
                const isVid = post.url.match(/\.(mp4|mov|webm)$/i);
                html += `
                <div class="bg-white border-b mb-4">
                    <div class="p-3 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full pink-gradient p-0.5"><div class="w-full h-full rounded-full bg-white p-0.5"><img src="https://i.pravatar.cc/100?u=${post.user}" class="rounded-full"></div></div>
                        <b class="text-sm">${post.user}</b>
                    </div>
                    ${isVid ? `<video src="${post.url}" autoplay muted loop></video>` : `<img src="${post.url}" class="w-full object-cover">`}
                    <div class="p-4">
                        <div class="flex justify-between mb-3 text-2xl">
                            <div class="flex gap-4">
                                <i class="fa-regular fa-heart"></i>
                                <i class="fa-regular fa-comment"></i>
                                <button onclick="alert('Price: ₹${post.price}')" class="text-[#ef828a]"><i class="fa-solid fa-bag-shopping"></i></button>
                            </div>
                            <i class="fa-regular fa-bookmark"></i>
                        </div>
                        <p class="text-sm"><b>${post.user}</b> ${post.cap}</p>
                        <p class="text-xs text-gray-400 mt-2">Just now</p>
                    </div>
                </div>`;
            });
            document.getElementById('v-feed').innerHTML = html;
        }

        function renderProfile() {
            const myPosts = db.posts.filter(p => p.user === "You");
            document.getElementById('post-count').innerText = myPosts.length;
            let html = "";
            myPosts.forEach(p => {
                html += `<div class="aspect-square bg-gray-200"><img src="${p.url}" class="w-full h-full object-cover"></div>`;
            });
            document.getElementById('my-grid').innerHTML = html;
        }

        window.onload = renderFeed;
    </script>
</body>
</html>
