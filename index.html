<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .page-section { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="auth-box" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-xl shadow-lg">
        <h2 id="auth-title" class="text-xl font-bold mb-4">Login Karein</h2>
        <input type="email" id="email" placeholder="Email" class="w-full p-2 border mb-2">
        <input type="password" id="pass" placeholder="Password" class="w-full p-2 border mb-4">
        <button id="main-btn" onclick="handleAuth()" class="w-full bg-blue-600 text-white p-2 rounded">LOGIN</button>
        <p class="text-sm mt-4 text-center cursor-pointer text-blue-500" onclick="toggleMode()">Naya Khata Banayein?</p>
    </div>

    <div id="app-box" class="hidden max-w-4xl mx-auto p-4">
        <nav class="flex gap-4 mb-6">
            <button onclick="showPage('darbar')" class="bg-gray-200 p-2 rounded">Darbar</button>
            <button onclick="showPage('profile')" class="bg-gray-200 p-2 rounded">Profile</button>
            <button onclick="logout()" class="bg-red-500 text-white p-2 rounded">Logout</button>
        </nav>
        
        <div id="darbar-page" class="page-section active-page">
            <h1 class="text-2xl font-bold">Darbar Feed</h1>
            <div id="posts"></div>
        </div>
        
        <div id="profile-page" class="page-section">
            <h1 class="text-2xl font-bold">Aapki Profile</h1>
            <p id="user-info"></p>
        </div>
    </div>

    <script>
        // Firebase Config (Replace with your actual one)
        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLogin = true;

        // --- AUTH LOGIC ---
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Login Karein" : "Register Karein";
            document.getElementById('main-btn').innerText = isLogin ? "LOGIN" : "REGISTER";
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            
            try {
                if(isLogin) {
                    await auth.signInWithEmailAndPassword(e, p);
                    alert("Login Safal!");
                } else {
                    await auth.createUserWithEmailAndPassword(e, p);
                    alert("Account Ban Gaya!");
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        // --- AUTH CHECK ---
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('app-box').classList.remove('hidden');
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
                document.getElementById('app-box').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }

        // --- NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id + '-page').classList.add('active-page');
        }
    </script>
</body>
</html>
