<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 5s ease infinite;
            font-weight: 900;
        }
        @keyframes gradient-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .nav-btn.active { color: #d4af37; font-weight: 800; border-bottom: 3px solid #d4af37; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-white pt-6 pb-2 text-center border-b border-gray-50">
        <h1 class="raj-font text-3xl font-bold tracking-[0.3em] saini-header">SAINIWALAA</h1>
        <p class="text-[8px] tracking-[0.5em] text-gray-400 uppercase mt-1">Order Management</p>
    </div>

    <nav class="sticky top-0 z-[150] bg-white/80 backdrop-blur-xl flex justify-around border-b border-gray-100 px-4">
        <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-5 text-[10px] font-black uppercase">Market</button>
        <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-5 text-[10px] font-black uppercase">Orders</button>
        <button onclick="logout()" class="py-5 text-red-400"><i class="fa-solid fa-power-off"></i></button>
    </nav>

    <section id="sec-feed" class="p-6 max-w-7xl mx-auto">
        <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <section id="sec-orders" class="hidden p-6 max-w-3xl mx-auto">
        <h2 class="raj-font text-2xl mb-6">Recent Orders</h2>
        <div id="order-list" class="space-y-4"></div>
    </section>

    <div id="order-modal" class="hidden fixed inset-0 z-[2000] flex items-center justify-center bg-black/90 p-6">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 text-center">
            <h3 class="raj-font text-xl mb-6">Order Details</h3>
            <input id="o-name" type="text" placeholder="Full Name" class="w-full p-4 bg-gray-50 rounded-xl mb-3 outline-none">
            <input id="o-phone" type="tel" placeholder="Mobile Number" class="w-full p-4 bg-gray-50 rounded-xl mb-3 outline-none">
            <input id="o-city" type="text" placeholder="Your City" class="w-full p-4 bg-gray-50 rounded-xl mb-6 outline-none">
            <button onclick="confirmOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase">Confirm Order</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-4 text-gray-400 text-xs uppercase">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null;

        onAuthStateChanged(auth, u => {
            if(u) { curU = u; loadData(); showTab('feed'); }
            else { window.location.href = "login.html"; } // Replace with your login page
        });

        function loadData() {
            // Products Load
            onSnapshot(collection(db, "products"), s => {
                const g = document.getElementById('public-grid'); g.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `<div class="product-card">
                        <img src="${p.img}" class="w-full aspect-square object-cover">
                        <div class="p-4">
                            <h4 class="font-bold text-sm truncate">${p.name}</h4>
                            <div class="flex justify-between items-center mt-3">
                                <span class="font-bold">₹${p.price}</span>
                                <button onclick="triggerOrder('${p.name}', '${p.creatorId}', '${p.price}')" class="bg-black text-white text-[10px] px-3 py-2 rounded-lg">Buy</button>
                            </div>
                        </div>
                    </div>`;
                });
            });

            // Orders Load WITH DELETE
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid), orderBy("time", "desc")), s => {
                const l = document.getElementById('order-list'); l.innerHTML = "";
                s.forEach(o => {
                    const d = o.data();
                    const orderId = o.id;
                    const date = d.time ? new Date(d.time.seconds * 1000).toLocaleString('en-IN') : 'Just now';
                    
                    l.innerHTML += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative">
                        <button onclick="deleteOrder('${orderId}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                        <div class="text-[#d4af37] font-bold text-lg">₹${d.price || '0'}</div>
                        <div class="font-bold text-gray-800">${d.item || 'Product'}</div>
                        <div class="text-xs text-gray-500 mt-2 space-y-1">
                            <p><i class="fa-solid fa-user mr-2"></i>${d.customer}</p>
                            <p><i class="fa-solid fa-phone mr-2"></i>${d.phone}</p>
                            <p><i class="fa-solid fa-location-dot mr-2"></i>${d.city || 'No City'}</p>
                            <p class="text-[10px] pt-2 text-gray-400 border-t mt-2">${date}</p>
                        </div>
                    </div>`;
                });
            });
        }

        window.triggerOrder = (n, cid, p) => { 
            window.targetOrder = { n, cid, p }; 
            document.getElementById('order-modal').classList.remove('hidden'); 
        };

        window.confirmOrder = async () => {
            const name = document.getElementById('o-name').value.trim();
            const phone = document.getElementById('o-phone').value.trim();
            const city = document.getElementById('o-city').value.trim();
            
            if(!name || !phone || !city) { alert("Please fill all details!"); return; }

            await addDoc(collection(db, "orders"), {
                item: window.targetOrder.n,
                customer: name,
                phone: phone,
                city: city,
                creatorId: window.targetOrder.creatorId,
                price: window.targetOrder.p,
                time: serverTimestamp()
            });

            document.getElementById('order-modal').classList.add('hidden');
            alert("Order Placed!");
        };

        // --- NEW DELETE FUNCTION ---
        window.deleteOrder = async (id) => {
            if(confirm("क्या आप इस ऑर्डर को डिलीट करना चाहते हैं?")) {
                try {
                    await deleteDoc(doc(db, "orders", id));
                } catch (err) {
                    alert("Error deleting: " + err.message);
                }
            }
        };

        window.showTab = (t) => {
            ['feed','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
