<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA V2.0 | Shahi Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f4f4f4; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn.active { color: #d4af37; border-bottom: 4px solid #d4af37; font-weight: 800; }
        .hidden { display: none !important; }
        
        /* BANNER & PROFILE SIDE-FIXED DESIGN */
        .banner-box { 
            height: 250px; 
            background: #1a1a1a; 
            background-size: cover; 
            background-position: center;
            border-bottom: 5px solid #d4af37;
            position: relative;
            margin: 10px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: visible;
        }
        .profile-container {
            position: absolute;
            bottom: -40px;
            left: 25px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }
        .profile-img { 
            width: 100px; height: 100px; 
            border-radius: 25px; 
            border: 4px solid #fff; 
            object-fit: cover; 
            background: #fff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .shahi-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .shahi-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .img-frame { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f9f9f9; }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        /* CHAT BUBBLE */
        .chat-dot { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: red; border-radius: 50%; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm text-center">
            <h1 class="raj-font text-4xl text-[#d4af37] mb-2">SAINIWALAA</h1>
            <p class="text-[10px] text-gray-400 mb-10 tracking-widest uppercase font-bold">Creator Darbar V2.0</p>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 border-b mb-4 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border-b mb-8 outline-none">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-full font-bold shadow-xl">LOG IN / SIGN UP</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md flex justify-around border-b shadow-sm">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn active p-4 text-[10px] font-bold uppercase">Trending</button>
            <button onclick="showTab('follow')" id="tab-follow" class="nav-btn p-4 text-[10px] font-bold uppercase">Following</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn p-4 text-[10px] font-bold uppercase">Mhari Shop</button>
            <button onclick="showTab('chats')" id="tab-chats" class="nav-btn p-4 text-[10px] font-bold uppercase relative">Messages <span id="msg-alert" class="chat-dot hidden"></span></button>
            <button onclick="logout()" class="p-4 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-feed" class="p-4 max-w-6xl mx-auto">
            <div class="mb-6"><input type="text" id="search-input" oninput="filterFeed()" placeholder="Search..." class="w-full p-4 bg-gray-100 rounded-2xl outline-none"></div>
            <h2 class="raj-font text-xl mb-6 text-gray-800 border-b-2 border-[#d4af37] inline-block">Shahi Discovery Algorithm</h2>
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="sec-follow" class="hidden p-4 max-w-6xl mx-auto">
            <h2 class="raj-font text-xl mb-6">Mhare Followers ka Maal</h2>
            <div id="follow-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="sec-shop" class="hidden">
            <div id="banner-ui" class="banner-box">
                <div class="profile-container">
                    <div class="relative">
                        <img id="profile-ui" src="https://via.placeholder.com/150" class="profile-img">
                        <label class="absolute bottom-0 right-0 bg-[#d4af37] text-white p-2 rounded-lg cursor-pointer owner-only hidden">
                            <i class="fa-solid fa-camera text-[10px]"></i><input type="file" onchange="uploadProfileMedia('profile', this)">
                        </label>
                    </div>
                    <div class="mb-4">
                        <h2 id="disp-name" class="font-black text-white text-xl drop-shadow-md">Creator Name</h2>
                        <button id="follow-btn" onclick="toggleFollow()" class="bg-white/20 backdrop-blur text-white text-[10px] px-4 py-1 rounded-full border border-white/30 mt-1">Follow</button>
                        <button id="msg-btn" onclick="openDirectChat()" class="bg-[#d4af37] text-white text-[10px] px-4 py-1 rounded-full ml-2">Message</button>
                    </div>
                </div>
                <label class="absolute top-4 right-4 bg-black/40 p-3 rounded-xl cursor-pointer text-white owner-only hidden">
                    <i class="fa-solid fa-image mr-2"></i>Change Banner <input type="file" onchange="uploadProfileMedia('banner', this)">
                </label>
            </div>

            <div class="mt-16 px-6 max-w-4xl mx-auto">
                <div class="p-4 rounded-2xl bg-white shadow-sm border border-gray-100">
                    <p id="disp-bio" class="text-gray-600 italic">Bio goes here...</p>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button onclick="copyShopLink()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-share mr-2"></i>Share Shop</button>
                    <button id="block-btn" onclick="toggleBlock()" class="bg-red-50 py-3 px-6 rounded-xl font-bold text-[10px] text-red-500 uppercase">Block</button>
                </div>
                
                <button onclick="document.getElementById('edit-profile-box').classList.toggle('hidden')" class="w-full mt-4 border py-3 rounded-xl text-[10px] font-bold owner-only hidden uppercase">Shop Settings</button>
            </div>

            <div id="edit-profile-box" class="hidden max-w-sm mx-auto p-6 mt-4 bg-white border rounded-[30px] shadow-xl space-y-3">
                <input id="in-name" placeholder="Shop Name" class="w-full p-2 border-b outline-none">
                <div class="flex gap-2 items-center text-[10px] font-bold">COLOR: <input id="in-name-color" type="color"> SIZE: <input id="in-name-size" type="number" class="w-16 border-b"></div>
                <input id="in-bio" placeholder="Bio..." class="w-full p-2 border-b outline-none">
                <div class="flex gap-2 items-center text-[10px] font-bold">BIO COLOR: <input id="in-bio-color" type="color"> SIZE: <input id="in-bio-size" type="number" class="w-16 border-b"></div>
                <input id="in-wa" placeholder="WhatsApp" class="w-full p-2 border-b outline-none">
                <input id="in-insta" placeholder="Instagram" class="w-full p-2 border-b outline-none">
                <button onclick="saveProfileData()" class="w-full bg-black text-white p-4 rounded-xl font-bold">SAVE SETTINGS</button>
            </div>

            <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 mt-10"></div>
        </section>

        <section id="sec-chats" class="hidden p-4 max-w-xl mx-auto">
            <h3 class="raj-font text-xl mb-4">Messages</h3>
            <div id="chat-list" class="space-y-2"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let viewId = null;

        onAuthStateChanged(auth, u => {
            if(u) {
                currentUser = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initAlgorithmFeed();
                syncChats();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        // --- SHAHI ALGORITHM FEED ---
        // Iska kaam hai: Sabhi creators ke products ko mix karke dikhana
        // Taaki kisi ek ka dominance na rahe aur naye creators bhi boost hon.
        async function initAlgorithmFeed() {
            onSnapshot(collection(db, "products"), (snap) => {
                let all = [];
                snap.forEach(d => all.push({id: d.id, ...d.data()}));
                
                // Shuffle Algorithm: Randomize but prioritize variety of creators
                const shuffled = all.sort(() => Math.random() - 0.5);
                
                const grid = document.getElementById('public-grid');
                grid.innerHTML = "";
                shuffled.forEach(p => {
                    grid.innerHTML += `
                    <div class="shahi-card">
                        <div class="img-frame"><img src="${p.img}"></div>
                        <div class="p-3">
                            <button onclick="viewCreator('${p.creatorId}')" class="text-[8px] font-black text-[#d4af37]">@${p.creator}</button>
                            <h4 class="font-bold text-[11px] truncate">${p.name}</h4>
                            <p class="font-bold text-xs mt-1">₹${p.price}</p>
                            <button onclick="orderNow('${p.name}', '${p.creatorId}', '${p.link}')" class="w-full bg-black text-white text-[9px] py-2 rounded-lg mt-2 font-bold">ORDER</button>
                        </div>
                    </div>`;
                });
            });
        }

        // --- FOLLOW & BLOCK SYSTEM ---
        window.toggleFollow = async () => {
            const fRef = doc(db, "users", currentUser.uid, "following", viewId);
            const snap = await getDoc(fRef);
            if(snap.exists()) { await deleteDoc(fRef); }
            else { await setDoc(fRef, { time: serverTimestamp() }); }
            checkFollowStatus();
        };

        window.toggleBlock = async () => {
            const bRef = doc(db, "users", currentUser.uid, "blocked", viewId);
            const snap = await getDoc(bRef);
            if(snap.exists()) { await deleteDoc(bRef); }
            else { await setDoc(bRef, { time: serverTimestamp() }); alert("Blocked!"); }
        };

        // --- CHAT LOGIC ---
        window.openDirectChat = () => {
            const chatMsg = prompt("Enter your message:");
            if(chatMsg) {
                addDoc(collection(db, "chats"), {
                    from: currentUser.uid,
                    to: viewId,
                    msg: chatMsg,
                    time: serverTimestamp(),
                    senderName: document.getElementById('disp-name').innerText
                });
                alert("Message Sent!");
            }
        };

        function syncChats() {
            const q = query(collection(db, "chats"), where("to", "==", currentUser.uid), orderBy("time", "desc"));
            onSnapshot(q, snap => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl border-l-4 border-black">
                        <b class="text-xs">From: ${c.senderName || 'Unknown'}</b>
                        <p class="text-sm mt-1">${c.msg}</p>
                        <button onclick="viewCreator('${c.from}')" class="text-[10px] text-[#d4af37] mt-2 font-bold">VIEW PROFILE / REPLY</button>
                    </div>`;
                });
            });
        }

        // --- V1.0 RESTORED FUNCTIONS ---
        window.showTab = (t) => {
            ['feed','follow','shop','chats'].forEach(s => {
                document.getElementById('sec-'+s)?.classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s)?.classList.toggle('active', s === t);
            });
            if(t === 'shop') viewCreator(currentUser.uid);
        };

        window.viewCreator = async (id) => {
            viewId = id;
            const isOwner = (currentUser.uid === id);
            document.querySelectorAll('.owner-only').forEach(el => isOwner ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.getElementById('follow-btn').classList.toggle('hidden', isOwner);
            document.getElementById('msg-btn').classList.toggle('hidden', isOwner);
            document.getElementById('block-btn').classList.toggle('hidden', isOwner);

            const snap = await getDoc(doc(db, "users", id));
            if(snap.exists()){
                const d = snap.data();
                const n = document.getElementById('disp-name');
                n.innerText = d.name || "Shahi Creator";
                n.style.color = d.nameColor; n.style.fontSize = d.nameSize+"px";
                document.getElementById('disp-bio').innerText = d.bio || "No bio yet";
                document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
                document.getElementById('banner-ui').style.backgroundImage = `url(${d.banner})`;
            }
            showTab('shop');
            syncMyShop(id);
        };

        // Existing V1.0 logic for upload/save remains the same...
        window.handleAuth = () => { /* V1.0 login logic */ };
        window.logout = () => signOut(auth).then(() => location.reload());

    </script>
</body>
</html>
