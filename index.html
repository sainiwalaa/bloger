<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Elite Persistence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fdfdfd; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn { color: #999; font-weight: 700; border-bottom: 3px solid transparent; transition: 0.3s; }
        .nav-btn.active { color: #d4af37; border-color: #d4af37; }
        .product-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .saini-header {
            background: linear-gradient(to right, #d4af37 20%, #111 40%, #111 60%, #d4af37 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-[5000] flex items-center justify-center">
        <h1 class="raj-font text-3xl animate-bounce text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="raj-font text-5xl text-[#d4af37] mb-10">S</h1>
            <input id="auth-email" placeholder="Email" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">START SYSTEM</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <header class="bg-white p-6 text-center border-b sticky top-0 z-50">
            <h1 class="raj-font text-2xl saini-header font-black">SAINIWALAA</h1>
        </header>

        <nav class="flex justify-around bg-white border-b sticky top-[73px] z-40">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-4 px-2 text-[11px] uppercase tracking-tighter">Feed</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-4 px-2 text-[11px] uppercase tracking-tighter">My Shop</button>
            <button onclick="showTab('inbox')" id="tab-inbox" class="nav-btn py-4 px-2 text-[11px] uppercase tracking-tighter relative">Inbox <span id="msg-dot" class="hidden absolute top-3 right-0 w-2 h-2 bg-red-500 rounded-full"></span></button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-4 px-2 text-[11px] uppercase tracking-tighter">Orders</button>
        </nav>

        <section id="sec-feed" class="p-4 grid grid-cols-2 gap-4 hidden"></section>

        <section id="sec-shop" class="hidden">
            <div class="p-6 bg-black text-white text-center rounded-b-[40px] mb-8">
                <p class="raj-font text-xl" id="shop-name">Loading...</p>
                <button onclick="logout()" class="text-[10px] text-red-400 mt-2">LOGOUT</button>
            </div>
            
            <div class="p-6 max-w-lg mx-auto bg-white rounded-3xl border shadow-sm mb-10">
                <input id="p-name" placeholder="Product Name" class="w-full p-3 bg-gray-50 rounded-xl mb-3 outline-none">
                <input id="p-price" placeholder="Price (INR)" class="w-full p-3 bg-gray-50 rounded-xl mb-3 outline-none">
                <input id="p-link" placeholder="Purchase Link (Amazon/Website)" class="w-full p-3 bg-gray-50 rounded-xl mb-3 outline-none">
                <textarea id="p-desc" placeholder="Details (In Red)" class="w-full p-3 bg-gray-50 rounded-xl mb-3 outline-none h-20"></textarea>
                <input type="file" id="p-file" onchange="handleFile(this)" class="mb-4 text-xs">
                <button onclick="publish()" class="w-full bg-[#d4af37] text-white p-4 rounded-2xl font-bold">ADD TO SHOP</button>
            </div>

            <div id="shop-grid" class="p-4 grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-inbox" class="p-6 hidden">
            <h2 class="raj-font text-2xl mb-6">Messages</h2>
            <div id="inbox-list" class="space-y-4"></div>
        </section>

        <section id="sec-orders" class="p-6 hidden">
            <h2 class="raj-font text-2xl mb-6">Order History</h2>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <div id="order-modal" class="hidden fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm p-8 rounded-[40px] text-center">
            <h3 class="raj-font text-xl mb-2">Checkout</h3>
            <p id="target-item" class="text-xs text-gray-400 mb-6 font-bold uppercase"></p>
            <input id="o-name" placeholder="Your Name" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none">
            <input id="o-phone" placeholder="WhatsApp Number" class="w-full p-4 bg-gray-50 rounded-2xl mb-6 outline-none">
            <button onclick="confirmOrder()" class="w-full bg-black text-white p-5 rounded-2xl font-bold">PLACE ORDER</button>
            <button onclick="closeOrder()" class="mt-4 text-xs text-gray-400">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", 
            authDomain: "social-blog-93d38.firebaseapp.com", 
            projectId: "social-blog-93d38", 
            storageBucket: "social-blog-93d38.appspot.com", 
            appId: "1:78643219054:web:dprl2lyih" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let tempImg = null; let targetOrder = null;

        onAuthStateChanged(auth, u => {
            document.getElementById('loading').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('auth-section').classList.add('hidden');
                setupRealtime();
                showTab(localStorage.getItem('lastTab') || 'feed');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function setupRealtime() {
            // Feed & Shop
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), s => {
                const feed = document.getElementById('sec-feed');
                const shop = document.getElementById('shop-grid');
                feed.innerHTML = ""; shop.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    const card = `<div class="product-card">
                        <img src="${p.img}" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <p class="text-[8px] text-[#d4af37] font-bold uppercase">@${p.sellerName}</p>
                            <h4 class="font-bold text-sm truncate">${p.name}</h4>
                            <p class="text-[10px] text-red-500 font-bold mb-3">${p.desc}</p>
                            <div class="flex justify-between items-center">
                                <span class="font-black">₹${p.price}</span>
                                <div class="flex gap-2">
                                    <button onclick="sendMsg('${p.sellerId}')" class="text-gray-400"><i class="fa-solid fa-message"></i></button>
                                    <button onclick="openOrder('${p.name}','${p.sellerId}','${p.link}','${p.price}')" class="bg-black text-white px-3 py-1.5 rounded-lg text-[9px] font-bold">BUY</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                    feed.innerHTML += card;
                    if(p.sellerId === curU.uid) {
                        shop.innerHTML += card + `<button onclick="delItem('${d.id}')" class="text-red-400 text-[10px] p-2">Delete Item</button>`;
                    }
                });
            });

            // Inbox
            onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid), orderBy("time", "desc")), s => {
                const list = document.getElementById('inbox-list');
                document.getElementById('msg-dot').classList.toggle('hidden', s.empty);
                list.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl border shadow-sm">
                        <p class="text-[8px] font-bold text-[#d4af37]">FROM: ${m.from.slice(0,10)}</p>
                        <p class="my-2 text-sm">${m.msg}</p>
                        <button onclick="sendMsg('${m.from}')" class="text-[10px] font-bold underline">REPLY</button>
                    </div>`;
                });
            });

            // Orders (For Seller)
            onSnapshot(query(collection(db, "orders"), where("sellerId", "==", curU.uid), orderBy("time", "desc")), s => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-3xl border border-green-100 shadow-sm">
                        <div class="flex justify-between font-bold mb-2"><span>${o.item}</span> <span class="text-green-600">₹${o.price}</span></div>
                        <p class="text-xs text-gray-500">Customer: ${o.name}</p>
                        <p class="text-xs text-gray-400">WA: ${o.phone}</p>
                    </div>`;
                });
            });
        }

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };

        window.showTab = (t) => {
            ['feed','shop','inbox','orders'].forEach(tab => {
                document.getElementById('sec-'+tab).classList.toggle('hidden', tab !== t);
                document.getElementById('tab-'+tab).classList.toggle('active', tab === t);
            });
            localStorage.setItem('lastTab', t);
        };

        window.handleFile = (input) => {
            const r = new FileReader(); r.readAsDataURL(input.files[0]);
            r.onload = e => tempImg = e.target.result;
        };

        window.publish = async () => {
            const n = document.getElementById('p-name').value;
            if(!n || !tempImg) return alert("Fill all details & Image!");
            await addDoc(collection(db, "products"), {
                name: n, price: document.getElementById('p-price').value,
                link: document.getElementById('p-link').value, desc: document.getElementById('p-desc').value,
                img: tempImg, sellerId: curU.uid, sellerName: curU.email.split('@')[0], time: serverTimestamp()
            });
            alert("Product Added!");
            showTab('feed');
        };

        window.sendMsg = (toId) => {
            const m = prompt("Enter your message:");
            if(m) addDoc(collection(db, "chats"), { from: curU.uid, to: toId, msg: m, time: serverTimestamp() });
        };

        window.openOrder = (name, sid, link, price) => {
            targetOrder = { name, sid, link, price };
            document.getElementById('target-item').innerText = name;
            document.getElementById('order-modal').classList.remove('hidden');
        };

        window.confirmOrder = async () => {
            const on = document.getElementById('o-name').value, op = document.getElementById('o-phone').value;
            if(!on || !op) return alert("Details bharo!");
            
            await addDoc(collection(db, "orders"), {
                ...targetOrder, name: on, phone: op, time: serverTimestamp()
            });
            
            alert("Order Saved! Opening Purchase Link...");
            document.getElementById('order-modal').classList.add('hidden');
            if(targetOrder.link) window.open(targetOrder.link, '_blank');
        };

        window.closeOrder = () => document.getElementById('order-modal').classList.add('hidden');
        window.delItem = async (id) => confirm("Delete?") && await deleteDoc(doc(db,"products",id));
        window.logout = () => signOut(auth).then(() => location.reload());

    </script>
</body>
</html>
