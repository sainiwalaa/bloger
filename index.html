<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Social & Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- LIKE SYSTEM ---
        window.likePost = (postId) => {
            const uid = auth.currentUser.uid;
            update(ref(db, `posts/${postId}/likes`), { [uid]: true });
        };

        // --- COMMENT SYSTEM ---
        window.addComment = (postId) => {
            const msg = prompt("Aapko vichaar likho:");
            if(msg) {
                push(ref(db, `posts/${postId}/comments`), {
                    text: msg,
                    user: auth.currentUser.displayName || "Yatri",
                    time: serverTimestamp()
                });
            }
        };

        // --- FOLLOW SYSTEM ---
        window.toggleFollow = (targetUid) => {
            const myUid = auth.currentUser.uid;
            update(ref(db, `users/${myUid}/following`), { [targetUid]: true });
            update(ref(db, `users/${targetUid}/followers`), { [myUid]: true });
            alert("Saath joda gaya! 🤝");
        };

        // --- FEED RENDERING ---
        onValue(ref(db, 'posts'), (snap) => {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                const likesCount = p.likes ? Object.keys(p.likes).length : 0;
                feed.innerHTML += `
                    <div class="bg-zinc-900 border border-yellow-900/20 rounded-2xl mb-6 overflow-hidden">
                        <div class="p-3 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-600"></div>
                            <span class="text-xs font-bold gold-text">Hukum Saini</span>
                        </div>
                        <img src="${p.url}" class="w-full aspect-square object-cover">
                        <div class="p-4">
                            <div class="flex gap-4 mb-2">
                                <button onclick="likePost('${child.key}')" class="text-xl"><i class="fa-heart fa-regular"></i> ${likesCount}</button>
                                <button onclick="addComment('${child.key}')" class="text-xl"><i class="fa-comment fa-regular"></i></button>
                            </div>
                            <p class="text-sm text-gray-300">${p.caption || ""}</p>
                        </div>
                    </div>`;
            });
        });

        // --- BAZAAR & ORDER LOGIC ---
        window.placeOrder = async (pName, pPrice) => {
            const cName = prompt("Aapko Naam:");
            const cPhone = prompt("Mobile Number:");
            const cAddress = prompt("Pata (Address):");
            if(cName && cPhone && cAddress) {
                await push(ref(db, 'orders'), {
                    product: pName, price: pPrice, customer: cName, mobile: cPhone, pata: cAddress, time: serverTimestamp()
                });
                alert("Order ho gayo hukum! 📦");
            }
        };

        // Auth state check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('app-screen').style.display = 'block';
            }
        });

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&display=swap');
        body { background: #000; color: #fff; font-family: 'Marcellus', serif; }
        .gold-text { color: #D4AF37; }
        .gold-border { border: 1px solid #D4AF37; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen pb-24">

    <div id="app-screen">
        <header class="p-5 flex justify-between items-center border-b border-zinc-900">
            <h1 class="gold-text text-xl font-bold tracking-tighter">SAINIWALAA</h1>
            <div class="flex gap-4">
                <i class="fa-solid fa-bell text-zinc-500"></i>
                <i class="fa-solid fa-bars gold-text"></i>
            </div>
        </header>

        <nav class="flex border-b border-zinc-900 sticky top-0 bg-black z-50">
            <button onclick="document.getElementById('feed-tab').style.display='block'; document.getElementById('bazaar-tab').style.display='none';" class="flex-1 py-4 text-[10px] uppercase tracking-widest gold-text font-bold">Darbar</button>
            <button onclick="document.getElementById('feed-tab').style.display='none'; document.getElementById('bazaar-tab').style.display='block';" class="flex-1 py-4 text-[10px] uppercase tracking-widest text-zinc-500">Bazaar</button>
        </nav>

        <div id="feed-tab" class="p-4">
            <div id="feed-container">
                </div>
        </div>

        <div id="bazaar-tab" class="p-4" style="display:none">
            <div class="text-center py-10">
                <h2 class="gold-text text-lg mb-4">Shahi Dukaan</h2>
                <div id="bazaar-list" class="grid grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>

</body>
</html>
