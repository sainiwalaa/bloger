<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Shahi Darbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .royal-card { background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-active { color: #d4af37 !important; border-top: 2px solid #d4af37; }
        .btn-glow { box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .btn-glow:active { transform: scale(0.95); }
        input, textarea { background: #111 !important; border: 1px solid #222 !important; color: white !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-[100] bg-black/80 backdrop-blur-xl border-b border-white/5 p-4 flex justify-between items-center">
        <h1 class="gold-text font-black text-2xl tracking-tighter" style="font-family: 'Cinzel';">SAINIWALAA</h1>
        <div class="flex gap-4 items-center">
            <i class="fa-solid fa-bell text-zinc-500"></i>
            <div id="p-avatar" class="w-8 h-8 rounded-full bg-zinc-800 border border-gold/30 hidden"></div>
        </div>
    </header>

    <div id="auth-screen" class="min-h-[80vh] flex flex-col justify-center px-6">
        <div class="royal-card p-8">
            <h2 class="text-3xl font-bold mb-2">Login</h2>
            <p class="text-zinc-500 text-sm mb-8">Shahi Darbar mein aapka swagat hai.</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl mb-4 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl mb-6 outline-none">
            <button id="login-btn" onclick="shahiLogin()" class="w-full bg-[#d4af37] text-black font-bold p-4 rounded-xl btn-glow uppercase tracking-widest">Pravash Karein</button>
        </div>
    </div>

    <main id="app-screen" class="hidden px-4 pt-6 max-w-xl mx-auto">
        
        <section id="page-darbar" class="space-y-6">
            <div class="royal-card p-5">
                <textarea id="post-txt" placeholder="Hukum, aaj kya vichaar hai?" class="w-full p-0 bg-transparent border-none outline-none text-lg mb-4" rows="2"></textarea>
                <div class="flex justify-between items-center border-t border-white/5 pt-4">
                    <button onclick="upload('post')" class="text-zinc-400 text-sm font-bold"><i class="fa-solid fa-image text-gold mr-2"></i>Media</button>
                    <button id="post-btn" onclick="submitPost()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm">Post</button>
                </div>
            </div>
            <div id="feed-list" class="space-y-6 pb-10"></div>
        </section>

        <section id="page-bazaar" class="hidden pb-10">
            <div class="royal-card p-5 mb-8">
                <h3 class="font-bold text-gold mb-4 uppercase text-xs tracking-widest">Add New Product</h3>
                <input id="p-name" placeholder="Item Name" class="w-full p-3 rounded-xl mb-3 outline-none">
                <input id="p-price" placeholder="Price (₹)" class="w-full p-3 rounded-xl mb-3 outline-none">
                <input id="p-link" placeholder="Buy Link (WhatsApp/Web)" class="w-full p-3 rounded-xl mb-4 outline-none">
                <button id="prod-btn" onclick="upload('prod')" class="w-full border border-gold text-gold p-3 rounded-xl font-bold uppercase text-xs tracking-tighter">Photo & List Product</button>
            </div>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="page-profile" class="hidden">
            <div class="text-center py-10">
                <div class="w-24 h-24 bg-zinc-900 rounded-full mx-auto mb-4 border-2 border-gold flex items-center justify-center">
                    <i class="fa-solid fa-crown text-4xl text-gold"></i>
                </div>
                <h2 id="u-display" class="text-2xl font-black mb-1 tracking-tighter uppercase">Maharaja</h2>
                <p id="u-bio-text" class="text-zinc-500 text-sm mb-6">Shahi Sadasya</p>
                <button onclick="editBio()" class="bg-zinc-800 px-6 py-2 rounded-full text-xs font-bold border border-white/10">Edit Bio</button>
            </div>
            <div class="border-t border-white/5 pt-8">
                <h3 class="text-gold font-bold uppercase text-[10px] tracking-widest mb-4">My Orders</h3>
                <div id="order-list" class="space-y-3 pb-20"></div>
            </div>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-xs py-10 uppercase tracking-widest opacity-50">Sign Out Account</button>
        </section>
    </main>

    <nav id="app-nav" class="hidden fixed bottom-0 left-0 w-full bg-black/90 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center py-3 px-6 z-[200]">
        <button onclick="tab('darbar')" id="tab-darbar" class="flex flex-col items-center gap-1 nav-active flex-1 pt-2 transition-all"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[9px] font-bold uppercase">Darbar</span></button>
        <button onclick="tab('bazaar')" id="tab-bazaar" class="flex flex-col items-center gap-1 text-zinc-500 flex-1 pt-2 transition-all"><i class="fa-solid fa-bag-shopping text-xl"></i><span class="text-[9px] font-bold uppercase">Bazaar</span></button>
        <button onclick="tab('profile')" id="tab-profile" class="flex flex-col items-center gap-1 text-zinc-500 flex-1 pt-2 transition-all"><i class="fa-solid fa-user-large text-xl"></i><span class="text-[9px] font-bold uppercase">Aap</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, tempImg = "";

        // UI CORE
        window.tab = (t) => {
            ['darbar','bazaar','profile'].forEach(i => {
                document.getElementById('page-'+i).classList.add('hidden');
                document.getElementById('tab-'+i).classList.remove('nav-active', 'text-zinc-500');
                document.getElementById('tab-'+i).classList.add('text-zinc-500');
            });
            document.getElementById('page-'+t).classList.remove('hidden');
            document.getElementById('tab-'+t).classList.add('nav-active');
            window.scrollTo(0,0);
        };

        window.action = async (id, fn) => {
            const b = document.getElementById(id); b.disabled = true; const old = b.innerText;
            b.innerText = "HUKUM, KAAM HO RYO HAI...";
            try { await fn(); } catch(e) { alert(e.message); }
            finally { b.disabled = false; b.innerText = old; }
        };

        // AUTH
        window.shahiLogin = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            action('login-btn', () => signInWithEmailAndPassword(auth, e, p));
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('u-display').innerText = u.email.split('@')[0];
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-nav').classList.remove('hidden');
                sync();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('app-nav').classList.add('hidden');
            }
        });

        // SYNC
        function sync() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                const f = document.getElementById('feed-list'); f.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    f.innerHTML += `
                    <div class="royal-card overflow-hidden">
                        <div class="p-4 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-zinc-800 border border-gold/20 flex items-center justify-center text-[10px] text-gold uppercase font-bold">${p.author[0]}</div>
                            <span class="font-bold text-sm">@${p.author}</span>
                        </div>
                        ${p.url ? `<img src="${p.url}" class="w-full border-y border-white/5">` : ''}
                        <div class="p-4"><p class="text-zinc-300 text-sm leading-relaxed">${p.text}</p></div>
                    </div>`;
                });
            });

            onSnapshot(collection(db, "products"), snap => {
                const g = document.getElementById('shop-grid'); g.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `
                    <div class="royal-card overflow-hidden flex flex-col">
                        <img src="${p.img}" class="aspect-square object-cover w-full">
                        <div class="p-3 text-center flex-1">
                            <h4 class="text-[10px] font-bold mb-1 truncate">${p.name}</h4>
                            <p class="text-gold font-black text-xs mb-3">₹${p.price}</p>
                            <button onclick="buy('${p.name}','${p.link}')" class="w-full bg-white text-black py-2 rounded-lg text-[10px] font-bold">Buy Now</button>
                        </div>
                    </div>`;
                });
            });

            onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
                const l = document.getElementById('order-list'); l.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    l.innerHTML += `<div class="p-4 bg-zinc-900/50 border border-white/5 rounded-2xl text-[11px]"><b class="text-gold uppercase">${o.cust}</b> ne <b class="text-white">${o.item}</b> order kiya.<br><span class="opacity-40">📞 ${o.phone}</span></div>`;
                });
            });
        }

        // ACTIONS
        window.upload = (t) => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    tempImg = res.info.secure_url;
                    if(t==='prod') listProd();
                    else alert("Photo Selected!");
                }
            });
        };

        window.submitPost = () => {
            const t = document.getElementById('post-txt').value;
            if(!t && !tempImg) return;
            action('post-btn', async () => {
                await addDoc(collection(db, "posts"), { author: user.email.split('@')[0], text: t, url: tempImg, time: serverTimestamp() });
                document.getElementById('post-txt').value = ""; tempImg = "";
            });
        };

        async function listProd() {
            action('prod-btn', async () => {
                await addDoc(collection(db, "products"), { name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, link: document.getElementById('p-link').value, img: tempImg, time: serverTimestamp() });
                tempImg = "";
            });
        }

        window.buy = async (item, link) => {
            const cust = prompt("Naam?"), phone = prompt("Phone?");
            if(cust && phone) {
                await addDoc(collection(db, "orders"), { item, cust, phone, time: serverTimestamp() });
                window.location.href = link;
            }
        };

        window.editBio = () => {
            const b = prompt("Update Bio:");
            if(b) document.getElementById('u-bio-text').innerText = b;
        };
    </script>
</body>
</html>
