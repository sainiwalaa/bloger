<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Royal Darbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --royal-black: #050505; }
        body { background: var(--royal-black); color: #fff; font-family: sans-serif; margin: 0; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        .royal-btn { background: var(--gold); color: #000; font-weight: bold; padding: 14px; border-radius: 15px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .royal-btn:disabled { opacity: 0.6; filter: grayscale(1); }
        .royal-input { width: 100%; background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 12px; color: #fff; border-radius: 12px; outline: none; }
        .nav-bar { background: rgba(0,0,0,0.95); border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; max-width: 500px; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #555; text-align: center; cursor: pointer; font-size: 10px; }
        .nav-item.active { color: var(--gold); transform: scale(1.1); }
        .hidden { display: none !important; }
        .card { background: #0f0f0f; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 pb-20">

    <header class="sticky top-0 bg-black/90 p-4 border-b border-yellow-700/40 text-center z-50">
        <h1 class="gold-text font-bold text-2xl tracking-[8px]">SAINIWALAA</h1>
    </header>

    <section id="darbar-sec" class="p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="gold-text font-bold italic">🚩 Shahi Darbar</h2>
            <button onclick="alert('Hukum, Photo chuno!')" class="bg-zinc-800 px-4 py-2 rounded-xl text-[10px]">+ NAYA POST</button>
        </div>
        <div id="feed-container" class="text-zinc-600 text-center py-20 italic">Darbar khali hai... Kuch post karein hukum.</div>
    </section>

    <section id="bazaar-sec" class="p-4 hidden">
        <h2 class="gold-text font-bold mb-4 italic">🛍 SHAHI BAZAAR</h2>
        
        <div class="card border-yellow-600/30">
            <p class="text-[10px] text-zinc-500 mb-3 uppercase tracking-widest text-center">Naya Maal List Karein</p>
            <input id="p-name" placeholder="Maal ko Naam (Product Name)" class="royal-input">
            <input id="p-price" placeholder="Keemat (Price ₹)" class="royal-input">
            <input id="p-link" placeholder="Bahar ko Link (External Weblink)" class="royal-input">
            <button id="save-product-btn" onclick="saveToBazaar()" class="royal-btn">MAAL SAVE KARO 👑</button>
        </div>

        <div id="bazaar-list" class="grid grid-cols-2 gap-4 mt-6">
            </div>
    </section>

    <section id="aap-sec" class="p-4 hidden">
        <div class="flex flex-col items-center py-10">
            <div class="w-24 h-24 rounded-full border-2 border-yellow-600 p-1 mb-4">
                <img src="https://via.placeholder.com/100" class="w-full h-full rounded-full object-cover">
            </div>
            <h3 class="text-xl font-bold">Sunil Saini</h3>
            <p class="text-zinc-500 text-xs mt-1 italic">Royal Creator</p>
        </div>
    </section>

    <nav class="nav-bar">
        <div onclick="showPage('darbar')" id="btn-darbar" class="nav-item active"><i class="fa-solid fa-crown text-xl"></i><p>DARBAR</p></div>
        <div onclick="showPage('bazaar')" id="btn-bazaar" class="nav-item"><i class="fa-solid fa-shop text-xl"></i><p>BAZAAR</p></div>
        <div onclick="showPage('aap')" id="btn-aap" class="nav-item"><i class="fa-solid fa-user-ninja text-xl"></i><p>AAP</p></div>
    </nav>

    <script>
        // --- Navigation Logic ---
        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId + '-sec').classList.remove('hidden');
            document.getElementById('btn-' + pageId).classList.add('active');
        }

        // --- Bazaar Listing & Rajasthani Click Response ---
        function saveToBazaar() {
            const btn = document.getElementById('save-product-btn');
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price) {
                alert("Hukum, jankari poori bhariye!");
                return;
            }

            // Click Protection & Rajasthani Response
            btn.disabled = true;
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Tharo hukum likhayo ja ryo hai...";

            setTimeout(() => {
                alert("Sauda Darj ho gayo! (Success)");
                btn.disabled = false;
                btn.innerHTML = "MAAL SAVE KARO 👑";
                
                // Demo card add karna
                const list = document.getElementById('bazaar-list');
                list.innerHTML += `
                    <div class="card text-center">
                        <div class="h-24 bg-zinc-800 rounded-xl mb-2"></div>
                        <p class="text-xs gold-text font-bold">${name}</p>
                        <p class="text-[10px] text-zinc-500">₹${price}</p>
                    </div>`;
            }, 1500);
        }
    </script>
</body>
</html>
