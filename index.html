<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FAST UPLOAD SYSTEM ---
        window.openWidget = (type) => {
            cloudinary.openUploadWidget({
                cloudName: "dvp58lgh3", 
                uploadPreset: "ml_default",
                clientAllowedFormats: ["jpg", "png", "jpeg"],
                maxFileSize: 2000000 // 2MB limit for speed
            }, (error, result) => {
                if (!error && result.event === "success") {
                    const url = result.info.secure_url;
                    if(type === 'post') saveToFirebase('posts', { url, time: serverTimestamp(), user: 'sunil saini' });
                    if(type === 'product') document.getElementById('p-img-url').value = url;
                    if(type === 'avatar') update(ref(db, 'profile'), { avatar: url });
                    alert("Chitra turant chadh gaya! 🚩");
                }
            });
        };

        const saveToFirebase = (path, data) => push(ref(db, path), data);

        // --- REAL-TIME LOADING ---
        onValue(ref(db, 'posts'), (snap) => {
            const cont = document.getElementById('darbar-list'); cont.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                cont.innerHTML += `<div class="bg-zinc-900 rounded-2xl mb-4 border border-zinc-800 overflow-hidden">
                    <img src="${d.url}" class="w-full object-cover">
                    <p class="p-3 text-sm text-zinc-400">Post by Sunil Saini</p>
                </div>`;
            });
        });

        onValue(ref(db, 'products'), (snap) => {
            const cont = document.getElementById('bazaar-list'); cont.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                cont.innerHTML += `<div class="bg-zinc-900 border gold-border rounded-2xl p-3">
                    <img src="${d.img}" class="w-full h-32 object-cover rounded-xl mb-2">
                    <h3 class="gold-text font-bold text-xs">${d.name}</h3>
                    <p class="text-[10px]">₹${d.price}</p>
                </div>`;
            });
        });

        onValue(ref(db, 'profile'), (snap) => {
            if(snap.exists()){
                document.getElementById('display-bio').innerText = snap.val().bio;
                if(snap.val().avatar) document.getElementById('main-avatar').src = snap.val().avatar;
            }
        });

        window.saveMahal = () => {
            const bio = document.getElementById('bio-input').value;
            update(ref(db, 'profile'), { bio: bio });
            document.getElementById('mahal-modal').classList.add('hidden');
        };

        window.switchPage = (p) => {
            document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
            document.getElementById(p + '-page').classList.remove('hidden');
        };
    </script>

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-border { border: 1px solid #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 pb-20">

    <header class="p-4 text-center border-b border-zinc-900 sticky top-0 bg-black z-50">
        <h1 class="gold-text tracking-[4px] font-bold text-lg uppercase">SAINIWALAA</h1>
    </header>

    <div id="aap-page" class="page p-5">
        <div class="flex items-center gap-5 py-6">
            <div class="relative">
                <img id="main-avatar" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-full border-4 border-black ring-2 ring-yellow-600 object-cover">
                <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-black rounded-full"></div>
            </div>
            <div>
                <h2 class="text-xl font-bold">sunil saini</h2>
                <p id="display-bio" class="text-xs text-zinc-500">SSSSSSSSSSSSSSS</p>
            </div>
        </div>
        <div class="flex justify-between items-center mb-8 px-2">
            <div class="flex gap-6 text-center">
                <div><p class="text-sm font-bold">0</p><p class="text-[9px] text-zinc-500">POST</p></div>
                <div><p class="text-sm font-bold">0</p><p class="text-[9px] text-zinc-500">SAATHI</p></div>
            </div>
            <button onclick="document.getElementById('mahal-modal').classList.remove('hidden')" class="gold-border px-4 py-1.5 rounded-lg text-xs gold-text bg-yellow-600/5">
                <i class="fa-solid fa-gear mr-1"></i> Badlaav
            </button>
        </div>
        
        <div class="flex border-y border-zinc-900 text-[10px] tracking-widest font-bold">
            <button onclick="switchPage('darbar')" class="flex-1 py-4 gold-text border-b border-yellow-600">DARBAR</button>
            <button onclick="switchPage('bazaar')" class="flex-1 py-4 text-zinc-500">DUKAAN</button>
            <button class="flex-1 py-4 text-zinc-500">SAUDA</button>
        </div>
    </div>

    <div id="darbar-page" class="page hidden p-4">
        <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800 mb-6 flex justify-between items-center">
            <span class="text-zinc-500 text-sm italic">Kuch naya dikhao...</span>
            <button onclick="openWidget('post')" class="bg-yellow-600 text-black px-4 py-1.5 rounded-full text-xs font-bold">+ Naya Post</button>
        </div>
        <div id="darbar-list"></div>
    </div>

    <div id="bazaar-page" class="page hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="gold-text font-bold">Shahi Bazaar</h2>
            <button onclick="document.getElementById('bazaar-form').classList.toggle('hidden')" class="bg-orange-700 px-3 py-2 rounded-lg text-[10px] font-bold tracking-tighter uppercase">+ Bazaar me Rakho</button>
        </div>
        
        <div id="bazaar-form" class="bg-zinc-900 p-4 rounded-2xl mb-6 hidden border border-zinc-800">
            <input id="p-name" type="text" placeholder="Maal ko Naam" class="w-full bg-black p-3 rounded mb-2 text-sm outline-none">
            <input id="p-price" type="number" placeholder="Keemat (₹)" class="w-full bg-black p-3 rounded mb-2 text-sm outline-none">
            <input type="hidden" id="p-img-url">
            <button onclick="openWidget('product')" class="w-full border border-zinc-700 py-2 rounded text-[10px] mb-2">PHOTO CHUNO</button>
            <button onclick="const n=document.getElementById('p-name').value; const p=document.getElementById('p-price').value; const i=document.getElementById('p-img-url').value; if(n&&p&&i){saveToFirebase('products',{name:n,price:p,img:i}); alert('Bazaar me maal rakha gaya!'); document.getElementById('bazaar-form').classList.add('hidden');}" class="w-full bg-yellow-600 text-black py-2 rounded font-bold text-xs uppercase">Save Karo</button>
        </div>
        <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="mahal-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-[#111] w-full rounded-[30px] p-6 border border-zinc-800 shadow-2xl relative">
            <button onclick="document.getElementById('mahal-modal').classList.add('hidden')" class="absolute top-5 right-5 text-zinc-600">✕</button>
            <h3 class="gold-text font-bold mb-6 italic text-lg">Mahal Sajao</h3>
            
            <label class="text-[10px] text-zinc-500 uppercase block mb-3">Chitra (Avatar)</label>
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 rounded-full bg-yellow-600 flex items-center justify-center text-black font-bold">SS</div>
                <button onclick="openWidget('avatar')" class="border border-yellow-600/30 px-4 py-2 rounded-xl text-[10px] gold-text bg-yellow-600/5">Photo Daalo 📷</button>
            </div>

            <label class="text-[10px] text-zinc-500 uppercase block mb-3">Aapke Baare Me (Bio)</label>
            <textarea id="bio-input" class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-sm h-24 mb-6 outline-none" placeholder="SSSSSSSSSSSSSSS"></textarea>
            
            <button onclick="saveMahal()" class="w-full bg-yellow-600 text-black py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-yellow-600/10">Save Karo 👑</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full max-w-[500px] bg-black border-t border-zinc-900 flex justify-around py-4">
        <button onclick="switchPage('darbar')" class="text-zinc-500"><i class="fa-solid fa-house"></i><p class="text-[8px] mt-1">DARBAR</p></button>
        <button onclick="switchPage('bazaar')" class="text-zinc-500"><i class="fa-solid fa-shop"></i><p class="text-[8px] mt-1">BAZAAR</p></button>
        <button onclick="switchPage('aap')" class="text-yellow-500"><i class="fa-solid fa-circle-user"></i><p class="text-[8px] mt-1">AAP</p></button>
    </nav>

</body>
</html>
