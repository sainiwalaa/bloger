<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let currentUserData = null;
        let selectedProduct = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                    showApp();
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- SHOP LOGIC (Private vs Public) ---
        window.loadMyShop = () => {
            const shopRef = ref(db, 'products');
            onValue(shopRef, (snap) => {
                const data = snap.val();
                let h = "";
                if(data) {
                    Object.keys(data).reverse().forEach(k => {
                        const p = data[k];
                        // Sirf wahi product dikhao jo is user ka hai
                        if(p.uid === auth.currentUser.uid) {
                            h += renderProductHTML(k, p, true);
                        }
                    });
                }
                document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center py-10 opacity-50 text-xs'>Aapne abhi koi saaman nahi joda hai sa.</p>";
            });
        };

        function renderProductHTML(id, p, isOwner) {
            return `
            <div class="bg-white rounded-2xl shadow-md border overflow-hidden relative">
                ${isOwner ? `<i class="fa-solid fa-trash absolute top-2 right-2 text-red-500 bg-white p-2 rounded-full text-[10px]" onclick="del('products','${id}')"></i>` : ''}
                <img src="${p.url}" class="w-full h-40 object-cover">
                <div class="p-3">
                    <h3 class="font-black text-red-900 text-[11px] uppercase truncate">${p.name}</h3>
                    <div class="text-orange-600 font-bold text-sm mb-2">₹${p.price}</div>
                    <button onclick="openOrderForm('${id}', '${p.uid}', '${p.name}')" class="w-full bg-red-800 text-white py-2 rounded-lg text-[10px] font-bold">ORDER NOW</button>
                </div>
            </div>`;
        }

        // --- ORDER SYSTEM ---
        window.openOrderForm = (prodId, sellerId, prodName) => {
            selectedProduct = { prodId, sellerId, prodName };
            document.getElementById('order-prod-title').innerText = prodName;
            openM('order-modal');
        };

        window.submitOrder = async () => {
            const customerName = document.getElementById('cust-name').value;
            const customerPhone = document.getElementById('cust-phone').value;
            const customerAddr = document.getElementById('cust-addr').value;

            if(!customerName || !customerPhone || !customerAddr) return alert("Hukum, puri jankari bhariye!");

            const orderData = {
                ...selectedProduct,
                customerName,
                customerPhone,
                customerAddr,
                status: 'New',
                time: Date.now(),
                buyerUid: auth.currentUser.uid
            };

            await push(ref(db, 'orders'), orderData);
            alert("🚩 Hukum, aapka Order Creator ke paas bhej diya gaya hai!");
            closeM('order-modal');
        };

        // --- SHOW ORDERS (FOR CREATOR) ---
        window.loadMyOrders = () => {
            onValue(ref(db, 'orders'), (snap) => {
                const data = snap.val();
                let h = "";
                if(data) {
                    Object.keys(data).reverse().forEach(k => {
                        const o = data[k];
                        if(o.sellerId === auth.currentUser.uid) {
                            h += `<div class="bg-orange-50 p-4 rounded-xl border-l-4 border-red-800 mb-3 text-[11px]">
                                <b>Item:</b> ${o.prodName} <br>
                                <b>Customer:</b> ${o.customerName} (${o.customerPhone}) <br>
                                <b>Address:</b> ${o.customerAddr}
                            </div>`;
                        }
                    });
                }
                document.getElementById('order-list').innerHTML = h || "Abhi koi order nahi hai.";
            });
        };

        // Standard App Logic
        function showApp() {
            document.getElementById('app').classList.remove('hide');
            document.getElementById('u-name-top').innerText = currentUserData.name;
            onValue(ref(db, 'posts'), snap => renderFeed(snap.val()));
            loadMyShop();
            loadMyOrders();
        }

        function renderFeed(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    const media = p.type === 'video' ? `<video src="${p.url}" controls class="w-full max-h-[70vh] bg-black"></video>` : `<img src="${p.url}" class="w-full max-h-[70vh]">`;
                    h += `<div class="bg-white mb-4 border-b">
                        <div class="p-3 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center font-bold text-red-800 uppercase text-xs">${p.uName[0]}</div>
                            <b class="text-xs uppercase">${p.uName}</b>
                        </div>
                        ${media}
                        <div class="p-4 text-sm"><p><b>${p.uName}</b> ${p.caption || ''}</p></div>
                    </div>`;
                });
            }
            document.getElementById('v-feed').innerHTML = h;
        }

        // Global Utility
        window.del = (p,k) => confirm("Hatana hai?") && remove(ref(db, `${p}/${k}`));
        window.showPage = (p) => {
            ['feed','shop','profile','orders'].forEach(v => document.getElementById('v-'+v)?.classList.add('hide'));
            document.getElementById('v-'+p).classList.remove('hide');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #7c1212, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 12px; width: 100%; }
        input, textarea { border: 1.5px solid #eee !important; padding: 12px; border-radius: 12px; margin-bottom: 10px; width: 100%; }
        .nav-icon { font-size: 1.2rem; color: #d1d5db; cursor: pointer; }
    </style>
</head>
<body class="flex justify-center">

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide">
        <h1 class="text-4xl font-black raj-title text-center mb-10">SAINIWALAA</h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <button onclick="handleAuth('login')" class="btn-royal mb-2">LOGIN</button>
        <button onclick="handleAuth('signup')" class="btn-royal bg-black">SIGNUP</button>
    </div>

    <div id="reg-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide text-center">
        <h2 class="text-xl font-black raj-title mb-6">AAPKO SHUBH NAAM?</h2>
        <input type="text" id="reg-name" placeholder="Naam likhein...">
        <button onclick="registerUser()" class="btn-royal">CHALO STUDIO MEIN 🚩</button>
    </div>

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-20 hide shadow-xl">
        <header class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-50">
            <div>
                <h1 class="text-xl font-black raj-title">SAINIWALAA</h1>
                <p id="u-name-top" class="text-[9px] font-black text-orange-600 uppercase tracking-widest"></p>
            </div>
            <div class="flex gap-4">
                <i class="fa-solid fa-list-check nav-icon" onclick="showPage('orders')" title="Orders"></i>
                <i class="fa-solid fa-plus-square nav-icon text-red-800" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store nav-icon" onclick="openM('prod-modal')"></i>
            </div>
        </header>

        <main id="v-feed"></main>

        <main id="v-shop" class="p-4 hide">
            <h2 class="text-sm font-black raj-title mb-4 border-b pb-2">MERI PERSONAL SHOP 🚩</h2>
            <div id="bazaar-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-orders" class="p-4 hide">
            <h2 class="text-sm font-black raj-title mb-4 border-b pb-2">MERE ORDERS (KAMAEE) 💰</h2>
            <div id="order-list"></div>
        </main>

        <main id="v-profile" class="p-10 hide text-center">
            <div class="w-20 h-20 rounded-full bg-orange-100 mx-auto mb-4 border-2 border-orange-500 flex items-center justify-center text-2xl font-black text-orange-800">S</div>
            <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase tracking-tighter">Logout</button>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-home nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-user-circle nav-icon"></i>
        </nav>

        <div id="order-modal" class="fixed inset-0 bg-white z-[200] hide p-10 flex flex-col justify-center">
            <h2 class="text-xl font-black raj-title mb-2 uppercase">Order Parchi 🚩</h2>
            <p id="order-prod-title" class="text-xs font-bold text-gray-400 mb-8"></p>
            <input type="text" id="cust-name" placeholder="Aapka Naam">
            <input type="number" id="cust-phone" placeholder="Mobile Number">
            <textarea id="cust-addr" placeholder="Pura Pata (Address) jahan delivery chahiye..." class="h-32"></textarea>
            <button onclick="submitOrder()" class="btn-royal">CONFIRM ORDER</button>
            <button onclick="closeM('order-modal')" class="mt-4 text-xs font-bold text-gray-400">CANCEL</button>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[100] hide p-10 overflow-y-auto">
            <div class="flex justify-between mb-8"><b>NEW POST</b><i class="fa-solid fa-times" onclick="closeM('post-modal')"></i></div>
            <input type="file" id="post-file" accept="image/*,video/*">
            <textarea id="post-desc" placeholder="Caption..."></textarea>
            <button onclick="publish('post')" id="btn-post" class="btn-royal">PUBLISH</button>
        </div>

        <div id="prod-modal" class="fixed inset-0 bg-white z-[100] hide p-10 overflow-y-auto">
            <div class="flex justify-between mb-8"><b>ADD TO MY SHOP</b><i class="fa-solid fa-times" onclick="closeM('prod-modal')"></i></div>
            <input type="file" id="prod-file" accept="image/*">
            <input type="text" id="prod-name" placeholder="Product Name">
            <input type="number" id="prod-price" placeholder="Price">
            <textarea id="prod-desc" placeholder="Description..."></textarea>
            <input type="text" id="prod-link" placeholder="Purchase Link">
            <button onclick="publish('prod')" id="btn-prod" class="btn-royal">ADD PRODUCT</button>
        </div>

    </div>
</body>
</html>
