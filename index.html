<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Royal App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --black: #050505; }
        body { background: var(--black); color: #fff; font-family: sans-serif; margin: 0; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .royal-btn { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 12px; width: 100%; border: none; cursor: pointer; }
        .royal-input { width: 100%; background: #111; border: 1px solid #333; padding: 12px; margin-bottom: 10px; color: #fff; border-radius: 10px; outline: none; }
        .nav-item { color: #666; text-align: center; flex: 1; cursor: pointer; padding: 10px; }
        .nav-item.active { color: var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900">

    <header class="p-4 border-b border-yellow-700 text-center sticky top-0 bg-black z-50">
        <h1 class="gold-text font-bold text-2xl tracking-[5px]">SAINIWALAA</h1>
    </header>

    <section id="darbar-sec" class="p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="gold-text">🚩 Darbar</h2>
            <button onclick="alert('Hukum, Photo chuno!')" class="bg-zinc-800 px-4 py-1 rounded-lg text-xs">+ Post</button>
        </div>
        <div id="feed-list" class="space-y-4">
            <p class="text-zinc-500 text-center text-xs mt-10 italic">Darbar khali hai, naya post likho...</p>
        </div>
    </section>

    <section id="bazaar-sec" class="p-4 hidden">
        <h2 class="gold-text mb-4">🛍 Shahi Bazaar</h2>
        <div class="bg-zinc-900 p-4 rounded-2xl border border-yellow-900/30 mb-6">
            <input id="p-name" placeholder="Maal ko Naam" class="royal-input">
            <input id="p-price" placeholder="Keemat ₹" class="royal-input">
            <input id="p-link" placeholder="External Link" class="royal-input">
            <button id="save-btn" onclick="saveBtn()" class="royal-btn">BAZAAR MEIN RAKHO 👑</button>
        </div>
        <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-800 flex justify-around py-2 max-w-[500px] mx-auto">
        <div onclick="showPage('darbar')" id="btn-darbar" class="nav-item active"><i class="fa-solid fa-crown"></i><p class="text-[8px]">DARBAR</p></div>
        <div onclick="showPage('bazaar')" id="btn-bazaar" class="nav-item"><i class="fa-solid fa-shop"></i><p class="text-[8px]">BAZAAR</p></div>
    </nav>

    <script>
        function showPage(p) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p + '-sec').classList.remove('hidden');
            document.getElementById('btn-' + p).classList.add('active');
        }

        function saveBtn() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = "Hukum, kaam ho ryo hai...";
            
            setTimeout(() => {
                alert("Maal darj ho gayo! (Testing Mode)");
                btn.disabled = false;
                btn.innerHTML = "BAZAAR MEIN RAKHO 👑";
            }, 1500);
        }
    </script>
</body>
</html>
