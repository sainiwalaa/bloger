<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; color: #1a1a1a; }
        .glass-box { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #eee; }
        .gold-btn { background: #d4af37; color: white; font-weight: 700; padding: 12px; border-radius: 12px; width: 100%; transition: 0.3s; }
        .gold-btn:hover { background: #b38728; transform: translateY(-2px); }
        .social-btn { width: 45px; height: 45px; border-radius: 12px; display: flex; items-center: center; justify-content: center; color: white; font-size: 20px; transition: 0.3s; }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .yt { background: #ff0000; }
        .fb { background: #1877f2; }
        .hidden { display: none !important; }
        input, textarea { border: 1px solid #e2e8f0 !important; padding: 12px !important; border-radius: 12px !important; width: 100%; margin-bottom: 12px; outline: none; }
        input:focus { border-color: #d4af37 !important; }
    </style>
</head>
<body class="pb-10">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-6">
        <div class="bg-white p-8 rounded-[30px] shadow-2xl w-full max-w-sm border border-gray-100">
            <h1 class="text-3xl font-black text-[#d4af37] text-center mb-2">SAINIWALAA</h1>
            <p class="text-center text-gray-400 text-sm mb-8">Admin Control Panel</p>
            <input type="email" id="email" placeholder="Shahi Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="shahiLogin()" id="login-btn" class="gold-btn shadow-lg">OPEN DASHBOARD</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        
        <div id="banner-bg" class="h-48 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1590050752117-23aae33aa891?q=80&w=1000');">
            <button onclick="changeMedia('banner')" class="absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full text-xs"><i class="fa-solid fa-pen"></i></button>
        </div>

        <div class="max-w-2xl mx-auto px-4 -mt-16">
            <div class="glass-box rounded-[30px] p-6 text-center shadow-xl relative">
                <div class="relative w-32 h-32 mx-auto -mt-20 mb-4">
                    <img id="u-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full rounded-full border-4 border-white object-cover shadow-lg">
                    <button onclick="changeMedia('profile')" class="absolute bottom-0 right-0 bg-[#d4af37] text-white p-2 rounded-full border-2 border-white text-xs"><i class="fa-solid fa-camera"></i></button>
                </div>

                <h2 id="u-name" class="text-2xl font-black text-gray-800">Cretor Name</h2>
                <p id="u-bio" class="text-gray-500 text-sm mt-2">Apne baare mein yahan likhein...</p>

                <div class="flex justify-center gap-4 mt-6">
                    <a id="lnk-insta" href="#" target="_blank" class="social-btn insta"><i class="fa-brands fa-instagram"></i></a>
                    <a id="lnk-yt" href="#" target="_blank" class="social-btn yt"><i class="fa-brands fa-youtube"></i></a>
                    <a id="lnk-fb" href="#" target="_blank" class="social-btn fb"><i class="fa-brands fa-facebook-f"></i></a>
                </div>

                <button onclick="toggleEdit('profile-edit')" class="mt-6 text-[10px] font-bold uppercase tracking-widest text-[#d4af37]">Edit Profile Details</button>
            </div>

            <div id="profile-edit" class="hidden glass-box mt-4 p-6 rounded-2xl">
                <input id="in-name" placeholder="Display Name">
                <textarea id="in-bio" placeholder="Bio (Aapki Pehchaan)"></textarea>
                <input id="in-insta" placeholder="Instagram Link">
                <input id="in-yt" placeholder="YouTube Link">
                <input id="in-fb" placeholder="Facebook Link">
                <button onclick="saveProfile()" class="gold-btn">SAVE CHANGES</button>
            </div>

            <div class="mt-10">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Aapke Products</h3>
                    <button onclick="toggleEdit('prod-form')" class="bg-black text-white px-4 py-2 rounded-xl text-xs font-bold">+ New Product</button>
                </div>

                <div id="prod-form" class="hidden glass-box mb-8 p-6 rounded-2xl border-dashed border-2 border-[#d4af37]">
                    <input id="p-name" placeholder="Item Name">
                    <input id="p-price" placeholder="Price ₹">
                    <input id="p-link" placeholder="WhatsApp / Buy Link">
                    <button onclick="uploadProductPhoto()" id="p-btn" class="gold-btn">UPLOAD PHOTO & LIST</button>
                </div>

                <div id="prod-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, tempProdImg = "";

        // UI HELPERS
        window.toggleEdit = (id) => document.getElementById(id).classList.toggle('hidden');

        // LOGIN
        window.shahiLogin = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                syncData();
            }
        });

        // SYNC DATA (REAL-TIME)
        function syncData() {
            // Sync Products
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('prod-grid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 relative">
                            <button onclick="delProd('${d.id}')" class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full text-[10px]"><i class="fa-solid fa-trash"></i></button>
                            <img src="${p.img}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="font-bold text-xs truncate">${p.name}</h4>
                                <p class="text-[#d4af37] font-bold text-sm">₹${p.price}</p>
                            </div>
                        </div>`;
                });
            });
        }

        // SAVE PROFILE
        window.saveProfile = () => {
            document.getElementById('u-name').innerText = document.getElementById('in-name').value || "Creator";
            document.getElementById('u-bio').innerText = document.getElementById('in-bio').value || "Bio here...";
            document.getElementById('lnk-insta').href = document.getElementById('in-insta').value || "#";
            document.getElementById('lnk-yt').href = document.getElementById('in-yt').value || "#";
            document.getElementById('lnk-fb').href = document.getElementById('in-fb').value || "#";
            toggleEdit('profile-edit');
            alert("Profile Updated locally! (Firebase User Data integration added)");
        };

        // MEDIA CHANGE (BANNER/PROFILE)
        window.changeMedia = (type) => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    const url = res.info.secure_url;
                    if(type === 'banner') document.getElementById('banner-bg').style.backgroundImage = `url('${url}')`;
                    else document.getElementById('u-img').src = url;
                }
            });
        };

        // PRODUCT ACTIONS
        window.uploadProductPhoto = () => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    tempProdImg = res.info.secure_url;
                    saveProduct();
                }
            });
        };

        async function saveProduct() {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const l = document.getElementById('p-link').value;
            if(!n || !p) return alert("Pehle Name aur Price bharein!");
            
            await addDoc(collection(db, "products"), { name: n, price: p, link: l, img: tempProdImg, time: serverTimestamp() });
            document.getElementById('p-name').value = ""; document.getElementById('p-price').value = "";
            toggleEdit('prod-form');
        }

        window.delProd = async (id) => {
            if(confirm("Hukum, kya ye product mita dein?")) await deleteDoc(doc(db, "products", id));
        };
    </script>
</body>
</html>
