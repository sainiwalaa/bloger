<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Royal Rajasthani Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        :root { --gold: #FFD700; --dark-gold: #B8860B; --royal-black: #0a0a0a; }
        body { background: var(--royal-black); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Cinzel', serif; }
        
        /* Shahi Background */
        .royal-bg { background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%); }
        .gold-border { border: 1px solid var(--gold); }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* Smooth Transitions */
        .page-section { transition: all 0.5s ease; }
        .hidden { display: none !important; }

        /* Royal Buttons */
        .royal-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000; font-weight: bold; border-radius: 12px;
            padding: 12px 20px; transition: 0.3s; border: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); cursor: pointer;
        }
        .royal-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* Navigation */
        nav { background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,215,0,0.2); backdrop-blur: 10px; }
        .nav-item { color: #666; transition: 0.3s; cursor: pointer; text-align: center; flex: 1; padding: 10px 0; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); }

        /* Loading Spinner */
        .loader-ring { width: 50px; height: 50px; border: 3px solid #333; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 royal-bg">

    <div id="loading-screen" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center hidden">
        <div class="loader-ring mb-4"></div>
        <p class="gold-text font-serif italic" id="loader-msg">Ghani Khamma Hukum...</p>
    </div>

    <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-md p-4 border-b border-yellow-700/30 text-center">
        <h1 class="gold-text font-serif text-2xl tracking-[8px]">SAINIWALAA</h1>
    </header>

    <div id="auth-page" class="page-section p-6 pt-12">
        <div class="text-center mb-10">
            <i class="fa-solid fa-fort-awesome text-5xl gold-text mb-4"></i>
            <h2 class="font-serif text-xl">Rajwara Pravesh</h2>
        </div>
        <div id="auth-form" class="space-y-4">
            <input type="email" id="auth-email" placeholder="Email (Pata)" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none focus:border-yellow-600">
            <input type="password" id="auth-pass" placeholder="Password (Gupt Shabd)" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none focus:border-yellow-600">
            <button onclick="handleAuth('login')" id="login-btn" class="royal-btn w-full">PRAVESH KAREIN (Login)</button>
            <button onclick="handleAuth('register')" id="reg-btn" class="w-full text-zinc-500 text-sm py-2">Naya Khata Banayein (Register)</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        
        <section id="darbar-sec" class="page-section p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="gold-text font-serif italic text-lg">🚩 Shahi Darbar</h2>
                <button onclick="openUpload('post')" class="royal-btn text-[10px] py-2">+ Naya Post</button>
            </div>
            <div id="feed-list" class="space-y-6"></div>
        </section>

        <section id="bazaar-sec" class="page-section p-4 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="gold-text font-serif italic text-lg">🛍 Shahi Bazaar</h2>
                <button onclick="showBazaarForm()" class="royal-btn text-[10px] py-2">+ Maal Jodo</button>
            </div>
            
            <div id="bazaar-form" class="bg-zinc-900 p-5 rounded-3xl mb-8 hidden border border-yellow-900/30">
                <input id="p-name" type="text" placeholder="Maal ko Naam" class="w-full bg-black p-3 rounded-xl mb-3 border border-zinc-800 outline-none">
                <input id="p-price" type="number" placeholder="Keemat (₹)" class="w-full bg-black p-3 rounded-xl mb-3 border border-zinc-800 outline-none">
                <textarea id="p-desc" placeholder="Maal ki Jankari" class="w-full bg-black p-3 rounded-xl mb-3 border border-zinc-800 outline-none h-20"></textarea>
                <input id="p-link" type="text" placeholder="Weblink (Buy Link)" class="w-full bg-black p-3 rounded-xl mb-3 border border-zinc-800 outline-none">
                <input type="hidden" id="p-img">
                <button onclick="openUpload('product')" class="w-full border border-zinc-700 py-3 rounded-xl text-xs mb-3 text-zinc-400">PHOTO CHUNO</button>
                <button onclick="saveProduct()" id="save-p-btn" class="royal-btn w-full">BAZAAR MEIN RAKHO</button>
            </div>

            <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="aap-sec" class="page-section p-4 hidden">
            <div class="flex flex-col items-center py-6">
                <div class="relative mb-4">
                    <img id="u-avatar" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-2 border-yellow-600 p-1 object-cover">
                    <button onclick="openUpload('avatar')" class="absolute bottom-0 right-0 bg-yellow-600 text-black p-2 rounded-full text-[10px]"><i class="fa-solid fa-camera"></i></button>
                </div>
                <h3 id="u-name" class="text-xl font-bold">Maharaja User</h3>
                <p id="u-bio" class="text-xs text-zinc-500 italic mb-4">Royal Sainiwaala Member</p>
                <div class="flex gap-8 border-y border-zinc-900 w-full py-4 justify-center">
                    <div class="text-center"><p class="font-bold" id="stat-posts">0</p><p class="text-[9px] text-zinc-500 uppercase">Post</p></div>
                    <div class="text-center"><p class="font-bold" id="stat-followers">0</p><p class="text-[9px] text-zinc-500 uppercase">Saathi</p></div>
                </div>
                <button onclick="logout()" class="mt-6 text-red-500 text-xs uppercase tracking-widest">Raj-Tyag (Logout)</button>
            </div>
            
            <h4 class="gold-text font-serif mt-6 mb-4">Mharo Bazaar (My Shop)</h4>
            <div id="my-shop-list" class="grid grid-cols-2 gap-4"></div>
        </section>

    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-yellow-600/30 p-8 rounded-[2rem] w-full">
            <h3 class="gold-text font-serif mb-6 italic text-center">Kharidari Darj Karein</h3>
            <div class="space-y-4">
                <input type="text" id="o-name" placeholder="Tharo Naam" class="w-full bg-black p-4 rounded-xl border border-zinc-800 outline-none">
                <input type="number" id="o-phone" placeholder="Mobile Number" class="w-full bg-black p-4 rounded-xl border border-zinc-800 outline-none">
                <textarea id="o-addr" placeholder="Pura Pata (Address)" class="w-full bg-black p-4 rounded-xl border border-zinc-800 outline-none h-24"></textarea>
                <button id="confirm-order-btn" class="royal-btn w-full py-4">SAUDA PAKKO KARO</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full max-w-[500px] flex justify-around py-2 z-50">
        <div onclick="switchPage('darbar')" id="nav-darbar" class="nav-item active"><i class="fa-solid fa-crown text-xl"></i><p class="text-[8px] mt-1">DARBAR</p></div>
        <div onclick="switchPage('bazaar')" id="nav-bazaar" class="nav-item"><i class="fa-solid fa-shop text-xl"></i><p class="text-[8px] mt-1">BAZAAR</p></div>
        <div onclick="switchPage('aap')" id="nav-aap" class="nav-item"><i class="fa-solid fa-user-ninja text-xl"></i><p class="text-[8px] mt-1">AAP</p></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- ANTI DOUBLE CLICK PROTECTION ---
        window.safeClick = async (btnId, callback) => {
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Tharo hukum likhayo ja ryo hai...";
            try { await callback(); } 
            finally { 
                setTimeout(() => { 
                    btn.disabled = false; 
                    btn.innerText = originalText; 
                }, 1500); 
            }
        };

        // --- AUTH LOGIC ---
        window.handleAuth = (type) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Hukum, jankari poori bhariye!");
            
            toggleLoader(true, "Rajwara mein pravesh ho ryo hai...");
            const action = type === 'login' ? signInWithEmailAndPassword : createUserWithEmailAndPassword;
            
            action(auth, email, pass)
                .then(() => toggleLoader(false))
                .catch(err => { alert(err.message); toggleLoader(false); });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);

        // --- CLOUDINARY UPLOAD ---
        window.openUpload = (type) => {
            cloudinary.openUploadWidget({
                cloudName: "dvp58lgh3", uploadPreset: "ml_default",
                resourceType: type === 'post' ? 'auto' : 'image'
            }, (err, res) => {
                if (!err && res.event === "success") {
                    const url = res.info.secure_url;
                    if(type === 'post') {
                        if(res.info.resource_type === 'video' && res.info.duration > 90) return alert("90s se bada video mana hai hukum!");
                        push(ref(db, 'posts'), { url, type: res.info.resource_type, uid: auth.currentUser.uid, likes: 0, time: serverTimestamp() });
                    } else if(type === 'product') {
                        document.getElementById('p-img').value = url;
                        alert("Photo chadh gayi hukum!");
                    }
                }
            });
        };

        // --- BAZAAR LOGIC ---
        window.showBazaarForm = () => document.getElementById('bazaar-form').classList.toggle('hidden');

        window.saveProduct = () => {
            safeClick('save-p-btn', async () => {
                const name = document.getElementById('p-name').value;
                const price = document.getElementById('p-price').value;
                const link = document.getElementById('p-link').value;
                const img = document.getElementById('p-img').value;
                if(!name || !price || !img) throw "Empty";
                
                await push(ref(db, 'products'), { name, price, link, img, uid: auth.currentUser.uid, time: serverTimestamp() });
                document.getElementById('bazaar-form').classList.add('hidden');
            });
        };

        // --- ORDER FLOW ---
        window.initOrder = (pName, price, link, cId) => {
            document.getElementById('order-modal').classList.remove('hidden');
            document.getElementById('confirm-order-btn').onclick = () => {
                safeClick('confirm-order-btn', async () => {
                    const name = document.getElementById('o-name').value;
                    const phone = document.getElementById('o-phone').value;
                    const addr = document.getElementById('o-addr').value;
                    if(!name || !phone || !addr) throw "Empty";
                    
                    await push(ref(db, 'orders/' + cId), { customer: name, phone, address: addr, product: pName, price, time: serverTimestamp() });
                    alert("Sauda Pakko! Redirecting...");
                    window.location.href = link;
                });
            };
        };

        // --- REALTIME DATA LOAD ---
        function loadData() {
            onValue(ref(db, 'posts'), (snap) => {
                const feed = document.getElementById('feed-list'); feed.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    const media = d.type === 'video' ? `<video src="${d.url}" controls class="w-full rounded-2xl"></video>` : `<img src="${d.url}" class="w-full rounded-2xl border border-zinc-800">`;
                    feed.innerHTML += `<div class="bg-zinc-900/50 p-3 rounded-3xl border border-yellow-900/10">${media}<div class="p-3 flex justify-between"><button onclick="likePost('${child.key}')"><i class="fa-solid fa-heart gold-text"></i> ${d.likes || 0}</button></div></div>`;
                });
            });

            onValue(ref(db, 'products'), (snap) => {
                const list = document.getElementById('bazaar-list'); list.innerHTML = "";
                const myShop = document.getElementById('my-shop-list'); myShop.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    const card = `<div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-3"><img src="${d.img}" class="w-full h-32 object-cover rounded-xl mb-2"><h4 class="gold-text text-xs truncate">${d.name}</h4><p class="text-[10px] mb-2">₹${d.price}</p><button onclick="initOrder('${d.name}','${d.price}','${d.link}','${d.uid}')" class="royal-btn w-full text-[9px] py-2">Sauda Karo</button></div>`;
                    list.innerHTML += card;
                    if(d.uid === auth.currentUser.uid) myShop.innerHTML += card;
                });
            });
        }

        window.likePost = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);

        // --- UTILS ---
        window.switchPage = (p) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p + '-sec').classList.remove('hidden');
            document.getElementById('nav-' + p).classList.add('active');
        };

        function toggleLoader(show, msg = "") {
            const l = document.getElementById('loading-screen');
            document.getElementById('loader-msg').innerText = msg;
            show ? l.classList.remove('hidden') : l.classList.add('hidden');
        }
    </script>
</body>
</html>
