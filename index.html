<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        body { background: #f8f5f0; font-family: 'Poppins', sans-serif; color: #333; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        /* Shahi Header & Banner */
        .banner-container { height: 180px; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1590050752117-23aae33aa891?auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; position: relative; border-radius: 0 0 30px 30px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #fff; position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #eee; }

        /* Bio Box */
        .bio-box { background: #fff; margin: 60px 15px 20px 15px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #e0d5c1; }
        
        /* Social Buttons */
        .social-link { padding: 10px 20px; border-radius: 50px; font-size: 14px; font-weight: 600; display: flex; items-center: center; gap: 8px; transition: 0.3s; color: white; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #ff0000; }
        .fb { background: #1877f2; }

        /* Product Card */
        .product-card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .gold-btn { background: #d4af37; color: #fff; font-weight: bold; border-radius: 10px; padding: 12px; width: 100%; transition: 0.3s; }
        .gold-btn:hover { background: #b38728; }
        
        .hidden { display: none !important; }
        input { border: 1px solid #ddd !important; padding: 12px !important; border-radius: 10px !important; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-[#e0d5c1]">
            <h1 class="raj-font text-3xl text-center text-[#d4af37] mb-8">SAINIWALAA</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" id="login-btn" class="gold-btn mt-4">SHOP OPEN KAREIN</button>
        </div>
    </div>

    <main id="shop-screen" class="hidden pb-20">
        <div class="banner-container"></div>
        <div class="profile-img flex items-center justify-center">
            <i class="fa-solid fa-crown text-3xl text-[#d4af37]"></i>
        </div>

        <div class="bio-box">
            <h2 id="u-name" class="raj-font text-2xl font-bold text-[#333]">Maharaja</h2>
            <p id="u-bio" class="text-sm text-gray-500 mt-2 italic">Aapka shahi bio yahan dikhega...</p>
            
            <div class="flex justify-center gap-3 mt-6 flex-wrap">
                <a href="#" id="link-insta" class="social-link insta"><i class="fa-brands fa-instagram"></i> Insta</a>
                <a href="#" id="link-yt" class="social-link yt"><i class="fa-brands fa-youtube"></i> YouTube</a>
                <a href="#" id="link-fb" class="social-link fb"><i class="fa-brands fa-facebook"></i> FB</a>
            </div>
            <button onclick="editProfile()" class="text-[10px] uppercase font-bold text-gray-400 mt-5 tracking-widest">Profile Update</button>
        </div>

        <div class="px-4">
            <div class="bg-white p-5 rounded-2xl border border-dashed border-[#d4af37] mb-8">
                <h3 class="raj-font text-sm text-[#d4af37] mb-4">NAYA MAAL JODHEIN</h3>
                <input id="p-name" placeholder="Item Name">
                <input id="p-price" placeholder="Price ₹">
                <input id="p-link" placeholder="Buy Link (WhatsApp)">
                <button onclick="uploadMedia()" id="prod-btn" class="gold-btn text-xs">PHOTO & LIST KAREIN</button>
            </div>

            <h3 class="raj-font text-xl mb-4 text-[#333]">Hamari Shop</h3>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, tempImg = "";

        // LOGIN
        window.login = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login fail: " + err.message));
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('u-name').innerText = u.email.split('@')[0].toUpperCase();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('shop-screen').classList.remove('hidden');
                syncShop();
            }
        });

        // SHOP SYNC
        function syncShop() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${p.img}" class="w-full h-40 object-cover">
                            <div class="p-3">
                                <h4 class="font-bold text-sm truncate">${p.name}</h4>
                                <p class="text-[#d4af37] font-bold text-lg">₹${p.price}</p>
                                <a href="${p.link}" target="_blank" class="block text-center bg-gray-100 py-2 rounded-lg text-xs mt-2 font-bold hover:bg-gray-200">KHARIDEIN</a>
                            </div>
                        </div>`;
                });
            });
        }

        // ACTIONS
        window.uploadMedia = () => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    tempImg = res.info.secure_url;
                    listProduct();
                }
            });
        };

        async function listProduct() {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const l = document.getElementById('p-link').value;
            if(!n || !p || !tempImg) return alert("Poori jankari bharein!");
            
            await addDoc(collection(db, "products"), { name: n, price: p, link: l, img: tempImg, time: serverTimestamp() });
            alert("Maal Shahi Shop mein jodh diya gaya hai!");
            document.getElementById('p-name').value = ""; document.getElementById('p-price').value = "";
        }

        window.editProfile = () => {
            const bio = prompt("Apna Shahi Bio likhein:");
            const insta = prompt("Instagram Link:");
            const yt = prompt("YouTube Link:");
            const fb = prompt("Facebook Link:");
            
            if(bio) document.getElementById('u-bio').innerText = bio;
            if(insta) document.getElementById('link-insta').href = insta;
            if(yt) document.getElementById('link-yt').href = yt;
            if(fb) document.getElementById('link-fb').href = fb;
        };
    </script>
</body>
</html>
