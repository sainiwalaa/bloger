<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="robots" content="index, follow">
    <meta name="description" id="meta-desc" content="SAINIWALAA - World's First Luxury Creator Marketplace. Buy exclusive digital products from your favorite Instagram & YouTube stars.">
    <meta name="keywords" id="meta-keys" content="Sainiwal, Creator Economy, Instagram Shop, YouTube Marketplace, Digital Products India">
    <meta property="og:title" id="og-title" content="SAINIWALAA | Luxury Creator Economy">
    <meta property="og:description" id="og-desc" content="Join the elite network of creators.">
    
    <title>SAINIWALAA | Luxury Creator Economy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; width: 100%; }
        .raj-font { font-family: 'Cinzel', serif; }
        html { scroll-behavior: smooth; }
        .saini-header-container { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .banner-box { height: 250px; position: relative; border-bottom: 5px solid var(--gold); border-radius: 0 0 30px 30px; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; }
        @media (min-width: 768px) { .banner-box { height: 400px; border-radius: 0 0 50px 50px; } }
        .profile-side { position: absolute; bottom: -30px; left: 20px; display: flex; align-items: flex-end; gap: 15px; z-index: 50; }
        @media (min-width: 768px) { .profile-side { left: 50px; gap: 25px; } }
        .p-img-main { width: 100px; height: 100px; border-radius: 25px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); object-fit: cover; background: #fff; }
        @media (min-width: 768px) { .p-img-main { width: 160px; height: 160px; border-radius: 40px; } }
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold) !important; font-weight: 800; }
        .hidden { display: none !important; }
        .product-card { transition: 0.3s; border: 1px solid #eee; border-radius: 20px; background: #fff; overflow: hidden; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .truncate-text { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .creator-scroll { white-space:nowrap; animation:creatorMove 40s linear infinite; display: flex; gap: 30px; }
        @keyframes creatorMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #loading { backdrop-filter: blur(20px); }
    </style>
</head>
<body class="pb-10">

    <div id="seo-engine" style="display:none;"></div>

    <div id="loading" class="fixed inset-0 bg-white/80 z-[9999] flex flex-col items-center justify-center">
        <h1 class="raj-font text-5xl animate-pulse text-[#d4af37]">S</h1>
        <p class="text-[10px] tracking-[0.5em] mt-4 text-gray-400">LOADING LUXURY</p>
    </div>

    <section id="auth-box" class="min-h-screen flex items-center justify-center p-4 hidden">
        <div class="w-full max-w-md bg-white p-8 md:p-12 rounded-[40px] shadow-2xl border border-gray-100 text-center">
            <h2 class="raj-font text-6xl text-[#d4af37] mb-2">S</h2>
            <p class="text-[10px] tracking-[0.3em] text-gray-400 mb-8 uppercase font-bold">The Royal Marketplace</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37] transition-all">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37] transition-all">
                <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">GET ACCESS</button>
            </div>
        </div>
    </section>

    <main id="app" class="hidden">
        <header class="saini-header-container pt-8 pb-4 text-center">
            <h1 class="raj-font text-3xl md:text-5xl font-black tracking-widest cursor-pointer" onclick="location.reload()">SAINIWALAA</h1>
            <nav class="flex justify-center gap-6 md:gap-12 mt-8 px-4 text-[10px] md:text-[12px] font-bold uppercase tracking-widest text-gray-400">
                <button onclick="nav('feed')" id="n-feed" class="pb-2">Trending</button>
                <button onclick="viewProfile(curU.uid)" id="n-shop" class="pb-2">My Studio</button>
                <button onclick="nav('orders')" id="n-orders" class="pb-2">Orders</button>
                <button onclick="logout()" class="text-red-400 pb-2"><i class="fa-solid fa-power-off"></i></button>
            </nav>
        </header>

        <section id="sec-feed" class="hidden max-w-7xl mx-auto px-4 pt-8">
            <div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8"></div>
        </section>

        <section id="sec-shop" class="hidden">
            <div id="banner-container" class="banner-box bg-gray-100">
                <img id="b-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                <div class="profile-side">
                    <img id="p-img" src="" class="p-img-main">
                    <div class="mb-6 text-left">
                        <h2 id="u-name" class="raj-font text-lg md:text-3xl font-bold text-white drop-shadow-lg">Creator</h2>
                        <div id="u-socials" class="flex gap-2 mt-2"></div>
                    </div>
                </div>
            </div>
            <div class="mt-20 px-4 max-w-5xl mx-auto text-center">
                <div id="u-bio" class="p-6 bg-white rounded-3xl border italic text-gray-500">Welcome to my studio!</div>
                <div id="grid-shop" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-12 mb-20"></div>
            </div>
        </section>

        <section id="sec-orders" class="hidden max-w-4xl mx-auto p-4 md:p-10">
            <h2 class="raj-font text-3xl mb-8">Sales Panel</h2>
            <div id="list-orders" class="grid gap-6"></div>
        </section>

        <footer class="bg-black text-white pt-16 pb-10 mt-20">
            <div class="text-center px-6">
                <p class="text-[#d4af37] text-[10px] font-bold uppercase">Active Creators: <span id="creator-count">0</span></p>
                <div id="creator-scroll" class="creator-scroll mt-8"></div>
            </div>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, query, where, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.curU = null; let allProds = [];

        onAuthStateChanged(auth, u => {
            document.getElementById('loading').classList.add('hidden');
            if(u) { curU = u; document.getElementById('app').classList.remove('hidden'); document.getElementById('auth-box').classList.add('hidden'); initApp(); }
            else { document.getElementById('auth-box').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
        });

        const updateSEO = (d, uid) => {
            const name = d.name || "Elite Creator";
            document.title = `${name} | SAINIWALAA`;
            document.getElementById('meta-desc').content = `${name} Official Marketplace on SAINIWALAA.`;
            document.getElementById('seo-engine').innerHTML = `<a href="?creator=${uid}">${name}</a><p>${d.insta || ''}</p>`;
        };

        function initApp() {
            nav('feed');
            onSnapshot(collection(db, "products"), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed', false);
            });
            onSnapshot(collection(db, "users"), s => {
                document.getElementById('creator-count').innerText = s.size;
                document.getElementById('creator-scroll').innerHTML = s.docs.map(d => `<span class="px-4 font-bold">@${d.data().name || 'Creator'}</span>`).join('');
            });
        }

        window.renderGrid = (data, cid, isMe) => {
            const g = document.getElementById(cid); g.innerHTML = "";
            data.forEach(p => {
                g.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="w-full aspect-square object-cover" onclick="viewProfile('${p.creatorId}')">
                        <div class="p-4">
                            <h4 class="font-bold text-sm truncate-text">${p.name}</h4>
                            <div class="flex justify-between items-center mt-4">
                                <span class="font-bold">₹${p.price}</span>
                                <button onclick="window.open('${p.link}')" class="bg-black text-white px-3 py-1 rounded-lg text-xs">GET</button>
                            </div>
                        </div>
                    </div>`;
            });
        };

        window.viewProfile = async (uid) => {
            nav('shop');
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                updateSEO(d, uid);
                document.getElementById('u-name').innerText = d.name || "Creator";
                document.getElementById('u-bio').innerText = d.bio || "Welcome!";
                document.getElementById('p-img').src = d.profile || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                renderGrid(s.docs.map(d => ({id:d.id, ...d.data()})), 'grid-shop', uid === curU.uid);
            });
        };

        window.nav = (t) => { ['feed','shop','orders'].forEach(s => { document.getElementById('sec-'+s).classList.toggle('hidden', s !== t); document.getElementById('n-'+s).classList.toggle('nav-active', s === t); }); };
        window.authAction = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
