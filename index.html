<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Shahi Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --gold: #b8860b; --bg: #fdfdfd; --text: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; }
        .blog-card { background: #fff; border: 1px solid #eee; border-radius: 4px; transition: 0.3s; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .blog-card:hover { transform: translateY(-5px); }
        .gold-border { border-top: 3px solid var(--gold); }
        .royal-btn { background: var(--gold); color: #fff; font-weight: bold; padding: 12px; border-radius: 4px; width: 100%; }
        .pc-sidebar { position: sticky; top: 80px; }
        .hidden { display: none !important; }
        input { width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 4px; margin-bottom: 10px; }
        @media (max-width: 768px) { .pc-only { display: none; } }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-[6px] text-[#b8860b]">SAINIWALAA</h1>
            <div id="user-nav" class="hidden flex gap-6 items-center">
                <button onclick="openUpload()" class="text-sm font-bold border-b-2 border-transparent hover:border-[#b8860b]">NAYA LEKH</button>
                <button onclick="logout()" class="text-red-600 text-sm"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </header>

    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 bg-white border shadow-sm">
        <h2 class="text-center text-xl mb-6 italic">Rajwara Blog Mein Swagat Hai</h2>
        <div id="login-box">
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">
            <button onclick="login()" class="royal-btn">PRAVESH KAREIN</button>
            <p onclick="toggleAuth(false)" class="text-xs mt-4 text-center text-gray-500 cursor-pointer">Naya Khata Banayein</p>
        </div>
        <div id="reg-box" class="hidden">
            <input id="reg-name" type="text" placeholder="Unique Naam (Writer Name)">
            <input id="reg-email" type="email" placeholder="Email">
            <input id="reg-pass" type="password" placeholder="Password">
            <button id="reg-btn" onclick="register()" class="royal-btn">REGISTER KAREIN</button>
            <p onclick="toggleAuth(true)" class="text-xs mt-4 text-center text-gray-500 cursor-pointer">Login Karein</p>
        </div>
    </div>

    <main id="main-app" class="hidden max-w-6xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            
            <div class="md:col-span-3 pc-only">
                <div class="pc-sidebar p-4 bg-white border gold-border">
                    <h3 class="font-bold mb-4 border-b pb-2">Vibhag (Categories)</h3>
                    <ul class="text-sm space-y-3 text-gray-600">
                        <li class="hover:text-[#b8860b] cursor-pointer"># Sabhi Lekh</li>
                        <li class="hover:text-[#b8860b] cursor-pointer"># Shahi Bazaar</li>
                        <li class="hover:text-[#b8860b] cursor-pointer"># Darbar News</li>
                    </ul>
                </div>
            </div>

            <div class="md:col-span-6">
                <div id="feed-container">
                    </div>
            </div>

            <div class="md:col-span-3">
                <div class="pc-sidebar">
                    <div class="p-6 bg-white border gold-border text-center">
                        <div class="w-16 h-16 bg-gray-100 rounded-full mx-auto mb-3 flex items-center justify-center border">
                            <i class="fa-solid fa-user-pen text-gray-400"></i>
                        </div>
                        <h4 id="my-name" class="font-bold text-[#b8860b]">@Writer</h4>
                        <p class="text-[10px] text-gray-400 mt-1">Shahi Lekhak</p>
                        <hr class="my-4">
                        <div class="flex justify-around text-xs">
                            <div><b id="f-count">0</b><p>Followers</p></div>
                            <div><b id="p-count">0</b><p>Posts</p></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = null;

        // Unique Register Logic
        window.register = async () => {
            const name = regName.value.trim().toLowerCase();
            const q = query(collection(db, "users"), where("name", "==", name));
            const snap = await getDocs(q);
            if(!snap.empty) return alert("Hukum, ye naam pehle se hai!");

            try {
                const res = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
                await setDoc(doc(db, "users", res.user.uid), { name: name, uid: res.user.uid, joinDate: serverTimestamp() });
                location.reload();
            } catch(e) { alert(e.message); }
        };

        window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Galat detail!"));
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async u => {
            if(u) {
                const d = await getDoc(doc(db, "users", u.uid));
                userProfile = d.data();
                document.getElementById('my-name').innerText = "@" + userProfile.name;
                mainApp.classList.remove('hidden'); authSection.classList.add('hidden'); userNav.classList.remove('hidden');
                loadBlog();
            } else {
                mainApp.classList.add('hidden'); authSection.classList.remove('hidden'); userNav.classList.add('hidden');
            }
        });

        // Blog Upload (Cloudinary)
        window.openUpload = () => {
            cloudinary.openUploadWidget({ 
                cloudName: "dvp58lgh3", 
                uploadPreset: "ml_default",
                sources: ['local', 'url', 'camera'],
                clientAllowedFormats: ["png","jpg","mp4"],
                maxVideoDuration: 90
            }, async (err, res) => {
                if(res && res.event === "success") {
                    await addDoc(collection(db, "posts"), {
                        url: res.info.secure_url,
                        type: res.info.resource_type,
                        author: userProfile.name,
                        uid: auth.currentUser.uid,
                        time: serverTimestamp()
                    });
                    alert("Lekh prakashit ho gaya!");
                }
            });
        };

        function loadBlog() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                feedContainer.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const media = p.type === 'video' ? `<video src="${p.url}" controls class="w-full h-auto"></video>` : `<img src="${p.url}" class="w-full h-auto">`;
                    feedContainer.innerHTML += `
                        <article class="blog-card overflow-hidden">
                            <div class="p-4 flex items-center gap-3">
                                <div class="w-10 h-10 bg-[#b8860b] text-white flex items-center justify-center rounded-full font-bold">${p.author[0].toUpperCase()}</div>
                                <div>
                                    <h4 class="font-bold text-sm">@${p.author}</h4>
                                    <p class="text-[9px] text-gray-400">Prakashit: ${p.time ? new Date(p.time.toDate()).toLocaleDateString() : 'Abhi'}</p>
                                </div>
                            </div>
                            ${media}
                            <div class="p-6">
                                <h3 class="text-xl font-bold mb-3 hover:text-[#b8860b] cursor-pointer">Shahi Darbar Update</h3>
                                <p class="text-sm text-gray-600 leading-relaxed mb-4">Hukum, is post ko pura dekhne ke liye profile visit karein...</p>
                                <div class="flex gap-6 text-gray-400 text-xs border-t pt-4">
                                    <span><i class="fa-regular fa-heart"></i> Pasand</span>
                                    <span><i class="fa-regular fa-comment"></i> Vichar</span>
                                </div>
                            </div>
                        </article>`;
                });
            });
        }

        window.toggleAuth = (isL) => {
            loginBox.classList.toggle('hidden', !isL);
            regBox.classList.toggle('hidden', isL);
        };
    </script>
</body>
</html>
