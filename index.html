<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Luxury Creator Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        .saini-header {
            background: linear-gradient(to right, #b8860b, #d4af37, #fff, #d4af37, #b8860b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .banner-box { height: 280px; position: relative; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; overflow: hidden; }
        .profile-side { position: absolute; bottom: -40px; left: 30px; display: flex; align-items: flex-end; gap: 20px; z-index: 50; }
        .p-img-main { width: 140px; height: 140px; border-radius: 30px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); object-fit: cover; background: #fff; }
        
        .chat-bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; margin-bottom: 10px; font-size: 14px; }
        .msg-sent { background: var(--gold); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-received { background: #eee; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold) !important; font-weight: 800; }
        .hidden { display: none !important; }
        .product-card { transition: 0.3s; border: 1px solid #eee; border-radius: 24px; background: #fff; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <h1 class="raj-font text-4xl animate-bounce text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <section id="auth-box" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-md bg-white p-10 rounded-[40px] shadow-2xl border border-gray-100">
            <h2 class="raj-font text-5xl text-center text-[#d4af37] mb-2">S</h2>
            <p class="text-center text-[10px] tracking-[0.3em] text-gray-400 mb-10">THE ROYAL MARKETPLACE</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition">GET ACCESS</button>
        </div>
    </section>

    <main id="app" class="hidden">
        <header class="bg-white py-6 text-center border-b sticky top-0 z-[100] backdrop-blur-md bg-white/90">
            <h1 class="raj-font text-3xl saini-header font-black tracking-widest">SAINIWALAA</h1>
            <div class="flex justify-center gap-8 mt-4 text-[11px] font-bold uppercase tracking-tighter text-gray-400">
                <button onclick="nav('feed')" id="n-feed" class="pb-1 transition">Trending</button>
                <button onclick="nav('shop')" id="n-shop" class="pb-1 transition">My Studio</button>
                <button onclick="nav('orders')" id="n-orders" class="pb-1 transition">Orders</button>
                <button onclick="logout()" class="text-red-400"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <section id="sec-shop" class="hidden">
            <div class="banner-box">
                <img id="b-img" src="https://images.unsplash.com/photo-1557683316-973673baf926?w=1000" class="w-full h-full object-cover">
                <div class="profile-side">
                    <div class="relative group">
                        <img id="p-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" class="p-img-main">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/40 text-white rounded-[30px] opacity-0 group-hover:opacity-100 cursor-pointer transition owner-only">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" class="hidden" onchange="upMedia('profile', this)">
                        </label>
                    </div>
                    <div class="mb-8">
                        <h2 id="u-name" class="raj-font text-2xl font-bold text-white drop-shadow-md">Creator Name</h2>
                        <div class="flex gap-2 mt-2">
                            <button id="inbox-trigger" onclick="openChat()" class="bg-white text-black px-4 py-1.5 rounded-full text-[10px] font-bold shadow-lg hover:bg-gold hover:text-white transition">
                                <i class="fa-solid fa-envelope mr-1"></i> INBOX
                            </button>
                            <button onclick="document.getElementById('edit-modal').classList.remove('hidden')" class="bg-black/50 backdrop-blur-md text-white px-4 py-1.5 rounded-full text-[10px] font-bold owner-only">EDIT</button>
                        </div>
                    </div>
                </div>
                <label class="absolute top-4 right-4 bg-white/20 p-3 rounded-full text-white cursor-pointer owner-only">
                    <i class="fa-solid fa-panorama"></i>
                    <input type="file" class="hidden" onchange="upMedia('banner', this)">
                </label>
            </div>

            <div class="mt-16 px-6 max-w-4xl mx-auto">
                <div id="u-bio" class="text-center p-6 bg-white rounded-[30px] border shadow-sm italic text-gray-500">Mhara Swagat hai!</div>
                
                <div class="mt-10 owner-only">
                    <div class="bg-white p-8 rounded-[40px] border-2 border-dashed border-gray-200 hover:border-gold transition">
                        <h3 class="raj-font text-lg mb-6">List New Creation</h3>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input id="pn" placeholder="Item Name" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                            <input id="pp" placeholder="Price (₹)" type="number" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                            <input id="pc" placeholder="Category" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                            <input id="pl" placeholder="External Web Link" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                        </div>
                        <textarea id="pd" placeholder="Tell the story of this product..." class="w-full p-4 bg-gray-50 rounded-2xl h-24 mb-4 outline-none border"></textarea>
                        <div class="flex items-center gap-4">
                            <input type="file" id="pf" onchange="preProd(this)" class="hidden">
                            <label for="pf" id="pf-label" class="flex-1 bg-gray-100 p-4 rounded-2xl text-center cursor-pointer font-bold text-gray-400 border hover:bg-gray-200">PHOTO</label>
                            <button onclick="pubProd()" id="pub-btn" class="hidden flex-1 bg-black text-white p-4 rounded-2xl font-bold">PUBLISH</button>
                        </div>
                    </div>
                </div>

                <div id="grid-shop" class="grid grid-cols-2 gap-4 mt-10 mb-20"></div>
            </div>
        </section>

        <section id="sec-feed" class="hidden px-6 pt-6">
            <div class="mb-8 relative">
                <input type="text" oninput="search(this.value)" placeholder="Search Elite Products..." class="w-full p-5 pl-12 bg-white rounded-3xl border-none shadow-md outline-none focus:ring-2 ring-gold/20">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-6 text-gray-300"></i>
            </div>
            <div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-orders" class="hidden p-6">
            <h2 class="raj-font text-3xl mb-8">Sales History</h2>
            <div id="list-orders" class="space-y-4"></div>
        </section>
    </main>

    <div id="chat-modal" class="hidden fixed inset-0 z-[1000] bg-black/60 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] overflow-hidden flex flex-col h-[80vh] shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gold rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-crown"></i></div>
                    <div>
                        <p class="font-bold text-sm" id="chat-with-name">Chat</p>
                        <p class="text-[9px] text-green-500 font-bold uppercase">Online Now</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="blockUser()" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-ban"></i></button>
                    <button onclick="document.getElementById('chat-modal').classList.add('hidden')" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
            </div>
            <div id="chat-msgs" class="flex-1 overflow-y-auto p-6 flex flex-col"></div>
            <div class="p-4 border-t bg-white flex gap-2">
                <input id="chat-input" placeholder="Type a message..." class="flex-1 p-4 bg-gray-50 rounded-2xl outline-none">
                <button onclick="sendMsg()" class="bg-black text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[1100] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[50px] p-10 text-center">
            <h3 class="raj-font text-2xl mb-2">Finalize Purchase</h3>
            <p class="text-[10px] text-gray-400 font-bold mb-8 tracking-widest uppercase">Direct connection to creator</p>
            <input id="on" placeholder="Your Name" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <input id="op" placeholder="Mobile Number" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <input id="oc" placeholder="City" class="w-full p-4 mb-8 bg-gray-50 rounded-2xl outline-none border">
            <button id="buy-btn" onclick="confirmPurchase()" class="w-full bg-black text-white py-5 rounded-3xl font-black shadow-xl active:scale-95 transition">PLACE ORDER & REDIRECT</button>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 z-[1200] bg-black/80 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8">
            <h3 class="raj-font text-xl mb-6">Edit Identity</h3>
            <input id="en" placeholder="Full Name" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <input id="eb" placeholder="Bio Story" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <div class="flex items-center gap-4 mb-6">
                <input type="color" id="ec" class="h-12 w-12 border-none">
                <input type="number" id="es" placeholder="Font Size" class="flex-1 p-4 bg-gray-50 rounded-2xl outline-none border">
            </div>
            <button onclick="saveProfile()" class="w-full bg-gold text-white py-4 rounded-2xl font-bold mb-2">UPDATE</button>
            <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full text-gray-400 text-xs font-bold py-2">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, query, where, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null;
        let viewUid = null;
        let allProds = [];

        onAuthStateChanged(auth, u => {
            document.getElementById('loading').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('auth-box').classList.add('hidden');
                initApp();
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
            }
        });

        function initApp() {
            nav('feed');
            onSnapshot(collection(db, "products"), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed');
            });
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                const list = document.getElementById('list-orders');
                list.innerHTML = "";
                s.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm flex justify-between items-center">
                            <div>
                                <p class="font-bold text-lg">${o.item}</p>
                                <p class="text-xs text-gray-400">${o.customer} • ${o.city} • ${o.phone}</p>
                                <p class="text-[9px] mt-2 text-gold font-black">${o.time?.toDate().toLocaleString() || 'Just now'}</p>
                            </div>
                            <p class="font-black text-xl text-gold">₹${o.price}</p>
                        </div>
                    `;
                });
            });
        }

        window.nav = (t) => {
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('n-'+s).classList.toggle('nav-active', s === t);
            });
            if(t === 'shop' && !viewUid) viewProfile(curU.uid);
        };

        window.viewProfile = async (uid) => {
            viewUid = uid;
            const isMe = (uid === curU.uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()) {
                const d = s.data();
                document.getElementById('u-name').innerText = d.name || "Saini Creator";
                document.getElementById('u-bio').innerText = d.bio || "Mhara Swagat hai!";
                document.getElementById('u-bio').style.color = d.bioColor || "#999";
                document.getElementById('u-bio').style.fontSize = (d.bioSize || 15) + "px";
                document.getElementById('p-img').src = d.profile || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
                document.getElementById('b-img').src = d.banner || "https://images.unsplash.com/photo-1557683316-973673baf926?w=1000";
                document.getElementById('chat-with-name').innerText = d.name || "Creator";
            }

            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                const p = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(p, 'grid-shop', isMe);
            });
            nav('shop');
        };

        window.openChat = () => {
            document.getElementById('chat-modal').classList.remove('hidden');
            const chatQ = query(collection(db, "chats"), where("roomId", "in", [curU.uid+"_"+viewUid, viewUid+"_"+curU.uid]), orderBy("time", "asc"));
            onSnapshot(chatQ, s => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    const isMe = m.from === curU.uid;
                    box.innerHTML += `<div class="chat-bubble ${isMe ? 'msg-sent' : 'msg-received'}">${m.msg}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendMsg = async () => {
            const m = document.getElementById('chat-input').value;
            if(!m) return;
            await addDoc(collection(db, "chats"), {
                roomId: curU.uid+"_"+viewUid,
                from: curU.uid,
                to: viewUid,
                msg: m,
                time: serverTimestamp()
            });
            document.getElementById('chat-input').value = "";
        };

        window.renderGrid = (data, cid, mine = false) => {
            const g = document.getElementById(cid);
            g.innerHTML = "";
            data.forEach(p => {
                g.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="w-full aspect-square object-cover" onclick="viewProfile('${p.creatorId}')">
                        <div class="p-4">
                            <p class="text-[9px] font-black text-gold uppercase mb-1">@${p.creator}</p>
                            <h4 class="font-bold text-sm truncate">${p.name}</h4>
                            <p class="text-[10px] mt-1 text-gray-500">${p.desc}</p>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="font-black">₹${p.price}</span>
                                <div class="flex gap-2">
                                    ${mine ? `<button onclick="delP('${p.id}')" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>` : ''}
                                    <button onclick="orderForm('${p.id}')" class="bg-black text-white text-[9px] px-4 py-2 rounded-xl font-bold">GET IT</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        window.orderForm = (pid) => {
            const p = allProds.find(i => i.id === pid);
            window.activeOrder = p;
            document.getElementById('order-modal').classList.remove('hidden');
        };

        // --- UPDATED: Confirm Purchase WITH VALIDATION & DOUBLE-CLICK LOCK ---
        window.confirmPurchase = async () => {
            const n = document.getElementById('on').value.trim();
            const p = document.getElementById('op').value.trim();
            const c = document.getElementById('oc').value.trim();
            const btn = document.getElementById('buy-btn');

            // Regex: Name only letters, Mobile only 10 digits
            const nameCheck = /^[a-zA-Z\s]+$/;
            const phoneCheck = /^[0-9]{10}$/;

            if(!n || !p || !c) return alert("Pura form bhariye!");
            if(!nameCheck.test(n)) return alert("Naam mein sirf akshar (letters) dalein!");
            if(!phoneCheck.test(p)) return alert("Mobile number mein sirf 10 digits dalein!");

            btn.disabled = true; 
            btn.innerText = "WAIT...";

            try {
                await addDoc(collection(db, "orders"), {
                    item: window.activeOrder.name,
                    price: window.activeOrder.price,
                    customer: n,
                    phone: p,
                    city: c,
                    creatorId: window.activeOrder.creatorId,
                    time: serverTimestamp()
                });
                document.getElementById('order-modal').classList.add('hidden');
                window.open(window.activeOrder.link, '_blank');
            } catch(e) {
                alert("Error!");
                btn.disabled = false;
                btn.innerText = "PLACE ORDER & REDIRECT";
            }
        };

        window.authAction = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };

        window.saveProfile = async () => {
            await setDoc(doc(db, "users", curU.uid), {
                name: document.getElementById('en').value,
                bio: document.getElementById('eb').value,
                bioColor: document.getElementById('ec').value,
                bioSize: document.getElementById('es').value
            }, {merge:true});
            location.reload();
        };

        window.upMedia = (t, i) => {
            const r = new FileReader();
            r.onload = async e => {
                await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, {merge:true});
                location.reload();
            };
            r.readAsDataURL(i.files[0]);
        };

        window.preProd = (i) => {
            const r = new FileReader();
            r.onload = e => { 
                window.tempP = e.target.result; 
                document.getElementById('pub-btn').classList.remove('hidden'); 
                document.getElementById('pf-label').innerText = "PHOTO SELECTED ✅";
            };
            r.readAsDataURL(i.files[0]);
        };

        // --- UPDATED: Publish Product WITH FULL FIELD CHECK & DOUBLE-CLICK LOCK ---
        window.pubProd = async () => {
            const name = document.getElementById('pn').value.trim();
            const price = document.getElementById('pp').value.trim();
            const cat = document.getElementById('pc').value.trim();
            const link = document.getElementById('pl').value.trim();
            const desc = document.getElementById('pd').value.trim();
            const btn = document.getElementById('pub-btn');

            if(!name || !price || !cat || !link || !desc || !window.tempP) {
                return alert("Saari jankari aur photo bharna jaruri hai!");
            }

            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            try {
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: price,
                    cat: cat,
                    link: link,
                    desc: desc,
                    img: window.tempP,
                    creatorId: curU.uid,
                    creator: document.getElementById('u-name').innerText,
                    time: serverTimestamp()
                });
                location.reload();
            } catch(e) {
                alert("Upload failed!");
                btn.disabled = false;
                btn.innerText = "PUBLISH";
            }
        };

        window.delP = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "products", id)); };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.search = (v) => {
            const filtered = allProds.filter(p => p.name.toLowerCase().includes(v.toLowerCase()) || p.cat.toLowerCase().includes(v.toLowerCase()));
            renderGrid(filtered, 'grid-feed');
        };
        window.blockUser = () => alert("User Blocked!");
    </script>
</body>
</html>
