<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let myData = null;

        // --- FIXED LOGIN LOGIC (No refresh logout) ---
        setPersistence(auth, browserLocalPersistence).then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const snap = await get(ref(db, `users/${user.uid}`));
                    myData = snap.val();
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('app-box').classList.remove('hidden');
                    loadProfile();
                    loadDarbar();
                    loadDukaan();
                } else {
                    document.getElementById('auth-box').classList.remove('hidden');
                    document.getElementById('app-box').classList.add('hidden');
                }
            });
        });

        // --- DYNAMIC PRODUCT LISTING FORM ---
        window.openBazaarUpload = () => {
            const name = prompt("Saaman ko naam:");
            if(!name) return;
            const price = prompt("Daam (₹):");
            const desc = prompt("Vivran (Description):");
            const link = prompt("Web Link (Optional):");

            cloudinary.openUploadWidget({ cloudName: "dprl2lyih", uploadPreset: "ml_default" }, (err, res) => {
                if (!err && res.event === "success") {
                    push(ref(db, 'products'), {
                        url: res.info.secure_url,
                        name, price, desc, link,
                        uid: auth.currentUser.uid,
                        time: serverTimestamp()
                    });
                    alert("Ghani Khamma! Bazaar me saaman rakho gayo. 🚩");
                }
            });
        };

        // --- INSTANT IMAGE SAVE (SOCIAL POST) ---
        window.openPostUpload = () => {
            cloudinary.openUploadWidget({ cloudName: "dprl2lyih", uploadPreset: "ml_default" }, (err, res) => {
                if (!err && res.event === "success") {
                    push(ref(db, 'posts'), {
                        url: res.info.secure_url,
                        uid: auth.currentUser.uid,
                        uName: myData.name,
                        time: serverTimestamp()
                    });
                    alert("Darbar me post daraj ho gayi! 🚩");
                }
            });
        };

        // --- DATA LOADERS ---
        function loadDarbar() {
            onValue(ref(db, 'posts'), s => {
                const box = document.getElementById('darbar-posts');
                box.innerHTML = "";
                if(s.exists()) {
                    Object.values(s.val()).reverse().forEach(p => {
                        box.innerHTML += `<img src="${p.url}" onclick="window.open('${p.url}')" class="w-full h-40 object-cover rounded shadow-lg border border-gray-800">`;
                    });
                } else { box.innerHTML = "<p class='col-span-2 text-center py-10 text-gray-500'>Koi post nahi di.</p>"; }
            });
        }

        function loadDukaan() {
            onValue(ref(db, 'products'), s => {
                const box = document.getElementById('dukaan-list');
                box.innerHTML = "";
                if(s.exists()) {
                    Object.values(s.val()).reverse().forEach(p => {
                        box.innerHTML += `
                        <div class="bg-gray-900 rounded-lg p-2 border border-gray-800">
                            <img src="${p.url}" class="w-full h-32 object-cover rounded mb-2">
                            <b class="text-xs gold-text block truncate">${p.name}</b>
                            <p class="text-white font-bold">₹${p.price}</p>
                            <button onclick="window.open('${p.link || '#'}')" class="w-full bg-yellow-600 text-black text-[10px] py-1 mt-2 font-bold rounded uppercase">Kharido 🚩</button>
                        </div>`;
                    });
                }
            });
        }

        // --- REFRESH SAFE TABS ---
        window.goTab = (tab) => {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
        };

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&display=swap');
        body { font-family: 'Marcellus', serif; background-color: #000; color: #fff; }
        .gold-text { color: #D4AF37; }
        .gold-border { border-color: #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app-box" class="max-w-[500px] mx-auto min-h-screen relative pb-24 hidden">
        <div id="prof-banner" class="h-44 bg-gradient-to-b from-yellow-900 to-black bg-cover bg-center relative">
            <div class="absolute -bottom-10 left-6 flex items-end gap-4">
                <img id="prof-img" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-4 border-black bg-yellow-600">
                <div class="mb-2">
                    <h2 id="prof-name" class="text-xl font-bold">Sunil Saini</h2>
                    <p id="prof-bio" class="text-xs text-gray-400 italic">SSSSSSSSSSSSSS</p>
                </div>
            </div>
            <button onclick="openPostUpload()" class="absolute bottom-4 right-4 bg-yellow-600 p-2 rounded-full text-black"><i class="fa-solid fa-camera"></i></button>
        </div>

        <div class="mt-16 flex border-y border-gray-800">
            <button onclick="goTab('darbar')" class="flex-1 py-3 text-xs border-r border-gray-800"><i class="fa-solid fa-table-cells"></i> Darbar</button>
            <button onclick="goTab('dukaan')" class="flex-1 py-3 text-xs border-r border-gray-800"><i class="fa-solid fa-shop"></i> Dukaan</button>
            <button onclick="goTab('sauda')" class="flex-1 py-3 text-xs"><i class="fa-solid fa-box"></i> Sauda</button>
        </div>

        <main class="p-4">
            <div id="darbar" class="tab-view grid grid-cols-2 gap-2">
                <div id="darbar-posts" class="contents"></div>
            </div>
            
            <div id="dukaan" class="tab-view hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="gold-text text-xl">Shahi Bazaar</h3>
                    <button onclick="openBazaarUpload()" class="bg-yellow-600 text-black px-4 py-1 rounded text-xs font-bold">+ Bazaar me Rakho</button>
                </div>
                <div id="dukaan-list" class="grid grid-cols-2 gap-3"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-black border-t border-gray-800 p-4 flex justify-around">
            <i class="fa-solid fa-house" onclick="goTab('darbar')"></i>
            <i class="fa-solid fa-bag-shopping" onclick="goTab('dukaan')"></i>
            <i class="fa-solid fa-circle-user text-yellow-500"></i>
        </nav>
    </div>

    <div id="auth-box" class="h-screen flex flex-col justify-center items-center p-10 bg-black">
        <h1 class="text-4xl gold-text mb-10 tracking-widest">SAINIWALAA</h1>
        <div class="w-full max-w-xs flex flex-col gap-4">
            <input type="email" id="email" placeholder="Email" class="bg-transparent border-b gold-border p-2 outline-none text-white">
            <input type="password" id="pass" placeholder="Password" class="bg-transparent border-b gold-border p-2 outline-none text-white">
            <button onclick="signInWithEmailAndPassword(getAuth(), email.value, pass.value)" class="bg-yellow-600 p-3 rounded font-bold uppercase text-black">Login 🚩</button>
        </div>
    </div>

</body>
</html>
