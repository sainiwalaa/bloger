<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let userCache = JSON.parse(localStorage.getItem('user_data')) || null;
        let activePostId = null;
        let currentPage = localStorage.getItem('last_page') || 'feed';

        // --- AUTH & SPEED LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (!userCache) {
                    const snap = await get(ref(db, 'users/' + user.uid));
                    userCache = snap.val();
                    localStorage.setItem('user_data', JSON.stringify(userCache));
                }
                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('app').classList.remove('hide');
                showPage(currentPage);
                initApp();
            } else {
                localStorage.removeItem('user_data');
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- GLOBAL FUNCTIONS (WINDOW) ---
        window.showPage = (p) => {
            currentPage = p;
            localStorage.setItem('last_page', p);
            document.querySelectorAll('main').forEach(el => el.classList.add('hide'));
            document.getElementById('v-' + p).classList.remove('hide');
        };

        window.handleAuth = async (mode) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if(mode === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Hukum, error: " + e.message); }
        };

        // --- SOCIAL ACTIONS (NO RELOAD) ---
        window.sendComment = async () => {
            const input = document.getElementById('comm-input');
            const btn = document.getElementById('comm-btn');
            const txt = input.value.trim();
            if(!txt || !activePostId) return;

            btn.disabled = true;
            await push(ref(db, `comments/${activePostId}`), {
                uHandle: userCache.username,
                text: txt,
                time: Date.now()
            });
            input.value = "";
            btn.disabled = false;
        };

        window.toggleLike = async (postId) => {
            const likeRef = ref(db, `likes/${postId}/${auth.currentUser.uid}`);
            const snap = await get(likeRef);
            snap.exists() ? await remove(likeRef) : await set(likeRef, true);
        };

        window.openComments = (id) => {
            activePostId = id;
            document.getElementById('comment-modal').classList.remove('hide');
            // Real-time listener specifically for this post
            onValue(ref(db, `comments/${id}`), (snap) => {
                let h = "";
                const data = snap.val();
                if(data) Object.keys(data).forEach(k => {
                    h += `<div class="p-2 bg-gray-50 rounded-lg text-xs"><b>@${data[k].uHandle}</b>: ${data[k].text}</div>`;
                });
                document.getElementById('comment-list').innerHTML = h || "No comments yet.";
            });
        };

        // --- PUBLISH LOGIC (ANTI-DOUBLE) ---
        window.publish = async (mode) => {
            const file = document.getElementById(mode + '-file').files[0];
            const btn = document.getElementById('btn-' + mode);
            if(!file) return alert("File chuniye sa!");

            btn.disabled = true;
            btn.innerHTML = "Thambo... Post ho rha hai 🚩";

            const fd = new FormData();
            fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {method:"POST", body:fd});
            const d = await res.json();

            const item = {
                uid: auth.currentUser.uid,
                uName: userCache.name,
                uHandle: userCache.username,
                uPhoto: userCache.photo || "",
                url: d.secure_url,
                caption: document.getElementById(mode + '-desc').value,
                time: Date.now()
            };

            if(mode === 'prod') {
                item.name = document.getElementById('prod-name').value;
                item.price = document.getElementById('prod-price').value;
                item.link = document.getElementById('prod-link').value;
                await push(ref(db, 'products'), item);
            } else {
                item.type = file.type.includes('video') ? 'video' : 'image';
                await push(ref(db, 'posts'), item);
            }

            btn.disabled = false;
            btn.innerHTML = "Done! 🚩";
            setTimeout(() => { closeM(mode + '-modal'); btn.innerHTML = "PUBLISH"; }, 1000);
        };

        function initApp() {
            // Real-time Feed
            onValue(ref(db, 'posts'), s => {
                let h = ""; const posts = s.val();
                if(posts) Object.keys(posts).reverse().forEach(k => {
                    const p = posts[k];
                    h += `<div class="post-card bg-white mb-6 border-b">
                        <div class="p-3 flex items-center gap-3">
                            <img src="${p.uPhoto || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-full">
                            <b class="text-sm raj-title italic">${p.uName}</b>
                        </div>
                        <div class="bg-black flex items-center justify-center min-h-[300px]">
                            ${p.type==='video'?`<video src="${p.url}" controls class="w-full"></video>`:`<img src="${p.url}" class="w-full max-h-[500px] object-contain">`}
                        </div>
                        <div class="p-4 flex gap-6 text-2xl">
                            <i class="fa-regular fa-heart" id="like-${k}" onclick="toggleLike('${k}')"></i>
                            <i class="fa-regular fa-comment" onclick="openComments('${k}')"></i>
                        </div>
                        <div class="px-4 pb-4 text-xs text-gray-600"><b>@${p.uHandle}</b> ${p.caption || ''}</div>
                    </div>`;
                    onValue(ref(db, `likes/${k}/${auth.currentUser.uid}`), snap => {
                        const icon = document.getElementById(`like-${k}`);
                        if(icon) icon.className = snap.exists() ? "fa-solid fa-heart text-red-500" : "fa-regular fa-heart";
                    });
                });
                document.getElementById('v-feed').innerHTML = h;
            });

            // Shop Data
            onValue(ref(db, 'products'), s => {
                let h = ""; const pr = s.val();
                if(pr) Object.keys(pr).reverse().forEach(k => {
                    const p = pr[k];
                    h += `<div class="bg-white border p-2 rounded-xl">
                        <img src="${p.url}" class="w-full h-32 object-cover rounded-lg">
                        <h3 class="text-[10px] font-bold mt-1 truncate">${p.name}</h3>
                        <div class="text-orange-600 font-bold text-xs">₹${p.price}</div>
                        <button onclick="window.open('${p.link}')" class="w-full bg-orange-600 text-white py-1.5 text-[10px] rounded-lg mt-1">Buy Now</button>
                    </div>`;
                });
                document.getElementById('shop-grid').innerHTML = h;
            });

            document.getElementById('u-prof-img').src = userCache.photo || 'https://via.placeholder.com/100';
            document.querySelectorAll('.u-name-display').forEach(el => el.innerText = userCache.name);
        }

        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => {
            if(id === 'comment-modal') off(ref(db, `comments/${activePostId}`));
            document.getElementById(id).classList.add('hide');
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 12px; width: 100%; }
        input, textarea { border: 1.5px solid #eee !important; padding: 10px; border-radius: 12px; margin-bottom: 8px; width: 100%; outline: none; font-size: 13px; }
        .nav-icon { font-size: 1.4rem; color: #d1d5db; cursor: pointer; transition: 0.2s; }
        .nav-icon:hover { color: #ea580c; }
    </style>
</head>
<body class="flex justify-center bg-gray-50">

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white">
        <h1 class="text-5xl font-black raj-title text-center mb-12 italic">SainiWalaa</h1>
        <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
        <button onclick="handleAuth('login')" class="btn-royal shadow-xl">ENTER STUDIO</button>
    </div>

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-20 hide bg-white shadow-2xl">
        <header class="sticky top-0 bg-white/90 backdrop-blur-lg border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic">SAINIWALAA</h1>
            <div class="flex gap-5">
                <i class="fa-solid fa-square-plus text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store text-gray-400 text-2xl" onclick="openM('prod-modal')"></i>
            </div>
        </header>

        <main id="v-feed"></main>

        <main id="v-shop" class="hide p-4">
            <h2 class="text-xl font-black raj-title italic mb-4">ROYAL BAZAAR</h2>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-32 bg-orange-50 relative">
                <img id="u-prof-img" src="" class="w-20 h-20 rounded-full absolute -bottom-10 left-6 border-4 border-white object-cover shadow-xl">
            </div>
            <div class="mt-12 p-6">
                <h2 class="text-2xl font-black u-name-display raj-title italic leading-none"></h2>
                <button onclick="signOut(auth).then(()=>location.reload())" class="mt-4 bg-red-50 text-red-600 px-6 py-2 rounded-full text-[10px] font-black uppercase">Logout</button>
            </div>
        </main>

        <div id="comment-modal" class="fixed inset-0 bg-black/50 z-[1000] hide flex items-end">
            <div class="bg-white w-full max-w-[450px] h-[60vh] rounded-t-[30px] p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-sm">Comments</h3><i class="fa-solid fa-times text-xl" onclick="closeM('comment-modal')"></i></div>
                <div id="comment-list" class="flex-1 overflow-y-auto space-y-2"></div>
                <div class="mt-4 flex gap-2 border-t pt-4">
                    <input type="text" id="comm-input" placeholder="Aapka vichaar..." class="!mb-0 !rounded-full !bg-gray-50">
                    <button id="comm-btn" onclick="sendComment()" class="bg-orange-600 text-white w-14 h-12 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[600] hide p-8">
            <h2 class="text-2xl font-black raj-title mb-6">NEW POST</h2>
            <input type="file" id="post-file" accept="image/*,video/*"><textarea id="post-desc" placeholder="Caption..."></textarea>
            <button onclick="publish('post')" id="btn-post" class="btn-royal">PUBLISH 🚩</button>
            <button onclick="closeM('post-modal')" class="mt-4 w-full text-xs text-gray-400">Cancel</button>
        </div>

        <div id="prod-modal" class="fixed inset-0 bg-white z-[600] hide p-8">
            <h2 class="text-2xl font-black raj-title mb-6">LIST PRODUCT</h2>
            <input type="file" id="prod-file" accept="image/*"><input type="text" id="prod-name" placeholder="Item Name"><input type="number" id="prod-price" placeholder="Price"><input type="text" id="prod-link" placeholder="Buy Link"><textarea id="prod-desc" placeholder="Details..."></textarea>
            <button onclick="publish('prod')" id="btn-prod" class="btn-royal">LIST NOW</button>
            <button onclick="closeM('prod-modal')" class="mt-4 w-full text-xs text-gray-400">Cancel</button>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-shop nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-circle-user nav-icon"></i>
        </nav>
    </div>
</body>
</html>
