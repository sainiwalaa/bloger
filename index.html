<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fdfdfd; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn.active { color: #d4af37; border-bottom: 4px solid #d4af37; font-weight: 800; }
        .hidden { display: none !important; }
        .shahi-card { border-radius: 24px; background: white; border: 1px solid #f0f0f0; transition: 0.3s; overflow: hidden; }
        .shahi-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .banner-shahi { height: 180px; background: #eee; background-size: cover; background-position: center; border-radius: 0 0 30px 30px; position: relative; }
        .profile-shahi { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #fff; position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-shahi { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid #eee; margin-bottom: 12px; outline: none; }
        .input-shahi:focus { border-color: #d4af37; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-sm border text-center">
            <h1 class="raj-font text-4xl text-[#d4af37] mb-2">SAINIWALAA</h1>
            <p class="text-xs text-gray-400 mb-8 uppercase tracking-widest">Creator Darbar</p>
            <input type="email" id="auth-email" placeholder="Email Address" class="input-shahi">
            <input type="password" id="auth-pass" placeholder="Password" class="input-shahi">
            <button onclick="handleAuth('login')" class="w-full bg-black text-white p-4 rounded-2xl font-bold mb-3">LOG IN</button>
            <button onclick="handleAuth('signup')" class="w-full border-2 border-black p-3 rounded-2xl font-bold text-sm">CREATE NEW SHOP (REGISTER)</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md flex justify-around border-b px-2 shadow-sm">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn active p-5 text-[10px] uppercase font-bold tracking-tighter">Duniya ka Maal</button>
            <button onclick="showTab('myshop')" id="tab-myshop" class="nav-btn p-5 text-[10px] uppercase font-bold tracking-tighter">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn p-5 text-[10px] uppercase font-bold tracking-tighter">Orders</button>
            <button onclick="logout()" class="p-5 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-feed" class="p-5 max-w-5xl mx-auto">
            <h2 class="raj-font text-xl mb-6">Trending Products</h2>
            <div id="public-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="sec-myshop" class="hidden">
            <div id="shop-banner" class="banner-shahi" style="background-image: url('https://images.unsplash.com/photo-1590050752117-23aae33aa891?q=80&w=1000');">
                <label class="absolute top-4 right-4 bg-white/20 p-2 rounded-full cursor-pointer text-white backdrop-blur-sm"><i class="fa-solid fa-camera"></i><input type="file" onchange="updateProfileImg('banner', this)"></label>
                <div class="relative">
                    <img id="shop-profile-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-shahi">
                    <label class="absolute bottom-[-50px] left-[56%] bg-[#d4af37] text-white p-2 rounded-full border-2 border-white cursor-pointer"><i class="fa-solid fa-pen text-[10px]"></i><input type="file" onchange="updateProfileImg('profile', this)"></label>
                </div>
            </div>

            <div class="mt-16 text-center px-6">
                <h2 id="creator-name" class="text-2xl font-black">Shahi Creator</h2>
                <p id="creator-bio" class="text-sm text-gray-400 italic">Bio update kijiye...</p>
                
                <div class="flex justify-center gap-4 mt-6">
                    <a id="link-insta" href="#" class="text-pink-600 text-xl"><i class="fa-brands fa-instagram"></i></a>
                    <a id="link-yt" href="#" class="text-red-600 text-xl"><i class="fa-brands fa-youtube"></i></a>
                    <a id="link-fb" href="#" class="text-blue-600 text-xl"><i class="fa-brands fa-facebook"></i></a>
                </div>
                <button onclick="toggleDiv('edit-box')" class="mt-6 text-[10px] font-bold text-[#d4af37] uppercase border px-4 py-1 rounded-full">Profile Edit</button>
            </div>

            <div id="edit-box" class="hidden max-w-sm mx-auto p-6 bg-white rounded-3xl mt-4 border shadow-sm">
                <input id="in-name" placeholder="Name" class="input-shahi">
                <input id="in-bio" placeholder="Bio" class="input-shahi">
                <input id="in-insta" placeholder="Insta Link" class="input-shahi">
                <input id="in-yt" placeholder="YT Link" class="input-shahi">
                <input id="in-fb" placeholder="FB Link" class="input-shahi">
                <button onclick="saveProfile()" class="w-full bg-black text-white p-3 rounded-xl font-bold">SAVE PROFILE</button>
            </div>

            <div class="max-w-4xl mx-auto p-5 mt-10">
                <div class="bg-[#d4af37]/5 border-2 border-dashed border-[#d4af37]/30 p-8 rounded-[40px] text-center">
                    <h3 class="font-bold text-[#d4af37] mb-6">NAYA MAAL LIST KAREIN</h3>
                    <input id="p-name" placeholder="Product Name" class="input-shahi">
                    <textarea id="p-desc" placeholder="Product Details..." class="input-shahi"></textarea>
                    <input id="p-price" placeholder="Price ₹" class="input-shahi">
                    
                    <div id="p-preview" class="hidden mb-4"><img id="p-prev-img" class="h-32 mx-auto rounded-2xl shadow-md"></div>
                    
                    <div class="flex gap-3">
                        <label class="flex-1 bg-white p-4 rounded-2xl cursor-pointer text-xs font-bold border-2 border-[#d4af37] text-[#d4af37]">
                            <i class="fa-solid fa-image mr-2"></i>PHOTO CHUNEIN
                            <input type="file" onchange="previewProductImg(this)">
                        </label>
                        <button onclick="publishProduct()" id="pub-btn" class="hidden flex-1 bg-[#d4af37] text-white p-4 rounded-2xl font-bold text-xs shadow-lg">SAVE & PUBLISH</button>
                    </div>
                </div>

                <h3 class="raj-font text-lg mt-12 mb-6">Aapka Apna Maal</h3>
                <div id="my-shop-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-xl mx-auto">
            <h3 class="raj-font text-xl mb-6 text-[#d4af37]">Customer Orders</h3>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        let user = null, tempProductImg = "";

        window.toggleDiv = (id) => document.getElementById(id).classList.toggle('hidden');

        // AUTH
        window.handleAuth = (type) => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            const action = type === 'login' ? signInWithEmailAndPassword : createUserWithEmailAndPassword;
            action(auth, e, p).catch(err => alert(err.message));
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, u => {
            if(u) { user = u; document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden'); syncData(); }
            else { document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        // NAVIGATION
        window.showTab = (t) => {
            ['feed','myshop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
        };

        // IMAGE HANDLING (NO WIDGET)
        window.updateProfileImg = (type, input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const url = e.target.result;
                if(type === 'banner') document.getElementById('shop-banner').style.backgroundImage = `url(${url})`;
                else document.getElementById('shop-profile-pic').src = url;
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.previewProductImg = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempProductImg = e.target.result;
                document.getElementById('p-preview').classList.remove('hidden');
                document.getElementById('p-prev-img').src = tempProductImg;
                document.getElementById('pub-btn').classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        };

        // PROFILE SAVE
        window.saveProfile = () => {
            document.getElementById('creator-name').innerText = document.getElementById('in-name').value || "Creator";
            document.getElementById('creator-bio').innerText = document.getElementById('in-bio').value || "Bio updated!";
            document.getElementById('link-insta').href = document.getElementById('in-insta').value || "#";
            document.getElementById('link-yt').href = document.getElementById('in-yt').value || "#";
            document.getElementById('link-fb').href = document.getElementById('in-fb').value || "#";
            toggleDiv('edit-box');
        };

        // PRODUCT SAVE
        window.publishProduct = async () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, d = document.getElementById('p-desc').value;
            if(!n || !p || !tempProductImg) return alert("Puri jankari bhariye!");
            
            await addDoc(collection(db, "products"), { 
                name: n, price: p, desc: d, img: tempProductImg, 
                creator: user.email.split('@')[0], creatorId: user.uid, time: serverTimestamp() 
            });
            
            alert("Maal Shahi Feed par Publish ho gayo!");
            document.getElementById('p-name').value = ""; document.getElementById('p-preview').classList.add('hidden');
            document.getElementById('pub-btn').classList.add('hidden');
        };

        // REAL-TIME SYNC
        function syncData() {
            // Public Feed
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('public-grid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `<div class="shahi-card">
                        <img src="${p.img}" class="w-full h-56 object-cover">
                        <div class="p-5">
                            <span class="text-[10px] bg-black text-white px-2 py-1 rounded-full">@${p.creator}</span>
                            <h4 class="font-bold mt-2">${p.name}</h4>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-2">${p.desc}</p>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-[#d4af37] font-black">₹${p.price}</span>
                                <button onclick="orderNow('${p.name}')" class="bg-black text-white text-[10px] px-5 py-2 rounded-full font-bold uppercase">Order</button>
                            </div>
                        </div>
                    </div>`;
                });
            });

            // My Shop Grid
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", user.uid)), snap => {
                const grid = document.getElementById('my-shop-grid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `<div class="bg-white p-3 rounded-2xl border relative">
                        <button onclick="delP('${d.id}')" class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs"><i class="fa-solid fa-trash"></i></button>
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-2">
                        <p class="font-bold text-xs truncate">${p.name}</p>
                        <p class="text-[#d4af37] text-xs font-bold">₹${p.price}</p>
                    </div>`;
                });
            });

            // Orders Sync
            onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
                const list = document.getElementById('order-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `<div class="bg-white p-5 rounded-3xl border-l-8 border-[#d4af37] shadow-sm">
                        <h4 class="font-bold text-sm">${o.product}</h4>
                        <p class="text-xs text-gray-400 mt-2">Customer: ${o.customer} | Ph: ${o.phone}</p>
                    </div>`;
                });
            });
        }

        window.orderNow = async (pName) => {
            const n = prompt("Aapka Naam?"), ph = prompt("WhatsApp No?");
            if(n && ph) await addDoc(collection(db, "orders"), { product: pName, customer: n, phone: ph, time: serverTimestamp() });
        };
        window.delP = async (id) => { if(confirm("Hukum, maal hata dein?")) await deleteDoc(doc(db, "products", id)); };
    </script>
</body>
</html>
