<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Social Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, query, orderByChild, equalTo, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myData = null;
        let activeProfileUid = null;

        // --- AUTH & STATUS SYSTEM ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = ref(db, `users/${user.uid}`);
                const snap = await get(userRef);
                myData = snap.val();
                
                // Online Status Logic
                const statusRef = ref(db, `status/${user.uid}`);
                set(statusRef, { state: 'online', last_changed: serverTimestamp() });
                onDisconnect(statusRef).set({ state: 'offline', last_changed: serverTimestamp() });

                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('main-app').classList.remove('hide');
                loadFeed();
                goTab(localStorage.getItem('last_tab') || 'feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('main-app').classList.add('hide');
            }
        });

        // --- REGISTRATION (Unique ID Check) ---
        window.registerUser = async () => {
            const uid = document.getElementById('reg-id').value.toLowerCase().trim();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            const q = query(ref(db, 'users'), orderByChild('username'), equalTo(uid));
            const snap = await get(q);
            if(snap.exists()) return alert("Hukum, ye ID pehle se book hai!");

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, `users/${res.user.uid}`), {
                    uid: res.user.uid, username: uid, name: uid.toUpperCase(),
                    photo: 'https://i.pravatar.cc/150?u='+uid, banner: 'https://source.unsplash.com/random/900x600?rajasthan',
                    bio: 'Kshatriya Pride 🚩 SainiWalaa Member', followers: 0, following: 0
                });
                alert("Ghani Khamma! Tharo Swagat hai.");
            } catch(e) { alert(e.message); }
        };

        // --- FEED SYSTEM (Image + Video) ---
        function loadFeed() {
            onValue(ref(db, 'posts'), s => {
                const feed = document.getElementById('feed-container'); feed.innerHTML = "";
                if(s.exists()) Object.entries(s.val()).reverse().forEach(([pid, p]) => {
                    const isVideo = p.url.includes('.mp4') || p.type === 'video';
                    feed.innerHTML += `
                        <div class="bg-white mb-6 border-b pb-4">
                            <div class="p-3 flex items-center justify-between">
                                <div class="flex items-center gap-3 cursor-pointer" onclick="visitProfile('${p.uid}')">
                                    <div class="relative">
                                        <img src="${p.uPhoto}" class="w-10 h-10 rounded-full border-2 border-orange-500">
                                        <span id="dot-${p.uid}" class="absolute bottom-0 right-0 w-3 h-3 bg-gray-400 border-2 border-white rounded-full"></span>
                                    </div>
                                    <b class="text-sm raj-title">@${p.uHandle}</b>
                                </div>
                                <i class="fa-solid fa-ellipsis-vertical text-gray-400"></i>
                            </div>
                            <div class="relative min-h-[300px] bg-black flex items-center">
                                ${isVideo ? `<video src="${p.url}" class="w-full" loop muted onclick="this.paused?this.play():this.pause()"></video>` : `<img src="${p.url}" class="w-full">`}
                            </div>
                            <div class="p-4 flex gap-5 text-2xl">
                                <i class="fa-regular fa-heart cursor-pointer hover:text-red-500" onclick="likePost('${pid}')"></i>
                                <i class="fa-regular fa-comment cursor-pointer" onclick="openComments('${pid}')"></i>
                                <i class="fa-regular fa-paper-plane cursor-pointer"></i>
                            </div>
                            <div class="px-4 text-xs">
                                <p class="font-bold mb-1">${p.likes || 0} Likes</p>
                                <p><b>${p.uHandle}</b> ${p.caption}</p>
                                <p class="text-gray-400 mt-2 text-[10px]">View all comments...</p>
                            </div>
                        </div>`;
                    updateOnlineStatus(p.uid);
                });
            });
        }

        // --- PROFILE & SHOP LOGIC ---
        window.visitProfile = async (uid) => {
            activeProfileUid = uid;
            goTab('profile');
            const snap = await get(ref(db, `users/${uid}`));
            const d = snap.val();
            
            document.getElementById('p-name').innerText = d.name;
            document.getElementById('p-handle').innerText = "@" + d.username;
            document.getElementById('p-bio').innerText = d.bio;
            document.getElementById('p-img').src = d.photo;
            document.getElementById('p-banner').style.backgroundImage = `url('${d.banner}')`;
            
            const isMe = uid === auth.currentUser.uid;
            document.getElementById('p-edit-btn').style.display = isMe ? 'block' : 'none';
            document.getElementById('p-follow-btn').style.display = isMe ? 'none' : 'block';

            loadProfileContent(uid);
        };

        function loadProfileContent(uid) {
            const grid = document.getElementById('profile-grid'); grid.innerHTML = "";
            const shop = document.getElementById('shop-grid'); shop.innerHTML = "";

            onValue(ref(db, 'products'), s => {
                if(s.exists()) Object.values(s.val()).forEach(p => {
                    if(p.ownerUid === uid) shop.innerHTML += `
                        <div class="bg-white p-2 border shadow-sm rounded-lg overflow-hidden">
                            <img src="${p.url}" class="w-full h-32 object-cover">
                            <div class="p-2">
                                <b class="text-[10px] block truncate">${p.name}</b>
                                <span class="text-orange-600 font-bold text-sm">₹${p.price}</span>
                                <button onclick="buyProduct('${p.name}', '${p.price}', '${uid}')" class="w-full bg-black text-white text-[9px] py-2 mt-2 font-bold rounded">BUY NOW</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.buyProduct = (name, price, ownerUid) => {
            const cust = prompt("Hukum, Apna Naam aur Pura Pata (Address) likho:");
            if(cust) {
                const orderData = { item: name, price: price, customer: cust, date: serverTimestamp() };
                push(ref(db, `orders/${ownerUid}`), orderData);
                alert("Hukum, Order bhej diyo! WhatsApp khul raha hai.");
                window.open(`https://wa.me/91XXXXXXXXXX?text=New Order: ${name} (₹${price})\nDetails: ${cust}`);
            }
        };

        // --- HELPERS ---
        function updateOnlineStatus(uid) {
            onValue(ref(db, `status/${uid}`), s => {
                const el = document.getElementById(`dot-${uid}`);
                if(el && s.exists()) el.className = `absolute bottom-0 right-0 w-3 h-3 border-2 border-white rounded-full ${s.val().state === 'online' ? 'bg-green-500' : 'bg-gray-400'}`;
            });
        }

        window.goTab = (id) => {
            localStorage.setItem('last_tab', id);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById(`v-${id}`).classList.remove('hide');
            if(id === 'profile' && !activeProfileUid) visitProfile(auth.currentUser.uid);
        };

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fafafa; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .royal-btn { background: #000; color: #fff; padding: 12px; font-weight: 900; border-radius: 6px; width: 100%; transition: 0.3s; }
        .royal-btn:active { transform: scale(0.95); }
        input { border: 1.5px solid #eee; padding: 12px; margin-bottom: 12px; width: 100%; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ea580c; }
        .nav-icon { font-size: 1.5rem; color: #333; cursor: pointer; }
    </style>
</head>
<body class="flex justify-center">

    <div id="main-app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-20 hide">
        <header class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic tracking-tighter" onclick="location.reload()">SAINIWALAA</h1>
            <div class="flex gap-5">
                <i class="fa-regular fa-square-plus nav-icon text-orange-600" onclick="alert('Post tool aave hai...')"></i>
                <i class="fa-regular fa-heart nav-icon"></i>
            </div>
        </header>

        <main id="v-feed">
            <div id="feed-container"></div>
        </main>

        <main id="v-profile" class="hide">
            <div id="p-banner" class="h-44 bg-cover bg-center relative bg-gray-200">
                <div class="absolute inset-0 bg-black/20"></div>
                <img id="p-img" class="w-24 h-24 absolute -bottom-10 left-6 rounded-full border-4 border-white shadow-xl bg-white object-cover">
            </div>
            <div class="mt-14 p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="p-name" class="text-2xl font-black raj-title leading-tight"></h2>
                        <p id="p-handle" class="text-xs font-bold text-gray-400"></p>
                    </div>
                    <button id="p-edit-btn" class="bg-gray-100 px-6 py-2 rounded-lg font-bold text-[10px] uppercase">Edit Studio</button>
                    <button id="p-follow-btn" class="bg-black text-white px-8 py-2 rounded-lg font-bold text-[10px] uppercase shadow-lg hide">Follow 🚩</button>
                </div>
                <p id="p-bio" class="text-xs mt-4 text-gray-600 leading-relaxed italic"></p>
                <div class="flex gap-8 mt-6 border-y py-4 justify-center">
                    <div class="text-center"><b class="block text-lg">12</b><span class="text-[9px] text-gray-400 font-bold uppercase">Posts</span></div>
                    <div class="text-center"><b class="block text-lg">2.4k</b><span class="text-[9px] text-gray-400 font-bold uppercase">Followers</span></div>
                    <div class="text-center"><b class="block text-lg">150</b><span class="text-[9px] text-gray-400 font-bold uppercase">Products</span></div>
                </div>
            </div>

            <div class="flex border-b bg-gray-50/50">
                <div class="flex-1 p-3 text-center border-b-2 border-orange-600 text-orange-600" onclick="document.getElementById('profile-grid').classList.remove('hide'); document.getElementById('shop-grid').classList.add('hide')">
                    <i class="fa-solid fa-table-cells"></i>
                </div>
                <div class="flex-1 p-3 text-center" onclick="document.getElementById('profile-grid').classList.add('hide'); document.getElementById('shop-grid').classList.remove('hide')">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </div>
            <div id="profile-grid" class="grid grid-cols-3 gap-0.5 p-0.5"></div>
            <div id="shop-grid" class="grid grid-cols-2 gap-3 p-4 hide"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t flex justify-around py-4 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <i class="fa-solid fa-house nav-icon" onclick="goTab('feed')"></i>
            <i class="fa-solid fa-magnifying-glass nav-icon"></i>
            <i class="fa-solid fa-play nav-icon"></i>
            <i class="fa-solid fa-crown nav-icon text-orange-600" onclick="goTab('profile')"></i>
        </nav>
    </div>

    <div id="auth-screen" class="w-full max-w-[450px] min-h-screen p-10 flex flex-col justify-center text-center hide">
        <h1 class="text-5xl font-black raj-title mb-2 italic">SAINIWALAA</h1>
        <p class="text-[9px] font-bold text-gray-400 tracking-[5px] uppercase mb-12">Royal Studio & Bazaar</p>
        
        <div id="login-box">
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Password">
            <button onclick="signInWithEmailAndPassword(getAuth(), document.getElementById('log-email').value, document.getElementById('log-pass').value)" class="royal-btn">Enter Studio 🚩</button>
            <p class="mt-8 text-xs text-gray-400 cursor-pointer" onclick="document.getElementById('login-box').classList.add('hide'); document.getElementById('reg-box').classList.remove('hide')">New here? <b>Register</b></p>
        </div>

        <div id="reg-box" class="hide">
            <input type="text" id="reg-id" placeholder="Unique Studio ID">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="registerUser()" class="royal-btn">Join Kingdom 🚩</button>
            <p class="mt-8 text-xs text-gray-400 cursor-pointer" onclick="document.getElementById('reg-box').classList.add('hide'); document.getElementById('login-box').classList.remove('hide')">Back to <b>Login</b></p>
        </div>
    </div>

</body>
</html>
