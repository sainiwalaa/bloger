<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Luxury Creator Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        .saini-header {
            background: linear-gradient(to right, #b8860b, #d4af37, #fff, #d4af37, #b8860b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .banner-box { height: 280px; position: relative; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; overflow: hidden; }
        .profile-side { position: absolute; bottom: -40px; left: 30px; display: flex; align-items: flex-end; gap: 20px; z-index: 50; }
        .p-img-main { width: 140px; height: 140px; border-radius: 30px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); object-fit: cover; background: #fff; }
        
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold) !important; font-weight: 800; }
        .hidden { display: none !important; }
        .product-card { transition: 0.3s; border: 1px solid #eee; border-radius: 24px; background: #fff; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Business Inquiry Highlighting */
        .inquiry-card {
            background: linear-gradient(135deg, #ff416c, #ff4b2b) !important;
            color: white !important;
            border: none !important;
            animation: pulse-border 2s infinite;
        }
        .inquiry-card p, .inquiry-card span, .inquiry-card h4 { color: white !important; }
        
        @keyframes pulse-border {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <h1 class="raj-font text-4xl animate-bounce text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <section id="auth-box" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-md bg-white p-10 rounded-[40px] shadow-2xl border border-gray-100">
            <h2 class="raj-font text-5xl text-center text-[#d4af37] mb-2">S</h2>
            <p class="text-center text-[10px] tracking-[0.3em] text-gray-400 mb-10">THE ROYAL MARKETPLACE</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition">GET ACCESS</button>
        </div>
    </section>

    <main id="app" class="hidden">
        <header class="bg-white py-6 text-center border-b sticky top-0 z-[100] backdrop-blur-md bg-white/90">
            <h1 class="raj-font text-3xl saini-header font-black tracking-widest">SAINIWALAA</h1>
            <div class="flex justify-center gap-8 mt-4 text-[11px] font-bold uppercase tracking-tighter text-gray-400">
                <button onclick="nav('feed')" id="n-feed" class="pb-1 transition">Trending</button>
                <button onclick="nav('shop')" id="n-shop" class="pb-1 transition">My Studio</button>
                <button onclick="nav('orders')" id="n-orders" class="pb-1 transition">Orders</button>
                <button onclick="logout()" class="text-red-400"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <section id="sec-shop" class="hidden">
            <div class="banner-box">
                <img id="b-img" src="https://images.unsplash.com/photo-1557683316-973673baf926?w=1000" class="w-full h-full object-cover">
                <div class="profile-side">
                    <div class="relative group">
                        <img id="p-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" class="p-img-main">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/40 text-white rounded-[30px] opacity-0 group-hover:opacity-100 cursor-pointer transition owner-only">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" class="hidden" onchange="upMedia('profile', this)">
                        </label>
                    </div>
                    <div class="mb-8">
                        <h2 id="u-name" class="raj-font text-2xl font-bold text-white drop-shadow-md">Creator Name</h2>
                        <div class="flex gap-2 mt-2">
                            <button onclick="document.getElementById('edit-modal').classList.remove('hidden')" class="bg-black/50 backdrop-blur-md text-white px-6 py-2 rounded-full text-[10px] font-bold owner-only">EDIT PROFILE</button>
                        </div>
                    </div>
                </div>
                <label class="absolute top-4 right-4 bg-white/20 p-3 rounded-full text-white cursor-pointer owner-only">
                    <i class="fa-solid fa-panorama"></i>
                    <input type="file" class="hidden" onchange="upMedia('banner', this)">
                </label>
            </div>

            <div class="mt-16 px-6 max-w-4xl mx-auto">
                <div id="u-bio" class="text-center p-6 bg-white rounded-[30px] border shadow-sm italic text-gray-500">Mhara Swagat hai!</div>
                
                <div class="mt-10 owner-only">
                    <div class="bg-white p-8 rounded-[40px] border-2 border-dashed border-gray-200 hover:border-gold transition">
                        <h3 class="raj-font text-lg mb-6">List New Creation</h3>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input id="pn" placeholder="Item Name" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                            <input id="pp" placeholder="Price (₹)" type="number" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                            <input id="pc" placeholder="Category" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                            <input id="pl" placeholder="External Web Link" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                        </div>
                        <textarea id="pd" placeholder="Tell the story of this product..." class="w-full p-4 bg-gray-50 rounded-2xl h-24 mb-4 outline-none border"></textarea>
                        <div class="flex items-center gap-4">
                            <input type="file" id="pf" onchange="preProd(this)" class="hidden">
                            <label for="pf" id="pf-label" class="flex-1 bg-gray-100 p-4 rounded-2xl text-center cursor-pointer font-bold text-gray-400 border hover:bg-gray-200">CHOOSE PHOTO</label>
                            <button onclick="pubProd()" id="pub-btn" class="hidden flex-1 bg-black text-white p-4 rounded-2xl font-bold">PUBLISH</button>
                        </div>
                    </div>
                </div>
                <div id="grid-shop" class="grid grid-cols-2 gap-4 mt-10 mb-20"></div>
            </div>
        </section>

        <section id="sec-feed" class="hidden px-6 pt-6">
            <div class="mb-8 relative">
                <input type="text" oninput="search(this.value)" placeholder="Search Elite Products..." class="w-full p-5 pl-12 bg-white rounded-3xl border-none shadow-md outline-none focus:ring-2 ring-gold/20">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-6 text-gray-300"></i>
            </div>
            <div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-orders" class="hidden p-6">
            <h2 class="raj-font text-3xl mb-2">Sales History</h2>
            <p class="text-[10px] text-gray-400 mb-8 uppercase tracking-widest">Personal Order Tracking & Inquiries</p>
            <div id="list-orders" class="space-y-4"></div>
        </section>
    </main>

    <div id="order-modal" class="hidden fixed inset-0 z-[1100] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[50px] p-10 text-center">
            <h3 class="raj-font text-2xl mb-2">Finalize Order</h3>
            <p class="text-[10px] text-gray-400 font-bold mb-8 tracking-widest uppercase">Creator direct connection</p>
            <input id="on" placeholder="Your Full Name" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <input id="op" placeholder="10-Digit Mobile" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <input id="oc" placeholder="Your City" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl outline-none border">
            
            <div class="bg-gray-50 p-5 rounded-[30px] border mb-8 text-left">
                <p class="text-[12px] font-extrabold leading-tight mb-3">क्या आप Business Collab करना चाहते हैं?</p>
                <div class="flex gap-6">
                    <label class="flex items-center gap-2 text-sm font-bold cursor-pointer">
                        <input type="radio" name="biz" value="YES" class="w-4 h-4 accent-red-500"> YES
                    </label>
                    <label class="flex items-center gap-2 text-sm font-bold cursor-pointer">
                        <input type="radio" name="biz" value="NO" checked class="w-4 h-4 accent-black"> NO
                    </label>
                </div>
            </div>
            <button id="buy-btn" onclick="confirmPurchase()" class="w-full bg-black text-white py-5 rounded-3xl font-black shadow-xl active:scale-95 transition">PLACE ORDER</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-4 text-gray-400 text-[10px] font-bold">CANCEL</button>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 z-[1200] bg-black/80 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8">
            <h3 class="raj-font text-xl mb-6">Edit Identity</h3>
            <input id="en" placeholder="Full Name" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <input id="eb" placeholder="Bio Story" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl outline-none border">
            <div class="flex items-center gap-4 mb-6">
                <input type="color" id="ec" class="h-12 w-12 border-none">
                <input type="number" id="es" placeholder="Font Size" class="flex-1 p-4 bg-gray-50 rounded-2xl outline-none border">
            </div>
            <button onclick="saveProfile()" class="w-full bg-gold text-white py-4 rounded-2xl font-bold mb-2">UPDATE</button>
            <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full text-gray-400 text-xs font-bold py-2">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, query, where, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let viewUid = null; let allProds = [];

        onAuthStateChanged(auth, u => {
            document.getElementById('loading').classList.add('hidden');
            if(u) { curU = u; document.getElementById('app').classList.remove('hidden'); document.getElementById('auth-box').classList.add('hidden'); initApp(); }
            else { document.getElementById('auth-box').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
        });

        function initApp() {
            nav('feed');
            onSnapshot(collection(db, "products"), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed');
            });

            // FIXED: Fetching orders without server-side orderBy to avoid Database Error
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                const list = document.getElementById('list-orders');
                list.innerHTML = "";
                // Client-side sorting for stability
                const sorted = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));

                sorted.forEach(o => {
                    const isBiz = o.businessInquiry === "YES";
                    list.innerHTML += `
                        <div class="p-6 rounded-[30px] border shadow-sm flex flex-col gap-4 ${isBiz ? 'inquiry-card' : 'bg-white'}">
                            <div class="flex justify-between items-start">
                                <div><h4 class="font-extrabold text-lg leading-tight">${o.item}</h4><p class="text-[10px] opacity-70 uppercase font-bold">Buyer: ${o.customer}</p></div>
                                <span class="font-black text-xl">₹${o.price}</span>
                            </div>
                            <div class="flex flex-wrap gap-3 text-[11px] font-bold">
                                <span class="px-3 py-1 bg-black/10 rounded-full">📞 ${o.phone}</span>
                                <span class="px-3 py-1 bg-black/10 rounded-full">📍 ${o.city}</span>
                            </div>
                            ${isBiz ? '<div class="mt-2 p-3 bg-white/20 rounded-2xl border border-white/30 text-center font-black text-[10px] uppercase">🔥 Business Collab Required</div>' : ''}
                        </div>`;
                });
            });
        }

        window.confirmPurchase = async () => {
            const n = document.getElementById('on').value.trim(), p = document.getElementById('op').value.trim(), c = document.getElementById('oc').value.trim();
            const biz = document.querySelector('input[name="biz"]:checked').value;
            if(!n || !p || !c) return alert("Details bhariye!");
            
            document.getElementById('buy-btn').innerText = "PROCESSING...";
            try {
                await addDoc(collection(db, "orders"), {
                    item: window.activeOrder.name, price: window.activeOrder.price,
                    customer: n, phone: p, city: c, businessInquiry: biz,
                    creatorId: window.activeOrder.creatorId, time: serverTimestamp()
                });
                alert("Order Saved!");
                window.open(window.activeOrder.link, '_blank');
                document.getElementById('order-modal').classList.add('hidden');
            } catch(e) { alert("Database Error!"); }
            document.getElementById('buy-btn').innerText = "PLACE ORDER";
        };

        window.viewProfile = async (uid) => {
            viewUid = uid; const isMe = (uid === curU.uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('u-name').innerText = d.name || "Creator";
                document.getElementById('u-bio').innerText = d.bio || "Welcome!";
                document.getElementById('p-img').src = d.profile || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                renderGrid(s.docs.map(d => ({id:d.id, ...d.data()})), 'grid-shop', isMe);
            });
        };

        window.renderGrid = (data, cid, mine = false) => {
            const g = document.getElementById(cid); g.innerHTML = "";
            data.forEach(p => {
                g.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="w-full aspect-square object-cover" onclick="viewProfile('${p.creatorId}')">
                        <div class="p-4">
                            <h4 class="font-bold text-sm truncate">${p.name}</h4>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="font-black">₹${p.price}</span>
                                <button onclick="orderForm('${p.id}')" class="bg-black text-white text-[9px] px-4 py-2 rounded-xl font-bold">GET IT</button>
                            </div>
                        </div>
                    </div>`;
            });
        };

        window.nav = (t) => {
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('n-'+s).classList.toggle('nav-active', s === t);
            });
            if(t === 'shop' && !viewUid) viewProfile(curU.uid);
        };

        window.pubProd = async () => {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('pn').value, price: document.getElementById('pp').value,
                link: document.getElementById('pl').value, img: window.tempP,
                creatorId: curU.uid, time: serverTimestamp()
            });
            location.reload();
        };

        window.preProd = (i) => {
            const r = new FileReader();
            r.onload = e => { window.tempP = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); document.getElementById('pf-label').innerText = "READY!"; };
            r.readAsDataURL(i.files[0]);
        };

        window.orderForm = (pid) => { window.activeOrder = allProds.find(i => i.id === pid); document.getElementById('order-modal').classList.remove('hidden'); };
        window.saveProfile = async () => {
            await setDoc(doc(db, "users", curU.uid), { name: document.getElementById('en').value, bio: document.getElementById('eb').value }, {merge:true});
            location.reload();
        };
        window.upMedia = (t, i) => {
            const r = new FileReader();
            r.onload = async e => { await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, {merge:true}); location.reload(); };
            r.readAsDataURL(i.files[0]);
        };
        window.authAction = () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(() => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)); };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.search = (v) => renderGrid(allProds.filter(p => p.name.toLowerCase().includes(v.toLowerCase())), 'grid-feed');
    </script>
</body>
</html>
