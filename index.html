<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio & Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUserData = null;

        // --- AUTH TRACKER (Refresh Logic) ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, `users/${user.uid}`));
                currentUserData = snap.val();
                if (currentUserData) {
                    document.getElementById('auth-screen').classList.add('hide');
                    document.getElementById('app-interface').classList.remove('hide');
                    initApp();
                    goPage(localStorage.getItem('active_tab') || 'feed');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app-interface').classList.add('hide');
            }
        });

        // --- REGISTER SYSTEM (Unique ID Check) ---
        window.handleSignUp = async () => {
            const name = document.getElementById('reg-name').value;
            const uname = document.getElementById('reg-id').value.toLowerCase().trim();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(!uname || !email || !pass) return alert("Hukum, saryo detail bharo!");

            // Check if Username exists
            const userRef = ref(db, 'users');
            const q = query(userRef, orderByChild('username'), equalTo(uname));
            const snap = await get(q);
            
            if(snap.exists()) return alert("Maafi! Ye ID pehle se hai, dooji chuno.");

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const userData = {
                    uid: res.user.uid,
                    name: name,
                    username: uname,
                    email: email,
                    photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
                    banner: "https://images.unsplash.com/photo-1579546123315-b06dd26749c0",
                    bio: "Royal SainiWalaa Member 🚩",
                    website: ""
                };
                await set(ref(db, `users/${res.user.uid}`), userData);
                alert("Ghani Khamma! Registration ho gayo.");
            } catch(e) { alert("Error: " + e.message); }
        };

        // --- CORE APP LOGIC ---
        function initApp() {
            // Load Global Feed
            onValue(ref(db, 'posts'), (s) => {
                const container = document.getElementById('feed-list');
                container.innerHTML = "";
                if(s.exists()){
                    Object.entries(s.val()).reverse().forEach(([pid, post]) => {
                        container.innerHTML += `
                            <div class="post-card bg-white mb-4 border-b pb-4">
                                <div class="p-3 flex items-center gap-3 cursor-pointer" onclick="viewStudio('${post.uid}')">
                                    <img src="${post.uPhoto}" class="w-10 h-10 border-2 border-orange-600 shadow-sm">
                                    <div><b class="text-sm raj-title">${post.uName}</b><p class="text-[10px] text-gray-400 font-bold">@${post.uHandle}</p></div>
                                </div>
                                <img src="${post.url}" class="w-full object-cover max-h-[400px] bg-gray-50">
                                <div class="p-4">
                                    <div class="flex gap-5 text-2xl mb-2">
                                        <i class="fa-regular fa-heart hover:text-red-500 transition cursor-pointer"></i>
                                        <i class="fa-regular fa-comment cursor-pointer"></i>
                                        <i class="fa-regular fa-paper-plane cursor-pointer"></i>
                                    </div>
                                    <p class="text-xs"><b>${post.uHandle}</b> ${post.caption}</p>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        window.viewStudio = async (uid) => {
            goPage('profile');
            const snap = await get(ref(db, `users/${uid}`));
            const d = snap.val();
            document.getElementById('prof-name').innerText = d.name;
            document.getElementById('prof-id').innerText = `@${d.username}`;
            document.getElementById('prof-bio').innerText = d.bio;
            document.getElementById('prof-img').src = d.photo;
            document.getElementById('prof-banner').src = d.banner;
            
            const isMe = uid === auth.currentUser.uid;
            document.getElementById('my-actions').style.display = isMe ? 'flex' : 'none';
            document.getElementById('visit-actions').style.display = isMe ? 'none' : 'flex';

            // Load Shop & Posts for this user
            loadStudioContent(uid);
        };

        function loadStudioContent(uid) {
            const postGrid = document.getElementById('prof-posts');
            const shopGrid = document.getElementById('prof-shop');
            postGrid.innerHTML = ""; shopGrid.innerHTML = "";

            onValue(ref(db, 'posts'), s => {
                if(s.exists()) Object.values(s.val()).forEach(p => {
                    if(p.uid === uid) postGrid.innerHTML += `<img src="${p.url}" class="w-full aspect-square object-cover border">`;
                });
            });

            onValue(ref(db, 'products'), s => {
                if(s.exists()) Object.values(s.val()).forEach(p => {
                    if(p.ownerUid === uid) shopGrid.innerHTML += `
                        <div class="bg-white border p-2 shadow-sm">
                            <img src="${p.url}" class="w-full h-32 object-cover mb-2">
                            <b class="text-[11px] block truncate uppercase">${p.name}</b>
                            <p class="text-orange-600 font-bold">₹${p.price}</p>
                            <button onclick="handleOrder('${p.name}')" class="w-full bg-black text-white text-[9px] py-2 mt-2 font-bold uppercase">Buy Now</button>
                        </div>`;
                });
            });
        }

        window.handleOrder = (prodName) => {
            const cust = prompt("Apno Naam aur Pata (Address) likho:");
            if(cust) {
                alert("Hukum, Tharo order bhej diyo! WhatsApp khul ryo hai.");
                window.open(`https://wa.me/91XXXXXXXXXX?text=New Order: ${prodName}\nDetails: ${cust}`);
            }
        };

        window.goPage = (id) => {
            localStorage.setItem('active_tab', id);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById(`page-${id}`).classList.remove('hide');
            // Active nav color logic here if needed
        };

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fafafa; color: #1a1a1a; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .btn-royal { background: #000; color: #fff; padding: 14px; font-weight: 900; border-radius: 4px; text-transform: uppercase; width: 100%; border: none; cursor: pointer; }
        input { border: 2px solid #f1f1f1; padding: 12px; margin-bottom: 12px; width: 100%; border-radius: 4px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ea580c; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 15px; z-index: 1000; }
        .nav-item { font-size: 1.4rem; color: #ccc; cursor: pointer; transition: 0.3s; }
        .nav-item:hover { color: #ea580c; }
        .studio-tab { flex: 1; text-align: center; padding: 10px; font-size: 12px; font-weight: 900; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-active { border-bottom-color: #ea580c; color: #ea580c; }
    </style>
</head>
<body class="flex justify-center">

    <div id="auth-screen" class="w-full max-w-[480px] min-h-screen bg-white p-10 flex flex-col justify-center hide">
        <h1 class="text-5xl font-black raj-title text-center mb-2 italic">SAINIWALAA</h1>
        <p class="text-[10px] text-center font-bold text-gray-300 tracking-[4px] mb-12 uppercase">Royal Social Bazaar</p>
        
        <div id="login-form">
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Password">
            <button onclick="signInWithEmailAndPassword(getAuth(), document.getElementById('log-email').value, document.getElementById('log-pass').value)" class="btn-royal">ENTER STUDIO 🚩</button>
            <p class="mt-6 text-center text-xs text-gray-400 cursor-pointer" onclick="document.getElementById('login-form').classList.add('hide'); document.getElementById('reg-form').classList.remove('hide')">Naya ho? Registration Karo</p>
        </div>

        <div id="reg-form" class="hide">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-id" placeholder="Unique Studio ID (e.g. saini01)">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="handleSignUp()" class="btn-royal">JOIN NOW 🚩</button>
            <p class="mt-6 text-center text-xs text-gray-400 cursor-pointer" onclick="document.getElementById('reg-form').classList.add('hide'); document.getElementById('login-form').classList.remove('hide')">Pehle se ho? Login Karo</p>
        </div>
    </div>

    <div id="app-interface" class="w-full max-w-[480px] min-h-screen bg-white relative pb-20 shadow-2xl hide">
        
        <header class="sticky top-0 bg-white/95 border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic cursor-pointer" onclick="goPage('feed')">SAINIWALAA</h1>
            <div class="flex gap-4">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <i class="fa-solid fa-circle-plus text-orange-600 text-2xl" onclick="alert('Post tool loading...')"></i>
            </div>
        </header>

        <main id="page-feed">
            <div id="feed-list"></div>
        </main>

        <main id="page-profile" class="hide">
            <div class="h-44 bg-gray-100 relative">
                <img id="prof-banner" class="w-full h-full object-cover">
                <img id="prof-img" class="w-24 h-24 absolute -bottom-10 left-6 border-4 border-white shadow-xl bg-white object-cover">
            </div>

            <div class="mt-12 p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="prof-name" class="text-2xl font-black raj-title"></h2>
                        <p id="prof-id" class="text-xs font-bold text-gray-400"></p>
                    </div>
                    <div id="my-actions" class="flex gap-2">
                        <button onclick="alert('Edit logic loading...')" class="bg-gray-100 px-4 py-2 text-[10px] font-bold">EDIT</button>
                        <button onclick="signOut(getAuth())" class="bg-red-50 text-red-600 px-4 py-2 text-[10px] font-bold uppercase">Logout</button>
                    </div>
                    <div id="visit-actions" class="hide">
                        <button class="bg-black text-white px-8 py-2 text-[10px] font-bold uppercase shadow-lg">Follow 🚩</button>
                    </div>
                </div>
                <p id="prof-bio" class="text-xs mt-4 text-gray-600 leading-relaxed"></p>
                <div class="mt-6 border-2 border-black p-4 text-center text-xs font-black hover:bg-black hover:text-white transition cursor-pointer uppercase tracking-widest">Visit Website</div>
            </div>

            <div class="flex border-t border-b sticky top-[65px] bg-white z-40">
                <div class="studio-tab tab-active" id="tab-p" onclick="document.getElementById('prof-posts').classList.remove('hide'); document.getElementById('prof-shop').classList.add('hide'); this.classList.add('tab-active'); document.getElementById('tab-s').classList.remove('tab-active')">SOCIAL POSTS</div>
                <div class="studio-tab" id="tab-s" onclick="document.getElementById('prof-posts').classList.add('hide'); document.getElementById('prof-shop').classList.remove('hide'); this.classList.add('tab-active'); document.getElementById('tab-p').classList.remove('tab-active')">ROYAL BAZAAR</div>
            </div>

            <div id="prof-posts" class="grid grid-cols-3 gap-1 p-1"></div>
            <div id="prof-shop" class="grid grid-cols-2 gap-3 p-4 hide"></div>
        </main>

        <nav class="nav-bar">
            <i class="fa-solid fa-house nav-item" onclick="goPage('feed')"></i>
            <i class="fa-solid fa-bag-shopping nav-item" onclick="goPage('shop-global')"></i>
            <i class="fa-solid fa-crown nav-item" onclick="viewStudio(getAuth().currentUser.uid)"></i>
        </nav>
    </div>

</body>
</html>
