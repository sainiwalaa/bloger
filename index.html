<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAINIWALAA | Luxury Creator Economy</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--gold:#d4af37;
--dark:#111;
}

body{
background:#f8f9fa;
font-family:'Plus Jakarta Sans',sans-serif;
}

.raj-font{
font-family:'Cinzel',serif;
}

/* HEADER */

.saini-header-container{
position:sticky;
top:0;
z-index:100;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(212,175,55,0.2);
}

.saini-header{
background:linear-gradient(to right,#b8860b,#d4af37,#b8860b);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}

@keyframes shine{
to{background-position:200% center;}
}

.nav-active{
border-bottom:3px solid var(--gold);
color:var(--gold)!important;
font-weight:800;
}

.hidden{
display:none!important;
}

/* PRODUCT CARD */

.product-card{
transition:.3s;
border:1px solid #eee;
border-radius:20px;
background:#fff;
overflow:hidden;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,.1);
}

/* SOCIAL BUTTON */

.social-btn{
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.2);
border-radius:50%;
color:white;
font-size:14px;
transition:.3s;
}

.social-btn:hover{
background:var(--gold);
transform:translateY(-3px);
}

</style>
</head>

<body class="pb-20">


<!-- LOADING -->

<div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-[9999]">
<h1 class="raj-font text-4xl text-[#d4af37] animate-bounce">
SAINIWALAA
</h1>
</div>


<!-- LOGIN -->

<section id="auth-box" class="min-h-screen flex items-center justify-center hidden">

<div class="bg-white p-10 rounded-[40px] shadow-xl w-full max-w-md text-center">

<h2 class="raj-font text-5xl text-[#d4af37] mb-4">S</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-4 mb-4 border rounded-2xl">

<input id="pass" type="password" placeholder="Password"
class="w-full p-4 mb-6 border rounded-2xl">

<button onclick="authAction()"
class="w-full bg-black text-white p-4 rounded-2xl font-bold">
LOGIN
</button>

</div>

</section>



<!-- APP -->

<main id="app" class="hidden">


<!-- HEADER -->

<header class="saini-header-container py-6 text-center">

<h1 class="raj-font text-4xl saini-header font-black tracking-widest">
SAINIWALAA
</h1>

<div class="flex justify-center gap-8 mt-6 text-[11px] font-bold uppercase text-gray-400">

<button onclick="nav('feed')" id="n-feed">Trending</button>

<button onclick="viewProfile(curU.uid)" id="n-shop">My Studio</button>

<button onclick="nav('orders')" id="n-orders">Orders</button>

<button onclick="logout()" class="text-red-400">
<i class="fa-solid fa-power-off"></i>
</button>

</div>

</header>



<!-- FEED -->

<section id="sec-feed" class="px-6 pt-6 hidden">

<div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>

</section>



<!-- SHOP -->

<section id="sec-shop" class="hidden px-6 pt-10">

<h2 class="raj-font text-3xl mb-6">Creator Studio</h2>

<div id="grid-shop" class="grid grid-cols-2 gap-6"></div>

</section>



<!-- ORDERS -->

<section id="sec-orders" class="hidden p-6">

<h2 class="raj-font text-3xl mb-4">Recent Orders</h2>

<div id="list-orders" class="grid gap-4 md:grid-cols-2"></div>

</section>


</main>



<!-- FOOTER -->

<footer class="bg-black text-white pt-12 pb-6 mt-20">

<div class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-10">

<div>
<h2 class="raj-font text-2xl text-[#d4af37]">SAINIWALAA</h2>

<p class="text-gray-400 text-sm mt-3">
India's Premium Creator Marketplace where influencers showcase and sell their creations.
</p>
</div>

<div>
<h3 class="font-bold mb-3 text-[#d4af37]">Quick Links</h3>

<ul class="text-gray-400 text-sm space-y-2">

<li><a href="#" onclick="nav('feed')" class="hover:text-white">Trending</a></li>

<li><a href="#" onclick="viewProfile(curU.uid)" class="hover:text-white">My Studio</a></li>

<li><a href="#" onclick="nav('orders')" class="hover:text-white">Orders</a></li>

</ul>

</div>

<div>

<h3 class="font-bold mb-3 text-[#d4af37]">Follow Us</h3>

<div class="flex gap-4 mt-4">

<a href="#" class="social-btn">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="#" class="social-btn">
<i class="fa-brands fa-youtube"></i>
</a>

<a href="#" class="social-btn">
<i class="fa-brands fa-facebook"></i>
</a>

<a href="#" class="social-btn">
<i class="fa-brands fa-whatsapp"></i>
</a>

</div>

</div>

</div>

<div class="text-center text-gray-500 text-xs mt-10 border-t border-gray-800 pt-4">

© 2026 SAINIWALAA • Luxury Creator Economy Platform

</div>

</footer>



<!-- FIREBASE SCRIPT -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import { getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
authDomain:"social-blog-93d38.firebaseapp.com",
projectId:"social-blog-93d38",
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

window.authAction=()=>{
signInWithEmailAndPassword(auth,email.value,pass.value)
.catch(()=>createUserWithEmailAndPassword(auth,email.value,pass.value));
}

window.logout=()=>{
signOut(auth);
location.reload();
}

window.nav=(t)=>{
['feed','shop','orders'].forEach(s=>{
document.getElementById('sec-'+s).classList.toggle('hidden',s!==t);
});
}

</script>

</body>
</html>
