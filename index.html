<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <script type="module">
        // FIREBASE LIBRARIES (Kaam karne wala engine)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 1. CLOUDINARY UPLOAD SYSTEM (Widget) ---
        window.openUploadWidget = (targetType) => {
            cloudinary.openUploadWidget({
                cloudName: "dvp58lgh3", 
                uploadPreset: "ml_default",
                sources: ['local', 'camera']
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    if(targetType === 'post') savePost(url);
                    if(targetType === 'product') document.getElementById('prod-img-url').value = url;
                    alert("Chitra chadh gayo hukum! 🚩");
                }
            });
        };

        // --- 2. POST SYSTEM (Darbar) ---
        window.savePost = (imageUrl) => {
            const msg = prompt("Kuch likho hukum:");
            push(ref(db, 'posts'), {
                url: imageUrl,
                caption: msg || "",
                user: "sunil saini",
                time: serverTimestamp()
            });
        };

        onValue(ref(db, 'posts'), (snap) => {
            const container = document.getElementById('darbar-content');
            container.innerHTML = "";
            snap.forEach(c => {
                const p = c.val();
                container.innerHTML += `
                    <div class="bg-zinc-900/40 p-3 border border-zinc-800 rounded-2xl mb-4">
                        <img src="${p.url}" class="w-full rounded-xl mb-3">
                        <p class="text-sm px-1">${p.caption}</p>
                    </div>`;
            });
        });

        // --- 3. BAZAAR SYSTEM (Dukaan) ---
        window.saveProduct = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('prod-img-url').value;
            if(name && price && img) {
                push(ref(db, 'products'), { name, price, img, time: serverTimestamp() });
                alert("Maal Bazaar mein rakha gaya!");
                document.getElementById('bazaar-form').classList.add('hidden');
            }
        };

        onValue(ref(db, 'products'), (snap) => {
            const list = document.getElementById('bazaar-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `
                    <div class="bg-zinc-900 border border-yellow-900/20 rounded-2xl p-3">
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-2">
                        <h3 class="gold-text font-bold text-xs">${p.name}</h3>
                        <p class="text-[10px] mb-3">₹ ${p.price}</p>
                        <button class="w-full bg-orange-700 text-white py-2 rounded-lg text-[10px]">KHARIDO</button>
                    </div>`;
            });
        });

        window.switchTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(tab + '-page').classList.remove('hidden');
        };
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .gold-text { color: #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900">

    <header class="p-5 text-center border-b border-zinc-900 sticky top-0 bg-black z-50">
        <h1 class="gold-text tracking-[6px] font-bold">SAINIWALAA</h1>
    </header>

    <div id="aap-page" class="page p-4">
        <div class="flex items-center gap-6 py-6">
            <div class="w-20 h-20 rounded-full bg-yellow-600 flex items-center justify-center text-black text-2xl font-bold border-4 border-black ring-2 ring-yellow-600">SS</div>
            <div>
                <h2 class="text-xl font-bold">sunil saini</h2>
                <p class="text-xs text-zinc-500">Royal Studio - GHANI KHAMMA!</p>
            </div>
        </div>
        
        <div class="flex border-y border-zinc-900 my-4">
            <button onclick="switchTab('darbar')" class="flex-1 py-4 text-[10px] gold-text">Darbar</button>
            <button onclick="switchTab('bazaar')" class="flex-1 py-4 text-[10px] text-zinc-500">Dukaan</button>
        </div>
    </div>

    <div id="darbar-page" class="page hidden p-4">
        <button onclick="openUploadWidget('post')" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-6 text-sm text-zinc-500 text-left">
            + Naya Post Daalo Hukum...
        </button>
        <div id="darbar-content"></div>
    </div>

    <div id="bazaar-page" class="page hidden p-4">
        <button onclick="document.getElementById('bazaar-form').classList.remove('hidden')" class="w-full bg-orange-700 py-3 rounded-xl text-xs font-bold mb-6">
            + BAZAAR ME RAKHO 🚩
        </button>
        
        <div id="bazaar-form" class="bg-zinc-900 p-4 rounded-2xl mb-6 hidden">
            <input id="p-name" type="text" placeholder="Maal ko Naam" class="w-full bg-black p-3 rounded mb-2 text-sm">
            <input id="p-price" type="number" placeholder="Keemat (₹)" class="w-full bg-black p-3 rounded mb-2 text-sm">
            <input type="hidden" id="prod-img-url">
            <button onclick="openUploadWidget('product')" class="w-full border border-zinc-700 py-2 rounded mb-2 text-xs">PHOTO CHUNO</button>
            <button onclick="saveProduct()" class="w-full bg-yellow-600 text-black py-2 rounded font-bold">SAVE KARO</button>
        </div>

        <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <nav class="fixed bottom-0 w-full max-w-[500px] bg-black border-t border-zinc-900 flex justify-around py-4">
        <button onclick="switchTab('darbar')" class="text-zinc-500"><i class="fa-solid fa-house"></i></button>
        <button onclick="switchTab('bazaar')" class="text-zinc-500"><i class="fa-solid fa-shop"></i></button>
        <button onclick="switchTab('aap')" class="text-yellow-500"><i class="fa-solid fa-circle-user"></i></button>
    </nav>

</body>
</html>
