<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainiwalaa - Royal Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; }
        .royal-font { font-family: 'Cinzel', serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F9E27D 50%, #B8860B 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-border { border: 1px solid var(--gold); }
        .gold-bg { background: linear-gradient(135deg, #D4AF37, #B8860B); color: black; }
        .nav-active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2); }
        .card { transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        input, select, textarea { background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(212,175,55,0.3) !important; color: white !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loading" class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <div class="text-center">
            <h1 class="royal-font text-4xl gold-gradient animate-pulse">SAINIWALAA</h1>
            <p class="text-gray-400 mt-2 text-sm">Loading Darbar...</p>
        </div>
    </div>

    <div id="auth-box" class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-2xl w-full max-w-md text-center">
            <h2 class="royal-font text-2xl gold-gradient mb-6">Darbar Mein Pravesh Karein</h2>
            <div id="firebaseui-auth-container"></div>
            <button onclick="closeAuth()" class="mt-4 text-gray-400 text-sm underline">Wapas Mudhein</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="p-4 border-b border-white/10 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-40">
            <h1 class="royal-font text-2xl gold-gradient font-bold">SAINIWALAA</h1>
            <div id="user-pills" class="flex gap-3">
                </div>
        </header>

        <main class="max-w-4xl mx-auto p-4">
            
            <section id="sec-feed">
                <h2 class="royal-font text-xl mb-4 border-l-4 border-[#D4AF37] pl-3">Trending Bazaar</h2>
                <div id="grid-feed" class="grid grid-cols-2 gap-4"></div>
            </section>

            <section id="sec-shop" class="hidden">
                <div id="profile-header" class="relative rounded-2xl overflow-hidden mb-6 h-48 gold-border">
                    <img id="u-banner" src="https://images.unsplash.com/photo-1557683316-973673baf926" class="w-full h-full object-cover opacity-50">
                    <div class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center">
                        <img id="p-img" class="w-20 h-20 rounded-full border-2 border-[#D4AF37] mb-2 bg-black">
                        <h2 id="u-name" class="royal-font text-2xl font-bold"></h2>
                        <p id="u-bio" class="text-xs text-gray-300"></p>
                    </div>
                </div>

                <div id="add-prod-box" class="hidden glass p-4 rounded-xl mb-6">
                    <h3 class="text-sm font-bold mb-3 gold-gradient">Naya Product Jodein</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="p-title" placeholder="Naam" class="p-2 rounded text-sm">
                        <input type="number" id="p-price" placeholder="Price (₹)" class="p-2 rounded text-sm">
                        <input type="text" id="p-img-url" placeholder="Image URL" class="p-2 rounded text-sm col-span-2">
                        <button onclick="addProduct()" class="col-span-2 gold-bg py-2 rounded font-bold">Aapna Product List Karein</button>
                    </div>
                </div>

                <div id="grid-shop" class="grid grid-cols-2 gap-4"></div>
            </section>

            <section id="sec-orders" class="hidden">
                <h2 class="royal-font text-xl mb-4 border-l-4 border-[#D4AF37] pl-3">Aapke Orders</h2>
                <div id="list-orders" class="flex flex-col gap-3"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-4 flex justify-around items-center z-50">
            <button id="n-feed" onclick="nav('feed')" class="flex flex-col items-center nav-active">
                <span class="text-xs">Bazaar</span>
            </button>
            <button id="n-shop" onclick="nav('shop')" class="flex flex-col items-center text-gray-400">
                <span class="text-xs">My Studio</span>
            </button>
            <button id="n-orders" onclick="nav('orders')" class="flex flex-col items-center text-gray-400">
                <span class="text-xs">Orders</span>
            </button>
        </nav>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4">
        <div class="glass p-6 rounded-2xl w-full max-w-sm">
            <h2 class="royal-font text-xl gold-gradient mb-4">Order Confirm Karein</h2>
            <div id="order-summary" class="mb-4 text-sm text-gray-300"></div>
            <div class="flex flex-col gap-3">
                <input type="text" id="o-name" placeholder="Aapka Naam" class="p-2 rounded">
                <input type="tel" id="o-phone" placeholder="Mobile Number" class="p-2 rounded">
                <input type="text" id="o-city" placeholder="City" class="p-2 rounded">
                
                <div class="mt-2">
                    <label class="text-xs text-gray-400">Influence Sampark (Karna chahte hain?)</label>
                    <select id="o-influence" class="w-full p-2 rounded text-sm mt-1">
                        <option value="No">Nahi</option>
                        <option value="Yes">Haan (Collab ke liye)</option>
                    </select>
                </div>

                <button onclick="submitOrder()" class="gold-bg py-3 rounded-xl font-bold mt-2">Order Final Karein</button>
                <button onclick="closeOrder()" class="text-gray-400 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, getDocs, doc, query, where, onSnapshot, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        const firebaseConfig = {
            // AAPNA CONFIG YAHAN DALEIN
            apiKey: "AIzaSy...",
            authDomain: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let curU = null;
        let selectedProd = null;
        let allProds = [];

        // --- AUTH & INITIALIZATION ---
        onAuthStateChanged(auth, async u => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            if (u) {
                curU = u;
                document.getElementById('auth-box').classList.add('hidden');
                // Profile setup if not exists
                const up = await getDoc(doc(db, "users", u.uid));
                if(!up.exists()) {
                    await setDoc(doc(db, "users", u.uid), { name: u.displayName, profile: u.photoURL, email: u.email, bio: "Sainiwalaa Merchant" });
                }
                initApp();
            } else {
                curU = null;
                loadGuestFeed();
            }
        });

        // --- PUBLIC DATA (GUEST) ---
        function loadGuestFeed() {
            onSnapshot(collection(db, "products"), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed', false);
            });
        }

        // --- NAVIGATION ---
        window.nav = (t) => {
            if(!curU && (t === 'shop' || t === 'orders')) {
                showAuth();
                return;
            }

            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('n-'+s).classList.toggle('nav-active', s === t);
            });

            if(t === 'shop' && curU) viewProfile(curU.uid);
            if(t === 'orders' && curU) loadOrders();
        };

        function showAuth() {
            document.getElementById('auth-box').classList.remove('hidden');
            // FirebaseUI Logic here
            const ui = firebaseui.auth.AuthUI.getInstance() || new firebaseui.auth.AuthUI(auth);
            ui.start('#firebaseui-auth-container', {
                signInOptions: [ {provider: 'google.com'} ],
                callbacks: { signInSuccessWithAuthResult: () => false }
            });
        }
        window.closeAuth = () => document.getElementById('auth-box').classList.add('hidden');

        // --- PROFILE & PRODUCTS ---
        window.viewProfile = async (uid) => {
            const isMe = (curU && uid === curU.uid);
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('u-name').innerText = d.name;
                document.getElementById('u-bio').innerText = d.bio;
                document.getElementById('p-img').src = d.profile;
            }
            
            document.getElementById('add-prod-box').classList.toggle('hidden', !isMe);

            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                renderGrid(s.docs.map(d => ({id:d.id, ...d.data()})), 'grid-shop', isMe);
            });
        };

        window.renderGrid = (data, target, canEdit) => {
            const g = document.getElementById(target);
            g.innerHTML = data.map(p => `
                <div class="card glass rounded-xl overflow-hidden relative">
                    <img src="${p.img}" class="w-full h-40 object-cover">
                    <div class="p-3">
                        <h4 class="text-xs font-bold truncate">${p.title}</h4>
                        <p class="text-gold font-bold text-sm">₹${p.price}</p>
                        <div class="flex gap-2 mt-2">
                            <button onclick="openOrder('${p.id}')" class="flex-1 text-[10px] gold-bg py-1 rounded font-bold">GET IT</button>
                            ${canEdit ? `<button onclick="deleteProd('${p.id}')" class="bg-red-900/50 p-1 rounded">🗑️</button>` : ''}
                        </div>
                    </div>
                    <div onclick="viewProfile('${p.creatorId}')" class="absolute top-2 right-2 bg-black/50 p-1 rounded-full border border-gold/30">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p.creatorId}" class="w-4 h-4 rounded-full">
                    </div>
                </div>
            `).join('');
        };

        // --- PRODUCT ACTIONS ---
        window.addProduct = async () => {
            const t = document.getElementById('p-title').value;
            const p = document.getElementById('p-price').value;
            const i = document.getElementById('p-img-url').value;
            if(!t || !p || !i) return alert("Poori details bharein!");
            
            await addDoc(collection(db, "products"), {
                title: t, price: p, img: i, creatorId: curU.uid, createdAt: Date.now()
            });
            alert("Product Live Ho Gaya!");
        };

        window.deleteProd = async (id) => {
            if(confirm("Hata dein?")) await deleteDoc(doc(db, "products", id));
        };

        // --- ORDER LOGIC ---
        window.openOrder = (id) => {
            selectedProd = allProds.find(x => x.id === id);
            document.getElementById('order-summary').innerText = `Buying: ${selectedProd.title} for ₹${selectedProd.price}`;
            document.getElementById('order-modal').classList.remove('hidden');
        };
        window.closeOrder = () => document.getElementById('order-modal').classList.add('hidden');

        window.submitOrder = async () => {
            const n = document.getElementById('o-name').value;
            const ph = document.getElementById('o-phone').value;
            const ct = document.getElementById('o-city').value;
            const inf = document.getElementById('o-influence').value;

            if(!n || !ph || !ct) return alert("Pata to batao!");

            await addDoc(collection(db, "orders"), {
                prodId: selectedProd.id,
                prodTitle: selectedProd.title,
                price: selectedProd.price,
                customer: { name: n, phone: ph, city: ct, influence: inf },
                creatorId: selectedProd.creatorId,
                status: 'pending',
                date: new Date().toLocaleString()
            });

            alert("Maharaj! Order bhej diya gaya hai.");
            closeOrder();
        };

        // --- LOAD ORDERS (FOR OWNER) ---
        function loadOrders() {
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                const list = document.getElementById('list-orders');
                const data = s.docs.map(d => d.data());
                list.innerHTML = data.map(o => `
                    <div class="glass p-4 rounded-xl border-l-4 ${o.customer.influence === 'Yes' ? 'border-blue-500' : 'border-gold'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-gold">${o.prodTitle}</h4>
                                <p class="text-xs text-gray-400">${o.date}</p>
                            </div>
                            <span class="text-xs bg-gold/20 px-2 py-1 rounded">₹${o.price}</span>
                        </div>
                        <div class="mt-2 text-sm">
                            <p>👤 ${o.customer.name} | 📞 ${o.customer.phone}</p>
                            <p>📍 ${o.customer.city}</p>
                            ${o.customer.influence === 'Yes' ? '<p class="text-blue-400 font-bold mt-1">✨ Wants to talk Influence!</p>' : ''}
                        </div>
                    </div>
                `).join('');
            });
        }

        function initApp() {
            loadGuestFeed(); // Always keep feed fresh
        }

    </script>
    <script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />
</body>
</html>
