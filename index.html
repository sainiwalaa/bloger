<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sainiwalaa Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #fafafa; font-family: 'Inter', sans-serif; }
        .nav-item.active { color: #000; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .post-grid img, .post-grid video { aspect-ratio: 1/1; object-fit: cover; width: 100%; }
        .hide { display: none !important; }
        .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex justify-center">

    <div id="main-app" class="w-full max-w-[450px] min-h-screen bg-white pb-20 shadow-2xl">
        
        <div id="view-home" class="p-4 space-y-6">
            <h1 class="text-2xl font-black italic mb-4">Sainiwalaa Feed</h1>
            <div id="public-feed" class="space-y-8">
                </div>
        </div>

        <div id="view-profile" class="hide">
            <div class="relative h-44 bg-gray-200">
                <img id="u-banner" class="w-full h-full object-cover">
                <img id="u-logo" class="absolute -bottom-6 left-6 w-20 h-20 rounded-2xl border-4 border-white shadow-lg bg-white">
            </div>
            
            <div class="px-6 pt-10">
                <h2 id="u-name" class="text-xl font-black">User Name</h2>
                <p id="u-bio" class="text-sm text-gray-500 mb-4">Digital Creator</p>
                
                <div class="flex border-b mb-4 text-xs font-bold text-gray-400">
                    <button onclick="switchTab('posts')" id="tab-posts" class="flex-1 py-2 active text-black border-b-2 border-black">POSTS</button>
                    <button onclick="switchTab('orders')" id="tab-orders" class="flex-1 py-2">MY SALES</button>
                </div>

                <div id="profile-posts" class="post-grid"></div>

                <div id="profile-sales" class="hide space-y-3 py-4">
                    </div>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t flex justify-around p-3 z-50">
            <button onclick="showPage('home') text-xl"><i class="fa-solid fa-house"></i></button>
            <button onclick="openM('modal-add')" class="text-3xl text-blue-600 -mt-6 bg-white rounded-full p-1"><i class="fa-solid fa-circle-plus"></i></button>
            <button onclick="showPage('profile')" class="text-xl"><i class="fa-solid fa-user"></i></button>
        </nav>
    </div>

    <div id="modal-buy" class="fixed inset-0 glass z-[200] hidden p-8">
        <h2 class="text-xl font-black mb-4">Confirm Order</h2>
        <input id="buy-name" placeholder="Full Name" class="w-full p-4 bg-gray-100 rounded-xl mb-3">
        <input id="buy-address" placeholder="Shipping Address" class="w-full p-4 bg-gray-100 rounded-xl mb-3">
        <input id="buy-phone" placeholder="Mobile Number" class="w-full p-4 bg-gray-100 rounded-xl mb-6">
        <button onclick="confirmPurchase()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold">PLACE ORDER</button>
        <button onclick="closeM('modal-buy')" class="w-full mt-4 text-gray-400">Cancel</button>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-white z-[100] hidden p-8">
        <h2 class="text-2xl font-black mb-6">Create</h2>
        <select id="add-type" class="w-full p-4 bg-gray-100 rounded-xl mb-4">
            <option value="post">Social Post</option>
            <option value="shop">Product for Sale</option>
        </select>
        <input type="file" id="add-file" class="mb-4">
        <input id="add-title" placeholder="Caption/Title" class="w-full p-4 bg-gray-100 rounded-xl mb-4">
        <input id="add-price" placeholder="Price (if product)" class="w-full p-4 bg-gray-100 rounded-xl mb-6">
        <button onclick="handleUpload()" class="w-full bg-black text-white p-4 rounded-xl font-bold">PUBLISH</button>
        <button onclick="closeM('modal-add')" class="w-full mt-4 text-gray-400">Back</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzIt34Ff5aqRECSgFJK2YkZGzARuD8s6S0rEnTMwDP5SU5ak1w8M4MY9iFxGB31fedjMA/exec";
        const UID = "8829934849"; // Logged in user id

        function showPage(p) {
            document.getElementById('view-home').classList.add('hide');
            document.getElementById('view-profile').classList.add('hide');
            document.getElementById('view-'+p).classList.remove('hide');
        }

        function switchTab(t) {
            document.getElementById('profile-posts').classList.toggle('hide', t !== 'posts');
            document.getElementById('profile-sales').classList.toggle('hide', t !== 'orders');
        }

        async function loadData() {
            const res = await fetch(`${API}?action=getAppData&uid=${UID}`);
            const d = await res.json();

            // 1. PUBLIC FEED
            let feedH = "";
            d.posts.forEach(p => {
                feedH += `
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="p-3 font-bold text-sm">@${p[1]}</div>
                    ${p[0].includes('video') ? `<video src="${p[0]}" controls></video>` : `<img src="${p[0]}">`}
                    <div class="p-4">
                        <div class="flex gap-4 mb-2 text-xl">
                            <i class="fa-regular fa-heart"></i> <i class="fa-regular fa-comment"></i>
                        </div>
                        <p class="text-sm"><b>${p[1]}</b> ${p[2]}</p>
                    </div>
                </div>`;
            });
            document.getElementById('public-feed').innerHTML = feedH;

            // 2. PROFILE GRID (Posts + Products)
            let gridH = "";
            d.posts.filter(p => p[1] == UID).forEach(p => {
                gridH += `<div class="relative group">
                    <img src="${p[0]}">
                    <button onclick="deletePost('${p[3]}')" class="absolute top-1 right-1 bg-red-500 text-white p-1 rounded text-[10px]"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
            document.getElementById('profile-posts').innerHTML = gridH;

            // 3. SALES / ORDERS (Who bought your items)
            let salesH = "";
            d.orders.filter(o => o[5] == UID).forEach(o => { // o[5] is Seller ID in sheet
                salesH += `<div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <b class="text-sm">${o[1]} bought ${o[2]}</b>
                    <p class="text-[10px] text-gray-500">${o[3]} | ${o[4]}</p>
                </div>`;
            });
            document.getElementById('profile-sales').innerHTML = salesH || "No sales yet.";
        }

        async function deletePost(id) {
            if(confirm("Delete this post?")) {
                await fetch(API, {method:"POST", mode:"no-cors", body: JSON.stringify({action:"delete", id:id})});
                location.reload();
            }
        }

        // Add more functions for Buy, Form, and Upload...
        window.onload = loadData;
    </script>
</body>
</html>
