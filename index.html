<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let confirmationResult;
        let currentUserData = null;

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                    showApp();
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- AUTH FUNCTIONS (Fixed reCAPTCHA Error) ---
        window.sendOTP = () => {
            const phone = document.getElementById('phone-input').value;
            if(phone.length < 10) return alert("Hukum, sahi number dalein sa!");
            
            if (window.recaptchaVerifier) {
                window.recaptchaVerifier.clear();
                document.getElementById('recaptcha-container').innerHTML = '';
            }
            
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            
            signInWithPhoneNumber(auth, "+91" + phone, window.recaptchaVerifier)
                .then(res => { 
                    confirmationResult = res; 
                    document.getElementById('otp-box').classList.remove('hide'); 
                    alert("🚩 OTP bhej diya gaya hai!"); 
                }).catch(err => { alert("Error: " + err.message); if(window.recaptchaVerifier) window.recaptchaVerifier.clear(); });
        };

        window.verifyOTP = () => {
            confirmationResult.confirm(document.getElementById('otp-input').value).catch(() => alert("Galat OTP!"));
        };

        window.registerUser = async () => {
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                bio: "SainiWalaa ka Royal Sadasya 🚩",
                uid: auth.currentUser.uid,
                phone: auth.currentUser.phoneNumber
            };
            if(!data.name) return alert("Naam likhna zaroori hai!");
            await set(ref(db, 'users/' + auth.currentUser.uid), data);
            location.reload();
        };

        window.updateProfile = async () => {
            const newBio = document.getElementById('edit-bio').value;
            const newName = document.getElementById('edit-name').value;
            await update(ref(db, 'users/' + auth.currentUser.uid), { name: newName, bio: newBio });
            alert("Mubarak! Profile update ho gayi sa.");
            closeM('edit-profile-modal');
            location.reload();
        };

        function showApp() {
            document.getElementById('auth-screen').classList.add('hide');
            document.getElementById('reg-screen').classList.add('hide');
            document.getElementById('app').classList.remove('hide');
            document.getElementById('u-display-name').innerText = currentUserData.name;
            document.getElementById('u-bio').innerText = currentUserData.bio || "";
            document.getElementById('edit-name').value = currentUserData.name;
            document.getElementById('edit-bio').value = currentUserData.bio || "";
            onValue(ref(db, 'posts'), snap => renderFeed(snap.val()));
            onValue(ref(db, 'products'), snap => renderShop(snap.val()));
        }

        // --- PUBLISH (IMAGE & 90s VIDEO) ---
        window.publish = async (mode) => {
            const file = document.getElementById(mode === 'post' ? 'post-file' : 'prod-file').files[0];
            const btn = document.getElementById(mode === 'post' ? 'btn-post' : 'btn-prod');
            if(!file) return alert("Pehle file chuniye sa!");

            btn.disabled = true; btn.innerText = "🚩 Taiyari ho rahi hai... ⏳";
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                const type = file.type.includes('video') ? 'video' : 'image';
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`, {method:"POST", body:formData});
                const cData = await res.json();

                if(!cData.secure_url) throw new Error("Upload fail!");

                const item = {
                    uid: auth.currentUser.uid,
                    uName: currentUserData.name,
                    url: cData.secure_url,
                    type: type,
                    time: Date.now()
                };

                if(mode === 'post') {
                    item.caption = document.getElementById('post-cap').value;
                    await push(ref(db, 'posts'), item);
                } else {
                    item.name = document.getElementById('prod-name').value;
                    item.price = document.getElementById('prod-price').value;
                    item.link = document.getElementById('prod-link').value || "#";
                    await push(ref(db, 'products'), item);
                }
                alert("🚩 Mubarak ho! Aapki post Bazaar mein live hai.");
                closeM(mode + '-modal');
            } catch(e) { alert("Maafi, upload mein galti hui!"); }
            btn.disabled = false; btn.innerText = "PUBLISH";
        };

        // --- RENDER UI ---
        function renderFeed(data) {
            let h = ""; let myGrid = ""; let myCount = 0;
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    const media = p.type === 'video' ? `<video src="${p.url}" controls class="w-full max-h-[500px] bg-black"></video>` : `<img src="${p.url}" class="w-full object-cover max-h-[500px]">`;
                    h += `<div class="bg-white mb-6 shadow-sm border-b">
                        <div class="p-4 flex justify-between items-center">
                            <b class="text-red-900 italic font-black tracking-wider text-sm">🚩 ${p.uName.toUpperCase()}</b>
                            ${p.uid === auth.currentUser.uid ? `<i class="fa-solid fa-trash-can text-gray-300" onclick="del('posts','${k}')"></i>` : ''}
                        </div>
                        ${media}
                        <div class="p-4 text-sm"><p><b>${p.uName}</b> ${p.caption || ''}</p></div>
                    </div>`;
                    if(p.uid === auth.currentUser.uid) { 
                        myCount++; 
                        myGrid += p.type === 'video' ? `<div class="bg-gray-200 flex items-center justify-center aspect-square border"><i class="fa-solid fa-play"></i></div>` : `<img src="${p.url}" class="aspect-square object-cover border">`;
                    }
                });
            }
            document.getElementById('v-feed').innerHTML = h || "<p class='text-center py-20 text-gray-400'>Feed khali hai hukum.</p>";
            document.getElementById('c-posts').innerText = myCount;
            document.getElementById('profile-grid').innerHTML = myGrid;
        }

        function renderShop(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    h += `<div class="bg-white rounded-3xl overflow-hidden shadow-lg border border-orange-50 relative group">
                        ${p.uid === auth.currentUser.uid ? `<i class="fa-solid fa-circle-xmark absolute top-2 right-2 text-red-500 bg-white rounded-full z-10" onclick="del('products','${k}')"></i>` : ''}
                        <img src="${p.url}" class="w-full h-48 object-cover">
                        <div class="p-4 text-center">
                            <h3 class="font-black text-red-900 text-[11px] mb-1 uppercase">${p.name}</h3>
                            <div class="text-orange-600 font-bold mb-3">₹${p.price}</div>
                            <button onclick="window.open('${p.link}')" class="w-full bg-red-800 text-white py-2 rounded-xl text-[10px] font-black tracking-widest hover:bg-red-700 transition">ORDER NOW</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center py-20'>Bazaar khali hai.</p>";
        }

        window.del = (p,k) => confirm("Hukum, ise system se hatana hai?") && remove(ref(db, `${p}/${k}`));
        window.logout = () => { signOut(auth); location.reload(); };
        window.showPage = (p) => {
            ['feed','shop','profile'].forEach(v => {
                document.getElementById('v-'+v).classList.add('hide');
                document.getElementById('n-'+v).classList.remove('active');
            });
            document.getElementById('v-'+p).classList.remove('hide');
            document.getElementById('n-'+p).classList.add('active');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fafafa; }
        .hide { display: none !important; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 18px; padding: 16px; width: 100%; box-shadow: 0 10px 20px rgba(124, 18, 18, 0.2); transition: 0.3s; }
        .btn-royal:active { transform: scale(0.96); }
        input, textarea { border: 2px solid #eee !important; padding: 15px; border-radius: 18px; margin-bottom: 15px; width: 100%; outline: none; background: #fff;
