<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Elite Persistence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(to right, #d4af37 20%, #111 40%, #111 60%, #d4af37 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .banner-container { height: 260px; width: 100%; position: relative; background: #111; border-radius: 0 0 50px 50px; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 50px 50px; }
        .profile-holder { position: absolute; bottom: -90px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; width: 100%; text-align: center; }
        .p-img { width: 135px; height: 135px; border-radius: 50%; border: 6px solid white; object-fit: cover; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .nav-btn { position: relative; transition: 0.3s; color: #999; }
        .nav-btn.active { color: #d4af37; font-weight: 800; border-bottom: 3px solid #d4af37; }
        .desc-text { color: #ff0000 !important; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        .badge-msg { position: absolute; top: -5px; right: -5px; background: #ff3b3b; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; border: 2px solid white; }
        .product-card { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #f0f0f0; transition: 0.4s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center bg-white fixed inset-0 z-[3000]">
        <h1 class="raj-font text-4xl text-[#d4af37] animate-pulse">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="min-h-screen flex items-center justify-center bg-white hidden">
        <div class="w-full max-w-sm p-10 text-center">
            <h1 class="raj-font text-6xl text-[#d4af37] mb-12">S</h1>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-5 bg-gray-50 rounded-2xl outline-none">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-3xl font-bold">SIGN IN / JOIN</button>
            </div>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <div class="bg-white pt-6 pb-2 text-center border-b">
            <h1 class="raj-font text-3xl font-bold tracking-[0.3em] saini-header">SAINIWALAA</h1>
        </div>

        <nav class="sticky top-0 z-[150] bg-white/80 backdrop-blur-xl flex justify-around border-b px-4">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Trending</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">Orders</button>
            <button onclick="logout()" class="py-5 text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-shop" class="hidden">
            <div class="banner-container">
                <img id="banner-ui" src="" class="banner-img">
                <div class="profile-holder">
                    <div class="relative">
                        <img id="profile-ui" src="" class="p-img">
                        <label class="absolute bottom-1 right-2 bg-[#d4af37] text-white w-10 h-10 flex items-center justify-center rounded-full cursor-pointer owner-only hidden border-4 border-white shadow-lg">
                            <i class="fa-solid fa-camera-retro"></i>
                            <input type="file" onchange="uploadMedia('profile', this)" class="hidden">
                        </label>
                    </div>
                    <div class="mt-4">
                        <h2 id="disp-name" class="raj-font font-bold text-gray-800 text-2xl">Creator</h2>
                        <div class="flex justify-center items-center gap-4 mt-5">
                            <button onclick="toggleFollow()" id="follow-btn" class="bg-[#d4af37] text-white text-[10px] px-8 py-3.5 rounded-full font-black uppercase tracking-widest visitor-only hidden">Follow</button>
                            <div class="relative">
                                <button onclick="showTab('chats')" class="bg-black text-white text-[10px] px-8 py-3.5 rounded-full font-black uppercase tracking-widest relative">
                                    Message <span id="msg-badge" class="badge-msg hidden">0</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <label class="absolute top-6 right-6 bg-black/40 backdrop-blur-md p-4 rounded-full cursor-pointer text-white owner-only hidden border border-white/20">
                    <i class="fa-solid fa-panorama"></i>
                    <input type="file" onchange="uploadMedia('banner', this)" class="hidden">
                </label>
            </div>

            <div class="mt-48 px-8 text-center">
                <p id="disp-bio" class="p-6 rounded-[30px] shadow-sm border border-gray-100 bg-white min-w-[320px] mx-auto italic text-gray-600">Mhara Swagat hai!</p>
                <div class="mt-8 flex justify-center gap-3 owner-only hidden">
                    <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="text-[10px] bg-gray-100 text-gray-600 px-10 py-4 rounded-full font-black uppercase tracking-widest">Edit Profile</button>
                </div>
            </div>

            <div id="edit-box" class="hidden max-w-sm mx-auto p-8 mt-10 bg-white border rounded-[40px] shadow-2xl space-y-5">
                <input id="in-name" placeholder="Full Name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input id="in-bio" placeholder="Bio Story" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl">
                    <input type="color" id="in-bio-color" class="w-10 h-10 border-none cursor-pointer">
                    <input type="number" id="in-bio-size" placeholder="Size" class="w-full bg-transparent outline-none">
                </div>
                <button onclick="saveProfile()" class="w-full bg-black text-white p-5 rounded-3xl font-bold">SAVE UPDATES</button>
            </div>

            <div class="max-w-5xl mx-auto p-8 mt-12 owner-only hidden">
                <div class="bg-white border-2 border-dashed border-gray-200 p-12 rounded-[50px]">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input id="p-name" placeholder="Item Name" class="p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-price" placeholder="Price (INR)" class="p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-cat" placeholder="Category" class="p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-link" placeholder="Purchase Link" class="p-4 bg-gray-50 rounded-2xl outline-none">
                    </div>
                    <textarea id="p-desc" placeholder="Product details (In Red)..." class="w-full p-5 bg-gray-50 rounded-3xl mb-8 outline-none h-28"></textarea>
                    <input type="file" id="p-file" onchange="previewProd(this)" class="hidden">
                    <label for="p-file" class="bg-gray-100 p-10 block rounded-[30px] cursor-pointer font-bold text-gray-400 mb-8 border border-transparent text-center">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl mb-3 block text-[#d4af37]"></i> SELECT IMAGE
                    </label>
                    <button id="pub-btn" onclick="publish()" class="hidden w-full bg-[#d4af37] text-white p-6 rounded-[30px] font-black uppercase tracking-[0.2em] shadow-2xl">Publish Product</button>
                </div>
            </div>

            <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 max-w-7xl mx-auto mt-10"></div>
        </section>

        <section id="sec-feed" class="hidden p-8 max-w-7xl mx-auto">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8" id="public-grid"></div>
        </section>

        <section id="sec-chats" class="hidden p-8 max-w-2xl mx-auto">
            <h2 class="raj-font text-3xl mb-8">Inbox</h2>
            <div id="chat-list" class="space-y-4"></div>
        </section>

        <section id="sec-orders" class="hidden p-8 max-w-3xl mx-auto">
            <h2 class="raj-font text-3xl mb-8">Order History</h2>
            <div id="order-list" class="space-y-6"></div>
        </section>
    </main>

    <div id="order-modal" class="hidden fixed inset-0 z-[2000] flex items-center justify-center bg-black/90 p-6">
        <div class="bg-white w-full max-w-md rounded-[50px] p-12 text-center shadow-2xl">
            <h3 class="raj-font text-2xl mb-2">Checkout</h3>
            <p class="text-gray-400 text-[10px] mb-10 uppercase font-bold">Safe & Secure Transaction</p>
            <input id="o-name" placeholder="Your Full Name" class="w-full p-5 bg-gray-50 rounded-2xl mb-4 outline-none">
            <input id="o-phone" placeholder="WhatsApp Number" class="w-full p-5 bg-gray-50 rounded-2xl mb-10 outline-none">
            <button onclick="confirmOrder()" class="w-full bg-black text-white py-6 rounded-[30px] font-black uppercase shadow-xl">PLACE ORDER</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-8 text-gray-400 font-bold uppercase text-[10px]">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", 
            authDomain: "social-blog-93d38.firebaseapp.com", 
            projectId: "social-blog-93d38", 
            storageBucket: "social-blog-93d38.appspot.com", 
            appId: "1:78643219054:web:dprl2lyih" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let viewId = null;

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                // Persistence Logic
                const activeTab = localStorage.getItem('activeTab') || 'feed';
                showTab(activeTab);
                
                loadGlobalData();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        function loadGlobalData() {
            // Public Feed
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), s => {
                render(s, 'public-grid', false);
            });

            // Inbox Listener
            onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid), orderBy("time", "desc")), s => {
                const badge = document.getElementById('msg-badge');
                badge.innerText = s.size;
                badge.classList.toggle('hidden', s.size === 0);
                
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<div class="bg-white p-6 rounded-[30px] border-l-4 border-[#d4af37] shadow-sm relative">
                        <p class="text-[9px] font-black text-[#d4af37] uppercase">From User: ${c.from.slice(0,8)}</p>
                        <p class="mt-2 text-gray-700">"${c.msg}"</p>
                        <div class="mt-4 flex gap-2">
                            <button onclick="replyMsg('${c.from}')" class="bg-black text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase">Reply</button>
                            <button onclick="delMsg('${d.id}')" class="text-red-300 ml-auto"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
                });
            });

            // Orders Listener
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid), orderBy("time", "desc")), s => {
                const list = document.getElementById('order-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const o = d.data();
                    const dt = o.time ? o.time.toDate().toLocaleString('en-IN', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) : '...';
                    list.innerHTML += `<div class="bg-white p-6 rounded-[40px] border shadow-sm relative">
                        <div class="absolute top-4 right-6 text-[9px] font-black text-gray-300 uppercase">${dt}</div>
                        <h4 class="font-bold text-lg">${o.item}</h4>
                        <p class="text-[#d4af37] font-black mb-4">₹${o.price}</p>
                        <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center">
                            <div><p class="text-[10px] font-bold text-gray-400 uppercase">Customer</p><p class="font-bold text-sm">${o.customer}</p></div>
                            <div><p class="text-[10px] font-bold text-gray-400 uppercase">WhatsApp</p><p class="font-bold text-sm">${o.phone}</p></div>
                            <button onclick="delOrder('${d.id}')" class="text-red-300"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            });
        }

        window.showTab = (t) => {
            localStorage.setItem('activeTab', t);
            ['feed','shop','chats','orders'].forEach(s => {
                const el = document.getElementById('sec-'+s);
                if(el) el.classList.toggle('hidden', s !== t);
                const btn = document.getElementById('tab-'+s);
                if(btn) btn.classList.toggle('active', s === t);
            });
            if(t === 'shop' && !viewId) viewProfile(curU.uid);
            window.scrollTo(0,0);
        };

        window.viewProfile = async (uid) => {
            viewId = uid;
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.querySelectorAll('.visitor-only').forEach(el => isMe ? el.classList.add('hidden') : el.classList.remove('hidden'));

            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('disp-name').innerText = d.name || "Saini Creator";
                const b = document.getElementById('disp-bio');
                b.innerText = d.bio || "Mhara Swagat hai!"; 
                b.style.color = d.bioColor || '#666'; 
                b.style.fontSize = (d.bioSize || '15') + 'px';
                document.getElementById('profile-ui').src = d.profile || "https://api.dicebear.com/7.x/avataaars/svg?seed="+uid;
                document.getElementById('banner-ui').src = d.banner || "https://images.unsplash.com/photo-1557683316-973673baf926?w=1000";
            }

            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                render(s, 'my-shop-grid', isMe);
            });
            showTab('shop');
        };

        function render(snapshot, cid, isMe) {
            const grid = document.getElementById(cid);
            grid.innerHTML = "";
            snapshot.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="product-card group">
                    <div class="aspect-square overflow-hidden relative"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6">
                        <button onclick="viewProfile('${p.creatorId}')" class="text-[9px] font-black text-[#d4af37] mb-1 uppercase hover:underline">@${p.creatorName || 'Saini'}</button>
                        <h4 class="font-bold text-sm truncate text-gray-800">${p.name}</h4>
                        <p class="desc-text">${p.desc || ''}</p>
                        <div class="flex justify-between items-end mt-4">
                            <div><span class="text-[10px] block text-gray-400 font-bold">Price</span><span class="font-black text-xl">₹${p.price}</span></div>
                            <div class="flex gap-2">
                                ${isMe ? `<button onclick="delProd('${d.id}')" class="bg-red-50 text-red-400 p-3 rounded-2xl"><i class="fa-solid fa-trash"></i></button>` : ''}
                                <button onclick="triggerOrder('${p.name.replace(/'/g, "\\'")}', '${p.creatorId}', '${p.link}', '${p.price}')" class="bg-black text-white text-[10px] px-6 py-3 rounded-2xl font-black uppercase">Get It</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }

        // Logic Functions
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };

        window.saveProfile = async () => {
            await setDoc(doc(db, "users", curU.uid), {
                name: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value,
                bioColor: document.getElementById('in-bio-color').value,
                bioSize: document.getElementById('in-bio-size').value
            }, { merge: true });
            document.getElementById('edit-box').classList.add('hidden');
            viewProfile(curU.uid);
        };

        window.uploadMedia = (type, input) => {
            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async (e) => {
                await setDoc(doc(db, "users", curU.uid), { [type]: e.target.result }, { merge: true });
                viewProfile(curU.uid);
            };
        };

        window.previewProd = (input) => {
            const reader = new FileReader();
            reader.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); };
            reader.readAsDataURL(input.files[0]);
        };

        window.publish = async () => {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value,
                link: document.getElementById('p-link').value,
                img: window.tempImg,
                creatorId: curU.uid,
                creatorName: document.getElementById('disp-name').innerText,
                time: serverTimestamp()
            });
            location.reload();
        };

        window.triggerOrder = (n, cid, l, p) => { 
            window.targetOrder = { n, cid, l, p }; 
            document.getElementById('order-modal').classList.remove('hidden'); 
        };

        window.confirmOrder = async () => {
            const cn = document.getElementById('o-name').value, ph = document.getElementById('o-phone').value;
            if(!cn || !ph) return alert("Details bharo!");
            await addDoc(collection(db, "orders"), {
                item: window.targetOrder.n, customer: cn, phone: ph,
                creatorId: window.targetOrder.cid, price: window.targetOrder.p,
                time: serverTimestamp()
            });
            document.getElementById('order-modal').classList.add('hidden');
            if(window.targetOrder.l) window.open(window.targetOrder.l, '_blank');
        };

        window.replyMsg = (toId) => {
            const m = prompt("Write message:");
            if(m) addDoc(collection(db, "chats"), { from: curU.uid, to: toId, msg: m, time: serverTimestamp() });
        };

        window.delProd = async (id) => confirm("Delete Item?") && await deleteDoc(doc(db, "products", id));
        window.delMsg = async (id) => confirm("Delete Msg?") && await deleteDoc(doc(db, "chats", id));
        window.delOrder = async (id) => confirm("Delete Order?") && await deleteDoc(doc(db, "orders", id));
        window.logout = () => confirm("Logout?") && signOut(auth).then(() => location.reload());

    </script>
</body>
</html>
