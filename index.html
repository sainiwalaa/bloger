<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Elite Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        .raj-font { font-family: 'Cinzel', serif; }
        .saini-header {
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 5s ease infinite;
            font-weight: 900;
        }
        @keyframes gradient-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; }
        .nav-btn { color: #666; font-size: 11px; font-weight: 800; letter-spacing: 2px; transition: 0.3s; }
        .nav-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
        
        .p-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #d4af37; object-fit: cover; }
        .product-card { background: #111; border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        
        input, select, textarea { background: #151515 !important; color: white !important; border: 1px solid #333 !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-20">

    <div id="loading-screen" class="fixed inset-0 z-[5000] bg-black flex items-center justify-center">
        <h1 class="raj-font text-3xl saini-header animate-pulse">SAINIWALAA</h1>
    </div>

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm glass-card p-10 text-center">
            <h1 class="raj-font text-5xl saini-header mb-8">S</h1>
            <input type="email" id="auth-email" placeholder="Email" class="mb-4">
            <input type="password" id="auth-pass" placeholder="Password" class="mb-6">
            <button onclick="handleAuth()" class="w-full bg-gradient-to-r from-[#bf953f] to-[#b38728] text-black font-bold py-4 rounded-xl">ENTER ELITE</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <header class="bg-black/90 backdrop-blur-md p-6 text-center sticky top-0 z-[100] border-b border-white/5">
            <h1 class="raj-font text-2xl saini-header tracking-widest">SAINIWALAA</h1>
        </header>

        <nav class="flex justify-around bg-black border-b border-white/5">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-4 uppercase">Feed</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-4 uppercase">Profile</button>
            <button onclick="logout()" class="py-4 text-red-800"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-feed" class="p-6 grid grid-cols-2 gap-4 hidden"></section>

        <section id="sec-shop" class="hidden">
            <div class="relative h-48 bg-gradient-to-b from-[#1a1a1a] to-black"></div>
            <div class="text-center -mt-16 px-6 relative z-10">
                <img id="profile-ui" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Saini" class="p-img mx-auto mb-4">
                <h2 id="disp-name" class="raj-font font-bold">Creator</h2>
                <p id="disp-bio" class="text-gray-400 text-sm italic mb-4">Mhara Swagat hai!</p>
                
                <div class="flex justify-center gap-3 mb-8">
                    <button class="bg-[#d4af37] text-black px-6 py-2 rounded-full font-bold text-xs uppercase">Follow</button>
                    <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="bg-white/5 border border-white/10 px-6 py-2 rounded-full text-xs uppercase owner-only">Edit</button>
                </div>
            </div>

            <div id="edit-box" class="hidden p-6 mx-6 glass-card space-y-3 mb-6">
                <p class="text-[10px] text-[#d4af37] font-bold">PROFILE SETTINGS</p>
                <input id="in-name" placeholder="Display Name">
                <div class="grid grid-cols-2 gap-2">
                    <input id="in-name-color" type="color" title="Name Color">
                    <input id="in-name-size" type="number" placeholder="Name Size (px)">
                </div>
                <textarea id="in-bio" placeholder="Bio"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <input id="in-bio-color" type="color" title="Bio Color">
                    <input id="in-bio-size" type="number" placeholder="Bio Size (px)">
                </div>
                <button onclick="saveProfile()" class="w-full bg-white text-black py-3 rounded-xl font-bold">SAVE CHANGES</button>
            </div>

            <div class="px-6 mb-10 owner-only">
                <button onclick="document.getElementById('add-prod-box').classList.toggle('hidden')" class="w-full border border-dashed border-[#d4af37] py-4 rounded-2xl text-[#d4af37] text-xs font-bold">+ ADD NEW PRODUCT</button>
                <div id="add-prod-box" class="hidden mt-4 glass-card p-6 space-y-3">
                    <input id="p-name" placeholder="Product Name">
                    <select id="p-cat">
                        <option value="Elite">Elite</option>
                        <option value="Gadgets">Gadgets</option>
                        <option value="Fashion">Fashion</option>
                    </select>
                    <textarea id="p-desc" placeholder="Full Description"></textarea>
                    <input id="p-price" placeholder="Price (₹)">
                    <p class="text-[10px] text-gray-500">Upload Product Image:</p>
                    <input type="file" id="p-file" accept="image/*">
                    <button onclick="uploadProduct()" class="w-full bg-[#d4af37] text-black py-3 rounded-xl font-bold">PUBLISH</button>
                </div>
            </div>

            <div class="px-6 space-y-10">
                <div class="owner-only">
                    <h3 class="raj-font text-[#d4af37] mb-4 border-b border-white/5 pb-2">Sales Inbox</h3>
                    <div id="order-list" class="space-y-3"></div>
                </div>

                <div>
                    <h3 class="raj-font text-[#d4af37] mb-4 border-b border-white/5 pb-2">My Shop</h3>
                    <div id="my-shop-grid" class="grid grid-cols-2 gap-4"></div>
                </div>

                <div>
                    <h3 class="raj-font text-blue-400 mb-4 border-b border-white/5 pb-2">My Orders (History)</h3>
                    <div id="my-history" class="space-y-3 pb-10"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="order-modal" class="hidden fixed inset-0 z-[2000] bg-black/90 flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 text-center">
            <h3 class="raj-font saini-header text-xl mb-6">Confirm Purchase</h3>
            <input id="o-name" placeholder="Your Name" class="mb-3">
            <input id="o-phone" placeholder="Mobile Number" class="mb-3">
            <input id="o-city" placeholder="City" class="mb-6">
            <button onclick="confirmOrder()" class="w-full bg-[#d4af37] text-black py-4 rounded-xl font-bold">ORDER NOW</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-4 text-gray-500 text-xs">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null;

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadData();
                showTab('feed');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function loadData() {
            // Feed
            onSnapshot(collection(db, "products"), s => {
                const g = document.getElementById('sec-feed'); g.innerHTML = "";
                s.forEach(d => {
                    const p = d.data();
                    g.innerHTML += `
                        <div class="product-card">
                            <img src="${p.img}" class="w-full aspect-square object-cover">
                            <div class="p-3">
                                <span class="text-[8px] text-[#d4af37] uppercase font-bold">${p.cat || 'Elite'}</span>
                                <h4 class="font-bold text-xs truncate">${p.name}</h4>
                                <div class="flex justify-between items-center mt-3">
                                    <span class="text-sm font-black">₹${p.price}</span>
                                    <button onclick="triggerOrder('${p.name}', '${p.creatorId}', '${p.price}')" class="bg-white text-black text-[9px] px-3 py-1.5 rounded-lg font-bold">BUY</button>
                                </div>
                            </div>
                        </div>`;
                });
            });

            // Sales Inbox (Orders I received)
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid), orderBy("time", "desc")), s => {
                const l = document.getElementById('order-list'); l.innerHTML = "";
                s.forEach(d => {
                    const o = d.data();
                    l.innerHTML += `<div class="glass-card p-4 text-[11px] border-l-4 border-yellow-600">
                        <div class="flex justify-between font-bold text-[#d4af37] mb-1"><span>${o.item}</span><span>₹${o.price}</span></div>
                        <div>Buyer: ${o.customer} | ${o.phone}</div>
                        <div class="text-gray-500 text-[9px] mt-1">${o.time?.toDate().toLocaleString() || 'Just now'}</div>
                    </div>`;
                });
            });

            // My Order History (Orders I placed)
            onSnapshot(query(collection(db, "orders"), where("buyerId", "==", curU.uid), orderBy("time", "desc")), s => {
                const l = document.getElementById('my-history'); l.innerHTML = "";
                s.forEach(d => {
                    const o = d.data();
                    l.innerHTML += `<div class="glass-card p-4 text-[11px] border-l-4 border-blue-600">
                        <div class="flex justify-between font-bold mb-1"><span>${o.item}</span><span>₹${o.price}</span></div>
                        <div class="text-gray-500 text-[9px]">Ordered on: ${o.time?.toDate().toLocaleString() || 'Just now'}</div>
                        <div class="text-green-500 uppercase text-[8px] mt-1">Confirmed</div>
                    </div>`;
                });
            });
        }

        window.uploadProduct = async () => {
            const file = document.getElementById('p-file').files[0];
            if(!file) return alert("Select an image!");
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const pData = {
                    name: document.getElementById('p-name').value,
                    cat: document.getElementById('p-cat').value,
                    desc: document.getElementById('p-desc').value,
                    price: document.getElementById('p-price').value,
                    img: reader.result,
                    creatorId: curU.uid,
                    time: serverTimestamp()
                };
                await addDoc(collection(db, "products"), pData);
                alert("Published!");
                document.getElementById('add-prod-box').classList.add('hidden');
            };
        };

        window.saveProfile = async () => {
            const up = {
                name: document.getElementById('in-name').value,
                nCol: document.getElementById('in-name-color').value,
                nSize: document.getElementById('in-name-size').value,
                bio: document.getElementById('in-bio').value,
                bCol: document.getElementById('in-bio-color').value,
                bSize: document.getElementById('in-bio-size').value
            };
            await setDoc(doc(db, "users", curU.uid), up, {merge: true});
            viewMyProfile(curU.uid);
            alert("Profile Updated!");
        };

        window.viewMyProfile = async (uid) => {
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                const nameEl = document.getElementById('disp-name');
                const bioEl = document.getElementById('disp-bio');
                
                nameEl.innerText = d.name || "Saini Creator";
                nameEl.style.color = d.nCol || "#d4af37";
                nameEl.style.fontSize = (d.nSize || 24) + "px";
                
                bioEl.innerText = d.bio || "Mhara Swagat hai!";
                bioEl.style.color = d.bCol || "#9ca3af";
                bioEl.style.fontSize = (d.bSize || 14) + "px";
            }
        };

        window.triggerOrder = (n, cid, p) => { 
            window.targetOrder = { n, cid, p }; 
            document.getElementById('order-modal').classList.remove('hidden'); 
        };

        window.confirmOrder = async () => {
            const data = {
                item: window.targetOrder.n,
                price: window.targetOrder.p,
                creatorId: window.targetOrder.cid,
                buyerId: curU.uid,
                customer: document.getElementById('o-name').value,
                phone: document.getElementById('o-phone').value,
                city: document.getElementById('o-city').value,
                time: serverTimestamp()
            };
            await addDoc(collection(db, "orders"), data);
            alert("Order Placed!");
            document.getElementById('order-modal').classList.add('hidden');
        };

        window.showTab = (t) => {
            ['feed','shop'].forEach(s => document.getElementById('sec-'+s).classList.toggle('hidden', s !== t));
            if(t === 'shop') viewMyProfile(curU.uid);
        };
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
