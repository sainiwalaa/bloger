<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let confirmationResult;
        let currentUserData = null;

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                    showApp();
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- AUTH FUNCTIONS ---
        window.sendOTP = () => {
            const phone = document.getElementById('phone-input').value;
            if(phone.length < 10) return alert("Sahi number dalein sa!");
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            signInWithPhoneNumber(auth, "+91" + phone, window.recaptchaVerifier)
                .then(res => { confirmationResult = res; document.getElementById('otp-box').classList.remove('hide'); alert("OTP bhej diya hai!"); })
                .catch(err => alert("Error: " + err.message));
        };

        window.verifyOTP = () => {
            confirmationResult.confirm(document.getElementById('otp-input').value)
                .catch(() => alert("Galat OTP!"));
        };

        window.registerUser = async () => {
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                bio: "SainiWalaa ka Royal Sadasya 🚩",
                uid: auth.currentUser.uid,
                phone: auth.currentUser.phoneNumber
            };
            await set(ref(db, 'users/' + auth.currentUser.uid), data);
            location.reload();
        };

        window.updateProfile = async () => {
            const newBio = document.getElementById('edit-bio').value;
            const newName = document.getElementById('edit-name').value;
            await update(ref(db, 'users/' + auth.currentUser.uid), { name: newName, bio: newBio });
            alert("Profile Update ho gayi hukum!");
            closeM('edit-profile-modal');
            location.reload();
        };

        function showApp() {
            document.getElementById('auth-screen').classList.add('hide');
            document.getElementById('reg-screen').classList.add('hide');
            document.getElementById('app').classList.remove('hide');
            document.getElementById('u-display-name').innerText = currentUserData.name;
            document.getElementById('u-bio').innerText = currentUserData.bio || "";
            onValue(ref(db, 'posts'), snap => renderFeed(snap.val()));
            onValue(ref(db, 'products'), snap => renderShop(snap.val()));
        }

        // --- UNIVERSAL PUBLISH (IMAGE & VIDEO) ---
        window.publish = async (mode) => {
            const file = document.getElementById(mode === 'post' ? 'post-file' : 'prod-file').files[0];
            const btn = document.getElementById(mode === 'post' ? 'btn-post' : 'btn-prod');
            if(!file) return alert("File chuniye sa!");

            // Video Duration Check (90 Seconds)
            if(file.type.includes('video')) {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = function() {
                    if(video.duration > 91) { alert("Video 90 second se bada nahi hona chahiye sa!"); return; }
                }
            }

            btn.disabled = true; btn.innerText = "🚩 Taiyari ho rahi hai... ⏳";
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${file.type.includes('video')?'video':'image'}/upload`, {method:"POST", body:formData});
                const cData = await res.json();

                const item = {
                    uid: auth.currentUser.uid,
                    uName: currentUserData.name,
                    url: cData.secure_url,
                    type: file.type.includes('video') ? 'video' : 'image',
                    time: Date.now()
                };

                if(mode === 'post') {
                    item.caption = document.getElementById('post-cap').value;
                    await push(ref(db, 'posts'), item);
                } else {
                    item.name = document.getElementById('prod-name').value;
                    item.price = document.getElementById('prod-price').value;
                    item.link = document.getElementById('prod-link').value || "#";
                    await push(ref(db, 'products'), item);
                }
                alert("🚩 Mubarak Ho! Aapki Post Bazzar Me Live Hai.");
                closeM(mode + '-modal');
            } catch(e) { alert("Maafi! Kuch galti hui."); }
            btn.disabled = false; btn.innerText = "PUBLISH";
        };

        function renderFeed(data) {
            let h = ""; let myGrid = ""; let myCount = 0;
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    const media = p.type === 'video' ? `<video src="${p.url}" controls class="w-full"></video>` : `<img src="${p.url}" class="w-full h-96 object-cover">`;
                    h += `<div class="bg-white mb-4 border-b shadow-sm">
                        <div class="p-4 flex justify-between items-center">
                            <b class="text-red-900 italic font-black">🚩 ${p.uName}</b>
                            ${p.uid === auth.currentUser.uid ? `<i class="fa-solid fa-ellipsis-v" onclick="del('posts','${k}')"></i>` : ''}
                        </div>
                        ${media}
                        <div class="p-4"><p class="text-sm"><b>${p.uName}</b> ${p.caption || ''}</p></div>
                    </div>`;
                    if(p.uid === auth.currentUser.uid) { 
                        myCount++; 
                        myGrid += p.type === 'video' ? `<div class="bg-black flex items-center justify-center"><i class="fa-solid fa-play text-white"></i></div>` : `<img src="${p.url}" class="aspect-square object-cover">`;
                    }
                });
            }
            document.getElementById('v-feed').innerHTML = h;
            document.getElementById('c-posts').innerText = myCount;
            document.getElementById('profile-grid').innerHTML = myGrid;
        }

        function renderShop(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    h += `<div class="bg-white rounded-3xl overflow-hidden shadow-lg border border-orange-100 p-2 relative">
                        <img src="${p.url}" class="w-full h-44 object-cover rounded-2xl">
                        <div class="p-3 text-center">
                            <h3 class="font-black text-red-900 text-sm truncate uppercase tracking-tighter">${p.name}</h3>
                            <div class="text-orange-600 font-bold text-lg mb-2">₹${p.price}</div>
                            <button onclick="window.open('${p.link}')" class="w-full bg-red-800 text-white py-2 rounded-xl text-xs font-bold shadow-md hover:bg-red-700">ORDER NOW</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('bazaar-grid').innerHTML = h;
        }

        window.del = (p,k) => confirm("Hukum, hatana hai?") && remove(ref(db, `${p}/${k}`));
        window.logout = () => signOut(auth);
        window.showPage = (p) => {
            ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide'));
            document.getElementById('v-'+p).classList.remove('hide');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #fdfaf6; }
        .hide { display: none !important; }
        .btn-royal { background: linear-gradient(135deg, #991b1b, #ea580c); color: white; font-weight: 800; border-radius: 15px; padding: 14px; width: 100%; box-shadow: 0 4px 15px rgba(153, 27, 27, 0.3); }
        input, textarea { border: 2px solid #f3f4f6 !important; padding: 14px; border-radius: 15px; margin-bottom: 12px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: #ea580c !important; }
        .nav-icon { font-size: 1.6rem; color: #9ca3af; transition: 0.3s; cursor: pointer; }
        .nav-icon.active { color: #ea580c; }
    </style>
</head>
<body class="flex justify-center">

    <div id="auth-screen" class="w-full max-w-[450px] min-h-screen bg-white p-10 flex flex-col justify-center hide">
        <h1 class="text-5xl font-black text-red-800 italic text-center mb-2">SainiWalaa</h1>
        <p class="text-center text-orange-600 font-bold mb-10 italic">KHAMA GHANI HUKUM 🚩</p>
        <div id="recaptcha-container"></div>
        <input type="number" id="phone-input" placeholder="Mobile Number">
        <button onclick="sendOTP()" class="btn-royal">SEND OTP</button>
        <div id="otp-box" class="mt-4 hide">
            <input type="number" id="otp-input" placeholder="6-Digit OTP">
            <button onclick="verifyOTP()" class="btn-royal bg-black">ENTER STUDIO</button>
        </div>
    </div>

    <div id="reg-screen" class="w-full max-w-[450px] min-h-screen bg-white p-10 flex flex-col justify-center hide">
        <h2 class="text-3xl font-black text-red-800 mb-8 uppercase italic">Aapko Shubh Naam?</h2>
        <input type="text" id="reg-name" placeholder="Pura Naam">
        <input type="email" id="reg-email" placeholder="Email Address">
        <button onclick="registerUser()" class="btn-royal">SAVE PROFILE</button>
    </div>

    <div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-24 hide">
        <header class="sticky top-0 bg-white/80 backdrop-blur-xl border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black italic text-red-800">SainiWalaa</h1>
            <div class="flex gap-5">
                <i class="fa-solid fa-plus-square nav-icon" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store nav-icon" onclick="openM('prod-modal')"></i>
                <i class="fa-solid fa-sign-out-alt nav-icon text-red-400" onclick="logout()"></i>
            </div>
        </header>

        <main id="v-feed"></main>

        <main id="v-shop" class="p-4 hide">
            <div class="bg-gradient-to-r from-red-900 to-orange-600 p-6 rounded-3xl mb-6 text-white shadow-xl">
                <h2 class="text-2xl font-black uppercase italic">Royal Bazaar 🚩</h2>
                <p class="text-xs opacity-80">SainiWalaa Premium Collections</p>
            </div>
            <div id="bazaar-grid" class="grid grid-cols-2 gap-5"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="p-8 text-center border-b">
                <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-orange-400 to-red-800 p-1 mx-auto mb-4">
                    <div class="bg-white rounded-full w-full h-full flex items-center justify-center font-black text-3xl text-red-900 uppercase">S</div>
                </div>
                <h2 id="u-display-name" class="text-2xl font-black text-red-900"></h2>
                <p id="u-bio" class="text-gray-500 text-sm mb-4"></p>
                <div class="flex justify-center gap-10 border-t pt-4">
                    <div><b id="c-posts" class="text-xl">0</b><p class="text-[10px] font-bold text-gray-400">POSTS</p></div>
                    <button onclick="openM('edit-profile-modal')" class="text-xs bg-gray-100 px-4 py-2 rounded-full font-bold">EDIT BIO</button>
                </div>
            </div>
            <div id="profile-grid" class="grid grid-cols-3 gap-0.5"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white/90 backdrop-blur-md border-t p-5 flex justify-around shadow-2xl z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon active"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-shopping-bag nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-user-circle nav-icon"></i>
        </nav>

        <div id="post-modal" class="fixed inset-0 bg-white z-[100] hide p-10 overflow-y-auto">
            <div class="flex justify-between items-center mb-8"><b class="text-2xl italic">Naya Dhamaka</b><i class="fa-solid fa-xmark" onclick="closeM('post-modal')"></i></div>
            <p class="text-[10px] text-orange-600 mb-2 font-bold uppercase">Image ya 90s Video chuniye</p>
            <input type="file" id="post-file" accept="image/*,video/*">
            <textarea id="post-cap" placeholder="Post ki jankari (Caption)..." class="h-32"></textarea>
            <button onclick="publish('post')" id="btn-post" class="btn-royal">🚩 PUBLISH NOW</button>
        </div>

        <div id="prod-modal" class="fixed inset-0 bg-white z-[100] hide p-10 overflow-y-auto">
            <div class="flex justify-between items-center mb-8"><b class="text-2xl italic text-red-800 uppercase">Bazaar Mein Item Jodein</b><i class="fa-solid fa-xmark" onclick="closeM('prod-modal')"></i></div>
            <input type="file" id="prod-file" accept="image/*">
            <input type="text" id="prod-name" placeholder="Product ka Shubh Naam">
            <input type="number" id="prod-price" placeholder="Keemat (₹)">
            <input type="text" id="prod-link" placeholder="Purchase Link (URL)">
            <button onclick="publish('prod')" id="btn-prod" class="btn-royal">LIST IN BAZAAR</button>
        </div>

        <div id="edit-profile-modal" class="fixed inset-0 bg-white z-[100] hide p-10">
            <div class="flex justify-between mb-8"><b class="text-2xl italic">Edit Profile</b><i class="fa-solid fa-xmark" onclick="closeM('edit-profile-modal')"></i></div>
            <input type="text" id="edit-name" placeholder="Aapko Naam">
            <textarea id="edit-bio" placeholder="Apna Bio Likhein (Khas jankari)..." class="h-32"></textarea>
            <button onclick="updateProfile()" class="btn-royal">UPDATE NOW</button>
        </div>
    </div>
</body>
</html>
