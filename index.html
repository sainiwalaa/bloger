<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Social Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userCache = null;
        let viewUid = null;

        // --- AUTH & INITIALIZATION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, `users/${user.uid}`));
                userCache = snap.val();
                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('app').classList.remove('hide');
                showPage(localStorage.getItem('last_page') || 'feed');
                loadGlobalFeed();
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- UNIQUE ID CHECK & REGISTER ---
        window.registerUser = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const uname = document.getElementById('reg-id').value.toLowerCase().replace(/\s/g, '');
            const name = document.getElementById('reg-name').value;

            if(!uname || !email) return alert("Hukum, poori jankari bharo!");

            // Check duplicate ID
            const idQuery = query(ref(db, 'users'), orderByChild('username'), equalTo(uname));
            const idSnap = await get(idQuery);
            if(idSnap.exists()) return alert("Maafi Hukum, ye ID pehle se hai!");

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await set(ref(db, `users/${res.user.uid}`), {
                    uid: res.user.uid, username: uname, name: name,
                    photo: 'https://via.placeholder.com/150', banner: 'https://images.unsplash.com/photo-1590050752117-23a9d7fc2173',
                    bio: 'SainiWalaa Royal Member 🚩', website: ''
                });
                alert("Ghani Khamma! Tharo Swagat hai.");
            } catch(e) { alert(e.message); }
        };

        // --- SOCIAL & SHOP LOGIC ---
        function loadGlobalFeed() {
            onValue(ref(db, 'posts'), s => {
                const feed = document.getElementById('feed-container'); feed.innerHTML = "";
                if(s.exists()) Object.entries(s.val()).reverse().forEach(([id, p]) => {
                    feed.innerHTML += `
                        <div class="bg-white mb-6 shadow-sm border-b">
                            <div class="p-3 flex items-center gap-3 cursor-pointer" onclick="visitStudio('${p.uid}')">
                                <img src="${p.uPhoto}" class="w-10 h-10 chokor border-2 border-orange-600">
                                <div><b class="text-sm raj-title">${p.uName}</b><p class="text-[9px] text-gray-400">@${p.uHandle}</p></div>
                            </div>
                            <img src="${p.url}" class="w-full bg-gray-100" loading="lazy">
                            <div class="p-4 flex gap-5 text-2xl">
                                <i class="fa-regular fa-heart" onclick="likePost('${id}')"></i>
                                <i class="fa-regular fa-comment" onclick="showComments('${id}')"></i>
                                <i class="fa-regular fa-paper-plane" onclick="sharePost('${id}')"></i>
                            </div>
                            <p class="px-4 pb-4 text-xs"><b>${p.uHandle}</b> ${p.caption}</p>
                        </div>`;
                });
            });
        }

        window.visitStudio = async (uid) => {
            viewUid = uid;
            showPage('profile');
            const snap = await get(ref(db, `users/${uid}`));
            const d = snap.val();
            
            document.getElementById('p-name').innerText = d.name;
            document.getElementById('p-id').innerText = `@${d.username}`;
            document.getElementById('p-bio').innerText = d.bio;
            document.getElementById('p-img').src = d.photo;
            document.getElementById('p-banner').src = d.banner;
            document.getElementById('p-web').href = d.website || '#';

            // Show/Hide Edit
            document.getElementById('edit-controls').style.display = (uid === auth.currentUser.uid) ? 'flex' : 'none';
            
            loadUserContent(uid);
        };

        function loadUserContent(uid) {
            onValue(ref(db, 'posts'), s => {
                const grid = document.getElementById('p-post-grid'); grid.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(p => {
                    if(p.uid === uid) grid.innerHTML += `<img src="${p.url}" class="w-full aspect-square object-cover chokor border">`;
                });
            });
            onValue(ref(db, 'products'), s => {
                const grid = document.getElementById('p-shop-grid'); grid.innerHTML = "";
                if(s.exists()) Object.values(s.val()).forEach(p => {
                    if(p.ownerUid === uid) grid.innerHTML += `
                        <div class="bg-white border p-2 chokor shadow-sm">
                            <img src="${p.url}" class="w-full h-32 object-cover mb-2 chokor">
                            <b class="text-[10px] uppercase block truncate">${p.title}</b>
                            <span class="text-orange-600 font-bold text-xs">₹${p.price}</span>
                            <button onclick="openOrderForm('${p.title}', '${p.price}')" class="w-full bg-black text-white text-[9px] mt-2 py-1 uppercase">Order</button>
                        </div>`;
                });
            });
        }

        // --- ACTION TOOLS ---
        window.openOrderForm = (title, price) => {
            const name = prompt("Aapno Naam?");
            const address = prompt("Aapno Pato (Address)?");
            if(name && address) {
                const msg = `Hukum, mhane aa chiz chahiye: ${title} (₹${price}).\nNaam: ${name}\nPato: ${address}`;
                window.open(`https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(msg)}`);
                alert("Sabar rakho, order bhej diyo!");
            }
        };

        window.showPage = (id) => {
            localStorage.setItem('last_page', id);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById(`v-${id}`).classList.remove('hide');
            if(id === 'profile' && !viewUid) visitStudio(auth.currentUser.uid);
        };

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fafafa; overflow-x: hidden; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chokor { border-radius: 2px; }
        .nav-active { color: #ea580c !important; border-top: 3px solid #ea580c; }
        .btn-royal { background: #000; color: #fff; padding: 12px; font-weight: 900; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea { border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; width: 100%; outline: none; font-size: 13px; border-radius: 4px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 900; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: #ea580c; color: #ea580c; }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-[480px] min-h-screen bg-white relative pb-20 shadow-2xl hide">
        
        <header class="sticky top-0 bg-white/95 border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic" onclick="showPage('feed')">SAINIWALAA</h1>
            <div class="flex gap-4 items-center">
                <i class="fa-solid fa-magnifying-glass text-gray-400" onclick="alert('Search feature loading...')"></i>
                <i class="fa-solid fa-bell text-gray-400"></i>
            </div>
        </header>

        <main id="v-feed" class="p-1">
            <div id="feed-container"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-48 bg-gray-200 relative">
                <img id="p-banner" class="w-full h-full object-cover">
                <img id="p-img" class="w-28 h-28 absolute -bottom-10 left-6 border-4 border-white chokor bg-white object-cover shadow-lg">
            </div>
            
            <div class="mt-14 p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="p-name" class="text-2xl font-black raj-title leading-none"></h2>
                        <p id="p-id" class="text-xs text-gray-400 font-bold mt-1"></p>
                    </div>
                    <div id="edit-controls" class="flex gap-2">
                        <button onclick="alert('Hukum, Edit tool jaldi aave!')" class="bg-gray-100 p-2 text-[10px] font-bold px-4">EDIT</button>
                        <button onclick="signOut(auth)" class="bg-red-50 text-red-600 p-2 text-[10px] font-bold px-4">LOGOUT</button>
                    </div>
                </div>
                <p id="p-bio" class="text-xs mt-4 text-gray-600 italic"></p>
                <a id="p-web" href="#" class="block mt-4 border-2 border-black p-3 text-center font-black text-xs chokor hover:bg-black hover:text-white transition">VISIT WEBSITE</a>
            </div>

            <div class="flex border-t border-b bg-gray-50">
                <div class="tab-btn active" onclick="document.getElementById('p-post-grid').classList.remove('hide'); document.getElementById('p-shop-grid').classList.add('hide'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active'))">POSTS</div>
                <div class="tab-btn" onclick="document.getElementById('p-post-grid').classList.add('hide'); document.getElementById('p-shop-grid').classList.remove('hide'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active'))">ROYAL BAZAAR</div>
            </div>

            <div id="p-post-grid" class="grid grid-cols-3 gap-1 p-1"></div>
            <div id="p-shop-grid" class="grid grid-cols-2 gap-2 p-4 hide"></div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t flex justify-around py-4 z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house text-xl text-gray-300 cursor-pointer"></i>
            <i onclick="alert('Post tool loading...')" class="fa-solid fa-square-plus text-2xl text-orange-600 cursor-pointer"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-crown text-xl text-gray-300 cursor-pointer"></i>
        </nav>
    </div>

    <div id="auth-screen" class="w-full max-w-[480px] min-h-screen bg-white p-10 flex flex-col justify-center text-center hide">
        <h1 class="text-5xl font-black raj-title mb-10 italic">SAINIWALAA</h1>
        
        <div id="login-box">
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Password">
            <button onclick="signInWithEmailAndPassword(auth, document.getElementById('log-email').value, document.getElementById('log-pass').value)" class="btn-royal w-full">Kholo Studio 🚩</button>
            <p class="mt-6 text-xs text-gray-400" onclick="document.getElementById('login-box').classList.add('hide'); document.getElementById('reg-box').classList.remove('hide')">Naya ho? Register Karo</p>
        </div>

        <div id="reg-box" class="hide">
            <input type="text" id="reg-id" placeholder="Unique Studio ID (e.g. saini01)">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="registerUser()" class="btn-royal w-full">Register Karo 🚩</button>
            <p class="mt-6 text-xs text-gray-400" onclick="document.getElementById('reg-box').classList.add('hide'); document.getElementById('login-box').classList.remove('hide')">Pehle se ho? Login Karo</p>
        </div>
    </div>

</body>
</html>
