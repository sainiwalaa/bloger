<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Shahi Darbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        :root { --gold: #d4af37; --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); --dark: #0a0a0a; }
        body { background-color: var(--dark); color: #e0e0e0; font-family: 'Poppins', sans-serif; margin-bottom: 80px; }
        .royal-font { font-family: 'Cinzel', serif; }
        
        /* Shahi Header */
        .header { background: #151515; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 50; padding: 15px; text-align: center; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
        .brand { background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; font-weight: 900; letter-spacing: 4px; }

        /* Glowing Buttons */
        .gold-btn { background: var(--gold-grad); color: #000; font-weight: bold; border-radius: 8px; padding: 12px; transition: 0.3s; width: 100%; border: none; cursor: pointer; text-transform: uppercase; }
        .gold-btn:hover:not(:disabled) { box-shadow: 0 0 15px var(--gold); transform: translateY(-2px); }
        .gold-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Royal Card */
        .royal-card { background: #151515; border: 1px solid #333; border-radius: 15px; padding: 15px; margin: 15px auto; max-width: 500px; position: relative; overflow: hidden; }
        .royal-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--gold-grad); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #151515; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); z-index: 100; }
        .nav-item { color: #666; text-align: center; font-size: 10px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        input, textarea { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="header"><div class="brand royal-font">SAINIWALAA</div></header>

    <div id="auth-ui" class="p-4">
        <div class="royal-card">
            <h2 class="royal-font text-center text-xl mb-6 text-[#d4af37]">KHAMMA GHANI</h2>
            <input type="email" id="email" placeholder="Shahi Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="login-btn" onclick="shahiLogin()" class="gold-btn">PRAVESH KAREIN</button>
        </div>
    </div>

    <main id="main-app" class="hidden px-4">
        <section id="sec-darbar">
            <div class="royal-card">
                <textarea id="post-input" placeholder="Hukum, aaj kai vichaar hai?" rows="2"></textarea>
                <div class="flex gap-2">
                    <button onclick="pickMedia('post')" class="bg-[#222] border border-[#444] p-2 rounded flex-1 text-sm"><i class="fa-solid fa-image text-gold"></i> MEDIA</button>
                    <button id="post-btn" onclick="submitPost()" class="gold-btn flex-1 text-sm">POST KAREIN</button>
                </div>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="sec-bazaar" class="hidden">
            <div class="royal-card">
                <h3 class="royal-font text-[#d4af37] mb-3">LIST NEW PRODUCT</h3>
                <input id="p-name" placeholder="Item Name">
                <input id="p-price" placeholder="Price ₹">
                <input id="p-link" placeholder="WhatsApp/External Link">
                <button id="prod-btn" onclick="pickMedia('product')" class="gold-btn">PHOTO & LIST</button>
            </div>
            <div id="bazaar-grid" class="grid grid-cols-2 gap-4 mt-4"></div>
        </section>

        <section id="sec-profile" class="hidden text-center">
            <div class="royal-card">
                <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto border-2 border-[#d4af37] flex items-center justify-center mb-4">
                    <i class="fa-solid fa-crown text-3xl text-[#d4af37]"></i>
                </div>
                <h2 id="u-display" class="royal-font text-2xl">@MAHARAJA</h2>
                <button onclick="logout()" class="text-red-500 text-xs mt-4 uppercase font-bold tracking-widest">LOGOUT</button>
            </div>
            <h3 class="royal-font text-[#d4af37] mt-6 text-left px-4">RECENT ORDERS</h3>
            <div id="order-log" class="px-4 text-left space-y-3 mt-4"></div>
        </section>
    </main>

    <nav id="b-nav" class="bottom-nav hidden">
        <div onclick="switchTab('darbar')" id="n-darbar" class="nav-item active"><i class="fa-solid fa-fort-awesome"></i><span>DARBAR</span></div>
        <div onclick="switchTab('bazaar')" id="n-bazaar" class="nav-item"><i class="fa-solid fa-shop"></i><span>BAZAAR</span></div>
        <div onclick="switchTab('profile')" id="n-profile" class="nav-item"><i class="fa-solid fa-user-ninja"></i><span>AAP</span></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let tempMedia = "";

        // --- ANTI DOUBLE CLICK PROTECTOR ---
        window.shahiAction = async (btnId, fn) => {
            const btn = document.getElementById(btnId);
            btn.disabled = true;
            const oldText = btn.innerText;
            btn.innerText = "THARO HUKUM LIKHAYO JA RYO HAI...";
            try { await fn(); } catch(e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerText = oldText; }
        };

        // --- AUTH ---
        window.shahiLogin = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            shahiAction('login-btn', () => signInWithEmailAndPassword(auth, e, p));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('u-display').innerText = "@" + u.email.split('@')[0];
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('b-nav').classList.remove('hidden');
                syncRealtime();
            } else {
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('b-nav').classList.add('hidden');
            }
        });

        // --- NAVIGATION ---
        window.switchTab = (t) => {
            ['darbar', 'bazaar', 'profile'].forEach(id => {
                document.getElementById('sec-'+id).classList.add('hidden');
                document.getElementById('n-'+id).classList.remove('active');
            });
            document.getElementById('sec-'+t).classList.remove('hidden');
            document.getElementById('n-'+t).classList.add('active');
        };

        // --- REALTIME DATABASE SYNC ---
        function syncRealtime() {
            // Darbar Feed
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                const cont = document.getElementById('feed-container');
                cont.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    cont.innerHTML += `<div class="royal-card">
                        <p class="text-[10px] text-gold font-bold mb-2">@${p.author}</p>
                        <p class="text-sm">${p.text || ''}</p>
                        ${p.url ? `<img src="${p.url}" class="w-full rounded-lg mt-3 border border-[#333]">` : ''}
                    </div>`;
                });
            });

            // Bazaar Grid
            onSnapshot(collection(db, "products"), snap => {
                const grid = document.getElementById('bazaar-grid');
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    grid.innerHTML += `<div class="royal-card m-0 p-2 text-center">
                        <img src="${p.img}" class="h-32 w-full object-cover rounded-lg mb-2">
                        <h4 class="text-xs font-bold truncate">${p.name}</h4>
                        <p class="text-gold font-bold mb-2">₹${p.price}</p>
                        <button onclick="orderForm('${p.name}', '${p.link}')" class="gold-btn py-1 text-[10px]">KHARIDEIN</button>
                    </div>`;
                });
            });

            // Orders (Profile)
            onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
                const log = document.getElementById('order-log');
                log.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    log.innerHTML += `<div class="bg-[#151515] p-3 border-l-2 border-gold text-[11px]">
                        <b>${o.cust}</b> ne <b>${o.item}</b> mangwaya.<br>📞 ${o.phone}
                    </div>`;
                });
            });
        }

        // --- ACTIONS ---
        window.pickMedia = (type) => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res && res.event === "success") {
                    tempMedia = res.info.secure_url;
                    if(type === 'product') submitProduct();
                    else alert("Media Taiyaar! Post button dabayein.");
                }
            });
        };

        window.submitPost = () => {
            const txt = document.getElementById('post-input').value;
            shahiAction('post-btn', async () => {
                await addDoc(collection(db, "posts"), { 
                    author: user.email.split('@')[0], 
                    text: txt, 
                    url: tempMedia, 
                    time: serverTimestamp() 
                });
                document.getElementById('post-input').value = ""; tempMedia = "";
            });
        };

        async function submitProduct() {
            shahiAction('prod-btn', async () => {
                await addDoc(collection(db, "products"), { 
                    name: document.getElementById('p-name').value, 
                    price: document.getElementById('p-price').value, 
                    link: document.getElementById('p-link').value, 
                    img: tempMedia, 
                    time: serverTimestamp() 
                });
                tempMedia = ""; alert("Maal List Ho Gayo!");
            });
        }

        window.orderForm = async (name, link) => {
            const cust = prompt("Hukum, aapko naam?");
            const phone = prompt("Aapko mobile number?");
            if(cust && phone) {
                await addDoc(collection(db, "orders"), { item: name, cust, phone, time: serverTimestamp() });
                window.location.href = link;
            }
        };
    </script>
</body>
</html>
