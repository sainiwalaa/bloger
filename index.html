<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; color: #1a1a1a; }
        
        /* Shahi Header & Banner */
        .banner-container { height: 160px; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1590050752117-23aae33aa891?auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; border-radius: 0 0 25px 25px; relative; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #eee; object-cover; }

        /* Creator Profile Box */
        .creator-box { background: #fff; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; margin-top: 55px; }
        
        /* Social Links */
        .social-link { width: 45px; height: 45px; border-radius: 12px; display: flex; items-center: center; justify-content: center; font-size: 20px; color: white; transition: 0.3s; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #ff0000; }
        .fb { background: #1877f2; }
        .social-link:hover { transform: scale(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Product Card */
        .product-card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .gold-btn { background: #d4af37; color: #fff; font-weight: bold; border-radius: 10px; padding: 12px; width: 100%; transition: 0.3s; }
        .gold-btn:hover { background: #b38728; }
        
        /* Edit Elements */
        .hidden { display: none !important; }
        input, textarea { border: 1px solid #ddd !important; padding: 12px !important; border-radius: 10px !important; width: 100%; margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: #d4af37 !important; }
        .edit-icon { position: absolute; background: #fff; color: #d4af37; width: 25px; height: 25px; border-radius: 50%; display: flex; items-center: center; justify-content: center; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
    </style>
</head>
<body class="pb-10">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100">
            <h1 class="text-3xl font-black text-[#d4af37] text-center mb-8">SAINIWALAA</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" id="login-btn" class="gold-btn mt-4">SHOP OPEN KAREIN</button>
        </div>
    </div>

    <main id="shop-screen" class="hidden">
        
        <div class="banner-container">
            <button onclick="changeMedia('banner')" class="absolute top-4 right-4 bg-white/70 text-[#d4af37] p-2 rounded-full text-xs"><i class="fa-solid fa-pen"></i></button>
        </div>

        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                
                <div class="md:col-span-1">
                    <div class="creator-box relative">
                        <div class="relative w-24 h-24 mx-auto -mt-20 mb-4">
                            <img id="u-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full rounded-full border-4 border-white object-cover shadow-lg">
                            <button onclick="changeMedia('profile')" class="edit-icon bottom-0 right-0 border-2 border-white"><i class="fa-solid fa-camera"></i></button>
                        </div>

                        <h2 id="u-name" class="text-2xl font-black text-gray-800">Creator</h2>
                        <p id="u-bio" class="text-sm text-gray-500 mt-2 italic px-4leading-relaxed">Aapka shahi bio yahan dikhega...</p>
                        
                        <div class="flex justify-center gap-3 mt-6">
                            <a id="lnk-insta" href="#" target="_blank" class="social-link insta"><i class="fa-brands fa-instagram"></i></a>
                            <a id="lnk-yt" href="#" target="_blank" class="social-link yt"><i class="fa-brands fa-youtube"></i></a>
                            <a id="lnk-fb" href="#" target="_blank" class="social-link fb"><i class="fa-brands fa-facebook-f"></i></a>
                        </div>
                        <button onclick="toggleEdit('profile-edit')" class="text-[10px] uppercase font-bold text-[#d4af37] mt-6 tracking-widest">Update Profile</button>
                    </div>

                    <div id="profile-edit" class="hidden bg-white mt-4 p-6 rounded-2xl border border-gray-100 shadow-lg">
                        <input id="in-name" placeholder="Display Name">
                        <textarea id="in-bio" placeholder="Bio..."></textarea>
                        <input id="in-insta" placeholder="Instagram Link">
                        <input id="in-yt" placeholder="YouTube Link">
                        <input id="in-fb" placeholder="Facebook Link">
                        <button onclick="saveProfile()" class="gold-btn">Save Changes</button>
                    </div>
                </div>

                <div class="md:col-span-3 mt-10 md:mt-2">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-2xl font-bold text-[#333]">Hamari Shop</h3>
                        <button onclick="toggleEdit('prod-form')" class="bg-black text-white px-5 py-2 rounded-xl text-xs font-bold">+ Naya Maal</button>
                    </div>

                    <div id="prod-form" class="hidden bg-white p-6 rounded-2xl border-dashed border-2 border-[#d4af37] mb-8 shadow-inner">
                        <h4 class="text-sm text-[#d4af37] mb-4 uppercase font-bold">Product Jankari Bharein</h4>
                        <input id="p-name" placeholder="Item Name">
                        <input id="p-price" placeholder="Price ₹">
                        <textarea id="p-desc" placeholder="Product Description..." rows="2"></textarea>
                        <input id="p-link" placeholder="Buy Link (WhatsApp)">
                        
                        <div class="grid grid-cols-2 gap-3 mt-2">
                            <button onclick="uploadMedia()" class="bg-gray-100 p-3 rounded-xl text-xs"><i class="fa-solid fa-camera mr-2"></i>Photo Upload</button>
                            <button onclick="saveProduct()" id="prod-btn" class="gold-btn text-xs">LIST KAREIN</button>
                        </div>
                    </div>

                    <div id="shop-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, tempImg = "";

        // UI Helpers
        window.toggleEdit = (id) => document.getElementById(id).classList.toggle('hidden');

        // LOGIN
        window.login = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Fail: " + err.message));
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('u-name').innerText = u.email.split('@')[0].toUpperCase();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('shop-screen').classList.remove('hidden');
                syncShop();
            }
        });

        // SHOP SYNC
        function syncShop() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="relative">
                                <img src="${p.img}" class="w-full h-44 object-cover">
                                <button onclick="delProd('${doc.id}')" class="absolute top-2 right-2 bg-red-500/80 text-white w-6 h-6 rounded-full text-xs"><i class="fa-solid fa-trash"></i></button>
                            </div>
                            <div class="p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-bold text-sm truncate uppercase tracking-tight">${p.name}</h4>
                                    <p class="text-[#d4af37] font-bold text-base">₹${p.price}</p>
                                </div>
                                <p class="text-xs text-gray-500 leading-relaxed mb-4 h-10 overflow-hidden line-clamp-2">${p.desc || ''}</p>
                                <a href="${p.link}" target="_blank" class="block text-center bg-gray-100 py-3 rounded-xl text-xs font-bold hover:bg-gray-200">KHARIDEIN</a>
                            </div>
                        </div>`;
                });
            });
        }

        // EDIT ACTIONS
        window.saveProfile = () => {
            const bio = document.getElementById('in-bio').value;
            if(bio) document.getElementById('u-bio').innerText = bio;
            document.getElementById('lnk-insta').href = document.getElementById('in-insta').value || "#";
            document.getElementById('lnk-yt').href = document.getElementById('in-yt').value || "#";
            document.getElementById('lnk-fb').href = document.getElementById('in-fb').value || "#";
            toggleEdit('profile-edit');
        };

        window.changeMedia = (type) => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    const url = res.info.secure_url;
                    if(type === 'banner') document.getElementById('banner-bg').style.backgroundImage = `url('${url}')`;
                    else document.getElementById('u-img').src = url;
                }
            });
        };

        // PRODUCT ACTIONS
        window.uploadMedia = () => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    tempImg = res.info.secure_url;
                    alert("Hukum, Chitra taiyaar hai! Ab product save karein.");
                }
            });
        };

        window.saveProduct = async () => {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const d = document.getElementById('p-desc').value;
            const l = document.getElementById('p-link').value;
            if(!n || !p || !tempImg) return alert("Hukum, photo aur poori jankari bharein!");
            
            await addDoc(collection(db, "products"), { name: n, price: p, desc: d, link: l, img: tempImg, time: serverTimestamp() });
            tempImg = ""; document.getElementById('p-name').value = ""; document.getElementById('p-price').value = "";
            toggleEdit('prod-form');
        }

        window.delProd = async (id) => {
            if(confirm("Hukum, kya ye product mita dein?")) await deleteDoc(doc(db, "products", id));
        };
    </script>
</body>
</html>
