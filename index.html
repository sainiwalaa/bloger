<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA | Royal Rajasthani Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <style>
        :root { --gold: #FFD700; --royal-black: #050505; }
        body { background: var(--royal-black); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        .font-serif { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .royal-border { border: 1px solid rgba(255, 215, 0, 0.2); }
        .hidden { display: none !important; }

        /* Royal Button Glow */
        .royal-btn {
            background: linear-gradient(135deg, #FFD700, #B8860B);
            color: #000; font-weight: bold; border-radius: 12px;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
            padding: 12px; cursor: pointer; border: none;
        }
        .royal-btn:disabled { opacity: 0.6; filter: grayscale(1); }

        /* Input Styles */
        .royal-input {
            width: 100%; background: #111; border: 1px solid #333;
            padding: 12px; border-radius: 12px; color: #fff; outline: none;
        }
        .royal-input:focus { border-color: var(--gold); }

        /* Bottom Nav */
        nav { background: rgba(0,0,0,0.95); border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; max-width: 500px; }
        .nav-btn { color: #666; text-align: center; flex: 1; padding: 15px 0; transition: 0.3s; }
        .nav-btn.active { color: var(--gold); transform: scale(1.1); }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 pb-24">

    <header class="sticky top-0 z-50 bg-black/90 p-4 border-b-2 border-yellow-700/50 text-center backdrop-blur-md">
        <h1 class="gold-text font-serif text-2xl tracking-[6px]">SAINIWALAA</h1>
    </header>

    <section id="darbar-sec" class="page-sec p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="gold-text font-serif italic">Shahi Feed</h2>
            <button onclick="openWidget('post')" class="royal-btn text-xs px-4 py-2">+ Naya Post</button>
        </div>
        <div id="feed-container" class="space-y-6"></div>
    </section>

    <section id="bazaar-sec" class="page-sec hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="gold-text font-serif italic">Shahi Bazaar</h2>
            <button onclick="document.getElementById('bazaar-form').classList.toggle('hidden')" class="royal-btn text-xs px-4 py-2">+ Maal List Karein</button>
        </div>
        
        <div id="bazaar-form" class="bg-zinc-900 p-5 rounded-3xl mb-8 hidden border royal-border shadow-2xl">
            <input id="p-name" type="text" placeholder="Maal ko Naam" class="royal-input mb-3">
            <input id="p-price" type="number" placeholder="Keemat (₹)" class="royal-input mb-3">
            <textarea id="p-desc" placeholder="Maal ki Jankari" class="royal-input mb-3 h-20"></textarea>
            <input id="p-link" type="text" placeholder="External Weblink (https://...)" class="royal-input mb-3">
            <input type="hidden" id="p-img-url">
            <button onclick="openWidget('product')" class="w-full border border-zinc-700 py-3 rounded-xl text-xs mb-3 text-zinc-400 uppercase">1. Photo Chuno</button>
            <button id="save-product-btn" class="royal-btn w-full py-4 text-xs">2. MAAL SAVE KARO 👑</button>
        </div>
        <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
    </section>

    <section id="aap-sec" class="page-sec hidden p-6">
        <div class="flex flex-col items-center gap-4 py-8">
            <img id="main-avatar" src="https://via.placeholder.com/150" class="w-28 h-28 rounded-full border-4 border-black ring-2 ring-yellow-600 object-cover">
            <h2 class="text-2xl font-bold">Sunil Saini</h2>
            <p class="text-zinc-500 text-sm italic">Royal Rajasthani Creator</p>
            <div class="flex gap-10 mt-4 border-y border-zinc-900 w-full py-4 justify-center">
                <div class="text-center"><p class="text-xl font-bold">0</p><p class="text-[10px] text-zinc-500">POST</p></div>
                <div class="text-center"><p class="text-xl font-bold">0</p><p class="text-[10px] text-zinc-500">SAATHI</p></div>
            </div>
        </div>
        <div id="my-shop-container">
            <h3 class="gold-text font-serif text-center mb-4">Mharo Bazaar</h3>
            <div id="my-products" class="grid grid-cols-2 gap-4"></div>
        </div>
    </section>

    <div id="order-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 border royal-border p-8 rounded-[2rem] w-full shadow-2xl">
            <h3 class="gold-text text-xl font-serif mb-6 italic text-center">Kharidari Darj Karein</h3>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Tharo Naam" class="royal-input">
                <input type="number" id="cust-phone" placeholder="Mobile Number" class="royal-input">
                <textarea id="cust-address" placeholder="Pura Pata (Address)" class="royal-input h-24"></textarea>
                <button id="final-order-btn" class="royal-btn w-full py-4 uppercase tracking-widest">Sauda Pakko Karo</button>
            </div>
        </div>
    </div>

    <nav class="flex justify-around items-center">
        <button onclick="switchPage('darbar')" class="nav-btn active" id="btn-darbar"><i class="fa-solid fa-crown text-xl"></i><p class="text-[8px] mt-1">DARBAR</p></button>
        <button onclick="switchPage('bazaar')" class="nav-btn" id="btn-bazaar"><i class="fa-solid fa-shop text-xl"></i><p class="text-[8px] mt-1">BAZAAR</p></button>
        <button onclick="switchPage('aap')" class="nav-btn" id="btn-aap"><i class="fa-solid fa-user-ninja text-xl"></i><p class="text-[8px] mt-1">AAP</p></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- PROTECTION SYSTEM ---
        window.safeClick = async (btn, callback) => {
            const oldText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = "Hukum, kaam ho ryo hai...";
            try { await callback(); } 
            finally { setTimeout(() => { btn.disabled = false; btn.innerHTML = oldText; }, 2000); }
        };

        // --- CLOUDINARY UPLOAD ---
        window.openWidget = (type) => {
            cloudinary.openUploadWidget({
                cloudName: "dvp58lgh3", uploadPreset: "ml_default",
                resourceType: type === 'post' ? 'auto' : 'image'
            }, (err, res) => {
                if (!err && res.event === "success") {
                    const url = res.info.secure_url;
                    if(type === 'post') {
                        // Check video duration (90s limit)
                        if(res.info.resource_type === 'video' && res.info.duration > 90) {
                            alert("Hukum, video 90s se bada nahi hona chahiye!"); return;
                        }
                        push(ref(db, 'posts'), { url, type: res.info.resource_type, likesCount: 0, time: serverTimestamp() });
                    } else { document.getElementById('p-img-url').value = url; alert("Photo chadh gayi!"); }
                }
            });
        };

        // --- BAZAAR SAVE ---
        document.getElementById('save-product-btn').onclick = function() {
            safeClick(this, async () => {
                const name = document.getElementById('p-name').value;
                const price = document.getElementById('p-price').value;
                const desc = document.getElementById('p-desc').value;
                const link = document.getElementById('p-link').value;
                const img = document.getElementById('p-img-url').value;
                if(name && price && img) {
                    await push(ref(db, 'products'), { name, price, desc, link, img, time: serverTimestamp() });
                    document.getElementById('bazaar-form').classList.add('hidden');
                }
            });
        };

        // --- RENDER DARBAR & BAZAAR ---
        onValue(ref(db, 'posts'), (snap) => {
            const cont = document.getElementById('feed-container'); cont.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); const id = c.key;
                const media = d.type === 'video' ? `<video src="${d.url}" controls class="w-full"></video>` : `<img src="${d.url}" class="w-full object-cover" ondblclick="toggleLike('${id}')">`;
                cont.innerHTML += `<div class="bg-zinc-900 rounded-3xl mb-6 royal-border overflow-hidden">${media}<div class="p-4"><button onclick="toggleLike('${id}')"><i class="fa-solid fa-heart text-red-500"></i> <span class="text-xs">${d.likesCount || 0}</span></button></div></div>`;
            });
        });

        onValue(ref(db, 'products'), (snap) => {
            const list = document.getElementById('bazaar-list'); list.innerHTML = "";
            const myShop = document.getElementById('my-products'); myShop.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const card = `<div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-3"><img src="${d.img}" class="w-full h-28 object-cover rounded-xl mb-2"><h4 class="gold-text text-[10px] font-bold truncate">${d.name}</h4><p class="text-xs mb-2">₹${d
