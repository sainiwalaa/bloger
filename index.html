<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- 1. LOGIN SYSTEM (REFRESH SAFE) ---
        setPersistence(auth, browserLocalPersistence).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('app-box').classList.remove('hidden');
                    loadDarbar();
                } else {
                    document.getElementById('auth-box').classList.remove('hidden');
                    document.getElementById('app-box').classList.add('hidden');
                }
            });
        });

        // --- 2. NEW LIST-STYLE POST FORM (Text, Image, Video) ---
        window.openPostForm = () => {
            const caption = prompt("Kayi likhna chaho ho? (Text/Caption):");
            const type = confirm("Video hai? (Cancel for Image)") ? "video" : "image";
            
            cloudinary.openUploadWidget({ 
                cloudName: "dprl2lyih", 
                uploadPreset: "ml_default",
                resourceType: type
            }, (err, res) => {
                if (!err && res.event === "success") {
                    push(ref(db, 'posts'), {
                        url: res.info.secure_url,
                        caption: caption || "",
                        type: type,
                        uid: auth.currentUser.uid,
                        time: serverTimestamp()
                    }).then(() => alert("Ghani Khamma! Post daraj ho gayi. 🚩"));
                }
            });
        };

        // --- 3. LOAD DARBAR (LIST VIEW LIKE INSTAGRAM) ---
        function loadDarbar() {
            onValue(ref(db, 'posts'), s => {
                const feed = document.getElementById('darbar-list');
                feed.innerHTML = "";
                if(s.exists()) {
                    Object.values(s.val()).reverse().forEach(p => {
                        const media = p.type === 'video' 
                            ? `<video src="${p.url}" controls class="w-full h-auto"></video>`
                            : `<img src="${p.url}" class="w-full h-auto">`;
                        
                        feed.innerHTML += `
                        <div class="bg-black border-b border-gray-900 mb-6 pb-4">
                            <div class="p-3 flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-yellow-600 border border-yellow-400"></div>
                                <b class="text-xs gold-text italic tracking-widest">SainiWalaa User</b>
                            </div>
                            ${media}
                            <div class="p-3">
                                <p class="text-sm text-gray-200 mt-2"><b class="gold-text mr-2">SainiWalaa</b> ${p.caption}</p>
                                <span class="text-[10px] text-gray-600 uppercase mt-1 block">Abhi Abhi</span>
                            </div>
                        </div>`;
                    });
                }
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&display=swap');
        body { font-family: 'Marcellus', serif; background-color: #000; color: #fff; }
        .gold-text { color: #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app-box" class="max-w-[500px] mx-auto min-h-screen relative hidden pb-20">
        <header class="p-4 border-b border-gray-900 flex justify-between items-center sticky top-0 bg-black z-50">
            <h1 class="text-2xl font-bold gold-text italic">SAINIWALAA</h1>
            <div class="flex gap-6">
                <i class="fa-solid fa-plus-square text-xl cursor-pointer" onclick="openPostForm()"></i>
                <i class="fa-solid fa-heart text-xl"></i>
            </div>
        </header>

        <main id="darbar-list" class="w-full"></main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-black border-t border-gray-900 p-4 flex justify-around text-gray-500">
            <i class="fa-solid fa-house text-white"></i>
            <i class="fa-solid fa-search"></i>
            <i class="fa-solid fa-clapperboard"></i>
            <i class="fa-solid fa-bag-shopping"></i>
            <i class="fa-solid fa-circle-user text-yellow-500"></i>
        </nav>
    </div>

    <div id="auth-box" class="h-screen flex flex-col justify-center items-center p-10 bg-black">
        <h1 class="text-4xl gold-text mb-10 tracking-[8px] italic">SAINIWALAA</h1>
        <div class="w-full max-w-xs flex flex-col gap-6">
            <input type="email" id="email" placeholder="Email" class="bg-transparent border-b border-gray-800 p-2 outline-none">
            <input type="password" id="pass" placeholder="Password" class="bg-transparent border-b border-gray-800 p-2 outline-none">
            <button onclick="signInWithEmailAndPassword(getAuth(), email.value, pass.value)" class="bg-yellow-600 text-black p-3 rounded font-bold uppercase tracking-widest">Login 🚩</button>
        </div>
    </div>

</body>
</html>
