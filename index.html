<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Luxury Creator Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        .saini-header-container { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .header-bg-animate { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(255, 255, 255, 0) 70%); animation: pulse-bg 8s ease-in-out infinite; z-index: -1; }
        @keyframes pulse-bg { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }

        .saini-header { background: linear-gradient(to right, #b8860b, #d4af37, #b8860b, #d4af37); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        .tagline-anim { letter-spacing: 0.3em; font-weight: 800; font-size: 9px; color: #888; position: relative; display: inline-block; }
        .banner-box { height: 280px; position: relative; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .profile-side { position: absolute; bottom: -40px; left: 30px; display: flex; align-items: flex-end; gap: 20px; z-index: 50; }
        .p-img-main { width: 140px; height: 140px; border-radius: 30px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); object-fit: cover; background: #fff; }
        .nav-active { border-bottom: 3px solid var(--gold); color: var(--gold) !important; font-weight: 800; }
        .hidden { display: none !important; }
        .product-card { transition: 0.3s; border: 1px solid #eee; border-radius: 24px; background: #fff; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .social-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 50%; color: white; font-size: 14px; transition: 0.3s; }

        .creator-scroll { display: flex; gap: 40px; animation: creatorMove 40s linear infinite; width: max-content; }
        @keyframes creatorMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .creator-card { display: flex; align-items: center; gap: 10px; flex-shrink: 0; pointer-events: none; } /* Footer click disabled */
        .creator-card img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #d4af37; object-fit: cover; }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <h1 class="raj-font text-4xl animate-bounce text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <section id="auth-box" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-md bg-white p-10 rounded-[40px] shadow-2xl border border-gray-100 text-center">
            <h2 class="raj-font text-5xl text-[#d4af37] mb-2">S</h2>
            <p class="text-[10px] tracking-[0.3em] text-gray-400 mb-10 uppercase font-bold">The Royal Marketplace</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-6 bg-gray-50 rounded-2xl outline-none border focus:border-[#d4af37]">
            <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-2xl font-bold shadow-lg">GET ACCESS</button>
        </div>
    </section>

    <main id="app" class="hidden">
        <header class="saini-header-container py-6 text-center">
            <div class="header-bg-animate"></div>
            <h1 class="raj-font text-4xl saini-header font-black tracking-widest cursor-pointer" onclick="location.reload()">SAINIWALAA</h1>
            <p class="tagline-anim uppercase">Premium Influencer Marketplace</p>
            
            <div class="flex justify-center gap-8 mt-6 text-[11px] font-bold uppercase tracking-tighter text-gray-400">
                <button onclick="nav('feed')" id="n-feed" class="pb-1">Trending</button>
                <button onclick="viewProfile(curU.uid)" id="n-shop" class="pb-1">My Studio</button>
                <button onclick="nav('orders')" id="n-orders" class="pb-1">Orders</button>
                <button onclick="logout()" class="text-red-400"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <section id="sec-shop" class="hidden">
            <div id="banner-container" class="banner-box bg-gray-200">
                <img id="b-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                <div id="b-text-container" class="relative z-10 px-10 hidden">
                    <h2 id="b-text-display" class="raj-font font-bold leading-tight"></h2>
                </div>
                <div class="profile-side">
                    <div class="relative group">
                        <img id="p-img" src="" class="p-img-main">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/40 text-white rounded-[30px] opacity-0 group-hover:opacity-100 cursor-pointer owner-btn hidden">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" class="hidden" onchange="upMedia('profile', this)">
                        </label>
                    </div>
                    <div class="mb-8 text-left">
                        <h2 id="u-name" class="raj-font text-2xl font-bold text-white drop-shadow-md">Creator Name</h2>
                        <div id="u-socials" class="flex gap-2 mt-1"></div>
                        <button onclick="openEditModal()" class="mt-2 bg-black/50 backdrop-blur-md text-white px-6 py-2 rounded-full text-[10px] font-bold owner-btn hidden">EDIT PROFILE</button>
                    </div>
                </div>
            </div>

            <div class="mt-16 px-6 max-w-4xl mx-auto">
                <div id="u-bio" class="text-center p-6 bg-white rounded-[30px] border shadow-sm italic text-gray-500">Mhara Swagat hai!</div>
                <div id="add-prod-box" class="mt-10 hidden">
                    <div class="bg-white p-8 rounded-[40px] border-2 border-dashed border-gray-200">
                        <h3 class="raj-font text-lg mb-6">List New Creation</h3>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input id="pn" placeholder="Item Name" class="p-4 bg-gray-50 rounded-2xl border outline-none">
                            <input id="pp" placeholder="Price (₹)" type="number" class="p-4 bg-gray-50 rounded-2xl border outline-none">
                            <input id="pl" placeholder="Link (Website/WhatsApp)" class="p-4 bg-gray-50 rounded-2xl border outline-none col-span-2">
                        </div>
                        <textarea id="pd" placeholder="Product Story..." class="w-full p-4 bg-gray-50 rounded-2xl h-24 mb-4 border outline-none"></textarea>
                        <div class="flex items-center gap-4">
                            <input type="file" id="pf" onchange="preProd(this)" class="hidden" accept="image/*">
                            <label for="pf" id="pf-label" class="flex-1 bg-gray-100 p-4 rounded-2xl text-center cursor-pointer font-bold text-gray-400">CHOOSE PHOTO</label>
                            <button onclick="pubProd()" id="pub-btn" class="hidden flex-1 bg-black text-white p-4 rounded-2xl font-bold">PUBLISH</button>
                        </div>
                    </div>
                </div>
                <div id="grid-shop" class="grid grid-cols-2 gap-4 mt-10 mb-20"></div>
            </div>
        </section>

        <section id="sec-feed" class="hidden px-6 pt-6">
            <div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-4xl mx-auto">
            <h2 class="raj-font text-3xl mb-4 text-[#d4af37]">Recent Orders</h2>
            <div id="list-orders" class="grid gap-4 md:grid-cols-2"></div>
        </section>

        <footer class="bg-black text-white pt-10 pb-6 mt-20 overflow-hidden">
            <div class="text-center max-w-4xl mx-auto px-6">
                <h2 class="raj-font text-3xl text-[#d4af37] mb-2">SAINIWALAA Network</h2>
                <p class="text-gray-300 text-sm leading-relaxed">The Premium Influencer Marketplace</p>
            </div>
            <div class="mt-10 overflow-hidden w-full bg-zinc-900 py-4">
                <div id="creator-scroll" class="creator-scroll"></div>
            </div>
            <div class="text-center mt-8 text-xs text-gray-500">© 2026 SAINIWALAA</div>
        </footer>
    </main>

    <div id="edit-modal" class="hidden fixed inset-0 z-[1200] bg-black/80 flex items-center justify-center p-6 overflow-y-auto">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 my-10">
            <h3 class="raj-font text-xl mb-6 text-center">Edit Profile</h3>
            <div class="space-y-4">
                <input id="en" placeholder="Display Name" class="w-full p-4 bg-gray-50 rounded-2xl border">
                <input id="eb" placeholder="Bio Message" class="w-full p-4 bg-gray-50 rounded-2xl border">
                <div class="grid grid-cols-2 gap-3">
                    <input id="e-insta" placeholder="Insta" class="p-4 bg-gray-50 rounded-2xl border">
                    <input id="e-wa" placeholder="WhatsApp Number" class="p-4 bg-gray-50 rounded-2xl border">
                </div>
                <button onclick="saveProfile()" class="w-full bg-[#d4af37] text-white py-5 rounded-2xl font-bold">SAVE CHANGES</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full text-gray-400 py-2">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[1100] bg-black/90 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[50px] p-8 text-center shadow-2xl">
            <h3 class="raj-font text-2xl mb-6 text-[#d4af37]">Finalize Order</h3>
            <div class="space-y-3 mb-6">
                <input id="on" placeholder="Apka Naam" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <input id="op" placeholder="Mobile Number" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <input id="oc" placeholder="Shehar (City)" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none">
                <select id="os" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none font-bold text-gray-600">
                    <option value="WhatsApp">Samparq: WhatsApp Se Karein</option>
                    <option value="Call">Samparq: Direct Call Karein</option>
                </select>
            </div>
            <button onclick="confirmPurchase()" class="w-full bg-black text-white py-5 rounded-3xl font-black shadow-lg">CONFIRM ORDER</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-4 text-gray-400 text-xs font-bold uppercase">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, query, where, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.curU = null;
        let allProds = [];

        onAuthStateChanged(auth, u => {
            document.getElementById('loading').classList.add('hidden');
            if(u) { curU = u; document.getElementById('app').classList.remove('hidden'); document.getElementById('auth-box').classList.add('hidden'); initApp(); }
            else { document.getElementById('auth-box').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }
        });

        function initApp() {
            nav('feed');
            onSnapshot(collection(db, "products"), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed', false);
            });

            // Order Notifications for Creator
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                const list = document.getElementById('list-orders');
                if(!s.empty) {
                    const latest = s.docChanges().filter(c => c.type === "added");
                    if(latest.length > 0 && !window.firstLoad) alert("Naya Order Aaya Hai!");
                    window.firstLoad = false;
                }
                list.innerHTML = s.docs.map(d => {
                    const o = d.data();
                    return `<div class="p-6 bg-white rounded-[35px] border shadow-sm">
                        <h4 class="font-extrabold">${o.item}</h4>
                        <div class="text-xs text-gray-500 mt-2">
                            <p>Buyer: ${o.customer}</p>
                            <p>Phone: ${o.phone}</p>
                            <p>City: ${o.city}</p>
                            <p>Method: ${o.samparq}</p>
                            <p class="text-[#d4af37] font-bold">₹${o.price}</p>
                        </div>
                    </div>`;
                }).join('');
            });
            window.firstLoad = true;

            onSnapshot(collection(db,"users"), snap => {
                const creatorBox = document.getElementById("creator-scroll");
                creatorBox.innerHTML="";
                let list = [];
                snap.forEach(doc => list.push({id: doc.id, ...doc.data()}));
                [...list, ...list].forEach(d => {
                    creatorBox.innerHTML += `<div class="creator-card"><img src="${d.profile || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+d.id}"><span>@${d.name || "Creator"}</span></div>`;
                });
            });
        }

        window.renderGrid = (data, cid, isOwner) => {
            const g = document.getElementById(cid);
            g.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="w-full aspect-square object-cover cursor-pointer" onclick="viewProfile('${p.creatorId}')">
                    <div class="p-4">
                        <p class="text-[9px] font-black text-[#d4af37] uppercase cursor-pointer" onclick="viewProfile('${p.creatorId}')">@${p.creatorName}</p>
                        <h4 class="font-bold text-sm truncate">${p.name}</h4>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="font-black">₹${p.price}</span>
                            <button onclick="orderForm('${p.id}')" class="bg-black text-white text-[9px] px-4 py-2 rounded-xl font-bold">GET IT</button>
                        </div>
                    </div>
                </div>`).join('');
        };

        window.viewProfile = async (uid) => {
            nav('shop');
            const isMe = (uid === curU.uid);
            document.querySelectorAll('.owner-btn').forEach(el => el.classList.toggle('hidden', !isMe));
            document.getElementById('add-prod-box').classList.toggle('hidden', !isMe);
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('u-name').innerText = d.name || "Creator";
                document.getElementById('p-img').src = d.profile || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
            }
            const qProds = query(collection(db, "products"), where("creatorId", "==", uid));
            onSnapshot(qProds, s => renderGrid(s.docs.map(d => ({id:d.id, ...d.data()})), 'grid-shop', isMe));
        };

        window.confirmPurchase = async () => {
            const n = document.getElementById('on').value, p = document.getElementById('op').value, c = document.getElementById('oc').value, s = document.getElementById('os').value;
            if(!n || !p || !c) return alert("Poori details bharein");
            
            await addDoc(collection(db, "orders"), {
                item: window.activeOrder.name,
                price: window.activeOrder.price,
                customer: n, phone: p, city: c, samparq: s,
                creatorId: window.activeOrder.creatorId,
                time: serverTimestamp()
            });
            alert("Order Submit Ho Gaya! Creator aapse jald samparq karenge.");
            document.getElementById('order-modal').classList.add('hidden');
        };

        window.orderForm = (id) => { window.activeOrder = allProds.find(x => x.id === id); document.getElementById('order-modal').classList.remove('hidden'); };
        window.nav = (t) => { ['feed','shop','orders'].forEach(s => { document.getElementById('sec-'+s).classList.toggle('hidden', s !== t); document.getElementById('n-'+s).classList.toggle('nav-active', s === t); }); };
        window.authAction = () => { const e = document.getElementById('email').value, p = document.getElementById('pass').value; signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p)); };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.upMedia = (t, i) => { const r = new FileReader(); r.onload = async e => { await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, {merge:true}); location.reload(); }; r.readAsDataURL(i.files[0]); };
    </script>
</body>
</html>
