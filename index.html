<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Aapka asli Firebase link
        const firebaseConfig = {
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // POST DALNE KA SYSTEM
        window.bhejoPost = () => {
            const msg = document.getElementById('postInput').value;
            if(msg) {
                push(ref(db, 'darbar'), { sandesh: msg });
                document.getElementById('postInput').value = "";
            }
        };

        // BAZAAR ME MAAL DALNA
        window.bhejoMaal = () => {
            const naam = prompt("Saaman ka naam:");
            const price = prompt("Keemat (₹):");
            if(naam && price) {
                push(ref(db, 'bazaar'), { naam: naam, price: price });
            }
        };

        // DATA DIKHANE KA SYSTEM (REAL-TIME)
        onValue(ref(db, 'darbar'), (snap) => {
            const list = document.getElementById('darbarList');
            list.innerHTML = "";
            snap.forEach(child => {
                list.innerHTML += `<div class="bg-gray-800 p-3 mb-2 rounded">${child.val().sandesh}</div>`;
            });
        });

        onValue(ref(db, 'bazaar'), (snap) => {
            const list = document.getElementById('bazaarList');
            list.innerHTML = "";
            snap.forEach(child => {
                list.innerHTML += `<div class="border border-yellow-600 p-2 rounded">
                    <b>${child.val().naam}</b><br>₹${child.val().price}
                </div>`;
            });
        });
    </script>
</head>
<body class="bg-black text-white p-5 font-sans">
    <h1 class="text-yellow-500 text-2xl font-bold mb-5 italic">SAINIWALAA</h1>

    <div class="mb-10">
        <h2 class="text-lg mb-2">🚩 DARBAR (Feed)</h2>
        <input id="postInput" class="bg-gray-900 w-full p-2 rounded mb-2" placeholder="Kuch likho hukum...">
        <button onclick="bhejoPost()" class="bg-yellow-600 text-black px-4 py-1 rounded font-bold">POST</button>
        <div id="darbarList" class="mt-4"></div>
    </div>

    <hr class="border-gray-800 mb-10">

    <div>
        <h2 class="text-lg mb-2">🛒 BAZAAR (Dukaan)</h2>
        <button onclick="bhejoMaal()" class="bg-orange-600 px-4 py-1 rounded font-bold mb-4">+ MAAL JODO</button>
        <div id="bazaarList" class="grid grid-cols-2 gap-2"></div>
    </div>
</body>
</html>
