<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .tab-btn.active { color: #d4af37; border-bottom: 3px solid #d4af37; font-weight: bold; }
        .hidden { display: none !important; }
        .banner { height: 200px; background-size: cover; background-position: center; border-radius: 0 0 30px 30px; position: relative; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #fff; position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); box-shadow: 0 5px 15px rgba(0,0,0,0.1); object-fit: cover; background: #eee; }
        .social-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; items-center: center; justify-content: center; color: white; transition: 0.3s; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #ff0000; }
        .fb { background: #1877f2; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center border">
            <h1 class="raj-font text-3xl text-[#d4af37] mb-8">SAINIWALAA</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 border rounded-2xl mb-3 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6 outline-none">
            <button onclick="handleAuth()" class="w-full bg-[#d4af37] text-white p-4 rounded-2xl font-bold">JOIN DARBAR</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        
        <div id="banner-img" class="banner" style="background-image: url('https://images.unsplash.com/photo-1590050752117-23aae33aa891?q=80&w=1000');">
            <button onclick="uploadMedia('banner')" class="absolute top-4 right-4 bg-white/50 p-2 rounded-full text-xs text-white"><i class="fa-solid fa-pen"></i></button>
            <div class="relative">
                <img id="profile-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-pic">
                <button onclick="uploadMedia('profile')" class="absolute bottom-[-50px] left-[55%] bg-[#d4af37] text-white p-2 rounded-full border-2 border-white text-[10px]"><i class="fa-solid fa-camera"></i></button>
            </div>
        </div>

        <div class="mt-16 text-center px-6">
            <h2 id="disp-name" class="text-2xl font-black text-gray-800">Maharaja Creator</h2>
            <p id="disp-bio" class="text-gray-500 text-sm mt-2 italic">Aapka shahi parichay...</p>
            
            <div class="flex justify-center gap-4 mt-6">
                <a id="link-insta" href="#" target="_blank" class="social-icon insta"><i class="fa-brands fa-instagram"></i></a>
                <a id="link-yt" href="#" target="_blank" class="social-icon yt"><i class="fa-brands fa-youtube"></i></a>
                <a id="link-fb" href="#" target="_blank" class="social-icon fb"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
            <button onclick="toggleBox('edit-profile')" class="mt-4 text-[10px] font-bold text-[#d4af37] uppercase tracking-tighter">Edit Profile & Links</button>
        </div>

        <div id="edit-profile" class="hidden max-w-md mx-auto p-6 bg-white rounded-3xl mt-4 shadow-lg border">
            <input id="in-name" placeholder="Display Name">
            <textarea id="in-bio" placeholder="Bio..."></textarea>
            <input id="in-insta" placeholder="Insta Link">
            <input id="in-yt" placeholder="YouTube Link">
            <input id="in-fb" placeholder="FB Link">
            <button onclick="saveProfile()" class="w-full bg-black text-white p-3 rounded-xl font-bold">SAVE PROFILE</button>
        </div>

        <div class="flex justify-around mt-10 border-b bg-white sticky top-0 z-40">
            <button onclick="showTab('shop')" id="tab-shop-btn" class="tab-btn active p-4 text-xs font-bold uppercase">Shop</button>
            <button onclick="showTab('orders')" id="tab-orders-btn" class="tab-btn p-4 text-xs font-bold uppercase">Orders</button>
        </div>

        <section id="sec-shop" class="p-4 max-w-4xl mx-auto">
            <div class="bg-white border-2 border-dashed border-[#d4af37]/30 p-6 rounded-3xl mb-8">
                <h3 class="font-bold text-sm mb-4">LIST NEW PRODUCT</h3>
                <input id="p-name" placeholder="Item Name">
                <input id="p-price" placeholder="Price ₹">
                <textarea id="p-desc" placeholder="Product details..."></textarea>
                <button onclick="uploadMedia('product')" id="p-upload-btn" class="w-full border-2 border-[#d4af37] text-[#d4af37] p-3 rounded-xl font-bold mb-3">ADD PHOTO</button>
                <button onclick="saveProduct()" id="p-save-btn" class="hidden w-full bg-[#d4af37] text-white p-3 rounded-xl font-bold shadow-lg">SAVE & PUBLISH</button>
            </div>
            <div id="shop-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </section>

        <section id="sec-orders" class="p-6 hidden max-w-2xl mx-auto">
            <h3 class="font-bold text-lg mb-6 text-[#d4af37]">Recent Orders</h3>
            <div id="orders-list" class="space-y-4"></div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, tempImg = "";

        window.toggleBox = (id) => document.getElementById(id).classList.toggle('hidden');

        // Auth
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                syncShop(); syncOrders();
            }
        });

        // Tabs
        window.showTab = (t) => {
            document.getElementById('sec-shop').classList.toggle('hidden', t !== 'shop');
            document.getElementById('sec-orders').classList.toggle('hidden', t !== 'orders');
            document.getElementById('tab-shop-btn').classList.toggle('active', t === 'shop');
            document.getElementById('tab-orders-btn').classList.toggle('active', t === 'orders');
        };

        // Media Upload
        window.uploadMedia = (type) => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    const url = res.info.secure_url;
                    if(type === 'banner') document.getElementById('banner-img').style.backgroundImage = `url('${url}')`;
                    else if(type === 'profile') document.getElementById('profile-img').src = url;
                    else {
                        tempImg = url;
                        document.getElementById('p-save-btn').classList.remove('hidden');
                        document.getElementById('p-upload-btn').innerText = "✓ PHOTO READY";
                    }
                }
            });
        };

        // Profile Logic
        window.saveProfile = () => {
            document.getElementById('disp-name').innerText = document.getElementById('in-name').value || "Creator";
            document.getElementById('disp-bio').innerText = document.getElementById('in-bio').value || "Bio updated!";
            document.getElementById('link-insta').href = document.getElementById('in-insta').value || "#";
            document.getElementById('link-yt').href = document.getElementById('in-yt').value || "#";
            document.getElementById('link-fb').href = document.getElementById('in-fb').value || "#";
            toggleBox('edit-profile');
        };

        // Product Logic
        window.saveProduct = async () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, d = document.getElementById('p-desc').value;
            if(!n || !p || !tempImg) return alert("Hukum, poori jankari bharein!");
            await addDoc(collection(db, "products"), { name: n, price: p, desc: d, img: tempImg, time: serverTimestamp(), creatorId: user.uid });
            alert("Maal Shahi Shop mein List ho gaya!");
            tempImg = ""; document.getElementById('p-save-btn').classList.add('hidden');
            document.getElementById('p-upload-btn').innerText = "ADD PHOTO";
        };

        function syncShop() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl overflow-hidden border shadow-sm relative">
                            <button onclick="delP('${d.id}')" class="absolute top-2 right-2 bg-red-500 text-white w-5 h-5 rounded-full text-[8px]"><i class="fa-solid fa-trash"></i></button>
                            <img src="${p.img}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="font-bold text-[11px] truncate">${p.name}</h4>
                                <p class="text-[#d4af37] font-bold text-xs">₹${p.price}</p>
                                <button onclick="buyNow('${p.name}')" class="w-full bg-black text-white text-[9px] py-2 rounded-lg mt-2">ORDER NOW</button>
                            </div>
                        </div>`;
                });
            });
        }

        // Order Logic
        window.buyNow = async (itemName) => {
            const name = prompt("Aapka Naam?"), phone = prompt("WhatsApp No?");
            if(name && phone) {
                await addDoc(collection(db, "orders"), { itemName, custName: name, custPhone: phone, time: serverTimestamp() });
                alert("Hukum, Order bhej diya gaya hai!");
            }
        };

        function syncOrders() {
            onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
                const list = document.getElementById('orders-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border-l-4 border-[#d4af37] shadow-sm">
                            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">New Order</p>
                            <h4 class="font-bold text-gray-800">${o.itemName}</h4>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-xs text-gray-500"><i class="fa-solid fa-user mr-1"></i> ${o.custName}</span>
                                <a href="tel:${o.custPhone}" class="text-[#d4af37] font-bold text-xs"><i class="fa-solid fa-phone mr-1"></i> ${o.custPhone}</a>
                            </div>
                        </div>`;
                });
            });
        }

        window.delP = async (id) => { if(confirm("Mita dein?")) await deleteDoc(doc(db, "products", id)); };
    </script>
</body>
</html>
