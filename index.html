<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn.active { color: #d4af37; border-bottom: 4px solid #d4af37; font-weight: 800; }
        .hidden { display: none !important; }
        .banner-box { height: 200px; background: #eee no-repeat center; background-size: cover; border-radius: 0 0 40px 40px; position: relative; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 5px solid #fff; position: absolute; bottom: -55px; left: 50%; transform: translateX(-50%); object-fit: cover; background: #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .shahi-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .img-frame { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f9f9f9; }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }
        .social-btn { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; transition: 0.2s; }
        input[type="file"] { display: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm text-center">
            <h1 class="raj-font text-4xl text-[#d4af37] mb-2">SAINIWALAA</h1>
            <p class="text-[10px] text-gray-400 mb-10 tracking-widest uppercase font-bold">Creator Darbar</p>
            <div id="auth-inputs">
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 border-b mb-4 outline-none focus:border-[#d4af37]">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border-b mb-8 outline-none focus:border-[#d4af37]">
                <button id="main-auth-btn" onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-full font-bold mb-4 shadow-xl">LOG IN</button>
                <p id="toggle-text" class="text-xs text-gray-500">
                    Naya account chahiye? <button onclick="toggleAuthMode()" class="text-[#d4af37] font-bold underline">Register Karein</button>
                </p>
            </div>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md flex justify-around border-b shadow-sm">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn active p-4 text-[10px] font-bold uppercase tracking-widest">Duniya ka Maal</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn p-4 text-[10px] font-bold uppercase tracking-widest">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn p-4 text-[10px] font-bold uppercase tracking-widest">Orders</button>
            <button onclick="logout()" class="p-4 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-feed" class="p-4 max-w-6xl mx-auto">
            <h2 class="raj-font text-xl mb-6 text-gray-800">Trending Now</h2>
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="sec-shop" class="hidden">
            <div id="banner-ui" class="banner-box">
                <label class="absolute top-4 right-4 bg-black/20 p-2 rounded-full cursor-pointer text-white backdrop-blur-md hidden owner-only" id="banner-label">
                    <i class="fa-solid fa-camera"></i>
                    <input type="file" onchange="uploadProfileMedia('banner', this)">
                </label>
                <div class="relative">
                    <img id="profile-ui" src="https://via.placeholder.com/150" class="profile-img">
                    <label class="absolute bottom-[-55px] left-[56%] bg-[#d4af37] text-white p-2 rounded-full border-2 border-white cursor-pointer hidden owner-only" id="profile-label">
                        <i class="fa-solid fa-pen text-[10px]"></i>
                        <input type="file" onchange="uploadProfileMedia('profile', this)">
                    </label>
                </div>
            </div>

            <div class="mt-16 text-center px-6">
                <h2 id="disp-name" class="text-2xl font-black text-gray-800">Shahi Creator</h2>
                <p id="disp-bio" class="text-xs text-gray-400 mt-1 italic font-medium">Bio update karein...</p>
                <div class="flex justify-center gap-3 mt-6">
                    <a id="btn-wa" href="#" target="_blank" class="social-btn hidden" style="background:#25D366"><i class="fa-brands fa-whatsapp"></i></a>
                    <a id="btn-insta" href="#" target="_blank" class="social-btn hidden" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)"><i class="fa-brands fa-instagram"></i></a>
                    <a id="btn-yt" href="#" target="_blank" class="social-btn hidden" style="background:#ff0000"><i class="fa-brands fa-youtube"></i></a>
                </div>
                <button id="edit-profile-btn" onclick="document.getElementById('edit-profile-box').classList.toggle('hidden')" class="mt-6 text-[9px] border px-6 py-2 rounded-full font-bold uppercase text-[#d4af37] tracking-widest bg-white shadow-sm hidden owner-only">Edit Profile & Socials</button>
            </div>

            <div id="edit-profile-box" class="hidden max-w-sm mx-auto p-6 mt-4 bg-white border rounded-[30px] shadow-lg">
                <input id="in-name" placeholder="Shop Name" class="w-full p-3 border-b mb-2 outline-none">
                <input id="in-bio" placeholder="Bio..." class="w-full p-3 border-b mb-4 outline-none">
                <input id="in-wa" placeholder="WhatsApp (91...)" class="w-full p-3 border-b mb-2 text-xs outline-none">
                <input id="in-insta" placeholder="Instagram URL" class="w-full p-3 border-b mb-2 text-xs outline-none">
                <input id="in-yt" placeholder="YouTube URL" class="w-full p-3 border-b mb-4 text-xs outline-none">
                <button onclick="saveProfileData()" class="w-full bg-black text-white p-4 rounded-2xl text-xs font-bold uppercase shadow-lg">Save Changes</button>
            </div>

            <div class="max-w-4xl mx-auto p-4 mt-12 hidden owner-only" id="add-maal-box">
                <div class="bg-white border-2 border-dashed border-[#d4af37]/30 p-8 rounded-[40px] text-center shadow-sm">
                    <h3 class="font-bold text-[#d4af37] mb-6 text-xs uppercase tracking-widest">Naya Maal Jodhein</h3>
                    <input id="p-name" placeholder="Item Name" class="w-full p-3 border-b mb-2 outline-none text-sm">
                    <input id="p-price" placeholder="Price ₹" class="w-full p-3 border-b mb-2 outline-none text-sm font-bold">
                    <input id="p-link" placeholder="External Link (Optional)" class="w-full p-3 border-b mb-6 outline-none text-[10px]">
                    <div id="p-preview-box" class="hidden mb-6"><img id="p-preview-img" class="h-32 mx-auto rounded-2xl"></div>
                    <div class="flex gap-3">
                        <label class="flex-1 border-2 border-black p-4 rounded-2xl cursor-pointer text-[10px] font-bold uppercase">
                            <i class="fa-solid fa-image mr-2"></i>Photo
                            <input type="file" onchange="previewProduct(this)">
                        </label>
                        <button id="pub-btn" onclick="publishProduct()" class="hidden flex-1 bg-[#d4af37] text-white p-4 rounded-2xl text-[10px] font-bold uppercase">Publish</button>
                    </div>
                </div>
            </div>

            <div class="max-w-4xl mx-auto p-4">
                <h3 id="shop-title" class="raj-font text-lg mt-14 mb-6 text-gray-800 text-center">Aapka Maal</h3>
                <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-xl mx-auto">
            <h3 class="raj-font text-xl mb-6 text-center">Recent Orders</h3>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <div id="checkout-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[35px] overflow-hidden shadow-2xl p-8">
             <h3 class="raj-font text-xl font-bold text-center mb-6">Confirm Order</h3>
             <input id="order-cust-name" type="text" placeholder="Aapka Naam" class="w-full p-3 border-b mb-4 outline-none">
             <input id="order-cust-phone" type="number" placeholder="WhatsApp Number" class="w-full p-3 border-b mb-8 outline-none">
             <input type="hidden" id="order-item-name">
             <input type="hidden" id="order-creator-id">
             <input type="hidden" id="order-item-link">
             <div class="flex gap-3">
                <button onclick="closeCheckout()" class="flex-1 text-gray-400 font-bold">CANCEL</button>
                <button id="order-confirm-btn" onclick="submitOrder()" class="flex-[2] bg-black text-white py-4 rounded-2xl font-bold text-xs">CONFIRM</button>
             </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, browserLocalPersistence);

        let currentUser = null;
        let authMode = 'login';
        let tempProdImg = "";

        window.toggleAuthMode = () => {
            authMode = (authMode === 'login') ? 'signup' : 'login';
            document.getElementById('main-auth-btn').innerText = (authMode === 'login') ? 'LOG IN' : 'SIGN UP';
        };

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return alert("Hukum, jankari bhariye!");
            if(authMode === 'login') {
                signInWithEmailAndPassword(auth, e, p).catch(err => alert("Galti: " + err.message));
            } else {
                createUserWithEmailAndPassword(auth, e, p).then(async (cred) => {
                    await setDoc(doc(db, "users", cred.user.uid), { name: e.split('@')[0], bio: "Shahi Creator", wa: "", insta: "", yt: "" });
                }).catch(err => alert(err.message));
            }
        };

        window.logout = () => {
            localStorage.removeItem('lastTab');
            signOut(auth).then(() => location.reload());
        }

        onAuthStateChanged(auth, u => {
            if(u) {
                currentUser = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const lastTab = localStorage.getItem('lastTab') || 'feed';
                showTab(lastTab);
                syncAll();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        async function loadProfile(uid) {
            const isOwner = (currentUser && currentUser.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isOwner ? el.classList.remove('hidden') : el.classList.add('hidden'));
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('disp-name').innerText = d.name || "Creator";
                document.getElementById('disp-bio').innerText = d.bio || "";
                document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
                document.getElementById('banner-ui').style.backgroundImage = d.banner ? `url(${d.banner})` : "none";
                const wa = document.getElementById('btn-wa');
                d.wa ? (wa.href = `https://wa.me/${d.wa}`, wa.classList.remove('hidden')) : wa.classList.add('hidden');
                const ins = document.getElementById('btn-insta');
                d.insta ? (ins.href = d.insta, ins.classList.remove('hidden')) : ins.classList.add('hidden');
            }
            syncMyShop(uid);
        }

        window.saveProfileData = async () => {
            const data = {
                name: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value,
                wa: document.getElementById('in-wa').value,
                insta: document.getElementById('in-insta').value,
                yt: document.getElementById('in-yt').value
            };
            await setDoc(doc(db, "users", currentUser.uid), data, { merge: true });
            document.getElementById('edit-profile-box').classList.add('hidden');
            loadProfile(currentUser.uid);
        };

        const compressImg = (f) => new Promise(res => {
            const reader = new FileReader(); reader.readAsDataURL(f);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 500;
                    canvas.width = maxW; canvas.height = img.height * (maxW / img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    res(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });

        window.uploadProfileMedia = async (type, input) => {
            const compressed = await compressImg(input.files[0]);
            await setDoc(doc(db, "users", currentUser.uid), { [type]: compressed }, { merge: true });
            loadProfile(currentUser.uid);
        };

        window.previewProduct = async (input) => {
            tempProdImg = await compressImg(input.files[0]);
            document.getElementById('p-preview-box').classList.remove('hidden');
            document.getElementById('p-preview-img').src = tempProdImg;
            document.getElementById('pub-btn').classList.remove('hidden');
        };

        window.publishProduct = async () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, l = document.getElementById('p-link').value;
            if(!n || !p || !tempProdImg) return alert("Hukum, jankari bhariye!");
            document.getElementById('pub-btn').disabled = true;
            await addDoc(collection(db, "products"), {
                name: n, price: p, img: tempProdImg, link: l || "", creatorId: currentUser.uid, creator: document.getElementById('disp-name').innerText, time: serverTimestamp()
            });
            alert("Maal Shahi Shop mein jod diya gaya!");
            location.reload();
        };

        window.showTab = (t) => {
            localStorage.setItem('lastTab', t);
            ['feed','shop','orders'].forEach(s => {
                const sec = document.getElementById('sec-'+s);
                const tab = document.getElementById('tab-'+s);
                if(sec) sec.classList.toggle('hidden', s !== t);
                if(tab) tab.classList.toggle('active', s === t);
            });
            if(t === 'shop' && currentUser) loadProfile(currentUser.uid);
        };

        function syncAll() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const grid = document.getElementById('public-grid'); grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `<div class="shahi-card"><div class="img-frame"><img src="${p.img}"></div><div class="p-3"><button onclick="viewCreator('${p.creatorId}')" class="text-[8px] font-black text-[#d4af37] uppercase">@${p.creator}</button><h4 class="font-bold text-[11px] truncate">${p.name}</h4><div class="flex justify-between items-center mt-3"><span class="font-bold text-xs">₹${p.price}</span><button onclick="orderNow('${p.name.replace(/'/g, "\\'")}', '${p.creatorId}', '${p.link}')" class="bg-black text-white text-[9px] px-3 py-1.5 rounded-full font-bold">ORDER</button></div></div></div>`;
                });
            });
            // --- UPDATED ORDERS SYNC WITH DATE & TIME ---
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", currentUser.uid), orderBy("time", "desc")), snap => {
                const list = document.getElementById('order-list'); list.innerHTML = "";
                snap.forEach(d => { 
                    const o = d.data(); 
                    // Date Format Logic
                    let timeStr = "Aabhi...";
                    if(o.time) {
                        const dt = o.time.toDate();
                        timeStr = dt.toLocaleDateString('hi-IN') + " | " + dt.toLocaleTimeString('hi-IN', {hour: '2-digit', minute:'2-digit'});
                    }
                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl border-l-4 border-[#d4af37] shadow-sm">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-bold text-xs">${o.item}</h4>
                            <span class="text-[8px] font-bold bg-gray-100 px-2 py-0.5 rounded text-gray-500">${timeStr}</span>
                        </div>
                        <p class="text-[10px] text-gray-400">Grahak: ${o.customer} | ${o.phone}</p>
                    </div>`; 
                });
            });
        }

        function syncMyShop(uid) {
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), snap => {
                const grid = document.getElementById('my-shop-grid'); grid.innerHTML = "";
                snap.forEach(d => { 
                    const p = d.data();
                    const isOwner = (currentUser && currentUser.uid === uid);
                    grid.innerHTML += `<div class="shahi-card relative">${isOwner ? `<button onclick="delP('${d.id}')" class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full text-[10px]"><i class="fa-solid fa-trash"></i></button>` : ''}<div class="img-frame"><img src="${p.img}"></div><div class="p-3"><p class="text-[11px] font-bold truncate">${p.name}</p><div class="flex justify-between items-center mt-2"><p class="text-[#d4af37] text-xs font-bold">₹${p.price}</p>${!isOwner ? `<button onclick="orderNow('${p.name.replace(/'/g, "\\'")}', '${p.creatorId}', '${p.link}')" class="bg-black text-white text-[8px] px-3 py-1 rounded-full">ORDER</button>` : ''}</div></div></div>`;
                });
            });
        }

        window.viewCreator = (cid) => { showTab('shop'); loadProfile(cid); document.getElementById('shop-title').innerText = "Creator ka Maal"; };
        window.delP = async (id) => { if(confirm("Hata dein?")) await deleteDoc(doc(db, "products", id)); };

        window.orderNow = (item, cid, link) => {
            document.getElementById('order-item-name').value = item;
            document.getElementById('order-creator-id').value = cid;
            document.getElementById('order-item-link').value = link;
            document.getElementById('checkout-modal').classList.remove('hidden');
        };

        window.closeCheckout = () => document.getElementById('checkout-modal').classList.add('hidden');

        window.submitOrder = async () => {
            const btn = document.getElementById('order-confirm-btn');
            const n = document.getElementById('order-cust-name').value;
            const ph = document.getElementById('order-cust-phone').value;
            const item = document.getElementById('order-item-name').value;
            const cid = document.getElementById('order-creator-id').value;
            const link = document.getElementById('order-item-link').value;
            if(!n || !ph) return alert("Hukum, details toh bhariye!");
            btn.disabled = true;
            btn.innerText = "Hukumnama ja raha hai...";
            try {
                await addDoc(collection(db, "orders"), {
                    item, customer: n, phone: ph, creatorId: cid, time: serverTimestamp()
                });
                alert("Order Shahi Darbar mein darj ho gaya!");
                closeCheckout();
                if (link && link.trim() !== "" && link !== "undefined") {
                    window.open(link, '_blank');
                }
                showTab('feed');
                document.getElementById('order-cust-name').value = "";
                document.getElementById('order-cust-phone').value = "";
            } catch (err) {
                alert("Galti: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "CONFIRM";
            }
        };
    </script>
</body>
</html>
