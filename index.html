<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAINIWALAA | Secure Elite</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
background:#fafafa;
font-family:'Plus Jakarta Sans',sans-serif;
margin:0;
padding:0;
overflow-x:hidden
}

.raj-font{
font-family:'Cinzel',serif
}

.saini-header{

background:linear-gradient(to right,#d4af37 20%,#fff 40%,#fff 60%,#d4af37 80%);
background-size:200% auto;
color:#000;
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite

}

@keyframes shine{
to{background-position:200% center}
}

.banner-container{

height:260px;
width:100%;
position:relative;
background:#111;
border-radius:0 0 50px 50px

}

.banner-img{
width:100%;
height:100%;
object-fit:cover;
border-radius:0 0 50px 50px
}

.profile-holder{

position:absolute;
bottom:-90px;
left:50%;
transform:translateX(-50%);
z-index:100;
display:flex;
flex-direction:column;
align-items:center;
width:100%;
text-align:center

}

.p-img{

width:135px;
height:135px;
border-radius:50%;
border:6px solid white;
object-fit:cover;
box-shadow:0 15px 35px rgba(0,0,0,0.15)

}

.nav-btn{
position:relative;
transition:0.3s;
color:#999
}

.nav-btn.active{
color:#d4af37;
font-weight:800
}

.nav-btn.active::after{

content:'';
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:30px;
height:3px;
background:#d4af37;
border-radius:10px

}

.hidden{
display:none!important
}

.desc-text{

color:#ff0000!important;
font-size:11px;
font-weight:800;
text-transform:uppercase;
margin-top:4px

}

.product-card{

background:white;
border-radius:30px;
overflow:hidden;
border:1px solid #f0f0f0

}

.chat-box{

position:fixed;
bottom:30px;
right:30px;
width:360px;
background:white;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
z-index:3000;
display:none

}

.chat-messages{
height:220px;
overflow-y:auto
}

</style>
</head>

<body class="pb-24">

<div id="loading-screen"
class="min-h-screen flex flex-col items-center justify-center bg-white fixed inset-0 z-[3000]">

<h1 class="raj-font text-4xl text-[#d4af37] tracking-widest animate-pulse">
SAINIWALAA
</h1>

</div>


<main id="main-app" class="hidden">

<div class="bg-white pt-6 pb-2 text-center border-b">

<h1 class="raj-font text-3xl font-bold tracking-[0.3em] saini-header">
SAINIWALAA
</h1>

<p class="text-[8px] tracking-[0.5em] text-gray-400 uppercase">
Influencer Blog
</p>

</div>


<nav
class="sticky top-0 z-[150] bg-white/80 backdrop-blur-xl flex justify-around border-b px-4">

<button onclick="showTab('feed')" id="tab-feed"
class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">
Trending
</button>

<button onclick="showTab('shop')" id="tab-shop"
class="nav-btn py-5 text-[10px] font-black uppercase tracking-[0.2em]">
Mhari Shop
</button>

<button onclick="logout()"
class="py-5 text-red-400">

<i class="fa-solid fa-power-off"></i>

</button>

</nav>


<section id="sec-shop" class="hidden">

<div class="banner-container">

<img id="banner-ui"
src="https://images.unsplash.com/photo-1557683316-973673baf926?w=1000"
class="banner-img">

<div class="profile-holder">

<img id="profile-ui"
src="https://api.dicebear.com/7.x/avataaars/svg?seed=default"
class="p-img">

<h2 id="disp-name"
class="raj-font font-bold text-gray-800 text-2xl mt-4">
Creator
</h2>

<div class="flex gap-3 mt-4">

<button id="follow-btn"
onclick="toggleFollow()"
class="bg-[#d4af37] text-white text-xs px-6 py-2 rounded-full">

Follow

</button>

<button onclick="openChat()"
class="bg-black text-white text-xs px-6 py-2 rounded-full">

Message

</button>

<button onclick="toggleBlock()"
class="text-red-500 text-xs">

Block

</button>

</div>

</div>
</div>

</section>

</main>



<div id="chatBox" class="chat-box p-4">

<div class="flex justify-between mb-2">

<b>Secure Chat</b>

<button onclick="closeChat()">
<i class="fa fa-xmark"></i>
</button>

</div>

<div id="chatMessages" class="chat-messages text-sm mb-3"></div>

<div class="flex gap-2">

<input id="chatInput"
class="flex-1 border p-2 rounded-lg text-sm"
placeholder="Type message">

<button onclick="sendChat()"
class="bg-black text-white px-4 rounded-lg text-xs">

Send

</button>

</div>

</div>



<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
}

from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


import {

getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
doc,
updateDoc,
arrayUnion,
arrayRemove,
getDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
authDomain:"social-blog-93d38.firebaseapp.com",
projectId:"social-blog-93d38"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);


let curU=null;

let viewId=null;


onAuthStateChanged(auth,u=>{

document.getElementById('loading-screen').style.display="none";

if(u){

curU=u;

document.getElementById('main-app').classList.remove("hidden");

}

});


window.toggleFollow=async()=>{

const ref=doc(db,"users",viewId);

const snap=await getDoc(ref);

const data=snap.data();

const btn=document.getElementById("follow-btn");


if(data.followers?.includes(curU.uid)){

await updateDoc(ref,{followers:arrayRemove(curU.uid)});

btn.innerText="Follow";
btn.style.background="#d4af37";

}else{

await updateDoc(ref,{followers:arrayUnion(curU.uid)});

btn.innerText="Following";
btn.style.background="green";

}

};


window.openChat=()=>{

document.getElementById("chatBox").style.display="block";

loadChat();

};


window.closeChat=()=>{

document.getElementById("chatBox").style.display="none";

};


window.sendChat=async()=>{

const msg=document.getElementById("chatInput").value;

if(!msg)return;

await addDoc(collection(db,"chats"),{

from:curU.uid,
to:viewId,
msg:msg,
time:serverTimestamp()

});

document.getElementById("chatInput").value="";

};


function loadChat(){

const q=query(collection(db,"chats"),orderBy("time"));

onSnapshot(q,s=>{

const box=document.getElementById("chatMessages");

box.innerHTML="";

s.forEach(d=>{

const c=d.data();

if(

(c.from===curU.uid&&c.to===viewId)
||
(c.from===viewId&&c.to===curU.uid)

){

box.innerHTML+=`

<div>

<b>${c.from}</b>

<p>${c.msg}</p>

</div>

`;

}

});

});

}


window.toggleBlock=async()=>{

const ref=doc(db,"users",curU.uid);

const snap=await getDoc(ref);

const data=snap.data();


if(data.blockedUsers?.includes(viewId)){

await updateDoc(ref,{blockedUsers:arrayRemove(viewId)});

alert("User Unblocked");

}else{

await updateDoc(ref,{blockedUsers:arrayUnion(viewId)});

alert("User Blocked");

}

};

</script>

</body>
</html>
