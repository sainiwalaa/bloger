<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config (Aapki settings ke anusaar)
        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 1. POST SYSTEM (Darbar Logic) ---
        window.createPost = () => {
            const msg = prompt("Kya likhna chahte ho hukum?");
            if(msg) {
                push(ref(db, 'posts'), {
                    text: msg,
                    user: "sunil saini",
                    time: serverTimestamp()
                });
                alert("Post ho gayo hukum! 🚩");
            }
        };

        onValue(ref(db, 'posts'), (snap) => {
            const container = document.getElementById('darbar-content');
            container.innerHTML = "";
            if(!snap.exists()) {
                container.innerHTML = "<p class='text-zinc-600 text-center mt-20 italic text-sm'>Koi post nahi di.</p>";
                return;
            }
            snap.forEach(c => {
                const p = c.val();
                container.innerHTML += `
                    <div class="bg-zinc-900/40 p-4 border border-zinc-800 rounded-2xl mb-4">
                        <p class="text-sm text-zinc-300 font-light">${p.text}</p>
                        <div class="flex gap-4 mt-4 text-[10px] text-zinc-500 uppercase tracking-widest">
                            <span><i class="fa-regular fa-heart"></i> Like</span>
                            <span><i class="fa-regular fa-comment"></i> Vichaar</span>
                        </div>
                    </div>`;
            });
        });

        // --- 2. BAZAAR SYSTEM (Dukaan Logic) ---
        window.addToBazaar = () => {
            const name = prompt("Maal ko Naam:");
            const price = prompt("Keemat (₹):");
            if(name && price) {
                push(ref(db, 'products'), { name, price, time: serverTimestamp() });
                alert("Bazaar me maal rakha gaya! 🛒");
            }
        };

        onValue(ref(db, 'products'), (snap) => {
            const list = document.getElementById('bazaar-list');
            const empty = document.getElementById('empty-bazaar');
            list.innerHTML = "";
            if(!snap.exists()) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                snap.forEach(c => {
                    const p = c.val();
                    list.innerHTML += `
                        <div class="bg-zinc-900 border border-yellow-900/20 rounded-2xl p-4">
                            <h3 class="gold-text font-bold text-sm mb-1">${p.name}</h3>
                            <p class="text-xs text-zinc-400 mb-4">₹ ${p.price}</p>
                            <button onclick="alert('Order ho gayo!')" class="w-full bg-orange-700/80 text-white py-2 rounded-lg text-[10px] font-bold">MAAL KHARIDO</button>
                        </div>`;
                });
            }
        });

        // --- 3. MAHAL SAJAO (Profile Update Logic) ---
        window.saveMahal = () => {
            const bio = document.getElementById('bio-input').value;
            update(ref(db, 'users/admin'), { bio: bio });
            document.getElementById('mahal-modal').classList.add('hidden');
        };

        onValue(ref(db, 'users/admin'), (snap) => {
            if(snap.exists()) {
                document.getElementById('display-bio').innerText = snap.val().bio || "SSSSSSSSSSSSSSS";
            }
        });

        // --- 4. NAVIGATION LOGIC ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(tab + '-page').classList.remove('hidden');
            // Update Active Icon
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-yellow-500', 'text-zinc-500'));
            event.currentTarget.classList.replace('text-zinc-500', 'text-yellow-500');
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Marcellus', serif; }
        .gold-text { color: #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 flex flex-col pb-24">

    <header class="p-5 text-center border-b border-zinc-900 sticky top-0 bg-black z-50">
        <h1 class="gold-text tracking-[6px] text-lg font-bold">SAINIWALAA</h1>
    </header>

    <main class="flex-1 p-4">
        
        <div id="aap-page" class="page">
            <div class="flex items-center gap-6 py-6 px-2">
                <div class="relative">
                    <div class="w-24 h-24 rounded-full bg-yellow-600 flex items-center justify-center text-black text-3xl font-bold border-4 border-black ring-2 ring-yellow-600 shadow-[0_0_20px_rgba(212,175,55,0.2)]">SS</div>
                    <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 border-4 border-black rounded-full"></div>
                </div>
                <div>
                    <h2 class="text-2xl font-bold tracking-tight">sunil saini</h2>
                    <p id="display-bio" class="text-xs text-zinc-500 mt-1">SSSSSSSSSSSSSSS</p>
                </div>
            </div>

            <div class="flex items-center justify-between px-4 mb-8">
                <div class="flex gap-6 text-center">
                    <div><p class="font-bold">0</p><p class="text-[9px] text-zinc-500 uppercase tracking-tighter">Post</p></div>
                    <div><p class="font-bold">0</p><p class="text-[9px] text-zinc-500 uppercase tracking-tighter">Saathi</p></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('mahal-modal').classList.remove('hidden')" class="border border-yellow-600/30 px-5 py-2 rounded-lg text-xs gold-text bg-yellow-900/10 flex items-center gap-2">
                        <i class="fa-solid fa-gear"></i> Badlaav
                    </button>
                    <button class="bg-red-900/10 border border-red-900/30 text-red-500 px-3 rounded-lg"><i class="fa-solid fa-right-from-bracket text-xs"></i></button>
                </div>
            </div>

            <div class="flex border-y border-zinc-900 mb-6">
                <button onclick="switchTab('darbar')" class="flex-1 py-4 text-[10px] uppercase tracking-widest gold-text border-b border-yellow-600">Darbar</button>
                <button onclick="switchTab('bazaar')" class="flex-1 py-4 text-[10px] uppercase tracking-widest text-zinc-500">Dukaan</button>
                <button class="flex-1 py-4 text-[10px] uppercase tracking-widest text-zinc-500">Sauda</button>
            </div>
        </div>

        <div id="darbar-page" class="page hidden">
            <div class="bg-zinc-900/20 border border-zinc-800/50 p-6 rounded-3xl flex items-center justify-between mb-8 shadow-inner">
                <p class="text-zinc-500 text-sm italic">Kuch naya dikhao hukum...</p>
                <button onclick="createPost()" class="border border-yellow-600/50 text-yellow-500 px-6 py-1.5 rounded-full text-xs font-bold bg-yellow-600/5 hover:bg-yellow-600/20 transition-all">+ Naya Post</button>
            </div>
            <div id="darbar-content"></div>
        </div>

        <div id="bazaar-page" class="page hidden">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h2 class="gold-text text-xl font-bold">Shahi Bazaar</h2>
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Anmol saaman yahan milego</p>
                </div>
                <button onclick="addToBazaar()" class="bg-orange-700 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-lg shadow-orange-900/20 uppercase">+ Bazaar me Rakho 🚩</button>
            </div>
            <div id="empty-bazaar" class="border-2 border-dashed border-zinc-800/50 rounded-[40px] py-24 text-center hidden">
                <i class="fa-solid fa-tag text-zinc-800 text-4xl mb-4"></i>
                <p class="text-zinc-600 italic text-sm">Bazaar abhi khali hai</p>
            </div>
            <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full max-w-[500px] bg-black border-t border-zinc-900 flex justify-around py-4 backdrop-blur-lg">
        <button onclick="switchTab('darbar')" class="text-zinc-500"><i class="fa-solid fa-house text-lg"></i><p class="text-[8px] mt-1 uppercase">Darbar</p></button>
        <button onclick="switchTab('bazaar')" class="text-zinc-500"><i class="fa-solid fa-shop text-lg"></i><p class="text-[8px] mt-1 uppercase">Bazaar</p></button>
        <button onclick="switchTab('aap')" class="text-yellow-500"><i class="fa-solid fa-circle-user text-lg"></i><p class="text-[8px] mt-1 uppercase">Aap</p></button>
    </nav>

    <div id="mahal-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-[#111] w-full rounded-[30px] p-8 border border-zinc-800 shadow-2xl relative">
            <button onclick="document.getElementById('mahal-modal').classList.add('hidden')" class="absolute top-6 right-6 text-zinc-600">✕</button>
            <h3 class="gold-text text-xl font-bold mb-8 italic">Mahal Sajao</h3>
            
            <label class="text-[10px] text-zinc-500 uppercase tracking-widest mb-4 block">Chitra (Avatar)</label>
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 rounded-full bg-yellow-600 flex items-center justify-center text-black font-bold">SS</div>
                <button class="border border-yellow-600/30 px-6 py-2 rounded-xl text-[10px] gold-text font-bold bg-yellow-600/5 uppercase"><i class="fa-solid fa-image mr-2"></i> Photo Daalo 📷</button>
            </div>

            <label class="text-[10px] text-zinc-500 uppercase tracking-widest mb-4 block">Aapke Baare Me (Bio)</label>
            <textarea id="bio-input" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm h-28 mb-8 outline-none focus:border-yellow-600/50 transition-colors" placeholder="SSSSSSSSSSSSSSS"></textarea>
            
            <button onclick="saveMahal()" class="w-full bg-yellow-600 text-black py-4 rounded-2xl font-bold uppercase tracking-[2px] shadow-lg shadow-yellow-600/20 hover:scale-[0.98] transition-transform">Save Karo 👑</button>
        </div>
    </div>

</body>
</html>
