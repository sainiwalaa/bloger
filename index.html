<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let currentUserData = null;
        let activePostId = null;

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await get(ref(db, 'users/' + user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                    document.getElementById('auth-screen').classList.add('hide');
                    document.getElementById('reg-screen').classList.add('hide');
                    document.getElementById('app').classList.remove('hide');
                    initApp();
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- FAST COMMENT ---
        window.sendComment = async () => {
            const btn = document.getElementById('comm-btn');
            const input = document.getElementById('comm-input');
            const txt = input.value.trim();
            if(!txt || !activePostId) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i>';
            
            try {
                await push(ref(db, `comments/${activePostId}`), {
                    uHandle: currentUserData.username,
                    text: txt,
                    time: Date.now()
                });
                input.value = "";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
            }
        };

        // --- ROYAL PUBLISH (ANTI-DOUBLE CLICK) ---
        window.publish = async (mode) => {
            const file = document.getElementById(mode + '-file').files[0];
            const btn = document.getElementById('btn-' + mode);
            if(!file) return alert("Hukum, file to chuniye!");

            // Prevent Double Entry
            btn.disabled = true;
            btn.innerHTML = "Thambo Sa... Taiyari ho rahi hai 🚩";
            btn.classList.add('opacity-50');

            try {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {method:"POST", body:fd});
                const d = await res.json();
                
                const item = {
                    uid: auth.currentUser.uid,
                    uName: currentUserData.name,
                    uHandle: currentUserData.username,
                    uPhoto: currentUserData.photo || "",
                    url: d.secure_url,
                    time: Date.now(),
                    caption: document.getElementById(mode + '-desc').value
                };

                if(mode === 'prod') {
                    item.name = document.getElementById('prod-name').value;
                    item.price = document.getElementById('prod-price').value;
                    item.link = document.getElementById('prod-link').value;
                    await push(ref(db, 'products'), item);
                } else {
                    item.type = file.type.includes('video') ? 'video' : 'image';
                    await push(ref(db, 'posts'), item);
                }
                
                btn.innerHTML = "Khamma Ghani! Post ho gya 🚩";
                setTimeout(() => location.reload(), 1000);
            } catch (e) {
                alert("Maafi chahunga, error aa gya!");
                btn.disabled = false;
                btn.innerHTML = "PUBLISH AGAIN";
            }
        };

        function initApp() {
            // Social Feed
            onValue(ref(db, 'posts'), s => {
                let h = ""; const posts = s.val();
                if(posts) Object.keys(posts).reverse().forEach(k => {
                    const p = posts[k];
                    h += `<div class="post-card bg-white mb-8 border-b pb-4">
                        <div class="p-4 flex items-center gap-3">
                            <img src="${p.uPhoto || 'https://via.placeholder.com/50'}" class="w-10 h-10 rounded-full border-2 border-orange-500">
                            <div class="leading-none"><b class="text-sm raj-title italic">${p.uName}</b><br><span class="text-[10px] text-gray-400 font-bold uppercase">@${p.uHandle}</span></div>
                        </div>
                        <div class="relative bg-black flex items-center justify-center min-h-[350px]">
                            ${p.type==='video'?`<video src="${p.url}" controls class="w-full"></video>`:`<img src="${p.url}" class="w-full max-h-[600px] object-contain">`}
                        </div>
                        <div class="p-5 flex gap-8 text-2xl">
                            <i class="fa-regular fa-heart cursor-pointer" id="like-${k}" onclick="toggleLike('${k}')"></i>
                            <i class="fa-regular fa-comment cursor-pointer" onclick="openComments('${k}')"></i>
                        </div>
                        <div class="px-5 text-sm"><b>@${p.uHandle}</b> <span class="text-gray-600">${p.caption || ''}</span></div>
                    </div>`;
                    // Like logic check...
                });
                document.getElementById('v-feed').innerHTML = h;
            });

            // Shop Grid (Horizontal Look)
            onValue(ref(db, 'products'), s => {
                let h = ""; const pr = s.val();
                if(pr) Object.keys(pr).reverse().forEach(k => {
                    const p = pr[k];
                    h += `<div class="bg-white border p-3 rounded-2xl shadow-sm">
                        <img src="${p.url}" class="w-full h-40 object-cover rounded-xl mb-2">
                        <h3 class="text-xs font-black truncate">${p.name}</h3>
                        <div class="text-orange-600 font-black text-sm">₹${p.price}</div>
                        <button onclick="openOrderForm('${k}','${p.uid}','${p.name}','${p.link}')" class="w-full btn-royal py-2 text-[10px] mt-2">PADHARO BAZAAR 🚩</button>
                    </div>`;
                });
                document.getElementById('shop-grid').innerHTML = h;
            });
            
            document.getElementById('u-prof-img').src = currentUserData.photo || 'https://via.placeholder.com/100';
            document.querySelectorAll('.u-name-display').forEach(el => el.innerText = currentUserData.name);
        }

        window.showPage = (p) => { 
            ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide')); 
            document.getElementById('v-'+p).classList.remove('hide'); 
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');
        window.openComments = (id) => { activePostId = id; openM('comment-modal'); };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fafafa; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 15px; padding: 12px; }
        input, textarea { border: 1px solid #eee !important; padding: 12px; border-radius: 12px; margin-bottom: 10px; width: 100%; font-size: 13px; }
        .nav-icon { font-size: 1.5rem; color: #cbd5e1; }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-20 hide bg-white shadow-2xl">
        <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic">SAINIWALAA</h1>
            <div class="flex gap-5">
                <i class="fa-solid fa-square-plus text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store text-gray-400 text-2xl" onclick="openM('prod-modal')"></i>
            </div>
        </header>

        <main id="v-feed"></main>

        <main id="v-shop" class="hide p-4">
            <h2 class="text-xl font-black raj-title mb-6 italic">ROYAL STUDIO SHOP</h2>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-40 bg-orange-50 relative">
                <img id="u-prof-img" class="w-24 h-24 rounded-full absolute -bottom-10 left-6 border-4 border-white shadow-xl object-cover bg-white">
            </div>
            <div class="mt-14 p-6">
                <h2 class="text-3xl font-black u-name-display raj-title italic"></h2>
                <div class="flex gap-3 mt-6">
                    <button onclick="openM('edit-modal')" class="bg-black text-white px-8 py-2.5 rounded-full text-[10px] font-black uppercase">Edit Studio</button>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-600 px-6 py-2.5 rounded-full text-[10px] font-black">LOGOUT</button>
                </div>
            </div>
        </main>

        <div id="comment-modal" class="fixed inset-0 bg-black/60 z-[1000] hide flex items-end">
            <div class="bg-white w-full max-w-[450px] h-[65vh] rounded-t-[40px] p-6 flex flex-col shadow-2xl border-t-4 border-orange-500">
                <div class="w-12 h-1.5 bg-gray-100 rounded-full mx-auto mb-6" onclick="closeM('comment-modal')"></div>
                <div id="comment-list" class="flex-1 overflow-y-auto space-y-3 px-2"></div>
                <div class="mt-4 flex gap-3 border-t pt-4">
                    <input type="text" id="comm-input" placeholder="Aapka vichaar..." class="!mb-0 !rounded-full !bg-gray-50">
                    <button id="comm-btn" onclick="sendComment()" class="bg-orange-600 text-white w-14 h-12 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[600] hide p-8 flex flex-col justify-center">
            <h2 class="text-3xl font-black raj-title mb-8 text-center">NAYA POST 🚩</h2>
            <input type="file" id="post-file" accept="image/*,video/*">
            <textarea id="post-desc" placeholder="Caption likhein hukum..." class="h-32"></textarea>
            <button onclick="publish('post')" id="btn-post" class="btn-royal shadow-lg">STUDIO MEIN DALIYE</button>
            <button onclick="closeM('post-modal')" class="mt-4 text-xs font-bold text-gray-300">Peeche Jayein</button>
        </div>

        <div id="prod-modal" class="fixed inset-0 bg-white z-[600] hide p-8 flex flex-col justify-center overflow-y-auto">
            <h2 class="text-3xl font-black raj-title mb-8 text-center">LIST PRODUCT 🚩</h2>
            <input type="file" id="prod-file" accept="image/*">
            <input type="text" id="prod-name" placeholder="Item Name">
            <input type="number" id="prod-price" placeholder="Price (₹)">
            <input type="text" id="prod-link" placeholder="Purchase Link">
            <textarea id="prod-desc" placeholder="Description..."></textarea>
            <button onclick="publish('prod')" id="btn-prod" class="btn-royal shadow-lg">SHOP MEIN LAGAYEIN</button>
            <button onclick="closeM('prod-modal')" class="mt-4 text-xs font-bold text-gray-300">Cancel</button>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white/90 backdrop-blur-xl border-t p-5 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-user-ninja nav-icon"></i>
        </nav>
    </div>

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white">
        <h1 class="text-5xl font-black raj-title text-center mb-12 italic">SainiWalaa</h1>
        <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
        <button onclick="handleAuth('login')" class="btn-royal mb-4 shadow-xl">STUDIO ENTER</button>
    </div>

    <div id="reg-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide text-center bg-white">
        <h2 class="text-2xl font-black raj-title mb-8 italic">Pehchan Batayein Sa!</h2>
        <input type="text" id="reg-name" placeholder="Full Name"><input type="text" id="reg-username" placeholder="Username">
        <button onclick="registerUser()" class="btn-royal mt-4 shadow-xl">SHURU KAREIN 🚩</button>
    </div>

</body>
</html>
