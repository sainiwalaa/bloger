<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let userCache = null;
        let currentPage = localStorage.getItem('last_page') || 'feed';

        // --- AUTH & INITIALIZATION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                if(snap.exists()){
                    userCache = snap.val();
                    document.getElementById('auth-screen').classList.add('hide');
                    document.getElementById('app').classList.remove('hide');
                    initApp();
                    showPage(currentPage);
                } else {
                    document.getElementById('reg-screen').classList.remove('hide');
                    document.getElementById('auth-screen').classList.add('hide');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        function initApp() {
            // Header Info
            document.getElementById('header-id').innerText = "@" + userCache.username;
            
            // 1. Real-time Feed (Posts)
            onValue(ref(db, 'posts'), (s) => {
                const feed = document.getElementById('v-feed'); feed.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    feed.innerHTML += `
                        <div class="bg-white mb-6 border-b pb-4">
                            <div class="p-3 flex items-center gap-3">
                                <img src="${p.uPhoto || 'https://via.placeholder.com/50'}" class="w-10 h-10 chokor border-2 border-orange-500">
                                <div><b class="text-xs raj-title italic">${p.uName}</b><br><span class="text-[8px] text-gray-400 font-bold">${p.date}</span></div>
                            </div>
                            <img src="${p.url}" class="w-full max-h-[500px] object-contain bg-black">
                            <div class="p-4 flex gap-6 text-2xl mb-1">
                                <i class="fa-regular fa-heart" onclick="alert('Like darj ho gya sa!')"></i>
                                <i class="fa-regular fa-comment" onclick="alert('Comment box khul rha hai sa!')"></i>
                            </div>
                            <p class="px-4 text-xs"><b>@${p.uHandle}</b> ${p.caption}</p>
                        </div>`;
                });
            });

            // 2. Real-time Shop (Bazaar)
            onValue(ref(db, 'products'), (s) => {
                const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    grid.innerHTML += `
                        <div class="bg-white border-2 border-gray-100 p-2 rounded-xl shadow-sm">
                            <img src="${p.url}" class="w-full h-32 chokor mb-2">
                            <h3 class="text-[10px] font-black uppercase truncate">${p.name}</h3>
                            <div class="text-orange-600 font-black text-sm">₹${p.price}</div>
                            <button onclick="handleOrder('${p.name}', '${p.link}')" class="w-full btn-royal py-2 text-[10px] mt-2 font-bold shadow-md uppercase">Buy Now</button>
                        </div>`;
                });
            });

            updateProfileUI();
        }

        // --- ROYAL ACTIONS ---
        window.handleOrder = (name, link) => {
            const client = prompt("Hukum, aapka naam aur mobile number?");
            if(client) {
                alert("Dhanyawad! Aapka order note kar liya gaya hai. Ab website par bhej rahe hain.");
                window.open(link, '_blank');
            }
        };

        window.publish = async (mode) => {
            const btn = document.getElementById('btn-' + mode);
            const file = document.getElementById(mode + '-file').files[0];
            if(!file) return alert("Pehle file chuniye hukum!");

            btn.disabled = true;
            btn.innerHTML = "Thambo Sa... Entry ho rahi hai 🚩";

            const fd = new FormData();
            fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {method:"POST", body:fd});
            const d = await res.json();

            const timeStr = new Date().toLocaleString();
            const entry = {
                uid: auth.currentUser.uid, uName: userCache.name, uHandle: userCache.username,
                uPhoto: userCache.photo || "", url: d.secure_url, date: timeStr,
                caption: document.getElementById(mode + '-desc').value || ""
            };

            if(mode === 'prod') {
                entry.name = document.getElementById('prod-name').value;
                entry.price = document.getElementById('prod-price').value;
                entry.link = document.getElementById('prod-link').value;
                await push(ref(db, 'products'), entry);
            } else {
                entry.type = file.type.includes('video') ? 'video' : 'image';
                await push(ref(db, 'posts'), entry);
            }

            btn.innerHTML = "Khamma Ghani! Ho gya 🚩";
            setTimeout(() => { closeM(mode + '-modal'); btn.disabled = false; btn.innerHTML = "PUBLISH"; }, 1000);
        };

        window.saveProfile = async () => {
            const btn = document.getElementById('btn-save-prof');
            btn.disabled = true; btn.innerHTML = "Thambo... Update ho rha hai sa 🚩";
            const up = {
                name: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value,
                website: document.getElementById('edit-web').value
            };
            await update(ref(db, 'users/' + auth.currentUser.uid), up);
            userCache = {...userCache, ...up};
            updateProfileUI();
            btn.innerHTML = "Ho Gya Hukum! 🚩";
            setTimeout(() => { closeM('edit-modal'); btn.disabled=false; btn.innerHTML="SAVE CHANGES"; }, 1000);
        };

        window.searchUser = async () => {
            const val = document.getElementById('search-input').value.toLowerCase();
            if(!val) return;
            const userRef = query(ref(db, 'users'), orderByChild('username'), equalTo(val));
            const snap = await get(userRef);
            if(snap.exists()){
                alert("User mil gaya! Abhi redirect kar rahe hain sa.");
                // Yahan view profile logic add hoga
            } else { alert("Maafi! Is ID ka koi user nahi hai."); }
        };

        window.showPage = (p) => {
            currentPage = p; localStorage.setItem('last_page', p);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById('v-' + p).classList.remove('hide');
        };

        function updateProfileUI() {
            document.getElementById('u-name-profile').innerText = userCache.name;
            document.getElementById('u-handle-profile').innerText = "@" + userCache.username;
            document.getElementById('u-bio-profile').innerText = userCache.bio || "SainiWalaa Royal Member";
            document.getElementById('u-web-btn').innerText = userCache.website || "VISIT WEBSITE";
            document.getElementById('u-web-btn').href = userCache.website || "#";
            document.getElementById('u-prof-img').src = userCache.photo || 'https://via.placeholder.com/100';
        }

        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: #1a1a1a; overflow-x: hidden; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 12px; border: none; cursor: pointer; }
        .chokor { border-radius: 10px; object-fit: cover; }
        .web-box { border: 3px solid #ea580c; background: #fff; padding: 15px; border-radius: 15px; font-weight: 900; color: #000; text-align: center; display: block; box-shadow: 6px 6px 0px #ea580c; text-decoration: none; }
        input, textarea { border: 1.5px solid #eee !important; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; font-size: 13px; }
        .nav-icon { font-size: 1.5rem; color: #d1d5db; transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body class="flex justify-center bg-gray-50">

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-24 hide bg-white shadow-2xl">
        
        <header class="sticky top-0 bg-white/95 backdrop-blur-md border-b p-4 flex justify-between items-center z-50">
            <div>
                <h1 class="text-2xl font-black raj-title italic leading-none">SAINIWALAA</h1>
                <p id="header-id" class="text-[10px] font-black text-orange-600 uppercase mt-1"></p>
            </div>
            <div class="flex gap-4">
                <i class="fa-solid fa-square-plus text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store text-gray-400 text-2xl" onclick="openM('prod-modal')"></i>
            </div>
        </header>

        <div class="p-3 border-b flex gap-2">
            <input type="text" id="search-input" placeholder="User khojiye sa..." class="!mb-0 !py-2 !rounded-full bg-gray-50">
            <button onclick="searchUser()" class="bg-black text-white px-5 rounded-full text-xs font-bold">SEARCH</button>
        </div>

        <main id="v-feed"></main>

        <main id="v-shop" class="hide p-4">
            <h2 class="text-xl font-black raj-title mb-6 italic">ROYAL BAZAAR 🚩</h2>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-44 bg-gray-100 relative">
                <img id="u-banner" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1590050752117-23a9d7fc2173?auto=format&fit=crop&w=500&q=60">
                <img id="u-prof-img" class="w-28 h-28 absolute -bottom-10 left-6 border-4 border-white shadow-xl chokor bg-white">
            </div>
            <div class="mt-14 p-6">
                <h2 id="u-name-profile" class="text-3xl font-black raj-title italic"></h2>
                <p id="u-handle-profile" class="text-orange-600 font-bold text-xs"></p>
                <p id="u-bio-profile" class="text-gray-500 text-sm mt-4 italic leading-relaxed"></p>
                <a id="u-web-btn" href="#" target="_blank" class="web-box mt-6 uppercase"></a>
                <div class="grid grid-cols-2 gap-3 mt-8">
                    <button onclick="openM('edit-modal')" class="bg-black text-white py-3 rounded-xl text-[10px] font-black uppercase">Edit Profile</button>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Logout</button>
                </div>
            </div>
        </main>

        <div id="edit-modal" class="fixed inset-0 bg-white z-[1000] hide p-8 flex flex-col justify-center">
            <h2 class="text-2xl font-black raj-title mb-6">EDIT STUDIO 🚩</h2>
            <input type="text" id="edit-name" placeholder="Naam">
            <input type="text" id="edit-web" placeholder="Website Link">
            <textarea id="edit-bio" placeholder="Bio..."></textarea>
            <button id="btn-save-prof" onclick="saveProfile()" class="btn-royal">SAVE CHANGES</button>
            <button onclick="closeM('edit-modal')" class="mt-4 text-xs font-bold text-gray-300 w-full">CANCEL</button>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[600] hide p-8">
            <h2 class="text-2xl font-black raj-title mb-6 uppercase">New Post</h2>
            <input type="file" id="post-file" accept="image/*,video/*">
            <textarea id="post-desc" placeholder="Caption..."></textarea>
            <button id="btn-post" onclick="publish('post')" class="btn-royal w-full">PUBLISH 🚩</button>
            <button onclick="closeM('post-modal')" class="mt-4 text-xs text-gray-300 w-full text-center">CANCEL</button>
        </div>

        <div id="prod-modal" class="fixed inset-0 bg-white z-[600] hide p-8 overflow-y-auto">
            <h2 class="text-2xl font-black raj-title mb-6 uppercase tracking-tighter">Add to Bazaar</h2>
            <input type="file" id="prod-file" accept="image/*">
            <input type="text" id="prod-name" placeholder="Item Name">
            <input type="number" id="prod-price" placeholder="Price (₹)">
            <input type="text" id="prod-link" placeholder="Order Link">
            <textarea id="prod-desc" placeholder="Details..."></textarea>
            <button id="btn-prod" onclick="publish('prod')" class="btn-royal w-full">LIST PRODUCT 🚩</button>
            <button onclick="closeM('prod-modal')" class="mt-4 text-xs text-gray-300 w-full text-center">CANCEL</button>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-5 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-crown nav-icon"></i>
        </nav>
    </div>

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white">
        <h1 class="text-5xl font-black raj-title text-center mb-10 italic">SainiWalaa</h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <button onclick="signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value)" class="btn-royal shadow-xl">STUDIO LOGIN</button>
    </div>

</body>
</html>
