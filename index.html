<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Final Fixed Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        /* FIX: BANNER BORDER RADIUS (As per image) */
        .banner-container { height: 250px; width: 100%; position: relative; background: #111; border-radius: 0 0 50px 50px; overflow: visible; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 50px 50px; }
        
        /* FIX: CENTER PROFILE (Restoring ffff.JPG style) */
        .profile-holder { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; width: 100%; text-align: center; }
        .p-img { width: 130px; height: 130px; border-radius: 50%; border: 6px solid white; object-fit: cover; background: white; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .nav-btn.active { color: #d4af37; font-weight: 800; border-bottom: 3px solid #d4af37; }
        .hidden { display: none !important; }
        
        .product-card { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #eee; transition: 0.4s; }
        .badge-msg { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; border: 2px solid white; font-weight: bold; }
        
        /* INBOX STYLE */
        .msg-box { background: white; padding: 20px; border-radius: 25px; border-left: 6px solid #d4af37; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="pb-24">

    <div id="loading-screen" class="min-h-screen flex items-center justify-center bg-white fixed inset-0 z-[2000]">
        <h1 class="raj-font text-3xl text-[#d4af37] animate-pulse">SAINIWALAA</h1>
    </div>

    <main id="main-app" class="hidden">
        <nav class="sticky top-0 z-[150] bg-white/90 backdrop-blur-md flex justify-around border-b border-gray-100 px-4">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn py-5 text-[11px] font-bold uppercase tracking-widest">Trending</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn py-5 text-[11px] font-bold uppercase tracking-widest">Mhari Shop</button>
            <button onclick="showTab('chats')" id="tab-chats" class="nav-btn py-5 text-[11px] font-bold uppercase tracking-widest relative">Inbox <span id="msg-count" class="badge-msg hidden">0</span></button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn py-5 text-[11px] font-bold uppercase tracking-widest">Orders</button>
            <button onclick="logout()" class="py-5 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-shop" class="hidden">
            <div class="banner-container">
                <img id="banner-ui" src="" class="banner-img">
                <div class="profile-holder">
                    <div class="relative">
                        <img id="profile-ui" src="" class="p-img">
                        <label class="absolute bottom-1 right-2 bg-[#d4af37] text-white w-9 h-9 flex items-center justify-center rounded-full cursor-pointer owner-only hidden border-4 border-white shadow-lg">
                            <i class="fa-solid fa-camera text-[12px]"></i>
                            <input type="file" onchange="uploadMedia('profile', this)" class="hidden">
                        </label>
                    </div>
                    <div class="mt-4">
                        <h2 id="disp-name" class="raj-font font-bold text-gray-800 text-2xl">Creator</h2>
                        <div id="visitor-btns" class="flex justify-center gap-3 mt-4 hidden">
                            <button class="bg-[#d4af37] text-white text-[10px] px-8 py-3 rounded-full font-black uppercase shadow-lg"><i class="fa-solid fa-plus mr-2"></i>Follow</button>
                            <button onclick="openMsg()" class="bg-black text-white text-[10px] px-8 py-3 rounded-full font-black uppercase shadow-lg"><i class="fa-solid fa-paper-plane mr-2"></i>Message</button>
                        </div>
                    </div>
                </div>
                <label class="absolute top-6 right-6 bg-black/30 backdrop-blur-md p-4 rounded-full cursor-pointer text-white owner-only hidden border border-white/20">
                    <i class="fa-solid fa-image"></i>
                    <input type="file" onchange="uploadMedia('banner', this)" class="hidden">
                </label>
            </div>

            <div class="mt-40 px-6 text-center">
                <div id="disp-bio" class="inline-block p-6 rounded-3xl shadow-sm border border-gray-100 bg-white min-w-[320px] text-gray-500 italic">Welcome!</div>
                <div class="mt-8 owner-only hidden">
                    <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="bg-gray-100 text-gray-600 px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-widest">Edit Profile</button>
                </div>
            </div>

            <div id="edit-box" class="hidden max-w-sm mx-auto p-8 mt-10 bg-white border rounded-[40px] shadow-2xl space-y-4">
                <input id="in-name" placeholder="Name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input id="in-bio" placeholder="Bio" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <div class="flex gap-2">
                    <input type="color" id="in-bio-color" class="w-12 h-12 rounded-xl border-none">
                    <input type="number" id="in-bio-size" placeholder="Size (16)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                </div>
                <button onclick="saveProfile()" class="w-full bg-black text-white p-5 rounded-3xl font-bold uppercase">Save Identity</button>
            </div>

            <div class="max-w-4xl mx-auto p-6 mt-16 owner-only hidden">
                <div class="bg-white border-2 border-dashed border-gray-200 p-10 rounded-[50px] text-center">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-left">
                        <input id="p-name" placeholder="Item Name" class="p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-price" placeholder="Price ₹" class="p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-cat" placeholder="Category" class="p-4 bg-gray-50 rounded-2xl outline-none">
                        <input id="p-link" placeholder="Buy Link" class="p-4 bg-gray-50 rounded-2xl outline-none">
                    </div>
                    <textarea id="p-desc" placeholder="Product details (Red Text)..." class="w-full p-4 bg-gray-50 rounded-2xl mb-6 h-24 outline-none"></textarea>
                    <input type="file" id="p-file" onchange="previewProd(this)" class="hidden">
                    <label for="p-file" class="bg-gray-50 p-10 block rounded-3xl cursor-pointer font-bold text-gray-400 border mb-6">UPLOAD PRODUCT PHOTO</label>
                    <button id="pub-btn" onclick="publish()" class="hidden w-full bg-[#d4af37] text-white p-6 rounded-[30px] font-black uppercase shadow-2xl">Publish to Shop</button>
                </div>
            </div>

            <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 max-w-7xl mx-auto mt-10"></div>
        </section>

        <section id="sec-feed" class="hidden p-6 max-w-7xl mx-auto">
            <input type="text" id="search-input" oninput="filterFeed()" placeholder="Search trending..." class="w-full p-6 bg-white border rounded-full mb-10 shadow-sm outline-none">
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-chats" class="hidden p-8 max-w-2xl mx-auto">
            <h2 class="raj-font text-3xl mb-8">Direct Messages</h2>
            <div id="chat-list" class="space-y-4"></div>
        </section>

        <section id="sec-orders" class="hidden p-8 max-w-3xl mx-auto">
            <h2 class="raj-font text-3xl mb-8">Orders Tracking</h2>
            <div id="order-list" class="space-y-6"></div>
        </section>
    </main>

    <div id="auth-section" class="min-h-screen flex items-center justify-center bg-white hidden">
        <div class="w-full max-w-sm p-10 text-center">
            <h1 class="raj-font text-6xl text-[#d4af37] mb-12">SAINI</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-5 bg-gray-50 rounded-2xl mb-4 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl mb-10 outline-none">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-3xl font-bold shadow-xl">LOG IN</button>
        </div>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[2000] flex items-center justify-center bg-black/90 backdrop-blur-sm p-6">
        <div class="bg-white w-full max-w-md rounded-[50px] p-12 text-center shadow-2xl">
            <h3 class="raj-font text-2xl mb-6">Confirm Purchase</h3>
            <input id="o-name" placeholder="Your Name" class="w-full p-5 bg-gray-50 rounded-2xl mb-4 outline-none">
            <input id="o-phone" placeholder="Phone Number" class="w-full p-5 bg-gray-50 rounded-2xl mb-10 outline-none">
            <button onclick="confirmOrder()" class="w-full bg-black text-white py-6 rounded-3xl font-black uppercase">Send Order</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-8 text-gray-400 text-xs font-bold">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let curU = null; let viewId = null; let allProds = [];

        onAuthStateChanged(auth, u => {
            document.getElementById('loading-screen').classList.add('hidden');
            if(u) {
                curU = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadCore();
                showTab('feed');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        function loadCore() {
            onSnapshot(collection(db, "products"), s => {
                allProds = []; s.forEach(d => allProds.push({id: d.id, ...d.data()}));
                render(allProds.sort(() => Math.random() - 0.5), 'public-grid');
            });

            // FIX: INBOX WITH SENDER INFO
            onSnapshot(query(collection(db, "chats"), where("to", "==", curU.uid), orderBy("time", "desc")), s => {
                document.getElementById('msg-count').innerText = s.size;
                document.getElementById('msg-count').classList.toggle('hidden', s.size === 0);
                const l = document.getElementById('chat-list'); l.innerHTML = "";
                s.forEach(d => {
                    const c = d.data();
                    l.innerHTML += `
                    <div class="msg-box">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black text-[#d4af37] bg-[#d4af37]/5 px-3 py-1 rounded-full uppercase">SENDER: ${c.from.slice(0,12)}</span>
                            <button onclick="delMsg('${d.id}')" class="text-red-300"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <p class="text-gray-700 font-medium">"${c.msg}"</p>
                        <div class="mt-5 flex gap-2">
                            <button onclick="replyMsg('${c.from}')" class="flex-1 bg-black text-white py-3 rounded-2xl text-[10px] font-black">REPLY</button>
                            <button onclick="viewProfile('${c.from}')" class="bg-gray-50 px-4 rounded-2xl text-[10px] text-gray-400 font-bold">VIEW</button>
                        </div>
                    </div>`;
                });
            });

            // FIX: ORDER DATE/TIME LOGIC
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                const l = document.getElementById('order-list'); l.innerHTML = "";
                let ords = []; s.forEach(d => ords.push({id: d.id, ...d.data()}));
                ords.sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0)).forEach(o => {
                    const dt = o.time ? o.time.toDate().toLocaleString('en-IN') : 'Just now';
                    l.innerHTML += `<div class="bg-white p-6 rounded-[35px] border shadow-sm relative">
                        <div class="absolute top-4 right-6 text-[9px] font-black text-gray-200 uppercase">${dt}</div>
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-lg">${o.item}</h4>
                            <span class="text-[#d4af37] font-black">₹${o.price}</span>
                        </div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Customer: ${o.customer} | ${o.phone}</p>
                    </div>`;
                });
            });
        }

        window.showTab = (t) => {
            ['feed','shop','chats','orders'].forEach(s => {
                const sec = document.getElementById('sec-'+s);
                const btn = document.getElementById('tab-'+s);
                if(sec) sec.classList.toggle('hidden', s !== t);
                if(btn) btn.classList.toggle('active', s === t);
            });
            if(t === 'shop' && !viewId) viewProfile(curU.uid);
            window.scrollTo(0,0);
        };

        window.viewProfile = async (uid) => {
            viewId = uid;
            const isMe = (curU.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isMe ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.getElementById('visitor-btns').classList.toggle('hidden', isMe);

            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('disp-name').innerText = d.name || "Saini Creator";
                const b = document.getElementById('disp-bio');
                b.innerText = d.bio || "Mhara Swagat hai!";
                b.style.color = d.bioColor || '#666';
                b.style.fontSize = (d.bioSize || '14') + 'px';
                document.getElementById('profile-ui').src = d.profile || "https://api.dicebear.com/7.x/avataaars/svg?seed="+uid;
                document.getElementById('banner-ui').src = d.banner || "https://images.unsplash.com/photo-1557683316-973673baf926?w=1000";
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                const p = []; s.forEach(d => p.push({id: d.id, ...d.data()}));
                render(p, 'my-shop-grid', isMe);
            });
            showTab('shop');
        };

        window.openMsg = () => { const m = prompt("Write Message:"); if(m) addDoc(collection(db, "chats"), { from: curU.uid, to: viewId, msg: m, time: serverTimestamp() }); };
        window.replyMsg = (toId) => { const m = prompt("Write Reply:"); if(m) addDoc(collection(db, "chats"), { from: curU.uid, to: toId, msg: m, time: serverTimestamp() }); };
        window.delMsg = async (id) => { if(confirm("Delete message?")) await deleteDoc(doc(db, "chats", id)); };

        window.render = (data, cid, mine = false) => {
            const g = document.getElementById(cid); g.innerHTML = "";
            data.forEach(p => {
                g.innerHTML += `<div class="product-card">
                    <div class="aspect-square overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6">
                        <button onclick="viewProfile('${p.creatorId}')" class="text-[9px] font-black text-[#d4af37] mb-2 uppercase tracking-tighter">@${p.creator || 'User'}</button>
                        <h4 class="font-bold text-sm truncate text-gray-800">${p.name}</h4>
                        <p class="text-[11px] font-bold text-red-500 mt-1 uppercase line-clamp-1">${p.desc || ''}</p>
                        <div class="flex justify-between items-end mt-6">
                            <span class="font-black text-xl">₹${p.price}</span>
                            <div class="flex gap-2">
                                ${mine ? `<button onclick="delProd('${p.id}')" class="bg-red-50 text-red-400 p-3 rounded-2xl"><i class="fa-solid fa-trash"></i></button>` : ''}
                                <button onclick="triggerOrder('${p.name.replace(/'/g, "\\'")}', '${p.creatorId}', '${p.link}', '${p.price}')" class="bg-black text-white text-[10px] px-6 py-3 rounded-2xl font-black uppercase">Get It</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        };

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };
        window.saveProfile = async () => {
            await setDoc(doc(db, "users", curU.uid), { name: document.getElementById('in-name').value, bio: document.getElementById('in-bio').value, bioColor: document.getElementById('in-bio-color').value, bioSize: document.getElementById('in-bio-size').value }, { merge: true });
            location.reload();
        };
        window.uploadMedia = (t, i) => { const r = new FileReader(); r.readAsDataURL(i.files[0]); r.onload = async e => { await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, { merge: true }); location.reload(); } };
        window.publish = async () => {
            const name = document.getElementById('p-name').value;
            await addDoc(collection(db, "products"), { name, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, desc: document.getElementById('p-desc').value, link: document.getElementById('p-link').value, img: window.tempImg, creatorId: curU.uid, creator: document.getElementById('disp-name').innerText, time: serverTimestamp() });
            location.reload();
        };
        window.previewProd = (input) => { const r = new FileReader(); r.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); }; r.readAsDataURL(input.files[0]); };
        window.triggerOrder = (n, cid, l, p) => { window.target = { n, cid, l, p }; document.getElementById('order-modal').classList.remove('hidden'); };
        window.confirmOrder = async () => {
            const cn = document.getElementById('o-name').value, ph = document.getElementById('o-phone').value;
            await addDoc(collection(db, "orders"), { item: window.target.n, customer: cn, phone: ph, creatorId: window.target.cid, price: window.target.p, time: serverTimestamp() });
            document.getElementById('order-modal').classList.add('hidden');
            if(window.target.l) window.open(window.target.l, '_blank');
        };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.delProd = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "products", id)); };
        window.filterFeed = () => {
            const v = document.getElementById('search-input').value.toLowerCase();
            render(allProds.filter(p => p.name.toLowerCase().includes(v) || p.cat?.toLowerCase().includes(v)), 'public-grid');
        };
    </script>
</body>
</html>
