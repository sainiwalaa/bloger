<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #ef828a; --s: #FF9933; }
        body { background: #fafafa; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .hide { display: none !important; }
        .active-nav { color: var(--s) !important; }
        .insta-border { border: 2px solid transparent; background: linear-gradient(white, white) padding-box, linear-gradient(45deg, #f093fb, #f5576c) border-box; }
        .heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 80px; transition: 0.3s; pointer-events: none; z-index: 50; }
        .heart-pop.animate { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        input, textarea, select { border: 1px solid #eee !important; font-size: 14px; }
    </style>
</head>
<body class="flex justify-center">

<div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-20">
    
    <header class="sticky top-0 bg-white/95 backdrop-blur-md z-[100] border-b p-4 flex justify-between items-center">
        <h1 class="text-2xl font-black italic text-orange-700">SainiWalaa</h1>
        <div class="flex gap-5 text-xl text-orange-800">
            <i class="fa-solid fa-camera cursor-pointer" title="New Post" onclick="openM('post-modal')"></i>
            <i class="fa-solid fa-cart-plus cursor-pointer" title="New Product" onclick="openM('prod-modal')"></i>
            <i class="fa-solid fa-clipboard-list cursor-pointer text-blue-600" title="Orders" onclick="openM('order-check-modal')"></i>
        </div>
    </header>

    <main id="v-feed" class="space-y-4 pt-2"></main>

    <main id="v-shop" class="p-4 hide">
        <h2 class="font-black text-orange-900 mb-4 tracking-tighter uppercase">🚩 Royal Bazaar</h2>
        <div id="bazaar-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <main id="v-profile" class="hide">
        <div class="p-6">
            <div class="flex items-center gap-8 mb-4">
                <div class="w-20 h-20 rounded-full insta-border p-1 relative">
                    <img id="user-img" src="https://via.placeholder.com/150" class="rounded-full w-full h-full object-cover">
                </div>
                <div class="flex gap-4 text-center text-xs">
                    <div><b id="c-posts">0</b><p class="text-gray-400">Posts</p></div>
                    <div><b id="c-prods">0</b><p class="text-gray-400">Items</p></div>
                    <div><b id="c-orders">0</b><p class="text-gray-400">Orders</p></div>
                </div>
            </div>
            <h2 id="user-name" class="font-bold text-sm text-orange-900">SainiWalaa Studio</h2>
            <p id="user-bio" class="text-[11px] text-gray-500">Artist & Creator | Heritage 🌸</p>
            <div class="flex gap-2 mt-4">
                <button onclick="openM('edit-profile-modal')" class="flex-1 bg-gray-100 py-1.5 rounded-lg font-bold text-xs border">Edit Profile</button>
                <button onclick="showPage('shop')" class="flex-1 bg-orange-600 text-white py-1.5 rounded-lg font-bold text-xs">Visit Shop</button>
            </div>
        </div>
        <div id="profile-grid" class="grid grid-cols-3 gap-1 px-1"></div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t flex justify-around p-3 z-[100] shadow-2xl">
        <i onclick="showPage('feed')" id="n-feed" class="fa-solid fa-house text-2xl active-nav cursor-pointer"></i>
        <i onclick="showPage('shop')" id="n-shop" class="fa-solid fa-bag-shopping text-2xl text-gray-300 cursor-pointer"></i>
        <i onclick="showPage('profile')" id="n-profile" class="fa-solid fa-circle-user text-2xl text-gray-300 cursor-pointer"></i>
    </nav>
</div>

<div id="post-modal" class="fixed inset-0 bg-white z-[2000] hide p-8">
    <h2 class="text-xl font-bold mb-6">Create Social Post 📸</h2>
    <input type="file" id="post-file" accept="image/*" class="mb-4 w-full p-2 bg-orange-50 rounded">
    <textarea id="post-cap" placeholder="Write caption..." class="w-full p-4 rounded-xl h-24 mb-4"></textarea>
    <button onclick="publishAction('post')" id="btn-post" class="w-full bg-orange-600 text-white p-4 rounded-xl font-bold">POST NOW</button>
    <button onclick="closeM('post-modal')" class="w-full text-gray-400 mt-4">Cancel</button>
</div>

<div id="prod-modal" class="fixed inset-0 bg-white z-[2000] hide p-8 overflow-y-auto">
    <h2 class="text-xl font-bold mb-6">List New Product 🛍️</h2>
    <input type="file" id="prod-file" accept="image/*" class="mb-4 w-full p-2 bg-orange-50 rounded">
    <input type="text" id="prod-name" placeholder="Product Name" class="w-full p-4 rounded-xl mb-4">
    <input type="number" id="prod-price" placeholder="Price (₹)" class="w-full p-4 rounded-xl mb-4">
    <input type="text" id="prod-link" placeholder="External Web Link (URL)" class="w-full p-4 rounded-xl mb-4">
    <textarea id="prod-desc" placeholder="Description..." class="w-full p-4 rounded-xl h-20 mb-4"></textarea>
    <button onclick="publishAction('prod')" id="btn-prod" class="w-full bg-black text-white p-4 rounded-xl font-bold">ADD TO BAZAAR</button>
    <button onclick="closeM('prod-modal')" class="w-full text-gray-400 mt-4">Cancel</button>
</div>

<div id="order-check-modal" class="fixed inset-0 bg-white z-[3000] hide p-6 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">My Orders 📦</h2>
        <i class="fa-solid fa-xmark text-2xl" onclick="closeM('order-check-modal')"></i>
    </div>
    <div id="order-list" class="space-y-4"></div>
</div>

<div id="edit-profile-modal" class="fixed inset-0 bg-white z-[2000] hide p-8">
    <h2 class="text-xl font-bold mb-6">Edit Studio Details</h2>
    <input type="text" id="edit-name" placeholder="Studio Name" class="w-full p-4 rounded-xl mb-4">
    <textarea id="edit-bio" placeholder="Bio..." class="w-full p-4 rounded-xl h-20 mb-4"></textarea>
    <button onclick="saveProfile()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">SAVE CHANGES</button>
    <button onclick="closeM('edit-profile-modal')" class="w-full text-gray-400 mt-4">Cancel</button>
</div>

<div id="order-form-modal" class="fixed inset-0 bg-black/50 z-[4000] hide flex items-center justify-center p-6">
    <div class="bg-white w-full rounded-3xl p-6">
        <h2 class="text-xl font-bold mb-4">Buy Product</h2>
        <input type="hidden" id="buy-pid">
        <input type="text" id="buy-name" placeholder="Aapko Naam" class="w-full p-4 border rounded-xl mb-3">
        <input type="number" id="buy-mob" placeholder="Mobile Number" class="w-full p-4 border rounded-xl mb-3">
        <textarea id="buy-addr" placeholder="Address" class="w-full p-4 border rounded-xl h-20 mb-3"></textarea>
        <button onclick="confirmPurchase()" id="btn-buy" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold">CONFIRM ORDER</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwhMBFBY0WFDz4e1J_j35tYMCYDeVGsJBKRO8HHRELDmKh_NTuRCSmaJSW0vpwxnbrdrw/exec";
    const CLOUD_NAME = "dprl2lyih"; 
    const UPLOAD_PRESET = "sainiwalaa_preset"; 

    window.SAINI_DATA = { posts: [], products: [], orders: [] };

    // Load Profile from LocalStorage
    function loadProfile() {
        document.getElementById('user-name').innerText = localStorage.getItem('s_name') || "SainiWalaa Studio";
        document.getElementById('user-bio').innerText = localStorage.getItem('s_bio') || "Artist & Creator | Heritage 🌸";
        document.getElementById('edit-name').value = localStorage.getItem('s_name') || "";
        document.getElementById('edit-bio').value = localStorage.getItem('s_bio') || "";
    }

    function saveProfile() {
        localStorage.setItem('s_name', document.getElementById('edit-name').value);
        localStorage.setItem('s_bio', document.getElementById('edit-bio').value);
        loadProfile();
        closeM('edit-profile-modal');
    }

    async function fetchData() {
        try {
            const res = await fetch(API + "?action=getData");
            const data = await res.json();
            window.SAINI_DATA = data;
            renderAll();
        } catch(e) { console.error("Sync error"); }
    }

    function renderAll() {
        renderFeed();
        renderShop();
        renderProfile();
        renderOrders();
    }

    async function publishAction(mode) {
        const file = document.getElementById(mode === 'post' ? 'post-file' : 'prod-file').files[0];
        const btn = document.getElementById(mode === 'post' ? 'btn-post' : 'btn-prod');
        if(!file) return alert("Hukum! Photo chunna zaroori hai.");

        btn.disabled = true; btn.innerText = "Uploading... ⏳";

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const cRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:"POST", body:formData});
            const cData = await cRes.json();

            const payload = {
                action: mode === 'post' ? "addPost" : "listProduct",
                uid: 'Admin',
                name: document.getElementById('prod-name')?.value || "",
                price: document.getElementById('prod-price')?.value || 0,
                desc: document.getElementById('prod-desc')?.value || "",
                weblink: document.getElementById('prod-link')?.value || "",
                img: cData.secure_url,
                url: cData.secure_url,
                cap: document.getElementById('post-cap')?.value || ""
            };

            fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            
            // Optimistic UI Update
            if(mode === 'post') window.SAINI_DATA.posts.unshift([Date.now(), 'Admin', cData.secure_url, 'image', payload.cap]);
            else window.SAINI_DATA.products.unshift([Date.now(), 'Admin', payload.name, payload.price, '', '', cData.secure_url, 'show']);
            
            alert("Success sa!");
            location.reload();
        } catch(e) { alert("Error sa!"); btn.disabled = false; }
    }

    function renderFeed() {
        let h = "";
        window.SAINI_DATA.posts.slice().reverse().forEach(p => {
            h += `<div class="border-b bg-white"><div class="p-3 flex items-center gap-2"><div class="w-7 h-7 bg-orange-500 rounded-full"></div><b class="text-xs">SainiWalaa</b></div><img src="${p[2]}" class="w-full h-[400px] object-cover"><div class="p-4"><p class="text-sm"><b>SainiWalaa</b> ${p[4]}</p></div></div>`;
        });
        document.getElementById('v-feed').innerHTML = h || "<p class='text-center py-20 text-gray-300'>No Posts</p>";
    }

    function renderShop() {
        let h = "";
        window.SAINI_DATA.products.forEach(p => {
            if(p[7] !== 'hide') {
                h += `<div class="bg-white border rounded-3xl overflow-hidden shadow-sm"><img src="${p[6]}" class="w-full h-40 object-cover"><div class="p-3 text-center"><b class="text-[10px] block truncate text-orange-900">${p[2]}</b><b class="text-orange-700 text-sm">₹${p[3]}</b><button onclick="openBuy('${p[0]}')" class="w-full bg-black text-white text-[10px] mt-2 py-2 rounded-xl font-bold">ORDER NOW</button></div></div>`;
            }
        });
        document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center py-10'>Shop Empty</p>";
        document.getElementById('c-prods').innerText = window.SAINI_DATA.products.length;
    }

    function renderProfile() {
        document.getElementById('c-posts').innerText = window.SAINI_DATA.posts.length;
        let h = "";
        window.SAINI_DATA.posts.forEach(p => h += `<img src="${p[2]}" class="aspect-square object-cover">`);
        document.getElementById('profile-grid').innerHTML = h;
    }

    function renderOrders() {
        let h = "";
        const orders = window.SAINI_DATA.orders || [];
        document.getElementById('c-orders').innerText = orders.length;
        orders.slice().reverse().forEach(o => {
            h += `<div class="p-4 bg-orange-50 rounded-2xl border border-orange-100"><div class="flex justify-between font-bold text-xs mb-2"><span>Order #${o[0].toString().slice(-4)}</span><span class="text-orange-600">${o[5]}</span></div><p class="text-xs"><b>Customer:</b> ${o[1]}</p><p class="text-xs"><b>Address:</b> ${o[3]}</p></div>`;
        });
        document.getElementById('order-list').innerHTML = h || "<p class='text-center py-10'>No Orders Yet</p>";
    }

    function openBuy(pid) { document.getElementById('buy-pid').value = pid; openM('order-form-modal'); }
    async function confirmPurchase() {
        const btn = document.getElementById('btn-buy'); btn.disabled = true;
        const payload = {
            action: "placeOrder",
            pid: document.getElementById('buy-pid').value,
            bName: document.getElementById('buy-name').value,
            bMobile: document.getElementById('buy-mob').value,
            bAddr: document.getElementById('buy-addr').value
        };
        await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Order Sent! 🚩"); location.reload();
    }

    function showPage(p) {
        ['feed','shop','profile'].forEach(v => {
            document.getElementById('v-'+v).classList.add('hide');
            document.getElementById('n-'+v).classList.replace('active-nav', 'text-gray-300');
        });
        document.getElementById('v-'+p).classList.remove('hide');
        document.getElementById('n-'+p).classList.replace('text-gray-300', 'active-nav');
    }

    function openM(id) { document.getElementById(id).classList.remove('hide'); }
    function closeM(id) { document.getElementById(id).classList.add('hide'); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => { loadProfile(); fetchData(); };
</script>
</body>
</html>
