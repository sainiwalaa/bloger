<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Shahi Darbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn.active { color: #d4af37; border-bottom: 4px solid #d4af37; font-weight: 800; }
        .hidden { display: none !important; }
        
        /* SHAHI PROFILE LAYOUT */
        .banner-box { height: 230px; background: #1a1a1a; background-size: cover; background-position: center; border-radius: 0 0 40px 40px; position: relative; border-bottom: 3px solid #d4af37; }
        .profile-area { position: absolute; bottom: -60px; left: 20px; display: flex; align-items: flex-end; gap: 15px; }
        .profile-img { width: 110px; height: 110px; border-radius: 28px; border: 5px solid #fff; object-fit: cover; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .badge-count { position: absolute; top: -5px; right: -5px; background: #ff0000; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: bold; border: 2px solid white; }
        .shahi-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        .img-frame { width: 100%; aspect-ratio: 1/1; overflow: hidden; }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm text-center">
            <h1 class="raj-font text-4xl text-[#d4af37] mb-8">SAINIWALAA</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 border-b mb-4 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border-b mb-8 outline-none">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-full font-bold shadow-xl">LOG IN / SIGN UP</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md flex justify-around border-b shadow-sm">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn active p-4 text-[10px] font-bold uppercase">Trending</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn p-4 text-[10px] font-bold uppercase">Mhari Shop</button>
            <button onclick="showTab('chats')" id="tab-chats" class="nav-btn p-4 text-[10px] font-bold uppercase relative">
                Inbox <span id="msg-count" class="hidden badge-count">0</span>
            </button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn p-4 text-[10px] font-bold uppercase">Orders</button>
            <button onclick="logout()" class="p-4 text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <section id="sec-shop" class="hidden">
            <div id="banner-ui" class="banner-box">
                <div class="profile-area">
                    <div class="relative">
                        <img id="profile-ui" src="https://via.placeholder.com/150" class="profile-img">
                        <label class="absolute bottom-0 right-0 bg-[#d4af37] text-white p-2 rounded-lg cursor-pointer owner-only hidden">
                            <i class="fa-solid fa-camera"></i><input type="file" onchange="uploadMedia('profile', this)">
                        </label>
                    </div>
                    <div class="mb-4">
                        <h2 id="disp-name" class="font-black text-white text-xl drop-shadow-md">Creator</h2>
                        <div class="flex gap-2 mt-1">
                            <button id="follow-btn" onclick="toggleFollow()" class="bg-white text-black text-[9px] px-4 py-1.5 rounded-full font-bold uppercase shadow-sm">Follow</button>
                            <button id="msg-btn" onclick="openChatBox()" class="bg-[#d4af37] text-white text-[9px] px-4 py-1.5 rounded-full font-bold uppercase shadow-sm">Message</button>
                        </div>
                    </div>
                </div>
                <label class="absolute top-4 right-4 bg-black/40 p-3 rounded-xl cursor-pointer text-white owner-only hidden">
                    <i class="fa-solid fa-image"></i><input type="file" onchange="uploadMedia('banner', this)">
                </label>
            </div>

            <div class="mt-20 px-6 max-w-4xl mx-auto text-center">
                <p id="disp-bio" class="text-gray-700 italic bg-white p-3 rounded-xl shadow-sm inline-block">Bio loading...</p>
                <div class="mt-6 flex justify-center gap-3">
                    <button onclick="copyShopLink()" class="text-[9px] bg-gray-100 px-6 py-2 rounded-full font-bold">SHARE SHOP</button>
                    <button id="block-btn" onclick="toggleBlock()" class="text-[9px] border border-red-200 text-red-500 px-6 py-2 rounded-full font-bold">BLOCK</button>
                </div>
                <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" class="mt-4 text-[9px] border p-2 rounded owner-only hidden">Settings</button>
            </div>

            <div id="edit-box" class="hidden max-w-sm mx-auto p-6 mt-4 bg-white border rounded-[30px] space-y-3">
                <input id="in-name" placeholder="Name" class="w-full p-2 border-b outline-none">
                <input id="in-bio" placeholder="Bio" class="w-full p-2 border-b outline-none">
                <button onclick="saveProfile()" class="w-full bg-[#d4af37] text-white p-3 rounded-xl font-bold">SAVE</button>
            </div>

            <div class="max-w-4xl mx-auto p-4 mt-12 owner-only hidden">
                <div class="bg-white border-2 border-dashed p-6 rounded-[30px] text-center">
                    <input id="p-name" placeholder="Item Name" class="w-full p-2 border-b mb-2 outline-none">
                    <input id="p-price" placeholder="Price ₹" class="w-full p-2 border-b mb-2 outline-none">
                    <input id="p-link" placeholder="External WebLink (Amazon/Website)" class="w-full p-2 border-b mb-4 outline-none">
                    <input type="file" id="p-file" onchange="previewProd(this)" class="hidden">
                    <label for="p-file" class="bg-gray-100 p-4 block rounded-xl cursor-pointer font-bold mb-4">UPLOAD PHOTO</label>
                    <button id="pub-btn" onclick="publish()" class="hidden w-full bg-[#d4af37] text-white p-4 rounded-xl font-bold uppercase">Publish Product</button>
                </div>
            </div>

            <div id="my-shop-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 max-w-6xl mx-auto"></div>
        </section>

        <section id="sec-feed" class="p-4 max-w-6xl mx-auto">
            <input type="text" id="search-input" oninput="filterFeed()" placeholder="Search..." class="w-full p-3 bg-gray-100 rounded-xl mb-6 outline-none">
            <div id="public-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="sec-chats" class="hidden p-6 max-w-xl mx-auto">
            <h3 class="raj-font text-xl mb-6">Inbox Messages</h3>
            <div id="chat-list" class="space-y-4"></div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-xl mx-auto">
            <h3 class="raj-font text-xl mb-6 text-center">Customer Orders</h3>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <div id="checkout-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-8 text-center">
             <h3 class="raj-font text-xl mb-6">Order Details</h3>
             <input id="order-cust-name" placeholder="Your Name" class="w-full p-3 border-b mb-4 outline-none">
             <input id="order-cust-phone" placeholder="WhatsApp Number" class="w-full p-3 border-b mb-8 outline-none">
             <button onclick="submitOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">CONFIRM & OPEN LINK</button>
             <button onclick="document.getElementById('checkout-modal').classList.add('hidden')" class="mt-4 text-gray-400">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, browserLocalPersistence);
        let currentUser = null; let viewId = null; let allProducts = [];

        onAuthStateChanged(auth, u => {
            if(u) {
                currentUser = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                syncData();
                const sid = new URLSearchParams(window.location.search).get('shop');
                if(sid) viewCreator(sid); else showTab('feed');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        function syncData() {
            // FEED ALGO
            onSnapshot(collection(db, "products"), snap => {
                allProducts = []; snap.forEach(d => allProducts.push({id: d.id, ...d.data()}));
                renderGrid(allProducts.sort(() => Math.random() - 0.5), 'public-grid');
            });

            // INBOX COUNT
            onSnapshot(query(collection(db, "chats"), where("to", "==", currentUser.uid)), snap => {
                const count = snap.size;
                const badge = document.getElementById('msg-count');
                if(count > 0) {
                    badge.innerText = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
                const list = document.getElementById('chat-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl border-l-4 border-[#d4af37] shadow-sm">
                        <p class="text-sm">${c.msg}</p>
                        <button onclick="viewCreator('${c.from}')" class="text-xs font-bold text-[#d4af37] mt-2">REPLY</button>
                    </div>`;
                });
            });

            // ORDERS
            onSnapshot(query(collection(db, "orders"), where("creatorId", "==", currentUser.uid)), snap => {
                const list = document.getElementById('order-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl border shadow-sm"><b>${o.item}</b><br><small>${o.customer} (${o.phone})</small></div>`;
                });
            });
        }

        window.viewCreator = async (uid) => {
            viewId = uid;
            const isOwner = (currentUser.uid === uid);
            document.querySelectorAll('.owner-only').forEach(el => isOwner ? el.classList.remove('hidden') : el.classList.add('hidden'));
            document.getElementById('msg-btn').classList.toggle('hidden', isOwner);
            document.getElementById('follow-btn').classList.toggle('hidden', isOwner);

            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('disp-name').innerText = d.name || "Creator";
                document.getElementById('disp-bio').innerText = d.bio || "No Bio";
                document.getElementById('profile-ui').src = d.profile || "https://via.placeholder.com/150";
                document.getElementById('banner-ui').style.backgroundImage = `url(${d.banner})`;
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), snap => {
                const prod = []; snap.forEach(d => prod.push(d.data()));
                renderGrid(prod, 'my-shop-grid', true);
            });
            showTab('shop');
        };

        window.renderGrid = (data, cid, isOwner = false) => {
            const g = document.getElementById(cid); g.innerHTML = "";
            data.forEach(p => {
                g.innerHTML += `<div class="shahi-card"><div class="img-frame"><img src="${p.img}"></div>
                <div class="p-3">
                    ${!isOwner ? `<button onclick="viewCreator('${p.creatorId}')" class="text-[8px] font-bold text-[#d4af37]">@${p.creator}</button>` : ''}
                    <h4 class="font-bold text-[11px] truncate">${p.name}</h4>
                    <div class="flex justify-between items-center mt-2"><b>₹${p.price}</b>
                    <button onclick="orderNow('${p.name}', '${p.creatorId}', '${p.link}')" class="bg-black text-white text-[9px] px-3 py-1.5 rounded-full">ORDER</button></div>
                </div></div>`;
            });
        };

        // ORDER LOGIC (PAHALE JESA)
        window.orderNow = (name, cid, link) => {
            window.targetLink = link;
            window.targetItem = name;
            window.targetCreator = cid;
            document.getElementById('checkout-modal').classList.remove('hidden');
        };

        window.submitOrder = async () => {
            const n = document.getElementById('order-cust-name').value;
            const ph = document.getElementById('order-cust-phone').value;
            if(!n || !ph) return alert("Bhai details toh bharo!");
            
            await addDoc(collection(db, "orders"), { item: window.targetItem, customer: n, phone: ph, creatorId: window.targetCreator, userId: currentUser.uid, time: serverTimestamp() });
            
            document.getElementById('checkout-modal').classList.add('hidden');
            if(window.targetLink && window.targetLink !== "undefined") {
                window.open(window.targetLink, '_blank');
            } else {
                alert("Order Saved! (No external link provided)");
            }
        };

        window.openChatBox = () => {
            const msg = prompt("Apna Message likhein:");
            if(msg) addDoc(collection(db, "chats"), { from: currentUser.uid, to: viewId, msg: msg, time: serverTimestamp() });
        };

        window.publish = async () => {
            await addDoc(collection(db, "products"), { name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, link: document.getElementById('p-link').value, img: window.tempImg, creatorId: currentUser.uid, creator: document.getElementById('disp-name').innerText, time: serverTimestamp() });
            location.reload();
        };

        window.previewProd = (input) => {
            const reader = new FileReader(); reader.readAsDataURL(input.files[0]);
            reader.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); };
        };

        window.uploadMedia = (type, input) => {
            const reader = new FileReader(); reader.readAsDataURL(input.files[0]);
            reader.onload = async e => { await setDoc(doc(db, "users", currentUser.uid), { [type]: e.target.result }, { merge: true }); location.reload(); };
        };

        window.saveProfile = async () => {
            await setDoc(doc(db, "users", currentUser.uid), { name: document.getElementById('in-name').value, bio: document.getElementById('in-bio').value }, { merge: true });
            location.reload();
        };

        window.showTab = (t) => {
            ['feed','shop','chats','orders'].forEach(s => {
                document.getElementById('sec-'+s)?.classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s)?.classList.toggle('active', s === t);
            });
            if(t === 'shop' && currentUser && !viewId) viewCreator(currentUser.uid);
        };

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth,e,p).catch(() => createUserWithEmailAndPassword(auth,e,p));
        };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.filterFeed = () => {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filt = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderGrid(filt, 'public-grid');
        };
        window.copyShopLink = () => { navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?shop=" + currentUser.uid); alert("Link Copied!"); };
    </script>
</body>
</html>
