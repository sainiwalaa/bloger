<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userCache = null;
        let activePostId = null;
        let viewedUid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                userCache = snap.val();
                
                // Refresh Logic: Check last visited page
                const lastPage = localStorage.getItem('lastPage') || 'feed';
                const lastUser = localStorage.getItem('lastViewedUid') || user.uid;
                
                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('app').classList.remove('hide');
                
                initApp();

                if (lastPage === 'profile') {
                    viewUserProfile(lastUser);
                } else {
                    showPage(lastPage);
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        function initApp() {
            onValue(ref(db, 'posts'), s => {
                const feed = document.getElementById('v-feed');
                feed.innerHTML = ""; 
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    feed.innerHTML += `
                        <div class="bg-white mb-4 border-b pb-4">
                            <div class="p-3 flex items-center gap-2 cursor-pointer" onclick="viewUserProfile('${p.uid}')">
                                <img src="${p.uPhoto || 'https://via.placeholder.com/50'}" class="w-10 h-10 chokor border-2 border-orange-500">
                                <b class="text-xs raj-title italic">${p.uName}</b>
                            </div>
                            <img src="${p.url}" class="w-full max-h-[500px] object-contain bg-black">
                            <div class="p-4 flex gap-6 text-2xl">
                                <i class="fa-solid fa-heart text-gray-300 cursor-pointer" id="like-${k}" onclick="toggleLike('${k}')"></i>
                                <i class="fa-regular fa-comment cursor-pointer" onclick="openCommentModal('${k}')"></i>
                            </div>
                            <p class="px-4 text-[11px] font-bold text-gray-400 mb-1">${p.date || ''}</p>
                            <p class="px-4 text-xs"><b>@${p.uHandle}</b> ${p.caption}</p>
                        </div>`;
                });
            });

            onValue(ref(db, 'products'), s => {
                const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    grid.innerHTML += `
                        <div class="bg-white border p-2 rounded-xl">
                            <img src="${p.url}" class="w-full h-32 chokor mb-2">
                            <h3 class="text-[10px] font-black truncate uppercase">${p.name}</h3>
                            <div class="text-orange-600 font-black text-xs mb-2">₹${p.price}</div>
                            <button onclick="openOrderForm('${p.name}', '${p.link}')" class="w-full btn-royal py-2 text-[10px] uppercase font-bold">Khareedo Sa 🚩</button>
                        </div>`;
                });
            });
        }

        window.viewUserProfile = async (uid) => {
            viewedUid = uid;
            localStorage.setItem('lastPage', 'profile');
            localStorage.setItem('lastViewedUid', uid);
            loadProfileData(uid);
            showPage('profile');
        };

        async function loadProfileData(uid) {
            const snap = await get(ref(db, 'users/' + uid));
            const u = snap.val();
            if(!u) return;

            document.getElementById('u-name-profile').innerText = u.name;
            document.getElementById('u-handle-profile').innerText = "@" + u.username;
            document.getElementById('u-bio-profile').innerText = u.bio || "Royal Member 🚩";
            document.getElementById('u-web-btn').innerText = u.website || "VISIT WEBSITE";
            
            // Set WhatsApp Message Link
            window.currentProfilePhone = u.phone || "911234567890"; // Fallback

            if(uid === auth.currentUser.uid) {
                document.getElementById('profile-actions-self').classList.remove('hide');
                document.getElementById('private-orders-section').classList.remove('hide');
                loadPrivateOrders();
            } else {
                document.getElementById('profile-actions-self').classList.add('hide');
                document.getElementById('private-orders-section').classList.add('hide');
            }

            onValue(ref(db, 'posts'), s => {
                const myPosts = document.getElementById('my-posts-grid');
                myPosts.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).forEach(k => {
                    if(data[k].uid === uid) {
                        myPosts.innerHTML += `<img src="${data[k].url}" class="w-full h-32 chokor border">`;
                    }
                });
            });
        }

        // Action Buttons Logic
        window.handleFollow = (btn) => {
            btn.innerText = (btn.innerText === "FOLLOW") ? "FOLLOWING" : "FOLLOW";
            btn.classList.toggle('bg-orange-600');
            btn.classList.toggle('bg-black');
        };

        window.handleMessage = () => {
            const msg = "Hukum, SainiWalaa Studio par aapka kaam dekha!";
            window.open(`https://wa.me/${window.currentProfilePhone}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        function loadPrivateOrders() {
            onValue(ref(db, 'orders/' + auth.currentUser.uid), s => {
                const oGrid = document.getElementById('my-orders-list'); oGrid.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).reverse().forEach(k => {
                    const o = data[k];
                    oGrid.innerHTML += `
                        <div class="flex justify-between items-center p-3 border-b bg-orange-50/50 rounded-lg mb-2">
                            <div><b class="text-[10px] uppercase">${o.product}</b><br><span class="text-[9px] text-gray-400">${o.date}</span></div>
                            <div class="text-[10px] font-bold text-orange-600">PENDING</div>
                        </div>`;
                });
            });
        }

        window.showPage = (p) => {
            localStorage.setItem('lastPage', p);
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById('v-' + p).classList.remove('hide');
        };

        window.submitOrder = async () => {
            const name = document.getElementById('ord-name').value;
            const phone = document.getElementById('ord-phone').value;
            if(!name || !phone) return alert("Hukum, poora detail bhariye!");
            const btn = document.getElementById('btn-ord-final');
            btn.innerHTML = "Thambo Sa... 🚩";
            const orderData = { product: document.getElementById('order-p-name').innerText, clientName: name, phone: phone, date: new Date().toLocaleString() };
            await push(ref(db, 'orders/' + auth.currentUser.uid), orderData);
            window.open(window.currentOrderLink, '_blank');
            closeM('order-modal');
            btn.innerHTML = "ORDER CONFIRM KAREIN";
        };

        window.toggleLike = (id) => {
            const heart = document.getElementById('like-' + id);
            heart.classList.toggle('text-red-600');
            heart.classList.toggle('text-gray-300');
        };

        window.openCommentModal = (id) => { activePostId = id; openM('comment-modal'); loadComments(id); };
        window.sendComment = async () => {
            const txt = document.getElementById('com-input').value;
            if(!txt) return;
            await push(ref(db, 'comments/' + activePostId), { uName: userCache.name, text: txt, time: Date.now() });
            document.getElementById('com-input').value = "";
        };

        function loadComments(id) {
            onValue(ref(db, 'comments/' + id), s => {
                const box = document.getElementById('comment-list'); box.innerHTML = "";
                const data = s.val();
                if(data) Object.keys(data).forEach(k => {
                    box.innerHTML += `<div class="mb-2 text-xs text-gray-600"><b>${data[k].uName}:</b> ${data[k].text}</div>`;
                });
            });
        }

        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');
        window.openOrderForm = (pName, pLink) => { document.getElementById('order-p-name').innerText = pName; openM('order-modal'); window.currentOrderLink = pLink; };

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 12px; border: none; cursor: pointer; }
        .chokor { border-radius: 10px; object-fit: cover; }
        .web-box { border: 3px solid #ea580c; background: #fff; padding: 15px; border-radius: 15px; font-weight: 900; text-align: center; display: block; box-shadow: 6px 6px 0px #ea580c; }
        input { border: 1.5px solid #eee !important; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        .nav-icon { font-size: 1.5rem; color: #d1d5db; cursor: pointer; }
    </style>
</head>
<body class="flex justify-center bg-gray-50">

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-24 hide bg-white shadow-2xl">
        <header class="sticky top-0 bg-white/95 border-b p-4 flex justify-between items-center z-50">
            <div>
                <h1 class="text-2xl font-black raj-title italic leading-none" onclick="showPage('feed')">SAINIWALAA</h1>
                <p class="text-[9px] font-black text-gray-400 -mt-1 uppercase">Royal Studio Culture</p>
            </div>
            <div class="flex gap-4">
                <i class="fa-solid fa-plus-square text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
                <i class="fa-solid fa-store text-gray-400 text-2xl" onclick="showPage('shop')"></i>
            </div>
        </header>

        <main id="v-feed"></main>

        <main id="v-shop" class="hide p-4">
            <h2 class="text-xl font-black raj-title mb-6 italic">ROYAL BAZAAR 🚩</h2>
            <div id="shop-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="v-profile" class="hide">
            <div class="h-44 bg-gray-100 relative">
                <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1590050752117-23a9d7fc2173?auto=format&fit=crop&w=500&q=60">
                <div class="w-28 h-28 absolute -bottom-10 left-6 border-4 border-white shadow-xl bg-white chokor overflow-hidden">
                    <img id="u-prof-img" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="mt-14 p-6">
                <h2 id="u-name-profile" class="text-3xl font-black raj-title italic leading-none"></h2>
                <p id="u-handle-profile" class="text-orange-600 font-bold text-sm mt-1"></p>
                
                <div class="flex gap-4 mt-4">
                    <button onclick="handleFollow(this)" class="bg-orange-600 text-white px-6 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">Follow</button>
                    <button onclick="handleMessage()" class="bg-gray-100 px-6 py-2 rounded-xl text-[10px] font-bold uppercase text-gray-600">Message</button>
                </div>

                <p id="u-bio-profile" class="text-gray-500 text-xs mt-4 italic"></p>
                <a id="u-web-btn" href="#" target="_blank" class="web-box mt-6 uppercase font-bold text-sm"></a>

                <div id="profile-actions-self" class="grid grid-cols-2 gap-3 mt-8 hide">
                    <button onclick="openM('edit-modal')" class="bg-black text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Edit Studio</button>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Logout</button>
                </div>

                <div id="private-orders-section" class="mt-10 border-t pt-6 hide">
                    <h2 class="text-lg font-black raj-title mb-4 italic">MERE ORDERS (PRIVATE) 🚩</h2>
                    <div id="my-orders-list" class="flex flex-col gap-2"></div>
                </div>
            </div>
            <div class="border-t p-1 grid grid-cols-3 gap-1" id="my-posts-grid"></div>
        </main>

        <div id="order-modal" class="fixed inset-0 bg-black/80 z-[2000] hide flex items-center justify-center p-6">
            <div class="bg-white w-full rounded-2xl p-6 shadow-2xl">
                <h2 class="text-xl font-black raj-title mb-1 italic">ORDER FORM 🚩</h2>
                <p id="order-p-name" class="text-[10px] font-bold text-gray-400 uppercase mb-6"></p>
                <input type="text" id="ord-name" placeholder="Aapka Naam">
                <input type="number" id="ord-phone" placeholder="Aapka Mobile Number">
                <button id="btn-ord-final" onclick="submitOrder()" class="btn-royal w-full shadow-lg">ORDER CONFIRM KAREIN</button>
                <button onclick="closeM('order-modal')" class="mt-4 w-full text-xs text-gray-300 font-bold">CANCEL</button>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-5 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house nav-icon"></i>
            <i onclick="showPage('shop')" class="fa-solid fa-bag-shopping nav-icon"></i>
            <i onclick="viewUserProfile(auth.currentUser.uid)" class="fa-solid fa-crown nav-icon"></i>
        </nav>
    </div>

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white text-center">
        <h1 class="text-5xl font-black raj-title mb-10 italic">SainiWalaa</h1>
        <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
        <button onclick="signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value)" class="btn-royal shadow-xl">STUDIO LOGIN</button>
    </div>
</body>
</html>
