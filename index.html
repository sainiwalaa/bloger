<script type="module">
    // ... (Firebase setup wahi rahega)

    // --- UPDATED PROFILE DATA ---
    window.updateProfile = async () => {
        const btn = document.getElementById('btn-up-prof');
        const pFile = document.getElementById('up-p-img').files[0];
        const bFile = document.getElementById('up-b-img').files[0];
        const nName = document.getElementById('edit-name').value;
        const nBio = document.getElementById('edit-bio').value;

        btn.innerText = "⏳ Updating...";
        btn.disabled = true;

        let pUrl = currentUserData.photo || "";
        let bUrl = currentUserData.banner || "";

        try {
            // Upload Profile Image if selected
            if(pFile) {
                const fd = new FormData(); fd.append('file', pFile); fd.append('upload_preset', 'social_preset');
                const res = await fetch(`https://api.cloudinary.com/v1_1/dprl2lyih/image/upload`, {method:"POST", body:fd});
                const d = await res.json(); pUrl = d.secure_url;
            }
            // Upload Banner if selected
            if(bFile) {
                const fd = new FormData(); fd.append('file', bFile); fd.append('upload_preset', 'social_preset');
                const res = await fetch(`https://api.cloudinary.com/v1_1/dprl2lyih/image/upload`, {method:"POST", body:fd});
                const d = await res.json(); bUrl = d.secure_url;
            }

            await update(ref(db, 'users/' + auth.currentUser.uid), {
                name: nName, bio: nBio, photo: pUrl, banner: bUrl
            });
            alert("🚩 Profile Mubarak! Update ho gayi.");
            location.reload();
        } catch(e) { alert("Error: " + e.message); btn.disabled = false; }
    };

    // --- MODIFIED RENDER (With Images) ---
    function showApp() {
        document.getElementById('app').classList.remove('hide');
        const pImg = currentUserData.photo || 'https://via.placeholder.com/150';
        const bImg = currentUserData.banner || 'https://via.placeholder.com/800x300';
        
        // Display on Main Profile
        document.getElementById('u-prof-img').src = pImg;
        document.getElementById('u-banner-img').style.backgroundImage = `url(${bImg})`;
        document.querySelectorAll('.u-name-display').forEach(el => el.innerText = currentUserData.name);
        document.getElementById('u-bio-display').innerText = currentUserData.bio;

        onValue(ref(db, 'posts'), snap => renderFeed(snap.val()));
        onValue(ref(db, 'products'), snap => renderShop(snap.val()));
        onValue(ref(db, 'orders'), snap => renderOrders(snap.val()));
    }

    // Feed with Profile Image
    function renderFeed(data) {
        let h = "";
        if(data) {
            Object.keys(data).reverse().forEach(k => {
                const p = data[k];
                // Hum user ki latest photo database se nikaal sakte hain ya post ke waqt save kar sakte hain
                const userPhoto = p.uPhoto || 'https://via.placeholder.com/50';
                const media = p.type === 'video' ? `<video src="${p.url}" controls class="w-full max-h-[70vh] bg-black"></video>` : `<img src="${p.url}" class="w-full max-h-[70vh]">`;
                
                h += `<div class="bg-white mb-4 border-b">
                    <div class="p-3 flex items-center gap-3 cursor-pointer" onclick="visitProfile('${p.uid}')">
                        <img src="${userPhoto}" class="w-8 h-8 rounded-full border border-orange-200 object-cover">
                        <b class="text-xs uppercase italic">${p.uName}</b>
                        ${p.uid === auth.currentUser.uid ? `<i class="fa-solid fa-trash ml-auto text-gray-200" onclick="del('posts','${k}')"></i>` : ''}
                    </div>
                    ${media}
                    <div class="p-4 text-sm"><b>${p.uName}</b> ${p.caption || ''}</div>
                </div>`;
            });
        }
        document.getElementById('v-feed').innerHTML = h;
    }
</script>

<main id="v-profile" class="hide">
    <div id="u-banner-img" class="h-40 bg-gray-200 bg-cover bg-center relative border-b shadow-inner">
        <div class="absolute -bottom-10 left-1/2 -translate-x-1/2">
            <img id="u-prof-img" src="" class="w-24 h-24 rounded-full border-4 border-white shadow-lg object-cover bg-white">
        </div>
    </div>
    
    <div class="mt-12 p-8 text-center">
        <h2 class="text-xl font-black u-name-display uppercase raj-title"></h2>
        <p id="u-bio-display" class="text-[10px] text-gray-400 mt-1 italic"></p>
        <div class="flex justify-center gap-4 mt-6">
            <button onclick="openM('edit-profile-modal')" class="bg-white border px-6 py-1.5 rounded-full text-[10px] font-bold shadow-sm">EDIT PROFILE</button>
            <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-50 text-red-600 px-6 py-1.5 rounded-full text-[10px] font-bold">LOGOUT</button>
        </div>
    </div>
    <div id="profile-grid" class="grid grid-cols-3 gap-0.5"></div>
</main>

<div id="edit-profile-modal" class="fixed inset-0 bg-white z-[400] hide p-10 overflow-y-auto">
    <h2 class="text-xl font-black raj-title mb-6 uppercase text-center">Update Royal Look</h2>
    
    <label class="text-[10px] font-bold text-gray-400">PROFILE PHOTO</label>
    <input type="file" id="up-p-img" accept="image/*" class="text-xs">
    
    <label class="text-[10px] font-bold text-gray-400">BANNER IMAGE</label>
    <input type="file" id="up-b-img" accept="image/*" class="text-xs">
    
    <input type="text" id="edit-name" placeholder="Apna Naam">
    <textarea id="edit-bio" placeholder="Apni Bio likhein..." class="h-24"></textarea>
    
    <button onclick="updateProfile()" id="btn-up-prof" class="btn-royal">SAVE ROYAL PROFILE</button>
    <button onclick="closeM('edit-profile-modal')" class="mt-4 w-full text-xs font-bold text-gray-400">Cancel</button>
</div>
