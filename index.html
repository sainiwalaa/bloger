<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Royal Darbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
</head>
<body>

    <header class="header">
        <div class="brand">SAINIWALAA</div>
    </header>

    <div id="auth-section" class="container">
        <div class="royal-card">
            <h2 style="text-align: center; color: #d4af37;">Khamma Ghani!</h2>
            <input type="email" id="email" placeholder="Shahi Email" style="width: 90%; margin: 10px auto; display: block;">
            <input type="password" id="password" placeholder="Password" style="width: 90%; margin: 10px auto; display: block;">
            <button id="login-btn" class="gold-btn">PRAVESH KAREIN</button>
        </div>
    </div>

    <main id="app-container" class="hidden">
        <section id="darbar-sec">
            <div class="royal-card">
                <textarea id="post-text" placeholder="Hukum, aaj kai vichaar hai?" style="width:100%; background:transparent; color:white; border:none;"></textarea>
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <button onclick="openUpload('post')" class="gold-btn" style="width: 45%;">PHOTO/VIDEO</button>
                    <button id="post-final-btn" class="gold-btn" style="width: 45%;">POST</button>
                </div>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="bazaar-sec" class="hidden">
            <div id="bazaar-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px;"></div>
        </section>

        <section id="profile-sec" class="hidden">
            <div class="royal-card" style="text-align: center;">
                <div id="profile-banner" style="height: 100px; background: var(--gold); border-radius: 8px;"></div>
                <h2 id="display-name" style="margin-top: 10px;">Maharaja</h2>
                <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                    <div><b>12</b><br>Lekh</div>
                    <div><b>500</b><br>Folower</div>
                </div>
                <button onclick="openUpload('product')" class="gold-btn">LIST NEW PRODUCT</button>
            </div>
            <h3 style="padding-left: 20px; color: var(--gold-solid);">Aapka Bazaar</h3>
            <div id="my-products" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px;"></div>
            
            <h3 style="padding-left: 20px; color: var(--gold-solid);">Recent Orders</h3>
            <div id="order-history" class="royal-card"></div>
        </section>
    </main>

    <div id="order-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
        <div class="royal-card" style="width: 80%;">
            <h3>Sauda Pakko Karo</h3>
            <input type="text" id="cust-name" placeholder="Aapko Naam" style="width:100%; margin-bottom:10px;">
            <input type="text" id="cust-phone" placeholder="Mobile Number" style="width:100%; margin-bottom:10px;">
            <textarea id="cust-addr" placeholder="Pura Pata" style="width:100%; margin-bottom:10px;"></textarea>
            <button id="confirm-order-btn" class="gold-btn">CONFIRM & BUY</button>
            <button onclick="closeOrderModal()" style="background:transparent; color:white; border:none; width:100%; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <nav class="bottom-nav hidden" id="nav-bar">
        <div class="nav-item active" onclick="switchPage('darbar')"><i class="fa-solid fa-fort-awesome"></i>Darbar</div>
        <div class="nav-item" onclick="switchPage('bazaar')"><i class="fa-solid fa-shop"></i>Bazaar</div>
        <div class="nav-item" onclick="switchPage('profile')"><i class="fa-solid fa-user-ninja"></i>Aap</div>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
