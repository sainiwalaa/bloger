<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset";

        let userCache = JSON.parse(localStorage.getItem('user_data')) || null;
        let activePostId = null;

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                userCache = snap.val();
                localStorage.setItem('user_data', JSON.stringify(userCache));
                
                document.getElementById('auth-screen').classList.add('hide');
                document.getElementById('app').classList.remove('hide');
                initApp();
            } else {
                localStorage.removeItem('user_data');
                document.getElementById('auth-screen').classList.remove('hide');
                document.getElementById('app').classList.add('hide');
            }
        });

        // --- PROFILE LOGIC ---
        window.updateProfile = async () => {
            const btn = document.getElementById('btn-save-profile');
            const name = document.getElementById('edit-name').value;
            const bio = document.getElementById('edit-bio').value;
            const pFile = document.getElementById('up-p-img').files[0];
            
            btn.disabled = true;
            btn.innerText = "Thambo Sa... Update ho rha hai";

            let pUrl = userCache.photo || "";
            if(pFile) {
                const fd = new FormData(); fd.append('file', pFile); fd.append('upload_preset', UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {method:"POST", body:fd});
                const d = await res.json(); pUrl = d.secure_url;
            }

            await update(ref(db, 'users/' + auth.currentUser.uid), { name, bio, photo: pUrl });
            alert("Profile Updated!");
            location.reload(); // Only reload for profile change to sync cache
        };

        // --- APP LOGIC ---
        function initApp() {
            // Setup Profile Page
            document.getElementById('u-prof-img').src = userCache.photo || 'https://via.placeholder.com/100';
            document.getElementById('u-name-profile').innerText = userCache.name;
            document.getElementById('u-handle-profile').innerText = "@" + userCache.username;
            document.getElementById('u-bio-profile').innerText = userCache.bio || "SainiWalaa Royal Member 🚩";
            
            // Edit Inputs Fill
            document.getElementById('edit-name').value = userCache.name;
            document.getElementById('edit-bio').value = userCache.bio || "";

            // Feed Data
            onValue(ref(db, 'posts'), s => {
                let h = ""; const posts = s.val();
                if(posts) Object.keys(posts).reverse().forEach(k => {
                    const p = posts[k];
                    h += `<div class="bg-white mb-4 border-b pb-4">
                        <div class="p-3 flex items-center gap-3">
                            <img src="${p.uPhoto || 'https://via.placeholder.com/50'}" class="w-8 h-8 rounded-full border">
                            <b class="text-xs raj-title">${p.uName}</b>
                        </div>
                        <img src="${p.url}" class="w-full max-h-[500px] object-contain bg-black">
                        <div class="p-4 flex gap-6 text-xl">
                            <i class="fa-regular fa-heart" id="like-${k}" onclick="toggleLike('${k}')"></i>
                            <i class="fa-regular fa-comment" onclick="openComments('${k}')"></i>
                        </div>
                    </div>`;
                });
                document.getElementById('v-feed').innerHTML = h;
            });
        }

        window.showPage = (p) => {
            document.querySelectorAll('main').forEach(m => m.classList.add('hide'));
            document.getElementById('v-' + p).classList.remove('hide');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');
        window.handleLogout = () => signOut(auth).then(() => location.reload());

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #fff; }
        .hide { display: none !important; }
        .raj-title { font-family: 'Marcellus', serif; background: linear-gradient(to right, #800000, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-royal { background: linear-gradient(45deg, #7c1212, #ea580c); color: white; font-weight: 900; border-radius: 12px; padding: 12px; }
        input, textarea { border: 1px solid #eee !important; padding: 10px; border-radius: 10px; margin-bottom: 8px; width: 100%; outline: none; }
    </style>
</head>
<body class="flex justify-center bg-gray-50">

    <div id="auth-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide bg-white">
        <h1 class="text-5xl font-black raj-title text-center mb-10 italic">SainiWalaa</h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <button onclick="handleAuth('login')" class="btn-royal shadow-xl">STUDIO LOGIN</button>
    </div>

    <div id="app" class="w-full max-w-[450px] min-h-screen relative pb-20 hide bg-white shadow-2xl">
        <header class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-50">
            <h1 class="text-2xl font-black raj-title italic">SAINIWALAA</h1>
            <i class="fa-solid fa-plus-square text-orange-600 text-2xl" onclick="openM('post-modal')"></i>
        </header>

        <main id="v-feed"></main>

        <main id="v-profile" class="hide">
            <div class="h-32 bg-gray-100 relative">
                <img id="u-prof-img" class="w-24 h-24 rounded-full absolute -bottom-12 left-6 border-4 border-white shadow-lg object-cover bg-white">
            </div>
            <div class="mt-16 p-6">
                <h2 id="u-name-profile" class="text-2xl font-black raj-title italic"></h2>
                <p id="u-handle-profile" class="text-orange-600 font-bold text-xs"></p>
                <p id="u-bio-profile" class="text-gray-500 text-xs mt-2 italic"></p>
                
                <div class="flex gap-2 mt-6">
                    <button onclick="openM('edit-modal')" class="bg-black text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase">Edit Profile</button>
                    <button onclick="handleLogout()" class="bg-red-50 text-red-600 px-6 py-2 rounded-full text-[10px] font-bold uppercase">Logout</button>
                </div>

                <div class="mt-10 border-t pt-6">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 text-center">Your Studio Activity</h3>
                    <p class="text-center text-xs opacity-20 py-10">No private activity yet sa!</p>
                </div>
            </div>
        </main>

        <div id="edit-modal" class="fixed inset-0 bg-white z-[1000] hide p-8 flex flex-col justify-center">
            <h2 class="text-2xl font-black raj-title mb-6">EDIT STUDIO 🚩</h2>
            <label class="text-[10px] font-bold text-gray-400 uppercase">Profile Photo</label>
            <input type="file" id="up-p-img" accept="image/*">
            <input type="text" id="edit-name" placeholder="Aapka Naam">
            <textarea id="edit-bio" placeholder="Bio likhein sa..."></textarea>
            <button id="btn-save-profile" onclick="updateProfile()" class="btn-royal mt-4">SAVE CHANGES</button>
            <button onclick="closeM('edit-modal')" class="mt-4 text-xs font-bold text-gray-300">Cancel</button>
        </div>

        <div id="post-modal" class="fixed inset-0 bg-white z-[600] hide p-8">
            <h2 class="text-2xl font-black raj-title mb-6">NEW POST</h2>
            <input type="file" id="post-file" accept="image/*,video/*">
            <textarea id="post-desc" placeholder="Caption..."></textarea>
            <button onclick="publish('post')" id="btn-post" class="btn-royal w-full">PUBLISH 🚩</button>
            <button onclick="closeM('post-modal')" class="mt-4 w-full text-xs text-gray-300">Cancel</button>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around z-50">
            <i onclick="showPage('feed')" class="fa-solid fa-house text-gray-300 hover:text-orange-600 text-xl cursor-pointer"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-user-circle text-gray-300 hover:text-orange-600 text-xl cursor-pointer"></i>
        </nav>
    </div>
</body>
</html>
