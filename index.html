<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAINIWALAA - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 1. POST SYSTEM (Darbar) ---
        window.createPost = () => {
            const msg = prompt("Kya likhna chahte ho hukum?");
            if(msg) {
                push(ref(db, 'posts'), {
                    text: msg,
                    user: "sunil saini",
                    likes: 0,
                    time: serverTimestamp()
                });
            }
        };

        onValue(ref(db, 'posts'), (snap) => {
            const container = document.getElementById('darbar-posts');
            container.innerHTML = "";
            if(!snap.exists()) { container.innerHTML = "<p class='text-zinc-600 text-center mt-10'>Koi post nahi di.</p>"; return; }
            snap.forEach(c => {
                const p = c.val();
                container.innerHTML += `
                    <div class="bg-zinc-900/50 p-4 border border-zinc-800 rounded-xl mb-4">
                        <p class="text-sm">${p.text}</p>
                        <div class="flex gap-4 mt-3 text-xs text-zinc-500">
                            <button onclick="alert('Like ho gayo!')"><i class="fa-regular fa-heart"></i> Like</button>
                            <button onclick="alert('Vichaar likho!')"><i class="fa-regular fa-comment"></i> Vichaar</button>
                        </div>
                    </div>`;
            });
        });

        // --- 2. BAZAAR SYSTEM (Dukaan) ---
        window.addToBazaar = () => {
            const name = prompt("Maal ko Naam:");
            const price = prompt("Keemat (₹):");
            if(name && price) {
                push(ref(db, 'products'), { name, price, time: serverTimestamp() });
            }
        };

        onValue(ref(db, 'products'), (snap) => {
            const list = document.getElementById('bazaar-list');
            list.innerHTML = "";
            if(!snap.exists()) {
                document.getElementById('empty-bazaar').classList.remove('hidden');
            } else {
                document.getElementById('empty-bazaar').classList.add('hidden');
                snap.forEach(c => {
                    const p = c.val();
                    list.innerHTML += `
                        <div class="bg-zinc-900 border gold-border rounded-xl p-3">
                            <h3 class="gold-text font-bold text-sm">${p.name}</h3>
                            <p class="text-xs mb-3">₹ ${p.price}</p>
                            <button onclick="alert('Order daraj ho gayo!')" class="w-full bg-orange-700 text-white py-2 rounded text-[10px] font-bold">KHARIDO</button>
                        </div>`;
                });
            }
        });

        // --- 3. PROFILE SYSTEM (Mahal Sajao) ---
        window.saveBio = () => {
            const newBio = document.getElementById('bio-input').value;
            update(ref(db, 'users/admin'), { bio: newBio });
            document.getElementById('modal').classList.add('hidden');
        };

        onValue(ref(db, 'users/admin'), (snap) => {
            if(snap.exists()) document.getElementById('user-bio').innerText = snap.val().bio;
        });

        // Tab Navigation
        window.openTab = (tab) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(tab + '-page').classList.remove('hidden');
        };
    </script>

    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-border { border: 1px solid #D4AF37; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-[500px] mx-auto min-h-screen border-x border-zinc-900 flex flex-col pb-20">

    <header class="p-4 text-center border-b border-zinc-900">
        <h1 class="gold-text tracking-[4px] font-serif text-lg">SAINIWALAA</h1>
    </header>

    <div id="aap-page" class="page">
        <div class="p-6 flex items-center gap-6">
            <div class="w-24 h-24 rounded-full bg-yellow-600 flex items-center justify-center text-black text-3xl font-bold border-4 border-black ring-2 ring-yellow-600">SS</div>
            <div>
                <h2 class="text-2xl font-bold">sunil saini</h2>
                <p id="user-bio" class="text-xs text-zinc-500">SSSSSSSSSSSSSSS</p>
            </div>
        </div>
        <div class="flex justify-around mb-6 text-center text-xs">
            <button onclick="document.getElementById('modal').classList.remove('hidden')" class="border border-yellow-600/50 px-6 py-2 rounded gold-text"><i class="fa-solid fa-gear mr-2"></i>Badlaav</button>
        </div>
        <div class="flex border-y border-zinc-900">
            <button onclick="openTab('darbar')" class="flex-1 py-3 text-xs border-b-2 border-yellow-600 gold-text">Darbar</button>
            <button onclick="openTab('bazaar')" class="flex-1 py-3 text-xs text-zinc-500">Dukaan</button>
        </div>
        <div id="darbar-posts" class="p-4"></div>
    </div>

    <div id="bazaar-page" class="page hidden p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="gold-text text-xl">Shahi Bazaar</h2>
            <button onclick="addToBazaar()" class="bg-orange-600 px-4 py-2 rounded-lg text-xs font-bold">+ Bazaar me Rakho</button>
        </div>
        <div id="empty-bazaar" class="border-2 border-dashed border-zinc-800 rounded-3xl py-20 text-center hidden">
            <p class="text-zinc-600 italic">Bazaar abhi khali hai</p>
        </div>
        <div id="bazaar-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <nav class="fixed bottom-0 w-full max-w-[500px] bg-black border-t border-zinc-900 flex justify-around py-4">
        <button onclick="openTab('darbar')" class="text-zinc-500"><i class="fa-solid fa-house"></i></button>
        <button onclick="openTab('bazaar')" class="text-zinc-500"><i class="fa-solid fa-briefcase"></i></button>
        <button onclick="openTab('aap')" class="text-yellow-500"><i class="fa-solid fa-circle-user"></i></button>
    </nav>

    <div id="modal" class="fixed inset-0 bg-black/90 flex items-center justify-center p-6 hidden z-[100]">
        <div class="bg-[#1a1a1a] w-full rounded-2xl p-6 border border-zinc-800">
            <h3 class="gold-text font-bold mb-4">Mahal Sajao</h3>
            <textarea id="bio-input" class="w-full bg-black border border-zinc-800 rounded-lg p-3 text-sm h-24 mb-4 outline-none" placeholder="Naya Bio Likho..."></textarea>
            <button onclick="saveBio()" class="w-full bg-yellow-600 text-black py-3 rounded-xl font-bold">Save Karo 👑</button>
        </div>
    </div>

</body>
</html>
