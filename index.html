<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "sainiwalaa_preset";

        // --- AUTH CHECK ---
        const uid = localStorage.getItem('s_uid');
        window.userLogin = () => {
            const ph = document.getElementById('login-phone').value;
            const nm = document.getElementById('login-name').value;
            if(ph.length < 10 || !nm) return alert("Pura data bhariye hukum!");
            localStorage.setItem('s_uid', ph);
            localStorage.setItem('s_name', nm);
            location.reload();
        };

        if(!uid) {
            document.getElementById('login-screen').classList.remove('hide');
        } else {
            document.getElementById('app').classList.remove('hide');
            initApp();
        }

        function initApp() {
            document.getElementById('u-display-name').innerText = localStorage.getItem('s_name');
            // Listen for Real-time Posts
            onValue(ref(db, 'posts'), (snapshot) => renderFeed(snapshot.val()));
            // Listen for Real-time Products
            onValue(ref(db, 'products'), (snapshot) => renderShop(snapshot.val()));
        }

        // --- REAL-TIME PUBLISH ---
        window.publish = async (mode) => {
            const file = document.getElementById(mode === 'post' ? 'post-file' : 'prod-file').files[0];
            const btn = document.getElementById(mode === 'post' ? 'btn-post' : 'btn-prod');
            if(!file) return alert("Photo chunna zaroori hai!");

            btn.disabled = true; btn.innerText = "Royal Processing... ⏳";

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                const cRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:"POST", body:formData});
                const cData = await cRes.json();

                const commonData = {
                    uid: uid,
                    uName: localStorage.getItem('s_name'),
                    img: cData.secure_url,
                    timestamp: Date.now()
                };

                if(mode === 'post') {
                    commonData.caption = document.getElementById('post-cap').value;
                    await push(ref(db, 'posts'), commonData);
                } else {
                    commonData.name = document.getElementById('prod-name').value;
                    commonData.price = document.getElementById('prod-price').value;
                    commonData.link = document.getElementById('prod-link').value || "#";
                    commonData.desc = document.getElementById('prod-desc').value;
                    await push(ref(db, 'products'), commonData);
                }
                closeM(mode + '-modal');
            } catch(e) { alert("Error!"); }
            btn.disabled = false; btn.innerText = "PUBLISH";
        };

        // --- RENDER UI ---
        function renderFeed(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    h += `<div class="bg-white border-b-8 border-orange-50">
                        <div class="p-4 flex justify-between items-center">
                            <div class="flex items-center gap-2 font-bold text-red-900 text-sm italic">🚩 ${p.uName}</div>
                            ${p.uid === uid ? `<i class="fa-solid fa-trash-can text-gray-300" onclick="deleteItem('posts', '${key}')"></i>` : ''}
                        </div>
                        <img src="${p.img}" class="w-full h-96 object-cover border-y border-orange-50">
                        <div class="p-4"><p class="text-sm"><b>${p.uName}</b> ${p.caption || ''}</p></div>
                    </div>`;
                });
            }
            document.getElementById('v-feed').innerHTML = h || "<p class='text-center py-20 text-gray-400'>Feed khali hai hukum.</p>";
            updateCount(data);
        }

        function renderShop(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    h += `<div class="bg-white border-2 border-orange-50 rounded-2xl overflow-hidden relative shadow-sm">
                        ${p.uid === uid ? `<i class="fa-solid fa-circle-xmark absolute top-2 right-2 text-red-500 bg-white rounded-full" onclick="deleteItem('products', '${key}')"></i>` : ''}
                        <img src="${p.img}" class="w-full h-36 object-cover">
                        <div class="p-3 text-center">
                            <b class="text-[10px] block truncate text-red-900 uppercase font-black">${p.name}</b>
                            <div class="text-orange-600 font-black text-sm mb-2">₹${p.price}</div>
                            <button onclick="window.open('${p.link}','_blank')" class="w-full bg-red-800 text-white text-[10px] py-2 rounded-lg font-bold">KHAREEDO (BUY)</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center py-10'>Bazaar khali hai.</p>";
        }

        function updateCount(data) {
            let count = 0;
            let profH = "";
            if(data) {
                Object.values(data).forEach(p => {
                    if(p.uid === uid) {
                        count++;
                        profH += `<img src="${p.img}" class="aspect-square object-cover border border-white">`;
                    }
                });
            }
            document.getElementById('c-posts').innerText = count;
            document.getElementById('profile-grid').innerHTML = profH;
        }

        window.deleteItem = async (path, key) => {
            if(confirm("Hukum, ise delete kar dein?")) await remove(ref(db, `${path}/${key}`));
        };

        window.logout = () => { localStorage.clear(); location.reload(); };
        window.showPage = (p) => {
            ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide'));
            ['n-feed','n-shop','n-profile'].forEach(n => document.getElementById(n).classList.replace('text-orange-600', 'text-gray-400'));
            document.getElementById('v-'+p).classList.remove('hide');
            document.getElementById('n-'+p).classList.replace('text-gray-400', 'text-orange-600');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');

    </script>
    <style>
        .hide { display: none !important; }
        .btn-royal { background: linear-gradient(45deg, #991b1b, #FF9933); color: white; font-weight: 800; border-radius: 12px; padding: 12px; width: 100%; }
        input, textarea { border: 1.5px solid #ffe4cc !important; padding: 12px; border-radius: 15px; margin-bottom: 12px; background: #fffaf5; width: 100%; outline: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center">

<div id="login-screen" class="w-full max-w-[450px] min-h-screen bg-white flex flex-col items-center justify-center p-8 hide">
    <h1 class="text-5xl font-black italic text-red-800 mb-2">SainiWalaa</h1>
    <p class="text-orange-600 font-bold mb-10">🚩 KHAMA GHANI HUKUM 🚩</p>
    <input type="number" id="login-phone" placeholder="Mobile Number">
    <input type="text" id="login-name" placeholder="Aapko Naam">
    <button onclick="userLogin()" class="btn-royal shadow-xl">PADHARO STUDIO MEIN</button>
</div>

<div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-24 hide">
    <header class="sticky top-0 bg-white/95 backdrop-blur-md z-[100] border-b p-4 flex justify-between items-center">
        <h1 class="text-2xl font-
