<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Royal Creator Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; }
        body { background: #fafafa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        
        /* Old Royal Header Animation */
        .saini-header {
            background: linear-gradient(to right, #d4af37 20%, #111 40%, #111 60%, #d4af37 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Old Profile & Banner Look */
        .banner-container { height: 240px; width: 100%; position: relative; background: #111; border-radius: 0 0 50px 50px; overflow: visible; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 50px 50px; }
        .profile-holder { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .p-img { width: 130px; height: 130px; border-radius: 40px; border: 6px solid white; object-fit: cover; background: white; shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        .nav-btn { color: #999; font-weight: 700; position: relative; transition: 0.3s; }
        .nav-active { color: var(--gold) !important; }
        .nav-active::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--gold); border-radius: 10px; }
        
        .product-card { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loading" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <h1 class="raj-font text-4xl animate-pulse text-[#d4af37]">SAINIWALAA</h1>
    </div>

    <section id="auth-box" class="fixed inset-0 bg-white/95 z-[2000] flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm text-center">
            <h2 class="raj-font text-5xl text-[#d4af37] mb-8">Access</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-5 mb-4 bg-gray-50 rounded-2xl border-none outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-5 mb-8 bg-gray-50 rounded-2xl border-none outline-none">
            <button onclick="authAction()" class="w-full bg-black text-white p-5 rounded-[30px] font-bold shadow-xl">Login / Sign Up</button>
        </div>
    </section>

    <header class="bg-white py-6 text-center sticky top-0 z-[100] border-b">
        <h1 class="raj-font text-3xl font-black tracking-widest saini-header cursor-pointer" onclick="location.reload()">SAINIWALAA</h1>
        <div class="flex justify-center gap-8 mt-4 text-[10px] uppercase tracking-tighter">
            <button onclick="nav('feed')" id="n-feed" class="nav-btn">Trending</button>
            <button onclick="checkAuthAndNav('shop')" id="n-shop" class="nav-btn">Mhari Studio</button>
            <button onclick="checkAuthAndNav('orders')" id="n-orders" class="nav-btn">Orders</button>
            <button id="logout-btn" onclick="logout()" class="text-red-400 hidden"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <main id="main-content">
        <section id="sec-feed" class="p-6 max-w-6xl mx-auto">
            <div id="grid-feed" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>
        
        <section id="sec-shop" class="hidden">
            <div class="banner-container">
                <img id="banner-ui" src="https://images.unsplash.com/photo-1557683316-973673baf926?w=1000" class="banner-img">
                <div class="profile-holder">
                    <div class="relative">
                        <img id="p-img-ui" class="p-img shadow-2xl">
                        <label class="owner-btn hidden absolute bottom-1 right-1 bg-black text-white w-10 h-10 flex items-center justify-center rounded-full cursor-pointer border-4 border-white"><i class="fa-solid fa-camera"></i><input type="file" class="hidden" onchange="upMedia('profile', this)"></label>
                    </div>
                </div>
                <label class="owner-btn hidden absolute top-4 right-4 bg-black/50 text-white p-3 rounded-full cursor-pointer"><i class="fa-solid fa-image"></i><input type="file" class="hidden" onchange="upMedia('banner', this)"></label>
            </div>

            <div class="mt-24 text-center px-6">
                <h2 id="u-name-ui" class="raj-font text-3xl font-bold text-gray-800">Creator</h2>
                <p id="u-bio-ui" class="text-gray-500 italic mt-2 max-w-md mx-auto">Mhara Swagat hai!</p>
                
                <div id="u-socials" class="flex justify-center gap-4 mt-6"></div>
                
                <button onclick="openEditModal()" class="owner-btn hidden mt-6 bg-gray-100 text-gray-600 px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest">Edit Studio</button>
            </div>

            <div id="add-prod-box" class="owner-btn hidden max-w-4xl mx-auto mt-12 p-8 bg-white rounded-[40px] border-2 border-dashed">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input id="pn" placeholder="Product Name" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                    <input id="pp" type="number" placeholder="Price (₹)" class="p-4 bg-gray-50 rounded-2xl outline-none border">
                    <input id="pl" placeholder="Action/Download Link" class="p-4 bg-gray-50 rounded-2xl outline-none border col-span-full">
                </div>
                <textarea id="pd" placeholder="Description..." class="w-full p-4 bg-gray-50 rounded-2xl border h-24 mb-4 outline-none"></textarea>
                <div class="flex gap-4">
                    <label for="pf" id="pf-label" class="flex-1 p-4 bg-gray-800 text-white text-center rounded-2xl cursor-pointer font-bold">Select Image</label>
                    <input type="file" id="pf" onchange="preProd(this)" class="hidden">
                    <button onclick="pubProd()" id="pub-btn" class="hidden flex-1 bg-[#d4af37] text-white p-4 rounded-2xl font-bold">Publish Now</button>
                </div>
            </div>

            <div id="grid-shop" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6 max-w-7xl mx-auto mt-10"></div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-3xl mx-auto">
            <h2 class="raj-font text-2xl mb-8">Recent Orders</h2>
            <div id="list-orders" class="space-y-4"></div>
        </section>
    </main>

    <div id="edit-modal" class="hidden fixed inset-0 z-[3000] bg-black/90 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8">
            <h3 class="raj-font text-xl mb-6 text-center">Update Studio</h3>
            <div class="space-y-4">
                <input id="en" placeholder="Display Name" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                <input id="eb" placeholder="Bio Message" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input id="e-insta" placeholder="Insta User" class="p-4 bg-gray-50 rounded-2xl text-sm">
                    <input id="e-wa" placeholder="WhatsApp No" class="p-4 bg-gray-50 rounded-2xl text-sm">
                    <input id="e-yt" placeholder="YouTube URL" class="p-4 bg-gray-50 rounded-2xl text-sm">
                    <input id="e-fb" placeholder="Facebook URL" class="p-4 bg-gray-50 rounded-2xl text-sm">
                </div>
                <button onclick="saveProfile()" class="w-full bg-[#d4af37] text-white p-5 rounded-3xl font-bold">Save Changes</button>
                <button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full text-gray-400 text-xs font-bold uppercase mt-2">Close</button>
            </div>
        </div>
    </div>

    <div id="order-modal" class="hidden fixed inset-0 z-[3000] bg-black/95 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[50px] p-10 text-center">
            <h3 class="raj-font text-2xl mb-2">Checkout</h3>
            <p id="order-item-name" class="text-[10px] font-bold mb-8 text-gray-400 uppercase tracking-widest"></p>
            <div class="space-y-4">
                <input id="on" placeholder="Your Name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input id="op" type="tel" maxlength="10" placeholder="10 Digit Number" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                <input id="oc" placeholder="Your City" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
            </div>
            <button onclick="confirmPurchase()" class="w-full mt-8 bg-black text-white p-5 rounded-3xl font-bold">Confirm Order</button>
            <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="mt-6 text-gray-400 text-xs font-bold uppercase">Back</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot, query, where, serverTimestamp, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.curU = null;
        let allProds = [];

        onAuthStateChanged(auth, u => {
            curU = u;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('logout-btn').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('auth-box').classList.add('hidden');
                initApp();
            } else {
                nav('feed');
            }
        });

        function initApp() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), s => {
                allProds = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderGrid(allProds, 'grid-feed', false);
            });
            
            if(curU) {
                onSnapshot(query(collection(db, "orders"), where("creatorId", "==", curU.uid)), s => {
                    const list = document.getElementById('list-orders');
                    list.innerHTML = s.docs.map(d => {
                        const o = d.data();
                        return `<div class="p-6 bg-white rounded-3xl border shadow-sm">
                            <div class="flex justify-between font-bold text-lg"><span>${o.item}</span><span class="text-[#d4af37]">₹${o.price}</span></div>
                            <p class="text-sm text-gray-600 mt-2">Client: ${o.customer} (${o.phone})</p>
                            <p class="text-[10px] text-gray-400 uppercase mt-4 font-bold tracking-widest">${o.date} | ${o.city}</p>
                        </div>`;
                    }).join('');
                });
            }
        }

        window.renderGrid = (data, cid, isOwner) => {
            const g = document.getElementById(cid);
            g.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="w-full aspect-square object-cover cursor-pointer" onclick="viewProfile('${p.creatorId}')">
                    <div class="p-5">
                        <p class="text-[9px] font-black text-[#d4af37] uppercase mb-1">@${p.creatorName}</p>
                        <h4 class="font-bold truncate text-sm text-gray-800">${p.name}</h4>
                        <div class="flex justify-between items-center mt-4">
                            <span class="font-black text-sm">₹${p.price}</span>
                            <button onclick="orderForm('${p.id}')" class="bg-black text-white text-[9px] px-5 py-2 rounded-full font-bold uppercase">Get</button>
                        </div>
                        ${isOwner ? `<button onclick="deleteProd('${p.id}')" class="mt-4 text-red-400 text-[10px] font-bold uppercase"><i class="fa-solid fa-trash"></i></button>` : ''}
                    </div>
                </div>
            `).join('');
        };

        window.viewProfile = async (uid) => {
            nav('shop');
            const isMe = curU && curU.uid === uid;
            document.querySelectorAll('.owner-btn').forEach(el => el.classList.toggle('hidden', !isMe));
            
            const s = await getDoc(doc(db, "users", uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('u-name-ui').innerText = d.name || "Creator";
                document.getElementById('u-bio-ui').innerText = d.bio || "Mhara Swagat hai!";
                document.getElementById('p-img-ui').src = d.profile || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
                if(d.banner) document.getElementById('banner-ui').src = d.banner;
                
                const soc = document.getElementById('u-socials'); soc.innerHTML = '';
                const btnS = (link, icon) => `<a href="${link}" target="_blank" class="w-10 h-10 flex items-center justify-center bg-white shadow-md rounded-full text-gray-700 hover:text-[#d4af37] transition"><i class="${icon}"></i></a>`;
                if(d.insta) soc.innerHTML += btnS(`https://instagram.com/${d.insta}`, 'fa-brands fa-instagram');
                if(d.wa) soc.innerHTML += btnS(`https://wa.me/${d.wa}`, 'fa-brands fa-whatsapp');
                if(d.yt) soc.innerHTML += btnS(d.yt, 'fa-brands fa-youtube');
                if(d.fb) soc.innerHTML += btnS(d.fb, 'fa-brands fa-facebook');
            }
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", uid)), s => {
                renderGrid(s.docs.map(d => ({id:d.id, ...d.data()})), 'grid-shop', isMe);
            });
        };

        window.confirmPurchase = async () => {
            const n = document.getElementById('on').value, p = document.getElementById('op').value, c = document.getElementById('oc').value;
            if(n.length < 3 || p.length !== 10 || isNaN(p) || c.length < 2) return alert("Please fill correct details!");

            await addDoc(collection(db, "orders"), {
                item: window.activeOrder.name, price: window.activeOrder.price,
                customer: n, phone: p, city: c, creatorId: window.activeOrder.creatorId,
                date: new Date().toLocaleDateString(), timestamp: serverTimestamp()
            });
            
            if(window.activeOrder.link && window.activeOrder.link !== "") window.open(window.activeOrder.link, '_blank');
            else alert("Order Placed Successfully!");
            document.getElementById('order-modal').classList.add('hidden');
        };

        window.openEditModal = async () => {
            const s = await getDoc(doc(db, "users", curU.uid));
            if(s.exists()){
                const d = s.data();
                document.getElementById('en').value = d.name || '';
                document.getElementById('eb').value = d.bio || '';
                document.getElementById('e-insta').value = d.insta || '';
                document.getElementById('e-wa').value = d.wa || '';
                document.getElementById('e-yt').value = d.yt || '';
                document.getElementById('e-fb').value = d.fb || '';
            }
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveProfile = async () => {
            await setDoc(doc(db, "users", curU.uid), {
                name: document.getElementById('en').value, bio: document.getElementById('eb').value,
                insta: document.getElementById('e-insta').value, wa: document.getElementById('e-wa').value,
                yt: document.getElementById('e-yt').value, fb: document.getElementById('e-fb').value
            }, {merge: true});
            location.reload();
        };

        window.pubProd = async () => {
            const n = document.getElementById('pn').value, p = document.getElementById('pp').value;
            if(!n || !p || !window.tempImg) return alert("Image, Name and Price are required!");
            const u = await getDoc(doc(db, "users", curU.uid));
            await addDoc(collection(db, "products"), {
                name: n, price: p, desc: document.getElementById('pd').value, img: window.tempImg, link: document.getElementById('pl').value,
                creatorId: curU.uid, creatorName: u.data()?.name || 'Creator', time: serverTimestamp()
            });
            location.reload();
        };

        window.nav = (t) => {
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('n-'+s).classList.toggle('nav-active', s === t);
            });
        };
        window.upMedia = (t, i) => { const r = new FileReader(); r.onload = async e => { await setDoc(doc(db, "users", curU.uid), { [t]: e.target.result }, {merge:true}); location.reload(); }; r.readAsDataURL(i.files[0]); };
        window.preProd = (i) => { const r = new FileReader(); r.onload = e => { window.tempImg = e.target.result; document.getElementById('pub-btn').classList.remove('hidden'); document.getElementById('pf-label').innerText = "Image Selected ✅"; }; r.readAsDataURL(i.files[0]); };
        window.authAction = () => { signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).then(()=>location.reload()).catch(() => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).then(()=>location.reload())); };
        window.checkAuthAndNav = (p) => curU ? (p === 'shop' ? viewProfile(curU.uid) : nav(p)) : document.getElementById('auth-box').classList.remove('hidden');
        window.logout = () => signOut(auth).then(()=>location.reload());
        window.orderForm = (id) => { 
            window.activeOrder = allProds.find(x => x.id === id); 
            document.getElementById('order-item-name').innerText = window.activeOrder.name;
            document.getElementById('order-modal').classList.remove('hidden'); 
        };
        window.deleteProd = async (id) => { if(confirm("Delete this item?")) await deleteDoc(doc(db, "products", id)); };
    </script>
</body>
</html>
