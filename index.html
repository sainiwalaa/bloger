<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SainiWalaa - Royal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        // Firebase Modular SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            databaseURL: "https://social-blog-93d38-default-rtdb.firebaseio.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.firebasestorage.app",
            messagingSenderId: "730884874913",
            appId: "1:730884874913:web:e2cb8f6084ee039db006e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 2. Cloudinary Configuration
        const CLOUD_NAME = "dprl2lyih";
        const UPLOAD_PRESET = "social_preset"; 

        // --- Authentication Logic ---
        const uid = localStorage.getItem('s_uid');
        window.userLogin = () => {
            const ph = document.getElementById('login-phone').value;
            const nm = document.getElementById('login-name').value;
            if(ph.length < 10 || !nm) return alert("Hukum, mobile number aur naam sahi se bhariye!");
            localStorage.setItem('s_uid', ph);
            localStorage.setItem('s_name', nm);
            location.reload();
        };

        if(!uid) {
            document.getElementById('login-screen').classList.remove('hide');
        } else {
            document.getElementById('app').classList.remove('hide');
            initApp();
        }

        function initApp() {
            document.getElementById('u-display-name').innerText = localStorage.getItem('s_name');
            // Real-time Listeners
            onValue(ref(db, 'posts'), (snap) => renderFeed(snap.val()));
            onValue(ref(db, 'products'), (snap) => renderShop(snap.val()));
        }

        // --- Publish Function (Universal for Posts & Products) ---
        window.publish = async (mode) => {
            const fileInput = document.getElementById(mode === 'post' ? 'post-file' : 'prod-file');
            const file = fileInput.files[0];
            const btn = document.getElementById(mode === 'post' ? 'btn-post' : 'btn-prod');

            if (!file) return alert("Hukum, pehle ek photo toh chuniye!");
            btn.disabled = true; btn.innerText = "Royal Processing... ⏳";

            try {
                // Upload to Cloudinary
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const cRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: "POST", body: formData
                });
                const cData = await cRes.json();

                if (!cData.secure_url) throw new Error("Upload fail ho gaya sa! Cloudinary check karein.");

                const itemData = {
                    uid: uid,
                    uName: localStorage.getItem('s_name'),
                    img: cData.secure_url,
                    time: Date.now()
                };

                if (mode === 'post') {
                    itemData.caption = document.getElementById('post-cap').value || "";
                    await push(ref(db, 'posts'), itemData);
                } else {
                    const name = document.getElementById('prod-name').value;
                    const price = document.getElementById('prod-price').value;
                    if(!name || !price) throw new Error("Item ka naam aur keemat bharna zaroori hai!");
                    
                    itemData.name = name;
                    itemData.price = price;
                    itemData.link = document.getElementById('prod-link').value || "#";
                    itemData.desc = document.getElementById('prod-desc').value || "";
                    await push(ref(db, 'products'), itemData);
                }

                alert("Sabad! Post safaltapurvak live ho gayi.");
                closeM(mode + '-modal');
                fileInput.value = "";
            } catch (e) {
                alert("Galti: " + e.message);
            } finally {
                btn.disabled = false; btn.innerText = "PUBLISH";
            }
        };

        // --- Render Functions ---
        function renderFeed(data) {
            let h = "";
            let myCount = 0;
            let myGrid = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    h += `<div class="bg-white border-b-8 border-orange-50 mb-4">
                        <div class="p-4 flex justify-between items-center font-bold text-red-900 text-sm italic">
                            <span>🚩 ${p.uName}</span>
                            ${p.uid === uid ? `<i class="fa-solid fa-trash-can text-gray-300" onclick="del('posts','${k}')"></i>` : ''}
                        </div>
                        <img src="${p.img}" class="w-full h-96 object-cover border-y border-orange-50">
                        <div class="p-4 text-sm"><b>${p.uName}</b> ${p.caption || ''}</div>
                    </div>`;
                    if(p.uid === uid) { 
                        myCount++; 
                        myGrid += `<img src="${p.img}" class="aspect-square object-cover border border-white">`; 
                    }
                });
            }
            document.getElementById('v-feed').innerHTML = h || "<p class='text-center py-20 text-gray-400'>Abhi koi post nahi hai.</p>";
            document.getElementById('c-posts').innerText = myCount;
            document.getElementById('profile-grid').innerHTML = myGrid;
        }

        function renderShop(data) {
            let h = "";
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const p = data[k];
                    h += `<div class="bg-white border rounded-2xl overflow-hidden relative shadow-sm">
                        ${p.uid === uid ? `<i class="fa-solid fa-circle-xmark absolute top-2 right-2 text-red-600 bg-white rounded-full text-lg" onclick="del('products','${k}')"></i>` : ''}
                        <img src="${p.img}" class="w-full h-40 object-cover">
                        <div class="p-3 text-center">
                            <b class="text-xs block truncate text-red-900 uppercase font-black">${p.name}</b>
                            <b class="text-orange-600 text-sm">₹${p.price}</b>
                            <button onclick="window.open('${p.link}','_blank')" class="w-full bg-red-800 text-white text-[10px] mt-2 py-2 rounded-lg font-bold">BUY NOW</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('bazaar-grid').innerHTML = h || "<p class='col-span-2 text-center py-20 text-gray-400'>Bazaar khali hai.</p>";
        }

        // --- Helper Functions ---
        window.del = async (p, k) => { if(confirm("Hukum, kya aap ise system se hatana chahte hain?")) await remove(ref(db, `${p}/${k}`)); };
        window.showPage = (p) => {
            ['feed','shop','profile'].forEach(v => document.getElementById('v-'+v).classList.add('hide'));
            ['n-feed','n-shop','n-profile'].forEach(n => document.getElementById(n).classList.replace('text-orange-600', 'text-gray-400'));
            document.getElementById('v-'+p).classList.remove('hide');
            document.getElementById('n-'+p).classList.replace('text-gray-400', 'text-orange-600');
        };
        window.openM = (id) => document.getElementById(id).classList.remove('hide');
        window.closeM = (id) => document.getElementById(id).classList.add('hide');
        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>

    <style>
        .hide { display: none !important; }
        .btn-royal { background: linear-gradient(45deg, #991b1b, #FF9933); color: white; font-weight: bold; border-radius: 12px; padding: 12px; width: 100%; transition: 0.3s; }
        .btn-royal:active { transform: scale(0.95); }
        input, textarea { border: 1.5px solid #ffe4cc !important; padding: 12px; border-radius: 12px; margin-bottom: 12px; width: 100%; outline: none; background: #fffaf5; }
        header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 flex justify-center">

<div id="login-screen" class="w-full max-w-[450px] min-h-screen bg-white flex flex-col items-center justify-center p-8 hide">
    <h1 class="text-5xl font-black italic text-red-800 mb-2">SainiWalaa</h1>
    <p class="text-orange-600 font-bold mb-10 tracking-widest text-center uppercase">🚩 Royal Rajasthani Studio 🚩</p>
    <input type="number" id="login-phone" placeholder="Aapka Mobile Number">
    <input type="text" id="login-name" placeholder="Aapka Shubh Naam">
    <button onclick="userLogin()" class="btn-royal shadow-xl">PADHARO STUDIO MEIN</button>
</div>

<div id="app" class="w-full max-w-[450px] min-h-screen bg-white shadow-2xl relative pb-20 hide">
    <header class="sticky top-0 border-b p-4 flex justify-between items-center z-[100]">
        <h1 class="text-2xl font-black italic text-red-800">SainiWalaa</h1>
        <div class="flex gap-4 text-xl text-orange-700">
            <i class="fa-solid fa-camera cursor-pointer" onclick="openM('post-modal')"></i>
            <i class="fa-solid fa-cart-plus cursor-pointer" onclick="openM('prod-modal')"></i>
            <i class="fa-solid fa-power-off text-red-500 cursor-pointer" onclick="logout()"></i>
        </div>
    </header>

    <main id="v-feed" class="pt-2"></main>

    <main id="v-shop" class="p-4 hide">
        <h2 class="font-black text-red-900 mb-4 uppercase italic">🚩 Royal Bazaar</h2>
        <div id="bazaar-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <main id="v-profile" class="hide">
        <div class="p-8 bg-orange-50/50 border-b">
            <div class="flex items-center gap-8 mb-4">
                <div class="w-20 h-20 rounded-full bg-white border-2 border-orange-500 p-1 shadow-md flex items-center justify-center">
                    <i class="fa-solid fa-user text-3xl text-orange-200"></i>
                </div>
                <div><b id="c-posts" class="text-3xl text-red-900">0</b><p class="text-[10px] font-bold text-gray-500 uppercase">Posts</p></div>
            </div>
            <h2 id="u-display-name" class="font-black text-xl text-red-900"></h2>
            <p class="text-xs text-orange-800 font-medium">SainiWalaa Royal Artist 🚩</p>
        </div>
        <div id="profile-grid" class="grid grid-cols-3 gap-0.5 pt-0.5"></div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t p-4 flex justify-around shadow-2xl z-[100]">
        <i onclick="showPage('feed')" id="n-feed" class="fa-solid fa-house text-2xl text-orange-600 cursor-pointer"></i>
        <i onclick="showPage('shop')" id="n-shop" class="fa-solid fa-bag-shopping text-2xl text-gray-400 cursor-pointer"></i>
        <i onclick="showPage('profile')" id="n-profile" class="fa-solid fa-circle-user text-2xl text-gray-400 cursor-pointer"></i>
    </nav>

    <div id="post-modal" class="fixed inset-0 bg-white z-[200] hide p-8">
        <div class="flex justify-between items-center mb-8"><b class="text-2xl font-black italic text-red-800">Naya Post</b><i class="fa-solid fa-xmark text-2xl" onclick="closeM('post-modal')"></i></div>
        <input type="file" id="post-file" accept="image/*">
        <textarea id="post-cap" placeholder="Caption likhein hukum..." class="h-32"></textarea>
        <button onclick="publish('post')" id="btn-post" class="btn-royal shadow-lg">PUBLISH POST</button>
    </div>

    <div id="prod-modal" class="fixed inset-0 bg-white z-[200] hide p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8"><b class="text-2xl font-black italic text-red-800">Add Product</b><i class="fa-solid fa-xmark text-2xl" onclick="closeM('prod-modal')"></i></div>
        <input type="file" id="prod-file" accept="image/*">
        <input type="text" id="prod-name" placeholder="Item ka Naam">
        <input type="number" id="prod-price" placeholder="Keemat (₹)">
        <input type="text" id="prod-link" placeholder="Buy Web Link (URL)">
        <textarea id="prod-desc" placeholder="Product Details..." class="h-20"></textarea>
        <button onclick="publish('prod')" id="btn-prod" class="btn-royal shadow-lg">LIST IN BAZAAR</button>
    </div>
</div>

</body>
</html>
