<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f8f9fa; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .nav-btn.active { color: #d4af37; border-bottom: 3px solid #d4af37; font-weight: bold; }
        .hidden { display: none !important; }
        .banner { height: 180px; background: #eee url('https://www.transparenttextures.com/patterns/cream-paper.png'); background-size: cover; border-radius: 0 0 25px 25px; position: relative; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); object-fit: cover; background: #ddd; }
        .social-chip { padding: 8px 15px; border-radius: 50px; color: white; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #ff0000; }
        .fb { background: #1877f2; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm text-center">
            <h1 class="raj-font text-4xl text-[#d4af37] mb-10 tracking-widest">SAINIWALAA</h1>
            <input type="email" id="auth-email" placeholder="Email Address" class="w-full p-4 border-b mb-4 outline-none focus:border-[#d4af37]">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 border-b mb-8 outline-none focus:border-[#d4af37]">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-4 rounded-full font-bold shadow-xl">LOG IN / JOIN</button>
        </div>
    </div>

    <main id="main-app" class="hidden">
        <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-md flex justify-around border-b shadow-sm">
            <button onclick="showTab('feed')" id="tab-feed" class="nav-btn active p-4 text-[11px] uppercase tracking-widest">Duniya ka Maal</button>
            <button onclick="showTab('shop')" id="tab-shop" class="nav-btn p-4 text-[11px] uppercase tracking-widest">Mhari Shop</button>
            <button onclick="showTab('orders')" id="tab-orders" class="nav-btn p-4 text-[11px] uppercase tracking-widest">Orders</button>
        </div>

        <section id="sec-feed" class="p-4 max-w-4xl mx-auto">
            <div id="feed-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="sec-shop" class="hidden">
            <div id="banner-box" class="banner">
                <label class="absolute top-4 right-4 bg-black/40 text-white p-2 rounded-full cursor-pointer">
                    <i class="fa-solid fa-camera"></i>
                    <input type="file" onchange="previewImage(this, 'banner-box')">
                </button>
                <div class="relative">
                    <img id="profile-img" src="https://via.placeholder.com/150" class="profile-pic">
                    <label class="absolute bottom-[-45px] left-[55%] bg-[#d4af37] text-white p-2 rounded-full border-2 border-white cursor-pointer">
                        <i class="fa-solid fa-pen text-[10px]"></i>
                        <input type="file" onchange="previewImage(this, 'profile-img')">
                    </label>
                </div>
            </div>

            <div class="mt-14 text-center px-6">
                <h2 id="disp-name" class="text-2xl font-black text-gray-800">Cretor Name</h2>
                <p id="disp-bio" class="text-xs text-gray-400 mt-1 italic">Bio update karein...</p>
                
                <div class="flex justify-center gap-2 mt-4">
                    <a id="lnk-insta" href="#" class="social-chip insta"><i class="fa-brands fa-instagram"></i> Insta</a>
                    <a id="lnk-yt" href="#" class="social-chip yt"><i class="fa-brands fa-youtube"></i> YouTube</a>
                    <a id="lnk-fb" href="#" class="social-chip fb"><i class="fa-brands fa-facebook"></i> FB</a>
                </div>
                <button onclick="toggleBox('edit-profile')" class="mt-4 text-[10px] font-bold text-[#d4af37] border border-[#d4af37] px-4 py-1 rounded-full">Edit Profile</button>
            </div>

            <div id="edit-profile" class="hidden p-6 max-w-md mx-auto bg-white mt-4 rounded-3xl border shadow-sm">
                <input id="in-name" placeholder="Name" class="w-full p-3 border rounded-xl mb-2">
                <input id="in-bio" placeholder="Bio" class="w-full p-3 border rounded-xl mb-2">
                <input id="in-insta" placeholder="Insta Link" class="w-full p-3 border rounded-xl mb-2">
                <input id="in-yt" placeholder="YouTube Link" class="w-full p-3 border rounded-xl mb-2">
                <input id="in-fb" placeholder="FB Link" class="w-full p-3 border rounded-xl mb-4">
                <button onclick="saveProfile()" class="w-full bg-black text-white p-3 rounded-xl">SAVE PROFILE</button>
            </div>

            <div class="p-4 max-w-4xl mx-auto mt-10">
                <div class="bg-white border-2 border-dashed rounded-[30px] p-6 text-center">
                    <h3 class="font-bold text-gray-400 mb-4 text-sm uppercase">Naya Maal Jodhein</h3>
                    <input id="p-name" placeholder="Item Name" class="w-full p-3 border rounded-xl mb-2">
                    <input id="p-price" placeholder="Price ₹" class="w-full p-3 border rounded-xl mb-2">
                    <textarea id="p-desc" placeholder="Details..." class="w-full p-3 border rounded-xl mb-4"></textarea>
                    
                    <div id="p-preview" class="hidden mb-4"><img id="p-prev-img" class="h-24 mx-auto rounded-lg"></div>
                    
                    <div class="flex gap-2">
                        <label class="flex-1 bg-gray-100 p-3 rounded-xl cursor-pointer text-xs font-bold">
                            <i class="fa-solid fa-image mr-2"></i>PHOTO CHUNEIN
                            <input type="file" onchange="previewImage(this, 'p-prev-img')">
                        </label>
                        <button id="p-save-btn" onclick="saveProduct()" class="flex-1 bg-[#d4af37] text-white p-3 rounded-xl text-xs font-bold shadow-lg">SAVE & PUBLISH</button>
                    </div>
                </div>
                <div id="my-grid" class="grid grid-cols-2 gap-4 mt-8"></div>
            </div>
        </section>

        <section id="sec-orders" class="hidden p-6 max-w-xl mx-auto">
            <h3 class="font-bold text-lg mb-4">Grahakon ke Orders</h3>
            <div id="order-list" class="space-y-4"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk", authDomain: "social-blog-93d38.firebaseapp.com", projectId: "social-blog-93d38", storageBucket: "social-blog-93d38.appspot.com", appId: "1:78643219054:web:dprl2lyih" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, currentFileUrl = "";

        window.toggleBox = (id) => document.getElementById(id).classList.toggle('hidden');

        // Photo Preview (Without Cloudinary Widget)
        window.previewImage = (input, targetId) => {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const url = e.target.result;
                    currentFileUrl = url; // Temporary Local URL
                    if(targetId === 'banner-box') document.getElementById(targetId).style.backgroundImage = `url(${url})`;
                    else if(targetId === 'p-prev-img') {
                        document.getElementById('p-preview').classList.remove('hidden');
                        document.getElementById(targetId).src = url;
                    } else document.getElementById(targetId).src = url;
                };
                reader.readAsDataURL(file);
            }
        };

        // Auth
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Email ya Pass galat hai!"));
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden'); syncAll(); }
        });

        window.showTab = (t) => {
            ['feed','shop','orders'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
        };

        window.saveProfile = () => {
            document.getElementById('disp-name').innerText = document.getElementById('in-name').value || "Creator";
            document.getElementById('disp-bio').innerText = document.getElementById('in-bio').value || "Bio update!";
            document.getElementById('lnk-insta').href = document.getElementById('in-insta').value || "#";
            document.getElementById('lnk-yt').href = document.getElementById('in-yt').value || "#";
            document.getElementById('lnk-fb').href = document.getElementById('in-fb').value || "#";
            toggleBox('edit-profile'); alert("Profile Saved!");
        };

        window.saveProduct = async () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, d = document.getElementById('p-desc').value;
            if(!n || !p || !currentFileUrl) return alert("Hukum, Photo aur Jankari poori bharein!");
            
            // NOTE: In production, upload currentFileUrl to Storage. Here we save the Base64/Local for Demo.
            await addDoc(collection(db, "products"), { name: n, price: p, desc: d, img: currentFileUrl, time: serverTimestamp(), creatorEmail: user.email.split('@')[0] });
            
            alert("Maal Shahi Feed par Publish ho gaya!");
            document.getElementById('p-name').value = ""; document.getElementById('p-preview').classList.add('hidden');
            currentFileUrl = "";
        };

        function syncAll() {
            // Public Feed
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const feed = document.getElementById('feed-grid'); feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    feed.innerHTML += `<div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                        <img src="${p.img}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h4 class="font-bold text-sm">@${p.creatorEmail} - ${p.name}</h4>
                            <p class="text-[10px] text-gray-400 mt-1">${p.desc}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="font-bold text-[#d4af37]">₹${p.price}</span>
                                <button onclick="buy('${p.name}')" class="bg-black text-white text-[10px] px-4 py-2 rounded-full font-bold">ORDER</button>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        window.buy = async (item) => {
            const n = prompt("Aapka Naam?"), ph = prompt("WhatsApp Number?");
            if(n && ph) await addDoc(collection(db, "orders"), { item, name: n, phone: ph, time: serverTimestamp() });
        };

        onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), snap => {
            const
