<!DOCTYPE html>
<html lang="ra">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Shahi Blog & Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --gold: #b8860b; --bg: #f8f9fa; }
        body { background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; }
        .royal-card { background: #fff; border: 1px solid #eee; border-radius: 15px; margin-bottom: 20px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .royal-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .royal-btn { background: var(--gold); color: #fff; font-weight: bold; padding: 12px; border-radius: 10px; width: 100%; transition: 0.2s; cursor: pointer; border: none; }
        .nav-link { cursor: pointer; font-weight: 600; color: #777; padding-bottom: 5px; border-bottom: 3px solid transparent; }
        .nav-link.active { color: var(--gold); border-bottom-color: var(--gold); }
        .hidden { display: none !important; }
        input, textarea { width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 12px; outline: none; background: #fff; }
        @media (max-width: 768px) { .pc-only { display: none; } }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-[4px] text-[#b8860b] cursor-pointer" onclick="show('darbar')">SAINIWALAA</h1>
            <nav id="user-nav" class="hidden flex gap-4 md:gap-8 items-center text-xs font-bold">
                <span onclick="show('darbar')" class="nav-link active" id="l-darbar">DARBAR</span>
                <span onclick="show('bazaar')" class="nav-link" id="l-bazaar">BAZAAR</span>
                <span onclick="show('profile')" class="nav-link" id="l-profile">PROFILE</span>
                <button onclick="logout()" class="text-red-500 text-lg"><i class="fa-solid fa-power-off"></i></button>
            </nav>
        </div>
    </header>

    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 bg-white border shadow-xl rounded-2xl">
        <div id="login-box">
            <h2 class="text-center font-bold text-xl mb-6 text-[#b8860b]">Hukum, Pravesh Karein</h2>
            <input id="email" type="email" placeholder="Email (example@gmail.com)">
            <input id="pass" type="password" placeholder="Password (Min. 6 characters)">
            <button onclick="login()" id="login-btn" class="royal-btn">LOGIN</button>
            <p onclick="toggleAuth(false)" class="text-center text-xs mt-4 text-gray-400 cursor-pointer underline">Naya Khata Banayein</p>
        </div>
        <div id="reg-box" class="hidden">
            <h2 class="text-center font-bold text-xl mb-6 text-[#b8860b]">Naya Khata Banayein</h2>
            <input id="reg-name" type="text" placeholder="Unique Username (No spaces)">
            <input id="reg-email" type="email" placeholder="Email">
            <input id="reg-pass" type="password" placeholder="Password (Min. 6 characters)">
            <button id="reg-btn" onclick="register()" class="royal-btn">REGISTER</button>
            <p onclick="toggleAuth(true)" class="text-center text-xs mt-4 text-gray-400 cursor-pointer underline">Purana Khata Hai? Login</p>
        </div>
    </div>

    <main id="main-app" class="hidden max-w-6xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            
            <div class="md:col-span-3 pc-only">
                <div class="sticky top-24 p-5 bg-white border rounded-xl">
                    <h3 class="font-bold border-b pb-2 mb-4">Shahi Menu</h3>
                    <div class="space-y-3 text-sm font-semibold text-gray-600">
                        <p onclick="show('darbar')" class="hover:text-[#b8860b] cursor-pointer"><i class="fa-solid fa-home mr-2"></i> Home Feed</p>
                        <p onclick="show('bazaar')" class="hover:text-[#b8860b] cursor-pointer"><i class="fa-solid fa-shopping-bag mr-2"></i> Shahi Bazaar</p>
                        <p onclick="openPostModal()" class="text-blue-600 cursor-pointer"><i class="fa-solid fa-plus-circle mr-2"></i> Naya Post</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-6">
                <section id="darbar-sec" class="page-sec">
                    <div id="feed-container" class="space-y-6"></div>
                </section>

                <section id="bazaar-sec" class="page-sec hidden">
                    <div class="p-6 bg-white border rounded-xl mb-6">
                        <h3 class="font-bold mb-4">Maal List Karein</h3>
                        <input id="p-name" placeholder="Product Name">
                        <input id="p-price" placeholder="Price ₹">
                        <input id="p-link" placeholder="WhatsApp / Buy Link">
                        <button onclick="openFastUpload('product')" class="royal-btn">PHOTO & LIST KAREIN</button>
                    </div>
                    <div id="bazaar-grid" class="grid grid-cols-2 gap-4"></div>
                </section>

                <section id="profile-sec" class="page-sec hidden">
                    <div class="p-8 bg-white border rounded-xl text-center mb-6">
                        <div class="w-20 h-20 bg-gray-100 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-[#b8860b]">
                            <i class="fa-solid fa-user text-2xl text-gray-300"></i>
                        </div>
                        <h2 id="prof-user" class="text-2xl font-bold text-[#b8860b]">@User</h2>
                        <div id="admin-orders" class="mt-10 text-left hidden border-t pt-6">
                            <h3 class="font-bold mb-4 text-red-600">📜 Grahak Order History</h3>
                            <div id="order-log" class="space-y-3"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="md:col-span-3">
                <div class="sticky top-24 p-6 bg-white border rounded-xl text-center shadow-sm">
                    <h4 class="font-bold text-gray-400 text-[10px] uppercase mb-4">Aapki Stats</h4>
                    <div class="flex justify-around">
                        <div><p class="text-xl font-bold" id="post-count">0</p><p class="text-[10px]">Lekh</p></div>
                        <div class="w-[1px] bg-gray-200 h-8"></div>
                        <div><p class="text-xl font-bold">0</p><p class="text-[10px]">Followers</p></div>
                    </div>
                    <button onclick="openPostModal()" class="w-full mt-6 bg-gray-100 text-gray-600 py-2 rounded-lg font-bold md:hidden">NAYA POST</button>
                </div>
            </div>
        </div>
    </main>

    <div id="post-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl max-w-md w-full">
            <h3 class="font-bold mb-4">Naya Blog Lekh</h3>
            <textarea id="post-caption" placeholder="Kuch likhein hukum..."></textarea>
            <button onclick="openFastUpload('post')" class="royal-btn">UPLOAD & POST</button>
            <button onclick="closeModal('post-modal')" class="w-full mt-2 text-gray-400 text-xs py-2">Hataiye</button>
        </div>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full">
            <h3 class="font-bold text-lg mb-4">Sauda Karein</h3>
            <input id="o-name" placeholder="Apna Naam">
            <input id="o-phone" placeholder="Mobile Number">
            <textarea id="o-addr" placeholder="Pura Pata"></textarea>
            <button id="confirm-btn" class="royal-btn">SAUDA PAKKO KARO</button>
            <button onclick="closeModal('order-modal')" class="w-full mt-2 text-gray-400 text-xs">Vapas</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, getDocs, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userP = null;

        // --- AUTH LOGIC (Updated with Error Check) ---
        window.login = () => {
            const e = email.value; const p = pass.value;
            if(!e || !p) return alert("Hukum, detail poori bhariye!");
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Galti: " + err.message));
        };

        window.register = async () => {
            const name = regName.value.trim().toLowerCase();
            const e = regEmail.value; const p = regPass.value;
            if(name.length < 3) return alert("Naam bada rakhein!");
            
            const q = query(collection(db, "users"), where("name", "==", name));
            const s = await getDocs(q);
            if(!s.empty) return alert("Ye naam pehle se hai!");

            createUserWithEmailAndPassword(auth, e, p).then(async (res) => {
                await setDoc(doc(db, "users", res.user.uid), { name, uid: res.user.uid, joinDate: serverTimestamp() });
                location.reload();
            }).catch(err => alert("Register Galti: " + err.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async u => {
            if(u) {
                const d = await getDoc(doc(db, "users", u.uid));
                userP = d.data();
                profUser.innerText = "@" + userP.name;
                authSection.classList.add('hidden'); mainApp.classList.remove('hidden'); userNav.classList.remove('hidden');
                initSync();
            } else { authSection.classList.remove('hidden'); mainApp.classList.add('hidden'); userNav.classList.add('hidden'); }
        });

        // --- MEDIA UPLOAD ---
        window.openPostModal = () => postModal.classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.openFastUpload = (type) => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default", maxVideoDuration: 90 }, async (err, res) => {
                if(res && res.event === "success") {
                    if(type === 'post') {
                        await addDoc(collection(db, "posts"), { 
                            url: res.info.secure_url, type: res.info.resource_type, author: userP.name, 
                            caption: postCaption.value, likes: [], time: serverTimestamp() 
                        });
                        closeModal('post-modal');
                    } else {
                        await addDoc(collection(db, "products"), { 
                            name: pName.value, price: pPrice.value, link: pLink.value, img: res.info.secure_url, author: userP.name, time: serverTimestamp() 
                        });
                    }
                    alert("Hukum, post ho gaya!");
                }
            });
        };

        // --- REALTIME SYNC ---
        function initSync() {
            // Blog Feed
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), s => {
                feedContainer.innerHTML = "";
                s.forEach(d => {
                    const p = d.data(); const id = d.id;
                    const isLiked = p.likes?.includes(auth.currentUser.uid);
                    feedContainer.innerHTML += `
                        <div class="royal-card overflow-hidden">
                            <div class="p-4 flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-gold flex items-center justify-center font-bold text-white">${p.author[0].toUpperCase()}</div>
                                <span class="font-bold text-xs">@${p.author}</span>
                            </div>
                            ${p.type==='video'?`<video src="${p.url}" controls class="w-full"></video>`:`<img src="${p.url}" class="w-full">`}
                            <div class="p-4">
                                <p class="text-sm text-gray-700 mb-4">${p.caption || ''}</p>
                                <div class="flex gap-4 text-xs border-t pt-3">
                                    <span onclick="likePost('${id}', ${JSON.stringify(p.likes)})" class="cursor-pointer ${isLiked?'text-red-500':'text-gray-400'}"><i class="fa-heart fa-${isLiked?'solid':'regular'}"></i> Like</span>
                                    <span class="text-gray-400"><i class="fa-regular fa-comment"></i> Comment</span>
                                </div>
                            </div>
                        </div>`;
                });
            });

            // Bazaar Grid
            onSnapshot(collection(db, "products"), s => {
                bazaarGrid.innerHTML = "";
                s.forEach(d => { const p = d.data(); bazaarGrid.innerHTML += `
                    <div class="bg-white border p-3 rounded-xl text-center">
                        <img src="${p.img}" class="h-32 w-full object-cover rounded-lg mb-2">
                        <p class="font-bold text-xs truncate">${p.name}</p>
                        <p class="text-xs text-[#b8860b]">₹${p.price}</p>
                        <button onclick="openOrder('${p.name}','${p.link}')" class="w-full mt-2 bg-black text-white text-[10px] py-2 rounded-lg">KHARIDEIN</button>
                    </div>`; });
            });

            // Admin Order View (Change with your email)
            if(auth.currentUser.email === "admin@test.com") { 
                adminOrders.classList.remove('hidden');
                onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), s => {
                    orderLog.innerHTML = "";
                    s.forEach(o => { const d = o.data(); orderLog.innerHTML += `<div class="p-3 bg-gray-50 border-l-4 border-gold text-[10px]"><b>${d.customer}</b> - ${d.product} <br> 📞 ${d.phone} <br> 📍 ${d.address}</div>`; });
                });
            }
        }

        window.likePost = async (id, likes) => {
            const r = doc(db, "posts", id);
            if(likes.includes(auth.currentUser.uid)) await updateDoc(r, { likes: arrayRemove(auth.currentUser.uid) });
            else await updateDoc(r, { likes: arrayUnion(auth.currentUser.uid) });
        };

        window.openOrder = (n, l) => {
            orderModal.classList.remove('hidden');
            confirmBtn.onclick = async () => {
                await addDoc(collection(db, "orders"), { customer: oName.value, phone: oPhone.value, address: oAddr.value, product: n, time: serverTimestamp() });
                window.location.href = l;
            };
        };

        window.show = (id) => {
            document.querySelectorAll('.page-sec').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id + '-sec').classList.remove('hidden');
            document.getElementById('l-' + id).classList.add('active');
        };

        window.toggleAuth = (isL) => { loginBox.classList.toggle('hidden', !isL); regBox.classList.toggle('hidden', isL); };
    </script>
</body>
</html>
