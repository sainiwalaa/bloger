<script type="module">
    // ... (Firebase init same)

    // --- NEW: UNIQUE USERNAME CHECK ---
    window.registerUser = async () => {
        const name = document.getElementById('reg-name').value;
        const username = document.getElementById('reg-username').value.toLowerCase().trim().replace(/\s+/g, '_');
        const btn = document.getElementById('btn-reg');

        if(!name || !username) return alert("Hukum, Naam aur Username dono bhariye!");
        if(username.length < 4) return alert("Username kam se kam 4 akshar ka ho!");

        btn.disabled = true;
        btn.innerText = "⏳ Checking ID...";

        // Check if username exists in database
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        let isTaken = false;

        if (snapshot.exists()) {
            const allUsers = snapshot.val();
            for (let id in allUsers) {
                if (allUsers[id].username === username) {
                    isTaken = true;
                    break;
                }
            }
        }

        if (isTaken) {
            alert("❌ Ye Username pehle se kisi ka hai! Kuch naya try karein.");
            btn.disabled = false;
            btn.innerText = "CREATE ROYAL ACCOUNT 🚩";
        } else {
            // Save New User with Unique Username
            await set(ref(db, 'users/' + auth.currentUser.uid), { 
                name: name,
                username: username,
                bio: "SainiWalaa Royal Member 🚩",
                uid: auth.currentUser.uid,
                photo: "",
                banner: ""
            });
            location.reload();
        }
    };

    // --- UPDATED SEARCH BY USERNAME ---
    window.searchUser = () => {
        const term = document.getElementById('search-input').value.toLowerCase();
        const posts = document.querySelectorAll('#v-feed > .post-card');
        posts.forEach(p => {
            const uidTag = p.querySelector('.u-id-tag').innerText.toLowerCase();
            const nameTag = p.querySelector('.u-name-tag').innerText.toLowerCase();
            // Search in both Name and Username
            p.style.display = (uidTag.includes(term) || nameTag.includes(term)) ? 'block' : 'none';
        });
    };

    // --- UPDATED FEED RENDER WITH USERNAME ---
    function renderFeed(data) {
        let h = "";
        if(data) Object.keys(data).reverse().forEach(k => {
            const p = data[k];
            const uImg = p.uPhoto || 'https://via.placeholder.com/50';
            h += `
            <div class="bg-white mb-6 border-b pb-4 post-card">
                <div class="p-3 flex items-center gap-3 cursor-pointer" onclick="visitProfile('${p.uid}')">
                    <img src="${uImg}" class="w-9 h-9 rounded-full border-2 border-orange-100 object-cover">
                    <div class="flex flex-col">
                        <b class="text-xs uppercase italic u-name-tag leading-none">${p.uName}</b>
                        <span class="text-[9px] text-orange-600 font-bold u-id-tag">@${p.username || 'user'}</span>
                    </div>
                </div>
                ${p.type === 'video' ? `<video src="${p.url}" controls class="w-full max-h-[70vh] bg-black"></video>` : `<img src="${p.url}" class="w-full max-h-[70vh] object-contain">`}
                <div class="p-4 flex gap-5 text-xl">
                    <i class="fa-regular fa-heart cursor-pointer hover:text-red-500" onclick="toggleLike('${k}')"></i>
                    <i class="fa-regular fa-comment cursor-pointer hover:text-orange-500" onclick="addComment('${k}')"></i>
                </div>
                <div class="px-4 text-sm"><b>${p.uName}</b> ${p.caption || ''}</div>
            </div>`;
        });
        document.getElementById('v-feed').innerHTML = h || "<p class='text-center py-20 opacity-20'>No Posts Found</p>";
    }
</script>

<div id="reg-screen" class="w-full max-w-[450px] p-10 flex flex-col justify-center min-h-screen hide text-center">
    <h2 class="text-xl font-black raj-title mb-6 uppercase tracking-tighter">Apni Royal ID Banayein</h2>
    <input type="text" id="reg-name" placeholder="Aapka Shubh Naam">
    <div class="relative">
        <span class="absolute left-3 top-3 text-orange-600 font-bold text-sm">@</span>
        <input type="text" id="reg-username" placeholder="unique_username" class="!pl-8">
    </div>
    <p class="text-[9px] text-gray-400 mb-6 italic">Username mein space na dein, ye aapki pehchaan hogi.</p>
    <button id="btn-reg" onclick="registerUser()" class="btn-royal shadow-xl">CREATE ROYAL ACCOUNT 🚩</button>
</div>
