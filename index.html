<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAINIWALAA | Creator Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        body { background: #fdfdfd; font-family: 'Plus Jakarta Sans', sans-serif; }
        .raj-font { font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #eee; }
        .tab-btn.active { border-bottom: 3px solid #d4af37; color: #d4af37; font-weight: bold; }
        .hidden { display: none !important; }
        .card { transition: 0.3s; border: 1px solid #f0f0f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 glass px-4 py-3 flex justify-between items-center shadow-sm">
        <h1 class="raj-font text-xl text-[#d4af37] font-black">SAINIWALAA</h1>
        <div id="nav-user" class="hidden flex items-center gap-3">
            <span id="user-display" class="text-xs font-bold text-gray-600"></span>
            <button onclick="logout()" class="text-red-500 text-xs"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </nav>

    <div id="auth-section" class="min-h-[80vh] flex items-center justify-center px-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100">
            <div class="flex justify-around mb-8 border-b">
                <button id="tab-login" onclick="toggleAuth('login')" class="pb-2 text-sm font-bold border-b-2 border-[#d4af37]">LOGIN</button>
                <button id="tab-signup" onclick="toggleAuth('signup')" class="pb-2 text-sm font-bold text-gray-400">REGISTER</button>
            </div>
            
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-3 border rounded-xl mb-4 outline-none">
            
            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-[#d4af37] text-white p-4 rounded-xl font-bold shadow-lg">PRAVESH KAREIN</button>
            <p id="auth-msg" class="text-[10px] text-center mt-4 text-gray-400">Join hoke apni shop banayein!</p>
        </div>
    </div>

    <main id="main-platform" class="hidden">
        <div class="flex justify-center gap-8 bg-white py-4 border-b sticky top-[52px] z-40">
            <button onclick="showTab('feed')" id="btn-feed" class="tab-btn active text-sm uppercase tracking-widest">Public Feed</button>
            <button onclick="showTab('shop')" id="btn-shop" class="tab-btn text-sm uppercase tracking-widest">My Shop</button>
        </div>

        <section id="sec-feed" class="max-w-4xl mx-auto p-4">
            <h2 class="raj-font text-lg mb-6">Naye Products</h2>
            <div id="feed-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="sec-shop" class="max-w-4xl mx-auto p-4 hidden">
            <div class="bg-[#d4af37]/10 p-6 rounded-3xl mb-8 border border-[#d4af37]/20">
                <h3 class="font-bold text-[#d4af37] mb-4">NAYA PRODUCT ADD KAREIN</h3>
                <input id="p-name" placeholder="Product ka Naam" class="w-full p-3 border rounded-xl mb-3 outline-none">
                <textarea id="p-desc" placeholder="Product Description (Quality, Size, etc.)" class="w-full p-3 border rounded-xl mb-3 outline-none" rows="2"></textarea>
                <input id="p-price" placeholder="Price ₹" class="w-full p-3 border rounded-xl mb-3 outline-none">
                
                <div class="flex gap-3">
                    <button onclick="pickImage()" class="flex-1 bg-white border-2 border-[#d4af37] text-[#d4af37] p-3 rounded-xl text-xs font-bold">
                        <i class="fa-solid fa-camera mr-2"></i>PHOTO CHUNEIN
                    </button>
                    <button id="save-prod-btn" onclick="saveProductToFirebase()" class="flex-1 bg-[#d4af37] text-white p-3 rounded-xl text-xs font-bold opacity-50 cursor-not-allowed" disabled>
                        SAVE & PUBLISH
                    </button>
                </div>
                <div id="img-preview" class="mt-4 hidden text-center">
                    <p class="text-[10px] text-green-600 mb-2">✓ Photo Upload Ho Gayi!</p>
                    <img id="prev-src" src="" class="h-20 mx-auto rounded-lg border shadow-sm">
                </div>
            </div>

            <h3 class="raj-font text-lg mb-4">Aapki Shop ka Maal</h3>
            <div id="my-shop-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyof00QTv4HOu1B_xR72adrpB2a9GLmuk",
            authDomain: "social-blog-93d38.firebaseapp.com",
            projectId: "social-blog-93d38",
            storageBucket: "social-blog-93d38.appspot.com",
            appId: "1:78643219054:web:dprl2lyih"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, tempUrl = "", authMode = 'login';

        // --- AUTH LOGIC ---
        window.toggleAuth = (m) => {
            authMode = m;
            document.getElementById('tab-login').className = m === 'login' ? 'pb-2 text-sm font-bold border-b-2 border-[#d4af37]' : 'pb-2 text-sm font-bold text-gray-400';
            document.getElementById('tab-signup').className = m === 'signup' ? 'pb-2 text-sm font-bold border-b-2 border-[#d4af37]' : 'pb-2 text-sm font-bold text-gray-400';
            document.getElementById('auth-btn').innerText = m === 'login' ? 'PRAVESH KAREIN' : 'SHOP BANAYEIN';
        };

        window.handleAuth = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Email/Pass bharein!");
            
            const action = authMode === 'login' ? signInWithEmailAndPassword : createUserWithEmailAndPassword;
            action(auth, email, pass).catch(e => alert(e.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-platform').classList.remove('hidden');
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('user-display').innerText = u.email.split('@')[0];
                syncFeed();
                syncMyShop();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-platform').classList.add('hidden');
                document.getElementById('nav-user').classList.add('hidden');
            }
        });

        // --- UI TABS ---
        window.showTab = (t) => {
            document.getElementById('sec-feed').classList.toggle('hidden', t !== 'feed');
            document.getElementById('sec-shop').classList.toggle('hidden', t !== 'shop');
            document.getElementById('btn-feed').classList.toggle('active', t === 'feed');
            document.getElementById('btn-shop').classList.toggle('active', t === 'shop');
        };

        // --- PRODUCT LOGIC ---
        window.pickImage = () => {
            cloudinary.openUploadWidget({ cloudName: "dvp58lgh3", uploadPreset: "ml_default" }, (err, res) => {
                if(res?.event === "success") {
                    tempUrl = res.info.secure_url;
                    document.getElementById('img-preview').classList.remove('hidden');
                    document.getElementById('prev-src').src = tempUrl;
                    const saveBtn = document.getElementById('save-prod-btn');
                    saveBtn.disabled = false;
                    saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        };

        window.saveProductToFirebase = async () => {
            const name = document.getElementById('p-name').value;
            const desc = document.getElementById('p-desc').value;
            const price = document.getElementById('p-price').value;
            if(!name || !price || !tempUrl) return alert("Hukum, poori jankari bharein!");

            await addDoc(collection(db, "products"), {
                creatorId: user.uid,
                creatorEmail: user.email.split('@')[0],
                name, desc, price, img: tempUrl,
                time: serverTimestamp()
            });

            // Reset
            tempUrl = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-desc').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('img-preview').classList.add('hidden');
            document.getElementById('save-prod-btn').disabled = true;
            document.getElementById('save-prod-btn').classList.add('opacity-50');
            alert("Product Publish Ho Gayo!");
        };

        // --- REAL-TIME SYNC ---
        function syncFeed() {
            onSnapshot(query(collection(db, "products"), orderBy("time", "desc")), snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    container.innerHTML += `
                        <div class="card bg-white rounded-2xl overflow-hidden">
                            <img src="${p.img}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-bold text-sm">${p.name}</h4>
                                    <span class="text-xs bg-[#d4af37]/10 text-[#d4af37] px-2 py-1 rounded-md">@${p.creatorEmail}</span>
                                </div>
                                <p class="text-[11px] text-gray-500 mb-4 line-clamp-2">${p.desc}</p>
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-[#d4af37]">₹${p.price}</span>
                                    <button class="bg-black text-white text-[10px] px-4 py-2 rounded-lg font-bold">CONTACT</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function syncMyShop() {
            onSnapshot(query(collection(db, "products"), where("creatorId", "==", user.uid)), snap => {
                const grid = document.getElementById('my-shop-grid');
                grid.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `
                        <div class="bg-white p-2 rounded-xl border relative">
                            <button onclick="delProd('${d.id}')" class="absolute top-1 right-1 bg-red-500 text-white w-5 h-5 rounded-full text-[8px]"><i class="fa-solid fa-trash"></i></button>
                            <img src="${p.img}" class="w-full h-24 object-cover rounded-lg mb-2">
                            <p class="text-[10px] font-bold truncate">${p.name}</p>
                            <p class="text-[10px] text-[#d4af37]">₹${p.price}</p>
                        </div>`;
                });
            });
        }

        window.delProd = async (id) => {
            if(confirm("Maal mita dein?")) await deleteDoc(doc(db, "products", id));
        }

    </script>
</body>
</html>
