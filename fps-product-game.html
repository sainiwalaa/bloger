<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <title>Sainiwalaa - Street Racer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@700&display=swap');
        
        body { margin: 0; padding: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; filter: saturate(1.2) brightness(0.8); }
        
        /* --- GAMING HUD --- */
        #hud {
            position: fixed; top: 10px; width: 95%; left: 2.5%; display: flex;
            justify-content: space-between; z-index: 100; pointer-events: none;
        }
        .stat-box {
            background: rgba(0,0,0,0.8); border: 2px solid #00ffcc;
            padding: 10px; border-radius: 8px; color: #fff; text-align: center;
            min-width: 100px; box-shadow: 0 0 10px #00ffcc;
        }
        #dist-val { font-family: 'Black Ops One'; font-size: 22px; color: #ff00cc; }

        /* --- CONSOLE CONTROLS --- */
        .controls-container {
            position: fixed; bottom: 30px; width: 100%; display: flex;
            justify-content: space-between; padding: 0 20px; z-index: 1000;
            box-sizing: border-box;
        }
        .pad { display: grid; gap: 10px; }
        .btn-ctrl {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border: 3px solid #00ffcc; border-radius: 50%; color: #fff;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); active-background: #00ffcc;
        }
        .btn-ctrl:active { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }

        /* --- REWARD MODAL --- */
        #reward-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; z-index: 2000; text-align: center;
        }
        .modal-card {
            border: 4px solid #ff00cc; padding: 25px; border-radius: 30px;
            background: #111; color: white; width: 90%; max-width: 380px;
            box-shadow: 0 0 40px #ff00cc;
        }
        .p-img { width: 180px; height: 180px; border-radius: 15px; border: 3px solid gold; margin: 15px 0; }
        .claim-btn {
            background: linear-gradient(45deg, #00ffcc, #ff00cc); color: #fff;
            padding: 15px; width: 100%; border: none; border-radius: 50px;
            font-weight: bold; font-family: 'Orbitron'; cursor: pointer;
        }

        /* --- CAR ANIMATION --- */
        #car-body { font-size: 45px; transition: transform 0.1s linear; filter: drop-shadow(0 0 5px red); }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat-box">
        <div style="font-size: 10px;">DISTANCE</div>
        <div id="dist-val">-- M</div>
    </div>
    <div class="stat-box">
        <div style="font-size: 10px;">MISSION</div>
        <div id="mission-name" style="color: #00ffcc;">GET THE BOX</div>
    </div>
</div>

<div class="controls-container">
    <div class="pad">
        <div style="display:flex; gap:10px;">
            <button class="btn-ctrl" ontouchstart="startMove('left')" ontouchend="stopMove()">◀</button>
            <button class="btn-ctrl" ontouchstart="startMove('right')" ontouchend="stopMove()">▶</button>
        </div>
    </div>
    <div class="pad">
        <button class="btn-ctrl" ontouchstart="startMove('up')" ontouchend="stopMove()">▲</button>
        <button class="btn-ctrl" ontouchstart="startMove('down')" ontouchend="stopMove()">▼</button>
    </div>
</div>

<div id="reward-modal">
    <div class="modal-card">
        <h1 style="color: gold; margin: 0; font-family: 'Black Ops One';">MISSION SUCCESS!</h1>
        <p>Aapne target dhoond liya!</p>
        <img src="https://via.placeholder.com/200/ff00cc/ffffff?text=SAINIWALAA+PRODUCT" class="p-img">
        <h2 style="color: #00ffcc; margin: 10px 0;">54% DISCOUNT</h2>
        <button class="claim-btn" onclick="nextMission()">CLAIM & NEXT TARGET</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, carMarker, targetMarker;
    let carPos = { lat: 0, lng: 0 };
    let targetPos = { lat: 0, lng: 0 };
    let rotation = 0;
    let moveInterval = null;
    const speed = 0.00006; 

    function init() {
        navigator.geolocation.getCurrentPosition(pos => {
            carPos.lat = pos.coords.latitude;
            carPos.lng = pos.coords.longitude;
            
            map = L.map('map', { 
                zoomControl: false, 
                dragging: false, 
                scrollWheelZoom: false,
                doubleClickZoom: false
            }).setView([carPos.lat, carPos.lng], 19);
            
            // Satellite Style
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

            // Car Marker
            const carIcon = L.divIcon({ 
                html: `<div id="car-body">🏎️</div>`, 
                className: 'dummy' 
            });
            carMarker = L.marker([carPos.lat, carPos.lng], { icon: carIcon }).addTo(map);

            spawnTarget();
        });
    }

    function spawnTarget() {
        // Randomly set target within 100-200 meters
        const offsetLat = (Math.random() > 0.5 ? 1 : -1) * (0.0006 + Math.random() * 0.0005);
        const offsetLng = (Math.random() > 0.5 ? 1 : -1) * (0.0006 + Math.random() * 0.0005);
        
        targetPos.lat = carPos.lat + offsetLat;
        targetPos.lng = carPos.lng + offsetLng;

        if (targetMarker) map.removeLayer(targetMarker);
        
        const giftIcon = L.divIcon({ html: '<div style="font-size: 40px; filter: drop-shadow(0 0 10px gold);">🎁</div>', className: 'dummy' });
        targetMarker = L.marker([targetPos.lat, targetPos.lng], { icon: giftIcon }).addTo(map);
        
        updateHUD();
    }

    function startMove(dir) {
        if (moveInterval) clearInterval(moveInterval);
        moveInterval = setInterval(() => {
            if (dir === 'up') {
                carPos.lat += Math.cos(rotation * Math.PI / 180) * speed;
                carPos.lng += Math.sin(rotation * Math.PI / 180) * speed;
            }
            if (dir === 'down') {
                carPos.lat -= Math.cos(rotation * Math.PI / 180) * speed;
                carPos.lng -= Math.sin(rotation * Math.PI / 180) * speed;
            }
            if (dir === 'left') rotation -= 10;
            if (dir === 'right') rotation += 10;

            carMarker.setLatLng([carPos.lat, carPos.lng]);
            document.getElementById('car-body').style.transform = `rotate(${rotation}deg)`;
            map.panTo([carPos.lat, carPos.lng]);
            updateHUD();
        }, 50);
    }

    function stopMove() {
        clearInterval(moveInterval);
        moveInterval = null;
    }

    function updateHUD() {
        const d = getDist(carPos.lat, carPos.lng, targetPos.lat, targetPos.lng);
        document.getElementById('dist-val').innerText = Math.round(d) + " M";
        
        if (d < 15) {
            stopMove();
            document.getElementById('reward-modal').style.display = 'flex';
        }
    }

    function nextMission() {
        document.getElementById('reward-modal').style.display = 'none';
        spawnTarget(); // Naya target har baar alg jagah
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    init();
</script>
</body>
</html>
