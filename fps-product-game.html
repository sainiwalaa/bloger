<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sainiwalaa FPS Pro</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:sans-serif; color:white; }

#hud{
position:fixed;
top:10px; left:10px;
font-size:18px;
z-index:10;
}

#crosshair{
position:fixed;
top:50%; left:50%;
transform:translate(-50%,-50%);
font-size:30px;
z-index:10;
}

#gun{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:200px;
transition:0.1s;
z-index:10;
}

.hit{
position:fixed;
top:50%; left:50%;
transform:translate(-50%,-50%);
color:red;
font-size:40px;
opacity:0;
}

</style>
</head>
<body>

<div id="hud">
Score: <span id="score">0</span> |
Time: <span id="time">30</span> |
Level: <span id="level">1</span>
</div>

<div id="crosshair">+</div>

<img id="gun" src="https://i.imgur.com/6X4R6Hk.png">

<div id="hit" class="hit">💥</div>

<audio id="shootSound" src="https://www.soundjay.com/mechanical/sounds/gunshot-01.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

let score=0, time=30, level=1;
let objects=[];

// SAMPLE PRODUCTS
let products = [
{img:"https://m.media-amazon.com/images/I/61a7voWbxtL._SX522_.jpg", price:99, good:true, link:"https://amzn.to/3Lb50mc"},
{img:"https://m.media-amazon.com/images/I/71H5JdZJjBL._SX522_.jpg", price:499, good:false, link:"#"}
];

function createProduct(){

let p = products[Math.floor(Math.random()*products.length)];

let texture = new THREE.TextureLoader().load(p.img);

let geo = new THREE.PlaneGeometry(2,2);
let mat = new THREE.MeshBasicMaterial({map:texture});

let obj = new THREE.Mesh(geo,mat);

obj.position.x=(Math.random()-0.5)*8;
obj.position.y=(Math.random()-0.5)*4;
obj.position.z=-Math.random()*10;

obj.userData = p;

scene.add(obj);
objects.push(obj);
}

for(let i=0;i<5;i++) createProduct();

function animate(){

requestAnimationFrame(animate);

objects.forEach(obj=>{
obj.position.z += 0.05 + level*0.01;

if(obj.position.z>5){
scene.remove(obj);
objects.splice(objects.indexOf(obj),1);
createProduct();
}
});

renderer.render(scene,camera);
}

animate();

// SHOOT EVENT
window.addEventListener("click",(e)=>{

// gun recoil
let gun = document.getElementById("gun");
gun.style.transform="translateX(-50%) translateY(10px)";
setTimeout(()=>gun.style.transform="translateX(-50%)",100);

// sound
document.getElementById("shootSound").play();

// raycast
let mouse = new THREE.Vector2(
(e.clientX/window.innerWidth)*2-1,
-(e.clientY/window.innerHeight)*2+1
);

let raycaster = new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

let hits = raycaster.intersectObjects(objects);

if(hits.length>0){

let hit = hits[0].object;
let data = hit.userData;

// hit effect
let hitEl = document.getElementById("hit");
hitEl.style.opacity=1;
setTimeout(()=>hitEl.style.opacity=0,200);

// scoring
if(data.good){
score+=10;
window.open(data.link);
}else{
score-=5;
}

// remove + respawn
scene.remove(hit);
objects.splice(objects.indexOf(hit),1);
createProduct();

document.getElementById("score").innerText=score;
}

});

// TIMER
setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
level++;
time=30;
document.getElementById("level").innerText=level;
}

},1000);

</script>

</body>
</html>
