<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <title>Sainiwalaa Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        
        body { margin: 0; padding: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* --- GAMING UI --- */
        #hud {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0,255,204,0.1); border: 2px solid #00ffcc;
            color: #fff; padding: 10px; border-radius: 12px; z-index: 100;
            text-align: center; backdrop-filter: blur(10px);
        }
        #dist-val { font-size: 24px; color: #ff00cc; text-shadow: 0 0 10px #ff00cc; }

        /* --- BIG ARCADE CONTROLS --- */
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px;
            gap: 15px; z-index: 1000;
        }
        .btn {
            width: 70px; height: 70px; background: rgba(0,0,0,0.7); 
            border: 3px solid #00ffcc; border-radius: 15px; color: #00ffcc;
            font-size: 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #008866;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; background: #00ffcc; color: #000; }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        /* --- REWARD PANEL --- */
        #reward-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000; color: white;
        }
        .card { border: 3px solid #ff00cc; padding: 30px; border-radius: 20px; text-align: center; width: 85%; }
        .p-img { width: 100%; max-width: 200px; border-radius: 10px; margin: 15px 0; border: 2px solid #00ffcc; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-size: 10px; letter-spacing: 2px;">DISTANCE TO TARGET</div>
    <div id="dist-val">FINDING GPS...</div>
</div>

<div id="controls">
    <button class="btn up" onclick="move('up')">▲</button>
    <button class="btn left" onclick="move('left')">◀</button>
    <button class="btn down" onclick="move('down')">▼</button>
    <button class="btn right" onclick="move('right')">▶</button>
</div>

<div id="reward-screen">
    <div class="card">
        <h1 style="color: gold; margin: 0;">54% OFF!</h1>
        <p>Sainiwalaa Premium Product Unlocked</p>
        <img src="https://via.placeholder.com/200/00ffcc/000000?text=SAINIWALAA" class="p-img">
        <div style="background: #222; padding: 10px; border: 1px dashed #ff00cc; margin-bottom: 20px;">CODE: SW54</div>
        <button onclick="location.reload()" style="background:#00ffcc; padding: 15px; width: 100%; border:none; border-radius: 10px; font-weight:bold;">NEXT MISSION</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, carMarker, targetMarker;
    let carPos = { lat: 0, lng: 0 };
    let targetPos = { lat: 0, lng: 0 };
    const step = 0.0001; // Movement speed

    function init() {
        navigator.geolocation.getCurrentPosition(pos => {
            carPos.lat = pos.coords.latitude;
            carPos.lng = pos.coords.longitude;

            // 1. Map Setup (Satellite)
            map = L.map('map', { zoomControl: false, dragging: false, touchZoom: false }).setView([carPos.lat, carPos.lng], 18);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

            // 2. Car (Icon)
            const carIcon = L.divIcon({ html: '<div style="font-size: 40px;">🏎️</div>', className: 'd' });
            carMarker = L.marker([carPos.lat, carPos.lng], { icon: carIcon }).addTo(map);

            // 3. Target Setup (Save to LocalStorage so it doesn't move on refresh)
            if(localStorage.getItem('target_lat')) {
                targetPos.lat = parseFloat(localStorage.getItem('target_lat'));
                targetPos.lng = parseFloat(localStorage.getItem('target_lng'));
            } else {
                targetPos.lat = carPos.lat + 0.0007;
                targetPos.lng = carPos.lng + 0.0007;
                localStorage.setItem('target_lat', targetPos.lat);
                localStorage.setItem('target_lng', targetPos.lng);
            }

            const giftIcon = L.divIcon({ html: '<div style="font-size: 35px;">🎁</div>', className: 'd' });
            targetMarker = L.marker([targetPos.lat, targetPos.lng], { icon: giftIcon }).addTo(map);

            updateHUD();
        }, err => alert("GPS Permission On Karein!"));
    }

    function move(dir) {
        if(dir === 'up') carPos.lat += step;
        if(dir === 'down') carPos.lat -= step;
        if(dir === 'left') carPos.lng -= step;
        if(dir === 'right') carPos.lng += step;

        carMarker.setLatLng([carPos.lat, carPos.lng]);
        map.panTo([carPos.lat, carPos.lng]);
        updateHUD();
    }

    function updateHUD() {
        const d = getDist(carPos.lat, carPos.lng, targetPos.lat, targetPos.lng);
        document.getElementById('dist-val').innerText = Math.round(d) + " METERS";
        
        if(d < 20) {
            localStorage.clear(); // Win ke baad target clear karein
            document.getElementById('reward-screen').style.display = 'flex';
        }
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    init();
</script>
</body>
</html>
