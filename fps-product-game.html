<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Income System</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:url('https://media.licdn.com/dms/image/v2/D5612AQEG2hRe0X7BCA/article-cover_image-shrink_720_1280/B56ZmthjkEJ8AI-/0/1759552879351?e=2147483647&v=beta&t=QcT_x1LpWdEgay9_-z1KaQtX_y1XemEO1jGadpL6agQ') no-repeat center/cover;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.header{
text-align:center;
padding:25px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.video-frame{
position:relative;
border-radius:15px;
overflow:hidden;
}

.video-frame iframe{
width:100%;
height:220px;
pointer-events:none;
}

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.play-btn:after{
content:"▶";
color:white;
font-size:25px;
}

.text-anim{
text-align:center;
height:25px;
overflow:hidden;
}

.text-anim span{
display:block;
animation:slide 6s infinite;
}

@keyframes slide{
0%{transform:translateY(0)}
25%{transform:translateY(-25px)}
50%{transform:translateY(-50px)}
75%{transform:translateY(-75px)}
100%{transform:translateY(0)}
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

img{
width:180px;
margin-top:15px;
}

@media(min-width:768px){
.video-frame iframe{
height:300px;
}
}
</style>

</head>

<body>

<div class="overlay">

<div class="container">

<div class="header">
<h1>💸 Forever Income System</h1>
<p>Ek baar join karo, lifetime earning pao</p>
</div>

<div class="card">
<div class="video-frame">
<iframe id="video" src="https://www.youtube.com/embed/oPN3WurQ3iw?enablejsapi=1"></iframe>
<div class="play-btn" onclick="playVideo()"></div>
</div>
</div>

<div class="card text-anim">
<span>
💰 Lifetime Income<br>
👥 Unlimited Referral<br>
📈 Level Income System<br>
🚀 Passive Earnings
</span>
</div>

<div class="card">
<b>🔥 Forever Referral Concept</b>
<p>Jo bhi aapke link se join karega wo lifetime aapke under rahega aur aapko har level se income milegi.</p>
</div>

<div class="card">
<h3>Join Now</h3>

<form id="form">
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Mobile Number" required>
<input type="text" placeholder="Address" required>
<button type="submit">Start Earning</button>
</form>

<div id="qrBox"></div>
</div>

</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby0KZNDqPrrkLrAe867r1euXdihIZMmiZX1rquBpwtaBYwZoxHYPvUXpBmhez9msPPieQ/exec";

const params = new URLSearchParams(window.location.search);
const ref = params.get("ref") || "Direct";

document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

let name = this[0].value;
let mobile = this[1].value;
let address = this[2].value;

let res = await fetch(scriptURL,{
method:"POST",
body: JSON.stringify({
name:name,
mobile:mobile,
address:address,
referral:ref
})
});

let data = await res.json();

document.getElementById("qrBox").innerHTML = `
<h3>💳 Scan & Pay</h3>
<img src="${data.qr}">
`;

this.reset();

});

function playVideo(){
let iframe = document.getElementById("video");
iframe.style.pointerEvents="auto";
iframe.src += "&autoplay=1";
document.querySelector(".play-btn").style.display="none";
}

</script>

</body>
</html>
