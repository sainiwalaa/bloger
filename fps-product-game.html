<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creator Arena</title>

<style>
body{
margin:0;
background:radial-gradient(circle,#0f2027,#000);
color:white;
font-family:sans-serif;
overflow:hidden;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
font-size:18px;
z-index:10;
}

/* Player */
#player{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:50px;
}

/* Target */
.target{
position:absolute;
top:30%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
cursor:pointer;
transition:0.2s;
}

/* hit animation */
.target:active{
transform:translate(-50%,-50%) scale(0.8);
}

/* reward box */
#reward{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
display:none;
z-index:20;
text-align:center;
width:250px;
}

#reward img{
width:120px;
border-radius:10px;
}

.btn{
margin-top:10px;
padding:10px;
background:#ffd000;
color:black;
border-radius:10px;
cursor:pointer;
}

</style>
</head>
<body>

<div id="hud">
Score: <span id="score">0</span> | Level: <span id="level">1</span>
</div>

<div id="player">🧍‍♂️</div>

<div id="target" class="target">🎯</div>

<div id="reward">
<h3>🎁 Reward</h3>
<img id="img">
<div id="off"></div>
<div class="btn" onclick="openLink()">Open</div>
<div class="btn" onclick="closeReward()">Continue</div>
</div>

<script>

let score=0;
let level=1;

let target=document.getElementById("target");

let types=["🎯","💰","📦","❌"];

let products=[
{img:"https://m.media-amazon.com/images/I/61a7voWbxtL._SX522_.jpg",link:"https://amzn.to/3Lb50mc"},
{img:"https://m.media-amazon.com/images/I/71H5JdZJjBL._SX522_.jpg",link:"https://amzn.to/4jpYTqK"}
];

let currentProduct=null;

// move target randomly (not rain)
function moveTarget(){

target.style.top=(20+Math.random()*50)+"%";
target.style.left=(20+Math.random()*60)+"%";

let t=types[Math.floor(Math.random()*types.length)];
target.innerText=t;

}

// click shoot
target.onclick=()=>{

let t=target.innerText;

if(t==="🎯"){
score+=5;
}
else if(t==="💰"){
score+=10;
}
else if(t==="📦"){
showReward();
}
else{
score-=5;
}

updateUI();
moveTarget();

}

// update UI
function updateUI(){

document.getElementById("score").innerText=score;
document.getElementById("level").innerText=level;

// level up
if(score>level*20){
level++;
}

}

// reward
function showReward(){

currentProduct=products[Math.floor(Math.random()*products.length)];

document.getElementById("img").src=currentProduct.img;

let off=[10,15,20,30];
let d=off[Math.floor(Math.random()*off.length)];

document.getElementById("off").innerText="🔥 "+d+"% OFF";

document.getElementById("reward").style.display="block";

}

// open link
function openLink(){
window.open(currentProduct.link);
}

// close reward
function closeReward(){
document.getElementById("reward").style.display="none";
}

// auto move target every 2 sec
setInterval(moveTarget,2000);

</script>

</body>
</html>
