<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sainiwalaa Fly - Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@700&display=swap');

        * { box-sizing: border-box; touch-action: manipulation; user-select: none; }
        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: 'Orbitron', sans-serif; }

        canvas { display: block; background: linear-gradient(to bottom, #2c3e50, #000); }

        /* UI HUD */
        #ui {
            position: fixed; top: 20px; width: 100%; display: flex;
            justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10;
        }
        .stat { color: #fff; font-size: 20px; text-shadow: 2px 2px #000; }
        #score { font-family: 'Black Ops One'; font-size: 40px; color: #ff00cc; }

        /* Game Over / Reward Modal */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center;
            justify-content: center; flex-direction: column; z-index: 100; color: #fff; text-align: center;
        }
        .card {
            background: #111; border: 3px solid #00ffcc; padding: 30px;
            border-radius: 20px; width: 85%; max-width: 350px;
            box-shadow: 0 0 20px #00ffcc;
        }
        .btn-buy {
            background: #ff00cc; color: #fff; padding: 15px; width: 100%;
            border: none; border-radius: 10px; font-weight: bold; margin-top: 15px;
            cursor: pointer; text-decoration: none; display: block;
        }
        .btn-retry { background: #555; margin-top: 10px; color: #fff; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">LVL: <span id="lvl">1</span></div>
    <div id="score">0</div>
    <div class="stat">BEST: <span id="best">0</span></div>
</div>

<div id="modal">
    <div class="card">
        <h1 id="status-title" style="color:#00ffcc">OFFER UNLOCKED!</h1>
        <p>Aapne kamaal ka score kiya!</p>
        <div id="reward-info" style="font-size: 24px; color: gold; margin: 10px 0;">50% OFF</div>
        <a id="buy-link" href="#" target="_blank" class="btn-buy">BUY PRODUCT NOW</a>
        <button class="btn-retry" onclick="resetGame()">TRY AGAIN</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const lvlEl = document.getElementById("lvl");

// Setup Canvas Size
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Game State
let bird = { x: 50, y: canvas.height / 2, w: 40, h: 30, gravity: 0.5, velocity: 0, jump: -8 };
let pipes = [];
let frame = 0;
let score = 0;
let best = localStorage.getItem("saini_best") || 0;
let gameActive = true;
let level = 1;

bestEl.innerText = best;

// Pipe Config
const pipeWidth = 70;
const pipeGap = 180;
const pipeSpeed = 3;

function createPipe() {
    let minHeight = 50;
    let maxHeight = canvas.height - pipeGap - minHeight;
    let height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
    
    pipes.push({
        x: canvas.width,
        top: height,
        bottom: canvas.height - height - pipeGap,
        passed: false,
        color: level % 2 === 0 ? "#ff00cc" : "#00ffcc"
    });
}

function drawBird() {
    // Character (Simplified as a glowing neon box for Sainiwalaa)
    ctx.fillStyle = "#fff";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00ffcc";
    ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
    ctx.shadowBlur = 0;
    
    // Eyes
    ctx.fillStyle = "#000";
    ctx.fillRect(bird.x + 25, bird.y + 5, 5, 5);
}

function drawPipes() {
    pipes.forEach(p => {
        ctx.fillStyle = p.color;
        // Top Pipe
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        // Bottom Pipe
        ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
        
        // Product Label on Pipe
        ctx.fillStyle = "#fff";
        ctx.font = "12px Orbitron";
        ctx.fillText("PRODUCT", p.x + 5, p.top - 10);
    });
}

function update() {
    if (!gameActive) return;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    // Boundary Check
    if (bird.y + bird.h > canvas.height || bird.y < 0) endGame();

    // Pipes Logic
    if (frame % 100 === 0) createPipe();

    pipes.forEach((p, index) => {
        p.x -= pipeSpeed + (level * 0.5);

        // Collision Detection
        if (bird.x < p.x + pipeWidth && bird.x + bird.w > p.x &&
            (bird.y < p.top || bird.y + bird.h > canvas.height - p.bottom)) {
            endGame();
        }

        // Score Logic
        if (!p.passed && bird.x > p.x + pipeWidth) {
            score++;
            p.passed = true;
            scoreEl.innerText = score;
            if (score % 5 === 0) {
                level++;
                lvlEl.innerText = level;
            }
        }

        if (p.x + pipeWidth < 0) pipes.splice(index, 1);
    });

    frame++;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Background City Look (Static simplified)
    ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
    for(let i=0; i<5; i++) {
        ctx.fillRect(i * 200 - (frame % 200), canvas.height - 150, 100, 150);
    }

    drawPipes();
    drawBird();
}

function loop() {
    update();
    draw();
    if (gameActive) requestAnimationFrame(loop);
}

function endGame() {
    gameActive = false;
    if (score > best) {
        best = score;
        localStorage.setItem("saini_best", best);
        bestEl.innerText = best;
    }
    
    document.getElementById("modal").style.display = "flex";
    
    // Rewards logic
    const link = document.getElementById("buy-link");
    const info = document.getElementById("reward-info");
    
    if (score > 10) {
        info.innerText = "70% MEGA OFF";
        link.href = "https://meesho.com/sainiwalaa-special";
    } else {
        info.innerText = "30% WELCOME OFF";
        link.href = "https://amazon.in/sainiwalaa";
    }
}

function resetGame() {
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    level = 1;
    frame = 0;
    scoreEl.innerText = "0";
    lvlEl.innerText = "1";
    gameActive = true;
    document.getElementById("modal").style.display = "none";
    loop();
}

// Controls
window.addEventListener("mousedown", () => { if(gameActive) bird.velocity = bird.jump; });
window.addEventListener("touchstart", (e) => { 
    e.preventDefault();
    if(gameActive) bird.velocity = bird.jump; 
});

loop();
</script>
</body>
</html>
