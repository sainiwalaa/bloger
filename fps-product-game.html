<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwalaa Elite Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { 
            margin: 0; overflow: hidden; 
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Orbitron', sans-serif; cursor: none;
        }

        /* Impact Flash Animation (Sirf Shot par chalega) */
        #flash-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 5;
        }

        /* Modern Game HUD */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; padding: 30px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .top-stats { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .panel {
            background: rgba(0, 255, 204, 0.05);
            border-left: 4px solid #00ffcc;
            padding: 15px 25px; backdrop-filter: blur(10px);
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }

        .mission-panel {
            text-align: center; border-left: none; border-bottom: 4px solid #ff00cc;
            min-width: 300px;
        }

        #aimer {
            position: fixed; width: 40px; height: 40px;
            border: 2px solid #00ffcc; border-radius: 50%;
            pointer-events: none; z-index: 1000; transform: translate(-50%, -50%);
        }
        #aimer::before { content: ''; position: absolute; top:50%; left:50%; width:10px; height:2px; background:#00ffcc; transform:translate(-50%,-50%); }

        /* Level Result Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; flex-direction: column; color: white; z-index: 200;
        }

        .btn {
            background: #ff00cc; color: white; border: none; padding: 15px 40px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 5px;
            margin-top: 20px; transition: 0.3s;
        }
        .btn:hover { background: #00ffcc; color: black; }
    </style>
</head>
<body>

<div id="flash-effect"></div>
<div id="aimer"></div>

<div id="hud">
    <div class="top-stats">
        <div class="panel">
            <span style="font-size: 12px; color: #00ffcc;">CURRENT SCORE</span><br>
            <span id="score" style="font-size: 24px;">0000</span>
        </div>
        <div class="panel mission-panel">
            <span style="font-size: 12px; color: #ff00cc;">ACTIVE MISSION</span><br>
            <div id="mission-targets" style="font-size: 18px; margin-top: 5px;">Wait...</div>
        </div>
        <div class="panel">
            <span style="font-size: 12px; color: #00ffcc;">HIGH SCORE</span><br>
            <span id="high-score" style="font-size: 24px;">0</span>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 style="font-size: 50px; color: #00ffcc;">MISSION SUCCESS!</h1>
    <p id="reward-text" style="font-size: 24px; color: gold;">UNLOCKING 56% DISCOUNT...</p>
    <button class="btn" onclick="nextLevel()">NEXT CHALLENGE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, score = 0, level = 1;
let objects = [], missionTargets = [];
const highScore = localStorage.getItem('sainiwalaa_high') || 0;
document.getElementById('high-score').innerText = highScore;

const TARGET_DATA = {
    BEE: { color: 0xffff00, size: 0.3, speed: 0.4 },
    DOG: { color: 0x00ffcc, size: 0.6, speed: 0.25 },
    ELEPHANT: { color: 0x0088ff, size: 1.1, speed: 0.15 },
    TOY: { color: 0xff00cc, size: 0.5, speed: 0.2 }
};

window.addEventListener('mousemove', (e) => {
    document.getElementById('aimer').style.left = e.clientX + 'px';
    document.getElementById('aimer').style.top = e.clientY + 'px';
});

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    let light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10, 10, 10);
    scene.add(light);

    camera.position.z = 5;

    setupLevel();
    spawnLoop();
    animate();
}

function setupLevel() {
    missionTargets = [];
    const types = Object.keys(TARGET_DATA);
    
    // Level Based Target Logic
    if(level < 3) {
        let t = types[Math.floor(Math.random() * types.length)];
        missionTargets.push({ type: t, goal: 5 + level, current: 0 });
    } else {
        // Advanced Mixed Targets
        missionTargets.push({ type: 'DOG', goal: 4, current: 0 });
        missionTargets.push({ type: 'ELEPHANT', goal: 2, current: 0 });
    }
    updateHUD();
}

function updateHUD() {
    let text = "";
    missionTargets.forEach(t => {
        text += `${t.type}: ${t.current}/${t.goal}  `;
    });
    document.getElementById('mission-targets').innerText = text;
    document.getElementById('score').innerText = score.toString().padStart(4, '0');
}

function createObject() {
    const keys = Object.keys(TARGET_DATA);
    const type = keys[Math.floor(Math.random() * keys.length)];
    const data = TARGET_DATA[type];

    let geo;
    if(type === 'BEE') geo = new THREE.IcosahedronGeometry(data.size);
    else if(type === 'DOG') geo = new THREE.BoxGeometry(data.size, data.size, data.size);
    else if(type === 'ELEPHANT') geo = new THREE.CylinderGeometry(data.size/2, data.size/2, data.size);
    else geo = new THREE.TorusGeometry(0.3, 0.1, 8, 16);

    const mat = new THREE.MeshPhongMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*10, -50);
    mesh.userData = { type: type, speed: data.speed + (level * 0.02) };
    
    scene.add(mesh);
    objects.push(mesh);
}

function spawnLoop() {
    createObject();
    setTimeout(spawnLoop, 900 - (level * 30));
}

function animate() {
    requestAnimationFrame(animate);
    objects.forEach((obj, i) => {
        obj.position.z += obj.userData.speed;
        obj.rotation.x += 0.01;
        if(obj.position.z > 6) {
            scene.remove(obj);
            objects.splice(i, 1);
        }
    });
    renderer.render(scene, camera);
}

window.addEventListener("mousedown", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);

    if(hits.length > 0) {
        let hit = hits[0].object;
        let type = hit.userData.type;

        // Visual Impact Flash (Sirf ek bar click par)
        const flash = document.getElementById('flash-effect');
        flash.style.opacity = '0.3';
        setTimeout(() => flash.style.opacity = '0', 50);

        let mission = missionTargets.find(m => m.type === type);
        if(mission && mission.current < mission.goal) {
            mission.current++;
            score += 100;
            checkLevelComplete();
        } else {
            score = Math.max(0, score - 20);
        }

        if(score > highScore) localStorage.setItem('sainiwalaa_high', score);
        
        updateHUD();
        scene.remove(hit);
        objects.splice(objects.indexOf(hit), 1);
    }
});

function checkLevelComplete() {
    if(missionTargets.every(m => m.current >= m.goal)) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('reward-text').innerText = `OFFER: ${(level * 10) + 20}% OFF ON SAINIWALAA`;
    }
}

function nextLevel() {
    level++;
    document.getElementById('overlay').style.display = 'none';
    setupLevel();
}

init();
</script>
</body>
</html>
