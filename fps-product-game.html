<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwalaa Pro Arcade - Target Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700&display=swap');
        
        body { 
            margin: 0; overflow: hidden; 
            background: #050505; 
            font-family: 'Orbitron', sans-serif; cursor: none;
        }

        /* --- GAME HUD (Score & Levels) --- */
        #game-hud {
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 20px; box-sizing: border-box;
            display: flex; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }

        .stat-box {
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            padding: 10px 20px; border-radius: 8px;
            color: white; min-width: 150px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .label { font-size: 10px; color: #00ffcc; display: block; margin-bottom: 5px; }
        .value { font-size: 24px; font-family: 'Black Ops One'; letter-spacing: 2px; }

        /* --- MISSION PANEL (Target Logic) --- */
        #mission-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 204, 0.1);
            border: 2px solid #ff00cc;
            padding: 15px 30px; border-radius: 12px;
            color: white; text-align: center; z-index: 100;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.4);
        }

        #target-list { font-size: 18px; font-weight: bold; margin-top: 5px; color: #ffcc00; }

        /* --- CROSSHAIR --- */
        #aimer {
            position: fixed; width: 50px; height: 50px;
            border: 2px solid #00ffcc; border-radius: 50%;
            pointer-events: none; z-index: 1000; transform: translate(-50%, -50%);
        }
        #aimer::before { content: ''; position: absolute; top:50%; left:50%; width:15px; height:2px; background:#00ffcc; transform:translate(-50%,-50%); }
        #aimer::after { content: ''; position: absolute; top:50%; left:50%; width:2px; height:15px; background:#00ffcc; transform:translate(-50%,-50%); }

        /* --- WIN OVERLAY --- */
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center;
            justify-content: center; flex-direction: column; color: white; z-index: 200;
        }

        .reward-card {
            background: #222; border: 3px solid gold; padding: 30px;
            border-radius: 20px; text-align: center; box-shadow: 0 0 30px gold;
        }

        button {
            background: #ff00cc; color: white; border: none; padding: 15px 40px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 5px;
            margin-top: 20px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="aimer"></div>

<div id="game-hud">
    <div class="stat-box">
        <span class="label">CURRENT SCORE</span>
        <span class="value" id="score">0000</span>
    </div>
    <div class="stat-box" style="text-align: right;">
        <span class="label">LEVEL</span>
        <span class="value" id="lvl">1</span>
    </div>
</div>

<div id="mission-panel">
    <span class="label" style="color: #ff00cc;">ACTIVE MISSION</span>
    <div id="target-list">Loading Targets...</div>
</div>

<div id="win-overlay">
    <div class="reward-card">
        <h1 style="color: #00ffcc;">MISSION SUCCESS!</h1>
        <p>Aapne target pura kiya.</p>
        <h2 id="reward-text" style="color: gold; font-size: 32px;">56% OFF</h2>
        <button onclick="nextLevel()">START NEXT LEVEL</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, score = 0, level = 1;
let objects = [], missionTargets = [];
let highScore = localStorage.getItem('saini_high') || 0;

// Target Designs & Metadata
const TARGET_TYPES = {
    BEE: { color: 0xffff00, size: 0.3, points: 50 },
    DOG: { color: 0x00ffcc, size: 0.6, points: 100 },
    ELEPHANT: { color: 0x0088ff, size: 1.2, points: 200 },
    TOY: { color: 0xff00cc, size: 0.5, points: 80 }
};

window.addEventListener('mousemove', (e) => {
    const aimer = document.getElementById('aimer');
    aimer.style.left = e.clientX + 'px';
    aimer.style.top = e.clientY + 'px';
});

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10, 10, 10);
    scene.add(light);

    camera.position.z = 5;

    startLevel();
    spawnLoop();
    animate();
}

function startLevel() {
    missionTargets = [];
    const keys = Object.keys(TARGET_TYPES);
    
    // Mission Logic: Level ke hisab se targets badalte hain
    if(level === 1) {
        missionTargets.push({ type: 'BEE', goal: 5, current: 0 });
    } else if(level === 2) {
        missionTargets.push({ type: 'DOG', goal: 6, current: 0 });
    } else {
        // Mixed Targets for higher levels
        missionTargets.push({ type: 'DOG', goal: 4, current: 0 });
        missionTargets.push({ type: 'ELEPHANT', goal: 2, current: 0 });
    }
    updateHUD();
}

function updateHUD() {
    document.getElementById('score').innerText = score.toString().padStart(4, '0');
    document.getElementById('lvl').innerText = level;
    
    let targetHtml = "";
    missionTargets.forEach(m => {
        targetHtml += `${m.type}: ${m.current}/${m.goal} &nbsp;&nbsp;`;
    });
    document.getElementById('target-list').innerHTML = targetHtml;
}

function createObject() {
    const keys = Object.keys(TARGET_TYPES);
    const type = keys[Math.floor(Math.random() * keys.length)];
    const data = TARGET_TYPES[type];

    let geo;
    if(type === 'BEE') geo = new THREE.IcosahedronGeometry(data.size);
    else if(type === 'DOG') geo = new THREE.BoxGeometry(data.size, data.size, data.size);
    else if(type === 'ELEPHANT') geo = new THREE.CylinderGeometry(data.size/2, data.size/2, data.size);
    else geo = new THREE.TorusGeometry(0.3, 0.1, 8, 16);

    const mat = new THREE.MeshPhongMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set((Math.random()-0.5)*18, (Math.random()-0.5)*12, -50);
    mesh.userData = { type: type, speed: 0.2 + (level * 0.03) };
    
    scene.add(mesh);
    objects.push(mesh);
}

function spawnLoop() {
    createObject();
    setTimeout(spawnLoop, 1000 - (level * 50));
}

function animate() {
    requestAnimationFrame(animate);
    objects.forEach((obj, i) => {
        obj.position.z += obj.userData.speed;
        obj.rotation.x += 0.02;
        if(obj.position.z > 6) {
            scene.remove(obj);
            objects.splice(i, 1);
        }
    });
    renderer.render(scene, camera);
}

window.addEventListener("mousedown", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);

    if(hits.length > 0) {
        let hit = hits[0].object;
        let type = hit.userData.type;

        let mission = missionTargets.find(m => m.type === type);
        if(mission && mission.current < mission.goal) {
            mission.current++;
            score += TARGET_TYPES[type].points;
            checkWin();
        } else {
            score = Math.max(0, score - 20); // Penalty for wrong hit
        }

        updateHUD();
        scene.remove(hit);
        objects.splice(objects.indexOf(hit), 1);
    }
});

function checkWin() {
    if(missionTargets.every(m => m.current >= m.goal)) {
        document.getElementById('win-overlay').style.display = 'flex';
        document.getElementById('reward-text').innerText = (level * 10 + 30) + "% OFF ON ALL ITEMS";
    }
}

function nextLevel() {
    level++;
    document.getElementById('win-overlay').style.display = 'none';
    startLevel();
}

init();
</script>
</body>
</html>
