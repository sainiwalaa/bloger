<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loader Rush</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(#020024,#090979,#00d4ff);
}

/* moving background */
.bg{
position:absolute;
width:200%;
height:100%;
background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
animation:moveBg 5s linear infinite;
}

@keyframes moveBg{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
z-index:10;
}

/* player */
#player{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:50px;
z-index:10;
}

/* targets */
.item{
position:absolute;
font-size:40px;
cursor:pointer;
transition:0.2s;
}

.item:active{
transform:scale(0.8);
}

/* reward popup */
#reward{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
display:none;
z-index:20;
text-align:center;
color:white;
}

.btn{
margin-top:10px;
padding:10px;
background:#ffd000;
color:black;
border-radius:10px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="bg"></div>

<div id="hud">Score: 0 | Load: 0/10</div>

<div id="player">🚚</div>

<div id="reward">
<h3>🔥 Offer Attack</h3>
<p>20% OFF — distract or ignore?</p>
<div class="btn" onclick="closeReward()">Ignore</div>
</div>

<script>

let score=0;
let load=0;

// types
let types=["📦","🎁","❌"];

function spawn(){

let el=document.createElement("div");
el.className="item";

let type=types[Math.floor(Math.random()*types.length)];
el.innerText=type;

el.style.left=Math.random()*90+"vw";
el.style.top="10%";

document.body.appendChild(el);

// move toward player
let pos=10;

let move=setInterval(()=>{

pos+=2;
el.style.top=pos+"%";

if(pos>90){
el.remove();
clearInterval(move);
}

},50);

// click logic
el.onclick=()=>{

if(type==="📦"){
score+=5;
load++;
}

else if(type==="🎁"){
score-=3;
showOffer();
}

else{
score-=5;
}

update();
el.remove();
clearInterval(move);

};

}

function update(){

document.getElementById("hud").innerText=
"Score: "+score+" | Load: "+load+"/10";

// level complete
if(load>=10){
alert("🚚 Load Complete!");
load=0;
}

}

// offer popup
function showOffer(){
document.getElementById("reward").style.display="block";
}

function closeReward(){
document.getElementById("reward").style.display="none";
}

// spawn loop
setInterval(spawn,1200);

</script>

</body>
</html>
