<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <title>Sainiwalaa - Free Satellite Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body { margin: 0; padding: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Game HUD */
        #game-ui {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0,0,0,0.8); border: 2px solid #00ffcc;
            color: #fff; padding: 12px; border-radius: 15px; z-index: 100;
            text-align: center; box-shadow: 0 0 15px #00ffcc;
        }
        #dist-val { font-size: 28px; color: gold; display: block; margin: 2px 0; }

        /* Reward Modal */
        #reward-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center;
            justify-content: center; z-index: 1000; color: white; text-align: center; padding: 20px;
        }
        .modal-card {
            border: 3px solid #ff00cc; padding: 20px; border-radius: 20px;
            background: #111; width: 100%; max-width: 350px;
        }
        .product-img { width: 150px; height: 150px; border-radius: 10px; border: 2px solid gold; margin: 10px 0; }
        .btn-buy {
            background: #00ffcc; color: #000; padding: 12px; width: 100%;
            border: none; border-radius: 8px; font-weight: bold; display: block;
            text-decoration: none; margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="game-ui">
    <div style="font-size: 10px; color: #00ffcc;">MISSION: TARGET REACH KARO</div>
    <span id="dist-val">LOADING...</span>
    <div style="font-size: 10px;">Road par chalna shuru karein!</div>
</div>

<div id="reward-modal">
    <div class="modal-card">
        <h1 style="color: gold; margin: 0;">54% DISCOUNT!</h1>
        <p style="font-size: 12px;">Sainiwalaa Premium Item Unlocked</p>
        
        <img src="https://via.placeholder.com/150" id="p-img" class="product-img">
        
        <div style="border: 2px dashed #ff00cc; padding: 10px; margin: 10px 0; color: #ff00cc;">CODE: SAINI54</div>
        
        <a id="p-link" href="https://wa.me/YOURNUMBER" target="_blank" class="btn-buy">BUY NOW (WhatsApp)</a>
        <button onclick="copyLink()" style="background:none; border:none; color: #888; margin-top:10px; cursor:pointer;">Copy Product Link</button>
        <button onclick="location.reload()" style="display:block; width:100%; margin-top:15px; background:#333; color:white; border:none; padding:8px; border-radius:5px;">NEXT TARGET</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, userMarker, targetMarker;
    let targetLat, targetLon;
    let isFirstLoad = true;

    // 1. Initialize Map
    function initMap() {
        // Map create (Default Jaipur)
        map = L.map('map', { zoomControl: false, dragging: false }).setView([26.9124, 75.7873], 18);

        // 2. Satellite View Layer (NO TOKEN NEEDED)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Satellite Imagery © Esri'
        }).addTo(map);

        // 3. Labels Layer (Road names dikhane ke liye)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

        // 4. Character (Emoji as a Icon)
        const deliveryIcon = L.divIcon({
            html: '<div style="font-size: 40px; margin-top: -20px; margin-left: -10px;">🚚</div>',
            className: 'dummy'
        });
        userMarker = L.marker([0,0], { icon: deliveryIcon }).addTo(map);

        // 5. Target (Gift Box)
        const giftIcon = L.divIcon({
            html: '<div style="font-size: 35px; margin-top: -20px; margin-left: -10px;">🎁</div>',
            className: 'dummy'
        });
        targetMarker = L.marker([0,0], { icon: giftIcon }).addTo(map);

        startGPS();
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                
                // Update Character position
                userMarker.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]); // Map character ke saath move hoga

                if(isFirstLoad) {
                    // Pehla target user se 60m door set karna
                    targetLat = latitude + 0.0005; 
                    targetLon = longitude + 0.0005;
                    targetMarker.setLatLng([targetLat, targetLon]);
                    isFirstLoad = false;
                }

                // Distance calculation
                const d = getDist(latitude, longitude, targetLat, targetLon);
                document.getElementById('dist-val').innerText = Math.round(d) + " METERS";

                // Target reached (15 meters distance)
                if(d < 15) {
                    document.getElementById('reward-modal').style.display = 'flex';
                }

            }, err => alert("Please Enable GPS!"), { enableHighAccuracy: true });
        }
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function copyLink() {
        const link = document.getElementById('p-link').href;
        navigator.clipboard.writeText(link).then(() => alert("Link Copied!"));
    }

    initMap();
</script>
</body>
</html>
