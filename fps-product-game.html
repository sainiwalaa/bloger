<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwalaa Universe - Mission Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        /* Modern Gaming Interface */
        #ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        
        .top-bar {
            display: flex; justify-content: space-between; padding: 20px;
            background: rgba(0,0,0,0.5); border-bottom: 2px solid #00ffcc;
        }

        .mission-panel {
            background: rgba(0, 255, 204, 0.1); padding: 15px;
            border-radius: 10px; border: 1px solid #00ffcc;
            text-align: center; min-width: 250px;
        }

        #target-display { font-size: 22px; color: #ffcc00; font-weight: bold; }
        #counter { font-size: 30px; color: #fff; }

        /* Reticle / Aim */
        #reticle {
            position: fixed; width: 50px; height: 50px;
            border: 2px solid #00ffcc; border-radius: 50%;
            pointer-events: none; z-index: 1000; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00ffcc;
        }

        /* Result Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; flex-direction: column; color: white; z-index: 200;
        }
        
        button {
            padding: 10px 30px; font-family: 'Orbitron'; background: #00ffcc;
            border: none; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="reticle"></div>

<div id="ui">
    <div class="top-bar">
        <div>SCORE: <span id="score">0</span></div>
        <div class="mission-panel">
            <div id="world-tag" style="font-size: 10px; color: #00ffcc;">CYBER WORLD</div>
            <div id="target-display">TARGET: BALL</div>
            <div id="counter">0 / 10</div>
        </div>
        <div>LEVEL: <span id="lvl">1</span></div>
    </div>
</div>

<div id="overlay">
    <h1 id="overlay-title">MISSION COMPLETE!</h1>
    <h2 id="reward-text" style="color: gold;">56% OFF UNLOCKED</h2>
    <p>Aapne target poora kiya!</p>
    <button onclick="nextLevel()">NEXT WORLD >></button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, score = 0, level = 1, currentWorld = 0;
let objects = [], mission = { type: 'BALL', count: 0, target: 10 };

const worldThemes = [
    { name: "CYBER NEON", color: 0x00ffcc, fog: 0x000505 },
    { name: "GALAXY VOID", color: 0xff00cc, fog: 0x000011 },
    { name: "DESERT STORM", color: 0xffcc00, fog: 0x110500 }
];

const targetTypes = ['BALL', 'STAR', 'KITE'];

window.addEventListener('mousemove', (e) => {
    document.getElementById('reticle').style.left = e.clientX + 'px';
    document.getElementById('reticle').style.top = e.clientY + 'px';
});

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.position.z = 5;
    
    setupWorld();
    setupMission();
    spawnLoop();
    animate();
}

function setupWorld() {
    let theme = worldThemes[currentWorld];
    scene.background = new THREE.Color(theme.fog);
    scene.fog = new THREE.FogExp2(theme.fog, 0.05);
    document.getElementById('world-tag').innerText = theme.name;
    
    // Clear old lights and add new ones
    scene.children = scene.children.filter(c => !(c instanceof THREE.Light));
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    let pl = new THREE.PointLight(theme.color, 2, 50);
    pl.position.set(0, 0, 5);
    scene.add(pl);
}

function setupMission() {
    mission.type = targetTypes[Math.floor(Math.random() * 3)];
    mission.target = 5 + (level * 2);
    mission.count = 0;
    
    document.getElementById('target-display').innerText = "TARGET: " + mission.type;
    document.getElementById('counter').innerText = `0 / ${mission.target}`;
}

function createObject() {
    const type = targetTypes[Math.floor(Math.random() * 3)];
    let geo;
    
    if(type === 'BALL') geo = new THREE.SphereGeometry(0.5, 20, 20);
    else if(type === 'STAR') geo = new THREE.IcosahedronGeometry(0.6, 0);
    else if(type === 'KITE') geo = new THREE.TorusGeometry(0.4, 0.15, 8, 20);

    const mat = new THREE.MeshPhongMaterial({ 
        color: type === mission.type ? 0x00ffcc : 0xff3300,
        emissive: type === mission.type ? 0x00ffcc : 0x000000,
        emissiveIntensity: 0.5
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*10, -50);
    mesh.userData = { type: type };
    
    scene.add(mesh);
    objects.push(mesh);
}

function spawnLoop() {
    createObject();
    setTimeout(spawnLoop, 800 - (level * 40));
}

function animate() {
    requestAnimationFrame(animate);
    objects.forEach((obj, i) => {
        obj.position.z += 0.2 + (level * 0.03);
        obj.rotation.y += 0.02;
        if(obj.position.z > 6) {
            scene.remove(obj);
            objects.splice(i, 1);
        }
    });
    renderer.render(scene, camera);
}

window.addEventListener("mousedown", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);

    if(hits.length > 0) {
        let hit = hits[0].object;
        if(hit.userData.type === mission.type) {
            mission.count++;
            score += 100;
            document.getElementById('counter').innerText = `${mission.count} / ${mission.target}`;
            if(mission.count >= mission.target) {
                showResult();
            }
        } else {
            score = Math.max(0, score - 50);
            document.body.style.background = "red";
            setTimeout(() => document.body.style.background = "#000", 50);
        }
        document.getElementById('score').innerText = score;
        scene.remove(hit);
        objects.splice(objects.indexOf(hit), 1);
    }
});

function showResult() {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('reward-text').innerText = (level * 12 + 30) + "% OFF ON PRODUCTS";
}

function nextLevel() {
    level++;
    currentWorld = (currentWorld + 1) % worldThemes.length;
    document.getElementById('lvl').innerText = level;
    document.getElementById('overlay').style.display = 'none';
    setupWorld();
    setupMission();
}

init();
</script>
</body>
</html>
