<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Racing Shooter Reward</title>

<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:sans-serif;}

#hud{
position:fixed;top:10px;left:10px;z-index:10;
}

#crosshair{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:30px;z-index:10;
}

#reward{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
display:none;
z-index:20;
text-align:center;
}

#reward img{width:120px;}

.btn{
margin-top:10px;
padding:10px;
background:#ffd000;
color:black;
cursor:pointer;
border-radius:10px;
}

</style>
</head>
<body>

<div id="hud">
Score: <span id="score">0</span>
</div>

<div id="crosshair">+</div>

<div id="reward">
<h2>🎁 Reward Unlocked</h2>
<img id="rewardImg">
<div id="offer"></div>
<div class="btn" onclick="copyLink()">Copy Link</div>
<div class="btn" onclick="openLink()">Open Product</div>
</div>

<audio id="shoot" src="https://www.soundjay.com/mechanical/sounds/gunshot-01.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z=5;

let score=0;
let targets=[];

let products=[
{img:"https://m.media-amazon.com/images/I/61a7voWbxtL._SX522_.jpg",link:"https://amzn.to/3Lb50mc"},
{img:"https://m.media-amazon.com/images/I/71H5JdZJjBL._SX522_.jpg",link:"https://amzn.to/4jpYTqK"}
];

let currentReward=null;

// CREATE TARGET
function createTarget(){

let icons=["🔥","💰","📦","🎁"];

let canvas=document.createElement("canvas");
canvas.width=256;
canvas.height=256;
let ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.font="150px Arial";
ctx.fillText(icons[Math.floor(Math.random()*icons.length)],50,180);

let texture=new THREE.CanvasTexture(canvas);

let geo=new THREE.PlaneGeometry(2,2);
let mat=new THREE.MeshBasicMaterial({map:texture,transparent:true});

let obj=new THREE.Mesh(geo,mat);

obj.position.x=(Math.random()-0.5)*6;
obj.position.y=(Math.random()-0.5)*4;
obj.position.z=-10;

scene.add(obj);
targets.push(obj);
}

for(let i=0;i<5;i++) createTarget();

// ANIMATE
function animate(){
requestAnimationFrame(animate);

targets.forEach(t=>{
t.position.z+=0.2;

if(t.position.z>5){
scene.remove(t);
targets.splice(targets.indexOf(t),1);
createTarget();
}
});

renderer.render(scene,camera);
}

animate();

// SHOOT
window.addEventListener("click",(e)=>{

document.getElementById("shoot").play();

let mouse=new THREE.Vector2(
(e.clientX/window.innerWidth)*2-1,
-(e.clientY/window.innerHeight)*2+1
);

let ray=new THREE.Raycaster();
ray.setFromCamera(mouse,camera);

let hits=ray.intersectObjects(targets);

if(hits.length>0){

let hit=hits[0].object;

scene.remove(hit);
targets.splice(targets.indexOf(hit),1);
createTarget();

score++;
document.getElementById("score").innerText=score;

// REWARD EVERY 5 SCORE
if(score%5===0){
showReward();
}

}
});

// SHOW REWARD
function showReward(){

currentReward=products[Math.floor(Math.random()*products.length)];

document.getElementById("rewardImg").src=currentReward.img;

let off=[10,15,20,25];
let discount=off[Math.floor(Math.random()*off.length)];

document.getElementById("offer").innerText="🔥 "+discount+"% OFF";

document.getElementById("reward").style.display="block";
}

// COPY LINK
function copyLink(){
navigator.clipboard.writeText(currentReward.link);
alert("Link Copied!");
}

// OPEN LINK
function openLink(){
window.open(currentReward.link);
}

</script>

</body>
</html>
