<!DOCTYPE html>
<html>
<head>
    <title>Sainiwalaa GPS Tracker</title>
    <style>
        body { background: #000; color: #0ff; font-family: sans-serif; text-align: center; }
        #status { font-size: 20px; margin-top: 50px; border: 2px solid #f0f; padding: 20px; }
    </style>
</head>
<body>
    <h1>Sainiwalaa Real-World Test</h1>
    <div id="status">Location dhund raha hoon...</div>
    <p>Bahar nikal kar thoda chalein, coordinates badlenge!</p>

    <script>
        const status = document.getElementById('status');

        if (navigator.geolocation) {
            // User ki movement ko track karna
            navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                status.innerHTML = `Latitude: ${lat.toFixed(6)}<br>Longitude: ${lon.toFixed(6)}<br><br><b>Aap chal rahe ho!</b>`;
            }, error => {
                status.innerHTML = "Error: Permission deni hogi bhai!";
            }, { enableHighAccuracy: true });
        } else {
            status.innerHTML = "Aapka browser purana hai.";
        }
    </script>
</body>
</html>
