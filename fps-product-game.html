<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwalaa Mega Toy Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Orbitron:wght@400;900&display=swap');
        
        body { 
            margin: 0; overflow: hidden; 
            background: linear-gradient(45deg, #ff00cc, #333, #00ffcc); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Fredoka One', cursive; cursor: none;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        /* Modern UI */
        #game-interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .stat-bar {
            display: flex; justify-content: space-around; padding: 20px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            border-bottom: 4px solid #fff; color: white; text-shadow: 2px 2px 5px #000;
        }

        .mission-box {
            background: white; color: #ff00cc; padding: 10px 30px;
            border-radius: 50px; border: 5px solid #ff00cc; font-size: 20px;
            box-shadow: 0 10px 0 #b30086; transform: translateY(-5px);
        }

        #aimer {
            position: fixed; width: 60px; height: 60px;
            border: 4px solid white; border-radius: 50%;
            pointer-events: none; z-index: 1000; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.2);
        }

        #reward-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center;
            justify-content: center; flex-direction: column; color: white; z-index: 200;
        }

        .btn {
            padding: 15px 40px; font-size: 24px; background: #00ffcc;
            border: none; border-radius: 50px; cursor: pointer; color: #000;
            font-family: 'Fredoka One'; margin-top: 20px; box-shadow: 0 8px 0 #00997a;
        }
    </style>
</head>
<body>

<div id="aimer"></div>

<div id="game-interface">
    <div class="stat-bar">
        <div>SCORE: <span id="score">0</span><br><small>HIGH: <span id="high-score">0</span></small></div>
        <div class="mission-box" id="mission-ui">TARGET: Loading...</div>
        <div>LEVEL: <span id="lvl">1</span></div>
    </div>
</div>

<div id="reward-screen">
    <h1 id="res-title" style="font-size: 60px; color: #ffcc00;">AMAZING!</h1>
    <h2 id="reward-desc">REWARD UNLOCKED</h2>
    <div id="reward-value" style="font-size: 40px; color: #00ffcc;">56% OFF</div>
    <button class="btn" onclick="nextLevel()">START NEXT CHALLENGE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, score = 0, level = 1;
let objects = [], mission = { targets: [] };
const highscore = localStorage.getItem('saini_highscore') || 0;
document.getElementById('high-score').innerText = highscore;

// Target Designs
const TARGET_TYPES = {
    BEE: { color: 0xffff00, size: 0.3, speed: 0.5 },
    DOG: { color: 0x964B00, size: 0.6, speed: 0.3 },
    ELEPHANT: { color: 0x808080, size: 1.2, speed: 0.15 },
    TOY: { color: 0x00ffcc, size: 0.5, speed: 0.25 }
};

window.addEventListener('mousemove', (e) => {
    document.getElementById('aimer').style.left = e.clientX + 'px';
    document.getElementById('aimer').style.top = e.clientY + 'px';
});

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    camera.position.z = 5;

    setupLevelMission();
    spawnLoop();
    animate();
}

function setupLevelMission() {
    mission.targets = [];
    const available = Object.keys(TARGET_TYPES);
    
    if(level <= 2) {
        // Simple Single Target
        let t = available[Math.floor(Math.random()*available.length)];
        mission.targets.push({ type: t, goal: 5 + level, current: 0 });
    } else {
        // Combo Mission (Level 3+)
        mission.targets.push({ type: 'DOG', goal: 3 + level, current: 0 });
        mission.targets.push({ type: 'ELEPHANT', goal: 2, current: 0 });
    }
    updateMissionUI();
}

function updateMissionUI() {
    let text = "TARGET: ";
    mission.targets.forEach(t => {
        text += `${t.type} (${t.current}/${t.goal}) `;
    });
    document.getElementById('mission-ui').innerText = text;
}

function createObject() {
    const keys = Object.keys(TARGET_TYPES);
    const typeKey = keys[Math.floor(Math.random() * keys.length)];
    const data = TARGET_TYPES[typeKey];

    let geo;
    if(typeKey === 'BEE') geo = new THREE.SphereGeometry(data.size, 8, 8);
    else if(typeKey === 'DOG') geo = new THREE.BoxGeometry(data.size, data.size, data.size);
    else if(typeKey === 'ELEPHANT') geo = new THREE.CapsuleGeometry(data.size/2, data.size/2, 4, 8);
    else geo = new THREE.TorusKnotGeometry(0.3, 0.1, 32, 8);

    const mat = new THREE.MeshPhongMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set((Math.random()-0.5)*15, (Math.random()-0.5)*10, -50);
    mesh.userData = { type: typeKey, speed: data.speed + (level * 0.02) };
    
    scene.add(mesh);
    objects.push(mesh);
}

function spawnLoop() {
    createObject();
    setTimeout(spawnLoop, 800 - (level * 30));
}

function animate() {
    requestAnimationFrame(animate);
    objects.forEach((obj, i) => {
        obj.position.z += obj.userData.speed;
        obj.rotation.x += 0.02;
        if(obj.position.z > 6) {
            scene.remove(obj);
            objects.splice(i, 1);
        }
    });
    renderer.render(scene, camera);
}

window.addEventListener("mousedown", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);

    if(hits.length > 0) {
        let hit = hits[0].object;
        let hitType = hit.userData.type;

        let missionPart = mission.targets.find(t => t.type === hitType);
        
        if(missionPart && missionPart.current < missionPart.goal) {
            missionPart.current++;
            score += 150;
            checkMissionComplete();
        } else {
            score = Math.max(0, score - 50);
        }
        
        // Save Score
        if(score > highscore) {
            localStorage.setItem('saini_highscore', score);
            document.getElementById('high-score').innerText = score;
        }

        document.getElementById('score').innerText = score;
        updateMissionUI();
        scene.remove(hit);
        objects.splice(objects.indexOf(hit), 1);
    }
});

function checkMissionComplete() {
    let allDone = mission.targets.every(t => t.current >= t.goal);
    if(allDone) {
        document.getElementById('reward-screen').style.display = 'flex';
        let rewards = ["70% Mega Deal", "BOGO Offer", "56% Sainiwalaa Special", "Flat ₹500 OFF"];
        document.getElementById('reward-value').innerText = rewards[level % rewards.length];
    }
}

function nextLevel() {
    level++;
    document.getElementById('lvl').innerText = level;
    document.getElementById('reward-screen').style.display = 'none';
    setupLevelMission();
}

init();
</script>
</body>
</html>
