<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn From Home</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:25px;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
}

.header h1{
margin:0;
font-size:clamp(20px,5vw,32px);
}

.header p{
opacity:0.9;
}

/* CONTAINER */
.container{
max-width:500px;
margin:auto;
padding:15px;
}

/* VIDEO */
.video-box iframe{
width:100%;
height:220px;
border-radius:12px;
pointer-events:none;
}

/* ANIMATION TEXT */
.animated-text{
text-align:center;
font-size:18px;
margin:15px 0;
height:25px;
overflow:hidden;
}

.animated-text span{
display:block;
animation:slide 6s infinite;
}

@keyframes slide{
0%{transform:translateY(0)}
25%{transform:translateY(-25px)}
50%{transform:translateY(-50px)}
75%{transform:translateY(-75px)}
100%{transform:translateY(0)}
}

/* CARD */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

/* FORM */
input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:15px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

/* QR */
img{
width:180px;
margin-top:15px;
border-radius:10px;
}

/* RESPONSIVE */
@media(min-width:768px){
.container{
max-width:600px;
}
.video-box iframe{
height:300px;
}
}

</style>
</head>

<body>

<div class="header">
<h1>💸 Work From Home</h1>
<p>Ghar baithe earning start karo</p>
</div>

<div class="container">

<!-- VIDEO -->
<div class="video-box">
<iframe src="https://www.youtube.com/embed/oPN3WurQ3iw"></iframe>
</div>

<!-- ANIMATED TEXT -->
<div class="animated-text">
<span>
💰 Daily Income Opportunity<br>
📱 Mobile Se Kaam<br>
🚀 Fast Growing System<br>
👥 Referral Se Extra Income
</span>
</div>

<!-- INFO -->
<div class="card">
<b>🔥 Simple & Easy Process</b>
<p>Sirf form fill karo aur turant start karo. Ye ek fast earning system hai jisme aap ghar baithe kaam kar sakte ho.</p>
</div>

<!-- FORM -->
<h3>Join Now</h3>

<form id="form">
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Mobile Number" required>
<input type="text" placeholder="Address" required>

<button type="submit">Start Earning</button>
</form>

<div id="qrBox"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby0KZNDqPrrkLrAe867r1euXdihIZMmiZX1rquBpwtaBYwZoxHYPvUXpBmhez9msPPieQ/exec";

// REFERRAL
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref") || "Direct";

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

let name = this[0].value;
let mobile = this[1].value;
let address = this[2].value;

let res = await fetch(scriptURL,{
method:"POST",
body: JSON.stringify({
name:name,
mobile:mobile,
address:address,
referral:ref
})
});

let data = await res.json();

// QR SHOW
document.getElementById("qrBox").innerHTML = `
<h3>💳 Scan & Pay</h3>
<img src="${data.qr}">
<p>Payment karke screenshot save kare</p>
`;

this.reset();

});

</script>

</body>
</html>
