<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn From Home</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#9333ea);
color:white;
}

/* CONTAINER */
.container{
max-width:500px;
margin:auto;
padding:15px;
}

/* HEADER */
.header{
text-align:center;
padding:25px;
}

.header h1{
font-size:clamp(22px,5vw,32px);
margin:0;
}

.header p{
opacity:0.9;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* VIDEO FRAME */
.video-frame{
position:relative;
border-radius:15px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.2);
}

.video-frame iframe{
width:100%;
height:220px;
pointer-events:none;
}

/* PLAY BUTTON */
.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
background:rgba(0,0,0,0.6);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.play-btn:after{
content:"▶";
font-size:28px;
color:white;
}

/* TEXT ANIMATION */
.text-anim{
text-align:center;
height:25px;
overflow:hidden;
margin:10px 0;
}

.text-anim span{
display:block;
animation:slide 6s infinite;
}

@keyframes slide{
0%{transform:translateY(0)}
25%{transform:translateY(-25px)}
50%{transform:translateY(-50px)}
75%{transform:translateY(-75px)}
100%{transform:translateY(0)}
}

/* FORM */
input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:15px;
}

input{
background:#0f172a;
color:white;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
}

/* QR */
img{
width:180px;
margin-top:15px;
border-radius:10px;
}

/* RESPONSIVE */
@media(min-width:768px){
.video-frame iframe{
height:300px;
}
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<h1>💸 Work From Home</h1>
<p>Start earning from your mobile today</p>
</div>

<!-- VIDEO -->
<div class="card">
<div class="video-frame">
<iframe id="video" src="https://www.youtube.com/embed/oPN3WurQ3iw?enablejsapi=1"></iframe>
<div class="play-btn" onclick="playVideo()"></div>
</div>
</div>

<!-- ANIMATED TEXT -->
<div class="card text-anim">
<span>
💰 Daily Income<br>
📱 Mobile Work<br>
🚀 Fast Growth<br>
👥 Referral Income
</span>
</div>

<!-- INFO -->
<div class="card">
<b>🔥 Easy Earning System</b>
<p>Ghar baithe simple process se earning start karo. Koi experience ki jarurat nahi hai. Mobile se kaam karo aur apni income badhao.</p>
</div>

<!-- FORM -->
<div class="card">
<h3>Join Now</h3>

<form id="form">
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Mobile Number" required>
<input type="text" placeholder="Address" required>

<button type="submit">Start Earning</button>
</form>

<div id="qrBox"></div>
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby0KZNDqPrrkLrAe867r1euXdihIZMmiZX1rquBpwtaBYwZoxHYPvUXpBmhez9msPPieQ/exec";

// REFERRAL
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref") || "Direct";

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

let name = this[0].value;
let mobile = this[1].value;
let address = this[2].value;

let res = await fetch(scriptURL,{
method:"POST",
body: JSON.stringify({
name:name,
mobile:mobile,
address:address,
referral:ref
})
});

let data = await res.json();

// QR SHOW
document.getElementById("qrBox").innerHTML = `
<h3>💳 Scan & Pay</h3>
<img src="${data.qr}">
<p>Payment karke screenshot save kare</p>
`;

this.reset();

});

// VIDEO PLAY
function playVideo(){
let iframe = document.getElementById("video");
iframe.style.pointerEvents="auto";
iframe.src += "&autoplay=1";
document.querySelector(".play-btn").style.display="none";
}

</script>

</body>
</html>
