<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwalaa Balanced Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        /* Balanced HUD */
        #hud {
            position: fixed; top: 20px; left: 20px;
            color: white; z-index: 10; display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(0, 255, 204, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.4);
            min-width: 200px;
        }
        #rush-timer { 
            color: #ff3300; font-size: 24px; font-weight: bold; 
            display: none; /* Only shows during Rush Mode */
            text-shadow: 0 0 10px red;
        }
        
        /* Reward Center */
        .overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(10, 10, 10, 0.95); border: 3px solid #00ffcc;
            padding: 40px; border-radius: 20px; text-align: center; color: white;
            z-index: 100; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .overlay.active { transform: translate(-50%, -50%) scale(1); }

        /* Aiming Circle */
        #aimer {
            position: fixed; width: 50px; height: 50px;
            border: 2px solid #00ffcc; border-radius: 50%;
            pointer-events: none; z-index: 1000; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00ffcc;
        }
        button {
            background: #00ffcc; color: #000; border: none; padding: 12px 25px;
            font-family: 'Orbitron'; font-weight: bold; border-radius: 5px; cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="aimer"></div>

<div id="hud">
    <div class="glass-panel">
        <div id="mission-info" style="color: #ffcc00; font-size: 14px;">MISSION: COLLECT TARGETS</div>
        <div style="font-size: 24px;"><span id="curr">0</span> / <span id="total">10</span></div>
        <div id="rush-timer">RUSH: <span id="time-left">60</span>s</div>
    </div>
    <div class="glass-panel">
        SCORE: <span id="score">0</span> | LEVEL: <span id="lvl">1</span>
    </div>
</div>

<div id="reward-box" class="overlay">
    <h1 id="res-title" style="color: #00ffcc;">DEAL UNLOCKED!</h1>
    <h2 id="deal-name">56% OFF ON PRODUCTS</h2>
    <p>Aapne target successfully pura kiya.</p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, score = 0, level = 1, speed = 0.2; // Slow & Steady speed
let objects = [], mission = { type: 'BALL', target: 5, count: 0, isRush: false };
let timerInterval;

const types = ['BALL', 'STAR', 'KITE'];

window.addEventListener('mousemove', (e) => {
    document.getElementById('aimer').style.left = e.clientX + 'px';
    document.getElementById('aimer').style.top = e.clientY + 'px';
});

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.04);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const pointLight = new THREE.PointLight(0x00ffcc, 1);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    camera.position.z = 5;

    startNewMission();
    spawnLoop();
    animate();
}

function startNewMission() {
    mission.type = types[Math.floor(Math.random() * types.length)];
    mission.target = 5 + (level * 2);
    mission.count = 0;
    
    // 30% Chance to trigger RUSH MODE
    mission.isRush = Math.random() < 0.3; 
    
    const timerDisplay = document.getElementById('rush-timer');
    if(mission.isRush) {
        timerDisplay.style.display = 'block';
        startRushTimer(45); // 45 seconds for rush
        document.getElementById('mission-info').innerText = "⚡ RUSH MISSION: " + mission.type;
    } else {
        timerDisplay.style.display = 'none';
        document.getElementById('mission-info').innerText = "TARGET: " + mission.type;
        clearInterval(timerInterval);
    }
    
    updateUI();
}

function startRushTimer(seconds) {
    let timeLeft = seconds;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('time-left').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            if(mission.count < mission.target) {
                alert("Rush Mission Failed! Level Restarting...");
                resetMission();
            }
        }
    }, 1000);
}

function updateUI() {
    document.getElementById('curr').innerText = mission.count;
    document.getElementById('total').innerText = mission.target;
    document.getElementById('score').innerText = score;
    document.getElementById('lvl').innerText = level;
}

function spawnObject() {
    const type = types[Math.floor(Math.random() * types.length)];
    let geo;
    if(type === 'BALL') geo = new THREE.SphereGeometry(0.5, 24, 24);
    else if(type === 'STAR') geo = new THREE.IcosahedronGeometry(0.6, 0);
    else if(type === 'KITE') geo = new THREE.ConeGeometry(0.5, 1, 4);

    const colors = { BALL: 0xff4400, STAR: 0xffcc00, KITE: 0x00ccff };
    const mat = new THREE.MeshPhongMaterial({ color: colors[type], emissive: colors[type], emissiveIntensity: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set((Math.random()-0.5)*18, (Math.random()-0.5)*10, -40);
    mesh.userData = { type: type };
    
    scene.add(mesh);
    objects.push(mesh);
}

function spawnLoop() {
    spawnObject();
    // Normal speed spawning
    setTimeout(spawnLoop, 1000 - (level * 30));
}

function animate() {
    requestAnimationFrame(animate);
    objects.forEach((obj, i) => {
        obj.position.z += speed;
        obj.rotation.y += 0.01;
        if(obj.position.z > 6) {
            scene.remove(obj);
            objects.splice(i, 1);
        }
    });
    renderer.render(scene, camera);
}

window.addEventListener("mousedown", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);

    if(hits.length > 0) {
        const hit = hits[0].object;
        if(hit.userData.type === mission.type) {
            mission.count++;
            score += 20;
            if(mission.count >= mission.target) {
                clearInterval(timerInterval);
                showReward();
            }
        } else {
            score = Math.max(0, score - 10);
        }
        scene.remove(hit);
        objects.splice(objects.indexOf(hit), 1);
        updateUI();
    }
});

function showReward() {
    const box = document.getElementById('reward-box');
    const discounts = [40, 50, 56, 60, 70];
    document.getElementById('deal-name').innerText = `${discounts[level%5]}% OFF ON SAINIWALAA SPECIALS`;
    box.classList.add('active');
}

function nextLevel() {
    document.getElementById('reward-box').classList.remove('active');
    level++;
    speed += 0.02; // Very slight speed increase
    startNewMission();
}

function resetMission() {
    mission.count = 0;
    updateUI();
}

init();
</script>
</body>
</html>
