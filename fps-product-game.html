<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refer & Join</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

h1{
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>Join & Earn 💸</h1>

<form id="joinForm">
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Mobile Number" required>
<input type="hidden" id="ref">

<button type="submit">Join Now</button>
</form>

<p id="msg"></p>
</div>

<script>

// 🔥 GET REFERRAL FROM URL
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
document.getElementById("ref").value = ref || "Direct";

// 🔥 FORM SUBMIT
document.getElementById("joinForm").addEventListener("submit", function(e){
e.preventDefault();

let name = this[0].value;
let mobile = this[1].value;
let referral = document.getElementById("ref").value;

// 👉 Yaha tum Google Sheet / API bhej sakte ho
console.log({
name:name,
mobile:mobile,
referral:referral
});

document.getElementById("msg").innerHTML = "✅ Successfully Joined!";
this.reset();
});

</script>

</body>
</html>
