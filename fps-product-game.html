<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creator Run Shooter</title>

<style>
body{margin:0;overflow:hidden;background:linear-gradient(black,#001f3f);}

#score{
position:fixed;top:10px;left:10px;color:white;z-index:10;
font-size:18px;
}

#player{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:40px;
z-index:10;
}

.target{
position:absolute;
font-size:35px;
animation:fall linear;
}

@keyframes fall{
0%{top:-50px;}
100%{top:100vh;}
}

</style>
</head>
<body>

<div id="score">Score: 0 | Level: 1</div>
<div id="player">🧍‍♂️</div>

<script>

let score=0;
let level=1;
let speed=3;

// random targets
let types=["🎯","💰","📦","❌"];

function createTarget(){

let t=document.createElement("div");
t.className="target";

let type=types[Math.floor(Math.random()*types.length)];
t.innerText=type;

t.style.left=Math.random()*90+"vw";
t.style.animationDuration=(3-speed*0.3)+"s";

document.body.appendChild(t);

// CLICK (mobile friendly)
t.addEventListener("click",()=>{

if(type==="🎯"){
score+=5;
}
else if(type==="💰"){
score+=10;
}
else if(type==="📦"){
showReward();
}
else{
score-=5;
}

t.remove();
updateUI();

});

// auto remove
setTimeout(()=>t.remove(),4000);

}

function updateUI(){
document.getElementById("score").innerText=
"Score: "+score+" | Level: "+level;

// level up
if(score>20*level){
level++;
speed+=0.5;
}
}

// reward popup
function showReward(){
alert("🎁 Product Reward Unlock!");
}

// spawn loop (speed increase)
setInterval(()=>{
createTarget();
},600-speed*50);

</script>

</body>
</html>
