<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lane Runner Shooter</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

/* road */
#road{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(#111,#333);
}

/* lanes */
.lane{
position:absolute;
width:33.3%;
height:100%;
border-right:1px dashed #555;
}

/* player */
#player{
position:absolute;
bottom:20px;
width:60px;
left:50%;
transform:translateX(-50%);
font-size:40px;
text-align:center;
}

/* targets */
.target{
position:absolute;
top:-80px;
font-size:40px;
text-align:center;
width:33.3%;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
}

</style>
</head>
<body>

<div id="road"></div>

<div class="lane" style="left:0%"></div>
<div class="lane" style="left:33.3%"></div>
<div class="lane" style="left:66.6%"></div>

<div id="player">🚗</div>

<div id="hud">Score: 0</div>

<script>

let lanes=[0,1,2];
let playerLane=1;

let score=0;

let types=["📦","🎁","❌"];

// move player
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft" && playerLane>0) playerLane--;
if(e.key==="ArrowRight" && playerLane<2) playerLane--;
updatePlayer();
});

function updatePlayer(){
document.getElementById("player").style.left=(playerLane*33+16)+"%";
}

// mobile tap control
document.addEventListener("click",(e)=>{
if(e.clientX < window.innerWidth/2){
if(playerLane>0) playerLane--;
}else{
if(playerLane<2) playerLane++;
}
updatePlayer();
});

// spawn target
function spawn(){

let t=document.createElement("div");
t.className="target";

let lane=Math.floor(Math.random()*3);
let type=types[Math.floor(Math.random()*types.length)];

t.innerText=type;
t.style.left=(lane*33.3)+"%";

document.body.appendChild(t);

let pos=-80;

let fall=setInterval(()=>{

pos+=10;
t.style.top=pos+"px";

// collision
if(pos>window.innerHeight-120 && lane===playerLane){

if(type==="📦"){
score+=10;
}
else if(type==="🎁"){
score-=5;
alert("🔥 Offer distract!");
}
else{
score-=10;
}

document.getElementById("hud").innerText="Score: "+score;

t.remove();
clearInterval(fall);
}

// remove
if(pos>window.innerHeight){
t.remove();
clearInterval(fall);
}

},50);

}

setInterval(spawn,1000);

</script>

</body>
</html>
