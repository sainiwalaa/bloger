<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwalaa Mission Hunter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; cursor: none; }
        
        /* Mission & Stats UI */
        #hud {
            position: fixed; top: 20px; left: 20px;
            color: white; z-index: 10; display: flex; flex-direction: column; gap: 10px;
        }
        .panel {
            background: rgba(0, 255, 204, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px; border-radius: 10px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        #mission-text { color: #ffcc00; font-weight: bold; font-size: 1.2em; }
        .count-badge { font-size: 1.5em; color: #fff; }

        /* Reward Alert */
        #reward-alert {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 0, 204, 0.9);
            color: white; padding: 40px; border-radius: 20px;
            text-align: center; z-index: 200;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid gold;
        }
        #reward-alert.show { transform: translate(-50%, -50%) scale(1); }

        /* Aiming Circle */
        #aimer {
            position: fixed; width: 50px; height: 50px;
            border: 2px solid #ffcc00; border-radius: 50%;
            pointer-events: none; z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #ffcc00;
        }

        #flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events:none; background: red; opacity: 0; z-index: 5;
        }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="aimer"></div>

<div id="hud">
    <div class="panel">
        <div id="mission-text">MISSION: Loading...</div>
        <div class="count-badge"><span id="current-count">0</span> / <span id="target-count">10</span></div>
    </div>
    <div class="panel">
        SCORE: <span id="score">0</span> | LEVEL: <span id="lvl">1</span>
    </div>
</div>

<div id="reward-alert">
    <h1>MISSION COMPLETE!</h1>
    <h2 id="deal-title">56% OFF ON SHOES</h2>
    <p>Aapne target pura kiya!</p>
    <button onclick="closeReward()" style="padding:10px 20px; cursor:pointer; font-family:'Orbitron';">CLAIM NOW</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, score = 0, level = 1, speed = 0.3;
let objects = [];
let currentMission = { type: 'BALL', target: 5, collected: 0 };
const types = ['BALL', 'STAR', 'KITE'];

window.addEventListener('mousemove', (e) => {
    document.getElementById('aimer').style.left = e.clientX + 'px';
    document.getElementById('aimer').style.top = e.clientY + 'px';
});

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.03);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    camera.position.z = 5;

    newMission();
    spawnLoop();
    animate();
}

function newMission() {
    currentMission.type = types[Math.floor(Math.random() * types.length)];
    currentMission.target = 5 + (level * 2);
    currentMission.collected = 0;
    
    document.getElementById('mission-text').innerText = `TARGET: SHOOT ${currentMission.target} ${currentMission.type}s`;
    updateHUD();
}

function updateHUD() {
    document.getElementById('current-count').innerText = currentMission.collected;
    document.getElementById('target-count').innerText = currentMission.target;
    document.getElementById('score').innerText = score;
    document.getElementById('lvl').innerText = level;
}

function createObject() {
    const type = types[Math.floor(Math.random() * types.length)];
    let geo;
    
    if(type === 'BALL') geo = new THREE.SphereGeometry(0.5, 32, 32);
    else if(type === 'STAR') geo = new THREE.IcosahedronGeometry(0.6, 0);
    else if(type === 'KITE') geo = new THREE.ConeGeometry(0.5, 1, 4);

    const color = type === 'BALL' ? 0xff3300 : (type === 'STAR' ? 0xffff00 : 0x00ccff);
    const mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*12, -50);
    mesh.userData = { type: type };
    
    scene.add(mesh);
    objects.push(mesh);
}

function spawnLoop() {
    createObject();
    setTimeout(spawnLoop, 800 - (level * 50));
}

function animate() {
    requestAnimationFrame(animate);
    objects.forEach((obj, i) => {
        obj.position.z += speed;
        obj.rotation.y += 0.02;
        if(obj.position.z > 6) {
            scene.remove(obj);
            objects.splice(i, 1);
        }
    });
    renderer.render(scene, camera);
}

window.addEventListener("mousedown", (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);

    if(hits.length > 0) {
        const hit = hits[0].object;
        const hitType = hit.userData.type;

        if(hitType === currentMission.type) {
            // Sahi Target!
            currentMission.collected++;
            score += 50;
            if(currentMission.collected >= currentMission.target) {
                showReward();
            }
        } else {
            // Galat Target!
            score -= 20;
            triggerFlash();
        }

        scene.remove(hit);
        objects.splice(objects.indexOf(hit), 1);
        updateHUD();
    }
});

function triggerFlash() {
    const f = document.getElementById('flash');
    f.style.opacity = '0.5';
    setTimeout(() => f.style.opacity = '0', 100);
}

function showReward() {
    const alert = document.getElementById('reward-alert');
    const deal = level % 2 === 0 ? "35% OFF ON ELECTRONICS" : "56% OFF ON JEWELRY";
    document.getElementById('deal-title').innerText = deal;
    alert.classList.add('show');
}

function closeReward() {
    document.getElementById('reward-alert').classList.remove('show');
    level++;
    speed += 0.05;
    newMission();
}

init();
</script>
</body>
</html>
