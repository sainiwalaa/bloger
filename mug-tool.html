<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa Ultimate Mug Editor</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;text-align:center}
.toolbar{background:#000;padding:10px}
button,input{margin:5px;padding:8px;border:none;border-radius:5px}
button{background:#00e5ff;color:#000;font-weight:bold}
canvas{border:2px solid #fff;margin-top:10px;touch-action:none;max-width:100%}
</style>
</head>

<body>

<div class="toolbar">

<input type="file" id="bgUpload">
<input type="file" id="imgUpload">

<button onclick="addText()">Add Text</button>
<button onclick="deleteLayer()">Delete</button>
<button onclick="duplicate()">Duplicate</button>
<button onclick="toggleMode()">Single/Double</button>
<button onclick="download()">Download HD</button>

</div>

<canvas id="c"></canvas>

<script>
let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let bg=new Image();
let layers=[];
let selected=null;

let frame={x:150,y:150,w:500,h:250};

let action=null,startX,startY,handle=null;

// BG
bgUpload.onchange=e=>{
 let r=new FileReader();
 r.onload=ev=>{
  bg.onload=()=>{
   canvas.width=bg.width;
   canvas.height=bg.height;
   draw();
  }
  bg.src=ev.target.result;
 }
 r.readAsDataURL(e.target.files[0]);
};

// IMAGE
imgUpload.onchange=e=>{
 let r=new FileReader();
 r.onload=ev=>{
  let img=new Image();
  img.onload=()=>{
   layers.push({
     type:"img",
     img:img,
     x:frame.x+20,
     y:frame.y+20,
     w:200,
     h:150,
     rot:0,
     mode:"single"
   });
   draw();
  }
  img.src=ev.target.result;
 }
 r.readAsDataURL(e.target.files[0]);
};

// TEXT
function addText(){
 layers.push({
  type:"text",
  text:"Edit Text",
  x:200,
  y:200,
  size:40,
  rot:0
 });
 draw();
}

// DELETE
function deleteLayer(){
 if(selected){
  layers=layers.filter(l=>l!==selected);
  selected=null;
  draw();
 }
}

// DUPLICATE
function duplicate(){
 if(selected){
  let copy=JSON.parse(JSON.stringify(selected));
  copy.x+=20;
  copy.y+=20;
  layers.push(copy);
  draw();
 }
}

// MODE
function toggleMode(){
 if(selected && selected.type==="img"){
  selected.mode=selected.mode==="single"?"double":"single";
  draw();
 }
}

// DRAW
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(bg.src) ctx.drawImage(bg,0,0);

 ctx.strokeStyle="yellow";
 ctx.strokeRect(frame.x,frame.y,frame.w,frame.h);

 layers.forEach(l=>{
  ctx.save();
  ctx.translate(l.x,l.y);
  ctx.rotate(l.rot);

  if(l.type==="img"){
   if(l.mode==="double"){
    ctx.drawImage(l.img,-l.w/2,-l.h/2,l.w,l.h);
    ctx.drawImage(l.img,frame.w-l.w*2,-l.h/2,l.w,l.h);
   }else{
    ctx.drawImage(l.img,-l.w/2,-l.h/2,l.w,l.h);
   }
  }

  if(l.type==="text"){
   ctx.fillStyle="#fff";
   ctx.font=l.size+"px Arial";
   ctx.fillText(l.text,0,0);
  }

  ctx.restore();

  if(l===selected) drawBox(l);
 });
}

// BOX + HANDLES
function drawBox(o){
 ctx.strokeStyle="cyan";
 ctx.strokeRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h);

 let pts=[
  [o.x-o.w/2,o.y-o.h/2],
  [o.x+o.w/2,o.y-o.h/2],
  [o.x+o.w/2,o.y+o.h/2],
  [o.x-o.w/2,o.y+o.h/2]
 ];

 pts.forEach(p=>ctx.fillRect(p[0]-5,p[1]-5,10,10));
}

// CLICK
canvas.onmousedown=e=>{
 let r=canvas.getBoundingClientRect();
 let x=e.clientX-r.left;
 let y=e.clientY-r.top;

 selected=null;

 layers.forEach(l=>{
  if(x>l.x-l.w/2 && x<l.x+l.w/2 && y>l.y-l.h/2 && y<l.y+l.h/2){
   selected=l;
   action="move";
  }
 });

 startX=x;
 startY=y;
 draw();
};

// MOVE
canvas.onmousemove=e=>{
 if(!action||!selected) return;

 let r=canvas.getBoundingClientRect();
 let x=e.clientX-r.left;
 let y=e.clientY-r.top;

 let dx=x-startX;
 let dy=y-startY;

 selected.x+=dx;
 selected.y+=dy;

 startX=x;
 startY=y;

 draw();
};

canvas.onmouseup=()=>action=null;

// DOWNLOAD HD
function download(){
 let out=document.createElement("canvas");
 let octx=out.getContext("2d");

 out.width=3000;
 out.height=1500;

 octx.drawImage(canvas,frame.x,frame.y,frame.w,frame.h,0,0,out.width,out.height);

 let link=document.createElement("a");
 link.download="mug-HD.png";
 link.href=out.toDataURL("image/png");
 link.click();
}
</script>

</body>
</html>
