<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa Mug Tool ULTIMATE BUSINESS</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#ff512f,#dd2476);color:#fff;text-align:center;padding:20px}
.container{max-width:1100px;margin:auto;background:#111;padding:20px;border-radius:12px}
input,select,button{padding:10px;margin:6px;border:none;border-radius:6px}
button{background:#00e5ff;color:#000;font-weight:bold;cursor:pointer}
canvas{margin-top:20px;max-width:100%;border:2px solid #fff;border-radius:10px;touch-action:none}
</style>
</head>
<body>
<div class="container">
<h1>🚀 Sainiwalaa Mug Tool - Ultimate Business PRO</h1>
<p>Resize • Text • Image Layer • Zoom • Ultra HD Export</p>

<input type="file" id="upload" accept="image/*"><br>

<select id="size">
<option value="2700x1200">9x4 inch</option>
<option value="3000x1500">10x5 inch</option>
<option value="custom">Custom</option>
</select>
<input type="number" id="cw" placeholder="Width px">
<input type="number" id="ch" placeholder="Height px"><br>

<input type="text" id="textInput" placeholder="Enter text">
<input type="color" id="textColor" value="#ffffff">
<input type="range" id="textSize" min="20" max="150" value="50">
<button onclick="addText()">Add Text</button>
<button onclick="deleteText()">Delete Text</button><br>

<input type="file" id="imgLayerUpload" accept="image/*">
<button onclick="deleteImageLayer()">Delete Image</button><br>

<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>
<button onclick="processSelection()">Generate Print</button>
<button onclick="downloadImage()">Download PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
let img=new Image();

let rect={x:200,y:200,w:300,h:200};
let texts=[];
let images=[];
let zoom=1;
let action=null,startX,startY,selectedText=null,selectedImage=null;

function loadImage(file){
 let reader=new FileReader();
 reader.onload=e=>{
  img.onload=()=>{
   canvas.width=img.width;
   canvas.height=img.height;
   draw();
  }
  img.src=e.target.result;
 }
 reader.readAsDataURL(file);
}

document.getElementById('upload').addEventListener('change',e=>loadImage(e.target.files[0]));

// IMAGE LAYER UPLOAD
document.getElementById('imgLayerUpload').addEventListener('change',e=>{
 let file=e.target.files[0];
 let reader=new FileReader();
 reader.onload=ev=>{
  let newImg=new Image();
  newImg.onload=()=>{
   images.push({img:newImg,x:150,y:150,w:200,h:150});
   draw();
  }
  newImg.src=ev.target.result;
 }
 reader.readAsDataURL(file);
});

function draw(){
 ctx.setTransform(zoom,0,0,zoom,0,0);
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(img,0,0);

 ctx.strokeStyle='yellow';
 ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);
 drawHandles(rect);

 images.forEach(im=>{
  ctx.drawImage(im.img,im.x,im.y,im.w,im.h);
  if(im===selectedImage) drawHandles(im);
 });

 texts.forEach(t=>{
  ctx.fillStyle=t.color;
  ctx.font=t.size+'px Arial';
  ctx.fillText(t.text,t.x,t.y);
 });
}

function drawHandles(obj){
 let pts=[
  [obj.x,obj.y],[obj.x+obj.w,obj.y],[obj.x+obj.w,obj.y+obj.h],[obj.x,obj.y+obj.h],
  [obj.x+obj.w/2,obj.y],[obj.x+obj.w/2,obj.y+obj.h],[obj.x,obj.y+obj.h/2],[obj.x+obj.w,obj.y+obj.h/2]
 ];
 ctx.fillStyle='#00e5ff';
 pts.forEach(p=>ctx.fillRect(p[0]-5,p[1]-5,10,10));
}

function addText(){
 texts.push({text:textInput.value,x:150,y:150,size:parseInt(textSize.value),color:textColor.value});
 draw();
}

function deleteText(){
 if(selectedText){
  texts=texts.filter(t=>t!==selectedText);
  selectedText=null;
  draw();
 }
}

function deleteImageLayer(){
 if(selectedImage){
  images=images.filter(i=>i!==selectedImage);
  selectedImage=null;
  draw();
 }
}

function zoomIn(){zoom+=0.2;draw();}
function zoomOut(){zoom=Math.max(0.4,zoom-0.2);draw();}

function getPos(e){
 let r=canvas.getBoundingClientRect();
 return {x:((e.touches?e.touches[0].clientX:e.clientX)-r.left)/zoom,y:((e.touches?e.touches[0].clientY:e.clientY)-r.top)/zoom}
}

canvas.onmousedown=start;
canvas.onmousemove=move;
canvas.onmouseup=()=>{action=null;selectedText=null;selectedImage=null};
canvas.ontouchstart=start;
canvas.ontouchmove=move;
canvas.ontouchend=()=>{action=null;selectedText=null;selectedImage=null};

function getHandle(obj,mx,my){
 let z=[
  [obj.x,obj.y,'tl'],[obj.x+obj.w,obj.y,'tr'],[obj.x+obj.w,obj.y+obj.h,'br'],[obj.x,obj.y+obj.h,'bl'],
  [obj.x+obj.w/2,obj.y,'top'],[obj.x+obj.w/2,obj.y+obj.h,'bottom'],[obj.x,obj.y+obj.h/2,'left'],[obj.x+obj.w,obj.y+obj.h/2,'right']
 ];
 for(let i of z){if(Math.abs(mx-i[0])<10&&Math.abs(my-i[1])<10)return i[2];}
 return null;
}

function start(e){
 let p=getPos(e);
 startX=p.x; startY=p.y;

 // image select + resize
 images.forEach(im=>{
  let h=getHandle(im,p.x,p.y);
  if(h){selectedImage=im; action='img_'+h;}
  else if(p.x>im.x && p.x<im.x+im.w && p.y>im.y && p.y<im.y+im.h){
    selectedImage=im; action='img_move';
  }
 });

 // text select
 texts.forEach(t=>{
  let w=ctx.measureText(t.text).width;
  if(p.x>t.x && p.x<t.x+w && p.y<t.y && p.y>t.y-t.size){
    selectedText=t; action='textMove';
  }
 });

 // frame
 let h=getHandle(rect,p.x,p.y);
 if(h) action=h;
 else if(p.x>rect.x && p.x<rect.x+rect.w && p.y>rect.y && p.y<rect.y+rect.h){
  action='move';
 }
}

function move(e){
 if(!action) return;
 e.preventDefault();
 let p=getPos(e);
 let dx=p.x-startX;
 let dy=p.y-startY;

 let target = selectedImage || rect;

 function resize(obj,type){
  switch(type){
   case 'right': obj.w+=dx; break;
   case 'left': obj.w-=dx; obj.x+=dx; break;
   case 'bottom': obj.h+=dy; break;
   case 'top': obj.h-=dy; obj.y+=dy; break;
   case 'br': obj.w+=dx; obj.h+=dy; break;
   case 'tr': obj.w+=dx; obj.h-=dy; obj.y+=dy; break;
   case 'bl': obj.w-=dx; obj.h+=dy; obj.x+=dx; break;
   case 'tl': obj.w-=dx; obj.h-=dy; obj.x+=dx; obj.y+=dy; break;
  }
 }

 if(action==='move'){rect.x+=dx; rect.y+=dy;}
 else if(action==='textMove' && selectedText){selectedText.x+=dx; selectedText.y+=dy;}
 else if(action==='img_move' && selectedImage){selectedImage.x+=dx; selectedImage.y+=dy;}
 else if(action.startsWith('img_') && selectedImage){resize(selectedImage,action.replace('img_',''));}
 else{resize(rect,action);}

 startX=p.x; startY=p.y;
 draw();
}

function getSize(){
 let val=size.value;
 if(val==='custom'){
  return {w:parseInt(cw.value)||2700,h:parseInt(ch.value)||1200};
 }
 let [w,h]=val.split('x');
 return {w:parseInt(w),h:parseInt(h)};
}

function processSelection(){
 let size=getSize();
 let scale=3;

 let temp=document.createElement('canvas');
 let tctx=temp.getContext('2d');
 temp.width=rect.w;
 temp.height=rect.h;

 tctx.imageSmoothingEnabled=true;
 tctx.imageSmoothingQuality='high';
 tctx.drawImage(canvas,rect.x,rect.y,rect.w,rect.h,0,0,rect.w,rect.h);

 canvas.width=size.w*scale;
 canvas.height=size.h*scale;
 ctx.imageSmoothingEnabled=true;
 ctx.imageSmoothingQuality='high';
 ctx.drawImage(temp,0,0,canvas.width,canvas.height);
}

function downloadImage(){
 let link=document.createElement('a');
 link.download='ultimate-mug.png';
 link.href=canvas.toDataURL('image/png',1.0);
 link.click();
}
</script>
</body>
</html>
