<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mug Tool - Advanced PRO</title>
<style>
body{font-family:Arial;background:#0f0f0f;color:#fff;text-align:center;padding:20px}
.container{max-width:900px;margin:auto}
input,button{padding:10px;margin:10px;border:none;border-radius:6px}
button{background:#00e676;color:#000;cursor:pointer;font-weight:bold}
canvas{margin-top:20px;max-width:100%;border:1px solid #444;cursor:crosshair}
.info{color:#aaa;font-size:14px}
</style>
</head>
<body>
<div class="container">
<h1>☕ Mug Tool - Advanced PRO</h1>
<p class="info">Print Size: 9 x 4 inch (2700 x 1200 px @300 DPI)</p>

<input type="file" id="upload" accept="image/*"><br>
<button onclick="enableSelection()">Enable Selection</button>
<button onclick="processSelection()">Process Design</button>
<button onclick="downloadImage()">Download HD PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let img = new Image();

let rect = {x:50,y:50,w:300,h:200,angle:0};
let mode = null;
let offsetX, offsetY;

function loadImage(file){
  let reader = new FileReader();
  reader.onload = function(e){
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      draw();
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
}

document.getElementById('upload').addEventListener('change', function(){
  loadImage(this.files[0]);
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  ctx.save();
  ctx.translate(rect.x + rect.w/2, rect.y + rect.h/2);
  ctx.rotate(rect.angle);

  ctx.strokeStyle = 'red';
  ctx.lineWidth = 2;
  ctx.strokeRect(-rect.w/2, -rect.h/2, rect.w, rect.h);

  // corner handles
  let points = [
    [-rect.w/2,-rect.h/2],
    [rect.w/2,-rect.h/2],
    [rect.w/2,rect.h/2],
    [-rect.w/2,rect.h/2]
  ];

  ctx.fillStyle='yellow';
  points.forEach(p=>ctx.fillRect(p[0]-5,p[1]-5,10,10));

  ctx.restore();
}

function enableSelection(){
  canvas.onmousedown = function(e){
    mode = 'drag';
    offsetX = e.offsetX - rect.x;
    offsetY = e.offsetY - rect.y;
  }

  canvas.onmousemove = function(e){
    if(mode==='drag'){
      rect.x = e.offsetX - offsetX;
      rect.y = e.offsetY - offsetY;
      draw();
    }
  }

  canvas.onmouseup = function(){ mode=null; }
}

function processSelection(){
  let tempCanvas = document.createElement('canvas');
  let tctx = tempCanvas.getContext('2d');
  tempCanvas.width = rect.w;
  tempCanvas.height = rect.h;

  tctx.drawImage(canvas, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);

  canvas.width = 2700;
  canvas.height = 1200;

  ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
}

function downloadImage(){
  let link = document.createElement('a');
  link.download = 'mug-design-hd.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>

</body>
</html>
