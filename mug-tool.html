<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa PRO Mug Editor</title>

<style>
body{
 font-family:Arial;
 background:linear-gradient(135deg,#ff512f,#dd2476);
 color:#fff;
 text-align:center;
}
.container{
 max-width:1100px;
 margin:auto;
 background:#111;
 padding:15px;
 border-radius:10px;
}
button,input{
 margin:5px;
 padding:10px;
 border:none;
 border-radius:6px;
}
button{background:#00e5ff;color:#000;font-weight:bold;}
canvas{border:2px solid #fff;margin-top:10px;max-width:100%;}
</style>
</head>

<body>
<div class="container">

<h2>☕ Sainiwalaa PRO Mug Editor</h2>

<input type="file" id="bgUpload"><br>

<input type="file" id="imgUpload">
<button onclick="addText()">Add Text</button>
<button onclick="deleteLayer()">Delete</button>
<button onclick="toggleMode()">Single/Double</button>
<button onclick="download()">Download</button>

<canvas id="canvas"></canvas>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let bg=new Image();

let layers=[];
let selected=null;

let frame={x:150,y:150,w:400,h:250};

let action=null,startX,startY;

// BG
document.getElementById("bgUpload").onchange=e=>{
 let file=e.target.files[0];
 let r=new FileReader();
 r.onload=ev=>{
  bg.onload=()=>{
   canvas.width=bg.width;
   canvas.height=bg.height;
   draw();
  }
  bg.src=ev.target.result;
 }
 r.readAsDataURL(file);
};

// IMAGE
document.getElementById("imgUpload").onchange=e=>{
 let file=e.target.files[0];
 let r=new FileReader();

 r.onload=ev=>{
  let img=new Image();
  img.onload=()=>{
   layers.push({
     type:"img",
     img:img,
     x:frame.x+20,
     y:frame.y+20,
     w:200,
     h:150,
     mode:"single"
   });
   draw();
  }
  img.src=ev.target.result;
 }

 r.readAsDataURL(file);
};

// TEXT
function addText(){
 layers.push({
   type:"text",
   text:"Your Text",
   x:200,
   y:200
 });
 draw();
}

// DELETE
function deleteLayer(){
 if(selected){
   layers=layers.filter(l=>l!==selected);
   selected=null;
   draw();
 }
}

// MODE
function toggleMode(){
 if(selected && selected.type==="img"){
   selected.mode=selected.mode==="single"?"double":"single";
   draw();
 }
}

// DRAW
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(bg.src) ctx.drawImage(bg,0,0);

 // frame
 ctx.strokeStyle="yellow";
 ctx.strokeRect(frame.x,frame.y,frame.w,frame.h);

 layers.forEach(l=>{
   if(l.type==="img"){
     if(l.mode==="double"){
       ctx.drawImage(l.img,frame.x,l.y,l.w,l.h);
       ctx.drawImage(l.img,frame.x+frame.w-l.w,l.y,l.w,l.h);
     }else{
       ctx.drawImage(l.img,l.x,l.y,l.w,l.h);
     }
   }

   if(l.type==="text"){
     ctx.fillStyle="#fff";
     ctx.font="40px Arial";
     ctx.fillText(l.text,l.x,l.y);
   }

   if(l===selected) drawBox(l);
 });
}

// BOX
function drawBox(o){
 ctx.strokeStyle="cyan";
 ctx.strokeRect(o.x,o.y,o.w||150,o.h||40);
}

// CLICK
canvas.onmousedown=e=>{
 let r=canvas.getBoundingClientRect();
 let x=e.clientX-r.left;
 let y=e.clientY-r.top;

 selected=null;

 layers.forEach(l=>{
   let w=l.w||150,h=l.h||40;
   if(x>l.x && x<l.x+w && y>l.y-h && y<l.y){
     selected=l;
     action="move";
   }
 });

 startX=x;startY=y;
};

// MOVE
canvas.onmousemove=e=>{
 if(!action || !selected) return;

 let r=canvas.getBoundingClientRect();
 let x=e.clientX-r.left;
 let y=e.clientY-r.top;

 let dx=x-startX;
 let dy=y-startY;

 selected.x+=dx;
 selected.y+=dy;

 startX=x;
 startY=y;

 draw();
};

canvas.onmouseup=()=>action=null;

// DOWNLOAD
function download(){
 let link=document.createElement("a");
 link.download="mug.png";
 link.href=canvas.toDataURL("image/png");
 link.click();
}

</script>

</body>
</html>
