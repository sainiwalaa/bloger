<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainiwala Pro 4K Mug Editor</title>
    <style>
        :root { --neon: #00e5ff; --bg: #1a1a1a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        
        /* Sidebar & UI */
        .controls { position: absolute; left: 0; top: 0; width: 300px; height: 100vh; background: #000; padding: 20px; box-sizing: border-box; border-right: 2px solid var(--neon); display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        
        h2 { color: var(--neon); margin-top: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px; cursor: pointer; border-radius: 4px; transition: 0.3s; font-weight: bold; }
        button:hover { background: var(--neon); color: #000; border-color: #fff; }
        .btn-main { background: var(--neon); color: #000; grid-column: span 2; }
        
        input[type="file"] { display: none; }
        label { background: #444; padding: 10px; display: block; text-align: center; border-radius: 4px; cursor: pointer; border: 1px dashed var(--neon); }

        /* Workspace */
        #workspace { margin-left: 300px; height: 100vh; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 30px 30px; position: relative; }
        canvas { box-shadow: 0 0 50px rgba(0,0,0,0.5); background: white; max-width: 90%; max-height: 90%; }
        
        .info { position: absolute; bottom: 20px; right: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="controls">
    <h2>Mug Designer 4K</h2>
    
    <label for="imgUpload">🖼️ Add Image / Logo</label>
    <input type="file" id="imgUpload" accept="image/*">
    
    <button class="btn-main" onclick="addText()">+ Add Text</button>

    <div class="btn-group">
        <button onclick="changeColor('#ffffff')">White</button>
        <button onclick="changeColor('#000000')">Black</button>
        <button onclick="deleteLayer()" style="background:#ff4444">Delete</button>
        <button onclick="duplicateLayer()">Copy</button>
    </div>

    <hr style="width:100%; border:0.5px solid #333">
    
    <div style="font-size: 13px;">
        <p>Size: <span id="sizeDisplay">200x150</span></p>
        <p>Resolution: 4000px (4K HD)</p>
    </div>

    <button class="btn-main" style="margin-top:auto; background:#00ff88" onclick="exportHighRes()">⬇ Download 4K HD</button>
</div>

<div id="workspace">
    <canvas id="editor"></canvas>
    <div class="info">Sainiwala System UI | Use Mouse to Drag & Corner to Resize</div>
</div>

<script>
/**
 * PRO MUG EDITOR LOGIC
 * High-precision coordinate system for 4K Export
 */
const canvas = document.getElementById('editor');
const ctx = canvas.getContext('2d');
const sizeDisplay = document.getElementById('sizeDisplay');

// Mug Standard Proportions (8.5 x 3.5 inches approx)
// 4K Output Target: 4000px x 1800px
let layers = [];
let selectedLayer = null;
let isDragging = false;
let isResizing = false;
let startX, startY;

// Setup Workspace Canvas (Display version)
function init() {
    canvas.width = 800;
    canvas.height = 360;
    draw();
}

// Add Image
document.getElementById('imgUpload').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            const layer = {
                type: 'img',
                data: img,
                x: 100, y: 50,
                w: 200, h: (img.height / img.width) * 200,
                rot: 0
            };
            layers.push(layer);
            selectedLayer = layer;
            draw();
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

function addText() {
    const layer = {
        type: 'text',
        content: 'Type Here',
        x: 300, y: 150,
        w: 150, h: 40,
        size: 40,
        color: '#000000'
    };
    layers.push(layer);
    selectedLayer = layer;
    draw();
}

function draw() {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Safety Margin Guidelines
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "#ccc";
    ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
    ctx.setLineDash([]);

    layers.forEach(l => {
        if (l.type === 'img') {
            ctx.drawImage(l.data, l.x, l.y, l.w, l.h);
        } else {
            ctx.fillStyle = l.color;
            ctx.font = `bold ${l.size}px Arial`;
            ctx.fillText(l.content, l.x, l.y + l.h);
        }

        if (l === selectedLayer) {
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(l.x, l.y, l.w, l.h);
            // Resize handle
            ctx.fillStyle = '#00e5ff';
            ctx.fillRect(l.x + l.w - 8, l.y + l.h - 8, 10, 10);
        }
    });
}

// Interaction
canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    selectedLayer = null;
    isResizing = false;

    for (let i = layers.length - 1; i >= 0; i--) {
        let l = layers[i];
        // Check resize handle first
        if (x > l.x + l.w - 15 && x < l.x + l.w + 5 && y > l.y + l.h - 15 && y < l.y + l.h + 5) {
            selectedLayer = l;
            isResizing = true;
            break;
        }
        // Check body
        if (x > l.x && x < l.x + l.w && y > l.y && y < l.y + l.h) {
            selectedLayer = l;
            isDragging = true;
            break;
        }
    }
    startX = x; startY = y;
    draw();
};

canvas.onmousemove = (e) => {
    if (!selectedLayer) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    if (isDragging) {
        selectedLayer.x += (x - startX);
        selectedLayer.y += (y - startY);
    } else if (isResizing) {
        selectedLayer.w += (x - startX);
        selectedLayer.h += (y - startY);
    }
    
    startX = x; startY = y;
    sizeDisplay.innerText = `${Math.round(selectedLayer.w)}x${Math.round(selectedLayer.h)}`;
    draw();
};

window.onmouseup = () => { isDragging = false; isResizing = false; };

function deleteLayer() {
    if (selectedLayer) {
        layers = layers.filter(l => l !== selectedLayer);
        selectedLayer = null;
        draw();
    }
}

function duplicateLayer() {
    if (selectedLayer) {
        const copy = {...selectedLayer, x: selectedLayer.x + 20, y: selectedLayer.y + 20};
        layers.push(copy);
        draw();
    }
}

// 4K EXPORT SYSTEM
function exportHighRes() {
    const offCanvas = document.createElement('canvas');
    const octx = offCanvas.getContext('2d');
    
    // Setting 4000px width for HD quality
    offCanvas.width = 4000;
    offCanvas.height = 1800;
    const scale = offCanvas.width / canvas.width;

    octx.fillStyle = "white";
    octx.fillRect(0, 0, offCanvas.width, offCanvas.height);

    layers.forEach(l => {
        if (l.type === 'img') {
            octx.drawImage(l.data, l.x * scale, l.y * scale, l.w * scale, l.h * scale);
        } else {
            octx.fillStyle = l.color;
            octx.font = `bold ${l.size * scale}px Arial`;
            octx.fillText(l.content, l.x * scale, (l.y + l.h) * scale);
        }
    });

    const link = document.createElement('a');
    link.download = `Sainiwala_Mug_4K_${Date.now()}.png`;
    link.href = offCanvas.toDataURL("image/png", 1.0);
    link.click();
}

init();
</script>
</body>
</html>
