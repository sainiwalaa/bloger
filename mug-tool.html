<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mug Tool - HD Design Extractor</title>
<style>
body{font-family:Arial;background:#0f0f0f;color:#fff;text-align:center;padding:20px}
.container{max-width:800px;margin:auto}
input,button{padding:12px;margin:10px;border:none;border-radius:6px}
button{background:#ff4d4d;color:#fff;cursor:pointer}
canvas{margin-top:20px;max-width:100%;border:1px solid #333}
</style>
</head>
<body>
<div class="container">
<h1>☕ Mug Tool (Pro)</h1>
<p>Upload Image → Auto Clean → HD PNG Download (Print Ready)</p>

<input type="file" id="upload" accept="image/*"><br>
<button onclick="processImage()">Process Design</button>
<button onclick="downloadImage()">Download HD PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let img = new Image();

function processImage(){
  let file = document.getElementById('upload').files[0];
  if(!file) return alert('Upload image first');

  let reader = new FileReader();
  reader.onload = function(e){
    img.onload = function(){
      // SET PRINT SIZE (9x4 inch @ 300 DPI = 2700x1200 px)
      canvas.width = 2700;
      canvas.height = 1200;

      // draw image center fit
      let scale = Math.min(canvas.width/img.width, canvas.height/img.height);
      let w = img.width * scale;
      let h = img.height * scale;
      let x = (canvas.width - w)/2;
      let y = (canvas.height - h)/2;

      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,x,y,w,h);

      removeBackground();
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
}

function removeBackground(){
  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  for(let i=0;i<data.length;i+=4){
    let r=data[i], g=data[i+1], b=data[i+2];

    // advanced white remove
    if(r>230 && g>230 && b>230){
      data[i+3]=0;
    }
  }

  ctx.putImageData(imageData,0,0);
}

function downloadImage(){
  let link = document.createElement('a');
  link.download = 'mug-design-hd.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>

</body>
</html>
