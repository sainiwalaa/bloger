<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mug Tool - Ultimate PRO</title>
<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;padding:20px}
.container{max-width:900px;margin:auto}
input,button{padding:10px;margin:8px;border:none;border-radius:6px}
button{background:#00e5ff;color:#000;font-weight:bold;cursor:pointer}
canvas{margin-top:20px;max-width:100%;border:1px solid #444;touch-action:none}
</style>
</head>
<body>
<div class="container">
<h1>☕ Ultimate Mug Print Tool</h1>
<p>Resize ✔ Rotate ✔ Drag ✔ Mobile + PC ✔ Print Ready</p>

<input type="file" id="upload" accept="image/*"><br>
<button onclick="processSelection()">Generate Print</button>
<button onclick="downloadImage()">Download PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
let img=new Image();

let rect={x:150,y:150,w:300,h:200,angle:0};
let action=null;
let startX,startY;

function loadImage(file){
 let reader=new FileReader();
 reader.onload=e=>{
  img.onload=()=>{
   canvas.width=img.width;
   canvas.height=img.height;
   draw();
  }
  img.src=e.target.result;
 }
 reader.readAsDataURL(file);
}

document.getElementById('upload').addEventListener('change',e=>{
 loadImage(e.target.files[0]);
});

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(img,0,0);

 ctx.save();
 ctx.translate(rect.x,rect.y);
 ctx.rotate(rect.angle);

 ctx.strokeStyle='red';
 ctx.lineWidth=2;
 ctx.strokeRect(-rect.w/2,-rect.h/2,rect.w,rect.h);

 // resize handle
 ctx.fillStyle='yellow';
 ctx.fillRect(rect.w/2-10,rect.h/2-10,10,10);

 // rotate handle
 ctx.fillStyle='cyan';
 ctx.fillRect(0,-rect.h/2-20,10,10);

 ctx.restore();
}

canvas.onmousedown=start;
canvas.onmousemove=move;
canvas.onmouseup=stop;

canvas.ontouchstart=e=>start(e.touches[0]);
canvas.ontouchmove=e=>move(e.touches[0]);
canvas.ontouchend=stop;

function start(e){
 let mx=e.offsetX||e.clientX;
 let my=e.offsetY||e.clientY;

 startX=mx;
 startY=my;

 action='move';
}

function move(e){
 if(!action) return;
 let mx=e.offsetX||e.clientX;
 let my=e.offsetY||e.clientY;

 let dx=mx-startX;
 let dy=my-startY;

 if(action==='move'){
  rect.x+=dx;
  rect.y+=dy;
 }

 // resize with SHIFT-like behavior
 if(e.shiftKey){
  rect.w+=dx;
  rect.h+=dy;
 }

 // rotate with ALT-like behavior
 if(e.altKey){
  rect.angle+=dx*0.01;
 }

 startX=mx;
 startY=my;
 draw();
}

function stop(){action=null;}

function processSelection(){
 let temp=document.createElement('canvas');
 let tctx=temp.getContext('2d');

 temp.width=rect.w;
 temp.height=rect.h;

 tctx.translate(rect.w/2,rect.h/2);
 tctx.rotate(rect.angle);
 tctx.drawImage(canvas,rect.x-rect.w/2,rect.y-rect.h/2,rect.w,rect.h,-rect.w/2,-rect.h/2,rect.w,rect.h);

 canvas.width=2700;
 canvas.height=1200;
 ctx.drawImage(temp,0,0,canvas.width,canvas.height);
}

function downloadImage(){
 let link=document.createElement('a');
 link.download='mug-print.png';
 link.href=canvas.toDataURL('image/png');
 link.click();
}
</script>
</body>
</html>
