<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa Mug Tool PRO+</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#ff512f,#dd2476);color:#fff;text-align:center;padding:20px}
.container{max-width:950px;margin:auto;background:#111;padding:20px;border-radius:12px}
input,select,button{padding:10px;margin:6px;border:none;border-radius:6px}
button{background:#00e5ff;color:#000;font-weight:bold;cursor:pointer}
canvas{margin-top:20px;max-width:100%;border:2px solid #fff;border-radius:10px;touch-action:none}
</style>
</head>
<body>
<div class="container">
<h1>☕ Sainiwalaa Mug Tool PRO+</h1>
<p>HD • Resize • Text Add • Print Ready</p>

<input type="file" id="upload" accept="image/*"><br>

<select id="size">
<option value="2700x1200">9x4 inch</option>
<option value="3000x1500">10x5 inch</option>
<option value="custom">Custom</option>
</select>
<input type="number" id="cw" placeholder="Width px">
<input type="number" id="ch" placeholder="Height px"><br>

<!-- TEXT TOOL -->
<input type="text" id="textInput" placeholder="Enter text">
<input type="color" id="textColor" value="#ffffff">
<button onclick="addText()">Add Text</button><br>

<button onclick="processSelection()">Generate Print</button>
<button onclick="downloadImage()">Download PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
let img=new Image();

let rect={x:200,y:200,w:300,h:200};
let action=null,startX,startY;

let texts=[];

function loadImage(file){
 let reader=new FileReader();
 reader.onload=e=>{
  img.onload=()=>{
   canvas.width=img.width;
   canvas.height=img.height;
   draw();
  }
  img.src=e.target.result;
 }
 reader.readAsDataURL(file);
}

document.getElementById('upload').addEventListener('change',e=>loadImage(e.target.files[0]));

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(img,0,0);

 // draw selection
 ctx.strokeStyle='yellow';
 ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);

 // draw text
 texts.forEach(t=>{
  ctx.fillStyle=t.color;
  ctx.font=t.size+'px Arial';
  ctx.fillText(t.text,t.x,t.y);
 });
}

function addText(){
 let text=document.getElementById('textInput').value;
 let color=document.getElementById('textColor').value;

 texts.push({text:text,x:100,y:100,size:50,color:color});
 draw();
}

canvas.onmousedown=start;
canvas.onmousemove=move;
canvas.onmouseup=()=>action=null;

function getPos(e){
 let r=canvas.getBoundingClientRect();
 return {x:e.clientX-r.left,y:e.clientY-r.top}
}

function start(e){
 let p=getPos(e);
 startX=p.x; startY=p.y;
 action='move';
}

function move(e){
 if(!action) return;
 let p=getPos(e);
 let dx=p.x-startX;
 let dy=p.y-startY;
 rect.x+=dx;
 rect.y+=dy;
 startX=p.x; startY=p.y;
 draw();
}

function getSize(){
 let val=document.getElementById('size').value;
 if(val==='custom'){
  return {w:parseInt(cw.value)||2700,h:parseInt(ch.value)||1200};
 }
 let [w,h]=val.split('x');
 return {w:parseInt(w),h:parseInt(h)};
}

function processSelection(){
 let size=getSize();
 let temp=document.createElement('canvas');
 let tctx=temp.getContext('2d');

 temp.width=rect.w;
 temp.height=rect.h;

 tctx.imageSmoothingEnabled=true;
 tctx.imageSmoothingQuality='high';

 tctx.drawImage(canvas,rect.x,rect.y,rect.w,rect.h,0,0,rect.w,rect.h);

 canvas.width=size.w;
 canvas.height=size.h;

 ctx.imageSmoothingEnabled=true;
 ctx.imageSmoothingQuality='high';

 ctx.drawImage(temp,0,0,canvas.width,canvas.height);
}

function downloadImage(){
 let link=document.createElement('a');
 link.download='sainiwalaa-mug.png';
 link.href=canvas.toDataURL('image/png',1.0);
 link.click();
}
</script>
</body>
</html>
