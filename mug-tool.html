<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sainiwala Pro Mug Editor - 4K</title>
    <style>
        :root { --neon: #00ff88; --dark: #0f0f0f; --panel: #1a1a1a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }
        
        /* Left Sidebar */
        .sidebar { width: 350px; background: var(--panel); padding: 20px; border-right: 2px solid var(--neon); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        h2 { color: var(--neon); text-align: center; margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Controls Style */
        .control-group { background: #222; padding: 12px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 12px; color: #aaa; font-weight: bold; }
        input[type="text"], input[type="range"], select { width: 100%; padding: 8px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        
        .btn { background: #333; color: white; border: 1px solid var(--neon); padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; text-align: center; }
        .btn:hover { background: var(--neon); color: black; }
        .btn-main { background: var(--neon); color: black; font-size: 16px; margin-top: 10px; }
        .btn-danger { border-color: #ff4444; color: #ff4444; }
        .btn-danger:hover { background: #ff4444; color: white; }

        /* Canvas Area */
        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; position: relative; }
        canvas { background: #fff; box-shadow: 0 0 50px rgba(0,0,0,0.7); cursor: move; }
        .hint { position: absolute; bottom: 20px; color: #666; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>MUG DESIGN SYSTEM</h2>
    
    <div class="control-group">
        <label>1. BASE IMAGE (CUP)</label>
        <input type="file" id="baseUpload" accept="image/*">
        <button class="btn" onclick="extractDesign()" id="cutBtn" style="display:none; background:#00e5ff; color:black;">✂️ Extract This Design</button>
    </div>

    <div class="control-group">
        <label>2. ADD NEW ELEMENTS</label>
        <button class="btn" onclick="addNewText()">➕ Add New Text</button>
        <button class="btn" onclick="document.getElementById('logoUpload').click()">🖼️ Add Extra Image/Logo</button>
        <input type="file" id="logoUpload" style="display:none" accept="image/*">
    </div>

    <div id="editPanel" class="control-group" style="display:none; border-color: var(--neon);">
        <label>3. EDIT SELECTED ITEM</label>
        <input type="text" id="textInput" placeholder="Edit Text Content..." oninput="updateItem()">
        
        <div>
            <label>Size</label>
            <input type="range" id="sizeRange" min="10" max="500" value="100" oninput="updateItem()">
        </div>
        
        <div>
            <label>Rotate</label>
            <input type="range" id="rotateRange" min="0" max="6.28" step="0.01" value="0" oninput="updateItem()">
        </div>
        
        <label>Color</label>
        <input type="color" id="colorInput" value="#ff0000" oninput="updateItem()">
        
        <button class="btn btn-danger" onclick="deleteLayer()">🗑️ Remove Selected</button>
    </div>

    <button class="btn btn-main" onclick="downloadHD()">💾 DOWNLOAD 4K MUG PRINT</button>
    <div style="text-align:center; font-size:10px; color:#555; margin-top:5px;">SANGANER GITHUB SYSTEM</div>
</div>

<div id="main-view">
    <canvas id="editor"></canvas>
    <p class="hint">Use Mouse/Touch to Move. Use Sidebar to Rotate & Resize.</p>
</div>

<script>
    const canvas = document.getElementById('editor');
    const ctx = canvas.getContext('2d');
    
    let layers = [];
    let selected = null;
    let baseImg = new Image();
    let mode = 'crop'; // crop or edit
    let frame = { x: 100, y: 100, w: 300, h: 200 };
    let isDragging = false, startX, startY;

    // 1. Base Image Upload & Crop System
    document.getElementById('baseUpload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            baseImg.onload = () => {
                canvas.width = 800;
                canvas.height = (baseImg.height/baseImg.width)*800;
                mode = 'crop';
                document.getElementById('cutBtn').style.display = 'block';
                draw();
            };
            baseImg.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 2. Extra Image/Logo Add System
    document.getElementById('logoUpload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                const l = { type:'img', data: img, x: 100, y: 100, w: 200, h: (img.height/img.width)*200, rot: 0 };
                layers.push(l);
                selected = l;
                showPanel();
                draw();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function extractDesign() {
        const temp = document.createElement('canvas');
        const tctx = temp.getContext('2d');
        const sx = baseImg.width / canvas.width;
        const sy = baseImg.height / canvas.height;
        temp.width = frame.w * sx; temp.height = frame.h * sy;
        tctx.drawImage(baseImg, frame.x*sx, frame.y*sy, frame.w*sx, frame.h*sy, 0, 0, temp.width, temp.height);
        
        const extImg = new Image();
        extImg.onload = () => {
            layers.push({ type:'img', data: extImg, x: 100, y: 50, w: 500, h: (extImg.height/extImg.width)*500, rot: 0 });
            mode = 'edit';
            canvas.width = 1000; canvas.height = 450;
            document.getElementById('cutBtn').style.display = 'none';
            draw();
        };
        extImg.src = temp.toDataURL();
    }

    function addNewText() {
        const l = { type:'text', content: 'New Text', x: 400, y: 200, size: 50, color: '#ff0000', rot: 0, w: 200, h: 50 };
        layers.push(l);
        selected = l;
        showPanel();
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.fillRect(0,0, canvas.width, canvas.height);

        if(mode === 'crop' && baseImg.src) {
            ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 3;
            ctx.strokeRect(frame.x, frame.y, frame.w, frame.h);
            // Handles
            ctx.fillStyle = "#00ff88";
            ctx.fillRect(frame.x-5, frame.y-5, 10, 10);
            ctx.fillRect(frame.x+frame.w-5, frame.y+frame.h-5, 10, 10);
        }

        layers.forEach(l => {
            ctx.save();
            ctx.translate(l.x + l.w/2, l.y + l.h/2);
            ctx.rotate(l.rot);
            if(l.type === 'img') {
                ctx.drawImage(l.data, -l.w/2, -l.h/2, l.w, l.h);
            } else {
                ctx.fillStyle = l.color;
                ctx.font = `bold ${l.size}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(l.content, 0, l.size/3);
            }
            if(l === selected) {
                ctx.strokeStyle = "#00e5ff"; ctx.lineWidth = 2;
                ctx.strokeRect(-l.w/2 - 5, -l.h/2 - 5, l.w + 10, l.h + 10);
            }
            ctx.restore();
        });
    }

    // Interactive Logic
    canvas.onmousedown = (e) => {
        const r = canvas.getBoundingClientRect();
        const mx = (e.clientX - r.left) * (canvas.width/r.width);
        const my = (e.clientY - r.top) * (canvas.height/r.height);

        if(mode === 'crop') {
            isDragging = true;
        } else {
            selected = null;
            document.getElementById('editPanel').style.display = 'none';
            for(let i=layers.length-1; i>=0; i--) {
                let l = layers[i];
                if(mx > l.x && mx < l.x+l.w && my > l.y && my < l.y+l.h) {
                    selected = l;
                    isDragging = true;
                    showPanel();
                    break;
                }
            }
        }
        startX = mx; startY = my;
        draw();
    };

    canvas.onmousemove = (e) => {
        if(!isDragging) return;
        const r = canvas.getBoundingClientRect();
        const mx = (e.clientX - r.left) * (canvas.width/r.width);
        const my = (e.clientY - r.top) * (canvas.height/r.height);

        if(mode === 'crop') {
            frame.w = mx - frame.x; frame.h = my - frame.y;
        } else if(selected) {
            selected.x += (mx - startX);
            selected.y += (my - startY);
        }
        startX = mx; startY = my;
        draw();
    };

    window.onmouseup = () => isDragging = false;

    // Sidebar Update System
    function showPanel() {
        const p = document.getElementById('editPanel');
        p.style.display = 'block';
        if(selected.type === 'text') {
            document.getElementById('textInput').style.display = 'block';
            document.getElementById('textInput').value = selected.content;
            document.getElementById('colorInput').value = selected.color;
        } else {
            document.getElementById('textInput').style.display = 'none';
        }
        document.getElementById('sizeRange').value = selected.type === 'text' ? selected.size : selected.w;
        document.getElementById('rotateRange').value = selected.rot;
    }

    function updateItem() {
        if(!selected) return;
        if(selected.type === 'text') {
            selected.content = document.getElementById('textInput').value;
            selected.size = parseInt(document.getElementById('sizeRange').value);
            selected.color = document.getElementById('colorInput').value;
            selected.w = ctx.measureText(selected.content).width * (selected.size/20); // rough estimation
        } else {
            const oldW = selected.w;
            selected.w = parseInt(document.getElementById('sizeRange').value);
            selected.h = selected.h * (selected.w / oldW);
        }
        selected.rot = parseFloat(document.getElementById('rotateRange').value);
        draw();
    }

    function deleteLayer() {
        layers = layers.filter(l => l !== selected);
        selected = null;
        document.getElementById('editPanel').style.display = 'none';
        draw();
    }

    function downloadHD() {
        const hd = document.createElement('canvas');
        hd.width = 4000; hd.height = 1800; // 4K Resolution
        const hctx = hd.getContext('2d');
        const s = 4000 / canvas.width;

        hctx.fillStyle = "white"; hctx.fillRect(0,0,4000,1800);

        layers.forEach(l => {
            hctx.save();
            hctx.translate((l.x + l.w/2)*s, (l.y + l.h/2)*s);
            hctx.rotate(l.rot);
            if(l.type === 'img') {
                hctx.drawImage(l.data, (-l.w/2)*s, (-l.h/2)*s, l.w*s, l.h*s);
            } else {
                hctx.fillStyle = l.color;
                hctx.font = `bold ${l.size*s}px Arial`;
                hctx.textAlign = "center";
                hctx.fillText(l.content, 0, (l.size/3)*s);
            }
            hctx.restore();
        });
        const link = document.createElement('a');
        link.download = "Sainiwala_Mug_4K.png";
        link.href = hd.toDataURL("image/png", 1.0);
        link.click();
    }
</script>
</body>
</html>
