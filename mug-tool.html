<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa Mug Tool FINAL</title>

<style>
body{
 font-family:Arial;
 background:linear-gradient(135deg,#ff512f,#dd2476);
 color:#fff;
 text-align:center;
 padding:20px;
}
.container{
 max-width:1100px;
 margin:auto;
 background:#111;
 padding:20px;
 border-radius:12px;
}
input,select,button{
 padding:10px;
 margin:6px;
 border:none;
 border-radius:6px;
}
button{
 background:#00e5ff;
 color:#000;
 font-weight:bold;
 cursor:pointer;
}
canvas{
 margin-top:20px;
 max-width:100%;
 border:2px solid #fff;
 border-radius:10px;
 touch-action:none;
}
</style>
</head>

<body>
<div class="container">

<h1>☕ Sainiwalaa Mug Tool PRO</h1>

<input type="file" id="upload" accept="image/*"><br>

<button onclick="toggleImageMode()">Single / Double</button>

<input type="file" id="imgLayerUpload" accept="image/*">
<button onclick="deleteImageLayer()">Delete Image</button><br>

<input type="text" id="textInput" placeholder="Enter text">
<button onclick="addText()">Add Text</button>
<button onclick="deleteText()">Delete Text</button><br>

<button onclick="processSelection()">Generate Print</button>
<button onclick="downloadImage()">Download PNG</button>

<canvas id="canvas"></canvas>

</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
let img=new Image();

let rect={x:100,y:100,w:400,h:250};
let images=[];
let texts=[];
let selectedImage=null;
let selectedText=null;
let action=null,startX,startY;

// MAIN IMAGE
document.getElementById('upload').addEventListener('change',function(e){
 if(e.target.files && e.target.files[0]){
   let reader=new FileReader();
   reader.onload=function(ev){
     img.onload=function(){
       canvas.width=img.width;
       canvas.height=img.height;
       draw();
     }
     img.src=ev.target.result;
   }
   reader.readAsDataURL(e.target.files[0]);
 }
});

// IMAGE LAYER
document.getElementById('imgLayerUpload').addEventListener('change',function(e){
 let file=e.target.files[0];
 let reader=new FileReader();

 reader.onload=function(ev){
   let newImg=new Image();
   newImg.onload=function(){
     images.push({
       img:newImg,
       x:rect.x+20,
       y:rect.y+20,
       w:rect.w/2,
       h:rect.h/2,
       mode:'single'
     });
     draw();
   }
   newImg.src=ev.target.result;
 }

 reader.readAsDataURL(file);
});

// DRAW
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(img.src){
   ctx.drawImage(img,0,0);
 }

 // FRAME
 ctx.strokeStyle='yellow';
 ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);

 // IMAGE
 images.forEach(im=>{
   if(im.mode==='double'){
     ctx.drawImage(im.img,rect.x,im.y,im.w,im.h);
     ctx.drawImage(im.img,rect.x+rect.w-im.w,im.y,im.w,im.h);
   }else{
     ctx.drawImage(im.img,im.x,im.y,im.w,im.h);
   }
 });

 // TEXT
 texts.forEach(t=>{
   ctx.fillStyle="#fff";
   ctx.font="40px Arial";
   ctx.fillText(t.text,t.x,t.y);
 });
}

// TEXT
function addText(){
 texts.push({text:textInput.value,x:200,y:200});
 draw();
}

function deleteText(){
 texts.pop();
 draw();
}

// IMAGE DELETE
function deleteImageLayer(){
 images.pop();
 draw();
}

// DOUBLE MODE
function toggleImageMode(){
 if(images.length>0){
   images[images.length-1].mode =
   images[images.length-1].mode==='single'?'double':'single';
   draw();
 }
}

// EXPORT
function processSelection(){
 let temp=document.createElement('canvas');
 let tctx=temp.getContext('2d');

 temp.width=rect.w;
 temp.height=rect.h;

 tctx.drawImage(canvas,rect.x,rect.y,rect.w,rect.h,0,0,rect.w,rect.h);

 canvas.width=2700;
 canvas.height=1200;

 ctx.drawImage(temp,0,0,canvas.width,canvas.height);
}

function downloadImage(){
 let link=document.createElement('a');
 link.download='mug.png';
 link.href=canvas.toDataURL('image/png');
 link.click();
}
</script>

</body>
</html>
