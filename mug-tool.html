<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa Mug Tool PRO++</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#ff512f,#dd2476);color:#fff;text-align:center;padding:20px}
.container{max-width:950px;margin:auto;background:#111;padding:20px;border-radius:12px}
input,select,button{padding:10px;margin:6px;border:none;border-radius:6px}
button{background:#00e5ff;color:#000;font-weight:bold;cursor:pointer}
canvas{margin-top:20px;max-width:100%;border:2px solid #fff;border-radius:10px;touch-action:none}
</style>
</head>
<body>
<div class="container">
<h1>☕ Sainiwalaa Mug Tool PRO++</h1>
<p>Full Control • Resize • Text Edit • Drag Everything</p>

<input type="file" id="upload" accept="image/*"><br>

<input type="text" id="textInput" placeholder="Enter text">
<input type="color" id="textColor" value="#ffffff">
<button onclick="addText()">Add Text</button><br>

<button onclick="processSelection()">Generate Print</button>
<button onclick="downloadImage()">Download PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
let img=new Image();

let rect={x:200,y:200,w:300,h:200};
let texts=[];
let action=null;
let selectedText=null;
let startX,startY;

function loadImage(file){
 let reader=new FileReader();
 reader.onload=e=>{
  img.onload=()=>{
   canvas.width=img.width;
   canvas.height=img.height;
   draw();
  }
  img.src=e.target.result;
 }
 reader.readAsDataURL(file);
}

document.getElementById('upload').addEventListener('change',e=>loadImage(e.target.files[0]));

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(img,0,0);

 // frame
 ctx.strokeStyle='yellow';
 ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);

 // texts
 texts.forEach(t=>{
  ctx.fillStyle=t.color;
  ctx.font=t.size+'px Arial';
  ctx.fillText(t.text,t.x,t.y);
 });
}

function addText(){
 let text=document.getElementById('textInput').value;
 let color=document.getElementById('textColor').value;
 texts.push({text,x:150,y:150,size:50,color});
 draw();
}

function getPos(e){
 let r=canvas.getBoundingClientRect();
 return {
  x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
  y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
 }
}

canvas.onmousedown=start;
canvas.onmousemove=move;
canvas.onmouseup=()=>{action=null;selectedText=null};
canvas.ontouchstart=start;
canvas.ontouchmove=move;
canvas.ontouchend=()=>{action=null;selectedText=null};

function start(e){
 let p=getPos(e);
 startX=p.x; startY=p.y;

 // check text select
 selectedText=null;
 texts.forEach(t=>{
  let w=ctx.measureText(t.text).width;
  let h=t.size;
  if(p.x>t.x && p.x<t.x+w && p.y<t.y && p.y>t.y-h){
    selectedText=t;
    action='textMove';
  }
 });

 if(!selectedText){
  if(p.x>rect.x && p.x<rect.x+rect.w && p.y>rect.y && p.y<rect.y+rect.h){
    action='move';
  }
 }
}

function move(e){
 if(!action) return;
 e.preventDefault();
 let p=getPos(e);
 let dx=p.x-startX;
 let dy=p.y-startY;

 if(action==='move'){
  rect.x+=dx;
  rect.y+=dy;
 }

 if(action==='textMove' && selectedText){
  selectedText.x+=dx;
  selectedText.y+=dy;
 }

 startX=p.x;
 startY=p.y;
 draw();
}

function processSelection(){
 let temp=document.createElement('canvas');
 let tctx=temp.getContext('2d');

 temp.width=rect.w;
 temp.height=rect.h;

 tctx.imageSmoothingEnabled=true;
 tctx.imageSmoothingQuality='high';

 tctx.drawImage(canvas,rect.x,rect.y,rect.w,rect.h,0,0,rect.w,rect.h);

 canvas.width=2700;
 canvas.height=1200;

 ctx.imageSmoothingEnabled=true;
 ctx.imageSmoothingQuality='high';

 ctx.drawImage(temp,0,0,canvas.width,canvas.height);
}

function downloadImage(){
 let link=document.createElement('a');
 link.download='sainiwalaa-mug.png';
 link.href=canvas.toDataURL('image/png',1.0);
 link.click();
}
</script>
</body>
</html>
