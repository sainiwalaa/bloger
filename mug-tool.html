<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mug Tool - Ultimate UI PRO</title>
<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;padding:20px}
.container{max-width:900px;margin:auto}
input,button{padding:10px;margin:8px;border:none;border-radius:6px}
button{background:#00e5ff;color:#000;font-weight:bold;cursor:pointer}
canvas{margin-top:20px;max-width:100%;border:1px solid #444;touch-action:none}
</style>
</head>
<body>
<div class="container">
<h1>☕ Mug Tool - UI PRO</h1>
<p>Drag ✔ Resize ✔ Rotate ✔ Mobile Friendly ✔</p>

<input type="file" id="upload" accept="image/*"><br>
<button onclick="processSelection()">Generate Print</button>
<button onclick="downloadImage()">Download PNG</button>

<canvas id="canvas"></canvas>
</div>

<script>
let canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
let img=new Image();

let rect={x:200,y:200,w:300,h:200,angle:0};
let action=null;
let startX,startY;

function loadImage(file){
 let reader=new FileReader();
 reader.onload=e=>{
  img.onload=()=>{
   canvas.width=img.width;
   canvas.height=img.height;
   draw();
  }
  img.src=e.target.result;
 }
 reader.readAsDataURL(file);
}

document.getElementById('upload').addEventListener('change',e=>{
 loadImage(e.target.files[0]);
});

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(img,0,0);

 ctx.save();
 ctx.translate(rect.x,rect.y);
 ctx.rotate(rect.angle);

 ctx.strokeStyle='red';
 ctx.lineWidth=2;
 ctx.strokeRect(-rect.w/2,-rect.h/2,rect.w,rect.h);

 // resize handle
 ctx.fillStyle='yellow';
 ctx.fillRect(rect.w/2-10,rect.h/2-10,20,20);

 // rotate handle
 ctx.fillStyle='cyan';
 ctx.fillRect(-10,-rect.h/2-30,20,20);

 ctx.restore();
}

function getTouchPos(e){
 let rectCanvas=canvas.getBoundingClientRect();
 return {
  x:(e.touches?e.touches[0].clientX:e.clientX)-rectCanvas.left,
  y:(e.touches?e.touches[0].clientY:e.clientY)-rectCanvas.top
 }
}

canvas.addEventListener('mousedown',start);
canvas.addEventListener('mousemove',move);
canvas.addEventListener('mouseup',stop);

canvas.addEventListener('touchstart',start);
canvas.addEventListener('touchmove',move);
canvas.addEventListener('touchend',stop);

function start(e){
 let pos=getTouchPos(e);
 startX=pos.x;
 startY=pos.y;

 // detect zones
 let dx=startX-rect.x;
 let dy=startY-rect.y;

 if(Math.abs(dx-rect.w/2)<20 && Math.abs(dy-rect.h/2)<20){
  action='resize';
 }
 else if(Math.abs(dx)<20 && Math.abs(dy+rect.h/2+30)<20){
  action='rotate';
 }
 else{
  action='move';
 }
}

function move(e){
 if(!action) return;
 e.preventDefault();

 let pos=getTouchPos(e);
 let dx=pos.x-startX;
 let dy=pos.y-startY;

 if(action==='move'){
  rect.x+=dx;
  rect.y+=dy;
 }

 if(action==='resize'){
  rect.w+=dx;
  rect.h+=dy;
 }

 if(action==='rotate'){
  rect.angle+=dx*0.01;
 }

 startX=pos.x;
 startY=pos.y;
 draw();
}

function stop(){action=null;}

function processSelection(){
 let temp=document.createElement('canvas');
 let tctx=temp.getContext('2d');

 temp.width=rect.w;
 temp.height=rect.h;

 tctx.translate(rect.w/2,rect.h/2);
 tctx.rotate(rect.angle);
 tctx.drawImage(canvas,rect.x-rect.w/2,rect.y-rect.h/2,rect.w,rect.h,-rect.w/2,-rect.h/2,rect.w,rect.h);

 canvas.width=2700;
 canvas.height=1200;
 ctx.drawImage(temp,0,0,canvas.width,canvas.height);
}

function downloadImage(){
 let link=document.createElement('a');
 link.download='mug-print.png';
 link.href=canvas.toDataURL('image/png');
 link.click();
}
</script>
</body>
</html>
