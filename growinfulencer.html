<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainiwalaa Trending Feed</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

body{
background:#0f111a;
color:white;
font-family:Segoe UI;
}

.header{
background:linear-gradient(90deg,#000000,#111827);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:900;
color:#ffd000;
letter-spacing:2px;
}

.feed{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
padding:25px;
max-width:1400px;
margin:auto;
}

.card{
background:linear-gradient(145deg,#1b1f2e,#0f111a);
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.video-box{
aspect-ratio:9/16;
background:black;
position:relative;
}

.video-frame{
width:100%;
height:100%;
}

.play-btn{
position:absolute;
bottom:12px;
left:12px;
background:#ffd000;
color:black;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
}

.mute-btn{
position:absolute;
bottom:12px;
right:12px;
background:#00000080;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.buy{
display:block;
margin-top:12px;
text-align:center;
padding:12px;
background:white;
color:black;
font-weight:700;
border-radius:12px;
transition:.2s;
}

.buy:hover{
background:#ffd000;
}

.search{
background:#1b1f2e;
border:1px solid rgba(255,255,255,0.1);
padding:10px 15px;
border-radius:30px;
color:white;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header flex justify-between items-center p-4 sticky top-0 z-50">

<div class="logo">
<i class="fa-solid fa-crown"></i> SAINIWALAA
</div>

<input id="searchBox" class="search" placeholder="Search product...">

<div class="text-sm text-gray-400">
<i class="fa-solid fa-shield-halved text-green-400"></i> Trusted Deals
</div>

</div>


<div id="feed" class="feed"></div>


<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();
</script>


<script>

const API="https://script.google.com/macros/s/AKfycbzD61Fuj_TZqxNPiDjvbGMtY4OJoUPRbXQLxgJ6gAz7_mTM4prNNbfptbLhaONLvpm8/exec";

let ALL_DATA=[];
let players={};

function getID(url){

if(url.includes("shorts/"))
return url.split("shorts/")[1].split("?")[0];

if(url.includes("v="))
return url.split("v=")[1].split("&")[0];

return "";

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}


function render(data){

let html="";

data.forEach((p,i)=>{

html+=`

<div class="card" data-aos="fade-up">

<div class="video-box">

<div class="video-frame" id="video${i}"></div>

<div class="play-btn" onclick="playVideo(${i})">
<i class="fa-solid fa-play"></i>
</div>

<div class="mute-btn" onclick="toggleMute(${i})">
<i class="fa-solid fa-volume-xmark"></i>
</div>

</div>

<div class="p-4">

<div class="text-yellow-400 font-bold text-lg">
${p.videotitle}
</div>

<div class="text-gray-400 text-sm mt-1">
${p.desc}
</div>

<div class="flex justify-between items-center mt-3">

<div class="text-green-400 font-bold">
₹${p.price}
</div>

<a class="buy" href="${p.link}" target="_blank">
<i class="fa-solid fa-cart-shopping"></i> Buy Now
</a>

</div>

</div>

</div>

`;

});

document.getElementById("feed").innerHTML=html;

loadVideos(data);

}


async function load(){

let res=await fetch(API);

let data=await res.json();

ALL_DATA=shuffle(data);

render(ALL_DATA);

}


function loadVideos(data){

data.forEach((p,i)=>{

players[i]=new YT.Player("video"+i,{

videoId:getID(p.video),

playerVars:{
autoplay:0,
controls:0,
mute:1,
rel:0,
modestbranding:1
}

});

});

}


function playVideo(i){

Object.keys(players).forEach(key=>{

if(key!=i)
players[key].pauseVideo();

});

players[i].playVideo();

}


function toggleMute(i){

if(players[i].isMuted()){

players[i].unMute();

}else{

players[i].mute();

}

}


let tag=document.createElement("script");

tag.src="https://www.youtube.com/iframe_api";

document.body.appendChild(tag);

window.onYouTubeIframeAPIReady=load;



document.getElementById("searchBox").addEventListener("input",e=>{

let q=e.target.value.toLowerCase();

let filtered=ALL_DATA.filter(p=>

p.shopName.toLowerCase().includes(q) ||
p.videotitle.toLowerCase().includes(q)

);

render(filtered);

});


</script>

</body>
</html>
