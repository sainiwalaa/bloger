<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .glass-dark { background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px); }
        .v-frame { width: 100%; aspect-ratio: 9/16; background: #050505; position: relative; overflow: hidden; border-radius: 35px; border: 1px solid #1a1a1a; }
        .v-frame iframe, .v-frame video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; }
        .seek-bar { width: 100%; height: 4px; background: #222; position: relative; cursor: pointer; border-radius: 10px; }
        .seek-fill { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.1s linear; }
        .desc-gradient { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, transparent 100%); }
        ::-webkit-scrollbar { width: 0px; }
        .modal-scroll { max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .comment-box { max-height: 150px; overflow-y: auto; scrollbar-width: none; font-size: 10px; border-top: 1px solid #1a1a1a; margin-top: 10px; padding-top: 10px; }
        
        /* Profile Overlay Style */
        #profile-overlay { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        #profile-overlay.active { transform: translateY(0); }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; cursor: pointer; border: 0.5px solid #222; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[600] bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6 text-center">
            <h1 class="text-5xl font-black text-red-600 italic mb-8 tracking-tighter">SAINIWALAA</h1>
            <input type="text" id="reg-username" placeholder="Unique Username" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-black p-4 rounded-2xl text-xs uppercase">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 bg-red-600 text-white font-black p-4 rounded-2xl text-xs uppercase">Signup</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 z-[500] glass-dark flex items-center justify-center p-4 hidden">
        <div class="w-full max-w-md bg-[#111] border border-[#222] p-6 rounded-[35px] space-y-5 modal-scroll">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-black uppercase text-red-600 italic">Settings</h3>
                <button onclick="auth.signOut()" class="text-[9px] bg-red-900 px-3 py-1 rounded-full font-bold">LOGOUT</button>
            </div>

            <div class="space-y-4">
                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Username</label>
                <input type="text" id="edit-name" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                <p id="name-lock-info" class="text-[9px] text-yellow-600 mt-1 font-bold"></p>

                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Social Links</label>
                <input type="text" id="edit-ig" placeholder="Instagram Link" class="w-full p-2 bg-black border border-[#222] rounded-lg text-xs outline-none"/>
                <input type="text" id="edit-yt" placeholder="YouTube Link" class="w-full p-2 bg-black border border-[#222] rounded-lg text-xs outline-none"/>
                <input type="text" id="edit-fb" placeholder="Facebook Link" class="w-full p-2 bg-black border border-[#222] rounded-lg text-xs outline-none"/>

                <div class="p-3 bg-black rounded-2xl space-y-3">
                    <label class="text-[10px] text-gray-500 font-bold uppercase">Banner Style</label>
                    <div class="flex gap-2">
                        <button onclick="setBMode('img')" id="btn-bm-img" class="flex-1 bg-red-600 p-2 rounded-lg text-[9px] font-bold">IMAGE</button>
                        <button onclick="setBMode('color')" id="btn-bm-clr" class="flex-1 bg-[#222] p-2 rounded-lg text-[9px] font-bold">COLOR</button>
                    </div>
                    <div id="inp-bm-img"><input type="file" id="edit-banner-file" class="text-[9px]"/></div>
                    <div id="inp-bm-clr" class="hidden space-y-2">
                        <input type="color" id="edit-banner-color" class="w-full h-8 bg-transparent" value="#800000"/>
                        <input type="text" id="edit-banner-txt" placeholder="Banner Heading" class="w-full p-2 bg-[#111] text-xs rounded-lg outline-none"/>
                    </div>
                </div>

                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Profile Photo & Bio</label>
                <input type="file" id="edit-avatar-file" class="text-[9px] w-full"/>
                <textarea id="edit-bio" placeholder="Bio..." class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs h-16 outline-none"></textarea>
            </div>

            <div class="flex gap-2 pt-4">
                <button onclick="closeEdit()" class="flex-1 bg-[#222] p-3 rounded-xl font-bold text-xs uppercase">Cancel</button>
                <button onclick="saveProfile()" id="save-btn" class="flex-1 bg-red-600 p-3 rounded-xl font-bold text-xs uppercase">Save</button>
            </div>
        </div>
    </div>

    <div id="profile-overlay" class="fixed inset-0 z-[550] bg-black overflow-y-auto">
        <div class="max-w-md mx-auto min-h-screen relative pb-20">
            <button onclick="closeUserProfile()" class="absolute top-6 left-6 z-10 bg-black/50 p-2 rounded-full h-10 w-10"><i class="fa-solid fa-arrow-left"></i></button>
            
            <div id="u-banner" class="h-40 bg-zinc-900 overflow-hidden">
                <img id="u-banner-img" class="w-full h-full object-cover opacity-50"/>
            </div>
            
            <div class="px-6 -mt-10 flex flex-col items-center text-center">
                <img id="u-avatar" class="w-24 h-24 rounded-[30px] border-4 border-black bg-zinc-800 object-cover shadow-2xl"/>
                <h2 id="u-name" class="mt-3 text-xl font-black italic uppercase">Username</h2>
                <p id="u-bio" class="text-[11px] text-gray-400 mt-2 px-4 italic leading-tight">Bio goes here...</p>
                <div class="flex gap-5 mt-4 text-lg" id="u-socials"></div>
            </div>

            <div class="mt-8 px-1">
                <h4 class="px-5 mb-3 text-[10px] font-black uppercase tracking-[3px] text-red-600">Creations</h4>
                <div id="u-grid" class="profile-grid"></div>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto pb-24">
        <div class="relative">
            <div id="banner-box" class="h-44 w-full bg-[#111] overflow-hidden flex items-center justify-center">
                <img id="view-banner-img" class="w-full h-full object-cover opacity-60 hidden"/>
                <h1 id="view-banner-txt" class="text-4xl font-black italic uppercase">SAINIWALAA</h1>
            </div>
            <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                <div class="h-28 w-28 rounded-[35px] border-4 border-black overflow-hidden bg-[#111] shadow-2xl">
                    <img id="view-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-3">
                    <h2 id="view-name" class="text-2xl font-black italic uppercase leading-none">Creator</h2>
                    <p id="view-handle" class="text-[10px] text-red-600 font-black tracking-widest mt-1 uppercase">@username</p>
                </div>
            </div>
            <button onclick="openEdit()" class="absolute -bottom-10 right-6 bg-[#111] border border-[#222] px-5 py-2 rounded-full text-[10px] font-black uppercase">Edit</button>
        </div>

        <div class="mt-16 px-6 space-y-3">
            <p id="view-bio" class="text-xs text-gray-400 italic">No bio available.</p>
            <div class="flex gap-4 text-xl" id="view-socials">
                <a id="link-ig" href="#" class="hidden text-pink-600"><i class="fa-brands fa-instagram"></i></a>
                <a id="link-yt" href="#" class="hidden text-red-600"><i class="fa-brands fa-youtube"></i></a>
                <a id="link-fb" href="#" class="hidden text-blue-600"><i class="fa-brands fa-facebook"></i></a>
            </div>
        </div>

        <div id="owner-tools" class="px-6 mt-8 hidden">
            <div class="bg-[#0a0a0a] p-5 rounded-[30px] border border-[#1a1a1a] space-y-3 shadow-xl">
                <input type="text" id="v-id" placeholder="Video Link (YT/GitHub)" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                <input type="text" id="v-title" placeholder="Video Title" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none font-bold"/>
                <textarea id="v-desc" placeholder="Write description..." class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none h-16 resize-none"></textarea>
                <button onclick="publishNow()" id="pub-btn" class="w-full bg-red-600 p-4 rounded-2xl font-black text-xs uppercase transition-all active:scale-95">Publish Now</button>
            </div>
        </div>

        <div id="video-list" class="p-6 space-y-12"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let ytPlayers = {};
        let bMode = 'img';
        let userStats = {};

        // --- AUTH & LOAD ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                loadProfile(user.uid);
                loadVideos();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('owner-tools').classList.add('hidden');
            }
        });

        function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('reg-username').value;
            if(!email || !pass) return alert("Fill Email/Pass!");
            if(type === 'login') auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            else {
                if(!user) return alert("Set Username!");
                auth.createUserWithEmailAndPassword(email, pass).then(u => {
                    db.ref('users/' + u.user.uid).set({ username: user, nameChangeCount: 0, lastChangeDate: Date.now(), bMode: 'img' });
                }).catch(e => alert(e.message));
            }
        }

        // --- PROFILE SYSTEM ---
        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const d = snap.val() || {};
                userStats = d;
                document.getElementById('view-name').innerText = d.username || "Creator";
                document.getElementById('view-handle').innerText = "@" + (d.username || "user");
                document.getElementById('view-bio').innerText = d.bio || "No bio yet.";
                document.getElementById('view-avatar').src = d.avatar || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                
                const sl = ['ig', 'yt', 'fb'];
                sl.forEach(s => {
                    const el = document.getElementById('link-'+s);
                    if(d[s]) { el.href = d[s]; el.classList.remove('hidden'); } else { el.classList.add('hidden'); }
                });

                const nextChangeDate = d.lastChangeDate + (d.nameChangeCount === 1 ? 20*24*60*60*1000 : 90*24*60*60*1000);
                const canChange = Date.now() > nextChangeDate || !d.nameChangeCount;
                document.getElementById('name-lock-info').innerText = canChange ? "Name change available!" : "Locked until: " + new Date(nextChangeDate).toLocaleDateString();

                if(d.bMode === 'color') {
                    document.getElementById('banner-box').style.background = d.bColor || "#800000";
                    document.getElementById('view-banner-txt').innerText = d.bText || "SAINIWALAA";
                    document.getElementById('view-banner-txt').classList.remove('hidden');
                    document.getElementById('view-banner-img').classList.add('hidden');
                } else {
                    document.getElementById('view-banner-img').src = d.banner || "https://wallpaperaccess.com/full/1155013.jpg";
                    document.getElementById('view-banner-img').classList.remove('hidden');
                    document.getElementById('view-banner-txt').classList.add('hidden');
                    document.getElementById('banner-box').style.background = "#111";
                }
            });
        }

        async function saveProfile() {
            const uid = auth.currentUser.uid;
            const btn = document.getElementById('save-btn');
            const newName = document.getElementById('edit-name').value;
            
            let updateData = { 
                bio: document.getElementById('edit-bio').value,
                ig: document.getElementById('edit-ig').value,
                yt: document.getElementById('edit-yt').value,
                fb: document.getElementById('edit-fb').value,
                bMode: bMode
            };

            if(newName && newName !== userStats.username) {
                const nextChangeDate = userStats.lastChangeDate + (userStats.nameChangeCount === 1 ? 20*24*60*60*1000 : 90*24*60*60*1000);
                if(userStats.nameChangeCount > 0 && Date.now() < nextChangeDate) return alert("Username Locked!");
                updateData.username = newName;
                updateData.nameChangeCount = (userStats.nameChangeCount || 0) + 1;
                updateData.lastChangeDate = Date.now();
            }

            btn.innerText = "...";
            const av = document.getElementById('edit-avatar-file').files[0];
            if(av) updateData.avatar = await toBase64(av);
            if(bMode === 'img') {
                const bn = document.getElementById('edit-banner-file').files[0];
                if(bn) updateData.banner = await toBase64(bn);
            } else {
                updateData.bColor = document.getElementById('edit-banner-color').value;
                updateData.bText = document.getElementById('edit-banner-txt').value;
            }
            db.ref('users/' + uid).update(updateData).then(() => { btn.innerText = "SAVE"; closeEdit(); });
        }

        // --- FEED & COMMENTS ---
        function publishNow() {
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            if(!link || !title) return alert("Fill fields!");

            db.ref('videos').push({
                uid: auth.currentUser.uid,
                username: userStats.username,
                videoId: link.includes("github.com") ? link.replace("/blob/", "/raw/") : link,
                title: title,
                desc: document.getElementById('v-desc').value || "",
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('v-id').value = ""; document.getElementById('v-title').value = "";
            });
        }

        function loadVideos() {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('video-list');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    const likesCount = v.likes ? Object.keys(v.likes).length : 0;
                    const isLiked = v.likes && v.likes[auth.currentUser.uid] ? 'text-red-600' : 'text-gray-500';
                    let type = (v.videoId.includes('youtube') || v.videoId.includes
