<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .glass-dark { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); }
        .v-frame { width: 100%; aspect-ratio: 9/16; background: #000; position: relative; overflow: hidden; pointer-events: none; }
        .v-frame iframe, .v-frame video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .seek-bar { width: 100%; height: 5px; background: #222; position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; }
        .seek-fill { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div id="edit-modal" class="fixed inset-0 z-[300] glass-dark flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm bg-[#111] border border-[#222] p-6 rounded-[30px] space-y-4">
            <h3 class="text-lg font-black uppercase text-red-600">Edit Profile</h3>
            <input type="text" id="edit-banner" placeholder="Banner Image URL" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
            <input type="text" id="edit-avatar" placeholder="Avatar Image URL" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
            <textarea id="edit-bio" placeholder="Your Bio" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none h-20"></textarea>
            <input type="text" id="edit-ig" placeholder="Instagram Link" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
            <div class="flex gap-2">
                <button onclick="closeEdit()" class="flex-1 bg-[#222] p-3 rounded-xl font-bold text-xs">CANCEL</button>
                <button onclick="saveProfile()" class="flex-1 bg-red-600 p-3 rounded-xl font-bold text-xs text-white">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-4 text-center">
            <h1 class="text-5xl font-black text-red-600 italic mb-8">SAINIWALAA</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none"/>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none"/>
            <button onclick="handleAuth('login')" class="w-full bg-white text-black font-black p-4 rounded-2xl mb-2">LOGIN</button>
            <button onclick="handleAuth('signup')" class="text-xs text-gray-500 font-bold uppercase tracking-widest">Create New Account</button>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto pb-24">
        <div class="relative">
            <div class="h-40 w-full bg-[#111] overflow-hidden">
                <img id="user-banner" src="" class="w-full h-full object-cover opacity-60"/>
            </div>
            <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                <div class="h-28 w-28 rounded-[35px] border-4 border-black overflow-hidden bg-[#111]">
                    <img id="user-avatar" src="" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-3">
                    <h2 id="display-name" class="text-2xl font-black italic uppercase leading-none">Creator</h2>
                    <p id="user-handle" class="text-[10px] text-red-600 font-black tracking-widest uppercase mt-1">@handle</p>
                </div>
            </div>
            <button onclick="openEdit()" class="absolute -bottom-10 right-6 bg-[#111] border border-[#222] px-4 py-2 rounded-full text-[10px] font-black uppercase">Edit</button>
        </div>

        <div class="mt-16 px-6">
            <p id="user-bio" class="text-xs text-gray-400 leading-relaxed italic">Bio loading...</p>
            <div class="flex gap-5 mt-4 text-xl" id="social-links">
                <a href="#" id="link-ig" class="text-pink-600"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" id="link-tw" class="text-blue-500"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>

        <div id="owner-tools" class="px-6 mt-8 hidden">
            <div class="bg-[#0a0a0a] p-5 rounded-[30px] border border-[#1a1a1a]">
                <input type="text" id="v-id" placeholder="Paste Video/YT Link" class="w-full mb-3 p-3 bg-black border border-[#222] rounded-xl text-xs outline-none focus:border-red-600"/>
                <input type="text" id="v-title" placeholder="Title" class="w-full mb-4 p-3 bg-black border border-[#222] rounded-xl text-xs outline-none focus:border-red-600"/>
                <button onclick="publishNow()" class="w-full bg-red-600 p-3 rounded-xl font-black text-xs">PUBLISH TO FEED</button>
            </div>
        </div>

        <div id="video-list" class="p-6 space-y-10">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let ytPlayers = {};

        // --- AUTH & PROFILE ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                loadProfile(user.uid);
                loadVideos(user.uid);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('display-name').innerText = d.username || "Creator";
                document.getElementById('user-handle').innerText = "@" + (d.username || "creator");
                document.getElementById('user-bio').innerText = d.bio || "No bio yet.";
                document.getElementById('user-banner').src = d.banner || "https://wallpaperaccess.com/full/1155013.jpg";
                document.getElementById('user-avatar').src = d.avatar || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                document.getElementById('link-ig').href = d.ig || "#";
            });
        }

        function openEdit() { document.getElementById('edit-modal').classList.remove('hidden'); }
        function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }

        function saveProfile() {
            const uid = auth.currentUser.uid;
            db.ref('users/' + uid).update({
                banner: document.getElementById('edit-banner').value || "https://wallpaperaccess.com/full/1155013.jpg",
                avatar: document.getElementById('edit-avatar').value || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
                bio: document.getElementById('edit-bio').value,
                ig: document.getElementById('edit-ig').value
            }).then(() => closeEdit());
        }

        // --- VIDEO PLAYER LOGIC ---
        function loadVideos(uid) {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('video-list');
                const data = snap.val();
                list.innerHTML = "";
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    const isOwner = auth.currentUser && auth.currentUser.uid === v.uid;
                    let type = v.videoId.includes('youtube') || v.videoId.includes('youtu.be') ? 'yt' : 'direct';
                    
                    const card = `
                        <div class="v-card space-y-4">
                            <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-red-600 px-1">
                                <span>${v.username}</span>
                                ${isOwner ? `<button onclick="deleteVideo('${key}')">Remove</button>` : ''}
                            </div>
                            <div class="v-frame rounded-[25px] border border-[#222]">
                                ${type === 'yt' ? `<div id="yt-${key}"></div>` : `<video id="vid-${key}" src="${v.videoId.replace('blob','raw')}" loop playsinline></video>`}
                            </div>
                            <div class="space-y-4 px-2">
                                <div class="seek-bar" onclick="seek(event, '${key}', '${type}')"><div id="fill-${key}" class="seek-fill"></div></div>
                                <div class="flex justify-between items-center">
                                    <div class="flex gap-8 text-lg">
                                        <i class="fa-solid fa-play cursor-pointer" id="p-btn-${key}" onclick="togglePlay('${key}', '${type}')"></i>
                                        <i class="fa-solid fa-volume-xmark cursor-pointer" id="m-btn-${key}" onclick="toggleMute('${key}', '${type}')"></i>
                                    </div>
                                    <div class="flex gap-4 text-xs font-bold text-gray-500">
                                        <span><i class="fa-regular fa-heart"></i> ${v.likes || 0}</span>
                                        <span><i class="fa-regular fa-comment"></i></span>
                                    </div>
                                </div>
                                <p class="text-xs font-bold uppercase tracking-tight">${v.title}</p>
                            </div>
                        </div>`;
                    list.innerHTML += card;

                    if(type === 'yt') {
                        setTimeout(() => {
                            ytPlayers[key] = new YT.Player('yt-' + key, {
                                videoId: getYTID(v.videoId),
                                playerVars: { 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                                events: { 'onStateChange': (e) => {
                                    document.getElementById('p-btn-'+key).className = (e.data === 1) ? "fa-solid fa-pause" : "fa-solid fa-play";
                                    if(e.data === 1) startYTTrack(key);
                                }}
                            });
                        }, 500);
                    } else {
                        setTimeout(() => {
                            const vd = document.getElementById('vid-' + key);
                            vd.ontimeupdate = () => { document.getElementById('fill-'+key).style.width = (vd.currentTime/vd.duration)*100 + "%"; };
                        }, 500);
                    }
                });
            });
        }

        function getYTID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function togglePlay(key, type) {
            if(type === 'direct') {
                const v = document.getElementById('vid-'+key);
                if(v.paused) { stopAll(); v.play(); } else v.pause();
                document.getElementById('p-btn-'+key).className = v.paused ? "fa-solid fa-play" : "fa-solid fa-pause";
            } else {
                const p = ytPlayers[key];
                if(p.getPlayerState() === 1) p.pauseVideo(); else { stopAll(); p.playVideo(); }
            }
        }

        function toggleMute(key, type) {
            const btn = document.getElementById('m-btn-'+key);
            if(type === 'direct') {
                const v = document.getElementById('vid-'+key);
                v.muted = !v.muted;
                btn.className = v.muted ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
            } else {
                const p = ytPlayers[key];
                if(p.isMuted()) { p.unMute(); btn.className = "fa-solid fa-volume-high"; }
                else { p.mute(); btn.className = "fa-solid fa-volume-xmark"; }
            }
        }

        function stopAll() {
            Object.values(ytPlayers).forEach(p => p.pauseVideo());
            document.querySelectorAll('video').forEach(v => v.pause());
            document.querySelectorAll('.fa-pause').forEach(i => i.className = "fa-solid fa-play");
        }

        function startYTTrack(key) {
            const p = ytPlayers[key];
            const t = setInterval(() => {
                if(!p || p.getPlayerState() !== 1) { clearInterval(t); return; }
                document.getElementById('fill-'+key).style.width = (p.getCurrentTime()/p.getDuration())*100 + "%";
            }, 500);
        }

        function seek(e, key, type) {
            const rect = e.currentTarget.getBoundingClientRect();
            const per = (e.clientX - rect.left) / rect.width;
            if(type === 'direct') document.getElementById('vid-'+key).currentTime = document.getElementById('vid-'+key).duration * per;
            else ytPlayers[key].seekTo(ytPlayers[key].getDuration() * per);
        }

        function publishNow() {
            const user = auth.currentUser;
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            if(!link) return;
            db.ref('videos').push({ uid: user.uid, username: document.getElementById('display-name').innerText, videoId: link, title: title, timestamp: Date.now() });
            document.getElementById('v-id').value = ""; document.getElementById('v-title').value = "";
        }

        function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(type === 'login') auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            else auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + u.user.uid).set({ username: email.split('@')[0], bio: "New Creator", banner: "", avatar: "" });
            });
        }

        function deleteVideo(key) { if(confirm("Remove video?")) db.ref('videos/' + key).remove(); }
    </script>
</body>
</html>
