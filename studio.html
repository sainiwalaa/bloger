<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultmessages='false' b:layoutsVersion='3' b:responsive='true' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/2005/gml/data' xmlns:expr='http://www.google.com/2005/gml/expr'>
<head>
    <meta charset='UTF-8'/>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport'/>
    <title>SAINIWALAA | Creator Studio</title>
    
    <script src='https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js'></script>
    <script src='https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js'></script>
    <script src='https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css' rel='stylesheet'/>

    <b:skin><![CDATA[
        body { background: #0f0f0f; color: #fff; font-family: "Roboto", Arial, sans-serif; margin: 0; }
        .yt-input { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; color: #fff; outline: none; }
        .yt-input:focus { border-color: #3ea6ff; }
        
        /* YouTube Style Modal */
        .yt-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 90%; background: #0f0f0f; z-index: 1000; transition: 0.4s cubic-bezier(0,0,0,1); border-radius: 15px 15px 0 0; padding: 20px; border-top: 1px solid #333; }
        .yt-modal.active { bottom: 0; }
        
        /* Profile Section */
        .channel-banner { width: 100%; height: 120px; background: #222; background-size: cover; background-position: center; }
        .channel-info { padding: 0 16px; margin-top: -30px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .channel-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #0f0f0f; background: #333; background-size: cover; }
        
        /* Video Grid */
        .video-card { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 12px; overflow: hidden; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }
        .video-stats { position: absolute; bottom: 8px; left: 8px; font-size: 11px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }
        
        .tab-btn { padding: 10px 0; font-weight: 500; font-size: 14px; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #fff; }
        
        #blogger-fix { display: none !important; }
        .btn-blue { background: #3ea6ff; color: #000; padding: 8px 16px; border-radius: 18px; font-weight: 600; font-size: 14px; }
    ]]></b:skin>
</head>
<body>
    <div id='blogger-fix'><b:section id='main' maxwidgets='1'/></div>

    <div id="auth-ui" class="fixed inset-0 bg-[#0f0f0f] z-[9999] flex items-center justify-center p-6">
        <div class="w-full max-w-sm">
            <div class="text-center mb-10">
                <i class="fa-brands fa-youtube text-red-600 text-6xl"></i>
                <h1 class="text-2xl font-bold mt-4">Creator Studio</h1>
            </div>
            <input id="email" class="yt-input" placeholder="Email"/>
            <input id="pass" class="yt-input" placeholder="Password" type="password"/>
            <button onclick="authManager('login')" class="w-full bg-white text-black p-3 rounded-full font-bold mt-2">Sign in</button>
            <div class="flex justify-center gap-6 mt-6 text-sm text-[#3ea6ff]">
                <span onclick="authManager('reg')" class="cursor-pointer">Create account</span>
                <span onclick="authManager('reset')" class="cursor-pointer">Forgot?</span>
            </div>
        </div>
    </div>

    <div id="studio-content" class="hidden">
        <div id="p-banner" class="channel-banner"></div>
        <div class="channel-info">
            <div id="p-avatar" class="channel-avatar"></div>
            <h1 id="p-name" class="text-xl font-bold mt-2">Channel Name</h1>
            <p id="p-bio" class="text-[#aaa] text-xs mt-1">@handle • 0 subscribers</p>
            <div class="flex gap-2 mt-4">
                <button onclick="openEditProfile()" class="bg-[#272727] text-white px-4 py-1.5 rounded-full text-sm font-bold">Edit Profile</button>
                <button onclick="firebase.auth().signOut().then(()=>location.reload())" class="bg-[#272727] text-white px-4 py-1.5 rounded-full text-sm font-bold">Sign out</button>
            </div>
        </div>

        <div class="flex justify-around mt-6 border-b border-[#333]">
            <span class="tab-btn active">SHORTS</span>
            <span class="tab-btn" onclick="alert('Analytics coming soon')">ANALYTICS</span>
            <span class="tab-btn" onclick="alert('Orders coming soon')">ORDERS</span>
        </div>

        <div id="my-grid" class="p-2 grid grid-cols-3 gap-1">
            </div>
    </div>

    <button onclick="openUploadModal()" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#272727] p-3 px-6 rounded-full border border-[#444] shadow-2xl z-50 flex items-center gap-2">
        <i class="fa-solid fa-plus text-xl"></i>
        <span class="font-bold text-sm">Create</span>
    </button>

    <div id="upload-modal" class="yt-modal">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">Create Short</h2>
            <i class="fa-solid fa-xmark text-xl" onclick="closeModal('upload-modal')"></i>
        </div>
        <div class="overflow-y-auto h-[80%]">
            <p class="text-xs text-[#aaa] mb-2 font-bold uppercase">Details</p>
            <input id="post-title" class="yt-input" placeholder="Title (required)"/>
            <textarea id="post-desc" class="yt-input h-20" placeholder="Description"></textarea>
            <input id="prod-link" class="yt-input" placeholder="Product link (optional)"/>
            
            <div class="bg-[#1a1a1a] p-6 rounded-xl border-2 border-dashed border-[#333] text-center mb-6">
                <i class="fa-solid fa-cloud-arrow-up text-3xl mb-2 text-[#aaa]"></i>
                <p class="text-sm text-[#aaa]">Select video file</p>
                <input id="post-file" type="file" accept="video/*" class="hidden" onchange="this.nextElementSibling.innerText = this.files[0].name"/>
                <label for="post-file" class="text-[#3ea6ff] text-sm mt-2 block cursor-pointer">Choose File</label>
                <p class="text-xs mt-1 text-zinc-600">Max 90s • 15MB</p>
            </div>
            
            <button id="publish-btn" onclick="publishPost()" class="w-full bg-[#3ea6ff] text-black p-3 rounded-full font-bold">NEXT</button>
        </div>
    </div>

    <div id="profile-modal" class="yt-modal">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">Channel Settings</h2>
            <i class="fa-solid fa-xmark text-xl" onclick="closeModal('profile-modal')"></i>
        </div>
        <input id="edit-name" class="yt-input" placeholder="Name"/>
        <input id="edit-bio" class="yt-input" placeholder="Bio"/>
        <input id="edit-avatar" class="yt-input" placeholder="Profile Image URL"/>
        <input id="edit-banner" class="yt-input" placeholder="Banner Image URL"/>
        <button onclick="saveProfile()" class="w-full bg-white text-black p-3 rounded-full font-bold">Save Changes</button>
    </div>

    <script>
    //<![CDATA[
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isUploading = false;

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('studio-content').classList.remove('hidden');
                loadUserProfile(user.uid);
                loadUserPosts(user.uid);
            }
        });

        async function authManager(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Please fill all fields");
            try {
                if(type==='login') await auth.signInWithEmailAndPassword(e,p);
                if(type==='reg') {
                    const res = await auth.createUserWithEmailAndPassword(e,p);
                    await db.ref('users/' + res.user.uid).set({
                        name: e.split('@')[0],
                        bio: "Welcome to my channel",
                        avatar: "https://www.w3schools.com/howto/img_avatar.png",
                        banner: "https://via.placeholder.com/1200x400/222/555"
                    });
                }
                if(type==='reset') { await auth.sendPasswordResetEmail(e); alert("Reset link sent!"); }
            } catch(err) { alert(err.message); }
        }

        function loadUserProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const u = snap.val();
                if(!u) return;
                document.getElementById('p-name').innerText = u.name;
                document.getElementById('p-bio').innerText = u.bio;
                document.getElementById('p-avatar').style.backgroundImage = `url('${u.avatar}')`;
                document.getElementById('p-banner').style.backgroundImage = `url('${u.banner}')`;
            });
        }

        function openEditProfile() { document.getElementById('profile-modal').classList.add('active'); }

        async function saveProfile() {
            const uid = auth.currentUser.uid;
            await db.ref('users/' + uid).update({
                name: document.getElementById('edit-name').value,
                bio: document.getElementById('edit-bio').value,
                avatar: document.getElementById('edit-avatar').value,
                banner: document.getElementById('edit-banner').value
            });
            closeModal('profile-modal');
        }

        async function publishPost() {
            if(isUploading) return;
            const file = document.getElementById('post-file').files[0];
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const link = document.getElementById('prod-link').value;
            const btn = document.getElementById('publish-btn');

            if(!file || !title) return alert("Select Video & Enter Title");
            if(file.size > 15 * 1024 * 1024) return alert("File too large! Max 15MB");

            isUploading = true;
            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    await db.ref('videos').push({
                        uid: auth.currentUser.uid,
                        username: document.getElementById('p-name').innerText,
                        title: title,
                        desc: desc,
                        productLink: link || '#',
                        videoUrl: reader.result,
                        timestamp: Date.now()
                    });
                    alert("Short Published!");
                    location.reload();
                } catch(e) { 
                    alert(e.message); 
                    isUploading = false;
                    btn.innerText = "NEXT";
                }
            };
        }

        function loadUserPosts(uid) {
            db.ref('videos').orderByChild('uid').equalTo(uid).on('value', snap => {
                const grid = document.getElementById('my-grid');
                grid.innerHTML = '';
                snap.forEach(c => {
                    const v = c.val();
                    grid.innerHTML += `
                    <div class="video-card">
                        <video src="${v.videoUrl}" muted onmouseover="this.play()" onmouseout="this.pause()"></video>
                        <div class="video-stats"><i class="fa-solid fa-chart-simple"></i> Live</div>
                        <button onclick="deletePost('${c.key}')" class="absolute top-1 right-1 bg-black/50 w-6 h-6 rounded flex items-center justify-center text-xs text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        function deletePost(k) {
            if(confirm("Delete this short?")) db.ref('videos/'+k).remove();
        }

        function openUploadModal() { document.getElementById('upload-modal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    //]]>
    </script>
</body>
</html>
