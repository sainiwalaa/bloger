<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Creator Studio | SAINIWALAA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; }
        .premium-input { background: #111; border: 1px solid #333; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: none; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; padding: 25px; }
        .modal.active { display: block; }
        .post-preview { aspect-ratio: 9/16; background: #111; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #222; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-ui" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-4xl font-black text-red-600 italic mb-8">SAINIWALAA</h1>
            <input id="email" class="premium-input" placeholder="Email" type="email"/>
            <input id="pass" class="premium-input" placeholder="Password" type="password"/>
            <button onclick="authManager('login')" class="w-full bg-red-600 p-4 rounded-xl font-bold mb-4">LOGIN</button>
            <div class="flex justify-between text-[10px] text-zinc-500 font-black">
                <span onclick="authManager('reg')">REGISTER</span>
                <span onclick="authManager('reset')">FORGOT PASSWORD</span>
            </div>
        </div>
    </div>

    <div class="p-5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-lg border-b border-white/5">
        <h2 class="text-xl font-black italic text-red-600">STUDIO</h2>
        <button onclick="firebase.auth().signOut().then(()=>location.reload())" class="text-zinc-500"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <div id="my-grid" class="p-4 grid grid-cols-2 gap-3">
        </div>

    <button onclick="document.getElementById('upload-modal').classList.add('active')" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-red-600 w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-xl shadow-red-600/20">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="upload-modal" class="modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">NEW PRODUCTION</h2>
            <i class="fa-solid fa-xmark text-2xl" onclick="this.parentElement.parentElement.classList.remove('active')"></i>
        </div>
        <input id="p-title" class="premium-input" placeholder="Title (Max 50 chars)"/>
        <input id="p-link" class="premium-input" placeholder="Product URL (Amazon/Flipkart)"/>
        <p class="text-xs text-zinc-500 mb-2 font-bold">SELECT VIDEO FILE:</p>
        <input id="p-file" type="file" accept="video/*" class="premium-input"/>
        <button id="up-btn" onclick="startUpload()" class="w-full bg-white text-black font-black p-5 rounded-2xl mt-4">PUBLISH TO FEED</button>
    </div>

    <script>
    //<![CDATA[
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                loadUserPosts(user.uid);
            }
        });

        async function authManager(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(type==='login') await auth.signInWithEmailAndPassword(e,p);
                if(type==='reg') await auth.createUserWithEmailAndPassword(e,p);
                if(type==='reset') { await auth.sendPasswordResetEmail(e); alert("Check Email!"); }
            } catch(err) { alert(err.message); }
        }

        async function startUpload() {
            const file = document.getElementById('p-file').files[0];
            const title = document.getElementById('p-title').value;
            const link = document.getElementById('p-link').value;
            const btn = document.getElementById('up-btn');

            if(!file || !title) return alert("Select Video & Enter Title");
            if(file.size > 15 * 1024 * 1024) return alert("Video too large! Max 15MB");

            btn.innerText = "Processing Data...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await db.ref('videos').push({
                    uid: auth.currentUser.uid,
                    username: auth.currentUser.email.split('@')[0],
                    title: title,
                    productLink: link || '#',
                    videoUrl: reader.result,
                    timestamp: Date.now()
                });
                alert("Published!");
                location.reload();
            };
        }

        function loadUserPosts(uid) {
            db.ref('videos').orderByChild('uid').equalTo(uid).on('value', snap => {
                const grid = document.getElementById('my-grid');
                grid.innerHTML = '';
                snap.forEach(c => {
                    const v = c.val();
                    grid.innerHTML += `
                    <div class="post-preview">
                        <video src="${v.videoUrl}" class="w-full h-full object-cover" muted></video>
                        <button onclick="deletePost('${c.key}')" class="absolute top-2 right-2 bg-black/60 p-2 rounded-lg text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        function deletePost(k) {
            if(confirm("Permanently delete video?")) db.ref('videos/'+k).remove();
        }
    //]]>
    </script>
</body>
</html>
