            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none">
            
            <button onclick="handleAuth('login')" id="btn-login" class="w-full btn-premium p-5 rounded-2xl font-black uppercase text-white">Login Studio</button>
            
            <div class="flex justify-between px-2">
                <button onclick="handleAuth('register')" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Create Account</button>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
        databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
        projectId: "sainiwalaainfulencer",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    
    let userID = null; // Login ke baad set hoga

    // Authentication Logic
    auth.onAuthStateChanged(user => {
        if (user) {
            userID = user.uid;
            document.getElementById('auth-modal').style.display = 'none';
            initStudio(); // Studio load karo
        } else {
            document.getElementById('auth-modal').style.display = 'block';
        }
    });

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const btn = document.getElementById('btn-login');

        if(!email) return alert("Please enter email");

        try {
            if(type === 'login') {
                await auth.signInWithEmailAndPassword(email, pass);
            } else if(type === 'register') {
                if(pass.length < 6) return alert("Password should be 6+ chars");
                await auth.createUserWithEmailAndPassword(email, pass);
                alert("Account Created! Welcome.");
            } else if(type === 'reset') {
                await auth.sendPasswordResetEmail(email);
                alert("Password reset link sent to your email!");
            }
        } catch (error) {
            alert(error.message);
        }
    }

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    // Aapka sara existing data loading logic 'initStudio' function ke andar
    function initStudio() {
        // Load Profile
        db.ref('users/' + userID).on('value', snap => {
            const u = snap.val() || {};
            document.getElementById('display-name').innerText = u.name || "New Creator";
            // ... (baaki sara purana code yahan)
        });

        // Load Videos
        db.ref('videos').orderByChild('uid').equalTo(userID).on('value', snap => {
            // ... (aapka purana videos wala code)
        });

        // Load Orders
        db.ref('orders').on('value', snap => {
            // ... (aapka purana orders wala code)
        });
    }

    // Existing UI Functions (openModal, switchTab, etc.) wahi rahenge...
</script>
