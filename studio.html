<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-[#d4af37] text-2xl font-black text-center mb-8 italic uppercase">Creator Studio</h1>
        
        <div class="bg-[#111] p-6 rounded-[30px] border border-[#222] space-y-4">
            <input type="text" id="v-id" placeholder="Paste YouTube Link" class="w-full p-4 bg-black border border-[#333] rounded-2xl outline-none focus:border-[#d4af37]"/>
            <input type="text" id="v-title" placeholder="Title" class="w-full p-4 bg-black border border-[#333] rounded-2xl outline-none focus:border-[#d4af37]"/>
            <button id="pub-btn" onclick="publishNow()" class="w-full bg-[#d4af37] text-black font-black p-5 rounded-3xl active:scale-95 transition-all">
                PUBLISH NOW
            </button>
            <div id="debug-msg" class="text-[10px] text-center text-gray-500 uppercase">System Ready</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            projectId: "sainiwalaainfulencer",
            // DHAYAN DEIN: Agar ye URL kaam na kare toh console se naya nikaalein
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/", 
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function publishNow() {
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            const btn = document.getElementById('pub-btn');
            const debug = document.getElementById('debug-msg');

            const match = link.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/);
            
            if(!match) { alert("Invalid YouTube Link!"); return; }

            btn.innerText = "SENDING...";
            btn.disabled = true;
            debug.innerText = "Connecting to Firebase...";

            // Instant Set Mode
            const postRef = db.ref('videos').push();
            postRef.set({
                videoId: match[1],
                title: title || "New Video",
                timestamp: Date.now()
            }, (error) => {
                if (error) {
                    btn.innerText = "FAILED";
                    btn.disabled = false;
                    debug.innerText = "Error: " + error.message;
                    debug.classList.add('text-red-500');
                    console.log(error);
                } else {
                    btn.innerText = "PUBLISHED!";
                    debug.innerText = "Video is Live!";
                    debug.classList.add('text-green-500');
                    setTimeout(() => location.reload(), 1000);
                }
            });
        }
    </script>
</body>
</html>
