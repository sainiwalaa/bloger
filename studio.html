<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        .glass { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); }
        .tab-active { border-bottom: 2px solid #ff0000; color: #ff0000; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-4">
            <h1 class="text-4xl font-black text-red-600 italic text-center mb-8">SAINIWALAA</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none"/>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none"/>
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-bold p-4 rounded-2xl">LOGIN</button>
                <button onclick="handleAuth('signup')" class="flex-1 bg-red-600 text-white font-bold p-4 rounded-2xl">REGISTER</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto min-h-screen pb-20">
        
        <div class="relative">
            <div class="h-32 w-full bg-gradient-to-r from-red-900 to-black overflow-hidden">
                <img id="user-banner" src="https://wallpaperaccess.com/full/1155013.jpg" class="w-full h-full object-cover opacity-50"/>
            </div>
            <div class="absolute -bottom-10 left-6 flex items-end gap-4">
                <div class="h-24 w-24 rounded-3xl border-4 border-black overflow-hidden bg-[#111]">
                    <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-2">
                    <h2 id="display-name" class="text-xl font-black italic uppercase">Loading...</h2>
                    <p id="user-handle" class="text-xs text-red-500 font-bold">@creator</p>
                </div>
            </div>
            <button id="logout-btn" onclick="firebase.auth().signOut()" class="absolute top-4 right-4 bg-black/50 p-2 rounded-full text-xs">LOGOUT</button>
        </div>

        <div class="mt-14 px-6">
            <p id="user-bio" class="text-sm text-gray-400 leading-relaxed">Official SainiwalAA Creator Profile. Welcome to my world.</p>
            <div class="flex gap-4 mt-4 text-xl">
                <a href="#" id="link-ig" class="text-pink-500"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" id="link-tw" class="text-blue-400"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" id="link-yt" class="text-red-600"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </div>

        <div id="owner-tools" class="px-6 mt-8 hidden">
            <div class="bg-[#111] p-4 rounded-[25px] border border-[#222]">
                <p class="text-[10px] font-bold text-gray-500 mb-3 uppercase tracking-widest">Post New Content</p>
                <input type="text" id="v-id" placeholder="Video Link" class="w-full mb-2 p-3 bg-black border border-[#222] rounded-xl text-sm outline-none focus:border-red-600"/>
                <input type="text" id="v-title" placeholder="Short Title" class="w-full mb-3 p-3 bg-black border border-[#222] rounded-xl text-sm outline-none focus:border-red-600"/>
                <button onclick="publishNow()" class="w-full bg-red-600 p-3 rounded-xl font-black text-sm">PUBLISH VIDEO</button>
            </div>
        </div>

        <div class="mt-8">
            <div class="flex px-6 border-b border-[#111] gap-6 text-sm font-bold">
                <div class="pb-2 tab-active">VIDEOS</div>
                <div class="pb-2 text-gray-600">ABOUT</div>
            </div>
            <div id="video-list" class="p-6 space-y-6">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // 1. AUTH STATE CHECK
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                loadProfile(user.uid);
                loadVideos(user.uid);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('owner-tools').classList.add('hidden');
            }
        });

        function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(type === 'login') auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            else auth.createUserWithEmailAndPassword(email, pass).then(u => {
                // Initial Profile Save
                db.ref('users/' + u.user.uid).set({
                    username: email.split('@')[0],
                    bio: "New Creator on SainiwalAA",
                    banner: "https://wallpaperaccess.com/full/1155013.jpg"
                });
            }).catch(e => alert(e.message));
        }

        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const data = snap.val();
                if(data) {
                    document.getElementById('display-name').innerText = data.username;
                    document.getElementById('user-handle').innerText = "@" + data.username;
                    document.getElementById('user-bio').innerText = data.bio;
                }
            });
        }

        // 2. VIDEO LOGIC
        function publishNow() {
            const user = auth.currentUser;
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            if(!link) return;

            db.ref('videos').push({
                uid: user.uid,
                username: document.getElementById('display-name').innerText,
                videoId: link.includes("github.com") ? link.replace("/blob/", "/raw/") : link,
                title: title,
                likes: 0,
                comments: 0,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('v-id').value = "";
                document.getElementById('v-title').value = "";
            });
        }

        function loadVideos(ownerUid) {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('video-list');
                const data = snap.val();
                list.innerHTML = "";
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    // Show delete only if logged in user is the owner
                    const isOwner = auth.currentUser && auth.currentUser.uid === v.uid;

                    const item = `
                        <div class="bg-[#0a0a0a] rounded-3xl overflow-hidden border border-[#1a1a1a]">
                            <div class="p-4 flex justify-between items-center">
                                <div class="flex items-center gap-2">
                                    <div class="h-6 w-6 rounded-full bg-red-600"></div>
                                    <span class="text-[10px] font-black uppercase tracking-widest">${v.username}</span>
                                </div>
                                ${isOwner ? `<button onclick="deleteVideo('${key}')" class="text-red-500 text-xs font-bold uppercase">Delete</button>` : ''}
                            </div>
                            <div class="aspect-video bg-black relative">
                                <p class="absolute inset-0 flex items-center justify-center text-[10px] text-gray-700 uppercase">Video Preview Locked</p>
                            </div>
                            <div class="p-4">
                                <p class="text-sm font-bold mb-3">${v.title}</p>
                                <div class="flex gap-6 text-gray-500 text-xs font-bold">
                                    <span><i class="fa-regular fa-heart mr-1"></i> ${v.likes || 0}</span>
                                    <span><i class="fa-regular fa-comment mr-1"></i> ${v.comments || 0}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    list.innerHTML += item;
                });
            });
        }

        function deleteVideo(key) {
            if(confirm("Hatayein?")) db.ref('videos/' + key).remove();
        }
    </script>
</body>
</html>
