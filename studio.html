<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultmessages='false' b:layoutsVersion='3' b:responsive='true' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/2005/gml/data' xmlns:expr='http://www.google.com/2005/gml/expr'>
<head>
    <meta charset='UTF-8'/>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport'/>
    <title>SAINIWALAA | Creator Studio</title>
    
    <script src='https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js'></script>
    <script src='https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js'></script>
    <script src='https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js'></script>
    <script src='https://cdn.tailwindcss.com'></script>
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css' rel='stylesheet'/>

    <b:skin><![CDATA[
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; }
        .ig-input { background: #121212; border: 1px solid #363636; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 12px; color: #fff; font-size: 14px; }
        
        /* Instagram Style Modal */
        .ig-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #121212; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px 20px 0 0; padding: 20px; border-top: 1px solid #262626; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        .ig-modal.active { bottom: 0; }
        
        .profile-header { padding: 20px 16px; display: flex; align-items: center; gap: 20px; }
        .avatar-container { position: relative; width: 85px; height: 85px; padding: 3px; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; background: #222; background-size: cover; background-position: center; }
        
        .stat-item { text-align: center; flex: 1; }
        .stat-num { font-weight: 800; font-size: 18px; display: block; }
        .stat-label { font-size: 13px; color: #a8a8a8; }

        .video-grid-item { position: relative; width: 100%; aspect-ratio: 1/1; background: #121212; overflow: hidden; cursor: pointer; }
        .video-grid-item video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .video-grid-item i.fa-play { position: absolute; top: 8px; right: 8px; font-size: 12px; }

        .action-btn { background: #363636; color: #fff; padding: 7px 0; border-radius: 8px; font-weight: 600; font-size: 14px; flex: 1; text-align: center; }
        .btn-primary { background: #0095f6; }

        #blogger-fix { display: none !important; }
        
        .loading-bar { height: 2px; background: #ff3040; width: 0%; position: fixed; top: 0; left: 0; z-index: 9999; transition: 0.3s; }
    ]]></b:skin>
</head>
<body>
    <div id='blogger-fix'><b:section id='main' maxwidgets='1'/></div>
    <div id="loader" class="loading-bar"></div>

    <div id="auth-ui" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl italic font-serif mb-10 tracking-widest">SAINIWALAA</h1>
        <div class="w-full max-w-sm space-y-3">
            <input id="email" class="ig-input" placeholder="Phone number, username, or email"/>
            <input id="pass" class="ig-input" placeholder="Password" type="password"/>
            <button onclick="authManager('login')" class="w-full bg-[#0095f6] text-white p-2.5 rounded-lg font-bold">Log In</button>
            <div class="flex items-center my-4 opacity-50"><hr class="flex-1 border-zinc-700"/><span class="px-4 text-xs font-bold">OR</span><hr class="flex-1 border-zinc-700"/></div>
            <p class="text-center text-sm">Don't have an account? <span onclick="authManager('reg')" class="text-[#0095f6] font-bold cursor-pointer">Sign up</span></p>
        </div>
    </div>

    <div id="studio-content" class="hidden max-w-md mx-auto">
        <div class="flex justify-between items-center p-4 border-b border-zinc-900">
            <i class="fa-solid fa-lock text-sm"> <span id="user-display" class="font-bold ml-1">username</span></i>
            <div class="flex gap-5 text-xl">
                <i class="fa-regular fa-square-plus cursor-pointer" onclick="openUploadModal()"></i>
                <i class="fa-solid fa-bars cursor-pointer" onclick="firebase.auth().signOut().then(()=>location.reload())"></i>
            </div>
        </div>

        <div class="profile-header">
            <div class="avatar-container">
                <div id="p-avatar" class="avatar-img"></div>
            </div>
            <div class="flex flex-1 gap-2">
                <div class="stat-item"><span class="stat-num" id="post-count">0</span><span class="stat-label">Posts</span></div>
                <div class="stat-item"><span class="stat-num">0</span><span class="stat-label">Followers</span></div>
                <div class="stat-item"><span class="stat-num">0</span><span class="stat-label">Following</span></div>
            </div>
        </div>
        
        <div class="px-4 pb-4">
            <h2 id="p-name" class="font-bold text-sm">Name</h2>
            <p id="p-bio" class="text-sm whitespace-pre-wrap">Bio goes here...</p>
            <div class="flex gap-2 mt-4">
                <button onclick="openEditProfile()" class="action-btn">Edit Profile</button>
                <button onclick="alert('Shared!')" class="action-btn">Share Profile</button>
            </div>
        </div>

        <div class="flex border-t border-zinc-900 mt-4">
            <div class="flex-1 text-center py-3 border-b border-white"><i class="fa-solid fa-table-cells text-xl"></i></div>
            <div class="flex-1 text-center py-3 opacity-40"><i class="fa-solid fa-clapperboard text-xl"></i></div>
            <div class="flex-1 text-center py-3 opacity-40"><i class="fa-regular fa-id-badge text-xl"></i></div>
        </div>

        <div id="my-grid" class="grid grid-cols-3 gap-[2px]">
            </div>
    </div>

    <div id="upload-modal" class="ig-modal">
        <div class="flex justify-between items-center pb-4 border-b border-zinc-800 mb-4">
            <span class="text-zinc-400" onclick="closeModal('upload-modal')">Cancel</span>
            <h2 class="font-bold">New Reel</h2>
            <span id="publish-btn" class="text-[#0095f6] font-bold" onclick="publishPost()">Share</span>
        </div>
        <div class="space-y-4">
            <div class="flex gap-3">
                <div class="w-20 h-28 bg-zinc-800 rounded overflow-hidden flex items-center justify-center border border-zinc-700">
                    <input id="post-file" type="file" accept="video/*" class="hidden" onchange="previewVideo(this)"/>
                    <label for="post-file" id="file-label" class="text-xs text-center p-2 cursor-pointer">Select<br/>Video</label>
                </div>
                <textarea id="post-desc" class="flex-1 bg-transparent outline-none text-sm resize-none" placeholder="Write a caption..."></textarea>
            </div>
            <input id="post-title" class="ig-input" placeholder="Title/Product Name"/>
            <input id="prod-link" class="ig-input" placeholder="Product URL (Optional)"/>
        </div>
    </div>

    <div id="profile-modal" class="ig-modal">
        <div class="flex justify-between items-center pb-4 border-b border-zinc-800 mb-6">
            <span onclick="closeModal('profile-modal')">Cancel</span>
            <h2 class="font-bold">Edit Profile</h2>
            <span class="text-[#0095f6] font-bold" onclick="saveProfile()">Done</span>
        </div>
        <input id="edit-avatar" class="ig-input" placeholder="Profile Image URL"/>
        <input id="edit-name" class="ig-input" placeholder="Name"/>
        <input id="edit-bio" class="ig-input" placeholder="Bio"/>
    </div>

    <script>
    //<![CDATA[
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('studio-content').classList.remove('hidden');
                loadUserProfile(user.uid);
                loadUserPosts(user.uid);
            }
        });

        async function authManager(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Fill all fields");
            try {
                if(type==='login') await auth.signInWithEmailAndPassword(e,p);
                if(type==='reg') {
                    const res = await auth.createUserWithEmailAndPassword(e,p);
                    await db.ref('users/' + res.user.uid).set({
                        name: e.split('@')[0],
                        bio: "Artist | Creator",
                        avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    });
                }
            } catch(err) { alert(err.message); }
        }

        function loadUserProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const u = snap.val();
                if(!u) return;
                document.getElementById('p-name').innerText = u.name;
                document.getElementById('user-display').innerText = u.name.toLowerCase().replace(/\s/g, '_');
                document.getElementById('p-bio').innerText
