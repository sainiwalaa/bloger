<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .glass-dark { background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px); }
        .v-frame { width: 100%; aspect-ratio: 9/16; background: #050505; position: relative; overflow: hidden; border-radius: 35px; border: 1px solid #1a1a1a; }
        .v-frame iframe, .v-frame video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; }
        .seek-bar { width: 100%; height: 4px; background: #222; position: relative; cursor: pointer; border-radius: 10px; }
        .seek-fill { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.1s linear; }
        .desc-gradient { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, transparent 100%); }
        ::-webkit-scrollbar { width: 0px; }
        
        /* Fixed Overlay - No New Tab */
        #profile-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; 
            transform: translateX(100%); transition: transform 0.3s ease-out;
            overflow-y: auto;
        }
        #profile-overlay.active { transform: translateX(0); }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 9/16; background: #111; overflow: hidden; border: 0.1px solid #222; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[600] bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6 text-center">
            <h1 class="text-5xl font-black text-red-600 italic mb-8 tracking-tighter">SAINIWALAA</h1>
            <input type="text" id="reg-username" placeholder="Unique Username" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-black p-4 rounded-2xl text-xs uppercase">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 bg-red-600 text-white font-black p-4 rounded-2xl text-xs uppercase">Signup</button>
            </div>
        </div>
    </div>

    <div id="profile-overlay">
        <div class="max-w-md mx-auto pb-20">
            <div class="p-4 flex items-center gap-4 sticky top-0 bg-black z-20">
                <button onclick="closeUserProfile()" class="text-2xl"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 id="u-header-name" class="font-bold text-sm uppercase italic">Profile</h2>
            </div>
            
            <div class="relative h-40 bg-zinc-900 overflow-hidden">
                <img id="u-banner-img" class="w-full h-full object-cover opacity-40"/>
                <div class="absolute -bottom-10 left-6 flex items-end gap-3">
                    <img id="u-avatar" class="w-20 h-20 rounded-2xl border-4 border-black bg-zinc-800 object-cover shadow-xl"/>
                </div>
            </div>

            <div class="mt-12 px-6">
                <h3 id="u-name" class="text-xl font-black italic">Creator</h3>
                <p id="u-bio" class="text-xs text-gray-400 mt-2 italic">Bio description...</p>
                <div id="u-socials" class="flex gap-4 mt-4 text-xl"></div>
            </div>

            <div class="mt-8">
                <div class="border-t border-zinc-800 pt-4">
                    <h4 class="px-6 mb-4 text-[10px] font-black uppercase text-red-600">User Videos</h4>
                    <div id="u-grid" class="profile-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto pb-24">
        <div class="relative">
            <div id="banner-box" class="h-44 w-full bg-[#111] overflow-hidden flex items-center justify-center">
                <img id="view-banner-img" class="w-full h-full object-cover opacity-60 hidden"/>
                <h1 id="view-banner-txt" class="text-4xl font-black italic uppercase">SAINIWALAA</h1>
            </div>
            <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                <div class="h-28 w-28 rounded-[35px] border-4 border-black overflow-hidden bg-[#111] shadow-2xl">
                    <img id="view-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-3">
                    <h2 id="view-name" class="text-2xl font-black italic uppercase leading-none">Creator</h2>
                    <p id="view-handle" class="text-[10px] text-red-600 font-black tracking-widest mt-1 uppercase">@username</p>
                </div>
            </div>
            <button onclick="openEdit()" class="absolute -bottom-10 right-6 bg-[#111] border border-[#222] px-5 py-2 rounded-full text-[10px] font-black uppercase">Edit</button>
        </div>

        <div id="owner-tools" class="px-6 mt-20 hidden">
             <div class="bg-[#0a0a0a] p-5 rounded-[30px] border border-[#1a1a1a] space-y-3 shadow-xl">
                <input type="text" id="v-id" placeholder="Video Link (YT/GitHub)" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                <input type="text" id="v-title" placeholder="Video Title" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none font-bold"/>
                <button onclick="publishNow()" id="pub-btn" class="w-full bg-red-600 p-4 rounded-2xl font-black text-xs uppercase">Publish Now</button>
            </div>
        </div>

        <div id="video-list" class="p-6 space-y-12"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let ytPlayers = {};
        let userStats = {};

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                loadProfile(user.uid);
                loadVideos();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const d = snap.val() || {};
                userStats = d;
                document.getElementById('view-name').innerText = d.username || "Creator";
                document.getElementById('view-handle').innerText = "@" + (d.username || "user");
                document.getElementById('view-avatar').src = d.avatar || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            });
        }

        function loadVideos() {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('video-list');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    let type = (v.videoId.includes('youtube') || v.videoId.includes('youtu.be')) ? 'yt' : 'direct';

                    list.innerHTML += `
                        <div class="v-card space-y-4 bg-[#050505] p-2 rounded-[40px] border border-[#111]">
                            <div class="px-4 text-[10px] font-bold text-red-600">
                                <span class="cursor-pointer" onclick="openUserProfile('${v.uid}')">${v.username}</span>
                            </div>
                            <div class="v-frame relative">
                                ${type === 'yt' ? `<div id="yt-${key}"></div>` : `<video id="vid-${key}" src="${v.videoId}" loop playsinline onclick="togglePlay('${key}','direct')"></video>`}
                            </div>
                        </div>`;
                    renderPlayer(key, v.videoId, type);
                });
            });
        }

        // --- THE FIX: Same Page Overlay Logic ---
        function openUserProfile(uid) {
            const overlay = document.getElementById('profile-overlay');
            overlay.classList.add('active');
            stopAll();

            db.ref('users/' + uid).once('value', snap => {
                const d = snap.val() || {};
                document.getElementById('u-header-name').innerText = d.username || "Profile";
                document.getElementById('u-name').innerText = d.username || "Creator";
                document.getElementById('u-bio').innerText = d.bio || "No bio available.";
                document.getElementById('u-avatar').src = d.avatar || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                document.getElementById('u-banner-img').src = d.banner || "https://wallpaperaccess.com/full/1155013.jpg";
            });

            db.ref('videos').orderByChild('uid').equalTo(uid).once('value', snap => {
                const grid = document.getElementById('u-grid');
                grid.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                Object.keys(data).forEach(k => {
                    const v = data[k];
                    const isYT = (v.videoId.includes('youtube') || v.videoId.includes('youtu.be'));
                    const thumb = isYT ? `https://img.youtube.com/vi/${getYTID(v.videoId)}/0.jpg` : v.videoId;
                    grid.innerHTML += `<div class="grid-item">${isYT ? `<img src="${thumb}"/>` : `<video src="${thumb}"></video>`}</div>`;
                });
            });
        }

        function closeUserProfile() {
            document.getElementById('profile-overlay').classList.remove('active');
        }

        // --- Helpers ---
        function getYTID(u) { const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/; const m = u.match(reg); return (m && m[2].length === 11) ? m[2] : u; }
        function stopAll() { document.querySelectorAll('video').forEach(v => v.pause()); }
        function renderPlayer(key, url, type) {
            if(type === 'yt') {
                setTimeout(() => {
                    ytPlayers[key] = new YT.Player('yt-' + key, { videoId: getYTID(url), playerVars: { 'controls': 0, 'playsinline': 1 } });
                }, 500);
            }
        }
    </script>
</body>
</html>
