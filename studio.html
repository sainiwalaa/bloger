<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .glass-dark { background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px); }
        .v-frame { width: 100%; aspect-ratio: 9/16; background: #050505; position: relative; overflow: hidden; border-radius: 35px; border: 1px solid #1a1a1a; }
        .v-frame iframe, .v-frame video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; }
        .seek-bar { width: 100%; height: 4px; background: #222; position: relative; cursor: pointer; border-radius: 10px; }
        .seek-fill { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .desc-gradient { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, transparent 100%); }
        ::-webkit-scrollbar { width: 0px; }
        .modal-scroll { max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[600] bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6 text-center">
            <h1 class="text-5xl font-black text-red-600 italic mb-8 tracking-tighter">SAINIWALAA</h1>
            <input type="text" id="reg-username" placeholder="Choose Unique Username" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none mb-2 focus:border-red-600"/>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none focus:border-red-600"/>
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-black p-4 rounded-2xl text-xs">LOGIN</button>
                <button onclick="handleAuth('signup')" class="flex-1 bg-red-600 text-white font-black p-4 rounded-2xl text-xs">SIGNUP</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 z-[500] glass-dark flex items-center justify-center p-4 hidden">
        <div class="w-full max-w-md bg-[#111] border border-[#222] p-6 rounded-[35px] space-y-5 modal-scroll">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-black uppercase text-red-600 italic">Settings</h3>
                <button onclick="auth.signOut()" class="text-[9px] bg-red-900 px-3 py-1 rounded-full font-bold">LOGOUT</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Username (Read Info Below)</label>
                    <input type="text" id="edit-name" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                    <p id="name-lock-info" class="text-[9px] text-yellow-600 mt-1 font-bold"></p>
                </div>

                <div class="p-3 bg-black rounded-2xl space-y-3">
                    <label class="text-[10px] text-gray-500 font-bold uppercase">Banner Style</label>
                    <div class="flex gap-2">
                        <button onclick="setBMode('img')" id="btn-bm-img" class="flex-1 bg-red-600 p-2 rounded-lg text-[9px] font-bold">IMAGE</button>
                        <button onclick="setBMode('color')" id="btn-bm-clr" class="flex-1 bg-[#222] p-2 rounded-lg text-[9px] font-bold">COLOR/TEXT</button>
                    </div>
                    <div id="inp-bm-img"><input type="file" id="edit-banner-file" class="text-[9px]"/></div>
                    <div id="inp-bm-clr" class="hidden space-y-2">
                        <input type="color" id="edit-banner-color" class="w-full h-8 bg-transparent" value="#800000"/>
                        <input type="text" id="edit-banner-txt" placeholder="Banner Heading" class="w-full p-2 bg-[#111] text-xs rounded-lg outline-none"/>
                    </div>
                </div>

                <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Profile Photo & Bio</label>
                <input type="file" id="edit-avatar-file" class="text-[9px] w-full"/>
                <textarea id="edit-bio" placeholder="Bio..." class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs h-16 outline-none"></textarea>
            </div>

            <div class="flex gap-2 pt-4">
                <button onclick="closeEdit()" class="flex-1 bg-[#222] p-3 rounded-xl font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button onclick="saveProfile()" id="save-btn" class="flex-1 bg-red-600 p-3 rounded-xl font-bold text-xs uppercase tracking-widest">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto pb-24">
        <div class="relative">
            <div id="banner-box" class="h-44 w-full bg-[#111] overflow-hidden flex items-center justify-center">
                <img id="view-banner-img" class="w-full h-full object-cover opacity-60 hidden"/>
                <h1 id="view-banner-txt" class="text-4xl font-black italic uppercase">SAINIWALAA</h1>
            </div>
            <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                <div class="h-28 w-28 rounded-[35px] border-4 border-black overflow-hidden bg-[#111] shadow-2xl">
                    <img id="view-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-3">
                    <h2 id="view-name" class="text-2xl font-black italic uppercase leading-none">Creator</h2>
                    <p id="view-handle" class="text-[10px] text-red-600 font-black tracking-widest mt-1 uppercase">@username</p>
                </div>
            </div>
            <button onclick="openEdit()" class="absolute -bottom-10 right-6 bg-[#111] border border-[#222] px-5 py-2 rounded-full text-[10px] font-black uppercase">Edit</button>
        </div>

        <div class="mt-16 px-6"><p id="view-bio" class="text-xs text-gray-400 italic">No bio available.</p></div>

        <div id="owner-tools" class="px-6 mt-8 hidden">
            <div class="bg-[#0a0a0a] p-5 rounded-[30px] border border-[#1a1a1a] space-y-3">
                <input type="text" id="v-id" placeholder="Video Link" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                <input type="text" id="v-title" placeholder="Title" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none font-bold"/>
                <textarea id="v-desc" placeholder="Description..." class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none h-16 resize-none"></textarea>
                <button onclick="publishNow()" id="pub-btn" class="w-full bg-red-600 p-4 rounded-2xl font-black text-xs uppercase">Publish</button>
            </div>
        </div>

        <div id="video-list" class="p-6 space-y-12"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let ytPlayers = {};
        let bMode = 'img';
        let userStats = {};

        // --- AUTH & LOCK LOGIC ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                loadProfile(user.uid);
                loadVideos();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const user = document.getElementById('reg-username').value;
            if(!email || !pass) return alert("Fill Email & Password!");
            if(type === 'login') auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            else {
                if(!user) return alert("Choose a Username first!");
                auth.createUserWithEmailAndPassword(email, pass).then(u => {
                    db.ref('users/' + u.user.uid).set({ 
                        username: user, 
                        bio: "New Sainiwaala Creator",
                        nameChangeCount: 0,
                        lastChangeDate: Date.now(),
                        bMode: 'img'
                    });
                }).catch(e => alert(e.message));
            }
        }

        // --- PROFILE & BANNER SYSTEM ---
        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const d = snap.val() || {};
                userStats = d;
                document.getElementById('view-name').innerText = d.username || "Creator";
                document.getElementById('view-handle').innerText = "@" + (d.username || "user");
                document.getElementById('view-bio').innerText = d.bio || "No bio yet.";
                document.getElementById('view-avatar').src = d.avatar || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                document.getElementById('edit-name').value = d.username;

                // Lock Info Logic
                const nextChangeDate = d.lastChangeDate + (d.nameChangeCount === 1 ? 20*24*60*60*1000 : 90*24*60*60*1000);
                const canChange = Date.now() > nextChangeDate || !d.nameChangeCount;
                document.getElementById('name-lock-info').innerText = canChange ? "Name change available!" : "Locked until: " + new Date(nextChangeDate).toLocaleDateString();

                // Banner View
                if(d.bMode === 'color') {
                    document.getElementById('banner-box').style.background = d.bColor || "#800000";
                    document.getElementById('view-banner-txt').innerText = d.bText || "SAINIWALAA";
                    document.getElementById('view-banner-txt').classList.remove('hidden');
                    document.getElementById('view-banner-img').classList.add('hidden');
                } else {
                    document.getElementById('view-banner-img').src = d.banner || "https://wallpaperaccess.com/full/1155013.jpg";
                    document.getElementById('view-banner-img').classList.remove('hidden');
                    document.getElementById('view-banner-txt').classList.add('hidden');
                    document.getElementById('banner-box').style.background = "#111";
                }
            });
        }

        function setBMode(mode) {
            bMode = mode;
            document.getElementById('btn-bm-img').className = mode === 'img' ? 'flex-1 bg-red-600 p-2 rounded-lg text-[9px] font-bold' : 'flex-1 bg-[#222] p-2 rounded-lg text-[9px] font-bold';
            document.getElementById('btn-bm-clr').className = mode === 'color' ? 'flex-1 bg-red-600 p-2 rounded-lg text-[9px] font-bold' : 'flex-1 bg-[#222] p-2 rounded-lg text-[9px] font-bold';
            document.getElementById('inp-bm-img').style.display = mode === 'img' ? 'block' : 'none';
            document.getElementById('inp-bm-clr').style.display = mode === 'color' ? 'block' : 'none';
        }

        async function saveProfile() {
            const uid = auth.currentUser.uid;
            const btn = document.getElementById('save-btn');
            const newName = document.getElementById('edit-name').value;
            
            let updateData = { 
                bio: document.getElementById('edit-bio').value,
                bMode: bMode
            };

            // Name Lock Implementation
            if(newName !== userStats.username) {
                const nextChangeDate = userStats.lastChangeDate + (userStats.nameChangeCount === 1 ? 20*24*60*60*1000 : 90*24*60*60*1000);
                if(userStats.nameChangeCount > 0 && Date.now() < nextChangeDate) {
                    return alert("Name is LOCKED! Check date.");
                }
                updateData.username = newName;
                updateData.nameChangeCount = (userStats.nameChangeCount || 0) + 1;
                updateData.lastChangeDate = Date.now();
            }

            btn.innerText = "WAIT...";
            const av = document.getElementById('edit-avatar-file').files[0];
            if(av) updateData.avatar = await toBase64(av);

            if(bMode === 'img') {
                const bn = document.getElementById('edit-banner-file').files[0];
                if(bn) updateData.banner = await toBase64(bn);
            } else {
                updateData.bColor = document.getElementById('edit-banner-color').value;
                updateData.bText = document.getElementById('edit-banner-txt').value;
            }

            db.ref('users/' + uid).update(updateData).then(() => { btn.innerText = "SAVE CHANGES"; closeEdit(); });
        }

        // --- GLOBAL FEED (NO REFRESH) ---
        function publishNow() {
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            if(!link || !title) return;

            db.ref('videos').push({
                uid: auth.currentUser.uid,
                username: userStats.username,
                videoId: link.includes("github.com") ? link.replace("/blob/", "/raw/") : link,
                title: title,
                desc: document.getElementById('v-desc').value || "",
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('v-id').value = "";
                document.getElementById('v-title').value = "";
                document.getElementById('v-desc').value = "";
            });
        }

        function loadVideos() {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('video-list');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    const likesCount = v.likes ? Object.keys(v.likes).length : 0;
                    const isLiked = v.likes && v.likes[auth.currentUser.uid] ? 'text-red-600' : 'text-gray-500';
                    let type = (v.videoId.includes('youtube') || v.videoId.includes('youtu.be')) ? 'yt' : 'direct';

                    list.innerHTML += `
                        <div class="v-card space-y-4">
                            <div class="flex justify-between px-2 text-[10px] font-bold text-red-600 uppercase">
                                <span>${v.username}</span>
                                ${auth.currentUser.uid === v.uid ? `<button onclick="deleteVideo('${key}')">Remove</button>` : ''}
                            </div>
                            <div class="v-frame relative">
                                ${type === 'yt' ? `<div id="yt-${key}"></div>` : `<video id="vid-${key}" src="${v.videoId}" loop playsinline onclick="togglePlay('${key}','direct')"></video>`}
                                <div class="absolute inset-0 pointer-events-none desc-gradient flex flex-col justify-end p-6">
                                    <h3 class="text-sm font-black italic uppercase">${v.title}</h3>
                                    <p class="text-[9px] text-gray-400 mt-1">${v.desc}</p>
                                </div>
                            </div>
                            <div class="px-2 space-y-3">
                                <div class="seek-bar" onclick="seek(event, '${key}', '${type}')"><div id="fill-${key}" class="seek-fill" style="width:0%"></div></div>
                                <div class="flex justify-between items-center px-2">
                                    <div class="flex gap-6 text-xl">
                                        <i class="fa-solid fa-play" id="p-btn-${key}" onclick="togglePlay('${key}', '${type}')"></i>
                                        <i class="fa-solid fa-comment text-gray-500" onclick="alert('Comments coming in v11!')"></i>
                                    </div>
                                    <div class="flex items-center gap-2 cursor-pointer" onclick="handleLike('${key}')">
                                        <span class="text-xs font-black ${isLiked}">${likesCount}</span>
                                        <i class="fa-solid fa-heart ${isLiked}"></i>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    renderPlayer(key, v.videoId, type);
                });
            });
        }

        // --- CORE HELPERS ---
        function handleLike(vKey) {
            const uid = auth.currentUser.uid;
            const ref = db.ref(`videos/${vKey}/likes/${uid}`);
            ref.once('value', s => { s.exists() ? ref.remove() : ref.set(true); });
        }

        function renderPlayer(key, url, type) {
            if(type === 'yt') {
                setTimeout(() => {
                    ytPlayers[key] = new YT.Player('yt-' + key, {
                        videoId: getYTID(url),
                        playerVars: { 'controls': 0, 'modestbranding': 1, 'playsinline': 1 },
                        events: { 'onStateChange': (e) => {
                            document.getElementById('p-btn-'+key).className = (e.data === 1) ? "fa-solid fa-pause" : "fa-solid fa-play";
                            if(e.data === 1) startYTTrack(key);
                        }}
                    });
                }, 400);
            } else {
                setTimeout(() => {
                    const vd = document.getElementById('vid-' + key);
                    if(vd) vd.ontimeupdate = () => { document.getElementById('fill-'+key).style.width = (vd.currentTime/vd.duration)*100 + "%"; };
                }, 400);
            }
        }

        function getYTID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function togglePlay(key, type) {
            if(type === 'direct') {
                const v = document.getElementById('vid-'+key);
                if(v.paused) { stopAll(); v.play(); } else v.pause();
                document.getElementById('p-btn-'+key).className = v.paused ? "fa-solid fa-play" : "fa-solid fa-pause";
            } else {
                const p = ytPlayers[key];
                if(p.getPlayerState() === 1) p.pauseVideo(); else { stopAll(); p.playVideo(); }
            }
        }

        function stopAll() {
            Object.values(ytPlayers).forEach(p => p.pauseVideo ? p.pauseVideo() : null);
            document.querySelectorAll('video').forEach(v => v.pause());
            document.querySelectorAll('.fa-pause').forEach(i => i.className = "fa-solid fa-play");
        }

        function startYTTrack(key) {
            const p = ytPlayers[key];
            const t = setInterval(() => {
                if(!p || p.getPlayerState() !== 1) { clearInterval(t); return; }
                const fill = document.getElementById('fill-'+key);
                if(fill) fill.style.width = (p.getCurrentTime()/p.getDuration())*100 + "%";
            }, 500);
        }

        function seek(e, key, type) {
            const rect = e.currentTarget.getBoundingClientRect();
            const per = (e.clientX - rect.left) / rect.width;
            if(type === 'direct') document.getElementById('vid-'+key).currentTime = document.getElementById('vid-'+key).duration * per;
            else ytPlayers[key].seekTo(ytPlayers[key].getDuration() * per);
        }

        function openEdit() { document.getElementById('edit-modal').classList.remove('hidden'); }
        function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }
        const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); r.onerror = rej; });
        function deleteVideo(key) { if(confirm("Remove?")) db.ref('videos/' + key).remove(); }
    </script>
</body>
</html>
