<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .glass-dark { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); }
        .v-frame { width: 100%; aspect-ratio: 9/16; background: #050505; position: relative; overflow: hidden; pointer-events: none; }
        .v-frame iframe, .v-frame video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; }
        .seek-bar { width: 100%; height: 5px; background: #222; position: relative; cursor: pointer; border-radius: 10px; }
        .seek-fill { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.1s linear; }
        .desc-gradient { background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
        ::-webkit-scrollbar { width: 0px; }
        input, textarea { transition: all 0.3s border; }
        input:focus, textarea:focus { border-color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="main-content" class="max-w-md mx-auto pb-24">
        <div class="relative">
            <div id="banner-display" class="h-44 w-full bg-[#111] overflow-hidden flex items-center justify-center relative">
                <img id="user-banner-img" src="" class="w-full h-full object-cover opacity-70 hidden"/>
                <h1 id="user-banner-text" class="text-4xl font-black italic uppercase tracking-tighter hidden"></h1>
            </div>
            <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                <div class="h-28 w-28 rounded-[35px] border-4 border-black overflow-hidden bg-[#111] shadow-xl z-10">
                    <img id="user-avatar" src="" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-3 z-10">
                    <h2 id="display-name" class="text-2xl font-black italic uppercase leading-none">Creator</h2>
                    <p id="user-handle" class="text-[10px] text-red-600 font-black tracking-widest uppercase mt-1">@handle</p>
                </div>
            </div>
            <button onclick="openEdit()" class="absolute -bottom-10 right-6 bg-[#111] border border-[#222] px-5 py-2 rounded-full text-[10px] font-black uppercase z-10">Edit</button>
        </div>

        <div class="mt-16 px-6">
            <p id="user-bio" class="text-xs text-gray-400 leading-relaxed italic">Bio loading...</p>
        </div>

        <div id="owner-tools" class="px-6 mt-8 hidden">
            <div class="bg-[#0a0a0a] p-5 rounded-[30px] border border-[#1a1a1a] space-y-3">
                <p class="text-[10px] font-black text-red-600 uppercase tracking-widest">Post New Content</p>
                <input type="text" id="v-id" placeholder="Video URL (YT/Direct)" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                <input type="text" id="v-title" placeholder="Catchy Title" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none font-bold"/>
                <textarea id="v-desc" placeholder="Write something about this video... #Sainiwaala" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none h-20 resize-none"></textarea>
                <button onclick="publishNow()" id="pub-btn" class="w-full bg-red-600 p-4 rounded-2xl font-black text-xs hover:bg-red-700 active:scale-95 transition-all">PUBLISH TO FEED</button>
            </div>
        </div>

        <div id="video-list" class="p-6 space-y-12">
            </div>
    </div>

    <script>
        // ... (Keep existing Firebase Initialization and Auth Logic) ...

        function publishNow() {
            const user = auth.currentUser;
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            const desc = document.getElementById('v-desc').value; // Get Description
            const btn = document.getElementById('pub-btn');

            if(!link || !title) return alert("Link and Title are required!");

            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            db.ref('videos').push({
                uid: user.uid,
                username: document.getElementById('display-name').innerText,
                videoId: link.includes("github.com") ? link.replace("/blob/", "/raw/") : link,
                title: title,
                desc: desc || "", // Save Description
                likes: 0,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('v-id').value = "";
                document.getElementById('v-title').value = "";
                document.getElementById('v-desc').value = "";
                btn.innerText = "PUBLISH TO FEED";
                btn.disabled = false;
            });
        }

        function loadVideos(uid) {
            db.ref('videos').on('value', snap => {
                const list = document.getElementById('video-list');
                const data = snap.val();
                list.innerHTML = "";
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    const isOwner = auth.currentUser && auth.currentUser.uid === v.uid;
                    let type = v.videoId.includes('youtube') || v.videoId.includes('youtu.be') ? 'yt' : 'direct';
                    
                    const card = `
                        <div class="v-card space-y-4">
                            <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-red-600 px-1">
                                <span class="flex items-center gap-2"><div class="h-2 w-2 rounded-full bg-red-600 animate-pulse"></div>${v.username}</span>
                                ${isOwner ? `<button onclick="deleteVideo('${key}')" class="text-gray-600">Remove</button>` : ''}
                            </div>
                            
                            <div class="v-frame rounded-[35px] border border-[#1a1a1a] shadow-2xl relative">
                                ${type === 'yt' ? `<div id="yt-${key}"></div>` : `<video id="vid-${key}" src="${v.videoId}" loop playsinline></video>`}
                                
                                <div class="absolute bottom-0 left-0 right-0 p-6 desc-gradient pointer-events-none">
                                    <h3 class="text-sm font-black italic uppercase text-white mb-1">${v.title}</h3>
                                    <p class="text-[11px] text-gray-300 leading-tight line-clamp-2">${v.desc || ''}</p>
                                </div>
                            </div>

                            <div class="space-y-4 px-2">
                                <div class="seek-bar" onclick="seek(event, '${key}', '${type}')"><div id="fill-${key}" class="seek-fill"></div></div>
                                <div class="flex justify-between items-center">
                                    <div class="flex gap-8 text-xl">
                                        <button onclick="togglePlay('${key}', '${type}')"><i class="fa-solid fa-play" id="p-btn-${key}"></i></button>
                                        <button onclick="toggleMute('${key}', '${type}')"><i class="fa-solid fa-volume-xmark" id="m-btn-${key}"></i></button>
                                    </div>
                                    <div class="flex gap-5 items-center">
                                        <div class="flex flex-col items-center">
                                            <i class="fa-regular fa-heart text-xl"></i>
                                            <span class="text-[9px] font-bold text-gray-500 mt-1">${v.likes || 0}</span>
                                        </div>
                                        <i class="fa-regular fa-paper-plane text-xl text-gray-400"></i>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    list.innerHTML += card;

                    // Re-init Players (Same as previous logic)
                    if(type === 'yt') {
                        setTimeout(() => {
                            ytPlayers[key] = new YT.Player('yt-' + key, {
                                videoId: getYTID(v.videoId),
                                playerVars: { 'controls': 0, 'modestbranding': 1, 'playsinline': 1, 'rel':0 },
                                events: { 'onStateChange': (e) => {
                                    document.getElementById('p-btn-'+key).className = (e.data === 1) ? "fa-solid fa-pause" : "fa-solid fa-play";
                                    if(e.data === 1) startYTTrack(key);
                                }}
                            });
                        }, 500);
                    } else {
                        setTimeout(() => {
                            const vd = document.getElementById('vid-' + key);
                            if(vd) vd.ontimeupdate = () => { document.getElementById('fill-'+key).style.width = (vd.currentTime/vd.duration)*100 + "%"; };
                        }, 500);
                    }
                });
            });
        }
        
        // ... (Keep all other functions: getYTID, togglePlay, toggleMute, stopAll, startYTTrack, seek, handleAuth, deleteVideo, openEdit, closeEdit, saveProfile) ...
    </script>
</body>
</html>
