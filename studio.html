<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><title>SAINIWALAA | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #050505; color: white; font-family: sans-serif; }</style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h2 class="text-[#d4af37] text-2xl font-bold mb-6 text-center">CREATOR STUDIO</h2>
        
        <div id="reg-form" class="space-y-4">
            <input type="text" id="user-name" placeholder="Apna Naam Likhein" class="w-full p-4 bg-[#111] border border-[#333] rounded-xl outline-none focus:border-[#d4af37]"/>
            <button onclick="saveUser()" class="w-full bg-[#d4af37] text-black font-bold p-4 rounded-xl">OPEN MY STUDIO</button>
        </div>

        <div id="post-form" class="hidden space-y-4">
            <p id="welcome" class="text-center text-gray-400 mb-4"></p>
            <input type="text" id="v-id" placeholder="YouTube Video Link" class="w-full p-4 bg-[#111] border border-[#333] rounded-xl"/>
            <input type="text" id="v-buy" placeholder="Product Buy Link (Optional)" class="w-full p-4 bg-[#111] border border-[#333] rounded-xl"/>
            <input type="text" id="v-title" placeholder="Video Title" class="w-full p-4 bg-[#111] border border-[#333] rounded-xl"/>
            <textarea id="v-desc" placeholder="Hashtags & Description" class="w-full p-4 bg-[#111] border border-[#333] rounded-xl h-24"></textarea>
            <button onclick="sendToBlogger()" class="w-full bg-white text-black font-bold p-4 rounded-xl">PUBLISH POST</button>
            <button onclick="localStorage.clear(); location.reload();" class="w-full text-red-500 text-xs mt-4">LOGOUT / RESET</button>
        </div>
    </div>

    <script>
        const savedName = localStorage.getItem('saini_name');
        if(savedName) {
            document.getElementById('reg-form').classList.add('hidden');
            document.getElementById('post-form').classList.remove('hidden');
            document.getElementById('welcome').innerText = "Welcome, " + savedName;
        }

        function saveUser() {
            const name = document.getElementById('user-name').value;
            if(name) { localStorage.setItem('saini_name', name); location.reload(); }
        }

        function sendToBlogger() {
            const vid = document.getElementById('v-id').value;
            // Extracting ID
            const vidId = vid.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/)[1];
            
            const blogger = "https://your-site.blogspot.com/"; // APNI SITE KA LINK DAALEIN
            const url = `${blogger}?user=${encodeURIComponent(savedName)}&vid=${vidId}&buy=${encodeURIComponent(document.getElementById('v-buy').value)}&title=${encodeURIComponent(document.getElementById('v-title').value)}&desc=${encodeURIComponent(document.getElementById('v-desc').value)}`;
            
            window.location.href = url;
        }
    </script>
</body>
</html>
