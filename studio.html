<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .glass-dark { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); }
        .v-frame { width: 100%; aspect-ratio: 9/16; background: #050505; position: relative; overflow: hidden; border-radius: 35px; border: 1px solid #1a1a1a; }
        .v-frame iframe, .v-frame video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; }
        .seek-bar { width: 100%; height: 4px; background: #222; position: relative; cursor: pointer; border-radius: 10px; }
        .seek-fill { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.1s linear; }
        .desc-gradient { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 50%, transparent 100%); }
        ::-webkit-scrollbar { width: 0px; }
        .comment-box { max-height: 200px; overflow-y: auto; scrollbar-width: none; }
        .loading-shimmer { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[500] bg-black flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6 text-center">
            <h1 class="text-5xl font-black text-red-600 italic mb-8 tracking-tighter">SAINIWALAA</h1>
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none"/>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-[#111] border border-[#222] rounded-2xl outline-none"/>
            <button onclick="handleAuth('login')" class="w-full bg-white text-black font-black p-4 rounded-2xl">LOGIN</button>
            <button onclick="handleAuth('signup')" class="text-xs text-gray-500 uppercase mt-4 block mx-auto">Create Account</button>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto pb-24">
        <div class="relative">
            <div id="banner-display" class="h-44 w-full bg-[#111] flex items-center justify-center">
                <img id="user-banner-img" class="w-full h-full object-cover opacity-60 hidden"/>
                <h1 id="user-banner-text" class="text-3xl font-black italic uppercase hidden"></h1>
            </div>
            <div class="absolute -bottom-12 left-6 flex items-end gap-4">
                <div class="h-24 w-24 rounded-[30px] border-4 border-black overflow-hidden bg-[#111] shadow-2xl">
                    <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-full h-full object-cover"/>
                </div>
                <div class="mb-2">
                    <h2 id="display-name" class="text-xl font-black uppercase leading-none">Loading...</h2>
                    <p id="user-handle" class="text-[9px] text-red-600 font-bold tracking-widest uppercase">@status</p>
                </div>
            </div>
            <button onclick="openEdit()" class="absolute -bottom-8 right-6 bg-[#111] border border-[#222] px-4 py-2 rounded-full text-[10px] font-bold uppercase">Edit</button>
        </div>

        <div class="mt-14 px-6">
            <p id="user-bio" class="text-xs text-gray-400 italic leading-relaxed">Connecting to database...</p>
        </div>

        <div id="owner-tools" class="px-6 mt-6 hidden">
            <div class="bg-[#0a0a0a] p-5 rounded-[30px] border border-[#1a1a1a] space-y-3">
                <input type="text" id="v-id" placeholder="Video Link" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none"/>
                <input type="text" id="v-title" placeholder="Title" class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none font-bold"/>
                <textarea id="v-desc" placeholder="Description..." class="w-full p-3 bg-black border border-[#222] rounded-xl text-xs outline-none h-16 resize-none"></textarea>
                <button onclick="publishNow()" id="pub-btn" class="w-full bg-red-600 p-3 rounded-xl font-black text-xs transition-all active:scale-95">PUBLISH NOW</button>
            </div>
        </div>

        <div id="video-list" class="p-6 space-y-12">
            <div class="v-card space-y-4 opacity-50"><div class="v-frame loading-shimmer"></div></div>
        </div>
    </div>

    <script>
        // Firebase Config (Keep your existing)
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let ytPlayers = {};

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                loadProfile(user.uid);
                loadVideos(); // Global Feed
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        // Instant Publish (No Refresh)
        function publishNow() {
            const btn = document.getElementById('pub-btn');
            const link = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            const desc = document.getElementById('v-desc').value;

            if(!link || !title) return alert("Fill Title & Link!");

            btn.innerText = "PUBLISHING...";
            btn.disabled = true;

            const newPost = db.ref('videos').push();
            newPost.set({
                uid: auth.currentUser.uid,
                username: document.getElementById('display-name').innerText,
                videoId: link.includes("github.com") ? link.replace("/blob/", "/raw/") : link,
                title: title,
                desc: desc || "",
                likes: 0,
                timestamp: Date.now()
            }).then(() => {
                btn.innerText = "PUBLISH NOW";
                btn.disabled = false;
                document.getElementById('v-id').value = "";
                document.getElementById('v-title').value = "";
                document.getElementById('v-desc').value = "";
                // No reload needed, Firebase .on('value') will auto-update
            });
        }

        // Real-time Feed with Social Logic
        function loadVideos() {
            db.ref('videos').orderByChild('timestamp').on('value', snap => {
                const list = document.getElementById('video-list');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(key => {
                    const v = data[key];
                    let type = (v.videoId.includes('youtube') || v.videoId.includes('youtu.be')) ? 'yt' : 'direct';
                    
                    const card = `
                        <div class="v-card space-y-4 bg-[#050505] rounded-[40px] p-2 border border-[#111]">
                            <div class="flex justify-between px-4 pt-2 items-center">
                                <span class="text-[10px] font-black text-red-600 uppercase tracking-widest">${v.username}</span>
                                <i class="fa-solid fa-ellipsis text-gray-600"></i>
                            </div>

                            <div class="v-frame relative">
                                ${type === 'yt' ? `<div id="yt-${key}"></div>` : `<video id="vid-${key}" src="${v.videoId}" loop playsinline onclick="togglePlay('${key}','direct')"></video>`}
                                <div class="absolute inset-0 pointer-events-none desc-gradient flex flex-col justify-end p-6">
                                    <h3 class="text-sm font-black italic uppercase text-white">${v.title}</h3>
                                    <p class="text-[10px] text-gray-400 mt-1">${v.desc}</p>
                                </div>
                            </div>

                            <div class="px-4 pb-4 space-y-4">
                                <div class="seek-bar" onclick="seek(event, '${key}', '${type}')"><div id="fill-${key}" class="seek-fill"></div></div>
                                
                                <div class="flex justify-between items-center">
                                    <div class="flex gap-6 text-xl">
                                        <button onclick="togglePlay('${key}', '${type}')"><i class="fa-solid fa-play" id="p-btn-${key}"></i></button>
                                        <button onclick="addLike('${key}')" class="flex items-center gap-2">
                                            <i class="fa-solid fa-heart text-red-600"></i>
                                            <span class="text-xs font-bold">${v.likes || 0}</span>
                                        </button>
                                    </div>
                                    <button onclick="toggleComments('${key}')" class="text-xs font-bold text-gray-500 uppercase">Comments</button>
                                </div>

                                <div id="comment-sec-${key}" class="hidden space-y-3 pt-2 border-t border-[#111]">
                                    <div class="comment-box space-y-2 text-[10px]" id="list-msg-${key}"></div>
                                    <div class="flex gap-2">
                                        <input type="text" id="input-${key}" placeholder="Add comment..." class="flex-1 bg-black border border-[#222] p-2 rounded-lg text-[10px] outline-none"/>
                                        <button onclick="sendComment('${key}')" class="bg-red-600 px-3 rounded-lg text-[10px] font-bold">POST</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    list.innerHTML += card;
                    renderMedia(key, v.videoId, type);
                    loadComments(key);
                });
            });
        }

        // Social Functions
        function addLike(key) {
            const ref = db.ref(`videos/${key}/likes`);
            ref.transaction(current => (current || 0) + 1);
        }

        function toggleComments(key) {
            const sec = document.getElementById(`comment-sec-${key}`);
            sec.classList.toggle('hidden');
        }

        function sendComment(key) {
            const msg = document.getElementById(`input-${key}`).value;
            if(!msg) return;
            db.ref(`videos/${key}/comments`).push({
                user: document.getElementById('display-name').innerText,
                text: msg
            }).then(() => { document.getElementById(`input-${key}`).value = ""; });
        }

        function loadComments(key) {
            db.ref(`videos/${key}/comments`).on('value', snap => {
                const box = document.getElementById(`list-msg-${key}`);
                if(!box) return;
                box.innerHTML = "";
                snap.forEach(child => {
                    box.innerHTML += `<p><b class="text-red-600">${child.val().user}:</b> ${child.val().text}</p>`;
                });
            });
        }

        // Optimization: Render function
        function renderMedia(key, url, type) {
            if(type === 'yt') {
                setTimeout(() => {
                    ytPlayers[key] = new YT.Player('yt-' + key, {
                        videoId: getYTID(url),
                        playerVars: { 'controls': 0, 'modestbranding': 1, 'playsinline': 1, 'rel':0 },
                        events: { 'onStateChange': (e) => {
                            document.getElementById('p-btn-'+key).className = (e.data === 1) ? "fa-solid fa-pause" : "fa-solid fa-play";
                            if(e.data === 1) startYTTrack(key);
                        }}
                    });
                }, 100);
            } else {
                setTimeout(() => {
                    const vd = document.getElementById('vid-' + key);
                    if(vd) vd.ontimeupdate = () => { document.getElementById('fill-'+key).style.width = (vd.currentTime/vd.duration)*100 + "%"; };
                }, 100);
            }
        }

        // Helpers (Keep existing getYTID, togglePlay, stopAll, etc.)
        function getYTID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function togglePlay(key, type) {
            if(type === 'direct') {
                const v = document.getElementById('vid-'+key);
                if(v.paused) { stopAll(); v.play(); } else v.pause();
                document.getElementById('p-btn-'+key).className = v.paused ? "fa-solid fa-play" : "fa-solid fa-pause";
            } else {
                const p = ytPlayers[key];
                if(p.getPlayerState() === 1) p.pauseVideo(); else { stopAll(); p.playVideo(); }
            }
        }

        function stopAll() {
            Object.values(ytPlayers).forEach(p => p && p.pauseVideo ? p.pauseVideo() : null);
            document.querySelectorAll('video').forEach(v => v.pause());
            document.querySelectorAll('.fa-pause').forEach(i => i.className = "fa-solid fa-play");
        }

        function startYTTrack(key) {
            const p = ytPlayers[key];
            const t = setInterval(() => {
                if(!p || p.getPlayerState() !== 1) { clearInterval(t); return; }
                const fill = document.getElementById('fill-'+key);
                if(fill) fill.style.width = (p.getCurrentTime()/p.getDuration())*100 + "%";
            }, 500);
        }

        function seek(e, key, type) {
            const rect = e.currentTarget.getBoundingClientRect();
            const per = (e.clientX - rect.left) / rect.width;
            if(type === 'direct') {
                const v = document.getElementById('vid-'+key);
                v.currentTime = v.duration * per;
            } else {
                ytPlayers[key].seekTo(ytPlayers[key].getDuration() * per);
            }
        }

        function loadProfile(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('display-name').innerText = d.username || "Creator";
                document.getElementById('user-handle').innerText = "@" + (d.username || "user");
                document.getElementById('user-bio').innerText = d.bio || "No bio yet.";
                document.getElementById('user-avatar').src = d.avatar || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            });
        }
    </script>
</body>
</html>
