<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-[#050505] text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-[#d4af37] text-2xl font-black text-center mb-8 tracking-tighter uppercase">Creator Studio</h1>
        
        <div id="reg-area" class="space-y-4">
            <div class="bg-[#111] p-6 rounded-3xl border border-[#222]">
                <p class="text-gray-400 text-sm mb-4 text-center">Apna Brand ya User Name likhein</p>
                <input type="text" id="user-name" placeholder="e.g. Saini Wala" class="w-full p-4 bg-black border border-[#333] rounded-2xl outline-none focus:border-[#d4af37] mb-4 text-center text-lg"/>
                <button onclick="saveUser()" class="w-full bg-[#d4af37] text-black font-black p-4 rounded-2xl hover:opacity-90 transition">ENTER STUDIO</button>
            </div>
        </div>

        <div id="post-area" class="hidden space-y-4">
            <div class="flex justify-between items-center bg-[#111] p-4 rounded-2xl border border-[#222] mb-4">
                <p class="font-bold text-[#d4af37]" id="welcome-msg"></p>
                <button onclick="localStorage.clear(); location.reload();" class="text-[10px] bg-red-900/30 text-red-500 px-3 py-1 rounded-full border border-red-500/20">RESET</button>
            </div>

            <div class="space-y-3">
                <div class="bg-[#111] p-2 rounded-2xl border border-[#222]">
                    <input type="text" id="v-id" placeholder="YouTube Link (e.g. https://youtu.be/...)" class="w-full p-4 bg-transparent outline-none focus:text-[#d4af37]"/>
                </div>
                <div class="bg-[#111] p-2 rounded-2xl border border-[#222]">
                    <input type="text" id="v-buy" placeholder="Product Buy Link (Optional)" class="w-full p-4 bg-transparent outline-none"/>
                </div>
                <div class="bg-[#111] p-2 rounded-2xl border border-[#222]">
                    <input type="text" id="v-title" placeholder="Video Title" class="w-full p-4 bg-transparent outline-none font-bold"/>
                </div>
                <div class="bg-[#111] p-2 rounded-2xl border border-[#222]">
                    <textarea id="v-desc" placeholder="Description / Details" class="w-full p-4 bg-transparent outline-none h-24 resize-none"></textarea>
                </div>
                
                <button onclick="publish()" class="w-full bg-white text-black font-black p-5 rounded-3xl shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95 transition-all mt-4">
                    PUBLISH POST <i class="fa-solid fa-paper-plane ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Sahi Redirect URL
        const BLOGGER_PAGE = "https://sainiwalaa.blogspot.com/p/sainiwalaa-luxury-creator-economy-root.html"; 

        const savedName = localStorage.getItem('saini_name');
        if(savedName) {
            document.getElementById('reg-area').classList.add('hidden');
            document.getElementById('post-area').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Logged in: " + savedName;
        }

        function saveUser() {
            const n = document.getElementById('user-name').value;
            if(n) { localStorage.setItem('saini_name', n); location.reload(); }
        }

        function publish() {
            const vidInput = document.getElementById('v-id').value;
            const match = vidInput.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/);
            
            if(!match) { alert("Bhai, sahi YouTube link toh daalo!"); return; }

            const params = new URLSearchParams({
                user: savedName,
                vid: match[1],
                buy: document.getElementById('v-buy').value || '',
                title: document.getElementById('v-title').value || 'New Post',
                desc: document.getElementById('v-desc').value || ''
            });
            
            window.location.href = BLOGGER_PAGE + "?" + params.toString();
        }
    </script>
</body>
</html>
