<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Creator Studio Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --accent: #ff0000; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-premium { background: linear-gradient(90deg, #ff0000, #b30000); transition: 0.3s; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .modal.active { display: block; animation: fadeIn 0.3s ease; }
        .video-card { border-radius: 20px; background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.3s; }
        .order-card { border-left: 4px solid #ff0000; background: #111; border-radius: 12px; }
        .tab-btn.active { border-bottom: 2px solid #ff0000; color: #ff0000; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="p-4 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="font-black italic text-xl tracking-tighter text-red-600">SAINIWALAA</h1>
        <div class="flex gap-3">
            <button onclick="openModal('upload-modal')" class="w-10 h-10 rounded-full glass flex items-center justify-center text-red-500 border border-red-500/30"><i class="fa-solid fa-plus"></i></button>
            <button onclick="openModal('profile-modal')" class="w-10 h-10 rounded-full glass flex items-center justify-center"><i class="fa-solid fa-user-gear"></i></button>
        </div>
    </div>

    <div id="user-banner" class="h-64 w-full relative bg-zinc-900 flex flex-col justify-end p-6 transition-all duration-500 border-b border-white/5">
        <div id="banner-overlay-text" class="absolute top-10 right-10 text-4xl font-black opacity-20 italic select-none">CREATOR</div>
        <div class="flex items-center gap-5 z-10">
            <div class="relative">
                <img id="display-avatar" src="https://ui-avatars.com/api/?name=S&background=333&color=fff" class="w-24 h-24 rounded-3xl border-4 border-black object-cover shadow-2xl"/>
            </div>
            <div>
                <h2 id="display-name" class="text-3xl font-black tracking-tight">Loading...</h2>
                <p id="display-banner-txt" class="text-xs uppercase tracking-[0.2em] font-bold opacity-70 mt-1"></p>
            </div>
        </div>
    </div>

    <div class="px-5 -mt-6 relative z-20">
        <div id="bio-container" class="glass p-5 rounded-3xl border border-white/10 shadow-xl">
            <p id="display-bio" class="text-zinc-400 text-sm italic">No bio added yet.</p>
        </div>
    </div>

    <div class="flex border-b border-white/5 mt-8 px-5 gap-8">
        <button onclick="switchTab('productions')" id="tab-prod" class="tab-btn active pb-3 font-bold text-sm uppercase tracking-widest">Productions</button>
        <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn pb-3 font-bold text-sm uppercase tracking-widest">Orders Feed</button>
    </div>

    <main class="p-5 max-w-2xl mx-auto pb-24">
        <div id="productions-view" class="space-y-6">
            <div id="my-history" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="orders-view" class="hidden space-y-4">
            <div id="orders-list" class="space-y-3"></div>
        </div>
    </main>

    <div id="upload-modal" class="modal">
        <div class="max-w-md mx-auto py-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black">STUDIO <span class="text-red-600">UPLOAD</span></h2>
                <button onclick="closeModal('upload-modal')" class="text-zinc-500 text-3xl">&times;</button>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="post-title" placeholder="Video Title" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none">
                
                <div class="grid grid-cols-2 gap-2 p-1 bg-zinc-900 rounded-2xl border border-white/5">
                    <button onclick="toggleUploadSource('file')" id="src-file-btn" class="p-3 rounded-xl bg-red-600 font-bold text-xs">VIDEO FILE</button>
                    <button onclick="toggleUploadSource('link')" id="src-link-btn" class="p-3 rounded-xl font-bold text-xs">VIDEO LINK</button>
                </div>

                <div id="upload-file-box">
                    <input type="file" id="post-video-file" accept="video/*" class="w-full glass p-4 rounded-2xl text-xs">
                </div>
                <div id="upload-link-box" class="hidden">
                    <input type="text" id="post-video-link" placeholder="Paste Video URL (MP4/YT)" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none">
                </div>

                <input type="text" id="post-link" placeholder="Product / Affiliate Link" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none">
                <textarea id="post-desc" placeholder="Product Details..." class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none h-24"></textarea>
                
                <button onclick="handleUpload()" id="btn-upload" class="w-full btn-premium p-5 rounded-2xl font-black uppercase">Publish Production</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="max-w-md mx-auto py-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black">STUDIO <span class="text-red-600">CONFIG</span></h2>
                <button onclick="closeModal('profile-modal')" class="text-zinc-500 text-3xl">&times;</button>
            </div>

            <div class="space-y-5">
                <input type="text" id="inp-name" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none" placeholder="Username">
                <textarea id="inp-bio" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none h-20" placeholder="Your Bio..."></textarea>
                <input type="text" id="inp-banner-txt" class="w-full bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none" placeholder="Banner Slogan">
                
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="text-[9px] block mb-1">Banner BG</label><input type="color" id="inp-bg-color" class="w-full h-12 rounded-xl bg-zinc-900 border-none"></div>
                    <div><label class="text-[9px] block mb-1">Banner Text</label><input type="color" id="inp-banner-txt-color" class="w-full h-12 rounded-xl bg-zinc-900 border-none"></div>
                    <div><label class="text-[9px] block mb-1">Name Color</label><input type="color" id="inp-text-color" class="w-full h-12 rounded-xl bg-zinc-900 border-none"></div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs text-zinc-500">Profile Picture</label>
                    <input type="file" id="inp-avatar-file" accept="image/*" class="w-full glass p-3 rounded-2xl text-xs">
                </div>

                <button onclick="saveProfileData()" class="w-full btn-premium p-5 rounded-2xl font-black">UPDATE STUDIO</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/",
            projectId: "sainiwalaainfulencer",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userID = "U_SAINI_001";
        let uploadMode = 'file';

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function toggleUploadSource(mode) {
            uploadMode = mode;
            document.getElementById('upload-file-box').classList.toggle('hidden', mode === 'link');
            document.getElementById('upload-link-box').classList.toggle('hidden', mode === 'file');
            document.getElementById('src-file-btn').className = mode === 'file' ? 'p-3 rounded-xl bg-red-600 font-bold text-xs' : 'p-3 rounded-xl font-bold text-xs';
            document.getElementById('src-link-btn').className = mode === 'link' ? 'p-3 rounded-xl bg-red-600 font-bold text-xs' : 'p-3 rounded-xl font-bold text-xs';
        }

        function switchTab(tab) {
            document.getElementById('productions-view').classList.toggle('hidden', tab !== 'productions');
            document.getElementById('orders-view').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('tab-prod').classList.toggle('active', tab === 'productions');
            document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
        }

        async function saveProfileData() {
            let updates = {
                name: document.getElementById('inp-name').value,
                bio: document.getElementById('inp-bio').value,
                bannerText: document.getElementById('inp-banner-txt').value,
                bannerColor: document.getElementById('inp-bg-color').value,
                bannerTxtColor: document.getElementById('inp-banner-txt-color').value,
                textColor: document.getElementById('inp-text-color').value
            };
            const avatarFile = document.getElementById('inp-avatar-file').files[0];
            if(avatarFile) updates.avatar = await toBase64(avatarFile);
            db.ref('users/' + userID).update(updates).then(() => { closeModal('profile-modal'); alert("Studio Saved!"); });
        }

        async function handleUpload() {
            const title = document.getElementById('post-title').value;
            const btn = document.getElementById('btn-upload');
            let videoSource = "";

            if(uploadMode === 'file') {
                const file = document.getElementById('post-video-file').files[0];
                if(!file) return alert("Select video file");
                videoSource = await toBase64(file);
            } else {
                videoSource = document.getElementById('post-video-link').value;
                if(!videoSource) return alert("Enter video link");
            }

            btn.innerText = "PUBLISHING...";
            db.ref('videos').push({
                uid: userID,
                title: title,
                desc: document.getElementById('post-desc').value,
                videoUrl: videoSource,
                productLink: document.getElementById('post-link').value,
                timestamp: Date.now()
            }).then(() => { closeModal('upload-modal'); location.reload(); });
        }

        // Real-time Data Loading
        db.ref('users/' + userID).on('value', snap => {
            const u = snap.val() || {};
            document.getElementById('display-name').innerText = u.name || "New Creator";
            document.getElementById('display-name').style.color = u.textColor || "#ffffff";
            document.getElementById('display-bio').innerText = u.bio || "No bio added yet.";
            document.getElementById('display-banner-txt').innerText = u.bannerText || "";
            document.getElementById('display-banner-txt').style.color = u.bannerTxtColor || "#ffffff";
            document.getElementById('user-banner').style.backgroundColor = u.bannerColor || "#18181b";
            if(u.avatar) document.getElementById('display-avatar').src = u.avatar;
        });

        db.ref('videos').orderByChild('uid').equalTo(userID).on('value', snap => {
            const container = document.getElementById('my-history');
            container.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                container.innerHTML += `
                    <div class="video-card p-4 flex gap-4">
                        <div class="w-20 h-28 bg-black rounded-xl overflow-hidden flex-shrink-0">
                            <video src="${v.videoUrl}" class="w-full h-full object-cover" muted></video>
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div><h4 class="font-bold text-sm">${v.title}</h4><p class="text-[10px] text-zinc-500 line-clamp-1">${v.desc}</p></div>
                            <div class="flex gap-2">
                                <button onclick="db.ref('videos/${child.key}').remove()" class="text-[9px] font-bold text-red-500">DELETE</button>
                                <a href="${v.productLink}" target="_blank" class="text-[9px] font-bold text-zinc-400">PRODUCT</a>
                            </div>
                        </div>
                    </div>`;
            });
