<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SAINIWALAA | Admin Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-[#ff0000] text-2xl font-black text-center mb-6 italic uppercase tracking-tighter">Creator Studio</h1>
        
        <div class="bg-[#111] p-6 rounded-[30px] border border-[#222] space-y-4 mb-8 shadow-xl">
            <h2 class="text-xs font-bold text-gray-500 uppercase border-b border-[#222] pb-2 mb-2">Upload New Video</h2>
            <input type="text" id="v-id" placeholder="Paste Video Link" class="w-full p-4 bg-black border border-[#333] rounded-2xl outline-none focus:border-red-600 text-sm"/>
            <input type="text" id="v-title" placeholder="Title" class="w-full p-4 bg-black border border-[#333] rounded-2xl outline-none focus:border-red-600 text-sm"/>
            <button id="pub-btn" onclick="publishNow()" class="w-full bg-red-600 text-white font-black p-4 rounded-2xl active:scale-95 transition-all">PUBLISH NOW</button>
            <div id="debug-msg" class="text-[10px] text-center text-gray-500 uppercase font-bold pt-2 tracking-widest">System Ready</div>
        </div>

        <div class="bg-[#111] p-6 rounded-[30px] border border-[#222] shadow-xl">
            <h2 class="text-xs font-bold text-red-500 uppercase border-b border-[#222] pb-2 mb-4">Manage Live Feed</h2>
            <div id="video-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                <p class="text-center text-xs text-gray-600 uppercase">Fetching videos...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm-5fJ49MxP0MFT8dDIkptue15x_GaaYc",
            authDomain: "sainiwalaainfulencer.firebaseapp.com",
            projectId: "sainiwalaainfulencer",
            databaseURL: "https://sainiwalaainfulencer-default-rtdb.firebaseio.com/", 
            storageBucket: "sainiwalaainfulencer.firebasestorage.app",
            messagingSenderId: "116125275008",
            appId: "1:116125275008:web:dc09ab0c6ce0317436e765"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- UPLOAD LOGIC ---
        function publishNow() {
            const link = document.getElementById('v-id').value.trim();
            const title = document.getElementById('v-title').value.trim();
            const btn = document.getElementById('pub-btn');
            if(!link) return alert("Link missing!");

            btn.innerText = "PUBLISHING...";
            btn.disabled = true;

            const postRef = db.ref('videos').push();
            postRef.set({
                videoId: link.includes("github.com") ? link.replace("/blob/", "/raw/") : link,
                title: title || "New Release",
                timestamp: Date.now()
            }).then(() => {
                location.reload();
            });
        }

        // --- MANAGE & DELETE LOGIC ---
        db.ref('videos').orderByChild('timestamp').on('value', (snapshot) => {
            const list = document.getElementById('video-list');
            const data = snapshot.val();
            if(!data) { list.innerHTML = "<p class='text-center text-[10px] text-gray-700 uppercase'>No Videos Online</p>"; return; }

            list.innerHTML = "";
            Object.keys(data).reverse().forEach(key => {
                const v = data[key];
                const item = document.createElement('div');
                item.className = "flex items-center justify-between bg-black p-3 rounded-xl border border-[#222]";
                item.innerHTML = `
                    <div class="truncate mr-4">
                        <p class="text-[11px] font-bold text-gray-300 truncate">${v.title}</p>
                        <p class="text-[9px] text-gray-600 truncate italic">${v.videoId}</p>
                    </div>
                    <button onclick="deleteVideo('${key}')" class="bg-red-900/30 text-red-500 border border-red-900 px-3 py-1 rounded-lg text-[10px] font-bold hover:bg-red-600 hover:text-white transition-all">DELETE</button>
                `;
                list.appendChild(item);
            });
        });

        function deleteVideo(key) {
            if(confirm("Bhai, kya aap sach mein ye video hatana chahte ho?")) {
                db.ref('videos/' + key).remove()
                .then(() => alert("Video Removed!"))
                .catch((e) => alert("Error: " + e.message));
            }
        }
    </script>
</body>
</html>
